front:
  text: 宛陵先生集附録
  hash: sha256:7fb69933d0cbf09876ff11681398991769b320cb1c84ac136c4298168c7eae76
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_063-1a}
body:
  text: 送梅主簿歸河陽序歐陽脩至寶濳乎山川之幽而能先羣物以貴於世者負其有異而巳故珠濳于泥玉濳于璞不與夫蜃蛤珉石混而棄者其先膺美澤之氣輝然特見於外也士固有濳乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才美之光氣亦有輝然而特見者矣然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通邑大都據其㑹就其名而擇其精焉爾洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟余方據是而擇之獨得於梅君聖俞其所謂輝然特見而精者耶聖俞志高而行㓗氣秀而色和嶄然獨出於衆人中初爲河南主簿以親嫌移佐河陽常喜與洛之士游故因吏事而至於此余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古寺則必相與吟哦其間始則歡然以相得終則暢然覺乎薰蒸浸漬之爲益也故乆而不猒旣而以吏事訖言歸余且惜其去又想夫濳乎下邑混於庸庸然所謂能先羣物而貴於世者特其異而巳則光氣之輝然者豈能掩之哉注孫子序歐陽脩世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書本於兵兵之術非一而以不窮爲竒冝其說者之多也凡人之用智有短長其設施各異故或膠其說於偏見然無出所謂三家者三家之法皥最後其說時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能通春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董吕諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將岀兵千里毎坐計勝敗授以成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略盖惜其所得自爲一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而伯諸侯夫使武自用其書止於強伯及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於巳見是以注者雖多而少當也獨吾友聖俞不然嘗評武之書曰此戰國相傾之說也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次第而注者汨之或失其意乃自爲注凡膠於偏見者皆抉去傅以巳意而發之然後武之說不汨而明吾知此書當與三家並傳而後世取其說者徃徃於吾聖俞多焉聖俞爲人謹質温恭衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房爲壯夫何異上梅直講書蘇軾子瞻某官執事每讀詩至鴟鴞讀書至君奭常切悲周公之不遇及見孔子厄於陳蔡之間而絃歌之聲不絕顏淵仲由之徒相與答問夫子曰匪兕匪虎率彼曠野吾道非邪又何爲至此顏淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾爲爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之冨貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其冨貴而夫子所與共貧賤者皆天下之賢才則亦足以樂乎此矣軾七八歲時始知讀書聞今天下有歐陽公者其爲人如古孟軻韓愈之徒而又有梅公者從之游而與之上下其議論其後益壯始能讀其文詞想見其爲人意其飄然脫去世俗之樂而自樂其樂也方學爲對偶聲律之文求升斗之禄自度無以進見於諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之誠不自意獲在第二旣而聞之人執事愛其文以爲有孟軻之風而歐陽公亦以其能不爲世俗之文也而取是以在此非左右爲之先容非親舊爲之請屬而向之十餘年間聞其名而不得見者一朝爲知巳退而思之人不可以苟冨貴亦不可以徒貧賤有大賢而爲其徒則亦足恃矣苟其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人盖優哉游哉可以卒歲執事名滿天下而位不過五品其容色温而不怒其文章寛厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉宛陵先生年譜序宛陵梅先生以道德文學發而爲詩變晩唐卑陋之習啓盛宋和平之音有功於斯文甚大歐陽文忠公知之最深旣題其詩稿又序其集又序其所注孫子又銘其墓而哀之以文盖文忠公之知先生猶子房謂沛公爲殆天授者是豈容贊一辭哉然昔之君子以言語文字爲天下後世所貴重者必其出處語黙之際無或少悖於理而後能垂世而行逺此年譜之所爲作也張君師魯叔輿世爲宛陵人著宛陵先生年譜余得而讀之愛其詞約而事備論覈而理明其多以歐陽子之書爲據依巳爲得書之體至於辯魏㤗邵博之厚誣使先生可作亦自喜後之人爲能知巳者且尤有補於世教也抑又考之宋嘉祐二年詔脩取士法務求平澹典要之文文忠公知貢舉而先生爲試官於是得人之盛若眉山蘇氏南豐曾氏橫渠張氏河南程氏皆出乎其間不惟文章復乎古作而道學之傳上承孔孟然則謂爲文忠公與先生之功非耶吾鄕周丞相定著文忠公年譜學者賴之此書當與之並行宛陵文獻於是足徴矣叔輿以余誦習歐陽子之書屬叙而刻之不獲辭謝爲識卷末云至元二年丁丑八月旣望序廬陵劉性墓誌銘嘉祐五年京師大疫四月乙亥聖俞得疾卧城東汴陽坊明日朝之賢士大夫徃問疾者騶呼屬路不絕城東之人市者廢行者不得徃來咸驚顧相語曰玆坊所居大人誰耶何致客之多也居八日癸未聖俞卒於是賢士大夫又走弔哭如前日益多而其尤親且舊者相與聚而謀其後事自丞相以下皆有以􅉠䘏其家粤六月甲申其孤增載其柩南歸以明年正月丁丑葬于宣城雙羊山聖俞字也其名堯臣姓梅氏宣州宣城人也自其家世頗能詩而從父詢以仕顯至聖俞遂以詩聞自武夫貴戚童兒野叟皆能道其名字雖妄愚人不能知詩義者直曰此世所貴也吾能得之用以自矜故求者日踵門而聖俞詩遂行天下其初喜爲清麗閑肆平淡乆則涵演深逺間亦琢剥以出怪巧然氣完力餘益老以勁其應於人者多故辭非一體至於他文章皆可喜非如唐諸子號詩人者僻固而狹陋也聖俞爲人仁厚樂易未嘗忤於物至其窮愁感憤有所罵譏笑謔一發於詩然用以爲驩而不怨懟可謂君子者也初在河南王文康公見其文嘆曰二百年無此作矣其後大臣屢薦宜在舘閣嘗一召試賜進士岀身餘輙不報嘉祐元年翰林學士趙槩等十餘人列言于朝曰梅堯臣經行脩明願得留與國子諸生講論道德作爲雅頌以歌詠聖化乃得國子監直講三年冬祫于太廟御史中丞韓綘言天子且親祠當更制樂章以薦祖考惟梅堯臣爲宜亦不報聖俞初以從父䕃補太廟齋郞歷桐城河南河陽三縣主簿以德興縣令知建德縣又知襄城縣監湖州監稅簽署忠武鎭安兩軍節度判官監永濟倉國子監直講累官至尚書都官貟外郞嘗奏其所撰唐載二十六卷多補正舊史闕謬乃命編脩唐書書成未奏而卒享年五十有九曾祖諱超祖諱邈皆不仕父諱讓太子中舍致仕贈職方郞中母曰僊游縣太君束氏又曰清河縣太君張氏初娶謝氏封南陽縣君再娶刁氏封渤海縣君改恩平縣君子男五人曰増曰墀曰坰曰龜兒一早卒女二人長適太廟齋郞薛通次尚㓜聖俞學長於毛氏詩爲小傳二十卷其文集四十卷注孫子十三篇余嘗論其詩曰世謂詩人少逹而多窮盖非詩能窮人殆窮者而後工也聖俞以爲知言銘曰不戚其窮不困其鳴不躓于艱不履于傾養其和平以發厥聲震越渾鍠衆聽以驚以揚其清以播其英以成其名以告諸㝠感二子歐陽脩黃河一千年一清岐山鳯鳥不再鳴自從蘇梅二子死天地寂然收雷聲百蟲坏戸不啓蟄萬木逢春不發萌豈無百鳥解言語喧啾終日無人聽二子精思極搜抉天地鬼神無遁情及其放筆聘豪俊筆下萬物生光榮古人謂此覷天巧命短疑爲天公憎昔時李杜爭橫行麒麟鳯皇世所驚二物非能致太平湏時太平然後生開元天寶物盛極自此中原疲戰爭英雄白骨化黃土冨貴何止浮雲輕惟有文章爛日星氣凌山岳常崢嶸賢愚自古皆共盡突兀空留後世名蘇謂舜欽也哀挽詩歐陽脩昔逢詩老伊水頭青衫白馬渡伊流灘聲八節響石樓坐中辭氣凌淸秋一飮百琖不言休酒酣思逸語更遒河南丞相稱賢侯後車日載梅與鄒我年最少力方優明珠白璧相報投詩成希深擁鼻謳師魯卷舌藏戈矛三十年間如轉眸屈指十九歸山丘凋零所餘身百憂晩登玉墀侍珠旒詩老虀鹽太學愁乖離㑹合謂無由此㑹天幸非人謀頷鬚巳白齒根浮子年加我貌則不歡猶可強閑屢偷不覺歲月成淹留文章落筆動九州釡甑過午無饙餾良時易失不早收篋櫝瓦礫遺琳璆薦賢轉石古所尤此事有職非吾羞命也難知理莫求名聲赫赫掩諸幽翩然素旐歸一舟送子有淚流如溝又王安石詩行於世先春秋國風變衰始栢舟文辭感激多所憂律吕尚可諧鳴球先王澤竭士巳偷紛紛作者始可羞其聲與節急以浮真人當天施再流篤生梅公應時求頌歌文武功業優經奇緯麗散九州衆皆少銳老則不翁獨辛苦不能休惜無來者人名遒貴人憐公青兩眸吹嘘可使高岑樓坐令隱約不見收空能乞錢助饙餾疑此有物司諸幽栖栖孔孟葬魯鄒後始卓落稱軻丘聖賢與命相楯矛勢欲強逹仍無由詩人况又多窮愁李杜亦不爲公侯公窺窮厄以身投坎軻坐老當誰尤吁嗟豈卽非善謀虎豹雖死皮終留飄然載䘮下隂溝粉書軸幅懸無旒高堂萬里哀白頭東望使我商聲謳又我得聖俞詩於身亦何有名字託文編他年知不朽我得聖俞詩於身果何如留爲子孫寶勝有千金珠謁墓詩宣城縣丞南郡滕珂百年詩老卧空山猶憶當時語帶酸嬴得兒童喚夫子可憐名位秪都官手編新史唐文備骨立殘碑漢籕漫落日牛羊上丘隴草埋翁仲獨峩冠宛陵城南柏山寺行到西廂見舊祠人物欲觀嘉祐老銘文空有醉翁辭銀章粉墨誰舒卷金薤琳琅自陸離毎見河豚起春岸永懷風致細哦詩又寧國守廬陵文天祥滄滄宛水陽鬱鬱都官墳喬松拱道周縁塋茁芳蓀古時北邙歎白楊邈游魂大雅獨不墜脩名照乾坤再拜墳上士躧履揖諸孫握手慨以慷而有典刑存渥洼生騏騮荆山產璵璠悠哉清渭流眷言葆其源又監察御史張經歐公去巳乆誰爲柏山愁白髪詩千首蒼煙土一丘諸孫時拜掃過客獨遲留寂寞僧窻晚春溪水自流又按察副使盧摯一上高齋憶謝公雲間江樹有無中詩家政有都官宅腸斷荒山落葉風又憲司經歷真定靳汝弼宋有梅夫子靈鳯朝陽鳴文章炳星日當時照東京歐陽期並轡朋軰俱名卿事業何顯著滿腹儲太平思之不得見但恨遲我生陵谷變遷後薄宦來宣城儒素藹鄕里雲仍亦賢英幸因休澣日下馬拜荒塋栢山得其高雙溪得其清二者能永乆延公千古名又寧國路經歷劉瑀昔聞夫子名今始拜其墓栢山寺古碑斷橫三尺荒墳儼如故稻溝流水聲且哀老樹號風悲更怒詩僊巳去二百載壞垣空走狸與兎嗚呼再奠一盃酒澘然回首西山暮又寧國路同知阮麟翁嘉祐微言絕重經二百年殘詩留斷石荒壠入平田山鶴夜應怨河豚春又鮮邦人說夫子寒食寺門前祭宛陵先生文維淳祐二年歲在壬寅某月某日朔朝散大夫顯謨閤待制知寧國軍府事兼管内勸農營田使王遂等謹以清酌庶羞之奠致祭于故都官梅公宛陵先生之墓惟宋文章曰歐與蘇有梅夫子歐蘇之徒在漢去誕於唐棄䛕八百餘年掃去朽枯如斵元氣變化百殊慶曆之盛上跨周虞顚倒奔走溢浚之都空餘翰墨一世楷模相厥寒泉在彼坤隅文氣貫天落日平蕪遂生雖晩此意中孚肅肅官僚陳其啜餔斯人逺矣不可呌呼文猶未墜其在玆乎尚饗維咸淳六年歲在庚午三月某日知寧國軍府事文天祥謹以清酌庶羞之奠致祭于先賢尚書都官宛陵先生梅公之墓而言曰大江西東實倡古文西則歐陽東則先生上追韓孟下啓蘇曾先生在天斯文有靈僕生也晚實在歐鄕天子有命來守公邦感時改火爰薦苾芳尚饗又文天祥視我廬陵夫子歐陽彰韓癉昆孕蘇育黃公於其間以詩名世葩韓搴芳肩蘇挹袂故醉翁於公之德則曰衣冠儒者也於公之詩則曰英華而雅者也翁旣與韓而終始公亦與翁而上下公仕于何如鮎上竹生遇昭陵官同鄭谷使詩遂窮人則三百篇之作者將其身之俱不淑又劉朔齋嗚呼名位之不可兼得也乆矣然得位者榮身一時得名者流芳千載以公之文學行義雖仕不稱德而自嘉祐至今踰二百年矣天下之言詩人者必曰聖俞國人之誦所尊敬者必曰宛陵先生是則天之所以厚公者固在此而不在彼也震孫少嘗竊誦公之詩今幸守公之邦式公之墓悲其亭之乆廢而烝甞無所乃卽故址而改作焉表以石刻繚以垣墻而封植其宰木迨茲考成乃率僚寀釃酒一酹庶幾懷賢尚德之意精爽如在尚歆顧之題干越亭送君石秘校詩後閻復南昌一尉老西都文采風流接聖俞詩好見稱歐永叔書工不減蔡君謨洞庭鴈過風生葦干越峯青斗戞湖細讀粉箋當日詠終篇無字不驪珠又張斯立宛陵梅夫子才名冠當世歐蘇與並驅時稱天下士哲人去巳乆手澤見英氣可慕不可攀悠悠千古意行義魯臧孫流芳垂後裔今遇叔章君箕裘元不墜又貢奎詩還二百年來作身死三千里外官知已若論歐永叔退之猶自媿郊寒又張伯淳聖俞先生宣城裏經行脩明教胄子不特詩名滿世間紀載精詳繼前史當時晦叔誦其文曰二百年未有此先生㤗山北斗然管窺蠡測難爲言我從聞孫見手澤定知家學有根源繭𥿄可腐石可泐世美自有不朽存又劉必大先生文章在青史先生勲名揭白日誰謂二百有餘年得見兩詩親翰筆花箋松煤色尚鮮元祐偉人如再出名器時來或可求家珤世傳難可必叔章持此上天朝橫斗高風低少室又王士熈宛水留荒宅空山老栢株詩名唐正體經法漢先儒賢裔今重見高風古亦無郞官爲直講遺說辯精麤又汪澤民宋代文章梅與歐薦賢何不致公侯宛陵詩老名千載嘉祐郞官閟一丘調寫心聲諧寶瑟書存手澤粲銀鉤曾經干越琵琶尾愁絕西風鴈過秋跋前二詩茍宗道拜觀宛陵梅先生手書寄題干越亭送君石秘校尉河内之作詩律謹嚴楷法莊重盖天禀仁厚樂易發見於心聲心畫自有不能掩者歐陽公謂氣完力餘益老以勁斯二章足以當之矣又宋渤前軰文章字畫無不楷謹精宻者正若平生大節余嘗見昌黎韓公福先寺下題名歐陽文忠公集古跋尾司馬文正公日曆東坡論語解易說皆起草時冊子雖旁注細書一一端正可讀至圈改行間悉可見其先後用意處今觀梅屯田公自書詩兩章校其同時諸人若一軌轍又用筆作方闊法李西臺蔡端明然又陳儼宛陵公去世二百餘年今觀遺墨二詩猶旦暮遇之也或以爲平淡或以爲枯槁惟具眼能識之惟公生而卒以詩窮死然世愈逺而愈増重雖與日月爭光可也視當時烜赫者溘然泯黙不復知爲何人相去盖有間矣亦可謂一世之屈百世之信者歟寥寥遺響子其嗣之又李倜樊宗師苦心琢句非韓公不能見知於世梅都官之於歐陽公亦然何異世而同軌也耶仍孫奕芳持公干越亭并送君石秘校二詩出示亦可想見其風度矣咨藏之勿墜又元明善梅宛陵負一代詩名歐陽公吃吃推重想當日課一首用心亦苦矣妙墨二𥿄髣髴得其勁氣愈信歐公爲知人又張與材聖俞詩名爲歐蘇所重後之人不容復議矣獨翰墨見於世者少其八世孫叔章能珤藏之今觀其筆意瀟散有高人逸士風度此豈汲汲於聲利者心畫正爾豈特坐詩窮耶又龔嘯去浮靡之習超然於昆體極弊之際存古淡之道卓然於諸大家未起之先此所以爲梅都官詩也當聲名文物之盛有歐公爲之依歸而歐公收拾人才識拔於科舉之外者於先生與老泉可謂不遺餘力矣雅道相與輝映千古猶計官資而曰不遇是孰爲有遇乎尚論其世誦其詩讀其書必知其人者始足以語此宛陵先生之鄕子孫在焉叔章暇日岀示真蹟使人歆慕無巳按尚書屯田貟外郞當是階官後遷都官耳卽元豐官制改後朝奉郞也國子監直講乃是職事官宋初巳置常選通經有實行者爲之宜歐公以爲公薦也書局編脩亦公辟云跋㑹慶堂記後汪澤民宛陵梅先生爲文以記㑹慶堂其奉先思孝如存之誠至矣歲乆石泐嗣孫致逺致和寔等具碑請余重書刻置堂上噫繼自今歲時禴烝百世一日則梅氏子孫之職釋子能固護棐栢如澄展之心則各盡其道矣尚朂之謹之
