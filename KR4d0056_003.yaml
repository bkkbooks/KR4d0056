  text: 宛陵先生集卷第三
  hash: sha256:5b65b2f3d83a609481c265ebfae6c3d4c20b4bae60f37acc2964f6e89121c54f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_003-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和希深新秋會東堂何必水周堂翛然萬木涼朋簮茲共樂節物自迎商巧笑承歡劇新詞度曲長驂鸞悲霧扇泛蟻釂雲漿並蒂榴房熟連叢桂蘂香人初投轄醉客甚撡檛狂鬢約寒鴉碧衣輕舞蝶黃流波間任注錯席豈依行亹亹談寧倦厭厭夜未央良時誠可惜清燕此無荒客鄭遇曇頴自洛中東歸禪衣本壞色不化洛陽塵獨有煙霞染况將山水親西風入關戍宿雨過城闉誰羡飄然迹吾車亦巳巾馬判官歸闕與君歸洛陽仕宦頗相偶荏苒遷歲時徘徊樂文酒今歸巳及瓜為贈聊折柳亦將隨計書慘别寧嗟久餞彭城公赴隨州龍門道上作零雨送車輪初清逺陌塵歸藩漢東國遮道洛陽人伊水照虹斾楚山懷玉麟征軒不可戀梗淚返城闉早行道中相逢黤黤雨雲晦駸駸車馬繁唯憂不及見及見返無言古意故人留雅曲今與新人彈新人聽不足復使後人歡送弟良臣歸宣城喬木句溪邊秋光幾曲連將歸三畝宅逺寄下江船伴爾唯征鴈悲余有暮蟬親朋如見問貧外似當年河南張應之東齋昔我居此時鑿池通竹圃池清少遊魚林淺無棲羽至今寒窗風靜送枯荷雨雨歇吏人稀知君獨吟苦河南王尉西齋官舍古城隅西齋何寂寂種竹幽趣深開屏翠光滴青山露南牆落日明東壁危臺起其傍平隰坐可覿歲暮野田空天高霜隼擊更憐風月時幾弄林間笛劉秀才歸河內君家太行下應復近蘇門河氣知寒早嵐煙覺暮昏犬鳴林外火笛響月中村久作山陽客逢人為寄言憶洛中舊居寄永叔兼簡師魯彥國東堂石榴下夜飮曉未還絺衣濕浩露桂酒生朱顏君同尹與富高論曾莫攀開吐仁義奧傲睨天地間以此為朋樂衡門未嘗關自從北闕來擾擾時少間登危欲引望尚不見雲山何由覿夫子客袂淚瀾斑武陵行生事在漁樵所居亦煙水野艇一竿絲朝朝狎清泚忽自傍藤隂乘流轉山觜始覺景氣佳潛通小溪裏常時不見春入谷驚紅蘂幽興窮緑波玩芳心莫巳花外一峰明林間碧洞啓遙聞雞犬音漸悟人煙邇捨舟遂潛行石徑劣容屣豁然有田園竹果相叢倚厖眉髽髻人倐遇心顏喜尚作秦衣裳那知漢名氏自言逢世亂避地因居此來時手種桃今日開如綺更看水上花幾度逐風委競引飯雕胡邀飮酌瓊醴復呼童稚前緑鬢仍皓齒翻遣念還茅思歸釣鱣鮪將辭亦贈言勿道丘壑美鼓枻出仙源繁英猶邐迤薄暮返蒼洲微風吹白芷他日欲重過茫茫何處是西宫怨漢宮中選時天下誰為校寵至莫言非恩移難恃貌一朝居别館悔妬何由效買賦豈無金其如君不樂夏夜小亭有懷西南雨氣濃林上昏月色寒影不隨人寥寥空露白外兄施伯侃下第赴并門叔父招共是干時者同為失意人言趨太原召如慰宛陵親笳鼓聽臨塞琴書未離身别君無斗酒當識士安貧鄭戭及第東歸後赴洋州幕郤生方得桂王粲始從戎一舸辭吳會單車入漢中亂山雲木古側徑野泉通欲識風煙美心知故國同施判官赴饒州昔日里中舊今為幕下英煙波歸楚國風月滿都城食有江魚美時無羽檄驚他年儻行縣肯使折腰迎楊畋赴官并州嘗聞地近胡寒氣盛中都車馬行臨塞關山見落榆吳鉤皆尚壯章甫幾為儒寄謝西曹掾能吟秀句無歐陽寺丞桐城宰葉落淮南樹青山遍馬頭人煙將近郭松竹不知秋夜虎林間嘯溪泉舍下流門前仲卿廟遺迹待君求朱邑冡祠在焉祝熙載赴任東陽李都尉客東陽美山水之子本風流稍去何平叔還追沈隱侯清江飛晚雨斜日半滄洲縣道行無愧煙蘿有勝遊彥國通判絳州結友時未久情親心巳照氛埃外自遣風月還同調復與任浮沉未嘗趨近要以此雖處貧寧防俗者誚今將辭我去盡日來談笑窮巷敞茅茨高言出廊廟且作朱韍行聊能發光耀當亦就銅墨逺之江海徼山郭寂無喧雲川不妨釣所嗟胡越人千里煩登眺餘姚陳寺丞試邑來勾越風煙復上遊江潮自迎客山月亦隨舟海貨通閭市漁歌入縣樓絃琴無外事坐見浦帆收明州推官鄭先輩應幕海邊郡秋風千里歸隨潮吳榜駛轉浦楚山微野橘霜前熟江螯露下肥還家候靈鵲人想罷鳴機聚蚊日落月復昏飛蚊稍離隙聚空雷殷殷舞庭煙羃羃蛛網徒爾施螳斧詎能磔猛蝎亦助惡腹毒將肆螫不能有兩翅索索緣暗壁貴人居大第蛟綃圍枕席嗟爾於其中寧夸觜如戟忍哉傍窮困曾未哀癯瘠利吻競相侵飮血自求益蝙蝠空翺翔何嘗為屏獲鳴蟬飽風露亦不慙喙息薨薨勿久恃會有東方白賦秋鴻送劉衡州沆秋鴻整羽翮去就自因時往春南方來遂止天泉池天泉水清泚鴛鷺日追隨蒲藻豈不樂江湖信所宜今朝風色便暫向衡陽歸洞庭逢葉下瀟湘先客飛渚有蘭杜美心無稻糧卑􅊻繳勿爾念鷹隼寧爾窺煙波千萬里足以資盤嬉峰前想回日青冥生路岐清池泠泠清水池藻荇何參差美人留采掇玉鮪自揚鬐波瀾日巳淺龜鱉日復滋蝦蟇縱跳梁得以緣其涯競此長科斗凌亂滿澄漪空有文字質非無簡策施仙鯉勿苦羡寧將蠯蛤卑徒剖腹中書悠悠誰爾知聊保性命理逺潛江海湄泚泚曷足道任彼蛙黽為弟得臣歸覲并州知君歸去心巳逐秋風起明發登太行遙將望汾水藹藹白雲下吾親正居此拜慶曷為榮新除一官美張修赴威勝軍判官青驪渡河水俠氣動刀環入幕沙塵暗臨風鼓角間地形通柏谷秋色滿榆關誰復輕儒者難淹筆硯間弔唐俞通閨年最少才俊罕能雙鵩去塵栖室魂歸霧起窗慈親留漢氷愛妾返荆江一稚才能語煢然寄逺邦任適尉烏程俯作程鄉尉折腰還自甘卞峰晴照黛霅水曉澄藍葑上春田闢蘆中走吏參到時蘋葉長柳惲在江南馬殿丞通判密州晨裝辭北闕懷紱二東侯地本全齊勝風仍變魯優危帆淮上去古木海邊秋相送江潭客曾同十載遊夏侯彥濟武陟主簿懷縣曾余往風謠為爾知寒先太行近潤接大河卑賓酒栽公秫晨羹翦露葵簿書行正委何似布衣時余居御橋南夜聞祅鳥鳴效昌黎體都城夜半隂雲黑忽聞轉轂聲咿􅊯嘗憶楚鄉有祅鳥一身九首如贅疣或時月暗過閭里緩音低語若有求小兒藏頭婦滅火閉門雞犬不爾留我問楚俗何苦爾云是鬼車載鬼遊鬼車載鬼奚所及抽人之筋繫車輈昔聽此言未能信欲訪上天終無由今來中土百物正安得遂與南方儔上帝因風如可逹願令驅逐出九州月夜與兄公度納涼間行至御橋夕月吐澄明隂雲淨如掃空庭引天翠爽氣生懷抱家近御橋頭因為橋畔遊倚欄波上影不共水東流思歸此清夜何處是江樓四望逺寂歷微風動颼飀觀闕垂萬象山河趨九州壯哉帝王宅顧我一蜉蝣富貴非可取田園今向秋明當拂衣去試與問扁舟隨州錢相公挽歌築巖無往夢遊岱有飛魂墮淚隋侯國遺金漢帝恩文章流日域忠孝在王門天道何由問秋風遍九原昔日傷歸國今朝歎舉輀憂愁傳楚些殄悴感周詩文草明時訪忠言故吏知居常嗚咽涕翻作衆人悲去年伊水上傾府望雲岑路轉猶回首人誰不殞心可憐飛語後擠恨九幽深從此埋英骨空令淚滿襟僧可真東歸因謁范蘇州仲淹姑蘇臺畔去雲壑付清機野策過寒水山童護衲衣松門正投宿竹笠帶餘暉誰愛杼山句使君應姓韋廖秀才歸衡山縣千里倦為客秋歸烏榜輕過林湘橘暗收潦楚江清晚泊親鷗鷺殘芳襲杜蘅長沙幾日到天際見高城魏屯田知楚州淮南木葉驚淮上使君行天外高帆出沙頭候吏迎夜潮通廢埭秋月滿孤城正遲文翁化從來楚俗輕張子野赴官鄭州盡室寄東里一官辭上都只應乘小駟寧肯躡雙鳬秋雨生陂水高風落廟梧梅山為余訪還有舊家無擬王維偶然作嵇康任天性傲散喜端居自云安卑者竊比老莊歟一月十五日頭靣忘洗梳危坐恣搔虱於時懶作書一曲情自寄一杯歡有餘尚子志所慕阮生甘不如黃精可養壽廣澤冝覩魚不堪行作吏章服褁猿狙蘇祠部通判洪州飛鷁去江西秋飈滿桂旗蘆洲花白處楓岸葉丹時沙鳥看來沒雲山愛後移高才屬滕閣家擅子卿詩中秋與希深别後月下寄薄霧生寒水寥寥􅋈畫船人傷千里别桂吐十分圎把酒非前夕追歡憶去年南樓足佳興好在謝林川望芒碭山出舟跳古岸林外見修岡回頭問榜子前巘是芒碭其顚有髙廟松柏鬱蒼蒼迤邐堆阜屬蕭條茆葉黃千古收王氣一川平夕陽人家才四五雞犬自相望尚爾想新豐誰復思沛鄉臨流一舉酒可以喻悲傷初見淮山遊宦久去國扁舟今始還朝來汴口望喜見淮上山斷嶺碧峰出平沙白鳥間南歸不厭逺况在水雲間旌義港阻風清晨下長淮忽值秋風惡渺瀰雲霧昏掀合魚龍作方驚白浪高又以寒潮落逺渚時出沒輕舟自前却將投古戍迷偶得孤港泊下纜寄蘆林尋村步芒屫儻有白醪沽聊為野田酌茆屋何颼颼瓦罌空索索却持杖頭歸相顧還寂寞一夕不能眠孤吟當狂藥依韻和劉六淮潮汐潮如有信時向舊痕生始覺回波定還看曲渚平舞鷗隨下上寒日共浮傾後夜人無寐遙聽入浦聲舟中聞蛩秋月滿行舟秋蟲響孤岸豈獨居者愁當令客心亂展轉重興嗟所嗟時節換時節不苦留川塗行巳半霜落草根枯清音從此斷誰復過江南哀鴻為我伴雙野鳬野水雙紋翼雲蘿謾自謀驚飛帶波起行喋拂萍開暖日浮還沒寒汀去復來王喬如可挹仙舄此徘徊和才叔岸傍古廟樹老垂纓亂祠荒向水開偶人經雨踣古屋為風摧野鳥棲塵坐漁郎奠竹杯欲傳山鬼曲無奈楚辭哀山光寺煬帝故宫古橋經廢寺蒼蘚舊離宫柏殿秋隂冷蓮堂暮色空鳥啼山藹裏僧語竹林中寂寞蕪城近蕭蕭牧笛風自急流口至長蘆江入金陵始發碧江口曠然諧逺心風清舟在鑑日落水浮金瓜步逢潮信臺城過鴈音故鄉何處是雲外即喬林早渡長蘆江帶月出寒浦殘星浸水濆帆開風色正舟急浪花分霧氣橫江白雞聲隔岸聞天晴建業近鍾岫起孤雲采石懷古青峰來合沓勢壓大江雄舟渡神兵後城荒王氣空山根魚浪白巖壁石蘿紅弄月人何在孤墳細草中望夫山亭亭千古質曾是念征夫一作山頭石畏看天際途猶如託蘿蔓不似采蘪蕪時有江雲近仙衣挂六銖泊牛渚磯所謂鼓吹山也有竹可作笙竽落帆牛渚前便為牛渚宿波搖殘照中采翠浮巖谷巖谷足幽篁石上羅寒玉裁作媧氏笙堪吹凰鳯曲楚客夕無眠獨將清籟續更看江月來還想燃犀燭遊響山久憶門前勝聊乘逸興遊寒篙進溪曲古木暗城頭鳥過空潭響船隨碧瀨流梅花三疊罷煙火起滄洲蕪湖口留别弟信臣少也逺辭親俱為異鄉客昨日偶同歸今朝復南適南適畏簡書叨茲六百石重念我當去送我江之側溪山逺更清溪水深轉碧因知惜别情愈賒應愈劇金霞閣登臨無盡興清燕日徘徊霞影緣觚落嵐光入牖來離宫分碧瓦太液俯青槐好待邀明月瑤琴為一開送蟾上人遊南嶽葉下瀟湘闊杯浮豈道遲賓鴻不到處危彴獨行時翠嶺祝融宅喬松虞舜祠雲霞遊遍日振錫更何之王公慥東歸行色上東陌秋槐葉亂飛囊無一錢用篋有古書歸羸駟嘶寒草荒城背落暉莫嫌牛馬隔走别八行稀幾道隰州判官清曉赴國門西風生早涼天地大道出苑樹短亭傍相看車馬色共照池水光舉酒酒非淺明朝誰重觴話别語難盡去後空回腸計彼行路逺幾日至洛陽洛陽多舊友一一道相望失意非憔悴懷昔無悲傷無由戀中國不久之南方音書儻能問鴻鴈亦將翔此外念出處便為參與商到官秋節晚塞近百草黃定隨劉武威校獵赤土岡余方楓林下野艇泛滄浪弄月江波闊罥衣菱荇香雖知各所適未免涕霑裳撡袂却引顧煙蕪平夕陽獨回唯鳥影相與過林塘朋遊頓茲減客心仍未央宛陵先生集卷第三
