front:
  text: 宛陵先生集卷第十三
  hash: sha256:495e436171c3bf1822bd4b8e77edfa23f409790379cecd01cc8db92fb28b4c12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_013-1a}
body:
  text: 宋宛陵梅堯臣聖俞著禁中瑞竹同本異莖孤竹二君子聖人知獨淸但將竒節並何用首陽名依韻和集英殿秋宴殿幄陳金石宮梧集鳯凰侍臣嚴虎帳法衮被龍章九榖初登稔羣黎共樂康宴盤犀作鎮舞綴錦成行玉碗盛氷滑紗籠奏饌涼廡深容小語槐密漏微陽庭立衛兼霍坐尊蕭與張清塵汲瑤井泛宇藹天香獸躍緣橦地旗開踏鞠埸樓傳紅幘唱簾隱內家粧鴟攫曾無彈蜂來誤有芳門傍銅鑄馬帝所翠為觴萬國趨王會諸公佩水蒼螭頭左史筆陛楯半更郎雅著明時樂需言盛德光添花慕平一賜菊異元嘗身巳陪多士心寧愧下鄉薄才何所補歌詠播殊疆啼禽盆繭未成絲破袴勸可脫安知增羞顔赤脛衣短褐汴堤鶯古堤多長榆落莢鵝眼小其下迅黃流其上鳴黃鳥安知舟中人黑鬢日巳少千里歸大梁玉笙聞􅌄窕終朝不成曲幽響在林表莫羡沙路行金鞭馳裊裊四月二十七日與王正仲飲我來自楚君自吳相遇泛波銜舳艫時時舉酒共笑樂莫問罌盎有與無醉憶曩同吾永叔倒冠落佩來西都是時豪快不顧俗留守贈榼少尹俱高吟持去擁鼻學雅闋付唱纎腰姝山東腐儒漫側目洛下才子爭歸趨自兹離散二十載不復更有一日娛如今舊友巳無幾歲晚得子欣為徒四月二十八日記與王正仲及舍弟飲孟夏景苦長與子舟中飲酒行三四巡病嘔聊就寢仲氏又發霍洞下忽焉甚湯劑不能勝悶絶口巳噤我嘔雖未平驚走豈遑枕呌號使呼醫子怪亦莫諗遽白何至斯葛方推小品且尤食物間膻腥失調飪所餉惟豬雞况此乏箘簟以子獨無恙未必因滑瀋稍覺陽䏞回栗膚猶瘮瘮儻其遂不起孰肯謂素稟吾鄉千里遙幸免成貝錦紹巖上人寧親爾教禁足不出戶盛夏畏蹈螻蟻蹤赤日去省巳亡律曷若冠帶共甘濃送許州知録王殿丞霜花如鵠毛萬里點枯稿曉入蓬池道寒侵蘇合袍重來社櫟長舊寄里門高去事黃丞相無辭執板勞慈氏院假山風濤春斷越山骨聚集竒險成千峯碧甕為潭立涎石直疑巖底藏蛟龍夜與鄰幾持國歸紅塵夜不息橫衢若煙霧朝見車馬來暮見車馬去車中目炯炯馬上情遽遽交相知是誰飛先無覔處十月晦夢遊嵩山明日訪宋中道見次道寄宿嶽寺忽夢高峰下同遊失姓名山腰荒輦道巖竇落泉聲黑石文難辨蒼苔迹易成他時傳洛詠知是陸雲兄十一月七日雪中聞宋中道與其內祥源觀燒香三日不相見逢人問始知同車侵朔雪臨水拜先無覔處十月晦夢遊嵩山明日訪宋中道見次道寄宿嶽寺忽夢高峰下同遊失姓名山腰荒輦道巖竇落泉聲黑石文難辨蒼苔迹易成他時傳洛詠知是陸雲兄十一月七日雪中聞宋中道與其內祥源觀燒香三日不相見逢人問始知同車侵朔雪臨水拜靈龜絮撲鴛鴦帶花團蛺蝶枝如何東郭叟足迹自穿綦和江鄰幾詠雪二十韻十一月將雪寒誰計有無雲橫凍鵩翼霰集泣蛟珠萬里風為使千門玉作樞縞衣來自鄭濤鷺卷從吳積甲聞熊耳觀鵝入越都庭槐高臃腫屋蓋素模胡騁巧能藏醜論功解飾枯巢禽皆白鳯來獸必騶虞遼俗休誇豕燕丹久望烏袒裘無壯臂附火念焦顱歌竹休王滿餐毛活使蘇亡羊何可問别鶴不應孤靡密同脂網縈回似舞姝漸深由片片取重本銖銖日月方收照乾坤不辨隅雖輕自相壓更潔亦終渝飢虎僵幽谷遊龍脫徑鬚佳人調蜜蔗公子擁貂狐共是空囊客曾非暖席儒黃昏特過我興與灞陵俱送張遂州華省名郎意若西相如橋柱舊曾題巳將符節為邦守不畏關山入馬蹄千里過秦看素滻三年還蜀度青泥里門錦綬何為樂外奉嚴君內阿㜷送周寺丞宰新鄭仲冬吉徂征曉月在環玦京水生層冰梅山見殘雪縣庭槐巳古堂壁碑未缺惟吾故交意贈子以為别尹師魯有志古堂記送余郎中知鄭州西接都門才百里壓城殘雪照牙旗風煙古是諸侯國鴈鶩新來僕射陂餽食且依當日具鑄刑無改昔人為濃薰舊舍青綾被不越常衙睡足時送胡都官知潮州自昔揭陽郡刺史惟韓侯韓侯初來時問吏瀧水頭到官諭鱷魚夜失風雨湫乃知抱正直異類尚聽謀潮雖處南粵禮義無遐陬勿言古殊今唯在政教修適聞豫章士勇往登犀舟不畏惡溪惡疊鼓齊歌謳逺持天子命水物當自囚更尋賢侯迹書上揭陽樓送晏太祝之宣城監稅每愛昭亭傍清灘石可數兩岸修竹林孤城嚴晚鼓自辨越人言難廋楚鄉語郭門春聚船江賈無多取送張正臣赴泰州幕𫾣冰冰未泮塞河流玉段輕舸莫言遲古城滄海畔春臯蘭蕙茁晚井魚蝦亂時平無羽書此樂異王粲月下懷裴如晦宋中道九陌無人行寒月淨如水洗然天宇空玉井東南起我馬卧我庭帖帖垂頸耳霜花滿黑鬛安欲致千里我㒒寢我廄相背肖兩巳夜深忽驚魘呼若中流矢是時興我懷顧影行月底唯影與月光舉止無猜毀吾交有裴宋心意月影比尋常同語默肯問世俗子願嚏上辛祈榖為獻官猛虎不獨宿鴛鴦不雙棲虞舜遊蒼梧帝子夜向瀟湘啼時既禪禹妃亦老老淚灑竹無高低流根及筍駮紅蘚此情乃與天地齊我今齋寢泰壇下侘傺願嚏朱顏妻和司馬學士上辛祀事出郊寄馮學士侵曉度南薰禁鐘猶可聞春郊微有霰上苑稍藏雲齋館人相望官橋路巳分寧同鳥烏樂翔集自成羣同蔡君謨江鄰幾觀宋中道書畫君謨善書能别書宣獻家藏天下無宣獻既歿二子立漆匣甲乙收盈厨鍾王真迹尚可覩歐禇遺墨非因模開元大曆名流夥一一手澤存有餘行草楷正大小異點畫徑宛精神殊坐中鄰幾素近視最辨纎悉時驚吁逡巡蔡侯得所得索研鋪𥿄才須臾一掃一幅太快健檀溪躍過瘦的顱觀書巳畢復觀畫數軸江吳種稻圖稻苗秧秧水拍拍羣鷺矯翼人荷鋤陂塍高下石籠密竹樹參倚荆籬踈大車立輪轉流急小犢欺顧稚子驅令人頻有故鄉念春事况及𧖟桑初虎頭將軍畫列女二十餘子拖裙裾許穆夫人尤窈窕因誦載馳誠起余余無書性無田區美人雖見身老癯舉頭事事不稱意不如倒盡君酒壼上元夜雪有感去年昭亭陽今夜苦風雪及雪在京城宵燈亦將滅石花廣袖輕梅蕊新粧潔匆匆競還家陌上亂車轍上元雪春雪如蝴蝶春燈如百花漫漫飛不巳愁殺千萬家我今無復夢擁𬒳讀南華送李才元學士知廣安軍楊柳未堪折柔條時倚風朱輪過灞上杜宇響褒中危棧憎春雨晴林發曉紅不須言蜀政當自學文翁送王推官宰上洛先歸關中跨馬獨歸日春風隨度關客裘將欲綻社燕亦同還洛水源邊邑秦人隱處山君家有鳬舄切莫向雲間送信安張從事吉甫兼寄白使君西洛故人少世家今亦稀憐君能及祿過我苦言歸遊宦長城下生涯舊國微使君應借問出處竟多違送懷州張從事仲賓行色在車馬西亭新雨過移家從上黨佐幕向三河皂莢林初暗黃粱酒未和七賢無復有舊迹尚應多宛陵先生集卷第十三宛陵先生集目録卷第十三禁中瑞竹和集英殿秋宴啼禽汴堤鶯與王正仲飮記與王正仲舍弟飲紹巖上人寧親送王殿丞慈氏院假山夜與鄰幾歸夢遊嵩山雪中聞宋中道和江鄰幾詠雪送張遂州送周寺丞宰新鄭送余郎中知鄭州送胡都官知潮州送晏太祝之宣城監稅送張正臣赴泰州幕月下懷如晦願嚏和司馬學士祀事同蔡君謨江鄰幾觀畫上元夜雪有感上元雪送李學士知廣安軍送王推宰上洛送信安張從事送懷州張從事目録終
