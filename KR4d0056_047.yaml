front:
  text: 宛陵先生集卷第四十七
  hash: sha256:77d0e04e0160a82ab70fb51a899a8e6499db72072503b3774ea0e9005a7068df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_047-1a}
body:
  text: 宋宛陵梅堯臣聖俞著觀邵不疑學士所藏名書古畫野性好書畫無力能自致每遇高趣人常許出以視邵侯多竒玩留我特開笥首觀阮與杜驢上瞑目醉阮籍杜甫韓幹貌四馬臨流解鞍轡花驄照夜白正側各畜意繫衣穿袴靴坐立皆廄吏精神宛如生于腮復穿鼻梅雞徐熙花竹間寒雀睡逸少自寫真對鏡絶相類數本失姓名古胡并老驥山水樹石硬荆關藝能至荆皓關穜巨然李成者落筆愈竒異人物張僧繇雖傳恐非是其餘又莫究模搭似未備周秦巳來書行草楷篆􅊢聲名舊烜爀一一果可喜邵侯愛我曹咸使𥿄尾記况侯有古學小字刻珉翠各贈墨本歸懷寶誰肯忌先至山陽懷杜挺之與君同川途舟發偶後先順風吹我帆巳過飛鳥前寄聲託飛鳥微意或可傳定逢檣上烏暫向彼留連薄暮楚城下蜘蹰問來船絶句五首風過巳午未肯正酒病嬰我心無憀船頭拍翅野鴨浴水上擺子獰魚跳岸邉稚子戲把釣蚯蚓作餌靑條長上去下來船不定自飛自語燕爭忙夜欲三更飢鼠鬪燈殘一點小星紅村邊坎坎賽神鼓船底抨抨駕浪風葑田青灰博奕局島樹墨榅煙雨圖巳去楊州百餘里回頭還隔幾重湖蝦蟇嗥沫為科斗蜾裸銜蟲化細腰蠹穴荒陂有多少乾風濕雨各飛跳淮南轉運李學士君錫示卷李氏世能詩落落為時豪漢陵唐太白始競二雅高益端正封賀才各傾吳濤于今幾代孫手持切玉刀功利既及民又將薄風騷示我照乘珠光彩生褐袍曾非貧家有懷歸徒增勞神物必難祕恐隨風雨逃觀王氏書先觀雍姬舞六么妍葩發艷春風搖舞罷英英書大字玉指握管濃雲飄風馳雨驟起變怪文鰩晝飛明珠跳席客聚立驚且歎筆何徑健人柔夭昔時裴旻能劒舞丹青助氣精神超藝雖不同意有會世事相假非一朝書二客論呈李君錫學士我慕杜挺之磊落高世談又愛王平甫才雄天馬驂二人相議評最重李淮南踒跎文館彥委曲部政諳能蘇煮海民變使供租甘雖持使者權不作自褁𧖟諄諄無威慠雍雍激廉貪書戒易滿人縱愚須起慙始時邊海鹽亭民常官逋其錢往往給腐米為直棄之而去浸久亭民無本多逃者今俾中戶就邑納租給亭民民乃大利逃者復還留別李君錫學士淮南尚喜風流在客有殷勤載酒過不醉不歸情可見相看相笑意如何瞭眸自解持高論長頸稀逢缺善歌舊愛陽關亦休唱西還從此故人多過山陽水陸院智洪上人房有蘇子美墨迹十載七來此每嗟多異今池灰休辨劫川月解明心遺墨悲蘇倩高情想遁林能間常似舊翹立水邊禽淮隂侯功既高天下身何不自防巳能成漢業無復假齊王復耻噲為伍安知吕所忘空名流未竭淮水共湯湯閏三月八日淮上遇風杜挺之先至洪澤遣人來迎曉出淮口時夜來風已止半路逢怒嗥客心愁欲死忠信雖可仗魚鱉將異此但慕前行舟漸入孤汊裏猶能有餘力遣助良可喜宿洪澤舟子起添纜夜潮同雨來寒聲相亂急逺夢自然回水鳥鳴還睡風燈暗復開宦遊常作客未息為貧催泗州郡圃四照堂官艫客艑滿淮汴車馳馬驟無間時豈有餘力事棟宇後園荒草長離離朱侯下車百職舉亦治宴豆頻遊嬉梁冠爵辨各得禮道路溢譽亡高卑因隙作堂名四照虛光轉納娥與羲靣靣懸窗夾花藥春英秋蘂冬竹枝射堋寬濶習武事鏡沼清淺吹文漪侯之此意寧自樂夷情勞士俱忘疲後來出口勤灑掃莫作廄埒生蒿藜泗守朱表臣都官創北園樹藝北壕上直對高城隂使君朱輪來歌管樽酒深風雷生淮雨雲物冒楚岑戰舠習追逐飛凌捷水禽不獨耳目觀乃見預禦心事間賓從樂景美臺榭臨令人忘羇旅灑慮起微吟依韻和誠之淮上相遇一别逋翁久不逄亦知諸葛卧龍中幾年三致千金冨今日重追二謝風形稿巳能同散木鬢霜從聽著寒蓬飛光入酒舊時月來照狂歌猶未窮泗州觀唐氏書唐氏能書十載聞誰教精絶向紅裙百金買書蒲葵扇不必更求王右軍同朱表臣及諸君遊樊氏園五年前上去乃從許公過舊物此君在後生新筍多朱櫻繁且熟黃鳥啄仍歌一一如當日乘高奈興何七里灣得朱表臣寄千葉樓子髻子芍藥誰稱為近侍宜與牡丹尊霞綷千千葉香撩黯黯魂紅樓思俠少寶髻奉王孫賸插不堪照顏衰汴水渾併日得朱表臣酪及櫻桃昨日酪將熟今朝櫻可餐紫蓴休定價黃鳥未新殘甘滑巳相美齒牙仍尚完應知消客熱逺贈盎盈盤阻淺挺之平甫來飮泛淮忌水大我行浩以漫泝汴忌水淺我行幾以乾偶與困滯并將獨為此難窮堤有來客芬芳可與言共休緑榆隂置酒聊慰安主人雖倉卒猶得具甘酸酸漬楚梅靑甘摘夏櫻丹引觴吞日光耳熱不復歎俯仰巳陳迹未可忘茲歡誰思費生術幻惑寧盤桓依韻和表臣奎野亭淮光抱城去山翠落樽前魯叟欲浮海楚人休問天野雲將拂幔水鳥不驚船歷覽誰能賦今聞太守賢依韻和表臣先春亭雜花紅間白逺樹短參長天近春歸疾城高地易涼千尋浮逺水五兩動連檣置酒未終樂山煙生暝隍和表臣河南庾署西軒飛烏欲下蟾生時斜光冷魄常相隨右山左水清洗目虛簷曲檻生揚眉白魚甘肥網可得公酒美滑杯可持臨淮使君有間佚長橘直度來莫遲依韻和表臣見贈中間會與別不啻二十年向來君之官我必贈以篇今過臨淮郡惠好情聯聯訪我車騎都宴我鶯花然此當舟航衝旅泊逾百千迓高而撫下酒壺匱食連使豫一日為立可見華顚遽行恐勞君數里不得前三月汴水淺蹇滯無我先君乃遺我詩盛稱我為賢比之少陵豪望我何太全又令入時用目堪事高眠安能事孔聖終學美周宜勤答以明懷矢辭敢欺天依韻和表臣聞與挺之宣叔平甫飮舟淺不能進反羡車馬馳同行各在野有酒相與期堤上聞禽處桑間落日時使君羊笋贈更飮更追隨表臣是日送蒸羊笋束表臣惠蜀箋偕玉硯池蜀箋珉硯池為贈知雅故慙無右軍書亦乏左思賦環水象辟雍紋花如織素願傳君德政况巳聞行路表臣以阻水見勉次其韻野叟津難問賢人酒不空行吟同去國退翼欲乘風憂巳先天下窮方坐井中豫生一如此安得免衰翁聞宣叔挺之圍棊人以棊銷日我觀棊輒寐未必盡死生何兹較愚智只將多勝少復取生為利不若酒之賢悠然共醒醉五倩篇奏方響琵琶倩然五蛾眉妙曲動金絃犀椎玉鈴鈴龍撥雷􅟁􅟁響急能愈靜意間情常專主人昔結客一醉百金捐觀濤來吳都遇我泗水邊夜飮向明月非同聞鄰船釋悶吳挺之平甫燕丹未歸馬未角卞子抱玉無兩腳孤城食盡兵未却度笮中懷挂一索我輩於此酒宜酌百歲千秋奈何樂釋滯帝在蒼梧妃泣竹蘇武餐毛海西曲窮山逺道車折軸深井渴汲綆不續我輩於此酒正緑貴無奈何歡且足依韻和表臣憶遊竹園山寺山擕謝公妓竹似阮家林花發日初暖鳥啼春欲深朱櫻連葉摘緑酒帶醅斟猶想聞歌吹僧房未暇吟依韻和挺之晨起見寄時阻汴淺淺水不堪泛暗灘時激聲晨都望迢遞窮旅思屏營芳草同誰藉投壺自喚名得君晨起詠逺逺見交情李宣叔祕丞遺川箋及粉𥿄二軸蜀人搗玉屑楚客調金粉製箋君有贈草疏我無藴冝書楊雄辭莫寫屈原憤誰識此意微曾非事搖吻錢志道推官遺紗帽逺贈烏紗帽能無白也詩山花不更插野客莫驚窺次韻和表臣惠符離去歲重醖酒時與杜挺之李宣叔王平甫飲於阻水仍有笋醬之遺贈以榴花酒沉淸貴隔年不憂航滯磧為泛盞如船加品盈盤內無花到眼前還招李杜醉野釀莫稱賢表臣齋中閲畫而飮嘗觀韓幹馬人物亦如生君收四病骨無肉只崢嶸二匹癢磨樹二匹縱其情意思若不任千里未可行古絹蠧巳盡彩色無精明歎惜傳至此幾人金帛輕隋時有名筆獨寫嚴君平猶持杖頭錢罷肆心莫營魁然中貴人坐榻不知名畫中有畫屏山石侔天成今時長沙叟獼猴檞林橫疏毛與設色前代何角爭餘存品雖高我未易敢評主人愈好事緘笥酒壺傾寄送許待制知越州喜公新拜會稽章五月平湖鏡水光菡蓞花迎金板舫葡萄酒瀉玉壺漿雲歸秦望山頭靜雨洗若耶溪上涼天子不能煩侍從可將吟詠報時康依韻和王司封離白沙途中感懷淮南夜飛氛祲銷星纒歷歷轉隨杓黃童謾對日如月賈誼休悲鵩似梟市骨巳知求駿馬輶車何用載田驕不惟忠憤心如此王佐才高賦小鷯將赴表臣會呈杜挺之莫怪去遲遲豫心君亦知膝前嬌小女眼底寧馨兒學語渠渠問牽裳步步隨出門雖不逺情愛未能移醉中和王平甫用其韻王瓜未赤方牽蔓李子才靑巳近樽我最年高雜年少風流還有杜陵孫將解舟走筆呈表臣昨夜謳吟瀉春酒今朝波浪下黃河主人不暇匆匆别為倩流鶯寄語過答再和舟行才及二三里巳復淺流如凍河君有短書誰逺寄時因燕子拂檣過非意篇呈表臣人言厨傳繁乃是郡久例一日苟不修未免衆吠睨飽尚謗所興飢必愠不細損之禮漸隳存之禮未替心莫忽賤微義莫徇貴勢我將取是然敢以為君計依韻和錢深推官見寄無才不敢學陽秋嗜酒時能問大酋前日偶從河上飲文章何可並英遊依韻答宣叔行舟相隔見寄汴漲濺濺費挽牽輕舟難若上青天只知乘駚及先去不意遲留落郍邊力漕篇呈發運王司封寶臣兵外肢強兵內體壯斂之盡歸歲以多餉東南軸艫銜尾而上浮江浮淮泝汴之湍汴湍不常水衡不官惟虞溢毀靡虞舟槃舟槃糧覆糧孰為足大計之數萬百惟六帛幣錯貨三倍其榖曰主厥漕王之藎臣日憂河涸運智煩神以舫實土約流束津百步之間若牙與齦朝漲夕降滯舸次鱗亟乞于朝朝不即報下上經營風并日曝其躬其勤秉心有操士豈無祿視此則冒彼以榮佚此以劬耗願答其劬錫命錫誥四月十三日唐店寄錢推官昨夜月如水君能擕酒來破除愁悶去洗蕩肺腸開露氣林間落河聲地底回相知不須早語合自無猜徒步訪李宣叔宣叔有詩依韻答渡河誰道去我重子雲才鴻鴈汀洲去牛羊井落徠乍行初覺倦暫語不能該日色看看暮將歸意復徊答高判官知唐君夜飲露宿勤王客相從月下來黃流何日漲緑酒暫時開風定燈花爛天高斗柄回醉言多脫略吾黨不須猜宛陵先生集卷第四十七宛陵先生集目録卷第四十七觀邵不疑名畫懷杜挺之絶句五首李轉運示卷觀書書二客留別李學士過山陽智洪房淮隂侯淮上遇風宿洪澤泗州郡圃四照堂泗守創北園和淮上相遇泗州觀唐氏書得千葉樓子芍藥併得酪及櫻桃阻淺挺之平甫來飲和表臣奎野亭和表臣先春亭和河南庾署西軒和表臣見贈和表臣聞諸友飲表臣惠蜀箋硯池和阻水見勉聞宣叔挺之圍棊五倩篇釋悶釋滯和憶竹園山寺和晨起見贈李祕丞遺川箋粉𥿄錢推官遺紗帽和表臣惠醖閲表臣畫而飲寄送許待制知越王司封感懷赴表臣會呈挺之醉中和王平甫將解舟呈表臣答再和非意篇呈表臣和錢推官見寄答宣叔行舟相隔力漕篇呈王發運唐店寄錢推官徒步訪李宣叔答高判官目録終
