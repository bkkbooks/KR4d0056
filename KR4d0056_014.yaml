front:
  text: 宛陵先生集卷第十四
  hash: sha256:7bb3d0d4ffe08f24afd9a8247e5fa6a2e40ba9744a122396d24cfe3e5f183b28
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_014-1a}
body:
  text: 宋宛陵梅堯臣聖俞著和李廷老家會飲四序豈常停寒革春寖和始愛衣裘輕相與車馬過車馬不畏逺風埃不畏多到門門有槐槐上時鳥歌時鳥歌猶澀主人當謂何南開石榴軒中置飲酒螺食桉施黃金饌炙厭白鵝漢糟槎頭美吳羮成咄呵既醉或放言抉莊引駘它縱論或好辨排墨同孟軻日將薄虞淵執策相交摩欲去舉大白酌我苦大苛正月二十七日江鄰幾杜挺之劉原甫貢甫韓持國邀飮於定力院昨日會飮我後至誰欲比我為王戎笑知卿輩意易敗起誚便與俗物同似過黃公酒壚下嵇阮不見修竹中杳爾山河隔千里此心正有古人風送宋中道朝陵仍於西都省親西出虎牢關南瞻園廟戟漢殿拜衣冠魏臺嚴帳帟春風石闕冷曉氣田塗白早晚下朱陵先過洛陽陌寄西京通判宋次道學士當時交友都無幾欲問歡娛亦異今花接上林新木變水分清洛舊池深峨嵯嵩色雲常在窈窕宫牆草又侵修竹千竿白家寺昔年題處可能尋送眺殿丞鄭州簽判朝離沁水上夕去野亭賒走馬日銜樹度河風卷沙關雲來雨腳陂岸長蒲芽共被方為樂軍中莫摻撾重送宋中道隴草陳根發山櫻宿霧蒸將過周故宅先下漢諸陵頴道春經雨官溝暗溜氷蓴羮休定價羊酪易為勝送涇州良原何鬲主簿春風入邊磧二月沙草生胡馬自偷牧漢農寧廢耕薄田刈晚榖又餉防秋兵縣版固當重調輕無與程依韻和永叔見寄春風約柳一片西欲託鳥翼傳音稽昨朝偶向東城去草草又逢驄馬蹄長髯御史威正峭沙堤來坐氣吐霓我乘小駟雖甚瘦喜見驂馭猶解嘶適聞南都接大尹笑我出處今何迷耻趨捷徑身已老欲至何用頻吹虀蛟龍失水等蚯蚓鱗角雖有辱在泥困居廢井誰引手豈得更望青雲梯筆鋒徑發若強努餘力曾徹七重犀倦禽雄雌不飽腹日暮徒念還巢棲大椿朝菌各有盡此物何怪莊叟齊誠知豪俠自快樂東郊南陌競鬪雞胸中有道無廣狹包括宇宙在一稊何時與公去頴尾湖水漫漫如玻璃世間會合固不易况乃仕宦多相暌正似郵亭戀行者未到止息空歌驪我貧尚不給朝夕焉得負郭置稻畦筋骸幸且稍輕健山水縱好無路躋儻公他時買田宅願以藜杖從招擕吾兒詩書不足教亦以助力於耕犂東城送運判馬察院春風騁巧如翦刀先裁楊柳後杏桃圎尖作瓣得踈密顔色又染燕脂牢黃鸝未鳴鳩欲雨深園靜墅聲嗷嗷役徒開汴前日放亦將決水歸河槽都人傾望若焦渴寒食巳近溝巳淘何當黃流與雨至雨深一尺水一篙都水御史亦即喜日夜順疾回輕舠頻年吳楚歲苦旱一稔未足生脂膏吾願取之勿求羡窮鳥困獸易遁逃我今出城勤送子沽酒不惜典弊袍數途必向睢陽去太傅大尹皆英豪試乞二公評我説萬分豈不益一毛國給民蘇自有暇東園乃可資遊遨送知和州杜駕部桐花欲開時羣噣爭哺兒但求黃口飫焉問丹穴飢常山有四鳥將飛昔巳悲中間忽殞逝豈得安其枝一飲必屢顧每啄必遲遲今朝竟矯翼去向江之湄銜芹不自食欲遺孤與雌此義實巳重莫為梟所嗤世俗多嫌忌我胡為此詩此詩美孝悌持贈杜挺之送劉郎中知廣德軍昔在少年時辛勤事諸父諸父為桃州物宜皆可數事君勤職貢采茗先榖雨劭農井田桑科薅重鋤斧城西大靈祠措意初似禹將通吳境河身自同豕伍期婦來餉時壇上必鳴鼓一為烏所誤愧恨去不覩至今存遺堤五丈立堅土正如開轘轅黃熊慙啓姥功利欲及民血食宜簋簠祠後有高山山頭攢棟宇此實諸父為禾麻可就俯歲登有樂事或亦作歌舞賦詩當清明解褉思洛浦其言在黑石往往被樂府于今三十年追想漸成古公將乘朱輪去問民疾苦治術自有具薄言無所補缺將陳迹書又且劇莽鹵送洛南周寺丞畋家在華山將去洛南宰日聞庭下松亂山歸四隱舊墅隔三峰狹谷車能入春林雨易逢地多椒與漆貨必厚於農賦石昌言括蒼石屏括蒼黃石屏樹如濃墨寫根深稱條葉生意絶蕭灑或聞造物手立意先真假指是龜溲摹能同自然者天下莫復言物亦逢知寡寄致仕張郎中代人門榮世美高天下身退心間住洛陽畫鶴能同薛少保愛書還比蔡中郎花隂小酌呼鄰父月下清吟掃石床不問從來生計薄題籖盈閣是家藏送錢駕部知卭州細雨梅初熟輕寒麥巳秋路危趨劔道夢穩過刀州秦栗非吳食巴粳類越疇當壚無復舊試似長卿求文惠師贈新筍劉纍死龍不馴世間士不識真有真物實去人或在山亦隱鱗或多孫出水濱奮雷轟轟萬里春厚土坼裂窮蟄振牙甲戢戢不可數削掘誰怕天公嗔煮之按酒美如玉甘脆入齒饞流津荆吳易得梁宋少二年不食思無因豈意今朝忽有遺不忍獨饗呼吾鄰宛陵先生集卷第十四宛陵先生集目録卷第十四和李廷老會飮江鄰幾邀飲定力院送中道省親寄西京宋學士送眺殿丞重送宋中道送何鬲主簿和永叔見寄送馬察院送和州杜駕部送廣德劉郎中送洛南周寺丞賦石昌言括蒼石屏代寄致仕張郎中送錢駕部知卭州文重師贈新筍目録終
