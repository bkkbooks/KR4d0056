front:
  text: 宛陵先生集卷第三十五
  hash: sha256:8a59eb30ff4fb39e1b4687a1d943d05f4bae893a87dbe686d580a0376e6a972e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_035-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和正仲賦楊兵部吳興五題雨過見虹明長橋欲映城牎間晴氣入空際晝凉生有扇徒看畫無冰自覺淸人知太守姓不减漢公名淸風樓在昔有佳句故人如逺來競生吳客袵不上楚王臺稍拂清樽動時吹翠帟開長安在何處水鳥望中廻明月樓霅霅前溪白蒼蒼後嶺巍人疑槎上客星合蚌中暉影轉䦨干逈盃行漏鼓稀只知誇粉黛不向桂邊歸碧瀾堂虛雲臨滉漾橋勢對隆穹環珮佳人去汀洲翠帶空橘舩過砌下蘭棟起雲中欲問芳菲地吳王一廢宮逍遙堂江東有賢守好客似春申自構杏梁地不生珠履塵樂章思季子後俊得吳均寢卧在其下知君學至人依韻和行之都官芭蕉詩看取有心常不展亦知隨分坼佳葩無端大葉映蓮幕却笑菖蒲罕見花促織札札草間鳴促促機上聲織女夜中起明河簷外橫一絲不入杼踈宻工未精豈知天孫巧衣脫六銖輕人間唯貴重暗蟲休催成吳仲庶殿院寄示與吕冲之馬仲涂唱和詩六篇邀予次韻焉次韻被命岀城共汎三騘忽岀乗楚艘直氣突兀知吳濤大都智勇皆世豪橫身破浪親戰舠廻舷受箭誰畏曹猛士心伏寒生毛風聲鶴淚傳九臯何用寶刀稱孟勞右持酒盃左持螯功成各慕前人高不言大享烹太牢下與尺鷃翔於嵩依韻游陳留禪寺後池共逢香刹住萬景筆頭堆池水蛟龍盡汀洲鴈鵠來逺游情莫落去國意徘徊舟子休􅣠鼓王程不爾催次韻晚泊雎陽日下繡衣客江南燕尾艎跡雖同蠲退心不假犀涼簷國旌旄去包原苑囿荒臨堤一懷古柳上見微陽汴渠我實山野人不識經濟宜聞歌汴渠勞謾綴汴渠詩汴水源本清隨分黃河枝濁流方巳盛清派不可推天王居大梁龍舉雲必隨設無通舟航百貨當陸馳人間牛騾驢定應無完皮苟欲東南蘇要省聚歛爲兵衛詎能削乃須雄京師今來雖太平盡罷未是時願循祖宗規勿益羣息之譬竭兩川賦豈由此水施縱有三峽下率皆麤冗資慎莫尤汴渠非渠取膏脂次韻臨淮感事楚舸高帆未可開滿帆風暴作隂雷聖文亹亹傷漂溺世路紛紛自徃來浮磬猶聞傳激越沉妖不見鎻淵囘連陂鼃黽鳴無數安得周官爲灑灰次韻夜過新開湖憶二御共泛岀舟湖渺渺月白絶纎氛已見水如鑑莫生波上雲獨征河慕侶冷酌不知醺露下清吟乆同心本愛君答宣城張主簿遺鴉山茶次其韻昔觀唐人詩茶韻鴉山嘉鴉㗸茶子生遂同山名鴉重以初槍旗采之穿煙霞江南雖盛産處處無此茶纎嫩如雀舌煎烹比露芽競收青蒻焙不重漉酒紗顧渚亦頗近蒙頂來以遐䨇井鷹掇爪建溪春剥葩日鑄弄香美天目猶稻麻吳人與越人各各相闘夸傳買費金帛愛貪無夷華丼苦不一致精麤還有差至珍非貴多爲贈勿言些如何煩縣僚忽遺及我家雪貯䨇砂罌詩琢無玉瑕文字搜怪竒難於抱長虵明珠滿𥿄上剰畜不爲奢玩乆手生胝窺乆眼生花嘗聞茗消肉應亦可破瘕飮啜氣覺淸賞重歎復嗟歎嗟旣不足吟誦又豈加我今實强爲君莫笑我耶送寧國軍宰崔寺丞移臨安六月畏嶺險乃陟川程迂遙看雲中鴈不亂江上鳬魚網離飛鴻我邑望何殊鱗方懷其剖鳥反值以刳爲言等王民豈限楚與吳是維見戀慕作詩贈路隅辯疑贈獻甫一客逢吠狗無箠制狗狂一客叱狗吠一客言狗良良狗豈妄吠好言巳莫詳言乃仁之趍叱乃義所當趍仁不顧義非是助狗猖吾今不疑仁仁義嗟何妨盗儒其衣乃儒服其說乃墨夷天生物一本今爾二本爲爾忍不塟親委以飽狐貍吾心則孟子不聽爾矢辭宣城宰郭仲文遺林檎右軍好佳果墨帖求林檎君今忽持贈知有逸少心宻枝傳應逺朱頰映巳深不愁炎暑劇幸同玉漿斟自和陶公種五柳華氏戲五禽逹性與養生共得古人心佳果能御暑致之意何深河朔存故事助飮莫憚斟送王克憲奉職之彭澤折柳贈子行况聞彭澤去將過五株下可與青青助渭城人唱罷羌管愁吹處江上定多閑䟱隂就箕踞寄潘歙州伯㳟我貧性愛酒有酒無錢沽新安走牙兵六月至我廬手中持尺題肩上擔瓦壺高山度青天救此愁腸枯開之聊傾樽渴肺如澆酥醉來欲學李白騎鯨魚又思阮籍跨蹇驢上溪無徤鱗下嶺無壯駒憶君南望空長吁再寄歙州潘伯恭青山截天去古路蔽雲中不有行人至安知與郡通高樓雖窈窕遠樹已溟濛今日勞君問衡門一老翁依韻和永叔澄心堂𥿄答劉原甫退之昔負天下才掃掩衆說猶除埃張籍盧同闘新怪最稱東野爲竒瑰當時辭人固不少漫費𥿄扎磨松煤歐陽今與韓相似海水浩浩山嵬嵬石君蘇君比盧籍以我擬郊嗟困摧公之此心實扶助更後有力誰論哉禁林晚入接俊彥一出古𥿄還相哀曼卿子美人不識昔嘗唫唱同樽罍因之作詩答原甫文字駚穩如刀裁怪其有𥿄不寄我如此岀語亦善詼徃年公贈兩大軸于今愛惜不輙開是時有詩述本末值公再入居蘭臺崇文庫書作總目未暇綴韻酬草萊前者京師競分買罄竭舊府歸鄒枚自慙把筆粗成字安可逺與鍾王陪文高墨妙公第一宜用此𥿄傳將來依韻酬永叔示予銀杏去年我何有鴨脚贈逺人人將比鵝毛貴多不貴珍雖少未爲貴亦以知我貧至交不變舊佳果幸及新窮坑我易滿分餉猶奉親計料失廣大瑣屑且沉淪何用報珠玉千里來慇懃依韻酬永叔再示前歲守廩京城西有如勾踐巢㑹稽引盃嘗膽未雪耻怒蛙起揖當涔蹄海天白日蔽光影霹靂一過收雲霓九臯澄明鶴翅濕欲暮刷羽聲嘶嘶客來東方美鬚鬛夜光岀袖行無迷授予照眼巳希世自顧臭辢猶萍虀文章製作比善塑物象變怪一以泥泥雖各用有巧拙巧之高絶非由梯又聞東夷蹈水底騎頸直踞通天犀曼卿子美摟入室似使二嫂治朕棲舜歸在牀不可得此實素分非能齊而今我獨向田里秋稼巳熟烹黃雞自傾白酒坐溪上誰念徃日無粱稊隣邦或有寄嘉釀瓦罌土缶盛玻瓈昨喜得書書滿𥿄官尊職大憐我睽怪我書亂苦簡畧疲駑豈敢攀駿驪貴賤交情古來有胷中不欲置畛畦世間百事猒著意但願無病年壽躋田園未多亦粗給兒女况足資提擕終當去問綿上叟自與野老月下犂池州蕭相樓復所建樓中九華峰天削水蒼玉公圭何參差來雲自䏈續我思唐蕭家八人居宰録瑀嵩華復俛傲真遘朱欄幾廢興下視寒江曲吳侯來爲邦百事無窘束新之以登臨風月詠玩足安得黃鵠翼一舉遺世俗雜興苦楝樹青鵓鴣啄鹽土鳴嗚嗚老鴉㘅茶子爭噪落嶺隅不覺茶滿山漁利入江湖鹽由鵓鴣起茶由老鴉趍誘以觸禁網二鳥誰與誅東家月吐明西家犬爭吠玉兎在中天曾何競窺穢姮娥雖夜行莫比淫奔廢呶呶籬下音胡不鈐其喙夢後寄歐陽永叔不趂常叅乆安眠向舊溪五更千里夢殘月一城雞適徃言猶是浮生理可齊山王今巳貴肯聽竹禽啼送王著作赴西京壽安翔向去作西畿令當趨大尹庭閒㝷前代跡淨掃古槐㕔未慣餐周粟還應憶楚萍但逢花木處知我昔常經答了素上人用其韻予心每淡泊世路多變詐梟鳴與鵩怪何用思彈射空山雖夜行猛虎終不怕功名未逢時壯士且出跨七尺無競軀市人應亦訝有香知害身抉臍見窮麝一朝珠出淵百金未酬價爾㝷逺公去挈鉢廬峯下我趨仁義急不解如陶謝送通判黃國博入浙西風半空鳴且嚎吳天點破吳鴻高東溪車馬走送客白露衰蘭輕若毛客當西歸乃東去爲何欲及八月十五夜觀洪濤洗蕩生前邑邑不平氣付與滄海之水隨滔滔却來廣陵願相見拍手大笑傾新醪一飮一石無一錢莫管寒近脫弊袍脫袍准酒不惜醉天意未必凍我曹烏琢棗樹頭陽烏饑啄棗破紅遶地青蠅老青蠅雨濕驚不飛殘棗入泥人不掃西風落盡鳥亦歸晉客齒黃終懊惱眞上人因送毛令傷足復傷冷陶令歸時逺公送石苔秋雨歩遲遲凌霄花在古松上也笑向人人不知聞道山中岀入稀偶來溪上笑談微野雲不管田袍薄寒逼瘦膚相伴歸潘歙州怪予遂行與黃君同路黃先游浙矣依韻酬寄未識潘岳貌巳知潘岳名去年改藩屏暫此解佩纓一見意巳合談笑僕屢更豈唯文學冨况亦論事精溪邊昔欲罷屑屑秋雨零于今又聞蟬重起悲凉情作詩逺見招值我將西行譬彼矯翼鳥革然顧侣鳴蒼山不可陟空入江上舲黃君雖云約同泛明日自訪柳惲汀寒儒所向多不成或西或東車馬驚高樓登望酸目晴欲觀弄濤仍膾鯨新安太守空相迎舉手謝君江水淸潘歙州寄𥿄三百畨石硯一枚永叔新詩笑原父不將澄心𥿄寄予澄心𥿄出新安郡臘月𫾣冰滑有餘潘侯不獨能致𥿄羅紋細硯鐫龍尾墨花磨碧涵䑕鬚玉方舞盤虵與虺其𥿄如彼硯如此窮儒有之應瞰鬼八月七日始見白髭一莖昔見白髭驚今見白髭喜人將拔去之我獨不然耳拔之旣更生留之何所耻白日儻日拔日拔詎能巳黑壯不爲貴白衰不爲鄙道德保於中任從髭髪齒送僧了素游廬山平生愛廬山夢寢不可去江上饒賈船偶來看巳飫釋子言南㳺徘徊瞻瀑布月飛金熨斗光宛陵先生集卷第三十五宛陵先生集目録卷第三十五和吳興五題和行之芭蕉促織吳仲庶邀和六篇和答宣城張主簿送崔寺丞辨疑贈獻甫盗儒宣城郭宰遺林檎自和送王奉職之彭澤寄潘歙州伯恭再寄潘歙州和永叔答原甫依韻酬永叔依韻酬永叔再示池州蕭相樓雜興夢後寄永叔送王著作赴壽安次答了素上人送黃通判入浙烏啄棗眞上人因送傷足和酬潘歙州潘歙州寄𥿄并硯始見白髭送了素游廬山目録終
