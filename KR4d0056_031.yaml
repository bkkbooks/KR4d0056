  text: 宛陵先生集卷第三十一
  hash: sha256:e1cace5b9598c27177881f83aad270b83ea378dfe103264749ac7081ea8122d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_031-1a}
body:
  text: 宋宛陵梅尭臣聖俞著杜挺之贈端溪圓硯雪壓古寺深中有卧病客訪之語乆淸饑馬齧庭栢桉頭蠻溪硯其狀若圓璧指此欲爲贈而將助吟席非意予敢貪旣拒頗不懌大岀楮中有素許當自擇强持慰勤心歸以示朋戚哂曰豈其然爲汲寒泉滌滌彼僞餙物𥿄乾見頑石淸晨走髯奴無猒願求易拜賜遂如初明月懷吞蝕微分鸜目瑩尙漬墨花碧詞荅謂我愚悔復料巳逆明日未央朝執手笑啞啞吳冲卿示和韓持國詩一卷輙以爲謝葉公所好者熟巳識頭角一日眞物來駭汗沛且渥我初見韓子蜿蜒噴雷雹子復蛟龍文氣象不可捉畏懷但驚顧得與前事較新息重修孔子廟記新息古邑也自漢以來幾因亂而孔子之廟歲享不絶于今雖邑宰有賢否祀典繫國家也儻不賢屋隳不葺有矣祀其廢諸慶曆七年清河張君伸爲是邑始勤扵治民謹扵條約恪扵事上旣而民信訟且簡乃修孔子祠及祭器子未知君之果學耶學而果知道耶以斯舉則君似有本者學者未必信奉如之嗚呼孔子之道與天地乆與日月昭一郡一邑之廟不足以光顯厥德報厥功也略究爲郡邑之人少誦其書長就其藝遂得其禄忍負不爲一岀口之勞完其廟至使瓦墮簷風雨壞桶甓缺階塵昏像犬豕穴墻垣徃來其間哉新之無是患庻幾賢巳然則苟因爲利廣爾宮俾不肖有說非予望扵君也况邑隷蔡守吳公輔臣大儒名重天下聞君能是得不樂耶予思昔忝邑時見邑多不本朝廷祭法徃徃用巫祝扵傍曰牛馬其肥癘疫其銷榖麥其豐瀆悖爲甚予旣革之君觀有若是者當改爲以從著式云范景仁席中賦莆萄朱盤何纍纍紫乳封霜厚今爲馬谷繁昔釀梁州酒乃知西土珍漢使傳應乆夜聽鄰家唱夜中未成寐鄰歌聞所稀想像朱唇動髣髴梁塵飛悞節應偷笑竊聽起披衣披衣曲巳终窓月存餘暉宋次道得廣南金橘爲餉且有詩因和酬越橘如金丸爛然巳盈篋誰傳嶺外信尚帶霜前葉莫嫌道路遠得與樽爼接主人無吝心懷歸予敢輙李廷老席上送韓持國歸許昌得早字馬蹄踐霜華逰客歸何早重裘不畏寒况復非遠道誰言未顧期登第鬢如葆解裝喜可知月下金壺倒送韓持國曰予非才敏乃與世寡㳺三四洛陽友過半已成丘晚節五六人文行皆潔修韓氏棣蕚盛扵我爲薫蕕君比衆最篤我唱君非酬昔我竹軒下𬒳窓風颼飀君時不猒過逍遥談未休頗爲俗士憎恬不防吝尤邇來我還都君亦辭舊州舊州君所隱安得此乆畱雪晴命駕歸使我生悲愁誰見潩水上定更不驚鷗遲月遲月月巳上淸光在高木未能照我庭團團隔東屋風笛旣殊岀塞聲還非江上聽夜吹送悠揚高樓月方逈霜鍾昔向寒溪卧遠寺撞白雲今也趨早朝殘月馬上聞鳴琴雖傳古人聲不識古人意古人今巳遠悲哉廣陵思和曹光道詠直廬屏中六鶴漢家爲瑞雙黄鵠只道飛翻太液池不似雲屏六畵鶴帝宮深處有人知晚歸聞韓子華見訪門外多車騎後迹亂前蹤誰識此來過塵蹄重復重歸有野僕言恨不故人逢豈無肴酒設所向乖所從未能一徃見懶拙其必容送丹陽新守李國愽歸洪州蔡水冬不枯唯愁夜氷結歸船及暖下窮臘未飛雪淮頴地漸偏川上雲常泄幾日接春波南風楚江徹拜親懷郡章予慕嗟才劣食薺世羞食薺貧食薺我所甘適見採薺人自出國門南土蠧瘦鐡刀霜亂青竹籃携持入凍池挑以根葉參手龜不自飽食此尙可慙肥羔朱尾魚腥羶徒爾貪甘陵亂甘陵兵亂百物灰火光屬天聲如雷雷聲三日屋瓦摧殺人不問嬰與孩守官迸走蔵浮埃後日稍稍官軍來圍城幾匝如重鋂萬甲雪色停皚皚孰敢專輙但取裁黄土始堅難速頺夜飮席上賦松子風松有霜子吹落幽人庭幽人畏狼籍日掃岀􅑐扄誰將稱遠物乃信渉滄溟送李審言殿丞歸河陽大河冬合時上可馳車馬歸子從橋安黄流在氷下况命使扵家其美世爲寡是宜飭以行慰此懷慕者送王宗說寺丞歸南京晏歲欲飛雪滿天含凍雲犯寒單騎速獵吹紫裘薫庭鵲還先喜池鴻去始聞公應問貧賤善說莫如君李審言將歸河陽值雪遺金波酒朔吹卷天吼遠郊無鳥飛忽驚開戸白昨夜打窓微閭巷我方懶關山君獨歸翻能寄醇酎爲此解寒威對雪憶徃歲錢塘西湖訪林逋三首昔乗野艇向湖上泊岸去㝷高士𥘉折竹壓籬曾礙過却穿松下到茅廬旋燒枯栗衣猶濕去愛峰前有徑開日暮更寒歸欲懶無端撩亂入船來樵童野犬迎人後山葛棠梨案酒時不畏尖風吹入牗更教牀畔覔䲭夷元日朝萬國諸侯振玉珂踏雲朝㑹雪初過欲聞鳯管天邊度數聽雞人樓上歌放仗旌旗方偃亞廻頭宮闕更嵯峨謬陪王屬曾何補泛泛慙同上下波荅祖擇之遺新羅墨海上老松苑霹靂燒瘦龍胡人犀皮膠團煤烟膏濃色奪陽爲翅來渉溟渤重君獲乃爲贈我謬蟲鳥蹤且作異土玩不愧西域笻對殘雪懷歐陽永叔窮臘一尺雪跨春氣逾嚴童僕苦病瘃庭戸無與杴日消夜復凍霰積泥相醃懶岀獨懷遠何由寄江㠶寄題時上人碧雲堂望望佳人來未來雲巳暮當時千里恨不獨看雲故何此啓虛堂定知吟秀句還㑹古人心古人非特賦和宋中道元夕二首結山當衢靣九門華燈滿國月半昏春泥踏盡㳺人䌓鳴蹕下天歌吹喧深坊靜曲走車轅爭前闘盛亡卑尊靚妝麗服何柔温交觀互視各吐吞磨肩一過難乆存眼尾獲笑迷精魂貂裘比比王侯孫夜䦨鞍馬相馳奔春風來解吹殘雪燈燭迎陽萬戸燃竟看䌓星在平地不妨明月滿中天赭袍巳向端門御僊曲初聞法部傳車馬不閒通曙色康莊時見拾珠鈿李國愽遺浙薑建茗吳薑漬吳糟越茗苞越蘀咀辛聊案杯啜味可奴酪但拜故人貺何言爲物薄我心易厭足不比塡溝壑送臨江胥令初從桃源還却向竟陵去今作中州官山水不曾飫且當傳竹枝莫學乗籃轝雲木杜䳌時千嵓響行處寄題滁州醉翁亭瑯琊谷口泉分流漾山翠使君愛泉清每來泉上醉醉纓濯潺湲醉吟異憔悴日暮使君歸野老紛紛至但留山鳥啼與伴松間吹借問結廬何使君㳺息地借問醉者何使君閒適意借問鐫者何使君自爲記使君能若此吾詩不言刺戊子正月二十六日夜夢自我再婚來二年不入夢昨宵見顔色中夕生悲痛暗燈露微明寂寂照梁棟無端打窓雪更被狂風送賜緋魚蹉跎四十七腰間始懸魚茜袍雖可貴髪短齒巳踈兒女眼未識競來牽人裾不知外朝衆君恩慙有餘和答韓子華餉子魚南方海物難具名子魚珍美無與并完鱗全乙異臭腥素鹽漬曝生花輕其頭戢戢筠篋盈出自通印時所評遠渉川陸來都城親賓交遺巳見情食指甞動吾竊驚果獲異味亦足明和答韓奉禮餉荔枝韓盛人所希四海饋名物韓復未踈予分珍曾不一莆陽荔子乾皺殻紅釘宻存甘尚可嘉本味固巳失遙思海樹䌓帶露摘初日安得穆王駿能置萬里疾閏正月二日夜張氏納婦太素子婚姻貴及時周有標梅詩雪後花將發人歸室且宜坐中傳漏鼓戸外轉星旗環佩遙聞出當脩廟見儀酌别謝通微判官兼懷歐陽永叔識君童稚時而今君齒壯不見二十年顏貌巳非向親戚多零落欲語還悲愴更問平生交乆從滁水上君又滁水歸寄音傾桂釀儻復二十年吾焉保無恙和永叔郡齋聞百舌響舌能令百鳥羞聽時丹杏發山郵春雲不定雨來急濕翅蒼茫高樹頭送陶太博通判廣信軍平時易水頭不復起邊愁壯士去來乆寒波空自流臨塘移鷺羽隔戌見氊裘半似江南美軍和賸宴㳺荅王太祝卷整朝廻泥塗不可岀饑馬倦僕驅之頑閉門獨與古人語黄卷未終聞扣關賢哉公族肯來顧詩䄂大篇令我刪珠光玉瑩絶瑕纇强欲指擿徒羞顏自同培塿最淺狹安得與子論丘山雨賦春雨之至兮風呵而雲導在上爲膏在塗爲淖被末漸本潤萬物者歟施及天下不收報者歟入波而隨流因積而成潦專好而失道者歟壞瓦漏屋蒸菌出木過而爲酷者歟朝使人愁夜使鬼哭迷而不知復者歟將吿之雨雨無聽也將告之天天且夐也窮居知命是何病也噫送張太博通判袁州君非身尤謫南州南方尚鬼其俗媮虵爲鄰虎爲陬丹茅苦竹深幽幽邑人祠鬼拜古樹竹杯一仰來烹牛牛死齧戄常不幸誰得禁止專鋤鉤借曰未信君且徃民將語怪君聽不仰山頭有行舟依韻和宋中道雨夜暗驚料峭寒春雪兼春雨知勝早朝人閒眠不開戸丘壑豈無容泥塗還自取誰吟何遜詩不覺逢逢鼓讀裴如晦萬里集書其後君自萬里廻遂成萬里集其詩二百篇文字必已立定應侔前人未嘗有蹈襲古溪蠻鐡刀岀塜土花澁誰將飾以玉鐔上光熠熠宋子序其端精悍孰鉗摯搜新造空蒙俗眼不得入示予要賦之短戈慙後執見胥平叔歷君門兮九重雲黕黕兮欲雨隱翠幕兮觀予心眷眷兮不語宣麻彬美下一國曾無相印酬莫驚除拜峻自是戰功優壯士頗知勇諸儒方貴謀淮西封亦薄裴度死生羞朧月夜晴𥘉見月雲薄未分明高樹尚無影遠鴻時有聲下階嫌履濕閉戸認苔生寂寂墻陰暝更長巳漸傾兵太平無戰陣漢卒乆生驕金甲不曾擐犀弓應自調嗟爲燎原火終作覆巢梟若使威刑立三軍豈敢囂泥一夜添春雨中衢長舊泥屐粘憂折齒馬滑畏顛啼去啄從江鶴相呼任竹雞朝來放朝請始與逸人齊聞韓仲文使歸傳道使車廻柳條黄未開曉寒非絶漠春色近章臺名馬北方至賔鴻南國來明朝齋祓見天子始稱才未晴未晴初止雨蒸潤尚侵衣缺月如羞岀荒雲不肯歸杏花朱欲綻梅蕚雪將稀遠鴈來何急衝風濕翅飛夜陰月色明還暗雲寒散復濃古堂移魍魉積霧合蛟龍濕菌飛螢岀蒼苔上朽重獨吟嗟向老氣澁覺偏慵夜晴新晴月正明頻聽夜烏驚未向高枝穩時爲繞樹聲群飛自紛泊衆鳥不屏營躁靜扵焉見誰能度物情古鑑古鑑得荒塜土花全未磨背菱尖尚在鼻獸角微訛月暗蝦䗫蝕塵昏魍魉過但令光彩發表裏是山河槖駞鳴駞岀西域衘尾自連連漢驛凌雲去胡人踏雪牽常時識風候過磧辨沙泉老覺肉封側猶蒙錦帕鮮李庭老許遺結絲勒帛紉絲作長帶正勝茱茰紋冉冉仍垂紼􅢹􅢹自有薫鮮華非稱我脩飾未如君曾不日來取賢哉知禮云貧生甘類原憲死不學陶朱但樂詩書在未憂鍾鼎無耻隨波上下難免鬼歔歈陋巷曲肱者終朝還似愚行僧風衣何揭揭有若瓠葉翻塵土不遠去白雲蔵石門宛陵先生集卷第三十一宛陵先生集目録卷第三十一杜挺之贈端現謝冲卿示持國詩卷重修孔子廟記席中賦莆萄夜聽鄰家唱和次道金橘送韓持國歸許昌送韓持國遲月風笛霜鍾鳴琴和光道屏中六鶴聞子華見訪送丹陽宰李國愽食薺甘陵亂夜飮席上賦松子送李殿丞歸河陽送王寺丞歸南京李審言學士遺金波酒對雪憶訪林逋元日朝荅祖擇之遺墨對殘雪懷永叔和中道元夕寄題碧雲堂李國愽遺薑茗送臨江胥令寄題滁州醉翁亭夜夢賜緋魚和荅韓子華餉子魚和荅韓奉禮餉荔枝張氏納婦酌别謝判官兼懷永叔京師延慶曆八年春盡夏五月楚州道中和永叔聞百舌送陶太博廣信倅荅王太祝卷雨賦送張太愽袁州倅和宋中道夜雨書裴如晦集後見胥平叔宣麻朧月兵泥聞韓仲文使歸未晴夜陰夜晴古鑑橐駞庭老許遺結絲勒帛貧行僧目録終
