  text: 宛陵先生集卷第三十一
  hash: sha256:e1cace5b9598c27177881f83aad270b83ea378dfe103264749ac7081ea8122d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_031-1a}
body:
  text: 宋宛陵梅堯臣聖俞著杜挺之贈端溪圓硯雪壓古寺深中有卧病客訪之語久淸飢馬齧庭柏桉頭蠻溪硯其狀若圓璧指此欲為贈而將助吟席非意豫敢貪既拒頗不懌大出楮中有素許當自擇強持慰勤心歸以示朋戚哂曰豈其然為汲寒泉滌滌彼偽飾物𥿄乾見頑石淸晨走髯奴無猒願求易拜賜遂如初明月懷吞蝕微分鸜目瑩尚漬墨花碧詞答謂我愚悔復料巳逆明日未央朝執手笑啞啞吳沖卿示和韓持國詩一卷輒以為謝葉公所好者熟巳識頭角一日真物來駭汗沛且渥我初見韓子蜿蜒噴雷雹子復蛟龍文氣象不可捉畏懷但驚顧得與前事較新息重修孔子廟記新息古邑也自漢以來幾因亂而孔子之廟歲享不絶于今雖邑宰有賢否祀典繫國家也儻不賢屋隳不葺有矣祀其廢諸慶曆七年清河張君伸為是邑始勤于治民謹于條約恪于事上既而民信訟且簡乃修孔子祠及祭器子未知君之果學耶學而果知道耶以斯舉則君似有本者學者未必信奉如之嗚呼孔子之道與天地久與日月昭一郡一邑之廟不足以光顯厥德報厥功也略究為郡邑之人少誦其書長就其藝遂得其祿忍負不為一出口之勞完其廟至使瓦墮簷風雨壞桶甓缺階塵昏像犬豕穴墻垣往來其間哉新之無是患庶幾賢巳然則苟因為利廣爾宮俾不肖有説非豫望于君也况邑隸蔡守吳公輔臣大儒名重天下聞君能是得不樂耶豫思昔忝邑時見邑多不本朝廷祭法往往用巫祝于傍曰牛馬其肥癘疫其銷榖麥其豐瀆悖為甚豫既革之君觀有若是者當改為以從著式云范景仁席中賦莆萄朱盤何纍纍紫乳封霜厚今為馬谷繁昔釀梁州酒乃知西土珍漢使傳應久夜聽鄰家唱夜中未成寐鄰歌聞所稀想像朱唇動髣佛梁塵飛誤節應偷笑竊聽起披衣披衣曲巳終窗月存餘暉宋次道得廣南金橘為餉且有詩因和酬越橘如金丸爛然巳盈篋誰傳嶺外信尚帶霜前葉莫嫌道路遠得與樽爼接主人無吝心懷歸豫敢輒李廷老席上送韓持國歸許昌得早字馬蹄踐霜華逰客歸何早重裘不畏寒况復非遠道誰言未顧期登第鬢如葆解裝喜可知月下金壺倒送韓持國曰豫非才敏乃與世寡遊三四洛陽友過半已成丘晚節五六人文行皆潔修韓氏棣蕚盛于我為薰蕕君比衆最篤我唱君非酬昔我竹軒下𬒳窗風颼飀君時不猒過逍遙談未休頗為俗士憎恬不防吝尤邇來我還都君亦辭舊州舊州君所隱安得此久留雪晴命駕歸使我生悲愁誰見潩水上定更不驚鷗遲月遲月月巳上淸光在高木未能照我庭團團隔東屋風笛既殊出塞聲還非江上聽夜吹送悠揚高樓月方逈霜鍾昔向寒溪卧遠寺撞白雲今也趨早朝殘月馬上聞鳴琴雖傳古人聲不識古人意古人今巳遠悲哉廣陵思和曹光道詠直廬屏中六鶴漢家為瑞雙黃鵠只道飛翻太液池不似雲屏六畫鶴帝宮深處有人知晚歸聞韓子華見訪門外多車騎後迹亂前蹤誰識此來過塵蹄重復重歸有野僕言恨不故人逢豈無肴酒設所向乖所從未能一往見懶拙其必容送丹陽新守李國博歸洪州蔡水冬不枯唯愁夜氷結歸船及暖下窮臘未飛雪淮頴地漸偏川上雲常泄幾日接春波南風楚江徹拜親懷郡章豫慕嗟才劣食薺世羞食薺貧食薺我所甘適見採薺人自出國門南土蠧瘦鐡刀霜亂青竹籃携持入凍池挑以根葉參手龜不自飽食此尚可慙肥羔朱尾魚腥羶徒爾貪甘陵亂甘陵兵亂百物灰火光屬天聲如雷雷聲三日屋瓦摧殺人不問嬰與孩守官迸走藏浮埃後日稍稍官軍來圍城幾匝如重鋂萬甲雪色停皚皚孰敢專輒但取裁黃土始堅難速頺夜飮席上賦松子風松有霜子吹落幽人庭幽人畏狼籍日掃出􅑐扄誰將稱遠物乃信涉滄溟送李審言殿丞歸河陽大河冬合時上可馳車馬歸子從橋安黃流在氷下况命使于家其美世為寡是宜飭以行慰此懷慕者送王宗説寺丞歸南京晏歲欲飛雪滿天含凍雲犯寒單騎速獵吹紫裘薰庭鵲還先喜池鴻去始聞公應問貧賤善説莫如君李審言將歸河陽值雪遺金波酒朔吹卷天吼遠郊無鳥飛忽驚開戶白昨夜打窗微閭巷我方懶關山君獨歸翻能寄醇酎為此解寒威對雪憶往歲錢塘西湖訪林逋三首昔乘野艇向湖上泊岸去尋高士𥘉折竹壓籬曾礙過却穿松下到茅廬旋燒枯栗衣猶濕去愛峰前有徑開日暮更寒歸欲懶無端撩亂入船來樵童野犬迎人後山葛棠梨案酒時不畏尖風吹入牗更教牀畔覔鴟夷元日朝萬國諸侯振玉珂踏雲朝會雪初過欲聞鳯管天邊度數聽雞人樓上歌放仗旌旗方偃亞回頭宮闕更嵯峨謬陪王屬曾何補泛泛慙同上下波答祖擇之遺新羅墨海上老松苑霹靂燒瘦龍胡人犀皮膠團煤煙膏濃色奪陽為翅來涉溟渤重君獲乃為贈我謬蟲鳥蹤且作異土玩不愧西域笻對殘雪懷歐陽永叔窮臘一尺雪跨春氣逾嚴童僕苦病瘃庭戶無與杴日消夜復凍霰積泥相醃懶出獨懷遠何由寄江帆寄題時上人碧雲堂望望佳人來未來雲巳暮當時千里恨不獨看雲故何此啓虛堂定知吟秀句還會古人心古人非特賦和宋中道元夕二首結山當衢靣九門華燈滿國月半昏春泥踏盡遊人繁鳴蹕下天歌吹喧深坊靜曲走車轅爭前鬪盛亡卑尊靚妝麗服何柔溫交觀互視各吐吞磨肩一過難久存眼尾獲笑迷精魂貂裘比比王侯孫夜闌鞍馬相馳奔春風來解吹殘雪燈燭迎陽萬戶燃竟看繁星在平地不妨明月滿中天赭袍巳向端門御仙曲初聞法部傳車馬不間通曙色康莊時見拾珠鈿李國博遺浙薑建茗吳薑漬吳糟越茗苞越蘀咀辛聊案杯啜味可奴酪但拜故人貺何言為物薄我心易厭足不比填溝壑送臨江胥令初從桃源還却向竟陵去今作中州官山水不曾飫且當傳竹枝莫學乘籃輿雲木杜鵑時千嵓響行處寄題滁州醉翁亭琅琊谷口泉分流漾山翠使君愛泉清每來泉上醉醉纓濯潺湲醉吟異憔悴日暮使君歸野老紛紛至但留山鳥啼與伴松間吹借問結廬何使君遊息地借問醉者何使君間適意借問鐫者何使君自為記使君能若此吾詩不言刺戊子正月二十六日夜夢自我再婚來二年不入夢昨宵見顔色中夕生悲痛暗燈露微明寂寂照梁棟無端打窗雪更被狂風送賜緋魚蹉跎四十七腰間始懸魚茜袍雖可貴髮短齒巳踈兒女眼未識競來牽人裾不知外朝衆君恩慙有餘和答韓子華餉子魚南方海物難具名子魚珍美無與并完鱗全乙異臭腥素鹽漬曝生花輕其頭戢戢筠篋盈出自通印時所評遠涉川陸來都城親賓交遺巳見情食指嘗動吾竊驚果獲異味亦足明和答韓奉禮餉荔枝韓盛人所希四海饋名物韓復未踈豫分珍曾不一莆陽荔子乾皺殼紅釘密存甘尚可嘉本味固巳失遙思海樹繁帶露摘初日安得穆王駿能置萬里疾閏正月二日夜張氏納婦太素子婚姻貴及時周有標梅詩雪後花將發人歸室且宜坐中傳漏鼓戶外轉星旗環佩遙聞出當修廟見儀酌别謝通微判官兼懷歐陽永叔識君童稚時而今君齒壯不見二十年顏貌巳非向親戚多零落欲語還悲愴更問平生交久從滁水上君又滁水歸寄音傾桂釀儻復二十年吾焉保無恙和永叔郡齋聞百舌響舌能令百鳥羞聽時丹杏發山郵春雲不定雨來急濕翅蒼茫高樹頭送陶太博通判廣信軍平時易水頭不復起邊愁壯士去來久寒波空自流臨塘移鷺羽隔戌見氊裘半似江南美軍和賸宴遊答王太祝卷整朝回泥塗不可出飢馬倦僕驅之頑閉門獨與古人語黃卷未終聞扣關賢哉公族肯來顧詩袖大篇令我刪珠光玉瑩絶瑕纇強欲指擲徒羞顏自同培塿最淺狹安得與子論丘山雨賦春雨之至兮風呵而雲導在上為膏在塗為淖被末漸本潤萬物者歟施及天下不收報者歟入波而隨流因積而成潦專好而失道者歟壞瓦漏屋蒸菌出木過而為酷者歟朝使人愁夜使鬼哭迷而不知復者歟將告之雨雨無聽也將告之天天且敻也窮居知命是何病也噫送張太博通判袁州君非身尤謫南州南方尚鬼其俗偷蛇為鄰虎為陬丹茅苦竹深幽幽邑人祠鬼拜古樹竹杯一仰來烹牛牛死齧戄常不幸誰得禁止專鋤鉤借曰未信君且往民將語怪君聽不仰山頭有行舟依韻和宋中道雨夜暗驚料峭寒春雪兼春雨知勝早朝人間眠不開戶丘壑豈無容泥塗還自取誰吟何遜詩不覺逢逢鼓讀裴如晦萬里集書其後君自萬里回遂成萬里集其詩二百篇文字必已立定應侔前人未嘗有蹈襲古溪蠻鐡刀出塜土花澀誰將飾以玉鐔上光熠熠宋子序其端精悍孰鉗摯搜新造空蒙俗眼不得入示豫要賦之短戈慙後執見胥平叔歷君門兮九重雲黕黕兮欲雨隱翠幕兮觀豫心眷眷兮不語宣麻彬美下一國曾無相印酬莫驚除拜峻自是戰功優壯士頗知勇諸儒方貴謀淮西封亦薄裴度死生羞朧月夜晴𥘉見月雲薄未分明高樹尚無影遠鴻時有聲下階嫌履濕閉戶認苔生寂寂墻陰暝更長巳漸傾兵太平無戰陳漢卒久生驕金甲不曾擐犀弓應自調嗟為燎原火終作覆巢梟若使威刑立三軍豈敢囂泥一夜添春雨中衢長舊泥屐粘憂折齒馬滑畏顛啼去啄從江鶴相呼任竹雞朝來放朝請始與逸人齊聞韓仲文使歸傳道使車回柳條黃未開曉寒非絶漠春色近章臺名馬北方至賔鴻南國來明朝齋祓見天子始稱才未晴未晴初止雨蒸潤尚侵衣缺月如羞出荒雲不肯歸杏花朱欲綻梅蕚雪將稀遠鴈來何急衝風濕翅飛夜陰月色明還暗雲寒散復濃古堂移魍魎積霧合蛟龍濕菌飛螢出蒼苔上朽重獨吟嗟向老氣澀覺偏慵夜晴新晴月正明頻聽夜烏驚未向高枝穩時為繞樹聲群飛自紛泊衆鳥不屏營躁靜于焉見誰能度物情古鑑古鑑得荒塜土花全未磨背菱尖尚在鼻獸角微訛月暗蝦蟆蝕塵昏魍魎過但令光彩發表裏是山河槖駝鳴駝出西域銜尾自連連漢驛凌雲去胡人踏雪牽常時識風候過磧辨沙泉老覺肉封側猶蒙錦帕鮮李庭老許遺結絲勒帛紉絲作長帶正勝茱茰紋冉冉仍垂紼􅢹􅢹自有薰鮮華非稱我修飾未如君曾不日來取賢哉知禮云貧生甘類原憲死不學陶朱但樂詩書在未憂鍾鼎無耻隨波上下難免鬼歔歈陋巷曲肱者終朝還似愚行僧風衣何揭揭有若瓠葉翻塵土不遠去白雲藏石門宛陵先生集卷第三十一宛陵先生集目録卷第三十一杜挺之贈端現謝沖卿示持國詩卷重修孔子廟記席中賦莆萄夜聽鄰家唱和次道金橘送韓持國歸許昌送韓持國遲月風笛霜鍾鳴琴和光道屏中六鶴聞子華見訪送丹陽宰李國博食薺甘陵亂夜飮席上賦松子送李殿丞歸河陽送王寺丞歸南京李審言學士遺金波酒對雪憶訪林逋元日朝答祖擇之遺墨對殘雪懷永叔和中道元夕寄題碧雲堂李國博遺薑茗送臨江胥令寄題滁州醉翁亭夜夢賜緋魚和答韓子華餉子魚和答韓奉禮餉荔枝張氏納婦酌别謝判官兼懷永叔京師延慶曆八年春盡夏五月楚州道中和永叔聞百舌送陶太博廣信倅答王太祝卷雨賦送張太博袁州倅和宋中道夜雨書裴如晦集後見胥平叔宣麻朧月兵泥聞韓仲文使歸未晴夜陰夜晴古鑑橐駝庭老許遺結絲勒帛貧行僧目録終
