  - {type: variant, offset: 5024, length: 334, content: 自遭兵火殘編斷簡靡有全者幸郡教官有善本余樂聞而應之曰昔龎叅爲漢陽太守郡人任棠有竒節叅到先候之棠不與言但以薤一本水一盂置戸屏前抱兒伏於戸下叅思其微㫖曰水欲吾清拔薤欲吾擊強宗抱兒當戸欲吾開門恤孤率而行之漢陽大治余殿此邦之初學官諸生以學校爲言今客又以聖俞梅公詩集爲言客其吾之任棠也與聖俞公以詩聞於當世寔此邦之前哲客其欲予先庠序之教而借梅文以爲諭余固淺陋雖不足以發揚幽光敢不率行或庶幾乎如漢陽之治也乃命學官董其事鏤板旣成請序於余余豈敢辭聖俞公之詩簡古純粹華而不綺清而不癯涵泳於仁義之流出入於詩書之府而其工歐陽文忠公巳序於集首此不復道姑敘鏤板之由云爾紹興十年上元日檢校少傅保信軍節度使知宣州軍州事兼管内勸農營田使新安郡開國公食邑五千二百戸食實封二千一百戸汪伯彥後序宛陵先生集卷第, WYG: 巻}
