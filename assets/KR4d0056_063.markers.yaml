  - {type: variant, offset: 5331, length: 145, content: 風度此豈汲汲於聲利者心畫正爾豈特坐詩窮耶又龔嘯去浮靡之習超然於昆體極弊之際存古淡之道卓然於諸大家未起之先此所以爲梅都官詩也當聲名文物之盛有歐公爲之依歸而歐公收拾人才識拔於科舉之外者於先生與老泉可謂不遺餘力矣雅道相與輝映千古猶計官資而曰不遇是孰爲有遇乎尚論其世誦其詩讀其書必知其人者始足以語此, WYG: 廬陵楊士奇題}
