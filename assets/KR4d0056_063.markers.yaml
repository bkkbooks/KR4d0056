  - {type: variant, offset: 3124, length: 756, content: 衆皆少銳老則不翁獨辛苦不能休惜無來者人名遒貴人憐公青兩眸吹嘘可使高岑樓坐令隱約不見收空能乞錢助饙餾疑此有物司諸幽栖栖孔孟葬魯鄒後始卓落稱軻丘聖賢與命相楯矛勢欲強逹仍無由詩人况又多窮愁李杜亦不爲公侯公窺窮厄以身投坎軻坐老當誰尤吁嗟豈卽非善謀虎豹雖死皮終留飄然載䘮下隂溝粉書軸幅懸無旒高堂萬里哀白頭東望使我商聲謳又我得聖俞詩於身亦何有名字託文編他年知不朽我得聖俞詩於身果何如留爲子孫寶勝有千金珠謁墓詩宣城縣丞南郡滕珂百年詩老卧空山猶憶當時語帶酸嬴得兒童喚夫子可憐名位秪都官手編新史唐文備骨立殘碑漢籕漫落日牛羊上丘隴草埋翁仲獨峩冠宛陵城南柏山寺行到西廂見舊祠人物欲觀嘉祐老銘文空有醉翁辭銀章粉墨誰舒卷金薤琳琅自陸離毎見河豚起春岸永懷風致細哦詩又寧國守廬陵文天祥滄滄宛水陽鬱鬱都官墳喬松拱道周縁塋茁芳蓀古時北邙歎白楊邈游魂大雅獨不墜脩名照乾坤再拜墳上士躧履揖諸孫握手慨以慷而有典刑存渥洼生騏騮荆山產璵璠悠哉清渭流眷言葆其源又監察御史張經歐公去巳乆誰爲柏山愁白髪詩千首蒼煙土一丘諸孫時拜掃過客獨遲留寂寞僧窻晚春溪水自流又按察副使盧摯一上高齋憶謝公雲間江樹有無中詩家政有都官宅腸斷荒山落葉風又憲司經歷真定靳汝弼宋有梅夫子靈鳯朝陽鳴文章炳星日當時照東京歐陽期並轡朋軰俱名卿事業何顯著滿腹儲太平思之不得見但恨遲我生陵谷變遷後薄宦來宣城儒素藹鄕里雲仍亦賢英幸因休澣日下馬拜荒塋栢山得其高雙溪得其清二者能永乆延公千古名又寧國路經歷劉瑀昔聞夫子名今始拜其墓栢山寺古碑斷橫三尺荒墳儼如故稻溝流水聲且哀老樹號風悲更怒詩僊巳去二百載壞垣空走狸與兎嗚呼再奠一盃酒澘然回首西山暮又寧國路同知阮麟翁嘉祐微言絕重經二百年殘詩留斷石荒壠入平田山鶴夜應怨河豚春又鮮邦人說夫子寒食寺門前祭宛陵先生文維淳祐二年歲在壬寅某月某日朔朝散大夫顯謨閤待制知寧國軍府, WYG: ''}
