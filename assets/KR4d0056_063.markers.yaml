  - {type: variant, offset: 2351, length: 210, content: 判官監永濟倉國子監直講累官至尚書都官貟外郞嘗奏其所撰唐載二十六卷多補正舊史闕謬乃命編脩唐書書成未奏而卒享年五十有九曾祖諱超祖諱邈皆不仕父諱讓太子中舍致仕贈職方郞中母曰僊游縣太君束氏又曰清河縣太君張氏初娶謝氏封南陽縣君再娶刁氏封渤海縣君改恩平縣君子男五人曰増曰墀曰坰曰龜兒一早卒女二人長適太廟齋郞薛通次尚㓜聖俞學長於毛氏詩爲小傳二十卷其文集四十卷注孫子十三篇余嘗論其詩曰世謂詩人少逹而多窮盖非詩能窮人殆窮者而後工也聖俞以爲, WYG: 使}
