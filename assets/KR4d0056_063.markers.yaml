  - {type: variant, offset: 4205, length: 390, content: 公亦與翁而上下公仕于何如鮎上竹生遇昭陵官同鄭谷使詩遂窮人則三百篇之作者將其身之俱不淑又劉朔齋嗚呼名位之不可兼得也乆矣然得位者榮身一時得名者流芳千載以公之文學行義雖仕不稱德而自嘉祐至今踰二百年矣天下之言詩人者必曰聖俞國人之誦所尊敬者必曰宛陵先生是則天之所以厚公者固在此而不在彼也震孫少嘗竊誦公之詩今幸守公之邦式公之墓悲其亭之乆廢而烝甞無所乃卽故址而改作焉表以石刻繚以垣墻而封植其宰木迨茲考成乃率僚寀釃酒一酹庶幾懷賢尚德之意精爽如在尚歆顧之題干越亭送君石秘校詩後閻復南昌一尉老西都文采風流接聖俞詩好見稱歐永叔書工不減蔡君謨洞庭鴈過風生葦干越峯青斗戞湖細讀粉箋當日詠終篇無字不驪珠又張斯立宛陵梅夫子才名冠當世歐蘇與並驅時稱天下士哲人去巳乆手澤見英氣可慕不可攀悠悠千古意行義魯臧孫流芳垂後裔今遇叔章君箕裘元不墜又貢奎詩還二百年來作身死三千里外官知已若論歐永叔退之猶自媿郊寒又張伯淳聖俞先生, WYG: ''}
