  - {type: variant, offset: 1539, length: 809, content: 悖於理而後能垂世而行逺此年譜之所爲作也張君師魯叔輿世爲宛陵人著宛陵先生年譜余得而讀之愛其詞約而事備論覈而理明其多以歐陽子之書爲據依巳爲得書之體至於辯魏㤗邵博之厚誣使先生可作亦自喜後之人爲能知巳者且尤有補於世教也抑又考之宋嘉祐二年詔脩取士法務求平澹典要之文文忠公知貢舉而先生爲試官於是得人之盛若眉山蘇氏南豐曾氏橫渠張氏河南程氏皆出乎其間不惟文章復乎古作而道學之傳上承孔孟然則謂爲文忠公與先生之功非耶吾鄕周丞相定著文忠公年譜學者賴之此書當與之並行宛陵文獻於是足徴矣叔輿以余誦習歐陽子之書屬叙而刻之不獲辭謝爲識卷末云至元二年丁丑八月旣望序廬陵劉性墓誌銘嘉祐五年京師大疫四月乙亥聖俞得疾卧城東汴陽坊明日朝之賢士大夫徃問疾者騶呼屬路不絕城東之人市者廢行者不得徃來咸驚顧相語曰玆坊所居大人誰耶何致客之多也居八日癸未聖俞卒於是賢士大夫又走弔哭如前日益多而其尤親且舊者相與聚而謀其後事自丞相以下皆有以􅉠䘏其家粤六月甲申其孤增載其柩南歸以明年正月丁丑葬于宣城雙羊山聖俞字也其名堯臣姓梅氏宣州宣城人也自其家世頗能詩而從父詢以仕顯至聖俞遂以詩聞自武夫貴戚童兒野叟皆能道其名字雖妄愚人不能知詩義者直曰此世所貴也吾能得之用以自矜故求者日踵門而聖俞詩遂行天下其初喜爲清麗閑肆平淡乆則涵演深逺間亦琢剥以出怪巧然氣完力餘益老以勁其應於人者多故辭非一體至於他文章皆可喜非如唐諸子號詩人者僻固而狹陋也聖俞爲人仁厚樂易未嘗忤於物至其窮愁感憤有所罵譏笑謔一發於詩然用以爲驩而不怨懟可謂君子者也初在河南王文康公見其文嘆曰二百年無此作矣其後大臣屢薦宜在舘閣嘗一召試賜進士岀身餘輙不報嘉祐元年翰林學士趙槩等十餘人列言于朝曰梅堯臣經行脩明願得留與國子諸生講論道德作爲雅頌以歌詠聖化乃得國子監直講三年冬祫于太廟御史中丞韓綘言天子且親祠當更制樂章以薦祖考惟梅堯臣爲宜亦不報聖俞初以從父䕃補太廟齋郞歷桐城河南河陽三縣主簿以德興縣令知建德縣又知襄城縣監湖州監稅簽署忠武鎭安兩, WYG: 傅保信}
