  - {type: variant, offset: 999, length: 450, content: 徒自足以相樂如此乃今知周公之冨貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其冨貴而夫子所與共貧賤者皆天下之賢才則亦足以樂乎此矣軾七八歲時始知讀書聞今天下有歐陽公者其爲人如古孟軻韓愈之徒而又有梅公者從之游而與之上下其議論其後益壯始能讀其文詞想見其爲人意其飄然脫去世俗之樂而自樂其樂也方學爲對偶聲律之文求升斗之禄自度無以進見於諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之誠不自意獲在第二旣而聞之人執事愛其文以爲有孟軻之風而歐陽公亦以其能不爲世俗之文也而取是以在此非左右爲之先容非親舊爲之請屬而向之十餘年間聞其名而不得見者一朝爲知巳退而思之人不可以苟冨貴亦不可以徒貧賤有大賢而爲其徒則亦足恃矣苟其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人盖優哉游哉可以卒歲執事名滿天下而位不過五品其容色温而不怒其文章寛厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉宛陵先生年譜序宛陵梅先生以道德文學發而爲詩變晩唐卑陋之習啓盛宋和平之音有功於斯文甚大, WYG: 工}
