  - {type: line-break, offset: 83, content: '', id: KR4d0056_SBCK_063-1a07}
  - {type: variant, offset: 83, length: 14, content: 俯仰上下然卒不混者其文章才美, WYG: 出入於詩書}
  - {type: variant, offset: 98, length: 899, content: 光氣亦有輝然而特見者矣然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通邑大都據其㑹就其名而擇其精焉爾洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟余方據是而擇之獨得於梅君聖俞其所謂輝然特見而精者耶聖俞志高而行㓗氣秀而色和嶄然獨出於衆人中初爲河南主簿以親嫌移佐河陽常喜與洛之士游故因吏事而至於此余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古寺則必相與吟哦其間始則歡然以相得終則暢然覺乎薰蒸浸漬之爲益也故乆而不猒旣而以吏事訖言歸余且惜其去又想夫濳乎下邑混於庸庸然所謂能先羣物而貴於世者特其異而巳則光氣之輝然者豈能掩之哉注孫子序歐陽脩世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書本於兵兵之術非一而以不窮爲竒冝其說者之多也凡人之用智有短長其設施各異故或膠其說於偏見然無出所謂三家者三家之法皥最後其說時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能通春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董吕諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將岀兵千里毎坐計勝敗授以成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略盖惜其所得自爲一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而伯諸侯夫使武自用其書止於強伯及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於巳見是以注者雖多而少當也獨吾友聖俞不然嘗評武之書曰此戰國相傾之說也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次第而注者汨之或失其意乃自爲注凡膠於偏見者皆抉去傅以巳意而發之然後武之說不汨而明吾知此書當與三家並傳而後世取其說者徃徃於吾聖俞多焉聖俞爲人謹質温恭衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房爲壯夫何異上梅直講書蘇軾子瞻某官執事每讀詩至鴟鴞讀書至君奭常切悲周公之不遇及見孔子厄於陳蔡之間而絃歌之聲不絕顏淵仲由之徒相與答問夫子曰匪兕匪虎率彼曠野吾道非邪又何爲至此顏淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾爲爾宰夫天下雖不能容, WYG: 府}
