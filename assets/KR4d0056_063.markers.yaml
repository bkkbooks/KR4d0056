  - {type: variant, offset: 46, length: 6, content: 夫蜃蛤珉石混, WYG: 言但以薤一本水一盂置戸屏前抱兒伏於戸下參思其微旨曰水欲吾清拔薤欲吾擊強宗抱兒當戸欲吾開門恤孤率}
