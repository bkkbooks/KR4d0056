  - {type: variant, offset: 2562, length: 417, content: 言銘曰不戚其窮不困其鳴不躓于艱不履于傾養其和平以發厥聲震越渾鍠衆聽以驚以揚其清以播其英以成其名以告諸㝠感二子歐陽脩黃河一千年一清岐山鳯鳥不再鳴自從蘇梅二子死天地寂然收雷聲百蟲坏戸不啓蟄萬木逢春不發萌豈無百鳥解言語喧啾終日無人聽二子精思極搜抉天地鬼神無遁情及其放筆聘豪俊筆下萬物生光榮古人謂此覷天巧命短疑爲天公憎昔時李杜爭橫行麒麟鳯皇世所驚二物非能致太平湏時太平然後生開元天寶物盛極自此中原疲戰爭英雄白骨化黃土冨貴何止浮雲輕惟有文章爛日星氣凌山岳常崢嶸賢愚自古皆共盡突兀空留後世名蘇謂舜欽也哀挽詩歐陽脩昔逢詩老伊水頭青衫白馬渡伊流灘聲八節響石樓坐中辭氣凌淸秋一飮百琖不言休酒酣思逸語更遒河南丞相稱賢侯後車日載梅與鄒我年最少力方優明珠白璧相報投詩成希深擁鼻謳師魯卷舌藏戈矛三十年間如轉眸屈指十九歸山丘凋零所餘身百憂晩登玉墀侍珠旒詩老虀鹽太學愁乖離㑹合謂無由此㑹天幸非人謀頷鬚巳白齒根浮子年加我貌則不歡猶可強閑屢偷不覺歲月成淹留文章落筆動九, WYG: 宣}
