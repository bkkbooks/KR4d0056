  - {type: variant, offset: 5478, length: 186, content: 先生之鄕子孫在焉叔章暇日岀示真蹟使人歆慕無巳按尚書屯田貟外郞當是階官後遷都官耳卽元豐官制改後朝奉郞也國子監直講乃是職事官宋初巳置常選通經有實行者爲之宜歐公以爲公薦也書局編脩亦公辟云跋㑹慶堂記後汪澤民宛陵梅先生爲文以記㑹慶堂其奉先思孝如存之誠至矣歲乆石泐嗣孫致逺致和寔等具碑請余重書刻置堂上噫繼自今歲時禴烝百世一日則梅氏子孫之職釋子能固護棐栢如澄展之心則各盡其道矣尚朂之謹之, WYG: 集拾遺}
