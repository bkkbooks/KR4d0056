  - {type: variant, offset: 56, length: 0, content: '', WYG: 吾之任棠也與聖俞公以詩聞於當世寔此邦之前哲客其欲余}
  - {type: variant, offset: 57, length: 3, content: 膺美澤, WYG: 庠序}
  - {type: variant, offset: 61, length: 5, content: 氣輝然特見, WYG: 敎而借梅文以為諭余固淺陋雖不足以發揚幽光敢不率行或庶幾乎如漢陽之治也乃命學官董其事鏤版既成請序}
