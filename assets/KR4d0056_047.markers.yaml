  - {type: variant, offset: 3451, length: 273, content: 宛陵先生集目録卷第四十七觀邵不疑名畵懷杜挺之絕句五首李轉運示卷觀書書二客留別李學士過山陽智洪房淮隂侯淮上遇風宿洪澤泗州郡圃四照堂泗守剏北園和淮上相遇泗州觀唐氏書得千葉樓子芍藥併得酪及櫻桃阻淺挺之平甫來飲和表臣奎野亭和表臣先春亭和河南庾署西軒和表臣見贈和表臣聞諸友飲表臣惠蜀箋硯池和阻水見勉聞宣叔挺之圍棊五倩篇釋悶釋滯和憶竹園山寺和晨起見贈李秘丞遺川牋粉𥿄錢推官遺紗㡌和表臣惠醖閱表臣畫而飲寄送許待制知越王司封感懷赴表臣㑹呈挺之醉中和王平甫將解舟呈表臣答再和非意篇呈表臣和錢推官見寄答宣叔行舟相隔力漕篇呈王發運唐店寄錢推官徒歩訪李宣叔答高判官目録終, WYG: ''}
