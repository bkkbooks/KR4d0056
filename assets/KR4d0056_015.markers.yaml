  - {type: variant, offset: 3718, length: 400, content: 宛陵先生集目録卷第十五觀何君寶畵送任太博歸省送張學士知洪州觀楊之美畵李審言遺酒送邵郞中知潭州送楊叔恬送洪州倅何太博見賣瓠者和鄰幾景德避暑送趙諫議知徐州送邵戸曹隨侍哭韓舍人五首高平公挽歌三首歐陽郡太君挽歌和石昌言求筆䆳隱堂讀永叔撰薛雲衢碣和昌言蜀牋答松管送楊叔武廣南招安走筆戲邵興宗送李中舍宰南鄭送王察推之鄧州戲酬高貟外鯽魚送何學士知漢州和逹觀師聞蟬和杜相公謝蔡君謨茶和接花送石昌言學士書南事送吳都官還江南䆳隱堂讀永叔撰薛雲衢碣和昌言蜀牋答松管送楊叔武廣南招安走筆戲邵興宗送李中舍宰南鄭送王察推之鄧州戲酬高貟外鯽魚送何學士知漢州和逹觀師聞蟬和杜相公謝蔡君謨茶和接花送石昌言學士書南事送吳都官還江南馮子都詩并序赴庾直有懷采芡史氏南軒送陳脩撰和寄宣州廣敎文鑒師送陸學士㤗州倅送徐祕丞知梁州軍和秋夕對月馮子都詩并序赴庾直有懷采芡史氏南軒送陳脩撰和寄宣州廣敎文鑒師送陸學士㤗州倅送徐祕丞知梁州軍和秋夕對月目録終, WYG: ''}
