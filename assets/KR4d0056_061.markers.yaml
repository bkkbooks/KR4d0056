  - {type: variant, offset: 194, length: 1, content: 廼, WYG: 滿世間紀載精詳繼前史當時晦叔誦其文曰二百年未有此先生泰山北斗然管窺蠡測難為言我從聞孫見手澤定知家學有根源繭紙可腐石可泐世美自有不朽存又劉必大先生文章在青史先生勲名掲白日誰謂二百有餘年得見兩詩親翰筆花箋松煤色尚鮮元祐偉人如再出名器時來或可求家瑶世傳難可必叔章持此上天朝横斗髙風低少室又王士熈宛水留荒宅空山老栢株詩名唐正體經法漢先儒賢裔今重見髙風古亦無郎官為直講遺説辯精麤又汪澤民宋代文章梅與歐薦賢何不致公侯宛陵詩老名千載嘉祐郎官閟一丘調寫心聲諧寶瑟書存手澤粲銀鉤曽經干越琵琶尾愁絶西風鴈過秋跋前二詩苟宗道拜觀宛陵梅先生手書寄題干越亭送君石秘校尉河内之作詩律謹嚴楷法莊重蓋天禀仁厚樂易發見於心聲心畫自有不能掩者歐陽公謂氣完力餘}
