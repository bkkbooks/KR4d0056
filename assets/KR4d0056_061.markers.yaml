  - {type: variant, offset: 32, length: 4, content: 廼稱入室, WYG: 享年五十有九曽祖諱超祖諱邈皆不仕父諱讓太子中舍致仕贈職方郎中母曰僊游縣太君束氏又曰清河縣太君張氏初娶謝氏封南陽縣君再娶刁氏封渤海縣君改恩平縣君子男五人曰増曰墀曰坰曰龜児一早卒女二人長適太廟齋郎薛通次尚幼聖俞學長於毛氏詩為小傳二十巻其文集四十巻注孫子十三篇余嘗論其詩曰世謂詩人少達而多窮蓋非詩能窮人殆窮}
