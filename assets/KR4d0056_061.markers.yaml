  - {type: variant, offset: 166, length: 0, content: '', WYG: 為知言銘曰不戚其窮不困其鳴不躓于艱不履于傾養其和平以發厥聲震越渾鍠衆聽以驚以揚其清以播其英以成其名以告諸㝠感二子歐陽脩黄河一千年一清岐山鳳鳥不再鳴自從蘇梅二子死天地寂然收雷聲百蟲坏户不啟蟄萬木逢春不發萌豈無百鳥解言語喧啾終日無人聽二子精思極搜抉天地鬼神無遁情及其放筆騁豪俊筆下萬物生光榮古人謂此覻天巧命短疑為天公憎昔時李杜爭横行麒麟鳳凰世所驚二物非能致太平須時太平然後生開元天寶物盛極自此中原疲戰爭英雄白骨化黄土富貴何止浮雲輕惟有文章爛日星氣凌山岳常崢嶸賢愚自古皆共盡突兀空留後世名蘇謂舜欽也哀挽詩歐陽脩昔逢詩老伊水頭青衫白馬渡伊流灘聲八節響石樓坐中辭氣凌清秋一飲百琖不言休酒酣思逸語更遒河南丞相稱賢侯後車日載梅與鄒我年最少力方優明珠白璧相報投詩成希深擁鼻謳師魯巻舌藏戈矛三十年間如轉眸屈指十九歸山丘凋零所餘身百憂晩登玉墀侍珠旒詩老虀鹽太學愁乖離會合謂無由此會天幸非人謀頷鬚已白齒根浮子年加我貎則不歡猶可強閑屢偷不覺歲月成淹留文章落筆動九州釡甑過午無饙餾良時易失不早收篋櫝瓦礫遺琳璆薦賢轉石古所尤此事有職非吾羞命也難知理莫求名聲赫赫掩諸幽翩然素旐歸一舟送子有淚流如溝又王安石詩行於世先春秋國風變衰始栢舟文辭感激多所憂律吕尚可諧鳴球先王澤竭士已偷紛紛作者始可羞其聲與節急以浮真人當天施再流篤生梅公應時求頌歌文武功業優經竒緯麗散九州衆皆少銳老則不翁獨辛苦不能休惜無來者人名遒貴人憐公青兩眸吹噓可使髙岑樓坐令隱約不見收空能乞錢助饙餾疑此有物司諸幽栖栖孔孟葬魯鄒後始卓落稱軻丘聖賢與命相楯矛勢欲強達仍無由詩人况又多窮愁李杜亦不為公侯公窺窮厄以身投坎軻坐老當誰尤吁嗟豈即非善謀虎豹雖死皮終留飄然載䘮下隂溝粉書軸幅懸無旒髙堂萬里哀白頭東望使我商聲謳又我得聖俞詩於身亦何有名字託文編他年知不朽我得聖俞詩於身果何如留為子孫寶勝有千金珠謁墓詩滕珂百年詩老卧空山猶憶當時語帶酸贏得兒童喚夫子可憐名位祗都官手編新史唐文備骨立殘碑漢籕漫落日牛羊上丘隴草埋翁仲獨峩冠宛陵城南栢山寺行到西廂見舊祠人物欲觀嘉祐老銘文空有醉翁辭銀章粉墨誰舒巻金薤琳琅自陸離每見河豚起春岸永懷風致細哦詩又文天祥滄滄宛水陽鬱鬱都官墳喬松拱道周縁塋茁芳蓀古時北邙歎白楊邈游魂大雅獨不墜脩名照乾坤再拜墳上土躧履揖諸孫握手慨以慷而有典型存渥洼生騏騮荆山産嶼璠悠哉清渭流眷言葆其源又張經歐公去已乆誰為栢山愁白髪詩千首蒼烟土一丘諸孫時拜掃過客獨遲留寂寞僧窓晚春溪水自流又盧摯一上髙齋憶謝公雲間江樹有無中詩家政有都官宅腸斷荒山落葉風又靳汝弼宋有梅夫子靈鳳朝陽鳴文章炳星日當時照東京歐陽期並轡朋輩俱名卿事業何顯著滿腹儲太平思之不得見但恨遲我生陵谷變遷後薄宦來宣城儒素藹鄉里雲仍亦賢英幸因休澣日下馬拜荒塋栢山得其髙雙溪得其清二者能永乆延公千古名又劉瑀昔聞夫子名今始拜其墓栢山寺古碑斷横三尺荒墳儼如故稻溝流水聲且哀老樹號風悲更怒詩仙已去二百載壞垣空走狸與嗚呼更奠一盃酒澘然回首西山暮又阮麟翁嘉祐微言絶重經二百年殘詩留斷石荒壠入平田山鶴夜應怨河豚春又鮮邦人說夫子寒食寺門前祭宛陵先生文維淳祐二年歳在壬寅某月某日朔朝散大夫顯謨閣待制知寧國軍府事兼管内勸農營田使王遂等謹以清酌庶羞之奠致祭于故都官梅公宛陵先生之墓惟宋文章曰歐與蘇有梅夫子歐蘇之徒在漢去誕於唐棄諛八百餘年掃去朽枯如斵元氣變化百殊慶歴之盛上跨周虞顛倒奔走溢浚之都空餘翰墨一世楷模相厥寒泉在彼坤隅文氣貫天落日平蕪遂生雖晩此意中孚肅肅官僚陳其啜餔斯人逺矣不可呌呼文猶未墜其在兹乎尚饗維咸淳六年歳在庚午三月某日知寧國軍府事文天祥謹以清酌庶羞之奠致祭于先賢尚書都官宛陵先生梅公之墓而言曰大江西東實倡古文西則歐陽東則先生上追韓孟下啓蘇曽先生在天斯文有靈僕生也晚實在歐鄉天子有命來守公邦感時改火爰薦苾芳尚饗又文天祥視我廬陵夫子歐陽彰韓癉昆孕蘇育黄公於其間以}
