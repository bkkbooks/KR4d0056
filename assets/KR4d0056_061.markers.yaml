  - {type: variant, offset: 199, length: 0, content: '', WYG: 書詩兩章校其同時諸人若一軌轍又用筆作方闊法李西臺蔡端明然又陳儼宛陵公去世二百餘年今觀遺墨二詩猶旦暮遇之也或以為平淡或以為枯槁惟具眼能識之惟公生而卒以詩窮死然世愈逺而愈増重雖與日月爭光可也視當時烜赫者溘然泯黙不復知為何人相去蓋有間矣亦可謂一世之屈百世之信者歟寥寥遺響子其嗣之又李倜樊宗師苦心琢句非韓公不能見知於世梅都官之於歐陽公亦然何異世而同軌也耶仍孫奕芳持公干越亭并送}
