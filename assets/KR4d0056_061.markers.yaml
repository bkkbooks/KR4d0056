  - {type: variant, offset: 216, length: 3, content: 㠯金購, WYG: 又張與材聖俞詩名為歐蘇所重後之人不容復議矣獨翰墨見於世者少其八世孫叔章能珤藏之今觀其筆意瀟散有髙人逸士風度此豈汲汲於聲利者心畫正爾豈特坐詩窮耶又龔嘯去浮靡之習超然於昆體極弊之際存古淡之道卓然於諸大家未起之先此所以為梅都官詩也當聲名文物之盛有歐公為之依歸而歐公收拾人才識拔於科舉之外者於先生與老泉可謂不遺餘力矣雅道相與輝映千古猶計官資而曰不遇是孰為有遇乎尚論其世誦}
