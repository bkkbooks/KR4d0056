  - {type: variant, offset: 177, length: 0, content: '', WYG: 鮎上竹生遇昭陵官同鄭谷使詩遂窮人則三百篇之作者將其身之俱不淑又劉朔齋嗚呼名位之不可兼得也乆矣然得位者榮身一時得名者流芳千載以公之文學行義雖仕不稱德而自嘉祐至今踰二百年矣天下之言詩人者必曰聖俞國人之誦所尊敬者必曰宛陵先生是則天之所以厚公者固在此而不在彼也震孫少嘗竊誦公之詩今幸守公之邦式公之墓悲其亭之乆廢而烝嘗無所乃即故址而改作焉表以石刻繚以垣牆而封植其宰木迨兹考成乃率僚寀釃酒一酹庶幾懷賢尚徳之意精爽如在尚歆顧之題干越亭送君石祕校詩後閻復南昌一尉老西都文采風流接聖俞詩好見稱歐}
