  - {type: line-break, offset: 6, content: '', id: KR4d0056_SBCK_061-1a02}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 歐陽修至寶潛乎山川之幽而能先羣物以貴於世者負其有異而已故珠潛於泥玉潛於璞不與}
  - {type: variant, offset: 7, length: 1, content: 詩, WYG: 蜃蛤珉石混而棄者其先膺美澤之氣輝然特見於外也士固有濳乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才美之光氣亦有輝然而特見者矣然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通邑大都據其會就其名而擇其精焉爾洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟余方據是而擇之獨得於梅君聖俞其所謂輝然特見而精者耶聖俞志髙而行潔氣秀而色和嶄然獨出於衆人中初為河南主簿以親嫌移佐河陽常喜與洛之士游故因吏事而至於此余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古寺則必相與吟哦其間始則歡然以相得終則暢然覺乎薫蒸浸漬}
  - {type: page-break, offset: 7, content: '', id: KR4d0056_WYG_061-1b, image: WYG1099/WYG1099-0429d.png}
  - {type: page-break, offset: 7, content: '', id: KR4d0056_WYG_061-2a, image: WYG1099/WYG1099-0430a.png}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 益也故乆而不厭既而以吏事訖言歸余且惜其去又想夫潛乎下邑混於庸庸然所謂能先羣物而貴於世者特其異而已則光氣之輝然者豈能掩之哉注孫子序歐陽修世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書本於兵兵之術非一而以不窮為竒宜其説者之多也凡人之用智有短長其設施各異故或膠其説於偏見然無出所謂三家者三家之法皥最後其説時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能通春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董吕諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里每坐計勝敗授以成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略蓋惜其所得自為一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而伯諸侯夫使武自用其書止於強伯及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於巳見是以注者雖多而少當也獨吾友聖俞不然嘗評武之書曰此戰國相傾之説也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次第而注者汩之或失其意乃自為注凡膠於偏見者皆抉去傳以己意而發之然後武之説不汨而明吾知此書當與三家並傳而後世取其説者徃徃於吾聖俞多焉聖俞為人謹質温恭衣冠進趨𦕈然儒者也後世之視其書者與太史公疑張子房為壯夫何異上梅直講書蘇軾某官執事每讀詩至鴟鴞讀書至君奭常切悲周公之不遇及見孔子厄於陳蔡之間而絃歌之聲不絶顔淵仲由之徒相與答問夫子曰匪兕匪虎率彼曠野吾}
  - {type: page-break, offset: 10, content: '', id: KR4d0056_WYG_061-2b, image: WYG1099/WYG1099-0430b.png}
  - {type: page-break, offset: 10, content: '', id: KR4d0056_WYG_061-3a, image: WYG1099/WYG1099-0430c.png}
  - {type: page-break, offset: 10, content: '', id: KR4d0056_WYG_061-3b, image: WYG1099/WYG1099-0430d.png}
  - {type: page-break, offset: 10, content: '', id: KR4d0056_WYG_061-4a, image: WYG1099/WYG1099-0431a.png}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 非邪又何為至此顔淵曰夫子之道至}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子所與共貧賤者皆天下之賢才則亦足以樂乎此}
  - {type: variant, offset: 13, length: 1, content: 迄, WYG: 軾七八歳時始知讀書聞今天下有歐陽公者其為人如古孟軻韓愈之徒而又有梅公者從之游而與之}
  - {type: page-break, offset: 13, content: '', id: KR4d0056_WYG_061-4b, image: WYG1099/WYG1099-0431b.png}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 其議論其後益壯始能讀其文詞想見其為人意其飄然脫去世俗之樂而自樂其樂也方學為對偶聲律之文求升斗之禄自度無以進見於諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之誠不自意獲在第二既而聞之人執事愛其文以為有孟軻之風而歐陽公亦以其能不爲世俗之文也而取是以在此非左右為之先容非親舊為之請屬而向之十餘年間聞其名而不得見者一朝為知巳退而思之人不可以苟富貴亦不可以徒貧賤有大賢而為其徒則亦足恃矣苟其僥一時之幸從車騎}
  - {type: page-break, offset: 16, content: '', id: KR4d0056_WYG_061-5a, image: WYG1099/WYG1099-0431c.png}
  - {type: variant, offset: 17, length: 2, content: 千伯, WYG: 十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人蓋優哉游哉可以卒歳執事名滿天下而位不過五品其容色温而不怒其文章寛厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉宛陵先生年譜序宛陵梅先生以道徳文學發而為詩變晚唐卑陋之習啟盛宋和平之音有功於斯文甚大歐陽文忠公知之最深既題其詩稿又序其集又序其所注孫子又銘其墓而哀之以文蓋文忠公之知先生猶子房謂沛公為殆天授者是豈容贊一辭哉然昔之君子以言語文字為天下後}
  - {type: page-break, offset: 17, content: '', id: KR4d0056_WYG_061-5b, image: WYG1099/WYG1099-0431d.png}
  - {type: 'kr:newline', offset: 18, content: '

