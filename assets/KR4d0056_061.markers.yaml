  - {type: line-break, offset: 18, content: '', id: KR4d0056_SBCK_061-1a03}
  - {type: variant, offset: 20, length: 1, content: 伦, WYG: 所貴重}
  - {type: variant, offset: 22, length: 3, content: 競𧺫悉, WYG: 必其出處語黙之際無或少悖於理而後能垂世而行逺此年譜之所為作也張君師魯叔輿世為宛陵人著宛陵先}
  - {type: page-break, offset: 22, content: '', id: KR4d0056_WYG_061-6a, image: WYG1099/WYG1099-0432a.png}
  - {type: variant, offset: 23, length: 1, content: 𧺫, SBCK: 􅁸}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 年譜余得而讀之愛其詞約而事備論覈而理明其多以歐陽子之書為據依已為得書之體至於辯魏泰邵博之厚誣使先生可作亦自喜後之}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 為能知巳者且尤有補於世教也抑又考之宋嘉祐二年詔修取士法務求平澹典要之文文忠公知貢舉而先生為試官於是得人之盛若眉山蘇氏南豐曾氏横渠張氏河南程氏皆出乎其間不惟文章復乎古作而道學之傳上承孔孟然則謂為文忠公與先生之功非耶吾鄉周丞相定著文忠公年譜學者賴之此書當與之並行宛陵文獻於是足徴矣叔輿以余誦習歐陽子之書屬敘而刻之不獲辭謝為識巻末云至元二年丁丑八月既望序廬陵劉性墓誌銘嘉祐五年京師大疫四月乙亥聖俞得疾卧城東汴陽坊明日朝之賢士大夫徃問疾者騶呼屬路不絶城東之人市者廢行者不得徃來咸驚顧相語曰兹坊所居大人誰耶何致客之多也居八日癸未聖俞卒於是賢士大夫又走弔哭如前日益多而其尤親且舊者相與聚而謀其後事自丞相以下皆有以賻䘏其家粤六月甲申其孤増載其柩南歸以明年正月丁丑葬於宣城雙羊山聖俞字也其名堯臣姓梅氏宣州宣城人也自其家世頗能詩而從父詢以仕顯至聖俞遂以詩聞自武夫貴戚童兒野叟皆能道其名字雖妄愚人不能知詩義者直曰此世所貴也吾能得之用以自矜故求者日踵門而聖俞詩遂行天下其初喜為清麗閑肆平淡乆則涵演深逺間亦琢剥以出怪巧然氣完}
  - {type: page-break, offset: 27, content: '', id: KR4d0056_WYG_061-6b, image: WYG1099/WYG1099-0432b.png}
  - {type: page-break, offset: 27, content: '', id: KR4d0056_WYG_061-7a, image: WYG1099/WYG1099-0432c.png}
  - {type: page-break, offset: 27, content: '', id: KR4d0056_WYG_061-7b, image: WYG1099/WYG1099-0432d.png}
  - {type: variant, offset: 28, length: 3, content: 精詣之, WYG: 餘益老以勁其應於人者多故辭非一體至於他文章皆可喜非如唐諸子號詩人者僻固而狹陋也聖俞為人仁厚樂易未嘗忤於物至其窮愁感憤有所罵譏笑謔一發於詩然用以為驩而不怨懟可謂君子者也初在河南王文康公見其文嘆曰二百年無此作矣其後大臣屢薦宜在館閣嘗一召試賜進士出身餘輒不報嘉祐元年翰林學士趙槩等十餘人列言於朝曰梅堯臣經行修明願得留與國子諸生講論道徳作為雅頌以歌詠聖化乃得國子監直講三年冬祫于太廟御史中丞韓絳言天子且親祠當更制樂章以薦祖考惟梅堯臣為宜亦不報聖俞初以從父䕃補太廟齋郎歴桐城河南河陽三縣主簿以徳興縣令知建徳縣又知襄城縣監湖州監稅簽署忠武鎮安兩軍節度判官監永濟倉國子監直講累官至尚書都官貟外郎嘗奏其所撰唐載二十六巻多補正舊史闕謬乃命編修唐書書成未奏而}
  - {type: page-break, offset: 28, content: '', id: KR4d0056_WYG_061-8a, image: WYG1099/WYG1099-0433a.png}
