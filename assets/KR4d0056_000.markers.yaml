  - {type: variant, offset: 1248, length: 1530, content: 刻宛陵先生集後叙大中丞䑓宋公檄宣城刻梅􅚾官詩粤期鍥局告成扵執事者令竒方􅋿竊効役云眀興右文化洽豹變一峕上國之英簮茟而鳴盛中林之士結薻以揚芬煥若霞綺之亘雲空爛若春荑之薄鏡水嘉隆間蓋益稱彬郁焉曷嘗不掩材徃古矜妍異代㢤而觀采者卒亡逃扵反唇此其故殆且難言之􅚾官固宋人藉令今三尺子𧺫而譚詩猒宋人目不及瞬也顧攷􅚾官所為詩核事模情棊􅍌星寘啇音幽韵苦雨飄風使讀者宛肰其身􅍓而惻肰其心揺即無論止虖禮義要亦有概扵中非直尚輔頰之感無論汪洋乎江海要亦取義天山非直趂墟者供一朝之晬樸質堇存風雅未墜先民有言文章匿采匪盛世之徴􅋿尚輔頰而趂墟者其敝也夫善歌者使人㡭其聲而響必報之中丞公是舉也其意在斯矣竒方不侫間覆覧鑑宋事西北跳梁兵威日頓􅚾官著孫子有味乎權竒之指其朧月夜隂寄歐陽夷陵諸詠或蒿目而憂乎當世豈與彼平章月露流連光景者已㢤在昔輙以文士類掇春華不及䆋實将緩急非益是黯扵通方者爾中丞公文質並茂緼義風生誦其詩尚論其世是舉也其意者在斯乎意者其或在斯乎孝亷君一科謂竒方公部吏屬為殿如此語曰為黔之物必資乎墨狐裘羔袖令忱有媿色萬曆丙子季秋月吉直隷寧國府宣城縣知縣監利姜竒方譔刻宛陵先生集後終書梅聖俞詩藁後廬陵歐陽脩譔凢樂逹天地之和而與人之氣相接故其疾徐奮動可以感扵體歡愉惻愴可以察扵聲五聲单出扵金石不能自和也而工者和之然抱其噐知其聲莭其㢘肉而調其律吕如此者工之善也今指其噐以問于工曰彼簨者􅙇者堵而編執而列者何也彼必曰鼗皷鍾磬絲管于戚也又語其聲以問之曰彼清者濁者剛而奮柔而曼衍者或在郊或在廟堂之下而羅者何也彼必曰八音五聲六代之曲上者歌而下者舞也其聲噐名物皆可以數而對也然至于動盪血脉流通精神使人可以喜可以悲或歌或泣不知手足鼔舞之所以然問其何以感之者則雖有善工猶不知其所以然焉盖不可得而言也樂之道深矣故工之善者必得于心應于手而不可述之言也聼之善亦必得于心而㑹以意不可得而言也堯舜之時夔得之以和人神舞百獸三代春秋之際師㐮師曠州鳩之徒得之為樂官理國家知興亡周衰官失樂噐淪亡散之河海逾于百歲間未聞有得之者其天地人之和氣相接者既不得泄于金石疑其遂獨鍾扵人故其人之得者雖不可和于樂尚能謌之為詩古者登謌清廟太師掌之而諸矦之國亦各有詩以道其風土性情至扵投壼饗射必使工歌以逹其意而為賔樂盖詩者樂之苗裔與漢之蘇李魏之曺劉得其正始宋齊而下得其浮淫流佚唐之時子昻李杜沈宋王維之徒或得其淳古澹泊之聲或得其舒和髙暢之莭而孟郊賈島之徒又得其悲愁鬰堙之氣由是而下得者時有而不純焉今聖俞亦得之然其體長扵本人情状風物英華雅正變態百出哆兮其似春凄兮其似秋使人讀之可以喜可以悲陶暢酣適不知手足之将鼔舞也斯固得之深者邪其感人之至所謂與樂同其苗裔者邪余嘗問詩于聖俞其聲律之髙下文語之疵病可以指而告余也至其心之得者不可以言而告也余亦将以心得意㑹而未䏻至之者也聖俞乆在洛中其詩亦徃徃人皆有之今将吿歸余囙求其藁而冩之然夫前所謂心之所得者如伯牙鼔琴子期聼之不相語而意相知也余今得聖俞之稿猶伯牙之琴絃乎右宋都官貟外郎宣城梅堯臣聖俞宛陵集六十卷今宣城太守袁旭廷輔所重刻也何為刻之表先賢以儀後進者太守職也始宣城郡政乆弛袁君至殚志竭慮薙姦滌穢朞嵗之間横民以戢良民以妥脩舉學政爰興教化表章先賢風勵多士扵是脩都官之墳率學諸生行展謁之禮而詢求其文盖郡人莫或知者及訪都官之後始得此編遂刻以傳聖俞當仁宗朝與韓范當歐諸公㳺聖俞詩名特盛扵時最𥘉王文康公曙覽之歎曰二百年無此作矣而見知歐公尤深相與尤密時盖有擬歐梅扵韓孟者非宣城山川靈秀之所鍾歟今天下學士君子皆知聖俞為宣之傑出顧宣之人有不䏻知此袁君之心所不容巳也聖俞平生所著又有唐載廿六卷詩小傳廿卷注孫子十三篇又嘗編脩唐書此亦後来宣之人所當知也因并及之正統已未冬十一月乙已朔光祿大夫少師兵部尚書兼華盖殿大學士廬陵楊士竒題宣城尤廷弼刻, WYG: ''}
