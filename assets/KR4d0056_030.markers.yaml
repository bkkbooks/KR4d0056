  - {type: variant, offset: 3592, length: 309, content: 宛陵先生集目録卷第三十送李密學亳州送樊秀才歸安州和李密學見懷觀理𬞞哭尹師魯泛舟和持國荅持國示詩送李轉運移京東送庭老歸河陽詠雙杏和仲儀楸花目昬送韓太祝求醫賦紅雀持國遺食捫虱得蚤同道損逰西湖送上虞孫簿寄題金州處陰亭石榴七夕同諸韓晚逰西湖韓玉汝遺澄心𥿄和仲儀麝香和凌霄花聞玉汝宿城北夢過三陵詠扇送曼叔襄城尉送吳給事移淮西李密學寄亳州棗九月五日夢永叔尉氏南至京水及人脛宋平叔郊外見迓裴如晦赴河陽幕送子華拜掃送玉汝宰錢塘得曾鞏附永叔書追詠崔氏小園宋中道快予生女詠次道宅㯶櫚詠秤詠象子華邀賦和荅惠勤上人荅顯忠上人送韓仲文奉使送劉司勲奉使和永叔秋懷見寄同玉汝謁裴如晦詠黄木芙蓉二馬和許發運詠影寄題衢州萃賢亭荅楚僧智普和鴨雛有覩目錄终, WYG: ''}
