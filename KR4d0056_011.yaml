  text: 宛陵先生集卷第十一
  hash: sha256:cc8ff4b7e5987922b5a861e1fd3bcbce73cf7470e3f82a2bbb43b704c325c4fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_011-1a}
body:
  text: 宋宛陵梅堯臣聖俞著謁雙廟八月過宋都泊舟雙廟側永懷此忠良遺烈傳碑刻五位儼朝裾千年同血食當時多苟生貴爵曾誰識縱今有丘墳都巳荒荆棘古人非輕死於義實罕得英骨化埃塵令名同鳥翼飛翔出後世景慕無終極豈若目前榮未沒聲巳息西登孝王城王氣由邦國送弟禹臣赴官江南昔與子同歸夜向瓜洲泊持杯月正清遄水平如削爾來蘆岸深須防虎潛搏行行無朋友遇事自斟酌和永叔晉祠詩并州古來稱近胡山雄氣壯民足儲山根晉水發源處平若皎鑑潛決疏漸流漸急不可測以至㶁㶁鳴清渠豈惟俯可見毛髮况乃了了看龜魚下溉平田幾百頃稻苗䆉稏曾不枯興亡莫問隨水逺廟深草樹空扶踈伊君持節過其下愛此佳趣聊停車北望故城無舊物泱漭野色連丘墟巳向風前聽好鳥只畏落日聞蒼狐晉人須識漢使美冉冉青髯似緑蒲得李殿丞端州硯鮫龍所窟處其石美且堅蠻匠斫為硯漢官求費錢持歸向都邑爭乞如瓦磚豈識萬里險􅍝竊好事傳書謝師厚至爾來哭爾姑清淚滴塵几一聞在目言不謂今則死而猶意逺行所念當至止秋風忽助嗥萬木欲摧毀詠蘇子美庭中千葉菊樹子生與衆草生不與衆草榮彼皆春爭葩茲獨秋吐英千葉共一蕚百蒂共一莖幽亭聳扶踈獨本非搘撑吾友蘇子美有酒對自傾香隨青陵蝶色映黃金鶯昨日偶來過頗興陶令情豈敢復言詩君家有子卿新冬傷逝呈李殿丞惡老今逼衰孤寂仍足悲寒風一夜起曩事無不思手澤在故物默歷非故時夢寐猶平常反寤恨莫追人生苦情纍安得木石為賴有同舍郎相語強解頥送趙升卿之韶幕舟車歷盡險風物乃還君爼肉應多味虞韶不復聞林鳴異音鳥山冒欲晴雲若弔張丞相空祠舊近墳蘇子美竹軒和王勝之庭無十步廣有竹才百箇子時哦其間賓友或來和琴壼置子傍圖籍亦在左誰憐修修影只畏寒日過誰憐青青枝下有暗葉墮我期霰雪時來聽幽聲卧應當為設榻勿使賞心銼持以報主人此興不可破偶書寄蘇子美君詩壯且竒君筆工復妙二者世共寶一得亦難料我今或盈軸體逸思益峭有如秋空鷹氣壓城雀鷂又如飮巨鍾一舉不能釂既釂心巳醉顚倒視兩曜吾交有永叔徑正語多要嘗評吾二人放檢不同調其於文字間苦硬與惡少雖然趣尚殊握手幸相笑寄題洪州李氏涵虛閣耳熟滕閣美未為豫章遊近聞東湖上可見西山頭朝愛雲氣生暮數鳥行幽主人趣向逺登覽日不休父兄巳三人挂冠此遲留他年儻一往風物詠可周送蕭祕校比從江南來又從江南去孤舟隨鴈羣晚泊定何處霜橙可為虀冰鱠思下筯此興吾不知薄言聊所慕送李殿丞通判處州拜官將近親不畏千里險泝流上贛水石亂波驚颭舟人素已諳曲折就回閃豈虞失便利倚慣憂亦掩昔余從平流悸夢尚成魘今逢子方去青筰絲新染沙頭有堠吏惴立板方斂鴻鴈正來翔競看朱服儼古劒篇送蔡君謨自諫省出守福唐生銅夜夜鳴銼鐵未嘗缺主人久提擕何事贈離别借問豈酬恩請看鐔上血休慙補履功出處異施設雜興主人有十客共食一鼎珍一客不得食覆鼎傷衆賓雖云九客沮未足一客嗔古有弒君者羊羮為不均莫以天下士而比首陽人送逐客王勝之不及遂至屠兒原犯霜出國門送客客巳去猶意行未逺策馬過寒戍川長不見人沙沒前岡路始聞雲木深忽逢朱亥墓金鎚一報恩義烈垂竹素何須文學為寄語長沙傅送周仲章太博之巨野仲月霜氣嚴朝來厚如雪鴻鴈各南飛羽毛將恐折征途履以足侵骨寒於鐵得罪此為輕君恩大歡恱鄴中行武帝初起銅雀臺不又建閣延七子日日臺上羣烏飢峩峩七子宴且喜是時閣嚴人不通雖有層梯誰可履公幹才俊或欺事平視美人曾不起五官𥚹急猶且容意使忿怒如有鬼自茲不得為故人輸作左校濱於死其餘數子安可存紛然射去如流矢鳥烏聲樂臺轉高各自畢逋誇疐尾而今撫卷迹巳陳唯有漳河舊流水親郊前三日大慶殿雪中皇帝率羣臣發章聖五后册將郊先奉册拜立未央庭天表君心孝人驚曉雪零冕旒紛點綴劒佩濕晶熒曲蓋曾無用羣臣敢自寧爐煙靜齋幄井氣凍宫瓶明日來壇下中宵巳見星忠上人擕王生古硯誇余云是定州漢祖廟上瓦為之因作詩以答硯取漢廟瓦誰恤漢廟隳重古一如此吾今對之悲既寶若圭璧未知為用時讀後漢書列傳漢家誅黨人誰與李杜死死者有范滂其母為之喜喜死名愈彰生榮同犬豕異同吾聞聖賢心不限親與踈義殊目前乖道同異代俱堯舜及周孔千載趨一途盜跖誚孔氏弟子將黨歟跖自驅其衆日念殺不辜河濱捧土人海畔逐臭夫塞川豈量力同趣即爾徒爾既不自過反以此為紆蔡仲謀遺鯽魚十六尾余憶在襄城時獲此魚留以遲歐陽永叔昔嘗得圎鯽留待故人食今君逺贈之故人大河北欲膾無庖人欲寄無鳥翼放之巳不活烹煮費薪棘雜擬忽聞胡騎渡河水月魄夜脅隂貂寒獨侍金輿立城角龍蛇不展繞旗竿答中上人卷吹笛皆學龍吹笙皆學鳯又於笙笛間高下不相中得其精者稀得其粗者衆况於真出音千歲不復夢爾為學笙歟頗巳臻妙弄送蘇子美勇為江海行風波曾不懼但欲尋名山扁舟無定處南有鵬若梟嶮有石若鋸毒草見人搖短狐逢影怒不遐尚苦乖更逺饒瘴霧東土乃濱海蜃鼉仍可怖殼物怪瑣屑螺蜆固無數醎腥損齒牙日月復易飫二方既若此往矣無久駐竟當西北來醉酎炙肥羜夏不猒漿酪冬不猒雉兔勿言專口腹口腹人所務天台信竒偉石橋非坦步廬嶽趣最幽飢腸看瀑布此致雖為高實亦難久慕君行聽我言不聽到應悟晚歸聞李殿丞訪别言巳屢來不遇蕭條一陋巷頻日見馬蹄歸來稚子告有客云將暌始知君其南復歎我向西豈不懷念慕吾親書新齎曰吾五男子愛惜無不齊所要立門戶安用同犬雞齪齪守此客馴馴戀此棲二季留左右足以共挈擕身許逺就祿幸又奉阿􅭊今年還都下路喪子與妻囊罄厭外役進退類藩羝終當改江邑儻得致音題刁景純將之海陵與二三子送於都門外遂宿舟中明日留饌膾人言汴水駛奈何已冬乾蔡雖平且慢臘月行亦難唯聽夜冰合為君愁苦寒暫維青絲筰邀膾白玉盤行人反飫我於理殊未安所欣能自養不復道加餐寄洪州致仕李國博湖上悠然度幾春勇拋榮祿遂天真青蒲翠竹圍華屋白酒黃雞命里人果下有時乘小駟兒曹方見擁朱輪田園歲入千鍾美肯似疏家苦畏貧同謝師厚宿胥氏書齋聞鼠甚患之燈青人已眠飢鼠稍出穴掀翻盤盂響驚聒夢寐輟唯愁几硯撲又恐架書齧癡兒效貓鳴此計誠巳拙聞子美次道師厚登天清寺塔二三君少壯走上浮圖巔何為苦思我平步猶不前苟得從而登兩股應已攣復想下時險喘汗頭目旋不如且安坐休用窺雲煙謝師厚歸南陽效阮步兵一日復一朝一暮復一旦與子相經過少會不言散我心終未極歲月忽云晏嘶馬思長道孤鳥逐前伴駕言慕儔侶懷抱若冰炭南臨白水湄風雪振高岸意恐慈母念疾馳節已換解劒登北堂幼婦笑粲粲弊裘一以縫征塵一以浣而我客大梁衣垢自悲歎師厚明日歸南陽夜坐有懷明朝子當去我若雲失龍龍歸雲未歸索莫將安從半夜出戶望參畢已正中倐然變隂黑烈烈鳴窗風窗鳴不得寐擁被一悲翁永叔贈酒大門多竒醖一斗市錢千貧食尚不足欲飲將何緣豈能以口腹屈節事豪權閉戶飽於虀作詩湧如泉一日復一夕醒目常不眠窮臘忽可怪雙壼故人傳呼兒欲自酌瓦盞無完全其能饔甘脆而况侑夭妍却令情懷惡分與富貴偏收拾不復嘗排置屋角邊儻有嘉客至傾倒相與顚何暇問濃薄但覺窗扉旋誰識我為我賓主各頽然始得語且橫既醉論益堅曾不究世務間氣爭古先畢竟兩未決辨吻空流涎嗟我儒者飮聒耳無管絃雖云暫歡適終久還愁煎自甘不偶死寧慕金印懸願頻致此物勿恤瘡簷肩得山雨急雨射蒼壁濺林跳萬珠山根水壅壑漫竅若注壼范殿丞通判秦州天水出名馬多稱黃金羈正值羌已和邊草復離離乘肥固未失所藴不得施主人本燕客寧獨事書詩志尚功名間管樂猶一時去去勿復道礧落為男兒陳繹越州從事母夫人老母兄黜夫人從爾之會稽恐傷爾心不敢泣春岡細雨聞竹雞時亦藏淚未出臉奈何相與頭傾低誠知就祿非獲已應欲退耕無舊畦辛著作知西京永寧躍馬西畿令家塋在洛陽衣霑寒食雨花發故宫墻冷淡鳩鳴屋寬間水滿塘送君悲漸老空憶釣伊魴依韻和師厚别後寄吾與爾别未及旬吾家依舊甑生塵閉門不出將誰親自持介獨輕貨珍盤餐豈有醎酸辛苦吟輟寢昏繼晨夜光忽怪來何頻採拾若在滄浪垠和者彌寡唯陽春普淨院佛閣上孤鶻我新稅居見寺閣金碧照我破屋前目看閣上聚鳩鴿巢棲飮哺忘窮年雕簷畫壁屎汚遍以及像塑頭與肩寺僧不敢施彈射忽有蒼鶻張毒拳鴉鳴鵲噪鸜鵒呌怒鶻來比窺腥羶鶻心決烈不畏衆瞥碎一腦驚後先死鳥墮空未及地返翅下取如風旋獨當屋脊恣扯磔啄肉披肝腸棄捐老鴟無藝又狠怯盤飛欲近飢目穿逡巡鶻飽自飛去爭殘不辨烏與鳶羣兒指點路人笑我方吟憶秋江邊蜂春風無主撩亂時分羣養子各守脾爭掇花腴為蠟蜜年年共割不我稽俄逢主人若過慮畏爾有蠆成噬臍密將惡物毒爾族爾曾不得同醯雞王雖爾名爾何補造甘為利乃自取並遊並出慙羸駕康衢懶著鞭蹇驢能勝馬擘道去如煙何用嗟遲疾從來有後先所期皆一至我到爾應還寄宣州可真上人昭亭山色無纎塵昭亭潭氷見遊鱗長松碧篠入古寺石上高僧度幾春元夕同次道中道平叔如晦賦詩得間字金輿在閶闔簫吹滿人寰九陌行如晝千門夜不關星通河漢上珠亂里閭間誰與聯輕騎宵長月正間正月十五夜出回不出只愁感出遊將自寬貴賤依儔匹心復殊不歡漸老情易厭欲之意先闌却還見兒女不語鼻辛酸去年與母出學母施朱丹今母歸下泉垢靣衣少完念爾各尚幼藏淚不忍看推燈向壁卧肺腑百憂攢同次道遊相國寺買得翠玉罌一枚古寺老柏下叟貨翠玉罌獸足靣以立爪腹肩而平虛能一勺容色與藍水并我獨何為者忽見目以驚家無半鍾畜不吝百金輕都人莫識寶白日雙眼盲送惠勤上人遽告我行何所之東南爾土爾自知山水佛事不暇説去何速兮來何為公卿貴人見爾喜為爾買屋丐爾資王城幸可樂歲月野鶴終是思陂池去去雲霞不容侶却應來此如前時聞賣韭黃蓼甲百物凍未活初逢賣菜人乃知糞土暖能發萌芽春柔美已先薦陽和非不均芹根守天性憔悴澗之濱董著作嘗為參謀歸話西事子説頗驍勇築城收漢疆提兵無百騎偷路執生羌大將罪專輒舉軍皆感傷歸來出萬死羸馬亦摧藏戲寄師厚生女生男衆所喜生女衆所醜生男走四鄰生女各張口男大守詩書女大逐雞狗何時某氏郎堂上拜媪叟薛中舍宰聞喜秦人宦于秦百事順耳目山川我已踈風物子所熟維美行邁時親賓祖車轂空將離别心欲出無僮僕聯句附古木含清吹池上增曉涼余懷本逹曠謝少卿聯此傲羲皇孤鷗可與狎絳幽岸足以觴幸有彭澤酒堯臣便同永嘉堂潘生起為壽維王子齊陳章林端見新月衍草際聞寒螿照水螢影亂良臣拂筵蓼花香徘徊戀嘉境坐使歸興忘少卿希深洛中冬夕道話有懷善慧大士因探得江字韻聯句彼有上人者妙談心所降希深逹空知不二觀行本無雙聖俞久阻飄花席因思響雪窗希深社中雖得逺方外自非龐聖俞夢幻慙他劫風塵猒此邦希深終期親道樹何必憶重江聖俞希深本約遊西溪信馬不覺行過據鞍聯句有意訪西溪順途吟思迷及茲詢野老巳恨過芳蹊希深醉客但多興幽禽空自啼無由駐金勒林表日光低堯臣同希深馬上口占送九舅入京成親聯句之子洛中來芳樽喜暫開人誇阿連少吾愧士衡才希深丹闕鳯皇去清川鴻鴈回都門春色美相送思悠哉堯臣玉麈尾寄傅尉越石聯句齋中獨何物持之想見君惟茲玉麈尾信美而有文夫子善談道亹亹詞如雲在握昔同色傾坐今離羣絳况託懷袖好曾親蕙蘭薰常許助間放於焉探典墳既乃阻清燕復屈驅虻蚊自殊白團扇未畏秋葉紛堯臣風瑟聯句竅竹漏天風張絃擬嶧桐佳名從此得妙響未曾窮希深夜靜危臺上人間皎月中依依聽不足秋露滿蘭叢聖俞冬夕會飮聯句與君數夜飮唯恐酒盞空今我苦欲淺堯臣語志難此同陳編侑歡適謝景初間謔何魁雄婢子寒且倦堯臣主人哦不窮燈青屢結花景初煎響時鳴蟲穴鼠暗出沒堯臣風鴈高雍容冰霜覆瓦屋景初貂狐輸貴翁孤床乏暖質堯臣苦語有淡工咀嚼患炙小景初煨炮驚殼紅落蟾斜入竅堯臣逺漏微遞風醉心欺睡魄景初細書刺昏瞳吽呀聞爭犬哮吼猒啼􅐒撥火亂頳豆附炙雙彎弓乾果硬迸齒堯臣寒虀酸滿胸枯蛤擘無肉淡脯燒可饔語必造聖賢樂巳過鼓鍾𥿄窗幸未曙景初絮被令旋縫凍痺兩股鐵跑抓雙鬢蓬脬尿既懶溺裩虱唯欲烘器皿足缺齾捧執無天穠兒女寒不寢堯臣僮僕困欲瞢豈無貴冨徒笑此飢寒蹤丈夫固有負道義久巳充墨子不黔突齒輩且得封勉哉梅夫子塞者終自通景初問答送九舅席上作金鑿落希深問留贈行人須滿酌銀瓶况有宜城醪及取春風花照灼小屏風問希深座隔流塵素影融方牀六尺偃清晝慙無玉枕名通中玉蟾蜍希深問厠君筆硯誠有諸可愛亭亭寒月照瑩然四座凝冰壼金錯刀問希深連環交刃吹風毛美人贈我萬錢貴何必翦犀誇孟勞青雲梯問希深尺木為階行勿迷勤修道業生羽翼天門九襲須攀隮鳯于飛希深問差差粹羽今逢時桐花正美矞雪亂家庭玉樹須來儀宛陵先生集卷第十一宛陵先生集目録卷第十一湖州後詩謁雙廟送弟赴官江南和永叔晉祠詩得李殿丞端硯書謝師厚至詠蘇子美千葉菊新冬傷逝送趙升卿之韶幕蘇子美竹軒偶書寄子美寄題涵虛閣送蕭祕校送李通判處州古劒篇送蔡君謨雜興送逐客王勝之送周太博之巨野鄴中行大慶殿雪中答忠上人擕古硯讀後漢列傳異同蔡仲謀遺鯽魚雜擬答上中人卷送蘇子美聞李殿丞訪别刁景純留饌膾寄致仕李國博同師厚宿胥氏聞子美登天清塔謝師厚歸南陽夜坐有懷永叔贈酒得山雨范通判秦州陳繹越州從事辛著作知西京永寧和師厚别後寄普淨佛閣孤鶻蜂並遊寄宣州真上人元夕同賦正月十五夜出回同次道遊相國寺送惠勤上人聞賣韭黃蓼甲董著作為參謀戲寄師厚生女薛中舍宰聞喜聯句附希深聯句希深據鞍聯句同希深馬上口占玉麈尾風琴聯句冬夕會飮聯句問答目録終
