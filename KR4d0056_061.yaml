body:
  text: 刻宛陵集後序夫詩之為道大矣迄上下數千伯世倫者競起悉生人力精詣之卒乃稱入室者代堇堇數子焉豈不亦囏哉今之談詩者率右李唐至宋以下不啻腐鼠棄之夫李唐峕設斯羅士宇內一意嚮往而若甫白輩又極千古材赫哉雄視諒矣儻以擬之騷選三伯篇不當三舍避邪夫文固因時道隨氣化辟之蒼迹禹碑秦隸漢篆鍾王更易體畫各殊同文􅋿一使上論者遂謂蒼禹以後不復有書理也已哉宋有聖俞以詩名當峕最號宗工者亡如永叔乃永叔卑卑下之曰吾不如也聖俞名乃益振上自君公下逮隸卒獲一什即為琬琰至契丹人以金購其詩或織以為裳服自辟王來業詩家未有若斯烈者也我明御宇文學之士英英薄魏晉何暇及宋以故崇信聖俞者益寡然彼未操戈而與決戰烏知斯人為勍敵聖俞涵衍沖夷不減陶韋至精苦深玄怪竒靚麗方之李長吉實伯仲焉西昆靡濫後乃一浣滌至此斌斌呼幾于大雅矣􅍦其沈困下僚不得振響廟廊以竟其材志斯殆遇實為之永叔曰詩必窮而後工不其然與郡中舊刻宛陵集歲久散棄今撫臺宋公以其族孫參知純父氏請屬宣城薑令竒方梓之既敘諸首矣乃裔孫鄉進士一科復徴言于不榖顧俊匪知詩者然生後聖俞數伯年得守兹土恆斤斤切仰止焉而中丞公填撫之餘考鏡遺風表章前哲竊幸遘其盛舉也輒不自恧而書之末簡云萬曆丙子仲夏月吉直隸寧國府知府南海陳俊撰
