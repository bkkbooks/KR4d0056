body:
  text: 刻宛陵集後序夫詩之為道大矣迄上下數千伯世伦者競𧺫悉生人力精詣之卒廼稱入室者代堇堇數子焉豈不亦囏哉今之譚詩者率右李唐至宋㠯下不啻腐䑕棄之夫李唐峕設斯羅士㝢内壹意嚮徃而若甫白軰又極千古材赫哉雄眎諒矣儻以擬之騷選三伯篇不當三舎避邪夫文固因時道随氣化辟之蒼跡禹碑秦隷漢篆鍾王更易體畫各殊同文􅋿一使上論者遂謂蒼禹㠯後不復有書理也已哉宋有聖俞以詩名當峕最號宗工者亡如永叔乃永叔卑卑下之曰吾不如也聖俞名廼益振上自君公下逮隷卒獲一什即為琬琰至契丹人㠯金購其詩或織以為裳服自辟王来業詩家未有若斯烈者也我明御宇文學之士英英薄魏晉何暇及宋以故崇信聖俞者益寡然彼未操戈而與决戰烏知斯人為勍敵聖俞涵衍冲夷不减陶韋至精苦深玄恠竒靚麗方之李長吉寔伯仲焉西崐靡濫後乃壹浣滌至此斌斌虖幾于大雅矣􅍦其沈困下僚不得振響廟廊㠯竟其材志斯殆遇寔爲之永叔曰詩必窮而後工不其然與郡中舊刻宛陵集歲乆散棄今撫臺宋公㠯其族孫叅知純父氏請屬宣城姜令竒方梓之旣叙諸首矣乃裔孫郷進士一科復徴言于不榖頋俊匪知詩者然生後聖俞數伯年得守兹土恒斤斤切仰止焉而中丞公填撫之餘攷鏡遺風表章前喆竊幸遘其盛舉也輒不自恧而書之末簡云萬暦丙子仲夏月吉直隷寧國府知府南海陳俊譔
