front:
  text: 宛陵先生集卷第四十八
  hash: sha256:ee99c4657c8b46c2fc8429fc163de84ceaf97115d7b6dd639ccb3a15fafec637
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_048-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和劉原甫舍人赴楊州途次贈予翩翩河中船我船緩而西君船迅而東緩迅各所尚不意中路逢驥馬方騰雲野鶴還就籠亦言岀處異同是天地中我豈不知命人空嗟其窮何當遂逸性川上作釣翁聞禽禽鳴脫破袴定無新易故此語莫相譏善貧知有素表臣都官至十三里店風雨催車騎駸駸來自南道傍有茅屋寧容使君驂不謂忽下馬濕衣逢我談田家已刈楚田婦正好𧖟旣將國漕急復與民事諳他年此茅屋便比棠樹甘泊徐城寄杜挺之王平甫十里五里一值淺千愁萬愁過徐城王君論與河流阻杜老談思月色清岸若屹墻空自靣樹如張蓋欲誰傾二人黨及親朝夕更晩更遲何計程至第四舖二首第四舖前風雨急搭河過盡不憂灘却愁蓬溺空征槖始信人間行路難輕舟巳過第四舖憶著陽關末尾聲怊惆杜公行底急白醪何處得同傾倡嫗歎萬錢買爾身千錢買爾笑老笑空媚人笑死人不要過靑陽驛使風天應憐逆旅乞與順風初不假卒添力任從帆自踈燕攙舟尾徤鷁漱水花餘㑹與王都近何湏問疾徐蠅乗炎出何許人意以微看怒劒休追逐疑屏漫指彈與蚊更晝夜共蜜上盃盤自有堅冰在能令畏不難蟬柳上一聲蟬沙頭千里船行經朝雨後思亂暑風前物趣時時改人情忽忽遷感新猶感舊更復幾多年鶯緑柳隂猶薄黃鸝囀已淸年年舟上客處處樹頭聲髣髴佳人語依稀太子笙夕陽聽不足飛入舊荒城雞昻然大雄雞高冠紫沉羽星占太史局樹棲丞相府知時不失晦得食曾呼伍幸無終夜鳴湏防人起舞鶴何時別遼海俛啄雜庭鵾去作僊人駕來乗衞國軒雲中晴引唳松上舊能言俱說長千歲予非學羡門挑燈杖油燈方照夜此物用能行焦首終無悔橫身爲發明盡心常欲曉委地始知輕若比飄飄梗何邀世上名蛙陂蛙怒目生科斗亦縱橫自得君王揖能爲鼓吹聲越人嘗入饌秦客不湏驚誰解縁明月徒誇兩股輕鳩一世爲巢拙長年與鵲爭欲知雲脚雨先向屋頭鳴頸上玉花碎臆前檀粉輕何時將刻杖扶助老夫行蚊向晩化汚積羣飛來戸庭蟭螟許巢睫琥珀爲留形夜色徧容蔽雷音亦感聽猶矜負山力血食也霑醒鹿羣處空山中跡在深松下周穆得同狼秦人指爲馬驚顧逺世網脫質去田野誰思充腵脩自是無全者犬常隨輕騎獵不獨朱門守鷹前任指蹤雪下還狂走人思上蔡遲書寄華亭後莫將呼作龍梁肉纔經口豕司原豢俗狶日見容隂昵喜比爲白麟惟憂不豐溢烈飈澤雨作眞聲向人岀司原悔何由肝膽空駭慄蛟橋邊三尺劒江上六釣弧漢武帝何處周將軍巳無織綃深有室泣淚自爲珠誰爲九淵害人猶能爾圖兎迷蹤在塵土衣褐戀蓬蒿有狡誰窮穴中書惜拔毫獵從原上脫靈向月邉逃死作功勲戒良弓合自􅋶魚洛水美頳鯉入河西去時三春登玉浪一日到天池垂釣豈容羡小鱗應莫隨腹中無匙首巳不助吳兒龜王府有寶龜名存骨未朽初爲淸江使因落豫且手白玉刻佩章黃金鑄印紐辭聘彼莊生曵塗誠自有蝦自生江海涯小大形拳曲宫簾織以鬚水母慿爲目貴將蔽其私賤用資不足於物豈無助况能參鼎肉至靈壁鎭於許供奉處得杜挺之書及詩去冬過㝷歷陽守江沙半遮當利口口頭沙蹙浪如山浦溆棑舟魚貫柳却畏浪高難苦留聞解符來時不乆平明挂席入楊州主人釀成百斛酒酒上玉蛆如笑花一日倒空罌與缶主人亦欲君舊友請我遲君同此首淸明君果渡江至與君繼舳曾無負過淮風緊到洪澤使人助我如臂肘暮春泝汴汴流澀自假輕航去如走千憂萬阻經靈璧留書津吏情何厚副之佳句二十言文昌光芒夜侵斗平時相恤以此稀緩急求之更難有風牽月挽望符離水館野亭能駐不葛巾輕服約登歩葱􅌜冷淘誇甚滫書中不說王平甫應又先行君在後我今趂君君趂王趂入大梁湏執手永城杜寺丞大年暮春白杏花孤素發殘枝非關比衆遲殷勤勝菖葉重疊爲農時午日三首有酒不病飲况無菖蒲根空懷楚風俗角黍弔沉䰟佳人五色縷道士絳囊符痩臂不中繫百邪何用驅百草堪爲藥舟行不及收岸傍蕭與艾從聽到寒休晩得菖蒲薄暮得菖蒲猶勝竟日無我焉能免俗三揖向樽壺祭猫自有五白猫䑕不侵我書今朝五白死祭與飯與魚送之于中河况爾非爾踈昔爾齧一䑕銜鳴遶庭除欲使衆䑕驚意將淸我廬一從登舟來舟中同屋居糗糧雖甚薄免食漏竊餘此實爾有勤有勤勝雞猪世人重驅駕謂不如馬驢巳矣莫復論爲爾聊欷歔依韻和酬太師杜相公衍相國推心本至平欲揚蕭艾作蘭馨孤根易變終微賤美澤難霑漫晦冥楚客嘗聞紉若若王孫誰復顧青青東風已與生成足不敢希蓂在帝庭依韻答僧圎覺早梅江南自寒苦花不與時同清向三冬足香傳一國中雲湖藏舊市雪樹認新豐未有虧冰素隨粧入漢宫雍丘遇雨日暮風雨急逆水舟難牽波波入𣏌國悄悄誰憂天闐闐陂中雷羃羃隄外煙驟然沃大熱蒸飫如炊煎飮水徒脹滿渴喉殊未蠲搖􅏃巳煩倦汙額常不乾如何一席地長少皆在前衣巾不敢去又以禮數纒安得化嚴石兩脛沒流泉毎暑起此念念之凡幾年終當逐逸志奚必事華顚廟子灣下作廟子灣下百尺船𣏌人楚人相雜牽水底老蜃倚以怪樹頭挂𥿄吹作錢江蛟海鵾千萬里軒風簸日蠻島邉長安舊去天尺五此在大梁眉啑前高冠長劒乃不畏沙雨夜起噴腥涎留侯廟下作貌如女子心如鐵五世相韓韓巳㓕家童三百不足使蒼海君初去相結秦皇東從博浪過力士袖椎同决烈曉入沙中風正昬誤擊副車搜迹絕亡命下邳圯上游老父墮履意未别顧謂孺子下取之心始不平終折節舒足旣受笑且去行及里所還可說可教後當五日來三返其期付書閱他日則爲王者師果輔高皇號竒傑留國存祠汴水傍逄逄簫鼓賽肥羊赤松不見天地長黃石共葬丘冡荒高車再過謝永叔内翰世人重貴不重舊重舊今見歐陽公昨朝喜我都門入高車臨岸進船蓬俯躬拜我禮愈下騶徒竊語音微通我公聲名壓朝右何厚於此瘦老翁笑言啞啞似平昔妻子信說如梁鴻自玆連雨泥沒脛未得謁帝明光宮冒隂履濕就稅地親賓未過知巷窮復聞傳呼公又至黃金絡馬聲瓏瓏紫袍寶帶照屋室飮水啜茗當淸風邀以新詩出古律霜髯屢頷搖寒松因嗟近代貴莫比官爲司空仍侍中今成冡丘巳寂寞文字豈得留無窮以此易彼可勿媿浮榮有若送雨虹湏臾斷㓕不復見唯有明月常當空况我學不爲買禄直欲到死攀軻雄一飯足以飽我腹一衣足以飾我躬老雖得職不足顯願與公去驩樂同驩樂同治園田頴水東李審言相招與刁景純周仲章裴如晦馮當世沈文通謝師厚師直開寶塔院自君命我飮朝暮雨傾瓦城東與城北大道泥沒馬敢忘主人勤顚撲困馭者衆客亦如期陳肴藉蘭若慿裴與沈謝辯論過終賈刁周事老成危坐言語寡酒半時謔劇揣狀類模寫或譏項髮秃或指舌端傻或將冠帶身勸作梁武捨謂我大耳兒此實巳見假又効井市態屈強體非雅順風手沙沙逆風口哆哆竟席屢絕倒去忌肝膽瀉規規豈無儕逹識高天下送周仲章都官通判湖州溪水日霅霅弁峰日峩峩中有水晶宮此名其謂何湖水傳玉娘揚光遡常娥昔人美清夜高樓發微歌風流百年餘所歷才彥多我嘗居其下醉舞或傞傞君行貳郡事結騎黃金珂容儀苦白晳度橋鳴槖駞士女夾道看秋風吹縠羅言是公侯家大體儂弗過問儂底未辨撑船入芰荷應莫勸𧖟織生計非杼梭依韻答吳安朂太祝我於文字無一精少學五言希李陵當時巨公特推詩便將格力追西京卞和無足定抱寶乗驥走行天下老玉巳累人馬不逢皇皇何之饑欲倒還思二十居洛陽公侯接跡論文章文章自此日怪竒毎出一篇爭誦之其鋒雖銳我敢犯新語能如夏侯湛于今窮困人巳衰不見懸金規吕覽乃遭吾子求琢磋珠璣獲斗柰我何吳冲卿學士以王平甫言淮甸㑹予予乆未至冲卿與平甫作詩見寄答之老馬力盡道路長豈若壯驥思騰驤項窮臨流歎不逝燕骨埋沒庸可傷我今六十趨南北饑腸不足靣黧黒少年心志一點無千里區區安所得徃居閭門乏經過閉戸讀書多廢食便從冠帶向仕途強顏希禄非貪職昨逢王倩昧平生一見如舊心相傾談經樹下任日炙酒狂便欲騎長鯨誰意同行有遲疾先入大梁凡幾日大梁故人憐鈍衰迭爲寄唱辭嚴宻卒章言買羊與酒雖齒動搖能飫溢亦知紅頰教新成更願舊朋邀六七宛陵先生集卷第四十八宛陵先生集目録卷第四十八和劉原甫見贈聞禽表臣至十三里店泊徐城寄二友至第四舖二首倡嫗歎過靑陽使風挑燈杖蠅蟬鶯雞鶴蛙鳩蚊鹿犬豕蛟兎魚龜蝦至靈壁得挺之書暮春白杏花午日三首晩得菖蒲祭猫和酬太師相公答贈圎覺早梅雍丘遇雨廟子灣下作留侯廟下作高車再過謝永叔李審言諸公招㑹送周都官湖倅和答吳太祝寄吳冲卿見寄目録終
