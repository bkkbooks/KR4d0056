body:
  text: 宋宛陵梅堯臣聖俞著夏日晩晴登許昌西湖新晴萬柳齊鶯度水東西城上明殘照雲間挂斷霓煙蒲勻若翦沙岸淨無泥菓壓繁枝重人乘小駟低嵐光開翡翠湖色浸玻瓈只欠朱藤宻如過罨畵谿許昌晩晴陪從過西湖因詠謝希深蘋風詩愴然有懷踈雲漏斜照殘雨葉間明飛蓋城頭去澄湖水正平荷盛鮫客淚蔓濯野人纓公獨思康樂臨流誦句清故原戰落日探兵至黃塵鈔騎多邀勲輕赴敵轉戰背長河大將中流矢殘兵空負戈散亡歸不得掩抑泣山阿故原有戰卒死而復蘇來說當時事縱橫尸暴積萬殞少全生飲雨活胡地脫身歸漢城野貛穿廢竈妖鵩嘯空營侵骨劔瘡在無人爲不驚西湖閑望夏景巳多趣湖邉日更佳園葵雜紅紫岸柳自欹斜雨氣收林表城隂接水涯愛閑輸白鳥盡日立汀沙寄謝師直憶同仲春月冐雨過穰亭聊酌山酒别獨吟夜燈青明朝上嶺路羣岫張雲屏忽入川谷秀固非平生經緑竹間紅蕚紫藤垂千扃春塘水決決野老髪星星田父相與至里言尚可聽始聞丹砂岑遂識五壠形傍瞻禹湯迹競信廟貌靈邀我陟巉巉宿霧方冥冥暗霑衣裘濕時襲草木馨棟宇敞絕頂牲酒列幽亭竹杯占禍福巫錦醉一嚀日晏别雲外月出至近坰僕夫疲不進鞭策無暫停我馬忽顚墜君心同鶺鴒再駕體無傷扣關燭巳熒自玆期莫逆未契心所銘怱怱撡行袂汎汎如水萍今來各一方安得同醉醒感二鳥雄雌雙好鳥託棲空樹中有蛇出傍穴噴毒氣如虹半夜此驚飛瞥目隨西東有喙不能逹啼雲復嘯風廻翔隔歲月老木高童童眼生衆禽噪雖近未由通昨朝煙雨晦並翼向幽叢鷹鸇尚橫集颺颺意無窮古相思劈竹兩分張情知無合理織作雙紋簟依然淚花紫淚花雖復合疑岫幾千里欲識舜娥悲無窮似湘水舟次朱家曲寄許下故人藹藹桑柘岸喧喧雞犬村晩雲連雨黒秋水帶沙渾稍聽隣船語初分異土言雖嗟逺朋友日喜近田園送曇頴上人徃廬山潯陽幾千里無不見爐峰蒼翠入衆目巖壑少行蹤高僧忽獨徃杳杳懷逺公嘗聞虎溪上醉令或來同而今競邀致幾里聞松風塵心古難洗瀑布垂秋虹弔石曼卿前時京師來對馬嘗相揖埃塵正滿衢笑語曾未及雖然恨莫親徃徃聞風什星斗交垂光昭昭不可挹獨哦秋露中豈顧衣裘濕酒盃輕宇宙天馬難羈縶今朝我還都但見交朋泣借問泣者誰曼卿䰟巳蟄堂堂豪傑姿遂爾一棺戢君生寒月明君沒寒月入月入還復升精魄寧未集孤墳細草遍翠碣嗟新立醉中留别永叔子履新霜未落汴水淺輕舸惟恐東下遲遶城假得老病馬一歩一跛令人疲到君官舍欲取别君惜我去頻增嘻便歩髯奴呼子履又令開席羅酒巵逡廵陳子果亦至共坐小室聊伸眉烹雞庖兎下筯美盤實飣餖栗與梨蕭蕭細雨作寒色猒猒盡醉安可辭門前有客莫許報我方劇飮冠幘欹文章或論到淵奥輕重曾不遺毫釐間以辨謔毎絕倒豈顧明日無晨炊六街禁夜猶未去童僕竊訝吾儕癡談兵究弊又何益萬口不謂儒者知酒酣耳熱試發泄二子尚乃驚我爲露才揚巳古來惡卷舌噤口南方馳江湖秋老鱖鱸熟歸奉甘㫖誠其宜但願音塵寄鳥翼愼勿却効兒女悲汴水斗減舟不能進因寄彥國舍人朝落幾寸水暮長幾寸沙深灘鼇背出淺浪龍鱗斜秋風忽又惡越舫嗟初閣坐想掖垣人猶如在寥廓陪淮南轉運魏兵部遊頴州女郎臺寺舊傳嬀氏女將適楚人時築館自臨水故臺空此基因爲楚宮媵來與使車期樓上望湖上煙林晩蔽虧望僊亭并序壽春望僊亭廣平宋公所作也宛陵梅堯臣之官吳興道出其下公命賦之公來有餘樂所樂爲郡間訟稀聊自適靜勝以紓顏清軒開曉幔歷歷見淮山山色洗新雨佳氣如可攀代異雞犬去時平草木閑試望天衢近飛駕應此還陪淮南轉運魏兵部遊濠上莊生臺周當戰國時何爲守靜正干戈旣日尋仁義固不競天下皆跖徒寧知聖爲聖是將萬物齊不顧千金聘所以忘形骸所以保性命安能小仲尼豈不識世病我從魏公來訪古停烏榜聊識賢者心吁嗟一長詠淮上雜詩六首宿雲未全歛微雨入船踈問伴失前後暝行隨疾徐相親沙上鴈自樂水中魚亭午日光透逺分林際居暗開淮水平逺見孤城出出舟問舟子遽對郍能悉始聞莊生臺還想觀魚日果得眞隱心魚鳥情非宻輕舟晩投處聒聒渚禽嘶橡子隨薪束𬞞科帶土擕岸幽雲滿石潮落蚌生泥客思無憀極唯將魯酒迷野鴈不知數翳然川上鳴曾無設羅意空自見船驚渺渺拍波去紛紛孤嶼盈苦寒非塞外霜落夜淮清漠漠晝煙披縱橫見漁艇輕橈上急水或與飛鴻並魚大釣絲微牽隨碧潭逈向晩得志歸浩謌山月靜舟閣下灘遲蒼黃暮灘上偏愁逆水風更駕崩沙浪落日看巳昬漁燈逺相向夜䦨天轉寒坐待潮流漲赴霅任君有詩相送仍懷舊賞因次其韻湖山饒邃處曾省牧之遊鴈落葑田闊船過菱渚秋野煙昬古寺波影動危樓到日尋題墨猶應舊壁留過楊州叅政宋諫議遺白鵞曾遊鳯池上曾食鳯池萍乞與江湖去將期養素翎不同王逸少辛苦寫黃庭金山寺并序昔嘗聞謝紫微言金山之勝峰壑攅水上秀拔殊衆山環以臺殿高下隨勢向使善工摸畫不能盡其美初恨未遊赴官吳興船次瓜洲值海汐冬落孤港未通獨行江際始見故所聞金山者與謝公之說無異也因借小舟以徃乃陟廻閣上上方歷絕頂以問山阿危亭曲軒窮極山水之趣一草一木雖未蕚發而或青或凋皆森植可愛東小峰謂之鶻山有海鶻雄雌棲其上每歲生雛羽翮旣成與之縱飛迷而後返有年矣惡禽猛鷙不敢來玆以搏魚鳥其亦不取近山之物以爲食可義也夫薄暮返舟寺僧乞詩強爲之句以應其請偶然而來不得髣髴敢與前賢名迹耶吳客獨來後楚橈歸夕曛山形無地接寺界與波分巢鶻寧窺物馴鷗自作羣老僧忘歲月石上看江雲瓜洲對雪欲再遊金山寺家人以風波相止臘月海風急雪吹巖下窻輕舟不畏浪昨日過寒江渡口復夕興區中無與雙忽牽兒女戀空聽逺鐘撞金山芷芝二僧擕茗見訪一遊江山上日日吟不足雙錫忽來過衣霜帶初旭况能持茗具向此烹新緑中􅍽水若飴北焙花如粟還將塵慮滌自愧冠纓束何以報勤勤馳奴扣雲谷淮南遇𣑽才吉上人因悼謝南陽疇昔之遊乆已猒宦旅故玆歸江南始時遽辭邑不及事春𧖟殘臘猶在道險阻固所諳扁舟次淮海喜遇釋子談契濶十五年尚謂卧巖庵偶見如夙期淹留良亦甘歎遊獨泫然懷悲情豈堪班班雲中鳥共看投夕嵐是不念舊隱山水唯素耽我從湖上去微爵輕子男送櫟陽宰朱表臣塞上備胡羗關中調兵食秦民尚苦輸漢吏勤求職君今喜懷詔馳騎寧暇息其邑嘗雨金於時豈能得行當經灞上故事猶可憶前代多戰爭鬼火弄隂黒蒼蒼路傍草憔悴希春色縣涂誠有政威惠爲令德次韻和長吉上人淮甸相遇淮上一相遇憶在京都時雖驚歲月換未改松桂姿童侍兩三人缾錫相與隨自言東越來篋中多好詩文字皆妥貼業術無傾欹前軰嘗有言清氣散人脾語妙見情性說之聊解頥始推杼山學得非素所師此固有深趣吾心乆巳知橫琴乃玄悟豈必弄鳴絲古樂衆少聽誰知彼吹箎師曠沒世後伯牙衆身悲願同黃鵠舉逺歸滄海涯老驥雖不病長坂安可馳天台况竒勝日夕勞夢思尚忝齒纓綬終年趨路岐俯愧淵中魚游泳水之湄仰羡雲間鷙凌厲辭縶維居嘗起斯念未去情不怡今朝更道舊感愴各嚬眉同遊謝公門逺想袂霑洟惜哉胡不仁碎彼東方琪又出數𥿄書手澤尚可披眷眷疇昔意於今當語誰復遺三百言玩味自挽髭序事盡成故慨吟良有資其詞何亹亹宛若對風規冷然聳心目不覺整冠緌重以超俗韻顧予賤職司是猶猿鳥情並此駑櫪卑報投仍勉強實謬匠者爲應哂不量力短兵兹巳疲歲日旅泊家人相與爲壽舟中逢獻歲風雨送餘寒推年増漸老永懷殊鮮歡江邉無車馬鑑裏對衣冠孺人相慶拜共坐列盃盤盤中多橘柚未咀齒巳酸飮酒復先醉頗覺量不寛岸梅欲破蕚野水微生瀾來者卽爲新過者故爲殘何言昨日趣乃作去年觀時節未變易人世良可歎寄題梵才大士台州安隱堂巢禽託靜林潜魚戀深壑豈不能自安翔泳得所樂逹士逺紛華於兹守沖漠堂前鳴松風堂後馥花蕚好鳥時一呼澄明望寥廓詩興猶不忘禪心詎云著所以得自然寧必萬縁縛未能與之游懷慕徒有作農難稂莠非所殖嘉禾共一田老農實惡之豈共時稼捐管蔡與盗跖同氣詎能遷周公不妨聖柳惠不妨賢賢哉彼薅矣取舍得其然舟中值雨裴刁二君相與見過江上渰淒淒天形接野低岸痕生舊水馬跡踏春泥風急侵衣重山昬卷幔迷誰驚二客論不愧巨源妻題刁經臣山居時巳應辟西幙向不樂郡府遂云歸田園結廬復種蓻草樹日巳繁散帙理舊學了然無俗喧春雨一廻過覽耕登古原青山每自愛霽色當衡門故人苟來徃名宦未嘗言趣適巳不淺道心良亦存忽聞辟書至便令驅犢轅豈期同瓠瓜長繫蒿萊根始知古君子出處惟義敦前者裴君雨中見過因以詩謝復承來章輒依韻奉和主人門下客寂寞在江涘我昨謝銅章解組猶脫屣前日至朱方正值春雨起君時冐雨來曾不避泥滓林枝滴衣襟沙岸平履齒相歡了無間偶論通逺㫖去逢交親問爲報心如水甘露寺曾非逺城郭寂爾隔囂氛尚有南朝樹能留北固雲川濤觀海若霜磬入江濆衞國丹青在孤堂緑桂薫依韻和刁經臣讀李衛公平泉山居詩碑有感當時植珍木豈是昧前規廢宅長春草故山存舊碑巳嗟良璧毀安識古松姿叔子每懷慕此心空自知春日舟中對雪寄刁經臣誰道江南暖新春見雪飛鷗來親客艇花亂上人衣古郡地偏寂野窻寒入微戴家人不逺欲去未能歸依韻和逹觀禪師春日雪中見寄宻霰來新歲春陽氣漸微侵庭草芽凍紛雜鴈行飛江寺誰開逕湖山我欲歸雨花無六出休怪着人衣和刁太博新墅十題靜舍野木扶踈重復重塘蒲涵水緑茸茸琴書尤古得爲樂休問前山有戴顒西齋靜節歸來自結廬稚川閑去亦多書請君架上添芸草莫遣中間有蠧魚北軒冬日迎暄此未宜苦吟那對朔風時秪誇砌下留殘雪不看簷間斗柄垂叢杉植榦森然美在庭更憐相倚自青青翠姿且有千雲勢豈是孤生向逺坰松阜勾引風聲巳可聽高隂仍更接崗形知君乆欲平心氣早晩根傍長茯苓小舫小肪閑撑莫猒遲比於刳艇劣相宜漕河有處通陂水深入荷花人不知移竹逺愛檀欒碧逕開荷鋤乘雨破秋苔直湏探作阮家趣更向煙林缺處栽花塢雜芳春發淺深叢曲塢逶迤紫間紅色賤格微應不數少添蘭菊待秋風綿檜翠色凌寒豈易衰柔條堪結更葳蕤松身栢葉能相似勁拔縁何不自持新井淺淺清泉自鑑開鱗鱗寒甃未生苔山中亭午野禽渴不畏人驚欲下來發陶莊却寄刁經臣裴如晦方看梅柳春共别川河上移舟人巳歸廻首竹林望水渾不照影山逺猶相向聞道欲西遊漢家今尚壯發丹陽後寄徐元輿别君忽五年相望非一日會合如夢寐欣喜對形質是時春巳仲臨水柳未宻載酒相與遊輕舠劣容膝禪扃竹下過乳井松間出烹茶覺暫醒岸幘情彌逸興䦨乗月歸及旦解行繂離懷更宿酲逺想都如失湖州後詩胡武平遺牡丹一盤疇昔居洛陽看盡名園花臨水復䕃竹艷色照彤霞良友相與至競飲歡無涯而今猶老翁鬂髮但未華昨日到湖上碧水涵蒲芽此情頗巳愜薄宦非初嗟况乃蒙見憐帶雨摘春葩雖無向時樂惠好仍有加題滕學士九華山書堂處山方畏淺曾慕結深廬要與雲峰近寧將野客踈澗苗來入爼林鳥或窺書何事輕兹樂而從出塞車公今爲涇洲送劉成伯還都余昔困川途今非羡行者離心寄南風相送過平野旣吹蓮葉舟更逐桂條馬中州多故人懷抱幸君寫送舍弟正臣赴都吳兒能刺舟其駛劇飛鳥行行固莫留望進前山小家貧吾不憂身計爾自了何當還里門拜慶期秋杪訪報本簡長老比泛苕溪來初逢卞山雨雨收精舍出喜與高僧語門臨水若鑑萬象皆可覩清淨欲誰隣野蓮無處所依韻答淮南祝秘校初春見寄客有袖中書初慿春鷰寄春鷰不時來秋鴻今始至水落蒲藻寒悠悠江浦意宛陵先生集卷第八宛陵先生集目録卷第八汝州後詩夏日晩登許昌湖許昌晩晴故原戰故原戰卒死復蘇西湖閑望寄謝師直感二鳥古相思舟次寄故人送曇頴徃廬山弔石曼卿醉中留别永叔子履汴水斗减寄彥國陪遊女郞臺寺望僊亭陪遊莊生臺淮上雜詩六首赴霅任君有詩宋諫議遺白鵞金山寺瓜洲對雪金山二僧擕茗至淮南遇𣑽才上人送櫟陽朱宰和長吉上人相遇歲日旅泊寄題𣑽才安隱堂農難舟中值雨題刁經臣山居和詶裴君見過甘露寺和刁經臣有感春日舟中對雪和逹觀禪師見寄和刁太博新墅十題發陶莊發丹陽後寄徐元輿湖州後詩胡武平遺牡丹題滕學士書堂送劉成伯還都送舍弟赴都訪報本簡長老答祝秘校見寄目録終
