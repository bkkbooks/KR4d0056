front:
  text: 宛陵先生集卷第五十七
  hash: sha256:aaeb02e8c9ade4eebce9e5805d9a382544920141d27ea01e5cb666c4139b91a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_057-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送葛都官南歸不羡新為赤縣尹惟羡暫向江南歸江南羃羃梅雨時風帆差差並鳥飛􅊻竿夾岸長若桅水籠畜魚鮮且肥家在千山古溪上先應喜鵲噪門扉楊樂道留飮席上客置黃紅絲頭芍藥洛陽賣牡丹江都買芍藥賣與富人歡買為遊子樂萬絲必同心千葉必同蕚五色相淺深百金相厚薄栽培動經年風雨便成昨蕭條洛陽城索寞江都郭賴有一春花能無十千酌朝看門擁車暮見門羅雀嘗聞月底人欲把月桂斫要使清光多四海意開廓我亦愛明月常滿不願落上弦過楊侯乃值寒雨作共飮三四人不覺傳鳴柝持葩金谷豪朱黃何灼爍還思溱洧上士與女相謔實此香草芳請我賦其略酒闌為追詠思拙筆屢閣項羽羽以匹夫勇起于隴畝中遂將五諸侯三年成霸功天下欲滅秦無不慕強雄秦滅責以德豁逹歸沛公自矜奮私智奔亡竟無終送陳郎中知和州藹藹尚書郎出為二千石伯父歷將相兄弟皆烜赫前罷永嘉守民俗遮阡陌獨將海松歸夸與都下客今去烏江邊寂寞空舊迹當求虞姬草無風舞隨拍城頭可曠望千里波月白俱助使君歡平時遺吏責送薛十水部通判并州并州自古近胡地牛酒常行十萬兵少尹曾為五府辟將軍况有舊家聲桑麻故巳知風俗丘隴何須訪姓名聞説至今猶好馬試求安穩衆中行寄題西浴致仕張比部靜居院四堂張侯歸靜居堂宇結四隅堂中何所有書畫羅籖厨四堂各異名名異義亦殊夷心與會真內以道德娛清白及金蘭外為子孫模西南夜落蟾東北朝生烏天門風相通盛衰理可無舊爾松檜樹間之花石株雨晴氣候佳鄰里或來俱遣摘班林筍共持香粳盂飯畢循徑行不使僮僕扶所至舊衣坐遍歷日過晡時遇園果熟井漿而粉膚就枝掇鮮美咀味銷氷酥以此樂歲月豈是忘形軀禮法不我棄勞吝不我紆上不愧二踈下不泛五湖自有逍遙趣幸世遭唐虞送洪祕丞知太寧監三峽蠻溪上千山楚俗兼婦人樵入市官井貨專鹽魑魅或為患獼猴常可嫌君能厚風化男子使腰鎌送江西轉運馮廣淵學士五月江南行南風江惡遡乘潮雖有信不過湓城去船經香爐峰峰前須暫住三年少尹勞始得看瀑布到官未必間舉察憂財賦回思廬山傍塵土巳生慮尚存滕王閣無忘一登顧依韻和永赦景靈致齋見懷翰林文字本雄強况復齋祠向靜坊高樹黃鸝無去意深廊朱幕動微涼不嗟門外塵沙苦只覺壺中歲月長庭下隂苔未教掃榴花紅落點青蒼雜言送當世待制知揚州馮廣陵老人爭持壺酒朝言送少年使君暮言迎少年太守少年俱是玉墀人文章快利生銅吼莫作蕪城賦事往復何有莫聽嵇康琴商聲豈堪久今當太平非不偶星宿煌煌羅北斗揚州古富變荒涼萬俗一心依父母地包淮海江湖寬貨走荆吳楚越厚開釀刲羊願遇賓天下沄沄不輕口送蘇公佐屯田知單州柏上有羣烏一烏飛向東方棲城頭與人司吉凶八月禾巳穫九月黍巳舂競持美酒相慶樂年豐借問何能爾時平無困窮王平甫惠畫水卧屏臨流别君時羡君觀吳潮君行識我意遣畫一幅綃畫作繞床屏滔滔隨驚飈前浪雪花卷後浪白馬跳宛然千萬重不似筆墨描窊亞亂我目坐卧疑動搖夜燈照河漢如有織女招朝日下天窗東海無秦橋秦橋不可度織女不可邀但慕乘桴公空能誦唐堯嘗聞挾柘彈意必在食梟終當五湖上歸去學漁樵送萬州武寧假尉希元相見三十載喜君始成名新袍照江緑白髮憎鑑明臨水必觀魚獨傷魚命輕朝為淵底遊暮為釜中烹彼方路艱逺其民亦天氓餒之則為盜非是惡厥生捕多勿夸能能在不犯兵次韻答黃介夫七十韻春風不擇草萬卉皆發萌盛夏一長養秋實俱與成舂粒以蒸炊刈枯以煎烹工師調五音不問咸與韺自取衆律和黍谷動華英可以薦祖廟可以陳帝庭良將統萬卒所向若驚霆戰鬪衆益勇號令夜益明破敵必拉朽不見堅陳橫我觀欲物際亦在農力興我觀合奏時亦在考擊并我觀成功日亦在間得情草木有美惡造化無喜憎五聲有高下一致不可評三軍用貔虎不較蚊睫螟大君設時網廣海無漏鯨磊落黃夫子為學不自輕四十登賢科良賈售百朋得志豈計晚成名等衆榮舊交半存沒新知慕徒傾老鶴晴一唳隨風無近聲好論古今詩品藻笑鍾嶸欲掃李杜壇未審誰主盟我衰百事倦白首聊窮經兩目生昏花猶勝張籍盲讀書愛日永秉扇自驅蠅但惡亂我思非與小物勍清飈颯然來喜得如弟兄散帙空堂上垂冠髮星星載誦堯舜篇幸今時太平不學遁世士投竿泛東溟不襲貪生人煉氣吸日精不羡富貴翁歌吹滿重城獨守螢火光莫攬蟾蜍晶人生轉頭間未免一銘旌區區逐甘鮮鼎鼎夸佩纓安知西山餓熟識綿上耕彼勿歎鳯衰此正歌鴻冥分合沒窮巷迹澀蹈高閎妻子易為飽粟帛不足營豈乏一器飯豈乏一杯羮肯為濁河濁願作淸濟淸韓愈嘗有言百物皆能鳴特稱孟東野貧篋文字盈到死只凍餒何異埋秦坑今我巳過甚日醉希步兵神仙多羽翼一一飛蓬􅌡乃知無道氣難可強留形鄙性實朴鈍曾非傲公卿昔隨衆一往或值謗議騰曰我非親舊曰我非門生又固非賢豪安得知爾名是時聞此言舌直目且瞪俄然我有答賢相持權衡喜士同周公其德莫與京我去豈不送我往豈不迎自為筋力寡路逺艱於行未若歸教子遺金徒滿籝歲月苦易得顔貌日可驚身雖厭役役心亦逺硜硜歸思吳州橘夢憶楚江萍試看兩圍碁白黑何所爭朝脫泥塗困暮失雲衢亨物理既難常逹生重飛觥曾以文豹章逺喻子懷能曩者恃貴勢悔説烏鳥靈烏靈反見怒終恨屈此誠當時語頗錯盍呼為大鵬於兹儻遇之應解頸頰頳韻盡意未盡且用此報瓊永叔內翰見索謝公遊嵩書感歎希深師魯子聰幾道皆為異物獨公與余二人在因作五言以敘之昔在洛陽時共遊銅駝陌尋花不見人前代公侯宅深堂鎖塵埃空壁鬪􅔼蝪楸隂布苔緑野蔓纒石碧池魚有偷釣林烏有巧射園隸見我來朱門暫開闢園婦見我還便掃車馬迹何以掃馬迹實亦畏他客我輩唯適情一葉未嘗摘他人或所至生果不得惜又憶遊嵩山勝趣無不索各具一壺酒各蠟一雙屐登危相扶牽遇平相笑噱石搗雲衣輕巖裂天窗窄上飮醒心泉高顚溜寒液下看峰半雨廣甸非甘澤夜宿嶽頂寺明月入戶白分吟露氣冷猛酌靣易赤明朝循歸途兩脛痛若刺日旰就馬乘香草路迫厄却望峻極居巳與天外隔薄暮投少林漱濯整冠幘碑觀巡幸僧指古定空壁誓將新詠章燈前互詆擲楊生護巳短一字不肯易明年移河陽簿書日堆積忽得謝公書大夸遊覽劇自嵩歷石堂蘚花題洞額其文曰神清固非人筆畫乃知二公貴逆告意可頥遂由龍門歸里堠環數驛我時詩巳答或歌或辨責責我不喜僧性實未所獲凡今三十年纍塜拱松柏唯與公非才同在不同昔昔日同少壯今且異肥瘠昔日同微祿今且異烜赫昔同騎破韀今控銀轡革昔同自謳歌今執樂指百死者誠可悲存者獨窮厄但比死者優貧存何所益送謝師直祕丞通判莫州兼寄張和叔河湟宿兵地徑勇天下聞侵疆古甚熾薄伐詩所云往今勢且異利害理頗分逺以塘設險遂輕甲屯雲昔傳嘗膽國能破怒蛙軍越雖隔大江吳遭若枯焚實由恃阻懈抉目悲伍員夫子負美才議論高不羣况有令兄弟今亦二河汾助守戒不虞愼勿倚和獯張侯為刺史大族獨此君法明而不竒可共飾以文送白秀才福州省親士憂行不修不憂祿不及之子久好學何患名未立聖時開賢科子獨不肯入固非逺仕進服期難赴集南歸慰親顔道路正暑濕悠悠幾千里赤日薄行笠暫憩青林下賴有寒泉汲漱齒去塵埃土風須漸襲送溫州楚屯田鴈蕩山頭鴈如隨太守來秋風既與至春日定同回上宰無忘舊明時必用才白於章句老經册向螢開送僧在巳歸秀州前歲嘉興火僧居化劫灰四方持鉢去千里渡江來心向王成講緣從海客回水天聞唳鶴不復有塵埃送祖印大師顯忠黃𥿄賜祖印鑄名不鑄金力笑蘇季子責望小人深渡江見海月秋光上遙林團團冰玉盤瑩然如禪心題譯經院同文軒有書無異文有車無異軌貝多得旁行白馬來萬里清軒延高僧一歲譯幾𥿄譯罷坐焚香庭草灑寒水和江鄰幾學士得雷殿直墨竹二軸昔見雷子之小篆今見雷子之墨竹節瘦巳似蛟龍孫葉暗曾無鳯凰宿江翁得之尤愛憐作詩寫意酬雙軸挂在空堂坐卧看如玩蕭蕭巖畔緑莫疑昏黑眼生花松煤濃色切寒鴉不問主人兼客至明朝騎馬到君家永叔內翰見過我居城東隅地僻車馬少忽聞大尹來僮僕若驚鳥入門且坐笑豐頰光皎皎問我餐若何依舊抱糜麨問我詩若何亦未離纒繞我庭有藜莧不堪秣騕裊我壺無醪醴不能犒介紹乃喜百事稀來此與世矯固非傲不往心實厭擾擾韓子華內翰見過但見公軒過未見我馬去我懶宜我嫌公曾不我惡秋雨天街涼蕭蕭緑槐樹遙聽高車聲騶導門前駐僕夫驚入扉遽曰能來顧度量何其宏始終不改過索以新詩章遍覽日欲暮誠慙兜離音唐突韶與濩明朝當負荆人莫識貴附送董察推赴江寧金陵從事去不歎食無魚尺鯉日登俎故鄉時得書衰荷摘短袂秋蘚曳長裾若見府公問年來懶更踈次韻和司馬君實同錢君倚二學士見過棲棲太學官日厭塵坌積朋遊絶經過都未昧相識幸得養踈慵不能事役役天京二賢佐向晚忽來覿笑我似盧同環然空四壁只欠長鬚奴訴尹惡少摘移榻近簷楹談詩俄至夕回車閭巷隘跛馬愁所歷平明看蒼苔巳覺生轍迹次韻和錢君倚同司馬君實二學士見過府僚忽方駕乃知決訟餘大尹不苛察羣吏不牽拘嘗稱二三賢助治無偏隅新晴乘此涼行行過我居何以延君子唯有滿牀書何以解君頥淡句無足娛何以留君久燈燭巳照塗登車莫言逺騶從美且都夾道行人止按轡寧馳驅我老焉所羡送子立躊蹰送閬州駐泊荆供奉青天不可上蜀道未嘗行每説褒斜險唯聞猿鳥聲去為千里客自握一方兵所重恩威立無將逺戍輕江鄰幾沈文通二學士見過東城車馬多巷無蹄與轍如何二賢豪侵晨顧衰薾喜言雨後涼早暮脫炎熱愛子屋室靜塵土都巳絶不唯清耳目亦粗養愚拙江碑讀頭陀沈賦賞雌霓固知世德高學問冠時哲我慙於其間荆華參蟻垤然推鵬鷃分自足不少别君歸邀此吟把筆強搜抉送壽州司理張元輿清川夜流明月光城上有烏啼女墻月明不掩斗與氣鳥啼未歸雲點霜霜寒月冷古時獄下有苔蠧之雄鋩水方軒眉大靈智見我西北天門傍自言昔有切玉寶嗟今非後百鍊鋼用之補履亦何益頴脫未如錐處囊誰能為封華隂土背負七星生焜煌君去味我書此意莫歎淮水來湯湯宛陵先生集卷第五十七宛陵先生集目録卷第五十七送葛都官南歸楊樂道留飮項羽送陳郎中知和州送并倅薛水部寄題靜居院送大寧監洪祕丞送江西馮轉運和永叔景靈致齋送當世知楊州送單州蘇屯田王平甫惠卧屏送萬州武寧假尉次答黃介夫七十韻永叔見索敘述送莫倅謝祕丞送白秀才省親送溫州楚屯田送僧在巳歸秀送祖印大師題譯經院同文軒和鄰幾得墨竹二軸永叔見過韓子華見訪送江寧董察推和二學士見過再和二學士見過送閬州荆駐泊江沈二學士見過送壽州張司理目録終
