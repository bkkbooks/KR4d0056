  text: 宛陵先生集卷第十
  hash: sha256:7ecea77a5a418806c0452c574cdd9af399383af60621af0b354dd0d1f1737976
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_010-1a}
body:
  text: 宋宛陵梅堯臣聖俞著臧子文剡縣主簿剡水無淺深歷歷能見底潛鱗莫見窺塵紱聊堪洗古木潭上隂遺祠巖下啓應識道傍碑因風奠醪醴余令之會稽新昌越舸將渡西陵時臘雪欲作隂雲垂古岸潮回夜冰閣冰上鯉魚紅尾鬐知君奉親聊自得窮冬涉險仍熙熙縣民但可觀此意休羡江邊孝女碑傳神恱躬上人握中一寸毫寶匣百鍊金鑑貌不鑑道寫形寧寫心古人固不識今人或所欽依然見其質儼爾恨無音子誠丹青妙巧奪造化深妍媸必盡得幻妄恐交侵文曜師之南徐班班上川羽薄暮未安巢擾擾方外士歲晏遊逺郊正值風霜急晚冰隨處𫾣何時居巖下都把塵事拋茂芝上人歸姑蘇身衣竺乾服手援犧氏琴繁聲不願奏古意一何深晏景託孤艇倦飛還舊林闔閭城下寺幾里認鍾音唐寺丞知南雄州前林尚含凍南國使君行逆水春風峭孤舟桂席輕踏歌聞舊俗信鬼有頽氓當識朱衣貴壼漿擁道迎依韻和孫秀才朱長官見寄二首同韻古來富貴蹈危機樂性安貧莫謂非未及功名蒼鬢改欲從踈懶五湖歸昔年同志逢時盡今日相親似子稀犀僕忽辭雲海上逺持雙璧扣吾扉謝尉西歸曾為洛陽客喜見洛陽人每憶舊遊處相逢借問頻當時伊水上醉弄巖花春而今絶茲樂欲語巳酸辛明朝君當去又復與誰親唯應有素月相照寒溪濱陳浩赴福州幕梅殘杏將坼楊柳都未堪欲贈無所贈春風吹酒酣逺山猶帶雪野水巳如藍羽檄不應有詩書自可耽示沈生稚子每多疾始與藥物親由茲沈生迹遂歷吾門頻我居無鳥鼠乃知屋室貧舉世競趨利爾非閭井人和潘叔治早春遊何山泛泛寒溪流縈紆向山去淺石長蒲茸朝煙暖巖樹捨舟當禪扉踏蘚汚野屨誰愛鮑參軍登臨多秀句張法曹歸闕海底日未上屋頭羣雀喧晨興溪館逈坐聽櫓聲煩出戶望行舸羡心如野猿暮春余亦去為見故人言送張叔展北歸江南春候早水暖野芹生北客欲歸日故人持贈行莫嫌為物薄言采幽蘭并休惜臨流醉高帆去棹輕依韻和叔治晚春梅花楚人住處將為援越使傳時合有詩常是臘前混雪色却驚春半見瓊姿笛吹逺曲還多怨風送清香似可期我欲細看持在手誰能為折向南枝僧元復院枕流軒寺外寒流駛開軒靜者棲淺深看藻荇出沒愛鳬鷖一悟此中趣萬緣皆可齊誰來驚節物岸木長春荑惱儂期我以踏青花間儻相遇果然南陌頭翩若驚鴻度不語強躊蹰羞人映芳樹兩心常自憐兩目空相注依依不得親薄暮還愁去記取似丹葩知開在何處相逢晚日南城歸橋邊見郎去逺逺逐郎回羅衣汗微汚不惜汚羅衣要與郎相顧留連芳苑中肯謝花夭嫭傍欄思晤言羞畏情誰諭草草各還家幽懷是飛絮檣烏檣頭飛去烏夜夜啼聲碎猶不如水禽雙棲向煙外煙外少分張渚間多蘙薈休同八九子反哺人誰愛過華亭晴雲嘷鶴幾千隻隔水野梅三四株欲問陸機當日宅而今何處不荒蕪月暈月暈巳知風燈花先作喜明日挂帆歸春湖能幾里逢謝師直昔歲南陽道中别今向華亭水上逢把酒語君悲且喜流光冉冉去無蹤回自青龍呈謝師直共君相别三四年巖巖瘦骨還依然唯髭比舊多且黑學術久巳不可肩嗟余老大無所用白髮冉冉將侵顚文章自是與時背妻餓兒啼無一錢幸得詩書銷白日豈顧富貴摩青天而今飲酒亦復少未及再酌腸如煎前夕與君歡且飲飲才數盞我巳眠雞鳴犬吠似聒耳舉頭屋室皆左旋起來整巾不稱意挂帆直走滄海邊便欲騎鯨去萬里列缺不借霹靂鞭氣沮心衰計欲睡夢想先到蘋渚前與君無復更留醉醉死誰能如謫仙青龍海上觀潮百川倒蹙水欲立不久却回如鼻吸老魚無守隨上下閣向滄洲空怨泣推鱗伐肉走千艘骨節專車無大及幾年養此膏血軀一旦翻為漁者給無情之水誰可慿將作尋常自輕入何時更看弄潮兒頭戴火盆來就濕社前欲社先知雨將歸未見花那能長作客夜夜夢還家水次髑髏不知誰氏子枯首在沙洲肉化鳥鳶腹肢殘波浪頭曾聞南靣樂寧有九原愁厚葬不為貴漢官其登丘葉大卿挽詞三首位列名卿重年躋賜几尊臧孫宜有後定國巳高門舊族聲華逺名藩治行存秋風簫吹咽隴隧啓雲根自古賢才少滔滔豈足云善人安得見清譽久來聞器隕龍文鼎魂歸馬鬛墳豐碑幾當立籍甚著遺芬終始為全德生榮沒亦榮里人悲畫翣郡吏拜銘旌石馬天麟肖松枝國棟成更看追孝意捧土作新塋湖州寒食陪太守南園宴寒食二月三月交紅桃破纇柳染梢隂晴不定野雲密黕黕鼓聲湖岸拗使君千騎出南圃歌吹前導後鳴鐃是時輒預車馬末傾市競觀民業拋竹亭臨水美可愛嗑咂草木皆吐苞遊人春服靚粧出笑踏俚歌相與嘲使君白髮體尤健自晨及暮奏酒肴爾輩少年翻易倦倚席欠伸誰得教公雖不責以正禮我意未容誠斗筲逡巡秉燭各分散小人爭路何呶呶牡丹洛陽牡丹名品多自謂天下無能過及來江南花亦好絳紫淺紅如舞娥竹隂水照增顏色春服貼妥裁輕羅時結遊朋去尋玩香吹酒靣生紅波粉英不忿付狂蝶白髮強插成悲歌明年更開余巳去風雨摧殘可奈何惜春三首九十日春無幾日不堪風雨競吹花舞英逐水向何處泛泛斜溪伴晚霞前日看花心未足狂風暴雨忽無慿此身不及深溪水隨得殘紅出武陵春色斗空花亦休緑園深鎖更誰遊殘枝遺蕚不中看暮雨霏霏起暗愁花娘歌花娘十二能歌舞籍甚聲名居樂府荏苒其間十四年朝作行雲暮行雨格夫氣俊能動人人能動之無幾許前歲適從江國來時因宴席相微語雖有幽情未得傳暗結殷勤度寒暑去春送客出東城舟中接膝巳心傾自茲稍稍有期約五月連航並釣行曲堤别浦無人處始笑鴛鴦浪得名爾後頻逢殊嬿婉各恨從來相見晚月下花前不暫離暫離巳抵銀河逺青鳥傳音日幾回雞鳴歸去暮還來經秋度臘無纎失愛極情專易得猜前時南圃尋芳卉小忿不勝投袂起官私乘釁作威稜督促倉惶去閭里蕭蕭風雨滿長溪一舸翩然逐流水忽逢小史向城來泣淚寄言心欲死願郎日日致青雲妾巳長甘在泥滓更悲恩意不得終世事難慿何若此郎聞茲語痛莫深天地無窮恨無巳我今為爾偶成章便欲緘之託雙鯉程山人歸歙州新安固與吾鄉鄰山水清絶殊可擬我今暫來子亦歸空聽杜鵑雲樹裏重過南園誰作此園為宴喜而今樂事巳難并佳人去後門長鎖蔓草離離上古城送滕監簿歸寧嶽陽乃翁守西鄙胡騎敢慿凌撫士無餘貨吏以文結繩向聞來三堂今復走巴陵泝流幾千里雲夢苦炎蒸風檣易陳馬猶使勇氣增子今逺寄省寄謝余豈能江山可留詠燕許昔嘗曾寄題千步院兼示諲上人郊郭山林有美處皆為釋子所棲託高間不與時俗侵寂靜豈唯魚鳥樂朝望平田插稻苗暮看西村收雨腳早夏陪知府學士登疊嶂樓高陵自可眺况復更層樓峩峩衆山翠活活寒溪流新篁未掃籜緣險巳修修曲道出林杪飛宇跨城頭春餘衆芳歇子結纍蔓抽庭空野鼠竄日暝啼禽留誰知郡府趣適有林壑幽主人易吾土惟襲是瀛洲伊我去閭井爾來三十秋昔望白雲下今從輕軒遊得孫仲方畫美人一軸駿駒少馴良美女少賢德常聞敗君駕亦以傾人國因觀壁間畫筆妙仍竒色持歸非奪好來者恐為惑塗次寄羅道濟去年五月君到官紅蕖正開湖水寬共酌汀洲不知暮扣舷月露霑衣寒今年我罷欲歸去朋酒久來無此歡移舟不忍便為别競挈杯肴情未闌城闉欲閉各分散溪雲暗淡生悲端明日抱酲風雨急野蓮空看寄君難和潘叔治題劉道士房畫薛稷六鶴圖啄食窮年見俯啄但有飢乏意雖存玉山禾不入丹青喙因思方朔嘲此豈優諧類顧步舉足徒有勢行沙遂無蹤回頸誠巳久未知竟何從安能見儔侣顧望自顒顒唳天引吭向層霄聲聞期在耳鼓吻意豈踈知音何巳矣安得九臯同流響入萬里舞風如逢仙圃風飄颻奮雙翅拊節余欲助和歌誰爾類但看矯然姿固於流雪異警露孤標近仙壇依約聞墜露儼如舉止揚稍見神爽悟曉月坐清軒寒添壁間素理毛六鶴皆不同初生薛公筆况茲刷羽者奮迅如天質墨客懷賞心題詩仍我率留題毗陵潘氏宅假山人心本好靜世事方擾擾丘壑未去時庭中結山小長欲見蒼翠何須聽猿鳥有志同尚平當期婚嫁了觀居寧畫草蟲古人畫虎鵠尚類狗與鶩今看畫羽蟲形意兩俱足行者勢若去飛者翻若逐拒者如舉臂鳴者如動腹躍者躍其股顧者注其目乃知造物靈未抵毫端速毗陵多畫工圖寫空盈輻寧公實神授坐使羣輩伏草根有纎意醉墨得巳熟權豪不可致節行今仍獨和頴上人南徐十詠鐵甕城塹江以為池增山以為壁鐵甕喻其堅金城非所敵前朝經喪亂曾是輕鋒鏑覽古一徜徉空聽漁浦笛北固山山勢自北來高城倚為固當時偶登臨邇者遂淪誤微雲思作雨古樹嘗霑露今非恃險艱草木藏狐兔京口水江頭潮正平日照土山口坐見逺來舟高帆忽前後將隨入浦風稍度遙圻柳客無南北虞信是承平久金山寺山與衆山殊寺非諸寺擬無靣不當江有林皆照水南泠隔吳會北渡通楊子還看上下帆日日何常巳望海樓嘗聞觀蹄涔詎識海水大浩浩與天同淹淹衆流會平吞江作練逺瀉河如帶終日郡樓間欲取長鯨鱠季子廟信如季子賢自昔知能幾依約有荒祠寂寥無奠篚壞梁生濕菌古木慿山鬼英靈豈顧茲青史辭亹亹鶴林寺松竹暗山門颼飀給青吹傳聞宋高祖舊宅為茲寺地以黑龍升經因白馬至何必問興亡山川應可記夫子篆季札墓傍碑古稱尼父篆始沿春秋義十字固莫淺磨𫾣任牧童侵剝因野蘚嗟爾後之人萬言書不顯甘露寺山頭百畝宫庭下千年樹在昔甘露霏嘗疑神物護隂連殿閣寒聲撼雷霆怒瞻影衛公堂英魂想來去范公橋謂公天下才非專一方惠及此作輿梁力行無巨細既異國僑為將同傅巖濟礱石亘長川寧須伐山桂邵伯堰下王君玉餞王仲儀赴渭州經略席上命賦未破河西冦朝廷尚有憂淮南命儒帥塞上足封侯莫擐黃金甲須存百勝謀昔嘗經黠虜今去正防秋悼亡三首結髮為夫婦于今十七年相看猶不足何况是長捐我鬢巳多白此身寧久全終當與同穴未死淚漣漣每出身如夢逢人強意多歸來仍寂寞欲語向誰何窗冷孤螢入宵長一鴈過世間無最苦精爽此銷磨從來有修短豈敢問蒼天見盡人間婦無如美且賢譬令愚者壽何不假其年忍此連城寶沉埋向九泉淚平生眼中血日夜自涓涓瀉出愁腸苦深於浸沸泉紅顏將洗盡白髮亦根連此恨古皆有不須愚與賢秋日舟中有感天乎余困甚失偶淚滂沱世事隨時逺秋風順水多鰥魚空戀穴獨鳥未離柯歲月都無幾存亡可奈何兒嬌從自哭婢騃不能呵巳覺愁容改休將舊鑑磨弊衣留暗垢殘藥恨沉痾斗猒驅驅役終期老薜蘿書哀天既喪我妻又復喪我子兩眼雖未枯片心將欲死雨落入地中珠沉入海底赴海可見珠掘地可見水唯人歸泉下萬古知巳矣拊膺當問誰憔悴鑑中鬼宛陵先生集卷第十宛陵先生集目録卷第十湖州後詩剡縣臧主簿余令之會稽新昌傳神恱躬上人文曜師之南徐芝上人歸姑蘇唐寺丞知南雄和孫朱二公見寄謝尉西歸陳浩赴福州幕示沈生和潘叔治遊何山張法曹歸闕送張叔展北歸和叔治晚見梅花僧院枕流軒惱儂相逢檣烏過華亭月暈逢謝師直回自青龍呈師直青龍海上觀潮社前水次髑髏葉大卿挽詞寒食陪南園牡丹惜春三首花娘歌程山人歸飲重過南園送滕監簿歸寧寄題千步院早夏陪登疊嶂樓得孫仲方畫美人塗次寄羅道濟和潘叔治六鶴圖啄食顧步唳天舞風警露理毛留題潘氏假山觀居寧畫草蟲和頴上人南徐十詠邵伯堰下悼亡三首淚秋日舟中有感書哀目録終
