  text: 宛陵先生集卷第二十八
  hash: sha256:0e9302d70fdb7bd6b2891dc5d344a4646c4654fab7e7d8083d1bdd5d812c4c67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_028-1a}
body:
  text: 宋宛陵梅堯臣聖俞著和資政侍郎湖亭雜詠絶句十首遠山挿雲千萬重一望不可暫前嶺與後峰翠色濃復淡蓮塘不畏塘雨急鈿葉自相遮紋禽忽驚去衝落波上霞漁潭烟潭深不極鑑碧無菱花日脚下波心澄江見魚蝦稻畦淺淺碧水平靑靑稻苗長偏知楚客愛白鷺飛下上苔徑林間夏雨滋復有斜陽照緑淨不揺風從教春草笑流泉石齒嚼寒聲𥻘𥻘縈曲處有時浮落英又過城根去小橋伐桂向芳洲跨波灣勢小時愛㳺人渡㳺人在林杪漁艇古木刳爲舟野藤牽作纜釣人寒雨中遠望烟蓑暗採菱紫角菱實肥靑銅菱葉老孤根未能定不及寒塘草汀鷺食魚日巳晚矯翼烟際還不與鴈鶩競風標亦自閒王德言夏日西湖晚歩十韻次而和之雨餘殘照在塘靜獨行行荷積水珠重天收霓帔輕倦禽依卧柳聚蚓殢拗泓㡌側林枝礙裳褰野蔓縈芡韜園客剥蒲刃水祅驚決決流泉活濛濛夕霧平榴房生蠧落蛛網害蟲成坎黽無時怒渾魚自樂清高臺從獸窟古道有根横寫景未能就姢姢月上城新沼竹軒作軒仍見竹蕭灑排青幢斜烏與落月靜影畵寒窓光沒影亦没激水自淙淙夜深猶讀易誰更憶清江麥門冬内子吳中手植甚繁鬱罷官移之而歸不幸内子道且亡而茲草亦屢枯今所存三之一耳遂感而賦云香草葉常碧本生嵓澗邊佳人昔所愛移植堂堦前自吳北歸梁復以盆盎遷佳人路中死此草未忍捐與我日憔悴根不通下泉勤勤爲澆沃稍見萌頴鮮終當置墳側長茂松栢埏野鴿孤來有野鴿觜眼肖春鳩饑腸欲得食立我南屋頭我見如不見夜去向何求一日偶岀群盤空恣嬉㳺誰借風鈴響朝夕聲不休饑色猶未改翻翅如我仇炳哉有靈鳯天抑爲爾儔翕翼處其間顧我獨遲畱鳯至吾道行鳯去吾道休鴿乎何所爲勿汚吾鐺甌孫曼叔暮行汴上見鶻擊蝙蝠以去語扵子野鶻性决裂所食唯獰飛小鳥不入眼拳發強弩機日暮未有獲豈擇大與肥瞥下攖蝙蝠去以塡腸饑休笑老鴟飽㗸得腐䑕歸寄宋中道爾書我不荅爾怒從爾罵天馬新覊時氣横未可駕儻我一日死爾豈無悲咤唯知道義深小失不足謝梨花憶欲問梨花發江南信始通開因寒食雨落盡故園風白玉佳人死靑銅寶鏡空今朝兩眼淚怨苦屬衰公畵竹枝扇石上老瘦竹忽在紈扇中執之意巳凉不待揺清風小節未見粉淚痕應合紅日將炎暑退畏蠧生秋蟲兩日苦風思江南擺磨萬木聲朝吼暮不止吹沙作雲飛物狀顏色死還念江上山落瀑鳴幾里茅茨松竹間翠的門前水下窺石穴魚出入數十尾是時殘照微古路誰家子羸馬入烟林區區何若此昔笑今已迷薄官正如彼何當歸去來臨流重洗耳送謝師厚歸南陽竹舘蔭以風灑水坐猶熱念子遠歸時焦烟起車轍落日原上微鳥棲人欲别我心明月在相照異盈缺資政王侍郎南京畱守百世興王地乘時巳建都離宮萬戸寄京邑四方模尹以名臣擇朝仍宿哲俞果資卿屬重將俾國人蘇迎餞車交轍奔馳士結途許嗟人惠奪宋遲德恩敷日月天闈近山河地勢趨壓城隋柳密開苑漢池枯文物希前代謳歌得大儒鄒枚跡雖古賔從豈今無送通判太愽相見不在乆見乆未必親無爲歲月淺豈不膠漆均猶嗟欲别日事疉如排鱗安得獨携酒遠送秋水濵和韓子華桂花莫以天下桂皆爲月中物猶言月有兎野豈無狡窟空山桂花多艷色粲然發樵客不知貴柰何薪㸑屈宿安上人門外裴如晦胥平叔來訪胥裴喜我至冐雨夜出城燈前相對語怪我靣骨生爲言憔悴志因意多不平亦見子頷鬚長黑巳可驚知子有所立毛髪隨世情子心且如舊後軰苦前輕宋中道失小女戲寛之宋子失汝嬰苦將造物怪造物本無惡爾責亦巳隘且如工作器寧復保存壞收淚切勿悲他時多壻拜刁經臣將歸南徐許予㝷隱居之所及亡室墳地因走筆奉呈欲居江上江試與問京峴嘗觀鮑家詩心慕巳不淺行當卜結廬依農事淸畎傍葬吾先妻同穴晚未免買谷勿險深求岡要平顯松竹應所宜蒿萊預教翦我志决不移君言幸須踐尉氏縣阮籍嘯堂古城多瘦棘莾莾連荒臺不見長嘯人黄土空崔嵬北顧蓬池上枯廢生蒿萊當時思大梁還望已徘徊今我復懷昔豈不傷且哀鳥呼有遺響英靈同土灰送趙仲寶永興乾耀提舉捉賊知君少以勇曾向蕭關戰横刀突虜圍奪馬傷湖箭當時獨免歸猛毅邊人羡今來提漢卒㓂盗淸秦縣未足賀功名功名它日見合流河堤上亭子隔河桑榆晚藹藹明遠川寒漁下灘時翠鳥飛我前山藥植瑣細野性仍所便令人思濠上獨詠莊叟篇早至頴上縣夜發曉未止獨行淮水西明知寒草露暗濕痩驄蹄半滅竹林火數聞茅屋雞秋天畏殘暑不爲月光迷欲陰鸜鵒知天風鵓鴣知天雨途路猒塵昏車馬煩泥阻陰仍老易覺體質預辛楚安坐與壯年愼勿忘酒脯正陽驛舍夢鄭并州寄書開之卽三山圖也我來淸淮側夢得鄭公書開書一把玩乃是三山圖山形雄且邃筆畫簡而踈𥿄幅不盈尺萬仞勢有餘卷置懷䄂中意獲窹巳無新婚前日爲新婚喜今復悲昔閫中事有託月下影免隻慣呼猶口誤似徃頗心積幸皆柔淑姿禀老蟹飽經霜紫螯靑石殻肥大窟深淵曷虞遭食沬香餌與長絲下沉寧自覺未免利者求濳潭不爲邈取􅒕東灣暖無沙有􅒕淵泥下輕舠復翠竿預致曾誰捨刳肉不知數持爲楚鄕鮓嗜味固足珍况亦椒橙假頴水費公渡觀飮牛人渡口飮牛歸村墟夕陽裏黄犢未及群抱帶過寒水利心乃如仁耕領破不止當時彼何高獨能譏洗耳頴水頴水苦流瀑淺平秋與冬岸深開地勢底碧寫天容道枉隨灣去村遥盡日逢迷魚是潭曲寧見窟蛟龍打魚挿葦截灣流寒魚未能越安知罟師意設網遮其闕不須芳餌懸何待淸歌發所獲勝輪竿寧聞憂澤竭八日就湖上㑹飮呈晏相公明當是重九黄菊還開不先將掇其英秋逕未能有頽齡無以制但不負此酒紅頰誰使歌公憐牛馬走九日擷芳園㑹呈晏相公今日始見菊雖見未全開猶勝昔無酒持望白衣來破纇浮金英雜蟻巳盈杯何必探丹茰結佩上高臺自不愧佳節安聽飛鴻哀謝晏相公刻意向詩筆行將三十年嘗經長者目未及古人肩昔慕荀文若多稱王仲宣今慙此微賤重辱相君憐道中謝晏相公寄酒頳泥墨印幾壺醁將慰窮途阮歩兵一夜臨流對明月舉杯愁聽鴈來聲水苔深苔何所若苦詠費毫尖繞繞水僊髪茸茸蛟客髯緑縈秋石淨嫩值翠篙黏尚芼參差荇薄言無此嫌新鴈塞鴈與寒來夜落汀洲宿泊船人不寐月下聲相續依韻和晏相公微生守賤貧文字岀肝膽一爲淸頴行物象頗所覽泊舟寒潭隂野興入秋菼因吟適情性稍欲到平淡苦辭未圓熟刺口劇菱芡方將挹溟海器小巳㶑灔廣流不拒細愧抱獨慊慊疲馬去軒時戀嘶芻秣減茲繼周南篇短橈寧及艦試知不自量感涕屢揮摻以近詩贄尚書晏相公忽有酬贈之什稱之甚過不敢輙有所叙謹依韻綴前日坐末教誨之言以和嘗記論詩語辭卑名亦淪公曰名不盛者辭亦不高寧從陶令野公曰彭澤多野逸田舍之語不取孟郊新公曰郊詩有五言一句全用新字琢礫難希寶噓枯强費春今將風什付可與二南陳途中寄上尙書晏相公二十韻驚颷入林鴉亂飛舞空落葉相追隨秋權摧物不見跡但使萬古生愁悲登山臨水昔感别身作旅人安得宜單舟匹婦更無婢朝餐每愧婦親炊平生獨以文字樂曾未敢耻貧賤爲官雖寸進實過分名姓巳被賢者知踈愚生不謁豪貴守此退縮行將衰頴州相公秉道德一見不以論高卑乆調元化費精力猶且未倦刪書詩唐之文章剔蕪穢纎悉寧有差毫釐謂其躭學可與語便語淵奥祛佹疑浮言近意不歷口直欲海窟拏蛟螭再拜膝前荷勤誨垂槖稇載歸忘饑解艇水驛無幾舍新詩又遣牙兵持上言行李覽物景聊可與婦陳酒巵下言狂斐頗及古陶韋比格吾不私相公貴且事翰墨我輩豈得專逰嬉今將蒿芹薦爼豆定亦不以微薄遺嘗令有詠無巨細當因川陸舟車貽日對順流思疾置老魚姦怯濳鱗鬐舟中夜與家人飮月岀齗岸口影照别舸背且獨與婦飮頗勝俗客對月漸上我席暝色亦稍退豈必在秉燭此景巳可愛舟中行自采苟𣏌子野岸竟多𣏌小實霜且丹繫舟聊以掇粲粲忽盈盤助吾苦羸􅒒豈必採琅玕自異驕華人百金求秘丸昔聞王子喬上帝降玉棺此焉卽不免但願在世安蔡河阻淺陸乏百鈞駞水假孤艇進頴苦灣灘長曲折劇篆印蔡方阻淺涸寸歩出慳吝膠舟看在前暗磧礙難愼誰能使奡盪空自思禹濬丈夫少壯時必在馳駔駿黃駁維舟飯孤村隔岸見黃駁痩牧正苦饑瘡鳥復下啄閔心無柘彈投塊徒自數力小不能中汗顏慙且渥入澤王河口逺水路巳别古汊未窮源定知前山雨瀑泳至且渾暗生秋草下稍復夏潦痕更去待月上猶應可到門西華逢李令子翼適從頴水歸道逢西華長不見二十年顏鬚我非曩君問洛陽日舊友多泉壤更别如前時應復少吾黨合流值雨與曹光道飮秋風嚎衰林秋雨阻歸客頼有故時交舉杯聊岸幘談兵與論文曾不渉陳迹必竟無所施醉去思泉石寄送謝師厚餘姚宰我從淮上歸君向海澨去安知無幾舍邂逅不相遇頗知飛空雲到月不得附月行旣不畱雲亦值風故誠知會合難豈是忘所赴我雖躡新屩心不捨舊屨誰謂若世人食瓜思弃瓠君南我赴北日見陽鴈度茲欲遠寄音鴈行高且騖但誦金石言扵時儻無忤李密學遺苔醬脯云是自採爲之潩流寒且急岸草巳凋摧石髪尚堪把江人曾不來誰知烏榜去畱採碧潭隈持作吳鄕味能令案渌杯宛陵先生集卷第二十八宛陵先生集目録卷第二十八和資政湖亭雜詠和王德言夏日晚歩新沼竹軒麥門冬野鴿孫曼叔汴上見鶻寄宋中道梨花憶畵竹枝扇苦風思江南送謝師厚歸南陽王資政京南留守送通判太愽和韓子華桂花宿安上人寛宋中道失小女呈刁經臣阮籍嘯臺送永興趙提舉合流河亭早至頴上縣欲陰正陽驛夢新婚登舟諭鷗釣蟹取􅒕頴水費公渡頴水打魚八日湖㑹呈晏公九日㑹擷芳園謝晏相公道中晏公寄酒水苔新鴈和晏相公和酬晏公途中寄上晏公舟中夜與家人飮舟行自採苟𣏌子蔡河阻淺黄駁入澤王河口西華逢李令合流值雨與光道飮寄送餘姚謝宰李密學遺苔醬脯目録終
