front:
  text: 宛陵先生集卷第三十三
  hash: sha256:2e87f7f98668443175b16c188daaf98e0ca30b7e9e923537d3ea00a0ab18e077
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_033-1a}
body:
  text: 宋宛陵梅堯臣聖俞著五月二十夜夢尹師魯昨夕夢師魯相對如平生及覺語未終恨恨傷我情去年聞子喪旅寄誰能迎家貧兒女幼迢遞洛陽城何當置之歸西望淚緣纓五月二十四日過高郵三溝甲申七月七未明至三溝先妻南陽君奄化向行舟魂去寂無迹追之固無由此苦極天地心瞀腸如抽泣盡淚不續岸草風颼颼柎殭尚疑生大呼聲裂喉柁師為我歎挽卒為我愁戊子夏再過感昔涕交流恐傷新人心強制揩雙眸未及歸旅櫬悲恨何時休過茱茰堰茱茰堰在吳牛死茱茰堰廢吳牛間吳牛間東南百貨來如山詠歐陽永叔文石硯屏二首虢州紫石如紫泥中有瑩白象明月黑文天畫不可窮桂樹婆娑生意發其形方廣盈尺間造化施工常不沒虢州得之自山窟持作名卿硯傍物鑿山侵古雲破石見寒樹分明秋月影向此石上布中又隱孤壁紫錦藉圎素山祗與地靈暗巧不欲露乃值人所獲裁為文室具獨立筆硯間莫使浮埃度永叔進道堂夜話海風驅雲來池雨打荷急虛堂開西窗晚坐涼氣入與公話平生事不一毫及初探易之奧大衍遺五十乾坤露根源君臣排角立言史書星瑞亂止由不戢巨惡參大美微顯豈相襲陳疏見公忠曾無與明執文章包元氣天地得噓吸明吞日月光峭古崖壁澀淵論發賢聖暗溜聞鬼泣夜闌索酒巵快意頻舉挹未竟天巳白左右如啓蟄贈劉謀閣副聲名赫赫在窮塞眉宇堂堂真丈夫腰劒臂弓輕赴敵無人不伏魏黃鬚長蘆江口風駕晚潮急浪頭相趂過水歸瓜步小船下秣陵多鷗舞不停翅燕飛輕帖波今來學楚客薄暮愛漁歌金陵懷古秦莫恃棧閣吳莫恃塹江不能恃以德二國竟亦降邇來屢興廢由險輕萬邦誰知荒涼城空存如刳腔我今經其下弔古語愧哤嗟哉石頭潮助怒常舂撞江畔江畔菱蒲碧無主吳牛夜𩥇江干歸舟人不悟月巳上花腳野蚊撩亂飛慈姥山石崖上竹鞭江水浸石壁峭直無鳥蹤穴垂青竹根瘦蛇愁作龍霹靂雨腳入濕點莓苔封世人不得用八馬今乖慵阻風老漁吹浪不肯休一夜南風打籬響灘下輕舟未可行山腳盤渦似車輞慈姥磯下蘆汀泱漭外露斂見孤嶂行舟每出觀漸近巳殊狀傍來認飲牛正去忽側盎水壑隂若舂野鳥時與相且待風色回出口始浩蕩早發吳雞鳴隔山江月半在水齧齧出岸潮霅霅入蒲葦解作泛明鏡接天知幾里我家今不遙正住句溪尾望夫石征骨化為塵柔肌化為石高山共蒼蒼臨水望脈脈青雲卷為髮缺月低照額千古遺恨深終不見車軏過褐山磯值風山口風偏急磯頭水似煎喧聲殊倦聽逆上正難牽暗石誰愁礙長途未擬前江心看白浪卷起大於船褐山磯上港中泊風惡舟難進聊依浦裏村岸潮生蓼節灘浪聚蘆根日腳看看雨江心漸漸昏篙師知蟹窟取以助清樽宿磯上港夜深風浪息月正在南斗逺水生白煙迹螢出荒莽照蟹屢爇薪張魚未發笱獨能憐野客遊宦意何有謁昭亭廟連峰到溪止澄溜向潭瀉廟道走山腰雀雛鳴屋瓦古壁畫雲雷空庭儼輿馬眷豫來故鄉潔齋陳奠􅕌尚想昔丱童維愚託民社每從諸父賽朅至此祠下今齒踰不惑雙親世似寡過此無所禱曷慕逢時者昭亭潭上别行舟晚解去親戚各還家淚落正濕衣腸翻如轉車借是昭亭水相隨亦有涯豫今遊宦意曾不學匏瓜宣州環波亭冒暑駐輪轂徘徊北壕上棟宇起中央芙蓉生四向今吾太守樂慰此郡人望雨從昭亭來水入句溪漲蜻蜓立欄角朱鯉吹荷浪岸木影下布水鳥時引吭心間不競物興適每傾釀薄暮詠醉歸陪車知幾兩昭亭山曰山何必高要在出雲雨昭亭非峻峯雄雄若蹲虎旱歲一來祠霈然隨瀝酤有草牧爾牛有薪資爾斧有溪出其隂有潭在其塢獸則貛與貉魚則魴與鱮山雛水羽聲下上相雜伍呼名如謙恭號呌若怒侮崖竹惑節踈嶺松或腹腐巨蜂結層房養子窟深土何事山中人采以為市賈其容固巳多其忍吾未取泊姑熟江口邀刁景純相見時陳州晏相公辟尾生信女子抱柱死不疑吾與丞相約安得不顧期徘徊大江側念此親相知欲留時巳晚欲去情難持引領望軒車豈能慰我思願聞下士禮無曰屈非宜見牧牛人隔江吹笛朝與牛出牧晝與牛在野日暮穿林歸長笛初在胯靣尾騎且吹音響未成雅隨風散逺近舉調任高下我方江上來平溜若鏡瀉悠悠經醉耳亦足發瀟灑苟能和人心豈必奏韶夏鄭聲實美好蠧情如剔剮况其荒敗迹亦又甚裂瓦南箕成簸揚寺孟詠侈哆我今留此詩誰謂馬喻馬依韻和歐陽永叔中秋邀許發運看取主人無俗調風前喜御夾衣涼競邀三五最圎魄知比尋常特地光艷曲旋教應可聽秋花雖種未能香曾非惡少休防準衆寡而今不易當永叔詩云仍約多為詩準備共防梅老敵難當與夏侯繹張唐民遊蜀岡大明寺秋葉巳多蠧古原看更荒廢城無馬入破冡有狐藏寒日稍淸逈羣山分漭蒼田衣指白水此下是雷塘寄麥門冬於符公院佳人種碧草所愛凌風霜佳人昔巳殁草色尚蒼蒼陸行載以車水行載以航于今五六年與我道路長思人不忍棄期植寒冡傍我嗟復北去安得畢此喪留植精舍中逺挈防根傷他時京峴下不比野蒿黃送張唐民楚甸有行客西風一孤舟逺隨淮月上若與星槎浮野岸襲幽芳氣淸露巳秋得意美魚蟹白酒問沙頭秋夜同永叔看月青天有右目昏明不常開常時翳雲氣古鑑生莓苔秋夜特清徹乃顧漸西回靈兔不搗藥是夜無纎埃與君玩流景置酒臨層臺單衣濕白露鳴鴈方南來以言歡未終鴈聲一何哀中秋不見月答永叔天嫌物兼美而使密雲藏巳向石屏見何須照席光和永叔中秋夜會不見月酬王舍人主人待月敞南樓淮雨西來斗變秋自有嬋姢侍賓榻不須迢遞望刀頭池魚暗聽歌聲躍蓮的明傳酒令優更愛西垣舊詞客共將詩興壓曹劉觀永叔集古録古碑手集一千卷河北關西得最多莫怕他時費人力他時自有錦蒙駝觀舞坐上作誰憐嬌小好腰支老大而今莫那伊太守風流未應淺更教多唱楚人辭留别永叔舊友競留連我征時巳晚但言會合難豈道行路逺行路到有期别離未即返明當各相思念此去且懶觀永叔畫真良金美玉不可畫可畫唯應色與形除却堅明盡非寶世人何得重丹青畫真來嵩廣陵太守歐陽公令爾畫我憔悴容便傳髣佛在縑素尸欠徑直藏心胸與我貨布不肯受此之醫卜曾非庸公今許爾此一節爾只丹青其亦逢别後寄永叔前日辭親淚又為别友出愁極反無言欲言詞巳窒荷公知我詩數數形美述茲道日未堙可與古為匹孟盧張賈流其言不相昵或多窮苦語或特事豪逸而於韓公門取之不一律乃欲存此心欲使名譽溢竊比於老郊深愧言過實然於世道中固且異謗嫉交情有若此始可論膠漆登楊州北門樓上山如淡墨畫城中水似輕藍挼楊州今似刀州景似聽中和樂職歌因目痛有作巳為貧孟郊拚作瞎張籍詩句但口吟世事不眼歷既能分好惡難用變青白讀書聽吾兒且未廢朝夕宿邵埭聞雨因買藕芡人回呈永叔秋雨鴈來急夜舟人未眠亂風燈不定瞑色樹相連寒屋猛添響濕窗愁打穿明朝持藕使書此寄公前寄許主客昨日山光寺前雨今朝邵伯堰頭風野雲不散低侵水魚艇無依尚蓋蓬藕味初能消酒渴蓼芳猶愛照波紅楊州有使急回去敢此寄聲非塞鴻八月二十二日回過三溝不見沙上雙飛鳥莫取波中比目魚重過三溝特惆悵西風滿眼是秋蕖牛背雙鸜鵒牛背雙鸜鵒煙陂共入時草枯行解美日晚趂羣遲間載寧辭逺相鳴不間雌初驚牧人去飛上野桑枝廣陵歐陽永叔贈寒林石硯屏磷磷石屛上濃淡樹林分隔水見寒島暗枝藏宿雲賢哉吾益友持以贈離羣琥珀不須問中心多化蚊岸貧無能事耕穫亦不有雞豚燒蚌晒槎沫織蓑依樹根野蘆編作室青蔓與為門稚子將荷葉還充犢鼻裩村豪日擊收田鼓時稱大有年爛傾新釀酒飽載下江船女髻銀叉滿童袍毳㲲鮮里胥休借問不信有官權晚雲黕黕日腳雲斷續如破灘忽舒金翠尾始識秦女鸞又改為連牛綴燧懷齊單伺黑密不囂額額城未剜風吹了無物猶立船頭看荇荇葉光於水鉤牽入逺汀淺黃雙蛺蝶五色小蜻蜓老死懷江女飄浮笑楚萍西風莫苦急孤蘂有餘馨晚日晚日晴還暖人間見物機葉枯蟲自褁窗響蜜尋歸林下見收柿水邊聞搗衣吾嗟久為客却愧寄荆扉寄酬發運許主客淮上秋來物意間又乘輕舸信帆還一浮一沒水中鳥更逺更昏天外山斜幅纒踍兵吏至濃金灑𥿄頷珠頒欲酬巳覺不能敵盡日臨風思自慳前日前日楊州去酒熟美蟹蜊秋風淮隂來沙暖拾蚌螄不言爾貧富只繫其鄙夷漢重二千石後世何忽之淮隂青環瘦鐵纜繫在淮隂城水脛多長短林枝有直橫山夔一足走妖鳥九頭鳴韓信祠堂古誰將跨下平哀王孫泗水赤龍將欲飛瘦蛟在泥雲未歸冰繭煮灰寒水擊長大王孫抱飢色誰知適自下鄉來日昊可哀猶未食菰飯白漿持與君王孫王孫何復云沛公歌赤帝醉提龍劔行徑草沒人壯士驚白蛇斷裂不可續神嫗哀哀夜深哭酒醒自負氣生虹從者日畏天下雄秦皇玉輿來向東安知隱在芒碭中婦人自識雲氣從王命艱哉豐沛公宛陵先生集卷第三十三宛陵先生集目録卷第三十三夢尹師魯過高郵三溝過茱茰堰詠永叔文石硯屏永叔進道堂夜話贈劉謀閣副長蘆江口金陵懷古江畔慈姥石崖上竹鞭阻風慈姥磯下早發望夫石過褐山磯值風褐山磯上港中泊宿磯上港謁昭亭廟昭亭潭上别宣州環波亭昭亭山泊姑蘇江口邀景純牧牛隔江吹笛和永叔中秋邀許發運與夏張遊大明寺寄麥門冬符公院送張唐民秋夜同永叔看月答永叔不見月和永叔中秋夜會觀永叔集古録觀舞留别永叔觀永叔畫真畫真來嵩别後寄永叔登楊州北門因目痛有作宿邵埭呈永叔寄許主客回過三溝牛背雙鸜鵒永叔贈石硯屏岸貧村豪晚雲荇晚日寄酬許發運前日淮隂哀王孫沛公歌目録終
