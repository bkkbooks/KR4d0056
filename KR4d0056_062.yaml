front:
  text: 宛陵先生集拾遺
  hash: sha256:e3d8ab9ea81af34cd1b449669d8787cfd1d9dfed4af0ce3558b32f3678cac31f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_062-1a}
body:
  text: 得餘干李尉録示唐人干越亭詩因以寄題餘水之干越之鄙築基相對琵琶尾琵琶日日有秋聲鴈過洞庭風入葦南斗戞湖波不起長刀剡峰碧耳耳姱娥夜出在寒谿青銅瑩磨光幾里朝因吳客幅蒲輕滿𥿄如𧖟書可喜送君石祕校尉河内古縣太行下老槐三四株以言新作吏不似舊爲儒黃綬心猶壯青雲志豈無漢朝吾逺祖不道此官麤雙羊山㑹慶堂記余以附城之地勢勝神靈所栖故建閣曰寶章以嚴帝書爲堂曰㑹慶以安吾先君先叔畫像有僧澄展願歲時奉香火澄展先叔於其有恩雖然抑之不欲背本堂之前許其置佛俾報恩奉佛兩得焉况吾之親域在其右欲因以固護初余一發意吾鄕孝子義士咸助以資噫愛人之愛親者知其有親也不愛人之愛親者知其不有親也不有其親則孟子所謂慕少艾慕妻子慕君者歟余老矣慕親而不可得見見墳傍之草樹不敢慢常若吾親髣髴在其下唯恐令傷一草樹切切焉不忍去欲常居此則業爲王官欲致爲臣又無以自給僧能專事藉以守之守之必精㓗其宇無令棄俗趣而樂處之余之存心者此耳堂之經畫始終由吾里人張景崇景崇力爲之者愛吾有其心以吾貧不能自爲也衆人亦由景崇然後從而愛之愛他人之愛親者於其親可知矣吾不得不書以示後人知吾鄕之多禮義又書其姓于石隂至和二年八月初吉宛陵梅堯臣記
  hash: sha256:c078b73fb65c3d16347d4af03413c0e60aad1105bf173e7ddfbd33e3a821a101
