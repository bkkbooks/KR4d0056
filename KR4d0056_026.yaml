front:
  text: 宛陵先生集卷第二十六
  hash: sha256:8e46ac3c40b858e1331ec6876886d8ff1a247c09967300c4cffa1e9110b6b6cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_026-1a}
body:
  text: 宋宛陵梅堯臣聖俞著李廷老自蔡州見訪云明日便歸鄭故人夜相過秉燭為開席車馬立在門樽酒豈暇索亹亹别後言匆匆恨將適既去暝色合不可見行迹墨竹許有盧娘能畫竹重抹細拖神且速如將石上蕭蕭枝生向筆間天意足戰葉斜尖點映間透勢虛粘斷還續粉節中心豈可知淡墨分明在君目江寧李諌議滄江石頭下沄沄瀉天東寒潮日夕至不與廢興同陛下始封地氣象常鬱蔥六代有舊迹物景付與公切莫負山水可追王謝風方在許昌幕內弟滁州謝判官有書邀余詩送近聞歐陽永叔移守此郡為我寄聲也從事滁陽去寄音苦求詩吾詩固少愛唯爾太守知不敢輒所拒勉勉作此辭山城本寂寞物色同淮夷淮俗舊輕僄未識遠博宜無將麟在郊便欲等文貍爾去事太守當矯庸庸為伊人道義富嘗立天子墀我輩在蟻垤難謂太華卑又若遊蹄涔安見滄海涯况于爾實親告爾爾勿疑送胥裴二子回馬上作陰陰雪雲低遊子去將懶豈惟逰子倦疲馬行亦欵送罷我獨還回看鴈為伴念此日暮時寂寞閉竹館𥘉冬夜坐憶桐城山行我昔吏桐鄉窮山使屢躡路險獨後來心危常自怯下顧雲容容前溪未可涉半崕風颯然驚鳥爭墮葉修蔓不知名丹寶坼在莢林端野鼠飛緣挽一何捷馬行聞虎氣竪耳鼻息􅫆遂投山家宿駭汗衣尚浹歸來撫童僕前事語妻妾吾妻常有言艱勤壯時業安慕終日間笑媚看婦靨自是甘努力于今無所懾老大官雖暇失偶淚滿睫書之空自知城上鼓三疊和平叔道傍竹野田有修竹叢踈飽于霜下上乏佳禽左右雜枯桑豈無行路子行路猒榛荒忽見此翠色徘徊未能忘車馬去何疾回顧隔山岡答裴如晦懷我歌我辭乃知行子倦音雖彼妙發想若此可見歌竟夜燈靑野窗鳴濕霰髣佛聞孤鴻飛急應有羡夜酌趙侯家聞合流曹光道詣府遂訪之一夕縱談明日光道赴本任邀余詩送因敘其言以贈焉方與舊將飮談兵燈燭前聞有故交至心喜輒論邊跨馬踏明月往見競留連且共語出處子懷豫久然男兒太平時功業未可先故當守詩書道義躋古賢苟復不得用卷以放林泉吾藴誠若此奈何貧所纒仕宦偶同郡文字可以傳行行志茲語聊用樂永年暮雪暮雪止復落暗積如避人平明視庭中物物各巳新草木一變妍枯稿忘其真隨風來無迹高下得以均采薇歌卒章霏霏霑車輸今豈無是作勞苦不足陳西湖對雪獨玩湖中雪移舟水凍灣寒塘起孤鴈危樹失前山著物偏能積衝風不礙還無慙子猷興都盡剡溪間依韻和資政侍郎雪後書事風旗冷落偏欺酒衆樹芳菲欲並梅人意不知南畝望只驚鴻鴈向川來王龍圖知江陵捧詔出荆州天心寄遠憂行車踐殘雪寒色犯輕裘祖軷山川闊歌驪道路愁吏迎多越乘兵衛粲吳鈎地與蠻溪接江通漢水流風宜橘林賦俗尚竹枝謳樽爼思疇日煙雲感舊遊終當勞侍從寧久渚宮留依韻和通判太博雪後招飮二首雪晴何所樂樂趣在杯中况復君家美雕盤膾縷紅邀飮奏醴醪案杯烹蟹螯吾非獨醒者莫誦楚人騷依韻和資政侍郎雪後登看山亭湖上晴煙凍未收湖中佳景可遲留更臨危樹看群岫雪色嵐光向酒浮雪中通判家飮回時一卒彈胡琴朔風聲滿枯桑枝陰雲不定蛟龍歸凍禽聚立高樹時密雲萬里增寒威訪君留連舉酒巵胡琴奏罷歡巳微小駒跨去沒四蹄飄花凌亂霑人衣醉月遠望天地迷何暇更問孤鴻飛茅屋豈無單且飢平明共賀麥壠肥雪後資政侍郎西湖宴集偶書潭心不凍處鴈鶩自相依積雪正無際因風忽起飛初驚如避弋復下信忘機偶得從公飮聊書此景歸近有謝師厚寄襄陽柑子乃吳人所謂緑橘耳今王德言遺姑蘇者十枚此真物也因以詩答荆州持大橘亦自名黃柑忽得洞庭美氣味何可參遂生吳洲思恨不羽翼南運使劉察院因按歷歸西京拜省在昔志四海所遇非一途朝以言悟主夕即被金朱于茲亦未幾用直升雲衢臺分東西屬御史從子除天馬日千里豈並局促駒朔北遏亂萌褒嘉賜璽書乃衣漢使繡威譽傾國都借問世上榮萬國與此殊明朝歸洛陽聊且餞高車亭堠况非遠春郊無疾驅余之親家有女子能點酥為詩并花果麟鳯等物一皆妙絶其家持以為歲日辛盤之助余喪偶兒女服未除不作歲因轉贈通判通判有詩見答故走筆酬之翦竹纒金大于掌紅縷龜紋挑作網瓊酥點出探春詩玉刻小書題在榜名花雜果能眩真祥獸珍禽得非廣礧落男兒不足為女工餘思聊可賞元日昔遇風雪時孤舟泊吳埭江潮未應浦盡室坐相對行庖得海物醎酸何瑣碎久作北州人食此欣巳再是時值新歲慶拜乃唯內草率具盤餐約略施粉黛舉杯更獻酬各爾祝鮐背咀橘齒病酸目巳驚老態豈意未幾年中路苦失配嘉辰衆所喜悲淚我何耐曩歡今巳哀日月不可賴前視四十春空期此身在世事都猒聞讀書未忍退過目雖巳忘寧捨心久愛何當往京口竹里翦荒穢行歌樂暮節薪菽井自刈通判遺新柳園柳發新荑官居雪尚壅君喜持報春衰意非舊勇芳菲即可插豫髮慙種種送孫曼卿鎖廳赴舉舊果豈非好截樹接新枝欲變明年花曾不根本移屈彼自然性曰茲山水卑子才寶艷富從為人所推固當升高科我送作此詩依韻和劉察院送客回過潩水馬上有作車騎踏春堤翛然思如濯望驄人自避解凍魚方樂拏流古樹根跨岸枯薪彴煙雲淡淡天嫩緑生叢薄不知夢夢中不知夢但謂平常時相與共笑言焉問久别離有贈若有得及覺已失之人生在世間何異夢寐為郟城道中行行溪水邊鏡碧不可唾安知有沫流草木多偃卧潭鳥瞥復沒灘沙淨如簸不獨荆州民居險頸癭大汝州後池聽水春水泉脈動分嵓臨澗源津津出石齒泠泠縈竹根猶和野雲翠復落郡池喧心靜意自適不知朝市煩春鳩鳴鳩識陰晦聒聒䳄逐雄鵲巢汝得共可蔽雨與風春物况不晚杏蕚巳半紅試看池館間燕雀隨西東留别汝守王待制仲儀來時柳未芽去見杏吐蕚相歡無幾日節候巳非昨邂逅二十年三遇三暌索會合信難常焉用計踈數夢覺夕夢多夢之覺來遂成憶憶子生平時事往無一得信若此夢寐豈不見顏色復存來告言言虛音匪默是覺曷為真覺夢可以惑汝州主人少聽我為言風土殊美哉靣有顙生此頸若壺噫號無冬夏歲禱無嗟吁只憐郡池上不異山林居逢牧國馬一何多來牧郊甸𥘉大群幾百雜小群數十驅或聚如鬪蟻或散如驚烏或踐麥無根或囓樹無膚牧卒殊不顧抱鞭人民墟欲酒與之飮欲食與之餔日暮卒醉飽枕鞭當路隅茫茫非其土誰念有官租寄滁州歐陽永叔昔讀韋公集固多滁州詞爛熳寫風土下上窮幽奇君今得此郡名與前人馳君才比江海浩浩觀無涯下筆猶高帆十幅美滿吹一舉一千里只在頃刻時尋常行舟艫傍岸撑牽疲有才苟如此但恨不勇為仲尼著春秋貶骨常苦笞後世各有史善惡亦不遺君能切體類鏡照嫫與施直辭鬼膽懼微文姦魄悲不書兒女書不作風月詩唯存先王法好醜無使疑安求一時譽當期千載知此外有井脆可以奉親慈山𬞞采笋蕨野膳獵麏麋鱸膾古來美梟炙今且推夏果亦瑣細一一舊頗窺圓尖剝水實青紅摘林枝又足供宴樂聊與子所宜愼勿思北來我言非狂癡洗慮當以淨洗垢當以脂此語同飮食遠寄入君脾衛州通判趙中舍我久在河內頗知衛風俗沙田多種稻野飯殊脫粟况聞别乘至佇望大河曲飮罷何以贈柔條路傍緑資政王侍郎命賦梅花用芳字許都二月杏𥘉盛公府後園梅亦芳因思江南花最早開時不避雪與霜主人惜春春未晚遂命官屬携壺觴酒行守吏摘花至素艷紫蕚繁于裝夭桃穠李不可比又况無此清淡香豈辭盡醉對顏色頻嗅競粘鬚蘂黃何時結子助調鼎我心舊職不敢忘歐陽永叔寄琅琊山李陽冰篆十八字并永叔詩一首欲豫繼作因成十四韻奉答我坐許昌塵土中山翠泉聲違眼耳公雖被謫守滁陽日少郡事窮山水東南有風西北來忽得書詩連數𥿄并寄陽冰古篆字字形矯矯龍蛇起其文乃只題姓名大曆六年春氣尾報云此篆無人知野僧好事為公指公留嵓下久徘徊公剔莓苔汲泉洗點畫雖然未苦訛霜侵風剝多皴理公疑鳥迹踏蒼崕山祇愛惜將有以雲藏至今不近俗月伴古源清且泚此石公知石不知公與前人定知巳墨模幾幅許傳玩譬于玦玉終可喜况復為詩刻其下句奇字峻驚山鬼何當少得從公遊為公揮筆寧非美依韻答范天民古今冠佩立朝人多作北山松下塵我愛蟠桃種來久開花結子不由春樊推官勸豫止酒少年好飮酒飮酒人少過今既齒髮衰好飮飮不多每飮輒嘔泄安得六府和朝酲頭不舉屋室如盤渦取樂反得病衛生理則那豫欲從此止但畏人譏訶樊子亦能勸苦口無所阿乃知止為是不止將如何依韻和通判二月十五日雨中仲春月既望物候恰分中窗聽五更雨花開前日風詩成止酒後病怯舉杯空短髮雖然黑心如一老翁感春之際以病止酒水丘有簡云時雨乍晴物景鮮麗疑其未是止酒時因成短章奉答東風固無迹何處見春歸土逐草心坼雨兼花片飛雖憐柔甲長只恐艷條稀君但惜晴景休言止酒非和永叔琅琊山六詠歸雲洞洞深豈不有神物朝朝但見雲飛還雲收雨歇草樹濕澗下流水空潺潺琅琊溪枯藤垂溪水巳消溪水濺濺石間亂潭靜鳥呼人渡時鳥驚人語來還散班春亭林下鳩鳴坼晴杏田間水漫春溶溶使君固自足風美時傍靑山去問農庶子泉沙穴石竇無限泉此泉緣底名不滅庶子去來多少年依舊清心共泉潔石屏路尋常畫屏多畫山何意此山還作屏峭排直上幾千尺下有石路莓苔靑宛陵先生集目録卷第二十六李廷老見訪墨竹江寧李諫議寄永叔送胥裴二子回憶桐城山行和平叔道傍竹答裴如晦夜酌趙侯家暮雪西湖對雪和資政侍郎雪後王龍圖知江陵和通判雪後招飮和資政登看山亭雪中通判家飮回雪後西湖宴集答王德言遺柑劉運使因按拜省答通判元日通判遺新柳送孫曼卿鎖應和劉察院送客回不知夢郟城道中汝州後池聽水春鳩留别汝州王待制夢覺汝州逢牧寄滁州歐陽永叔衛州倅趙中舍王侍郎命賦梅花答永叔寄篆字和答范天民樊推官勸豫止酒和通判雨中答水丘和永叔琅琊六詠目録終
