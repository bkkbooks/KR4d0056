  text: 宛陵先生集卷第十七
  hash: sha256:a4099009cfe26e7b5a7d4a89454ace4a60e1ce2905a9d4ce8c41839e97fca434
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_017-1a}
body:
  text: 宋宛陵梅堯臣聖俞著除夜雪擊鼓人驅鬼漫天雪送寒臘從今日盡花作舊年看著樹多還墮隨風積更乾明朝預王會畏濕兩梁冠和吳沖卿元會千官車馬閶闔來晝漏始上閶闔開峨峨左右升龍進昨夜雪飛雲作堆殿前冠劒魚鱗立東風入仗旗腳回黃鍾一奏寶扇掩玳簾捲起香霧排鳴梢未盡霹靂響翠輦已退黃金階聖人端冕御法座大樂旅作聲和諧群公抃蹈丹墀下尚書奏瑞四夷懷乘輿却入更衣閣通天絳袍升玉榻百拜稱觴萬歲聞兩廊賜食簪裾匝典傳太定舞綴踈波旋煙斂飭宮車衛官解嚴多士退日光停午氣象舒吳君才華天下傑歸來作詩傳石渠石渠祕邃無凡愚石渠酬唱皆嚴徐我慙短學復在後收餘掇棄聊以書元日頻年無入閽今日預朝元丹陛發金奏侍臣稱玉樽旗旌搖細仗雲霧啓千門却出蒼龍闕衣冠萬馬屯依韻和仲源暮冬曾未學黃庭衰顏巳可驚詩能如阮籍評不愧鍾嶸玉軫調初美冰壺想更清兔園風雪甚還聽鴈來聲送韓子文寺丞通判瀛州嘗聞河間守介直天下無選才才且殊鐡網收珊瑚珊瑚得亦難鐡網取亦劬况茲戎馬郊為二維多謨新春度滹沱冰上少馳驅十七日和原甫風花偶書用其韻風花不戀枝脫蕚亂翻飛自學空中雪寧同垣上衣繞庭靣旋久無著衆鳥爭御何處歸貽妄怒飮食無遠近所美貴甘軟南方食蝦蟇密捕向清畎齒咀口且諱聞語輒忿喘此物何醜惡猶勝螺螄蜆西蜀亦取之水田名榖犬彼士不為慙吳人休獨愐豈須若中州牛羊烹大臠十六日會靈火章聖皇帝興三宮三宮鼎峙何崇崇天聖七年六月尾玉清始災壇宇空于今二十有五載上元後夜星軫中乃聞會靈五殿火丹熖徹天明月紅千楹萬棟一夕盡赤煙奔突西南風先時二日車駕幸為民祈福輸清衷大臣驕蹇不從祀嶽靈不歆為不恭若此示變猶影響宜鑒陛下無惰容神非怒乙遂及甲天意警聖不警凶不獨洪水纍堯德堯仁未及流歡共送潘司封知解州鹽池暗湧蚩尤血紅波爛爛陽烏熱岸旁遺老記南風五月滿畦吹作雪白徑嶺上槖駝鳴太行山中騏驥􅒒古人射利今人同行商不困何由設朱􅙲太守自東來先世大夫留故轍是非取與應不移秦人休衒張儀舌飮酒呈鄰幾原甫天地不爭行日月不爭明晝夜自顯晦冬春自枯榮夸父逐日死共工觸天傾二子不量力空有千古名寄語賢與愚何嘗見長生我願會良友醉顏日常頳東海為酒樽五湖為杯羮海罄湖且竭盡倒為解酲苟死不復知苟生徒牽情項籍乘牛車馳上廣武城強梁取秦鹿慷慨猶為輕歸來卧酒家豈得慙公卿樂亦但如此舉世任營營寄渭州經略王龍圖西城槖駝來賀蘭入貢美玉天可汗蕭關夜開月團團彈筆古峽鳴哀湍前將軍不擐甲取大官今將軍能撫士尚盤桓河西五郡兵氣完駿馬躍棧無箭瘢我嗟乘劣不受鞍焉得乞與都人看二十一日雪中赴宿懷鄰幾原甫正月東都雪多於舊臘時酒賔臨逈閣野雀集枯枝馬向西城度花從上苑遲劉郎與江叟相對定爭棊送永興通判薛虞部灰宮盜玉秦樓空南山不老天無窮蘚碑剝爛少文字雨耕拾寶牛蹄中其旁築城聚貔虎黃土岌嶪如削銅西州吏人氣吐虹摧鱗斂角聽相公少年别乘勤爾躬幕府甚盛瓊瑤叢送宣州簽判馬屯田兼寄知州邵司勳寒溪翠拖碧玉帶蒼山晴卧蛻骨龍水邊苦竹抽肥笋石上老蕨拳紫茸泊船繫纜宿明鏡昭亭廟古攢瘦松隂風雨電潭心起雲遮北嶺如墨濃田秧浸緑白鷺立內史出喜嘉賔從昔時謝公來賽神蘭肴作椒金作鍾聮詩姓何名已失板蠧粉落蟲鳥蹤我鄉復傳召南化磨鏤黑石君亦逢觀拽龍舟懷裴宋韓李截春流築沙坻拽龍舟過天池尾矯矯角岐岐千夫推萬鱗隨驚鴻鵠沉魚龜春三月輕服時薄水殿習水嬉馬特特來者誰魏公子人不窺車轔轔集其涯邯鄲倡士交馳銀瓶索酒傾玻璃用錢如水贈舞兒却入上苑看鬪雞擊毬彈金無不為適聞天子降玉輦當門虎腳看大旗春風吹花入行紅錦百尺爭蛟螭雲蓋回綵纜維明年結客觀未遲二月四日雪前日春風初擺條昨夜雪飛深一尺北帝及臘不行令東皇發煦遭爾厄侵時奪氣四時錯歡問上天何不責天高地厚語難通俯首下土徒叩額或言莫信難可聞鶴鳴至微猶不隔休問天問顏跖休看花看壟麥答劉原甫生平多交友常恨會遇稀每念相笑語昨是今或非重惜向時遊出處若乖違從今儻有酒莫問梨栗微前夕呼我飮遣奴來扣扉暗犯風雪往醉脫冠服歸夜來新霽月清吐萬里輝劉郎戴幅巾江叟披褐衣相過無百步誰虞竊訶譏三家若循環但知具甘肥聞語十方璉長老舊居廬嶽寺新化給孤園還享國人供應無塵事喧有來聽喻筏一悟見吹幡不憶爐峰下臨溪看飮猿十一日垂拱殿起居聞南捷二月雪飛雞狗狂錦衣走馬回大梁入奏雍州破蠻賊絳袍玉座開明堂腰佩金魚服金帶榻前拜跪稱聖皇一朝嚴氣變和氣初令漏泄飛四方將軍曰靑才且武先斬逗撓兵後強從來儒帥空賣舌未到巳愁茆葉黃徘徊嶺下自稱疾詔書切責仍勉當因人成功喜受賞親戚便擬封侯王昔日苦病今不病銅鼓棄擲無鏢鎗十五日雪三首寒令奪春令六花侵百花塘氷膠燕觜野水澀芹牙擁柱輕于絮吹墀淨若沙乳禽飢啄木誰誤撥琵琶新雷奮蛇甲密雪鬪鵝毛正欲裁輕縠重令著弊袍沙泉流復凍煙蕚坼還韜只待鄰醅熟微聲聽酒槽春風九十日一半已銷磨凖擬看花少依稀詠雪多官車猶載炭菢鵲不離窠向此興都盡戴家誰復過聞密賜朝聞政府賀捷回夕賜明月五千枚巍巍聖皇德所該廟略付與何有哉况未覆穴翦渠魁宜先戰士老與孩傾肝瀝膽謝不敏豈可便恃張良才送衛真宰晏寺丞罷長安捨琴辭苦縣解劔入函關鵲報遠人至馬衝春雨還荒榛郊北囿蔥翠國南山歸見蕭何政條今舊鎬間江鄰幾饌鰌泥鰌魚之下曽不享嘉賔又嫌太健滑治洗煩庖人煎炙亦苦腥未嘗輒向脣江侯昔南官家膳無此珍昨日邀我餐下筯勝紫鱗乃知至賤品唯在調甘辛淘渠開春溝畎春泥五步掘一塹當塗如壞堤車無行轍馬無蹊遮截門戶雞犬迷屈曲措足高復低芒鞋苔滑雨淒淒老翁夜行無子携眼昏失腳非有擠明日尋者爾瘦妻手提幼女哭嘶嘶金吾司街務欲齊不管人死獸顚啼蓬生麻中麻畦無曲本蓬質有樛莖所托修仍直安能縱復橫擇鄰聞舊母益友記諸生蕭艾從兹遠蒿萊不可并何嗟蔣詡徑孰念衛人行儻匪緣其地秋風廣漠驚賣鹿角魚水中龍角而足海小魚角矗矗不擬龍乃擬鹿譬彼蝸抗繭犢漬以醎鹵久且醭特賣都市參鼎餗此人何苦猒豬羊甘爾臭味不飽腹夜與原甫江家步歸二十三日丹砂􅃮盤盛井水冷浸半坼山櫻花始見春色不奈喜黃昏招飮夜還家劉郎居南我居北陌上泥開天正黑風吹蠟燭燒未明素絲作履惜不得高陽關射亭星弧射狼夜夜張角弓備冦不可忘將軍屯師古關下不尚武力何由強日與兵官來會此弓須射硬箭射長更如羿中九烏斃獨見杲杲明扶桑京師逢賣梅花五首此土只知看杏蘂大梁亦復賣梅花此心還似庾開府不惜金錢買取誇驛使前時走馬回北人初識越人梅淸香莫把荼􅐘比只欠溪頭月下杯憶在鄱君舊國傍馬穿修竹忽聞香偶將眼趂蝴蝶去隔水深深幾樹芳曾見竹籬和樹夾高枝斜引過柴扉對門獨木危橋上少婦髻鬟猶戴歸此去吾鄉二千里不看素蕚兩三年移根種子誰辛苦上苑偷來直幾錢三月五日欲訪宋中道遇雪而止蝴蝶飛時雪鬪輕滿街掩亂得人驚欲尋宋子東城去馬畏春泥不敢行觀文丁右丞挽詞二首預政公槐亞談經帝席陳儉恭齊國相清淨漢廷人去夢嘗為蝶遺文不解麟一聞車馬幸豐賜及孤臣春風百花發露挽九原歸白馬悲鳴駐黃鸝下上飛壠邊新柏盛門外弔人稀獨見東牀客攀車淚濕衣廷老傳沛語戲作夷門市裏侯嬴老公子時能釋禮過莫問孟嘗招致客薛中遺俗尚應多送胥平叔寺丞赴洛單車細馬出虎牢春雲黕黕百舌嗥榖雨巳近花欲盡秉燭夜飮朝坐曹因君重思昔日歡醉筆狂掃嵩丘高于今零落二十載縱在各各歎二毛試採上陽何首烏刮切仍致苦竹刀俗情相望亦異此競欲折笋籠含桃送婺州通判徐殿丞赴上當在後年夏疾湍怒蛟龍不畏東風逆沄沄奔長淮千里在咫尺辭梁始及晨過宋尚未夕南州豈難到何處淹行迹三月十日韓子華招飮歸成清明曉赴韓侯家自買白杏丁香花雀眼塗金銀蔑籠貯在當筵呼舞娃舞娃取捧笑向客不顧插壞新烏紗朝來我舍報生子賀勸大白浮紅霞酒狂有持梧桐板暴謔一似鄱陽槎袒裼擊鼓禰處士當時偶脫猛虎牙𥚹衷不容又何益鸚鵡洲上空蒹葭送下第親舊花開風雨惡坐見紛紛落明日結子時又復有脫蕚莫嗟樹漸老樹老子亦著共愛西枝繁不數東枝弱他年會有春却看西枝薄燕一避吳宮火千年楚屋春翅迎風雨健聲入户庭頻掠水過長渚㗸蟲落覆塵休將漢皇后故故比輕身雨春雲易成雨一日幾廽陰燕濕飛猶快花寒色更深邀車愁客遠盤馬畏泥侵向晚晴光吐西窗緑影臨晴風掃天如鑑雲開日似萍苑花猶帶濕𬞞甲巳微青蝶翅粉應薄塘漘波更渟尋春不惜醉莫笑髮星星送胡公踈之金陵緑蒲作帆一百尺波浪疾飛輕鳥翮瓜步山傍夜泊人石頭城邊舊遊客月如冰輪出海來江波千里無物隔自古有恨洗不盡于今萬事何由白依稀可記鮑家詩寂寞休尋江令宅楊花正飛􅚝魚多食膾舉酒謝河伯但令甘肥日飽腹誰用麒麟刻青石去舸巳快風亦便寧同步兵哭車軛送裴虞部知信州攢青歷歷正靣山刺史日坐雲屏間楚人竟握水精璞漢女買作月珮環時惟産寶不重榖願當化俗無棄菅往辭丞相相有言物景清絶何由攀送李推官之嶽州崑崙燕子五兩竿霧露薄水平湖寒風帆美滿八百里夕從嶽陽樓上看魚跳鷺立月鉤下星斗爛爛垂欄干羽書不到樽爼裏蠻兵况去荆楚安試尋燕公舊賦筆磨圭刻碧獨可完和和之南齋畫壁歌終南下臨長安城峻欄高檻黃金嬴嵩山亦近洛陽陌鮮車怒馬一日程大梁平廣匝千里不見雲峰來眼底其間自有高趣人掃室呼工嵓壑啓初疑巨靈勇擘華不比將軍能聚米暗雨輕煙滿室中塵事如脂一朝洗又將餘力作修竹石上數莖風撼玉葉斜枝亞寒聲盡節老根獰生意足何須踐苔眠緑陰然後始為嵇阮公三賢歌詠巳見意舞女不看頻整簪嫣婦黃金一丸入雲端群貧望逐滿長安衆人為貴嫣不惜棄擲如泥資彈射藏身葉底有能鳴辜負春風拖雨翮不飛上天訴至珍幾人辛勤揀砂石送端式歸漳州來居天王都常夢苦竹溪乃識高僧趣不為利物迷海燕乘華屋區區竟㗸泥安知矯翼鷗豈類斷尾雞性同而質殊何必莊指齊送黃殿丞通判潤州前年江州飛火龍樓殿化盡山將鎔今聞榱棟復華壯大閣渠渠出波上南徐别乘簡且間下馬岸傍呼畫舫永日江風不畏人楫師猱獰欺白浪衣上京塵莫猒多斗擻中流雲在望㨂花紫絲暈粉綴蘚花緑羅布葉攢飛霞鶯舌未調香蕚醉柔風細吹銅梗斜金鞍結束果下馬低枝不礙無闌遮長陵小市見阿姊濃熏馥郁升鈿車莫輕貧賤出閭巷迎入漢宫人自誇次韻和端式見贈不為阮步兵發詠怨朝陽不學屈大夫行吟思搴芳其雨豈無時細佩空自香吾道不苟合我懷固有常江南一畝宅近在句溪旁仕官且如此夢寐安敢忘以子論言多重歌木桃章楊公藴之華亭宰月徑千里大中有神娥宫宫旁種玉桂柯葉垂瓏瓏蝦蟇穴其根出輒氣墨蒙光魄縱復吐血赤如頑銅不知從何時更使人蹤通年年折桂枝寬少尚易充今年拗都盡秃株立童童株秃莫爾攀墮雲雙手空歸來走海上買鶴問吳翁端午前保之太傅遺水墨扇及酒畫扇雙酒壼置前兵吏立言將國匠奇重以風義執樹石冰上看山河月中入便持菖蒲飮不畏青蠅及送汝陰宰孫寺丞艑郎唱櫓燕尾下頴水落日蛇鱗生緑蒲被岸漁網舉黃鳥啄椹繅車鳴吏無詬租官正來不借魴鱮與吏烹饋吏人情見里黨官非喜慢知官清和曇頴師四明十題雪竇山重雲不藏春深竇常有雪曉月號松猿晴壁挂海霓終恍無心人區區佩環玦龍隱潭老龍戀潭窟不雨亦不雲吐涎出溪滑吹腥隔林聞疾雷驅未去魚龞競紛紛含珠林山為驪龍蟠谷作驪龍腮珠樹存其間誰採明月來何須循海隅笑蚌未成胎偃蓋亭既將茅覆簷復有松為蓋五里入山時憩此得寒籟曾無康樂遊但見雲衲會雲外菴山僧好寂靜入雲恨不深峰間一雨昏林表孤燈沉往來有猿狖呼嘯自成音石筍峰巨石如龍孫聳聳煙霧裏明明落溪口納納喧灘齒何當助齋盂菌蕃徒為美宴坐巖智覺禪師于此不睡心危身亦危袵席尚顚墜如何嵓石上來坐自安意能喻死生間無論窹與寐三層瀑山頭出飛瀑落落鳴寒玉再落至山腰三落至山足欲引煮春山僧房架刳竹丹山洞山無鳯皇飛洞有仙人迹蝙蝠大如鴉莓苔偏上屐自慙無道骨安問緣雲客獅子巖嵓形若狻猊不能千里走豈無鳥獸群當假風雷吼寄謝棲息人想像真妄有宛陵先生集卷第十七宛陵先生集目録卷第十七除夜雪和吳沖卿元日元日和仲源暮冬見寄送韓寺丞和原甫風花貽妄怒十六日會靈火送潘司封知解州飮酒呈鄰幾原甫寄渭州王龍圖雪中赴宿懷鄰幾送薛虞部送宣倅馬屯田觀拽龍舟二月四日雪答劉原甫聞語十方璉長老垂拱殿起居聞捷十五日雪三首聞蜜賜送晏寺丞江鄰幾饌鰌淘渠蓬生麻中賣鹿角魚夜與原甫步歸高陽關射亭京師逢賣梅花欲訪宋中道丁右丞挽詞二首廷老傳沛語戲作送胥寺丞赴洛送徐殿丞婺州倅燕雨晴送胡公踈之金陵送虞部知信州送李推官之嶽州和南齋畫壁歌嫣婦送端式歸漳州送黃殿丞潤倅楝花和端式見贈楊公藴華亭宰保之遺水墨扇送汝隂宰孫寺丞和曇頴四明十題目録終
