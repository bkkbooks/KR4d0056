front:
  text: 宛陵先生集卷第五十九
  hash: sha256:0afc7b4437710b568596bdf42479a887ab9992f4563e8cd676ea7cbee2d6fc7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_059-1a}
body:
  text: 宋宛陵梅堯臣聖俞著陽武王安之寄石榴安榴若拳石中藴丹砂粒割之珠落盤不待蛟人泣舊友大河濵作宰寔畿色嚴霜百果熟爲贈怱我及始時童稚嬌爭取猴猿集老夫所食微何暇更收拾聊答君意勤作詩恨短澁寄致仕余少卿仕苦戀朝廷多爲老所逼朝廷雖愛賢不欲竭其力君歸頗得宜湖上遂偃息男能智自謨孫亦俛就職人事當置之自可樂胸臆和吳沖卿學士冬日私居事人知何晏宅近住白楊頭車馬不還徃詩書多蓄收風庭吹落葉霜樹立鳴鳩頗與市朝逺閉門凡幾秋和吳冲卿藏菜霜前收美菜欲以禦冬時備乏且增品挑新郍復思菖葅嗜西伯薑食語宣尼未免效流俗競將罌盎爲依韻和王景彞學士紫宸仲冬早謁朝開閶闔九重深望拜珠旒照玉簮霜氣稍廻龍陛峻日光微轉鳯樓隂庭中細仗穿旗脚案外薫爐對殿心我預千官少裨補欲將歌頌播堯音依韻和景彞謝予訪其居日暮乗羸馬因過太史家竹牎談脫麈槐樹暝栖鴉邦瘁稽前詠人亡起彼嗟夜分歸不寐猶照角中斜其日聞石昌言卒哀石昌言舍人三首十一月二日朔日望顔色衣冠朝帝閽西靈未生魄東岱巳收䰟弔哭新居啓封題舊篋存善人吾不見何可問乾坤聖賢無不死壽夭復何云唯有名常在其餘理莫分朝榮金玉寶暮殞蕙蘭焚今日寢門哭緒言長絕君賈誼過秦畢相如諭蜀歸二人名旣大一日命何微痟似烏常渴災成鵩不飛百年今巳矣冰結淚霑衣鄭州王宻諫漱玉齋渠渠梁照日泯泯水分京激作飛巖勢流爲雜佩聲圗書無近蹟草樹有冬榮景落人間處漂花出古城書李學士北使集後蘇武艱窮只四篇五言風格到今傳節旄零落都無詠枉在胡中十九年送李學士河東轉運重持使者節北上太行行未注螭頭筆來賙塞下兵朱轓邦伯至黃綬縣官迎臘雪臨關宻宵烽出堠明山川壯汾晉戎馬說幽拜此部多才俊其人不易輕次韻和吳仲庶苗蔡二君村墅閒居聞說江南庾子山卜居泉石愛孱顏古來得䘮何湏問世上榮枯只等閑高闕浮雲徒有戀夕陽飛鳥亦知還予貧不及三君子老愧朝紳進退間送良玉上人還崑山來衣茶色袍歸變椹色服孤舟洞庭去落日松江宿水煙晦琴徽山月上巖屋野童遙相迎風葉鳴橡槲依韻和宋次道學士紫宸早謁陸生聲譽在雲間來預簪裾謁帝顏冠劔有容䕫與卨文章全盛馬兼班耽耽玉宇龍纒棟藹藹金鋪獸齧環却出常衙殿前過㦸衣風動自相攀和次道省中初直江南太守歸夜直省中闈霜氣冷侵被月光斜入扉官奴休執燭侍史正薫衣展轉不成寐幽懷吟更微去年宋中道自洺州以書令魏殊來謁予魏遂託主第後辭歸予因中道之兄次道有孔雀賦以送魏生置從南海桄榔林籠入西州鸚鵡地聳冠翕翼脩尾張鱗鱗團花金縷翠一身粲爛文章多引聲笙竽柰逺何五侯池館不可戀桂樹深枝自有窠鳯皇樓頭饒燕雀入屋穿簾非爾樂非爾樂去何之北方佳人或歌咢依韻和宋中道見寄歲在涒灘初别子子遒廣平禆郡理廉頗臺傾有遺址今逢四方弓乆弛時不用兵皆樂鄕念我貧居天子庠抱經臨案空循行貌垢不洗顏蒼蒼得時少壯相揄揚獨行無侣心浶浪腸如轆轤轉井牀内饑外寒膚粟芒若此煎炒何心腸王都浩浩多球琅懷珉安可爭琨煌舊朋升騰皆俊良殁不發語生括囊巍巍堯舜開明堂大調金石來鳯皇鴛鴦戢翼方在梁福禄其宜無不臧巳甘老死填溝隍殭尸闔棺猶目張仲尼生世尚徨徨豈能強聒爭蹌蹌未由見子舉以觴北望大河衣袂攘牽牛橫漢不服箱欲徃乗車無可當天駟有星名曰房又欲乗馬行幽荒牛雖蹄瑩馬眼光旣不我駕路阻長我懷炳炳何日忘半夜攬琴彈履霜寫意緘辭無鴈將低雲作雪正蒼茫雷逸老以倣石皷文見遺因呈祭酒吳公石皷作自周宣王宜王發憤蒐岐陽我車我馬攻旣良射夫其同弓矢張舫舟又漁縛鱮魴何以貫之維柳楊從官執筆言成章書在皷腰鐫刻藏歷秦漢魏下及唐無人着眼來形相村童戲坐老死喪世復一世如鳥翔唯閱元和韓侍郎始得𥿄本歌且詳欲以氊衣歸上庠天官媕阿駞肯將傳至我朝一皷亡九皷缺剥文失行近人偶見安碓牀亡皷作臼刳中央心喜遺篆猶在傍以臼易臼庸何傷以石補空恐舂梁神物㑹合居一方雷氏有子胡而長日模月倣志暮強聚完辨舛經星霜四百六十飛鳯凰書成大軸緑錦裝偏斜曲直筋骨藏擕之謁我巧趨蹌我無别識心傍偟雖與乃父非故鄕少與乃父同盃觴老向太學鬢巳蒼樂子好古親縑箱誰能千載師史倉勤此冷淡何肝腸而今祭酒禆聖皇五經新石立兩廊我欲効韓非癡狂載致出關無所障至寳宜列孔子堂固勝朽版堆屋牆然湏雷生徃度量登車褁護今相當誠非急務煩紀綱太平得有朝廷光山水大字輦巳嘗於此豈不同粃糠海隅異獸乗舟航連日道路費芻糧又與茲器殊柔剛感慨作詩聊激昻願因諫䟽投皁囊夜觀奎璧正吐芒天有河皷亦焜煌持此負鼎干成湯和宋次道奠石昌言舍人金覊白馬曉朝天嘒管行車暮巳傳上帝樓成何遽召青霄路絕不應還飄階隕葉聲凄若隔幕孤燈夜寂然來奠一觴空湛湛却思平昔淚漣漣和王景彞寄吕縉叔白盡髭鬚史未成不如能賦易登瀛三冬足用韻儒飽千里從看跛鼈行知有淸名在公議自無餘力到高閎磻溪八十猶垂釣祖例推來亦後生依韻和宋次道答弟中道喜還朝白首謬陪兄弟間阿連初喜客兒還池塘夢句君能得咳唾成珠我未閑陋巷閉門誰扣扣茂林飛鳥自班班歸來又接同袍㑹月下朱閎不用關依韻和答王安之因石榴詩見贈當年仕宦忘其卑朝出飮酒夜賦詩伊川嵩室恣游覽爛熳徧歷焉有遺是時交朋最爲盛連值三相更保釐謝公主盟文變古歐陽才大何可涯我於其間不量力豈異鵬摶蒿鷃隨見君弟兄入太學俊譽籍籍聞一時而今兩鬢各巳白偶因贈酬言及斯升沉是非休要問百歲歡樂誰能期陽武王安之寄兎魚原上一䨇兎河中兩尾魚兎皮空被褐魚腹不藏書長跪置逺意故人情何如二物本潛伏誰言罝網踈崢嶸歲亦晚將駕歸吾廬依韻和王景彞對雪天雪霰成先暴集地中陽復巳如期穿林斗覺縈風急入袖𥘉驚學舞遲樓上温貂方貫酒竹間寒雀未辭枝平明君向螭頭立玉座爐煙細細時依韻和答永叔洗兒歌夜夢有人衣帔蜺水邊授我黃龜兒生男前一夕夢道士贈龜一枚仰看星宿正離離玉魁東指生斗威明朝我婦忽在蓐乃生男子實秀眉自磨丹砂調白蜜辟惡辟邪無寶犀我慙暮年又舉息不可不令朋友知開封大尹憐最厚持酒作歌來慶之畫盆香水洗且喜老駒未必能千里盧仝一生常困窮亦有添丁是其子重送祖擇之北使文章世德巳能傳得桂高枝二十年持節欲同蘇武勁下帷曾似董君賢衣裘袵領無嫌左飲食盃盂暫厭羶一過范陽應感㮣歸來圗畫彼山川題老人泉寄蘇明允泉上有老人隱見不可常蘇子居其間飮水樂未央淵中必有魚與子自徜徉淵中苟無魚子特翫滄浪日月不知老家有雛鳯皇百鳥戢羽翼不敢言文章去爲仲尼歎出爲盛時祥方今天子聖無滯彼泉傍景彞率和唐崇徽公主手痕詩兩壁美人虹巳收蒼崖纎手蘚痕秋和親只道能稽古沉略從來不解羞漢月明明掌中照胡塵漠漠指間留昭君殁後更多恨彈作琵琶曲未休觀黃介夫寺丞所收丘潛畫牛丘畫吳牛希戴嵩吳牛角偃灣如弓老牯望牸犢望母母下平坡離牧童牧童吹笛坡頭坐古樹蕭騷葉戰風黃君買畫都城中不惜滿貫穿青銅賣從誰家不肖子傳自幾世賢卿翁今時貴人所尚同競借觀玩題𥿄窮𥿄窮磊落見墨妙東府西樞三四公應識古人丹青蹟又辨古人於物通一毛一尾不取次豈以後代爲盲聾願推此意佐國論况乃聖德同堯聰題嘉興永樂院携李亭土化吳王甲骨朽越王兵五月菖蒲草千年携李城蒲根蛙怒嚎城上烏夜鳴吳越滅巳乆客心空屏營落日孤亭間悠悠鐘磬聲吳沖卿皷契猶是唐時契有司嘗欲昌耕上不許暮契岀朝契歸岀入未嘗逢日暉雄雌曾不離鍾室百年利弊知者稀時移世異不改易俗眼厭舊君前非君王萬年千年壽獨憐古器與衆違昨日霜華厚如雪百官凍靴朝紫微吳王偷就温漏火始一識之增歎唏不知逢逢六街皷自此發號通帝闈人間鐘皷有多少多少亂鳴誰肯譏江隣幾寄羊羓去歲爲翊造者細肋胡羊卧苑沙長春宫使踏霜羓蒺䔧苗盡初蕃息首蓿盤空莫嘆嗟自乏良謀丼更鄙猶能大嚼快無涯磨刀爲削朝霞片時引清盃興轉嘉周仲章都官示卷因以贈之赭白西北來本是天馬種朝秦暮至吳嵩華如歷冡伯樂曾未逢垂頭牧青隴今朝顧我鳴振鬛耳聳聳聲生秋風悲巳䘮荆軻勇誰牽駕鸞車高躡雲勢擁宛陵先生集卷第五十九宛陵先生集目録卷第五十九王安之寄石榴寄致仕余少卿和吳學士卽事和沖卿藏菜和景彞紫宸早謁和答景彞謝予訪哀石舍人三首王宻諫潄玉齋書李學士集後送河東李轉運和二君村墅閑居送良玉上人還崑山和宋學士紫宸早謁和次道省中初直賦孔雀送魏生和宋中道見寄雷逸老遺石皷文和次道奠石舍人和景彞寄縉叔和答弟喜還朝和答安之見贈石榴詩王安之寄兎魚和景彞對雪和答永叔洗兒歌重送祖擇之北使題老人泉寄蘇明允景彞率和手痕詩和介夫收丘潛畫牛題嘉興擕李亭吳沖卿鼓契江鄰幾寄羊羓贈周都官示詩卷目録終
