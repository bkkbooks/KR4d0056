front:
  text: 宛陵先生集卷第四十一
  hash: sha256:f2c84416e8a87cd8f935037ab9752df72efb2e4bc5701717e931f4ee682242be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_041-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和馬都官春日憶西湖寄陸生時望前湖倚玉梯雲山橫絶路東西只知遠目窮芳草不見高人在曲堤畫榼尋春應醉去舊朋懷昔欲魂迷海邊燕子來無數願託雙飛寄短題送志來上人往姑蘇謁元曹折取東橋柳青青向故人欲知問館處要識舊溪春旋灑銅瓶水休霑野寺塵吳門逢隱者必是漢名臣溫成皇后挽詞鞏洛園陵啓函關鹵部聞素車迎紫氣靈襪度青雲歌欲傳長恨人將問少君明年賀元日無復繡衣薰和真上人萬松亭虎窺泉南岡新路平東嶺新亭成嶺上松萬株嶺下泉一泓松未龍鱗老泉曾虎迹行虎去豈不渴松今豈不生泉無百尺繩安見甘與清松無百歲人安見千丈榮道人能喻道莫使世人驚我來開醉眼不似阮步兵種碧映山紅于新墳年年杜鵑啼口滴枝上赤今同萇弘血三歲化為碧因移新冢傍顏色照松柏邵郎中姑蘇園亭吟愛樂天池上篇買池十畝皆種蓮薄城萬竿竹嬋姢藤纜繫橋青板船折腰大菱不直錢鵁鶄鸂鷘沙際眠水從太湖根底穿月出洞庭山上圓公歸與客相留連秋風鶴唳春杜鵑班鱸斫膾紅縷鮮紫豉煮蓴香味全我思白傅在三川吳船雖有吳饌偏當時九老各華顚裴令來過吟復聮至今怪石存舊鐫七葉樹蔭黃金田羡公有子勝昔賢高門通車千萬年與正仲屯田逰廣教寺春灘尚可涉不惜濺衣裾古寺入深樹野泉鳴暗渠酒杯參茗具山蕨間盤𬞞落日還城郭人方帶月鋤哭謝公儀學士道路傳聞日驚嗟尚復疑疾因勤學得命不與人期賈誼年傷少相如恨見遲向來公輔器看取李家知依韻和王介甫兄弟舟次蕪江懷寄吳正仲楚客連檣泊晚風吳人江畔醉無窮少陵失意詩偏老子厚因遷筆更雄貫口信潮千里至平沙落日一時紅知君兄弟才名大我愧白頭遼水東依韻和吳季野馬上口占溪頭三月草菲菲城畔春遊惜醉稀莫惜杜鵑花上鳥人歸猶道不如歸邵考功遺鮆魚及魮醬巳見楊花撲撲飛鮆魚江上正鮮肥早知甘美勝羊酪錯把蓴羮定是非昨于發運馬御史求海味馬已歸闕吳正仲忽分餉黃魚鱟醬􅚝子因成短韻前欲淮南求海味緘書未發報還臺陸機黃耳何時至罌品分傳事桉杯正仲答云鱟醬乃是毛魚耳走筆戲之未開誤認其器折却毛魚一品資吳郎聲屈向吾詩若論鮆子無從著冤氣衝喉未可知正仲詩云䲖黃􅚝子出蘇臺蘇臺非出􅚝也春日東齋剝剝禽敲竹薰薰日照花耳中無俗聽眼底有間誇逃笋過幽草吹香到別家吾懷方自得切莫問生涯吳正仲遺新茶十片建溪春乾雲碾作塵天王初受貢楚客巳烹新漏泄關山吏悲哀草土臣捧之何敢啜聊跪北堂親間居讀易忘飢倦東窗盡日開庭花昏自斂野蝶晝還來謾數過籬笋遙窺隔葉梅唯愁車馬入門外起塵埃依韻和季野見招悲憂如路去無程靖節終朝酒自傾苦苦來招為醉伴西山不使伯夷清依韻馬都官宿縣齋常愛陶濳遠世緣阮家仍有竹㛹姢夜深風撼蕭蕭響誰憶北窗人正眠吳正仲見訪回日暮必未晚膳因以解嘲永日無車馬間坊有竹鄰雨中烏帽至門外緑苔新不殺雞為具堪題鳯向人山公識墨在知我舊來貧昭亭潭上別弟從來潭上別先賽故山祠却入舟中飮無令盞盡遲須拚一日醉便作數年期落日馬嘶急岸傍人散時夢後得宋中道書四月十九日宵夢宋子語晝得宋子書書意與夢語曾不異往初昔我遭家難逢子亦在廬我南君大梁千里非隔踈念處天地中天地猶一車日月為兩轂星辰隨徐徐晝夜轉不巳載之將焉如冉冉趨死鄉萬古曾無餘其間乃有夢覺實夢何虛何虛亦何實及盡皆同墟身世既若此合離休歎諸送吳季野太博移蜀靈泉先至輦葦萡𧖟齊老桑林葉更生楚禽多異響蜀棧未堪行客散岸傍席馬還溪上城過都當有問為語欲嵓耕至和元年四月二十日夜夢蔡紫微君謨同在閣下食櫻桃蔡云與君及此再食矣夢中感而有賦覺而録之朱櫻再食雙盤日紫禁重頒四月時滉朗天開雲霧閣依俙身在鳯皇池味兼羊酪何由敵䜴下蓴羹不足宜原廟薦來應巳久黃鶯猶在最深枝依韻和吳正仲赤目見寄尋常不病眼靑白看人多暫見朱成碧難逢扁與和金箆舊説在訶子古方磨我自苦風痺思君那得過葛洪治赤目翳膜方訶子一枚以蜜口磨注目中雨燕五月五日雨燕去還來㗸蟲為雛食雄雌濕已倦梁棟冷並息緣礎蚍蜉群拾餕蜻蜓翼榖粟滿京園任從黃雀得夏蟲物久必自化化之猶騫騰當看厠中蛆去作盤上蠅飛聲既混雞斂迹何疑氷寄言􅃮園吏巳知鵾與鵬秋雨篇秋雨一向不解休連昏接晨終窮秋梅生不量仰天問神官夜夢言語周日月是天之兩目忽然生翳無藥瘳只知淚滴為赤子赤子豈誤天公憂天公哭􅮕􅮕灑涕落九州地祗不敢安泥潦已沒頭乃因從容告神官后稷今在帝所不從前后稷知稼穡曾以筋力親田疇曷不告帝且輟泣九榖正熟容其收蚤時不泣此時泣憂民欲活反扼喉神官發怒髭奮虬下士小臣安預謀恐然驚覺汙交流樹上已聽鳴䳄鳩中秋月下懷永叔有朋無明月秉燭光強去致有月無樂朋獨酌顏易醉往年過廣陵公欣來我值期玩秋蟾圓靜掃庭下地復邀高陽公賸作詩準備特特乃多連後池風雨至一夜看石屏怚吟無逸氣今宵皓如晝千里嗟離異固知理難并把酒遙相寄當時出月石屏同詠聞永叔出守同州寄之冕旒高拱元元上左右無非唯唯臣獨以至公持國法豈將孤直犯龍鱗茱茰欲把人留楚苜蓿方枯馬入秦訪古尋碑可銷日秋風原上足麒麟九日陪京東馬殿院會疉嶂樓誰言天去遠山上有樓臺峰色引溪色共入茱萸杯行當登泰山雲掃日月開柏烏與城烏兩處休鳴哀酒病自責呈馬施二公李白死宣城杜甫死耒陽二子以酒敗千古留文章我無文章留何可事杯觴况承先子戒宜不著口嘗昔聞有田竇以此相滅亡禮飮不在多歡飮不在荒二公方逢時安得入醉鄉宣城馬御史酒闌一夕而西因以寄之御史嘗留老馬與豫僕三更醉下陵陽峰平明溪上去無蹤義牙鐡鎖謾橫絶濕櫓不驚潭底龍斷腸吳姬指如笋欲剝玉將何從短翎水鴨飛不遠那經細雨山重重却顧舊埓老病馬塵沙歷盡空龍鍾詠懷西方有鳥鼠生死同宄居物理固不測孰言飛走殊雄雌豈相匹飮啄豈相須一為枝上鳴一為莾下趨苟合而異嚮世道當何如答仲雅上人遺草書并詩經月不出戶堂上多緑苔忽有方外客衣披稻畦來來從靑山下手把紈素裁筆草數行字瘦蛇起春雷渴墨未散霧屈角麟欲開裝為兩大軸置我并瓊瑰懶瞋長鬚奴挂壁不掃埃智永與懷素其名久崔嵬師今繼此學入神在徘徊未料輒以我便比和羮梅我心常苦酸得姓何可能讀吳季野芝草篇阮生存詠懷美彼曜朱堂一榮不復枯五色異衆芳衆芳發朝露俄以斂夕陽丹莖起瓦礫又匪媚棟梁此稟由至和君子要有常送吳季野贈言必有規無規固無言強言固無補何異秋蟲喧君行蜀道難不猒治輕軒母殁未歸土女長未出門誰能力為此勞苦遊墻藩吳季野話撫州濳心閣高閣濳心所圖書曝蠧收靑山隨宅轉遠水向門流迤邐看無猒潺湲聽不休一聞秦洞説便欲泛漁舟詠懷一身頭靣間所用蓋有長兩耳主于聰兩目主于光維鼻主于嗅維舌主于嘗以耳辨黑曰以目分宮商以鼻識酸醎以舌聞嗅香各各反爾用安得無悲傷此能而兼彼自勞由不量寄言世上人欣欣蹈其常東方有野父禳田一豚蹄復操一盂酒祝榖滿吾棲百金請救兵所欲奢所齎彼何滑稽生仰天獨關齊自余居田里未免病與貧常把神農書每以藥物親處方猶持法義比君使臣但恨無餘資豈及療我鄰筆頭不中書聊可備急人昨日除吏來吾邦為長民欲溺復然灰敗筆前巳陳風驅暴雨來雷聲出雲背若決千仞溪追奔下天鎧堂堂亞夫軍吳楚不足碎旱氣沃原田煩蒸洗闤闠深料生注射聚沫猶壅礙靑蔥草樹鮮斷殁虹霓在向晚留霽暉芙容染新黛送毛祕校宣城主簿被薦入補令良驥不必大騰羈巳超邁良弓不待寒調弦自徑快宣城古大邑聽訟易聾聵君能抉其塞宰與民共賴自當割雞用創必無鈍敗嘗聞開元時令長多賜戒戒石今尚存世異事不背以此贈行行無酒勿我怪鴨腳子魏帝迷遠圖于吳求鬪鴨乃為吳人料重玩志已篋江南有嘉樹修聳入天插葉如欄邊迹子剝杏中甲持之奉漢宮百果不相壓非甘復非酸淡苦衆所狎千里競齎貢何異貴爭喋宛陵先生集卷第四十一宛陵先生集目録卷第四十一和馬都官憶西湖送志來上人溫成皇后挽詞和真上人虎窺泉種碧眏山紅邵即中園亭與正仲逰廣教寺哭謝公儀學士和王介甫懷正仲和季野馬上口占邵考功遺鮆魚馬發運求海味戲呈正仲春日東齋吳正仲遺新茶間居和季野見招和馬都官宿縣齋吳正仲見訪昭亭潭上別弟夢後得中道書送吳季野移蜀靈泉夜夢蔡紫微和正仲赤目見寄雨燕夏蟲秋雨篇中秋月下懷永叔寄永叔出守同州陪馬殿院會疉嶂樓酒病自責呈馬施二公寄馬御史詠懷答仲雅上人遺草書并詩讀吳季野芝草篇送吳季野吳季野話撫州濳心閣詠懷送毛祕校鴨腳子宛陵先生集目録卷第四十一
