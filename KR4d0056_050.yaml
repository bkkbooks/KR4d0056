  text: 宛陵先生集卷第五十
  hash: sha256:d32b30065f9742d0324486c01ad34f0e5ba9310fb72c4d1552305e7a188da79b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_050-1a}
body:
  text: 宋宛陵梅堯臣聖俞著桃花源詩并序嘉祐元年豫在京師邂逅與都官員外郎張侯顒遇于書肆中張語往時相識于唐俞家今二十三年矣因各言出處張曰實居武陵武陵舊迹可具道始時陶濳為記與詩其後往往賦詠不絶君之仲父昔嘗有作聞君能詩多為公卿大夫諷誦願得一章夸吒遠土亦當買石刋置嵓下既重其意許其録幼時所為五言歸閲故藁則頗不愜心遂別為一章以塞張侯之請鹿為馬龍為蛇鳯皇避羅麟避罝天下逃難不知數入海居嵓皆是家武陵源中深隱人共將雞犬栽桃花花開記春不記歲金椎自劫博浪沙亦殊商顏采芝草唯與少長親胡麻豈意異時漁者入各各因問人間賖秦已非秦孰為漢奚論魏晉如割瓜英雄滅盡有石闕智惠屏去無年華俗骨思歸一相送愼勿與世言雲霞出洞沿溪夢寐覺物景都失同回槎心寄草樹欲復往山幽水亂尋無涯永叔席上分韻送裴如晦得黯字霜華夜夜濃汴水日日減行邁唯恐遲離懷不須黯逺輕吳江潮乃見丈夫膽君意應洗然吾方困塵慘永叔白兔可笑嫦娥不了事走却玉兔來人間分寸不落獵犬口滁州野叟獲以還霜毛䒠茸目睛􅎋紅絛金練相繫擐馳獻舊守作異玩况乃巳在蓬萊山月中辛勤莫搗藥桂傍杵臼今應間我欲拔毛為白筆研朱寫詩破公顔直宿廣文舍下前夜宿廣文葉響竹打雪昨夜宿廣文窗影竹照月賴此數竿竹與我為暖熱上有寒鵲棲拳足如瘦蕨平明欲飛去唶唶若告説我無喜可報煩爾弄觜舌亦嘗苦老鴉鳴噪每切切為學本為道窮蹙令素髮但能得酒飮終日自兀兀送宋中道太博倅廣平行役無冬春車馬無南北急若機上梭離別腸自織其間走聲利晝夜不能息晚得二友生胸霓吐五色各思強祿仕安肯坐仰食一之毛遂鄉一之太伯國豈無頴脫才可邁古風力明當隔大河去路指斗極誰念平原君能於衆中識裴如晦時亦宰吳江送宋端明知成都其兄相國新鎮河陽伯仲俱邦棟朝廷倚以隆出為周九牧入是漢三公歲易星辰轉天均雨露同威聲滿河北事業出山東賦壓臨卭馬文高益部雄英靈當自伏教化巳先通彀騎花川隘壺漿錦里空道途來笮馬都邑貴郫筒刀夢殊祥後鋒車急占中春江須愛賞花鳯在梧桐戲作嫦娥責我昨既賦白兔詩笑他嫦娥誠自癡正值十月十五夜月開冰團上東籬畢星在傍如張羅固謂走失應無疑不意嫦娥早覺怒使令烏鵲繞樹枝啅噪言語誰可辨徘徊赴寢褰寒帷又將淸光射我腹但覺軫粟生枯皮乃夢女子下天來五色雲擁端容儀雕瓊刻肪肌骨秀聲音柔響揚雙眉以理責我我為聽何擬玉兔為凡卑百獸皆有偶然白神靈獨冒由所推裴生亦有如此作專意見責心未夷遂云裴生少年爾謔弄溫軟在酒巵爾身屈強一片鐵安得妄許成怪奇翰林主人亦不愛爾説爾猶自惜知不知叩頭再謝沋巳去起看月向西南垂送李涇州審言古章乘一障不過提千兵今握數萬衆獨自制名城諸將俯聽命莫敢輒吐聲堂下選騕裊帳中圖峥嶸山川在目中虜冦來必平誰人識謝艾只是一書生漢家舊日回中路天子新除太守行牙將握刀趨逺驛羌人下馬拜高旌雲間白草開邉隴山上朱樓壓郡城勇脫區區簿書內壯心應欲請長纓送刁景純學士使北嘗聞朔北寒尤甚巳見黃河可過車驛騎駸駸持漢節邉風慘慘聽胡笳朝供酪粥冰生碗夜卧氊廬月照沙侍女新傳教坊曲歸來偷賞上林花送馬仲途司諫使北每逆龍鱗司諫諍又持旄節使隂山貂裘不見風霜徑鴈磧遙知道路艱冰膾芥虀非楚味玉苕蘭茁説燕顔單于不敢輕中國名馬新調為送還重賦白兔永叔云諸君所作皆以嫦娥月宫為説頗願吾兄以他意别作一篇庶幾高出羣類然非老筆不可毛氏頴出中山中衣白兔褐求文公文公嘗為頴作傳使頴名字存無窮遍走五嶽都不逢乃至琅琊聞醉翁醉翁傳是昌黎之後身文章節行一以同滁人喜其就籠紲遂與提携來自東見公於巨鼇之峰正草命令辭如虹筆秃願脫冠以從赤身謝德歸蒿蓬王祁公北園園林多高樛園卉多芳柔紅紫經幾春青枯經幾秋我至每懷浮觴之卿翁但見浮觴之水汨汨流水流日夜曾未休高門世世生賢侯不比平泉碑缺花木記又非家鴟嘯鳯凰樓洛陽城中亦有園與宅常同歐陽翰林携酒遊竹間池館遺翠羽戶外楊柳繫紫騮今嗟齒似舊屐作博士嘉趣只與心相仇強騎瘦馬往城北二十三年如轉頭歸來作此辭且應主人求觀楊之美盤車圖谷口長松葉老瘦澗畔古樹身枯高土山慘憺逺復逺坡路曲折盤車勞二車回正轅接軫繼下三車來嶾嶙過橋已有一乘歇解牛離軛童可哂黃衫烏巾驅舉鞭經險就易將及前轂輪傍側輻可數蹄角攙錯捲箱聮古絲昏晦三尺絹畫此當是展子虔坐中識別有公子意思往往疑魏賢子虔與賢皆妙筆觀玩磨滅窮歲年塗丹抹靑尚欺俗旱龍雨日猶賣錢是亦可以祕疑亦不可捐為君題卷尾願君世世傳寄許越州開元冠蓋裏無若賀知章乞得鏡湖水洗出明月光行坐鏡與月身衣羽人裳心存黃庭經目視白鳥行歲時忽已古高韻抗彭莊今聞許子春來守稽山傍稽山風月在鏡水菰蒲長臘市開梅蕚霰雪凌早芳卧龍生茗舌鼓角催新陽焙邉可以啜樹間可以觴賀老於當日必定無此嘗唯有李白詩酒船芙蓉香安得效白也賸載借艅艎與君同醉翁智慮收肝腸永叔請賦車螯素脣紫錦背漿味壓蚶菜海客穿海沙拾貯寒潮退王都有美醖此物實當對相去三千里貴力致以配翰林文章宗炙鮮尤所愛旋坼旋沽飲酒船如落埭殊非北人宜肥羊噉臠塊寄題郢州白雪樓楚之襄玉問於宋玉玉時對以郢中歌歌為白雪陽春曲始唱千人和再唱百人逐至此和者才數人乃知高調難隨俗後來感槩起危樓足接浮雲聲出屋中古客應無怊悵鯤魚孟諸宿樓傾復構春又春酒㵼琉璃烹錦鱗靑山繞欄看不盡眼穿蕩漿石城人去知何在寒花雨斂自生嚬今聞太守新梁棟試選淸喉可動塵和永叔答劉原甫遊平山堂寄黃土坡陀岡頂寺靑煙羃歷浙西山半荒樵牧舊城下一月隂晴連嶼間人指廢興都莫問眼看今古總輸間劉郎寄詠公酬處夜對金鑾步輦還平山堂留題蜀岡莽蒼臨大邦雄雄太守駐旌幢相基樹楹氣勢厖千山飛影橫過江峰橋俯仰如奔降雷堂波小雞鷘雙陸羽井苔粘瓦缸煎鐺瀉鼎聲淙淙兩牙鳥爪不易得碾雪恨無居士龎巳見宣城謝公陋吟看逺岫通高窗答張子卿秀才公武茫茫九土中天網該時秀有鳯不收羅有麟不獲狩賢豪為咨嗟都邑誦瓊琇而我當是時欲見恨未遘忽過廣平居遇子乃邂逅懷中二新篇幸出洗昏瞀一美韓公才稚圭也一語南方冦鏗然靑琅玕交戞風雨驟輒用告衆多亦未甚便售固知至珍物不入市井貿昨朝驚扉鳴始悟子來扣巨編高貯襟細卷仍函袖麻衣踏犀靴再拜謹以授因之重感愴世德實有舊文體古為徒家聲喜能又其間􅐌愚辭愧纍將恐詬磨拂李杜光誠與日月鬪退之心伏降安得此孤陋豈能造春榮豈解易星宿一身猶寒飢生未飽藜豆高高河漢流肯下饋湔漱蟲魚儻無施捉撮不乖繆聊此慰窮愁文章終莫就庭前枯石榴寒雀並淸晝逍遙獨詠歌寄翼與報酬江鄰幾學士寄酥梨興平烹瓊乳咸陽摘冰枝秦女點山日張公開谷時刻破玉漿壺泛融金酒巵適從關中寄不見博士卑答劉原甫寄糟薑名國萬家城千畦等封侯劚當燕去前醃牙費糟丘無筋偃王笑有味三閭羞寄入翰林席聖以不撤優又寄蓬門下作賦誰肯休唯我廣文舍免為虀鹽仇劉公漢家裔才學歆向儔胸懷飽經史辨論出九州曾不奉權貴但與故人投贈辛非贈甘此意當自求銅雀硯歌舞人已死臺殿棟巳傾舊基生黑棘古瓦埋深耕玉質先骨朽松棟為埃輕築緊風雨剝埏和鉛膏精不作鴛鴦飛乃有科斗情磨失沙礫粗扣知金石聲初求畎畝下遂厠几席淸入用固為貴論古莫與并端溪割紫雲空負世上名韓著毛頴傳何獨稱陶泓儻以較歲年泓當視如兄歐陽永叔王原叔二翰林韓子華吳長文二舍人同過弊廬值出不及見十二月七日枯竹為門扉不可容車騎况如鄭廣文無氊藉賔位窮冬月破七貴客聮玉轡傳騶肅里閭下榻呼童稚問我何所往共留墻上字兒愚不知誰金章言照地既屈卿大夫恨莫親帚篲星躔回巳高麟趾寧復至戢戢鄰巷居相見竊自喟豈料瘦老翁能令賢逹至昔時蓬蒿徑安有此盛事元忠示胡人下程圖單于獵罷卧錦紅解鞍休騎荒磧中蒼駒騧駱六十匹隱谷映坡分尾鬃九駝五牛羊頗倍沙草晚牧生寒風貴賤小大指五百執作意態皆不同二鷹在臂二鷹架駿犬當對寧爭功氊廬鼎列帳幕擁鼓角未吹驚寒鴻土山高高置烽燧毛囊貯獲間刀弓水泉在側挹其上長河杳杳流無窮素紈六幅筆何巧胡瓌盡妙誰能通今日都城有別識別識共許劉元忠送李大保知儀州出塞開牙帳論兵啓玉鈐漢泉思白馬秦冡弔蒙恬族本西山大聲從渭北兼相如常學劒文士亦何嫌劉元忠遺金橘南方生美果且體橘包微韓彈有輕薄楚萍知是非甘香奉華俎咀嚼破明璣欲換虀鹽腹盈奩忽我歸王原叔內翰宅觀山水圖石蒼蒼連峭峰大山嶤峩雲霧中老松瘦樹無筆蹤巧奪造化何能窮古絹脆裂再粘續氣象一似高高嵩上有荆浩字特歸翰林公願換廷圭一丸墨誰言賣錢須靑銅范寬到老學未足李成但得平逺工黃金白璧未為寶文人師臣無不通送廖倚歸衡山倚來為其兄求集序於歐陽永叔雌猿夜啼別湘東曉尋故人背孤桐孤桐有聲彈不響弦絶曲在埋蒿蓬知音萬古期必逢今日巳聞天下雄陟山涉水不辭逺文章大名居禁中扣門一見顔色喜抱琴三歎含微宮九疇不汨微禹力堯舜豈無明與聰推根致本賢意合敘述况值太史公貿金得玉莫忘寶却過洞庭乘朔風猿休啼月月色好還來舊山伴狙翁宛陵先生集卷第五十宛陵先生集目録卷第五十桃花源詩永叔席上分題永叔白兔直宿廣文舍下送中道倅廣平送宋端明知成都戲作嫦娥責送李涇州二首送景純使北送馬司諫使北重賦白兔王祁公北園觀盤車圖寄許越州永叔請賦車螯寄題郢州白雪樓和永叔答原甫平山堂留題答張子卿秀才江學士寄酥梨答原甫寄糟薑銅雀硯歐陽諸公見過示胡人下程圖送李太保知儀州劉元忠遺金橘原叔宅觀山水圖送廖倚歸衡山目録終
