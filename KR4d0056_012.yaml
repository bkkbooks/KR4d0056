front:
  text: 宛陵先生集卷第十二
  hash: sha256:71b7a153a119928ca71c286588f0e4bba7114bb9d1b8d4ad13249163958dd977
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_012-1a}
body:
  text: 宋宛陵梅堯臣聖俞著擬李益竹窗聞風寄苗發司空曙窗前風動竹聲碎影仍繁衝扉忽自啓出候初迎門驚雀枝未定乳蜂窠暫翻飄飄一舉袂聊更遲來轅擬宋之問春日翦綵花應制上林花未有中禁綵先成葉逐翦刀出蘂從粧粉生紅繁內人手香染侍臣纓不是將春競天心重發榮郡閣閲書投壼和呈相國晏公較量人世無窮樂羅列平生未見書聊奉投壼祭征虜休言繫劒馬相如畫樓晚去聞寒角縹帙看來落蠧魚日獲誨言皆舊學不慙貧賤帶經鋤梅花江南臘月前溪上照水野梅多少株艷薄自將同鵠羽粉寒曾不逐蜂鬚桃根有妹猶含凍杏樹為鄰尚帶枯楚客且休吹玉笛清香飄盡更應無擬張九齡詠燕眇眇雙來燕長年與社違任從新曆改只向舊巢歸永日當人語輕寒逆雨飛自親梁棟慣不識海鷗機遲雪風嗥大澤晚雲覆女墻低驚霰夜將集廣庭朝復迷鶯鳴寒蔽日鴈泊凍生溪會待飄花密開軒意外題欲雪復晴隂雲不成雪碧瓦有繁霜日氣生簾額冰條結井牀飛烏鳴自樂古木晝仍殭誰意斗晴後苦寒勝北方送蒙寺丞赴郢州郢國當時唱猶傳白雪真問今非昔日和者幾何人客自射飛鴈漁能供躍鱗芳洲墮馬處吾祖漢名臣聞角一聲催客夢星斗轉西簷風卷梅花去愁從柳塞添馬鳴霜滿鬛龍泣凍生髯高樹朝光動城頭落海蟾和人雪意凍雲低垂野逺樹昏未分朝來庭竹上摵摵霰巳聞扣門有兵吏嘉命傳相君趨閣展熊席卷幔飄爐薰桂漿貯榼美馬乳薦實蕡賓屬兩三人從容奉評文逺稽先儒言風賦可以羣密置筆與硯唯待雪氛氛雪既不可待日暮人半醺明朝獲方楮健思欲凌雲詠楊高品馬廄猢猻嘗聞養騏驥辟惡繫獮猴供奉新教藝將軍舊病偷聊看緣柱杪尚想傍崖頭更祝南州使如拳試為求和欲雪二首貂裘著不暖牙帳曉初開朔氣還先及流風亦屢催擬聞人詠絮將見使傳梅公復憂民畝龍沙幾日來雪欲漫天落雲初著地垂臂鷹過野健走馬上冰遲公子多論酒騷人自詠詩都無少年意只卧竹窗宜梅花巳先羣木得春色不與杏花為比紅薄薄逺香來澗谷踈踈寒影近房櫳全枝惡折憎鄰女短笛橫吹怨楚童墜蕚誰將呵在鬢蘂殘金粟上眉蟲和十一月八日圃人獻小桃花二絶當時開向杏花後今日綻當梅蕚前不畏雪霜何太甚繁英如火滿枝燃前占寒食一百六算到其時未合開丹艷巳先灰管動不由人力與栽培和梅花時時不甘春著力年年能占臘前芳水邊攀折此中女馬上嗅尋何處郎山舍更清栽作援鳯樓偏巧學成粧團枝密密都如雪野雀飛來翅合香再送蒙寺丞赴郢州彎弓落飛鳥少也向幽州來作漢官屬耻為戎國留身輕拋馬轡地暖猒狐裘慣見顏如玉江邊問莫愁擬王維觀獵晏相公坐中探賦白草南山獵調弓發指鳴原邊黃犬去雲外皂雕迎近出長陵道還看小苑城聊從向來騎回望夕陽平擬陶潛止酒多病願止酒不止病不巳止之懼無歡雖病未宜止且欲止人事事止不經耳次誦止足言行當止田里田里止誰親止樂山水美既止何所助唯酒與止喜以言止不止未必止為是止酒儻不瘳枉止徒可耻止亦隨化遷不止等亦死愼勿道止酒止酒乃君子擬杜甫玉華宫松深溪色古中有鼯鼠鳴廢殿不知年但與蒼崖平鬼火出空屋未繼華燭明暗泉發虛竇似作哀絃鳴黃金不變土玉質空令名當時從輿輦石馬埋棘荆獨來感舊物煎懷如沸羮區區人世間誰免此虧盈擬韋應物殘燈照此寒夜中欲殘紅燼尾空堂滅復明獨宿擬山鬼和十一月十二日與諸君登西園亭榭懷舊書事冬日蕭條公府清獨將諸吏上高城而今何處異疇昔鐵墓下聞狐夜鳴又莎徑依然見莎葉蓮花無復有蓮花更看白水滿城下説著當時龍骨車和小雨蛟龍潠白霧天外細濛濛霑土曾無迹昏林似有風卷旗妨酒舍濕翅下洲鴻稍見斜陽透西雲一半紅擬韓吏部射訓狐黃昏月暗妖鳥鳴尨然鈍質粗豪聲慿凶自異立屋角潛事觜吻欲我驚豈知慣聞此醜狡呼集鬼物夸隂獰夕盜雞雛無畏避曾遭彈射沉泥坑汝今病翼未甚愈還作舊態侵平明陽烏瞳瞳出東海照汝宜喪膽與精何為世人苦憎汝汝常盜物資已榮儻有弓矢勿汚辱殺此非得去惡名養雛四三巳相似眼腦實異鸞皇生一朝車輪翅墮地狐鼠入穴梟黨烹得韓持國書報新作茅廬聞君作茅廬正在西軒西定移舊𬞞圃稍改新藥畦其高如伯鸞况亦有隱妻今方漢德盛不必之會稽和新晴雲開日照戟衣寒淨掃平沙路巳乾吏散庭除少公事畦挑芽甲足春盤要聽林上鳴鳩變試步塘隂緑水寬誰詠陳根有微緑烏蟾易失似跳丸責躬詩所稟介且拙嘗耻朋比為皎皎三十年半語曾未欺身微德不著尚使人見疑省已當自責實負聖相知聖相雖明察不假束藴辭扣言巳可罪引去豈非宜嘗惠山泉吳楚千萬山山泉莫知數其以甘味傳幾何若飴露大禹書不載陸生品嘗著昔唯廬谷亞久與茶經附相襲好事人砂瓶和月注持參萬錢鼎豈足調羮助彼哉一勺微唐突為霖澍疏濃既不同物用誠有處空林癯靣僧安比侯王趣糟淮鮊寒潭縮淺瀨空潭多鮊魚網登肥且美糟漬奉庖厨昔聞漁父賢嘗勉楚人餔楚人懷沙死葬腹千歲餘今茲有遺意敢共杯盤踈和臘前漢家戍日看看近雲景蒼茫巳歲昏欲驗方書治百藥預調飛走獵平原土人薰肉經春美宫女藏鈎舊戲存獨把凍醪驚節物草芽微動見庭萱題臘藥尚書晏相公臘日投壺輸詩七首便以臘日所用物賦先成四首上呈頽顏早覺衰乃藉藥扶持及此季冬日預修來歲宜鼎成無大見蜜煉有蜂知借問月中兔長年何所為臘酒韋氏月録云臘日造四月成汲井轆轤鳴寒泉碧甕盛欲為三伏美方俟十旬清夢憶黃公舍徒聞韋氏名熟時梅杏小獨飮效淵明臘脯畋獵得封獸割鮮為腵修易甘非愛日不敗任經秋可用資賓豆何妨鄙薦䐹考之新月録美脆勝庖牛臘笋南岡深竹養去聲下有鷓鴣鳴破臘初挑箘吕氏春秋日和之美竹越之簵箘誇新欲比瓊薦盤香更美案酒味偏清馬援當時見曾將禹貢評伏波至荔浦見冬筍上言禹貢厥包橘柚疑是謂也和挑菜十二月十二日中圃本膏壤始覺氣候偏出土蓼甲紅近水芹芽鮮挑以寶環刀登之饌玉筵僻逺尚含凍安占春陽前造物非有意地勢使之然和臘日獵鼓逄逄奏寒冰齾齾消正憐風日暖不似雪霜朝敢問祠黃石休從擊皂雕楚郊梅蕚未壠麥巳多苗啄木二首十二月十二日陪步後園所聞見城頭啄枯楊城下啄枯桑朝啄不停咮暮啄不充腸寒風正洌洌蠧穴蟲且殭况茲園林逈剝剝響何長食蠧非嫌蠧聲來古木高誰將琵琶弄寫入相思槽語鴆此以上三首輔前投壼所輸七首客語南方鴆啄蛇掀巨石遂令山中人多竊禹步迹誰云不可轉鳥啄猶能擲和淮陽燕秀才我官忝博士曾昧通經術前因辟書來亦不習文律循舊臨學宮虎革被羊質倚席未能講占牘聊置日朴鈍既若茲愧彼噉棗栗令者登俊賢充詔冠庭實邦伯乃宗公惟帝舊良弼置醴餞以行行行季冬月騏驥入羈駕千里終不蹶慙豫延蔭人安得結子襪心雖羡名埸才命甘汩沒祿仕二十年屢遘龍榜揭在昔見麻衣于今盡超越是以對杯觴謹嚴微敢忽寧唯畏後生自恨踈節骨肴羞羅食案包核備時物里婦或窺觀戶下紅裙出歸應願生男生男付𥿄筆乃信讀書榮况即服緼韠長歌食蘋詩聲淡異鳴瑟和石昌言求牡丹栽昔年藥欄下巳多香草名更移花本去聊助日邊榮莫問西都品存吾舊友評會應包蕚吐可與魏姚并帶土歸金谷封根近玉京謫仙方醉詠不倚錦宫城歐陽永叔有花品和十二月十七日雪窮冬徑臘巳過半曉雪先春何處來豈是全資南畝麥多應不分北枝梅庭中未許野童掃林上唯愁狂吹催莫問兔園同賦客相如居右最為才建溪新茗南國溪隂暖先春發茗芽采從青竹籠蒸自白雲家粟粒烹甌起龍文御餅加過茲安得比顧渚不須誇送詹彥迪祕校之越夙懷山水心夢寐向東越聞為會稽行獨此羡明發渡江信春潮泊館食野蕨平時異梁鴻但泛鏡湖月謝人惠茶山色巳驚溪上雷火前那及兩旗開采芽幾日始能就碾月一罌初寄來以酪為奴名價重將雲比腳味甘回更勞誰致中􅍽水况復顏生不解杯和立春茲日何所喜所喜物向榮㡜縷作翠柳意先新陽生塗金鏤為勝義不首時輕增年巳歎老斗酒聊自傾和謝仲弓廷評新理北園園吏乘冬和荷鋤去宿莽主人因其勤築土截荒壤移枯復窊缺剗徑就平廣東北倚高城巇險不可上愛彼林木深便為丘壑想更待春風歸日探花卉長但願多置酒應得時一往和謝仲弓廷評栽竹移得溪邊翠來為庭下隂惜根存舊土帶筍助新林暗換蕭蕭葉知虛寸寸心東風莫搖撼培壅未應深和歲除日一年三萬六千刻玉漏唯餘十二時去日苦多誰會惜殘隂全少頗能知巳驚顔貌徐徐改不奈烏蟾冉冉馳萬國明朝賀新歲東風依舊入春旗明井在城東南顯晦有難必孰云幽不明深井發寒泉光若月色盈隂陽信竒變曷用究厥情譬彼出炎火投薪丹熖成吾人勿驚異但自汲瓶罌楊公懿得頴人惠糟鮊分餉并遺楊叔恬頭尾接清淮淮魚日登網吳蓴芼羮美楚糟增味爽云誰得嘉貺曾靡獨為享乃知不忘義分遺及吾黨和楊袐校得糟鮊食魚何必食河魴自有詩人比興長淮浦霜鱗更腴美誰憐按酒敵庖羊春雪臘前望盈尺姦縮不應乞萬物及向榮而反事凝溧與雨暗爭能不念傷彼茁雖然便消釋終是乖氣律新陽豈憚沮暴柳未為屈隨風勢更巧著樹媚且密誰將背時棄乃欲逞果必摧花自作花旋積旋巳失上天施命令冬春不相匹生物與死物其道安可一嗚呼此飛雪何為在今日和謝公儀學士正月十七日雨後復雪本祈春雨成春雪應誤小桃先次開西漢枚生誰復召南朝何遜自多才潑除燈火上元去挫却勾萌六出來前此解衣爭貰酒不知為瑞與為災先是七日祈雨九日霈然至于今伐桑二月起𧖟事伐桑人阻飢巳傷持斧缺不作負薪非聊給終朝食寧虞卒歲衣月光無隔礙直照破荆扉夢登天壇夜夢登天壇壇上兩仙人來時乘白鳯去時乘白麟我問不我語颯颯山中雨寒食日過荆山山郵雖禁火嶺樹自生煙嗚咽同歸櫓悲哀欲問天泣親非泣玉流淚劇流泉春鮆橫刀膾何心更食鮮濄口得雙鱖魚懷永叔春風午橋上始迎歐陽公我僕跪雙鱖言得石瀨中持歸奉慈媪欣詠殊未工是時四三友推尚以為雄于兹十九載存沒復西東我今淮上去沙嶼逢釣翁因之獲二尾其色與昔同錢將青絲繩羮芼春畦菘公乎廣陵來值我號蒼穹何為號蒼穹失怙哀無窮烹煎不暇餉泣血語孤衷生平四海內有始鮮能終唯公一榮悴不愧古人風歲寒亭種花邀青春種柏要晏歲乃知風露前已辨雪霜勢時俗愛芳菲不妨鳴鶗鵙他年都門歸寧昧始終計澄虛閣箘圃隔囂紛間來衣練裙檻邉生靜意水底見微雲斜照回晴景幽芳襲薄薰主人多賦詠不減沈休文舟次泗上逢黃令因以詩送向曉入汴尾隔河聞人聲得聲不得貌問識舊時名泊舟忽來及袖詩多賢英言除丹徒宰暫作七閩行東南幾千里日夕挂帆輕渡江蓴巳老未足助杯羮最知便道出先見縣人迎依韻和許發運遊泗州草堂寺之什入寺豈緣齋阮公方詠懷心將超紫府手欲拍洪崖雲霧波初淨塵埃鑑巳揩但能傾玉醑不假列金叉逺客歸空速千檣密自挨醒論時事正醉戴野巾喎風俗通吳楚清渾見汴淮遙知香剎外獨與賞心諧依韻和許發運真州東園新成疏鑿近東城蕭森萬物榮美花移舊本黃鳥發新聲曲閣池傍起長橋柳外橫河渾逺波漲雨急斷虹明雲與危臺接風當廣厦清朱鬐有自躍翠柏種初生香草猶能識山苗未得名南峰及西嶺常共酒杯平宛陵先生集卷第十二宛陵先生集目録卷第十二擬李益竹窗聞風擬宋之問春日郡閣閲書梅花擬張九齡詠燕遲雪欲雪復晴送蒙寺丞赴郢州聞角和人雪意詠楊高品馬廄猢猻和欲雪二首和梅花和十一月八日獻桃花和梅花再送蒙寺丞擬王維觀獵擬陶潛止酒擬杜甫玉華宫擬韋應物殘燈和與諸君登西園亭和小雨擬韓吏部射訓狐得韓持國作茅廬和新晴清躬詩嘗惠山泉糟淮白和臘前題臘藥臘酒臘脯臘笋和挑菜和臘日啄木二首語鴆和燕淮陽秀才和石昌言求牡丹栽和十二月十七日雪建溪新茗送詹祕校之越謝人惠茶和立春和謝廷評北園和謝廷評栽竹和歲除日明井楊公懿惠糟鮊和楊祕校得糟鮊春雪和謝學士雨後雪伐桑夢登天壇寒食過荆山濄口得雙鱖魚歲寒亭澄虛閣泗上逢黃令和許發運遊草堂寺和許發運東園目録終
