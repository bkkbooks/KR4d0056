body:
  text: 宋宛陵梅堯臣聖俞著次韻景彞春宴法座初瞻戸牗間衮衣垂處見雲山滿斟玉酒傳宣盡齊挿宮花拜賜閒紅線織成庭下毯明珠結出耳中環闘雞旗底蓬蓬鼓逐勝爭名利害關次韻景彞三月十六日范景仁家同飮還省宿種桃依竹似僊家邀對春風共泛霞席上未觀雙舞鳯城頭巳覺聚啼鴉怱怱跨馬人歸省羃羃生烟樹歛花稚子候門知我醉東方明月照扉斜次韻永叔試諸葛高筆戲書公負天下才用心如用筆端勁隨意行曾無一畫失因看落𥿄字大小得踈宻筆工諸葛高海内稱第一頻年直我來我媿不堪七安能事墨研欲效前人述懶性眞嵇康閒坐喜捫蝨是以持獻公不使物受屈果然公愛之奇蹤寫名實豈惟播今時當亦傳異日嗟哉試筆詩蔵不容人乞唐書局後叢莾中得芸香一本有芸如苜蓿生在蓬藋中草盛芸不長馥烈隨微風我來偶見之乃穉彼蘙蒙上當百雉城南接文昌宮借問此何地刪修多鉅公天喜書將成不欲有蠧蟲是產茲弱本蒨爾發荒叢黄花三四穗結實植無窮豈料鳯閣人偏憐葵葉紅嘲景彞獨愛葵花美嘲江翁還接籬江簡云嘗憶張籍詩有恐傍人偷剪様尋常懶戴出書堂何言恐偷様自是君婦懶五日縫一巾猶道苦未晩次韻景彞閣後紫薇花盛開禁中五月紫薇樹閣後近聞都著花薄薄嫩膚搔鳥爪離離碎葉剪晨霞鳯皇浴去池波響鳷鵲陰來日影斜六十無名空執筆頴毛應笑映簪華送李太伯歸建昌推天以知命自古豈不然桓魋及臧倉嘗毁聖與賢後人何蹈之其事實好還君居麻源谷學禮如鄭玄聲名乆巳大籍籍四海傳昨因丞相舉便謂升雲烟朅來太學舘食貧向三年忽懷枌榆下歸思獨綿綿得告許暫徃落莫求楚船捋髯滄江上仲看饑飛鳶誰識鵷雛志閒誦莊叟篇喜問里中兒重到舊林泉洗蕩俗塵垢焚裂跨馬韉不向世路去徒取愁腸煎雞豚粗可養禾黍亦足田不慙莎衣蟲以葉自包纒及其飽滿時曷異冠貂蟬君意我强寫雖慕何由縁送林大年殿丞登第倅和州和靜先生負美才族孫今似漢庭枚敗亡項籍江邊廟應媿文場戰勝來王知章尉河内古縣太行下老槐三四株以言新作吏不似舊爲儒黄綬心猶壯青雲志豈無漢朝吾遠祖不道此官麤送祖擇之赴陜府古來分陜重猶有召公棠此樹且能乆後人宜不忘君從金馬去郡在鐡牛旁山色臨關險河聲出地長罇無空美酒魚必薦嘉魴天子憂民切行當務勸桑中伏日永叔遺冰日色若炎火正當三伏時盤冰賜近臣絡繹中使馳瑩澈肖水玉凛氣侵人肌近日多故友分貺能者誰信都顧貧賤物物義不遺念我老且病赤疿生枯皮巨塊置我前凝結造化移畏冷不敢食有類夏蟲疑雖然巳快意何必咀嚼爲天子厚扵公不使熾毒欺公亦厚扵我將恐煎熬隨我有䑛犢愛自憐小子龜次韻和永叔贈别擇之赴陜郊古人相送贈以言今人相送舉以酒酒行殷勤意豈踈酒罷躊躇悲更有行當何之來者誰陜府兵吏爭迎走壺漿徃徃過函關翰林惜别方携手自言老大遇知難願得公詩爲不朽公因索筆作長謠落落寓言誠十九我慙竹管厠宮懸縱合律度應非偶太守西行巳不貧忽獲明珠盈大斗歸立螭頭未是遲暫向棠陰問遺叟送施縡秀才下第君嘗老扵敵輕彼群兒嬉堅銳不可恃屢北還自疲胸中多奇秘旣􅗮何所爲東走滄海上夏果采荔枝奉親樂無涯豈愧禄仕遲送張山甫武功簿洛陽舊交有七人五人巳爲泉下塵各家生兒爲門戸唯子弟兄先立身我與信都侯獨在喜見及禄知天仁昨日聞𥙷武功吏氣調欲與南山親少年勉力向職事莫學老貪文字新送微上人歸省天台釋子懷慈母吾儒未易輕不㝷琪樹去肯向石橋行海近雲多潤山高日少晴天恩新賜服書字欲傳名寄天台梵才上人常觀月從東海出想照石橋旁畔人試問當年與今日清光不改只如新送李信臣尉節縣先歸湖州梁王吹臺側五月多荷花荷開對翹鷺吳客還思家家在水中城四靣如鋪霞焉能長相守千里獨起嗟補官東海上物景莫言賒送王廵檢之定海休淬鸊鵜劔休調鵲血弓平時自壯大何所立戰功得兵不滿百防冦滄海東駕船如飛鶻出入巨浪中苟能勇扵此遇敵無廢忠同梅二十五飮永叔家觀所抄集近事劉敞陶公一畝宅尤愛北窓風心遠地誠僻客來尊不空觀書太史氏全性市門翁予亦何爲者扵此清賞同來上人歸宣城兼柬太守孫學士李白不猒昭亭山看盡飛鳥雲獨閒我今相送一懷想想在謝公窓戸間始作鷰子巾褁髻不褁額自名鷰子巾翼覆尾涏涏誰問巢由人謹賦避暑就高臺不如就賢人賢人若冰雪論道通鬼神自言信手書字字事有因徃徃得遺逸烜赫見名臣是日劉夫子拍手氣益振重覩太史公吾徒幸來親大笑舉玉杯陶然任天眞内樂不復熱豈以身爲身送侯孝傑殿丞簽判潞州同在洛陽時交㳺盡豪傑倏忽三十年浮沉漸磨滅唯餘一二人或位冠䕫卨我今存若亡似竹空有節人皆欲吹置老硬不可截君自緱山來别我不畏熱言作潞從事家貧禄仕切六月上太行辛勤非計拙天當氣候凉清風自騷屑雖云數日勞斗與炎蒸絶君本公王孫才行實修潔鏘鏘發英聲瑩瑩如佩玦是爲君子器終見不渝湼相逢未易期夢寐歸鼓枻送張子野知虢州先歸湖州未赴虢太守暫歸吳興家吳興近洞庭橘林正吹花君當橘柚時摘包帶霜華清甘不楚齒若酒傾殘霞谿山小女兒姹姹兩髪丫􅒁􅒁上氍毹嘈嘈弄琵琶是時與之醉何似走塵沙送尹瞻駕部監靈僊觀天地如轉磨屑屑今古人一落大化手團品惟其新不幸積不用衮衮同埃塵日月行何窮過盡千萬春人生占幾許百歳猶比晨君求灊山濳捨去兩朱輪願效陶淵明翦紗爲破巾山前溪多鱗山下酒甚醇看雲舉大杓杓造舒州民李白嘗愛之死生曾與均此志我亦有更將猿鳥親送朱玠戸曹之廣德軍南方小兒纔讀書徃徃得官呵路衢君今五十始作掾手板青袍非壯圖况來桐汭水上城折腰强顏休歎吁城西古祠能致雨歳不有旱民無逋民樂未央君可娛舊俗不與吾鄕殊次韻和永叔原甫致齋集禧廟蠁靈祠屬二公齊心相望切朱宮緑渠繚繞壖垣水廣沼清泠漲殿風巳詠應麟來五畤仍歌翔鴈雜殊翁遙知畢事期尋勝尚問衰羸未猒窮送王司徒定海監酒稅悠悠信風㠶杳杳向滄島商通遠國多釀過東夷少懷鄕寄書遲見日知晨早應聞有海花何必樹萱草端明李侍郎挽歌三首少年爲侍從名譽竟軒騰毎吐胷中鳯寧容筆上蠅受釐延漢室被謗過周陵今日泉宮啓師臣禮秩增官豈不爲逹其如望未充敏辭傾一代發問詘三公猒向承明直思行邵伯風嗟嗟玉樹折埋沒彼蒿宮秋樹無黄鳥蟬聲亦自哀素車新隴去白馬舊賔來薤上朝陽露池中歳刼灰短長何足較嗣子有高才次韻和永叔夜聞風聲有感月落夜正黑風起庭槐端窓間星動摇枕上人窹歎所歎吹陰雲苦熱彌不歡當其氣莫出曷若無衣寒虛堂卧竹簟汗體如露漙驅蚊爇蒿艾寧復襲芝蘭煎灼一如此衰枯誰可完消磨任寒暑安有不死丹三伏巳過二炎赫應漸殘試看蜣蜋蟲辛勤方轉丸焉得從釣舟逆上嚴子湍此事人所易謝榮爲獨難誰顧萬古名黑石持鐫刋風聲不用撼牀頭閒素紈次韻和永叔石枕與笛竹簟溪上枕剖龍卵石蘄匠簟製虵皮紋客從東方一持贈竹色蒸青石抱雲磨沙斵骨自含潤飽霜弔節無畱塵京師貴豪空有力六月耐此炎蒸劇旱風赤日吹熱來大厦高簷任雕飾頭顱汗匝無富貧雖有頒氷論官職官高職重氷則多日永氷消難更得唯公掃室施枕簟迎凉自感東方客東方客應非俗昏能使賢人心體適賢人何以偏伏人天下才名方赫赫我吟困窮不可聽晝夜蚊蚋蒼蠅聲蠅如遠雞耳初感蚊若隱雷空際鳴葛厨頂綻屋蝎墮菅席中裂麻經横平生賦分只煎炒安有禄玉琉璃清猶勝昔年杜子美老走耒陽牛䏑死因思楊惲廢時言但願人生行樂爾公今事業在朝廷去就尤當愼終始待公睦足秋風來去奉高談揮麈尾寄題朱表臣職方眞州新園青窓江上樹杳藹宮前道道側有新園園中無惡草松隴方在望茅屋聞巳考朝廷正急才何得言歸老次韻和原甫閣下午寢晩歸見示殿閣風來夏日長青林抽嫩見餘芳筆供五吏詞休敏簟展雙紋睡正凉故事早歸何獨晚舊交新詠尚無忘不言偃仰中園樂還愛眉間喜色黄三十二弟寺丞歸宣城因寄太守孫學士謝公下車日郡内一登望昭亭山蒼蒼寒谿水瀁瀁句清宛微渾三洲分細浪小艇下灘來群鷗舞潭上借問鷗何若水深魚莫向鷗餒猶識機魚樂不忘餉子去見太守扵我必有訪但寄此薄言罇前爲之唱送刁景純學士赴越州會稽迎太守舟屋畵粉艧前舟載圖書後舟載女樂月出鏡湖心長笛使孤作還見漁者來曾令李謩愕吹裂比竹管士果不可度二分學宮裝艷色闘京洛嘗聞有西子菡蓞不相若得郡考故跡精絶古所怍愼莫爲俗牽乗閒數斟酌送宋郎中知商州孝孫商扵六百里太守二千石地廣任亦重車建旗仍赤嘗聞四老人采芝畱舊跡古廟蔵空山曾無漢羽翼其事有圗畵家傳多典籍願君爲政閒桉覽知疇昔六月晦日定力院同原父賦送伯鎭景純樞言三學士清秋三黄鵠舉翼東來飛鳴聲旣相呼烟水亦相依蓬池不暫止太液未言歸酌酒望滄海飄颻思菊衣次韻和景彞省闈宿齋二首晝日南宮雨後凉齋嚴官重靜扵常庭前鬪雀墮還起欄下秋花落自香看盡雲容天漏碧讀殘書秩卷披黄九衢塵土莫能到蕭瑟微風葉響廊新周斜光依約見夜蟬高樹有時鳴曲眉不想西家様餒腹還思二子清迭代物華何足較古今榮辱豈須驚靜來應覺能閒少人事區區逐日生送刁景純知會稽前有朱翁子後經王右軍至今風俗美自昔誦歌聞秦望臨丹㦸耶溪潄白雲只應絲管去驚動海鷗群次韻荅王景彞聞余月下與内飮仰頭看月見新鴻形影雙飛玉鑑中呼我作卿方舉酒更煩佳句賞高風次韻和景彞對月蕭蕭風雨變凉意索索晩雲開斗晴巳洗浮埃天外靜忽生圓月樹頭明草根蟲穴吟來乆屋角星河落更清我愧西垣侍臣比景寒霜鬢兩三莖和景彞西閣獨直池頭鳯皇寒井上梧桐老鳯寒浴巳晩桐老脫亦早是時有詞臣獨直正視藁嚴嚴代王言落落奮清藻演成五色絲世作非常實貶如市朝撻襃若華衮好四方號令施萬耳昏聾掃此職唯其才用居寧草草宛陵先生集卷第二十一宛陵先生集目錄卷第二十一和景彞春宴和景彞同飲還省宿和永叔試諸葛筆唐書局後得芸香嘲江翁還接籬和景彞閣後紫薇花送李泰伯歸建昌送林殿丞倅和州王知章尉河内送祖擇之赴陜府中伏日永叔遺氷和永叔送擇之赴陜送施縡秀才下第送張山甫武功簿送微上人歸天台寄天台𣑽才上人送李信臣尉節縣送王廵檢之定海劉公同飮永叔家來上人歸宣城始作鷰子巾謹賦送侯孝傑殿丞簽判潞州送張子野知虢州送尹駕部監靈仙觀送朱戸曹之廣德次韻和永叔送王司徒定海監酒稅李端明挽歌三首和永叔夜聞風聲有感和永叔石枕與笛竹簟寄題朱職方新園和原甫午寢晩歸三十二弟歸宣城送刁景純學士赴越州送宋郎中知商州定力院賦三學士和景彞省闈宿齋送刁景純知會稽次韻荅王景彞聞余飮和景彞對月和景彞西閣獨直目録終
