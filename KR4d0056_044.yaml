front:
  text: 宛陵先生集卷第四十四
  hash: sha256:14cb7efffc8c88ea91a998188b8e0d6d9bc0fe303d310d24d3be95b20c10e15f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_044-1a}
body:
  text: 宋宛陵梅堯臣聖俞著寄維陽許待制當時永叔在楊州中秋待月後池頭約公凖擬與我敵是夜二雄張利矛我時小却避其鋭風愁雨怚嫦娥羞主人持出紫石屏上有朏魄桂樹婆娑而枝虬作詩誇詫疑天公愛惜光彩向此收四坐稽顙歎辨敏文字響亮如清球更後數日我北去相與送別城門樓誰知康成能飮酒一飮三百杯不休雞鳴各自便分散山光寺側停畫舟我來謁公公未起卧索大白須扶頭而今倐忽巳八載公領府事豫居憂歐陽始是玉堂客批章草詔傳星流問公可憶羊叔子雖在軍中常緩帶而輕裘寄聲千里能信不紫薇亭在池州江雲如旗腳墨點飛鴈行平圃采芳菊上水酌桂漿為言此何時杜子逢重陽醉思莊生逹哂彼齊景傷至今孤亭間獨有九日章昔我來齊山山僧迎道傍騎馬到寺門亂石屹若墻值雨不遍歷但取山泉嘗牧之舊遊處苔滑屐莫將却返弄水涯隔溪望青蒼絶頂見茅屋洪波日湯湯雲霞與鴈鶩還動秋客腸去逾十五年遊宦韓陳梁哀哀遘禍殃乃再居南方欲往尚未可追吟寄支郎聞臨淄公薨至和癸巳十二月兮友人語我火犯房芒射鉤鈐而拂上相兮禍非弼臣誰可當昨日聞太宰悟天道而畏忌兮歸卧其第三拜章太宰既不得請而賜黃金百兩以為壽兮諫官御史猶擊強明年孟陬臨淄公薨兮果然邦國橈棟梁豈無神醫善藥以起疾兮固知稟命有短長公自十三歲而先帝兮謂肖九齡宜相唐後由石渠鳯閣禁林以登樞兮俄佩相印居廟堂出入藩輔留守兩都兮其民詠歌盈康莊官為喉舌勳爵一品兮經筵講義尊蕭匡年踰順耳不為夭兮文字百卷存縑箱子孫侁侁同鴈行二女貴壻冨與楊未知歸葬何土鄉臨川松柏安可忘我為故吏摧肝腸灑淚作雨春悲涼精魄其歸於天乎必為星宿還高張骨肌其歸於土乎必為蕙芷不滅香墓碑墓銘誰能盡其美我為欲傳萬古須歐陽吳正仲遺二物詠之金盞子鍾傳令公謂之醒酒花鍾令昔醒酒豫章留此花黃金盞何小白玉碗無瑕始入吳郎宅還歸楚客家從茲不能醉只恐賣流霞疊石十片寒湖滑千秋白浪根蒼蒼古崖色疊疊老苔痕欲象巨鼇頂俯當科斗盆唯愁作險説平地起崑崙依韻和宣城張主簿見贈韓子於文章所貴不相俲譬彼古今人同心不同貌吉從志久慕亦以重名教鳴鍾與享鼎易厭非苦樂祿仕不及親揚名可為孝君方佐大邑美錦同翦鉸遂令吾鄉民綢直無曲橈既暇乃作詩欲與前人較朝來忽有贈捧若管窺豹又如捕鯨魚空自持網罩心降醉且睡昏昏不知覺送吳正仲婺倅歸梅溪待闕山水東陽去未去朋親舊霅朝復朝更無越相逃名舸猶看吳王送女潮海燕歸齊聲滿屋溪梅開過子生條明年十月吏迎處七里灘前棹奏簫再送正仲擬君杜鵑花發當杜鵑時朱袍照白日光彩生路岐自比青鼠瓜中心如亂絲絲亂復不理况復逺別離傾觴恨不深立馬恨不遲千山從此隔三歲或前期爾後各寄書空識滿𥿄辭非如笑言樂但有牽懷悲念昔蘇與李徘徊問何之鐵獺新買小馬也朝乘鐵獺上青山最滑春苔亂石間出入白雲勝蠟屐玉驄雖貴未應間送回上人因往湖州謁吳正仲雲出任西東飄然意莫窮山川生眼界巾舄遍區中去去曾無著勞勞本是空梅溪人可見重爾似泓公送徐絳祕校罷涇尉而歸去年茶熟君得補今來茶熟君巳去心曾不計茶有無隼在高風自騰翥昨日我送吳侯歸未忍重臨離別處不若羣公憐禰衡相逐縱橫唯柳絮志來上人寄示酴醿花并壓磚茶有感京都三月酴醿開高架交垂自為洞素葉層層紫蕊香釀歸光祿春生甕東陌西池走鈿車芳林廣囿飛朱鞚二年不到大梁城江邊淚滴肝腸痛况茲齒髮漸衰老巳是憂愁不如衆宣城北寺來上人獨有一叢盤嫩蕻去歲遊吳求不得今朝還喜自持送眼底雖同往日看樽前所憶皆成夢又置新茶采雨前鳥觜壓磚雲色弄對花却酒煮香泉強詠才慙非白鳯聞鶯最好聲音最好聽似調歌舌更叮嚀高枝拋過低枝立金羽修眉墨染翎杜鵑蜀帝何年魄千春化杜鵑不如歸去語亦自古來傳月樹啼方急山房客未眠還將口中血滴向野花鮮依韻和李察推留別我學猶肥腱一食輒易猒君何以名虛每來車馬淹經術素所淺道義安得漸獨有寒苦吟可與前古兼今者抱悲哀憔悴居窮閻愁鳴無好音亟別空顧瞻詩言留彼美欲和慙無鹽短兵當長戈焉得不盡殱又如握枯蒿逆風乘烈炎膏盲靡自療誰復望針砭送李節推挈內歸寧池陽並李察推往南康軍嫁妹二君同行江上雙畫舸風帆或先後晚共泊蘆洲欣同幕中友一過長風沙一住貴池口當時驄馬客今是慿熊守每憐諸女賢與壻來為壽上去至南康嫁妹事箕帚不畏楊瀾險不為廬峰秀二君情義著我送何須酒新開墳路古徑約城斜鋤荒可過車直穿深篠去不比繞村賖伐樹侵籬腳禆塍掘澗沙欲為蘭若處松柏屬吾家送鄒秀才遊浙鞍傍帶劒魚皮鞘馬後擕童越葛衫度水緣山君底急區區為答古千巖四月三日張十遺牡丹二朵巳過榖雨十六日猶見牡丹開淺紅曾不爭先及春早能陪芍藥到薰風依韻和唐彥猷華亭十詠顧亭林顧亭林湖在東南三十五里湖南又有顧亭林傳是顧野王居鄉林空林木不見古人居猶尋古人迹更與古人踈昔為賢豪里今作魑魅墟湖邊夜夜月光彩波上餘寒穴金山有寒穴出泉甘淸山頭寒泉穴淨若鏡靣平尉齒𫾣冰冷貯瓶微玉聲傍有野鹿迹上啼林鳥清何由一往挹况復方病醒吳王獵埸在華亭谷東今其地為桑陸孫氏有吳國四海未息戈獵以耀威武平野萬騎羅英雄魏與蜀貔虎一何多世事異莫究但見桑麻坡柘湖在南七十里吳越春秋海鹽縣淪沒為柘湖吳地記秦時有女子入湖為神今存其祠柘土久陷沒千歲嗟水濱不復吳鹽邑空有秦女神浩蕩吞海日曠闊迷天津扁舟誰能往旦暮逢漁人秦始皇馳道在崑山南四里有大通吳成秦帝觀滄海勞人何得修石橋虹霓斷馳道鹿麋遊車轍久已沒馬迹亦無留驪山寶衣盡萬古空冡丘陸瑁養魚池在縣西令名瑁湖云陸瑁所居也來觀瑁湖水乃是陸生居春塘草幾變誰膾此中魚莫容科斗應亦有魯王餘不隨蛟龍飛神鱉未可除華亭谷在縣縈紆三百里入松江斷岸三百里縈帶松江流深非桃花源自有漁者舟間意見水鳥日共泛觥籌何當騎鯨魚一去幾千秋陸機宅華亭谷水東有崑山即其宅機詩云髣佛谷陽水卷戀崑山隂我思陸平原廢宅荒草深才高乃速禍事往不可針飢烏噪樹顚野鼠窟庭隂黃耳亦巳死家書無復尋崑山華亭谷東一里有崑山陸機祖葬而生機雲人以崑山出玉以擬其美焉陸氏幾世祖葬此生令名猶如産美璞遂爾傳嘉聲寒巖畜奇秀源水日東傾何言千載間二子不更生三女岡在東南八十里云是吳王葬女為三岡吳王葬三女因留此岡名巳化被粲質合有蘭蕙生嬋姢夜月照暗藹朝霧平古魂如未泯不逺闔閭城李獻甫於南海魏侍郎得椰子見遺魏公畨禺歸逢子蕪江口贈以越王頭還同月支首割解為飮器津漿若美酒我獨愧先生饌致崇師友應知愈飢渴况是懷思久齊民要術云其俗為之越王頭時魚四月時魚逴浪花漁舟出沒浪為家甘肥不入罟師口一把銅錢趂槳牙烏賊魚黃馬二君餉海若有醜魚烏圖有烏賊腹膏為飯囊鬲冒貯飮墨出沒上下波猒飫吳越食爛腸夾雕蚶隨貢入中國中國捨肥羊啖此亦不惑依韻和行之枇杷豫送紅梅與之五月枇杷黃似橘誰思荔枝同此時嘉名已著上林賦却恨紅梅未有詩送紅梅行之有詩依其韻和綴綴紅梅肥似蠟濛濛飛雨灑如脂吳郎齒軟食不得翻憶張公大谷梨送王宗望罷宣城尉歸京南土梅巳黃北人舟競發去意方若渴望林殊未歇言歸向梁宋獨歎滯楚越行聞拜卿屬恩下蒼龍闕寄題南陵息亭蕖閣竹裏有淸館池中多藕花日光穿岸腳水影射簷牙柱穴蜂歸響爐檀火過窊巳知民訟息漉酒費巾紗讀問月我讀李白問月詩乃知白也心太癡明月在上爾在下月行豈獨君相隨白兔搗藥亦何療嫦娥孤棲欲嫁誰古人今人被磨滅休問有來都幾時唯有長照金樽裏此言萬世不可移但能自醉月自落夜夜如此誰復疑一月二十二三日半是風雨相乖離常願晴明對以飮耳邊流水勝鳴絲五月十日雨中飮梅天下梅雨綏綏如亂絲梅生獨抱愁四顧無與期妻孥解我意草草陳酒巵檻外百竿竹新筍高過之竹色入我酒變作青琉璃一飮眼目光再飮言語遲三飮頽然兀左右歎我衰有鳥從東來引頭闖深枝發聲醒我醉提壺美無疑典衣不直錢唯是布與絺安得如古人車傍挂鴟夷次韻和吳季野遊山寺登望文脊山山屬宣城楚客好山水五月上高峰峰頂望文脊草樹皆有容身既近猿鳥心欲追喬松石壁出雲背苔磴千萬重下視霹靂飛忽起枯株龍却還僧居宿暮踐樵子蹤作詩留粉墻削藁為我封美璞世未識獨令和氏逢宛陵先生集卷第四十四宛陵先生集目録卷第四十四寄維陽許待制紫微亭聞臨淄公薨吳正仲遺二物和張主簿見贈送正仲婺倅待闕再送正仲鐵獺送回上人送徐尉罷任歸志來上人寄酴醾聞鶯杜鵑和李察推留别送李筯推新開墳路送鄒秀才遊浙張十遺牡丹和唐彥猷十詠李獻甫遺椰子時魚烏賊魚和行之枇杷和行之紅梅送王尉罷任歸京南陵息亭蕖閣讀問月雨中飮和季野遊山門寺目録終
