body:
  text: 宋宛陵梅堯臣聖俞著和謝希深㑹聖宫三后威靈逺層巒棟宇興衣冠漢原廟歌舞魏西陵日月融光盛山河王氣增叢楹琢文石連網絡朱䋲碧瓦寒鋪玉重欄瑩鏤冰粹儀神霧擁法衮繡龍升星斗羅容衞軒墀侍股肱宸蹤耀璇牓瑞羽集觚稜閟殿深珠箔雕垣界綺縢笙從緱嶺咽雲傍帝鄕凝龜組恭來詣貂璫肅奉承欲知歸厚意孝德自烝烝右丞李相公自洛移鎭河陽侯服齊三輔天臺聳百僚新章刻銅虎舊德冠金貂巳作歌𥜗化方期執玉朝䨇鞬辭洛宅千騎向河橋鼓角春城暮鶯花故苑遙瓜亭猶接畛棠苃自敷條夾道都人擁迎風駟牡驕莫隨文學乗空望斾旌飄上巳日午橋石瀨中得䨇鱖魚脩褉洛之濱湍流得素鱗多慙折腰吏來作食魚人水髪粘篙緑溪毛映渚春風沙暫時逺紫線憶江蓴寒食前一日陪希深逺遊大字院一百五將近千門煙火微閑過少傳宅喜見老萊衣晚雨竹間霽春禽花上飛禪庭淸溜滿幽興自忘歸遊龍門自潜溪過寶應精舍遙愛夏景佳行行淸興屬安知轉廻溪始覺來平谷古殿藏竹間香菴遍巖曲雲霞弄霽暉草樹含新緑時鳥自綿蠻山花競紛縟莫言歸路賒明月還相續依韻和希深遊大字院白傳舊宅夫君康樂裔顧我子眞派湛然懷清機超爾尋虛界暫來香園中共憇寒松大先生醉復吟長老言不壞信與賞心符寧同俗士愛杖屨恣遊遨池塘仍感槩焚香露蓮泣聞磬霜鷗邁靑板今巳空濁醪誰許載軟草當熊絪低篁挂纓帶不覺月明歸候門僮㒒怪傷白雞我庭有素雞翎羽白如脂日所慮狂犬未嘗憂孽貍暝棲向簷隙朝啄循階基毎先烏鳥鳴不失風雨時雖吾囷廪薄尚汝稻糧遺昨宵天氣黒隂物恣所窺潜來㗸搏去但覺聲音悲開門俾馳救巳過墻東陲呵叱不敢食奪然留在玆湧血被其頸嗋呷氣甚危皓臆變丹赤霜翅兩離披憫心欲之活碎腦安能治委瘞從爾命孰忍薑桂爲猶看零落毛蕩漾隨風吹念始託玆地蒙幸信可知充庖豈云患度日無苦饑如何遇兇獸毒汝曾不疑斯事義雖小得以深理推鄧生賜山鑄未免終餒而人道尚乃爾愴焉聊俛眉尹師魯治第伐樗伊人利營構思欲新其居匠築經舊址簷楹礙高樗且云忍不伐何以成吾廬人言此樹古百怪所慿依獨秉一定議自將羣俗違乃俾執柯者丁丁霜刃揮殱殞條百尺橫仆株數圍從玆朝夕閒不聞鳥雀喧旣能考子室而復高其門周也昔騁辯得以不材論工今誠匪度苟害安可存舟檝且非藉薪爨聊用燔莫比溝中斷區區望犧樽尹陽尉耿傳惠新栗金行氣巳勁霜實繁林梢尺素走下隷一奩來逺郊中黃比玉質外刺同芡苞野人寒齋㑹山爐夜火炮梨慚小兒嗜茗憶麤官抛此焉眞可貺遽爾及衡茅和楊子聰㑹董尉家董生方好雅玆日爲掃扉森爾延嘉賓歡然去塵機有客振雙袂敢言陽春暉聊停玉麈尾爲歌金縷衣古辭何稠疊無乃惜芳菲三閭不餔糟二子自採薇雖留千載清未免當時饑吾愛曹公詩古來不敢非人生若朝露捨醉當何歸四座驚此語未猒翠觴飛胡能後天地何可恃輕肥沈酣且長詠白首空歔欷嶺雲片雨過青天山雲歸絕嶺林際隱微虹溪中落行影還看隴首飛復愛山間靜垂澗藤寒松偃澗濱弱蔓垂纓緑波縈翠帶長水濺低花馥終日採蘋人攀條映巖曲林翠鬱鬱長條抽林間翠堪翦背嶺山氣濃幽人趣不淺舟中遇雪曉風鳴大澤春雪下長河沙草縁堤沒楊花拂水多驚鷗不知逺候鴈幾聞過欲問耶溪轉今朝柰興何田家四時昨夜春雷作荷鋤理南陂杏花將及候農事不可遲𧖟女亦自念牧童仍我隨田中逢老父荷杖獨熈熈草木遶籬盛田園向郭斜去鋤南山豆歸灌東園瓜白水照茅屋清風生稻花前陂日巳晚聒聒競鳴蛙荒村人自樂頗足平生心朝飯露葵熟夜舂雲谷深採山持野斧射鳥入煙林誰見秋成事愁蟬復怨碪今朝田事畢野老立門前拊頸望飛鳥負暄話餘年自從備丁壯及此常苦煎卒歲豈堪念鶉衣着更穿涂中遇雪寄希深方爲郡邑吏日與故人違極目千山碧馳心一鳥飛岸傍村杳杳波上雪霏霏欲寄洛陽信泝流行客稀妾薄命昔是波底沙今爲陌上塵曾聞清泠混金屑誰謂飄揚逐路人悠悠萬物難自保朝看穠華暮衰老湏知鉛黛不足論何必芳心競春草草有再三榮顔無一定好曩恩寧重持徒能亂懷抱秋日同希深昆仲遊龍門香山晚泛伊川觴詠乆之席上各賦古詩以極一時之娛落日川上好徘徊弄孤舟鳴桹進山口清唱發渡頭淺瀨不可泝停橈信中流山樽對蒼翠溪鳥自沉浮濯足破嵐影采菱臨芳洲千龕晚煙寂雙壁紅樹秋細細石間泉搖搖波際樓澄潭若瀉鑑萬象巳盈眸康樂足清尚惠連仍此遊摘景固無遺揮筆曾未休醉來同淵明興盡殊子猷歸傍漁梁靜行看夜火幽露華初滴滴夜吹何颼颼不犯嚴城漏誰言憐近丘依韻和希深雨後見過小池碧池新雨後清興一何賒有客過顏巷無貧似阮家白醪聊泛蟻黃菊未開花旣至休辭醉君其柰歲華依韻和子聰夜雨窻燈光更逈宿霧晦層簷寒氣微生席輕風欲度簾濕螢依草没暗溜想池添况值相如渴無嫌魯酒甜和趙貟外良佐趙韓王故宅開國勲庸大重城邸第寛枯楊映樓角蔓草被墻端不見分香妾空餘闘鴨䦨誰來悲孔雀金翠羽毛殘春日遊龍門山寺還邀二三子共到鑿龍遊隂壑泉初動春巖氣欲浮竹藏深崦寺人渡晚川舟始覺山風急歸鞍不自留依韻和希深遊府學東府尊儒日中州進學初牲牢奠商後典籍講秦餘大法存無外羣英樂自如時慙遊聖末來駕折轅車傷桑柔條初變緑春野忽飛霜田婦搔蓬首氷𧖟絕繭腸名翬依麥雊戴勝繞枝翔不見羅敷騎金鈎自挂墻觀理稼稂莠日巳長怱怱芟薙初來時露沾屩歸去月侵鋤一腹餒猶甚百骸勤有餘吾無力畊苦謬讀古人書新繭露柘林初靜煙梯不復收春𧖟吐絲足工女忌寒休翠薄時方獻清泉緒未抽閨中能自巧繡作玉釵頭依韻和希深遊樂園懷主人登封令竹映紅蕖水榭開門閑乳雀下青苔伊人何戀五斗粟不作淵明歸去來錦竹此草也似竹而斑雖作湘竹紋還非楚筠質化龍徒有期待鳯曾無實本與凡草俱偶親君子室廢井陻廢不知年石欄蒼蘚澀渴心空自煩長綆曾誰汲無復語滄波坎蛙奚所及茶竈山寺碧溪頭幽人緑巖畔夜火竹聲乾春甌茗花亂兹無雅趣兼薪桂煩燃爨緱山子晉祠以下陪太尉錢相公遊嵩山七章王子居玉京故山空寂寞猶聞遡月笙尚想賓天鶴翠栢深古壇丹霞留逈壑芝庭誰欵扉旌旗穿林薄少林寺紅旌過翠岑林際瞻蓮宇門對幾千巖花開第一祖禪庭松色寒石室苔痕古寂寂不逢人空簷鷰方乳少姨廟靈祠古殿深少室羣峯碧行雨欲隨車望巖非化石常聞蘭氣蒸誰奠椒香液寄謝洛川妃凌波定何益天封觀車馬雲外來衣霑半山雨弭節扣眞居捫蘿笑塵矩廻溪響石叢靈茹抽巖塢玉檻刻年華應無愧前古殿檻石柱上有唐樊宗師石鴻韓退之盧仝題名在焉今亦刻名於此㑹善寺杳藹隨龍節縈紆歷寶山瑠璃開淨界薜荔啓禪關煑茗石泉上清吟雲壑間峯端生片雨稍促畵輪還啓母石曠哉嵩室陽神怪所棲宅蒼石不知年靈熊去無迹煙巖想桂宫苔壁疑椒掖不學舜娥悲瀟湘竹枝碧轘轅道險絕稱漢關晨躋瞻一室盤紆石路回迤邐雲峰出古壁挂青蒼天風起蕭飋洛城西首時望望平煙宻中伏日陪二通判妙覺寺避暑時有僧鼓琴於座上紺宇迎凉日方床御綌衣清談停玉麈雅曲弄金徽高樹秋聲早長廊暑氣微不湏河朔飲煑茗自忘歸元政上人遊終南雉節居杜陵南山常在目今玆羡行遊因以謝巖谷環錫恣探勝㯶綦方踐陸五門嵐翠橫八水秋隂覆雲峰多隱見林嶺乍回復若見採芝人余非戀微禄寄河陽簽判富彥國籍籍名方逺人知第一流翻同貴公子來事外諸侯地險長河急天高畵角秋仲宣應自樂寧復賦登樓河南受代前一日希深示詩我昔在桐鄕伊人頗欣戴今來佐洛南事事爲時背自愧居下流無能謝前軰固乏橫草功當蒙及瓜代且遺牒訴還何用吏民愛洗眼看舊書怡然忘宇内秋雨雨後秋氣早凉歸室廬清旣摧蚊蠅勢任壯蛩蟬聲石㨨墜枝熟蒼蘚縁堦生閉門且高卧畏向泥涂行白雲和子聰長憶江海間龍鳴向寒水藹藹蒼渚空悠悠白雲起是時在漁舟放溜看未巳今來居洛陽埃壒生蹄䡄羡君玆日心怊悵聊徙倚同尹子漸王幾道訪郭生别墅不遇秋野巳澄曠偶來幽興多茨居隔寒水柴戸䕃喬柯看竹曾留鳯擕朋不爲鵞人歸碧苔徑應識履痕過水葒灼灼有芳艷本生江漢濱臨風輕笑乆隔浦淡粧新白鷺煙中客紅蕖水上隣無香結珠穗秋露浥羅巾黃河積石導淵源沄沄瀉崑閬龍門自吞險鯨海終涵量怒洑生萬渦驚流非一狀淺深殊可測激射無時壯常苦事隄防河曾息波浪川氣迷逺山沙痕落秋漲槎沫夜浮光舟人朝發唱洪梁畵鷁連古戍蒼崖向浴鳥不知清夕陽空在望誰當大雪天走馬堅冰上王氏昆仲歸寧昨夜雪霏霏梁山吟未歸關河誰道逺鴻鴈自相依落日人煙少寒雲驛路微共將彭澤酒稱壽向庭闈子聰惠書備言行路及遊王屋物趣因以答自我河橋來清話殊未巳亟言閱通疇晨駕遂遵彼尺書忽見遺經由皆可紀草草始辭家怱怱渡河水前村客心速入暮隂風起脩路隘且長疲驂未能止茅居聒夜春寒犬吠墟里明發西北行崗巒踰迤邐叢蓁但蒙宻未見山中美谷開逢邑閭豈謂連都鄙冠帶一二同麏麋左右比問子奚所之俛眉聊啓齒瞥徃登天壇煙雲隨歩趾傍臨日觀低却望嵩丘邇屑屑視塵埃紛紛若螻蟻便有林壑心期將榮宦委我昔愛青蒼無時常徙倚今朝羡君遊勝事空聳企徒嗟黃綬身莫接青霞軌安得慿羽翰幽懷寄如此環州通判張殿丞亢欲向蕭關外窮隂雪暗沙磧寒鴻鴈少冰合水泉賒自有從軍樂應無去國嗟春風曾不到吹角寄梅花張太素之邠幕應幕向豳郊晨裝辭郟鄏長亭欲少留飛鵠初成曲魯酒上離顏行塵生驥足悠悠關戍遙黤黤煙雲屬塞邑多苦寒國風遺舊俗寄音文讌餘莫待霜條緑孫屯田召爲御史薦牘交車府恩書下建章輕軒辭瑞翟危弁學神羊祖酌方滋桂行威欲犯霜鳯毛仍襲慶雞舌更含香氣鬱翔龍闕風清振鷺行今朝洛民思東陌盛壼漿與諸友普明院亭納凉分題岸幘清凉地翛然樂未窮竹隂過晚雨林表見殘虹花影平波上經聲小塢東還思醉吟者寧與此時同梅花似畏羣芳妬先春發故林曾無鶯蝶戀空被雪霜侵不道東風逺應悲上苑深南枝巳零落羗笛寄餘音依韻和希深立春後祀風伯雨師畢過午橋莊青郊誰駐馬謝客思池塘野人微波緑江梅嫩蘂黃初從奠風雨遂此樂壺觴巳愛幽禽語園林卽日芳尹子漸歸華產茯苓若人形者賦以贈行因歸話茯苓乆著桐君籍成形得人物具體存標格神岳畜粹和寒松化膏液外凝石稜紫内藴瓊腴白千載忽旦暮一朝成琥珀旣瑩毫芒分不與蚊蚋隔拾芥曾未難爲器期増飾至珍行處稀美價定多益初見杏花不待春風徧煙林獨早開淺紅欺醉粉肯信有江梅宛陵先生集卷第一
