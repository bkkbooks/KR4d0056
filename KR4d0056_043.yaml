  text: 宛陵先生集卷第四十三
  hash: sha256:8f8b8936419e5ba0c3cef5ce92dd8a702ad115004d86035ca3b93d6a53d5a8d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_043-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和郭祥正秘校遇雨宿昭亭見懷君乗瘦馬來骨竦毛何長下馬與我語滿屋聲琅琅一誦廬山高萬景不得藏岀沒望林寺逺近數鳥行鬼神露怪變天地無炎凉設令古畵師極意未能詳誦說冐雨去夜宿昭亭傍明朝有使至寄多驚俗章郭來誦歐陽永叔廬山高送劉復採石月贈郭功甫採石月下聞謫僊夜披錦袍坐釣船醉中愛月江底懸以手弄月身飜然不應暴落饑蛟涎便當騎魚上青天青山有冡人謾傳却來人間知幾年在昔熟識汾陽王納官貰死義難忘今觀郭裔竒俊郞眉目眞似攻文章死生徃復猶康莊樹穴探環知姓羊依韻和郭秘校苦寒噫風鳴悲鳶鳴哀雨霰枯木爲之摧昭亭山頭野火滅海水夜凍迷蓬萊燭籠以爪自掩耳酒盞生冰拈不起陶濳棄官屋無米兒嚎妻啼付隣里依韻和郭秘校昭亭山偶作知君棄官後江上㝷名山心旣慣世内迹欲還人間昭亭忽來過覽古興長歎野寺拂塵壁丹陽已斕斒殿角虚寶鐸微風聲珊珊遺像與筆蹟始得觀裴顏淺井何泠泠前溪何潺潺幽幽隨猿鳥渾渾忘區寰裂裳不爲媿餌芝不爲難坐對寒雨中松上孤鶴還送郭功甫還靑山來何遲遲去何勇羸馬寒僮肩竦竦昨日棄爲梅福官扁舟早勝大夫種負經不猒關山遙訪我猶將歲月恐得言㑹意若秋鷹反翅歸飛輕飽氄明朝到家年始開椒花壽酒期親捧何當交臂湏強行莫作區區事丘壠送鄧生哀哀彼鄧子扶柩歸長沙朝暮哭失聲驚聒墻上鴉飛去復飛還相與棲水涯卜葬不當緩早晩能到家送才上人還雪竇寄逹觀禪師春雪滿蓑笠海邉先鷰歸千林新改葉百衲舊來衣谿水從何至山雲自解飛報言巖下客齋鉢筍應肥樂椽自淮南廻示新詩淮南歷覽還宣城囊多嘉句何氷清入門先呌十年兄袖中大卷持來評我雖暗愚眼不盲要識合如劉長卿舉頭不言笑且驚此兄議論頗稱情我亦感君知我名阮籍從呼作老兵蘇州曹琰虞部浩然堂姑蘇臺上麋鹿嚎夫差城中樓觀高荒榛盡已付明月萬古憤怒空秋濤吳亡越霸能幾日後世擾擾猶鴻毛孟軻善養浩然氣充塞天地無饑嗸慕而爲堂亦有意不學屈子成離騷紅梅篇昨夜輕雷起風雨芍藥紅牙竹欄土南庭梅花如杏花東家殘朱塗頰䩉蕚爲裳衣蘂爲組枝爲高居榦爲戸蛺蝶未生蜂未來赤身掩歛無金縷終然有子當助傅說羮落亦不學飛燕皇后廻風舞此意又笑麻姑與王母勾引何人擗麟脯是非方朔謾漢武只知此桃不知語樹不着口數而今言之巳莫補放我渾丹鳯皇羽依韻和吳正仲聞重梅巳開見招難開宻葉不因寒誰翦鵝兒短羽攢猶是去年驚目艶不知從此幾人觀重重好蘂重重惜日日攀枝日日殘我爲病衰方止酒願擕茶具作清歡寄送吳公明屯田通判秦州一聞春禽婆餅焦竹林山木生蕭條憶君將向洛門去胡馬無塵塞路遙將軍本是漢丞相玉帳坐辨牙旗梟白靣書生有肝膽少年曽過咸陽橋今雖老病由廬巷爲報緩制秦兵驕吳正仲求紅梅接頭君家梅溪上但見梅花白我家家樹紅求枝寄歸客翦接如交情本末不相隔明年舉酒時醉頰生微赤初聞蛙朝開南籬梅暮聞北池蛙何時科斗生草根巳吐牙只畏草葉長其下可隱虵游子且勿行科斗成蝦蟇百舌一冬常噤黙乗春何多舌蒼毛無文章尖啄苦騰說曉升高高樹百鳥言漏泄只未聞鳯皇有亦學不徹傷哉古辯士徃徃遭車裂萬表臣報山傍有重梅花葉又繁諸君徃觀之前時見多葉曾何數㝷常今見葉又多移賞南澗陽寄言莫苦恃更多殊未央去臘隱靜山僧寄榧樹子十二本栢樹子十四本種於新墳棐栢移皆活風霜不變青冡垣雖閴寂田客毎丁寧不待爲書几常流作鬼庭東邉夾路少更致儻能令補題東都善惠師禪齋香象紅蕖坐花盆白石臺上公金印去王子玉駒來心是寒缾水明無寶境埃世人何擾擾時爲一言開送萬殿丞䖍州安逺軍新雷動江雨百鳥響溪巖逆水送行客順風催挂帆過山唯廟敬團飯與烏銜太守雖憐舊湏防有嫉讒野望新晴冝野望最愛是山前逺近花兼竹高低水拍田呼名鳥無數問姓客多年此地春耕晩吳牛樹底眠泛溪中流清且平捨楫任船行漸近鷺猶立巳遙村覺橫何妨緑樽滿不畏晩風生屈賈江潭上愁多未適情春隂雲壓花房冷風開柳絮遲幽人宿醒在靜舘晝眠時欲雨天無雨將絲鬢未絲孔融過五十歲月已堪悲新鷰前時春社畢今日鷰來飛將補舊巢缺不嫌貧屋歸㘅泥和草梗側翅過柴扉豈比驚丸雀迎人欲拂衣棃花處處棃花發看看鷰子歸園思前法部淚濕舊宫妃月白鞦韆地風吹蛺蝶衣强傾寒食酒漸老覺歡微新笋挑笋春雷後晴坡過雨時何言江外早巳比洛陽遲園客自偷賣主人郍得知徒令養新竹待與作藩籬海棠要識吳同蜀湏看線海棠燕脂色欲滴紫蠟蔕何長夜雨偏宜着春風一任狂當時杜子美吟徧獨相忘二月七日吳正仲遺活蟹年年收稻賣江蟹二月得從何處來滿腹紅膏肥似髓貯盤青殻大於盃定知有口能嘘沫休信無心便畏雷幸與陸機還徃熟毎分吳味不嫌猜老馬馬御史所留吳人惜燕駿燕馬卧吳家毛骨從前貴關山欲去賖草深閑楚澤力盡憶胡沙御史乗來乆時逢避路騧自詠閉戶無還徃端居廢禮容花爲貧冨燄鷰是舊過從持屐對人蠟綻衣看婦縫非同叔夜傲切莫怪踈慵鸚鵡一入秦宫去千山隴樹秋能言依婦女學語類俳優玉鏁閑拘束金籠不自由哀良是黃鳥死爲穆公羞曉烏蟾不出海天地無明時萬國睡未覺一聲雞已知樹頭星漸沒枝上露應垂人世紛紛事勞勞只自爲朝二首鵞鴨出欄去兒童臨水驅欲開花泫露聚噪鳥窺厨秣馬刈靑草買薪嫌五銖錢刀豈今古村叟一何愚木鏁初開水上城竹籬深閉日光生青苔井畔雀兒鬪烏臼樹頭鴉舅鳴世事但知開口笑俗情休要着心行是非不道任挑撻唯憶當時阮歩兵宣州雜詩二十首昭亭萬仭山古廟半山間賽雨使君去釣潭漁父閑蕨肥巖向日竹暗壠連關北望高樓上南飛鳥自還三洲灘口急兩水渡頭來下過淵聖名桓彞宅上通嚴子臺潺湲瀉寒月滉漾照春梅白鷺驚起處魚多見底廻一過響山畔常思路中丞開亭宴貔虎制賊象冰蠅舊刻多磨滅今人少有稱茸茸春草長時有牧牛登伍貟奔吳日蒼皇及水濵彎弓射楚使解劒與漁人抉目觀亡國鞭尸失舊臣猶爲夜濤怒來徃百川頻毎見昭亭壁高璩筆墨存丹靑虚格裏雲霧碧紗痕鳥屎常愁汚蟲絲幾爲捫貴來曾改觀世故有誰論信讒多見逐伐國豈無仁屈子行江畔昭王問水濵包茅曾責貢香草自持紉莾蒼山川在漁歌屬野人項籍路由此力豪聞拔山八千提楚卒百二破秦關陔下圍歌合江頭匹馬還却思諸父老相見亦何顏細雨春岡滑無因駐馬蹄裘單懷後侶風急過前溪近寺聞魚鼓穿林聽竹雞田家春正急炊飯待鋤犂古有琴高者騎魚上碧天小鱗隨水至三月滿江邊少婦自撈摝逺人無弃捐慿書不道薄賣取靑蚨錢諸葛乆精妙巳能聞國都紫毫搜老兎蒼䑕拔長鬚露筦何明淨煙丸事染濡班超投此去死作玉關夫大實木瓜熟壓枝常畏風帖花先漏日噴露漸成紅靑箬包山舍馳心奉漢宫誰將槖駞載辛苦向驕戎竿頭注腐䑕水次野蜂知毎視銜飛翅因薫劚取陴絳囊千里道乾􆁭百鈞馳盡入公侯第雕盤助酒巵高林似吳鴨滿樹蹼鋪鋪結子繁黃李炮仁瑩翠珠神農本草闕夏禹貢書無遂壓葡萄貴秋來徧上都鳥命若楊葉夜棲雞翼間情知羽毛薄自禦雪霜難相託爲温燠終非學附攀猶勝居鶻握憂懼得生還柳子厚鶻說云高齋謝公殁此地卽危樓不改窻中岫無停川上舟壁隂縁薜荔城暝笑鵂鶹萬井曉煙合素霓橫樹頭北客多懷北庖羊舉玉巵吾鄕雖處逺佳味頗相宜沙水馬蹄鼈雪天牛尾貍寄言京國下能有幾人知五月黃梅肥終朝宻雨微緑苔侵竹閣潤氣裛人衣背隴霑牛去㘅蟲濕鷰歸高山發瀑水夜漲入吾扉斫􅃮高崖畔千筒不一盈野糧收橡子山屋點松明只見樹堪種曾無田可耕兒孫何所樂向此是平生傳道零陵守玆亭暫解裝分羣同鴈鶩幾日到瀟湘斑竹思虞舜頳萍憶楚王殷勤吏部句今亦誦無忘宛水過城下滔滔北去斜逺船來橘蔗深歩上魚蝦鵞美冐椒葉蜜香聞稻花歲時風俗美笑殺異鄕槎打鴨莫打鴨打鴨驚鴛鴦鴛鴦新自南池落不比孤洲老秃鶬秃鶬尚欲逺飛去何况鴛鴦羽翼長瞑杳杳鍾初發昏昏戶閉時巢禽投樹盡疲馬入城遲醉唱眠茆屋燒光透槿籬荷鋤休帶月亭長竪毛眉夜日從東溟轉夜向西海沉羣物各已息衆星燦然森蝦䗫將食月魑魅爭岀隂阮籍獨不寐徘徊起彈琴東溪行到東溪看水時坐臨孤嶼發船遲野鳬眠岸有閑意老樹着花無醜枝短短蒲茸齊似翦平平沙石淨於篩情雖不猒住不得薄暮歸來車馬疲吕大監餉鮆魚十尾日暖楊花四散開江邉鮆魚無數來伊魴洛水不堪憶丙穴漾陂何可咍賀監休思鏡湖去應知李白跨鯨廻香罏李獻甫惠鐵鑄小香爐壁環平口鋪麝焚葵葉大獸齧竹根趺淨几羣書外閑堂一物無中間任灰燼終與蕙蘭俱茶磨二首楚匠斵山骨折檀爲轉臍乾坤人力内日月蟻行迷吐雪誇春茗堆雲憶舊溪北歸唯此急藥臼不湏擠盆是荷花磨是蓮誰礱麻石洞中天欲將雀舌成雲末三尺蠻童一臂旋得自三天洞吳氏送白珙秀才谿上桃花發山前桂舸移水流過峽急風逆出江遲南國魚蝦猒東都夢寐思逢人若有問不似在朝時送閭丘殿丞毎有西歸客誰無滿袖詩都忘將別意競媚向官資慿在屋頭月照君墻上旗不同山一定更逺更相隨獻甫過幾樹桃花夾竹開阮家閭巷長春苔啓扉索馬送客出忽覺靑紅入眼來宛陵先生集卷第四十三宛陵先生集目録卷第四十三和郭祥正見懷採石月贈郭功甫和郭秘校苦寒和郭秘校偶作送功甫還青山送鄧生送才上人樂椽子示新詩曹虞部浩然堂紅梅篇和正仲見招寄送吳通判正仲求紅梅初聞蛙百舌萬表臣報梅隱靜山寄樹種補題善惠禪齋送萬殿丞䖍州野望泛溪春隂新燕棃花新笋海棠正仲遺蟹老馬自詠鸚鵡曉朝二首宣州雜詩二十首打鴨暝夜東溪吕大監餉鮆魚香罏茶磨送白珙秀才送閭丘殿丞獻甫過目録終
