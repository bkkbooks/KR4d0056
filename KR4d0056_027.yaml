front:
  text: 宛陵先生集卷第二十七
  hash: sha256:0866c2cf17229b2b399d493c52bbfc8c291500d64d4580c7f96c4a830d876f23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_027-1a}
body:
  text: 宋宛陵梅堯臣聖俞著荅宋學士次道寄澄心堂𥿄百幅寒溪浸楮舂夜月敲冰舉簾匀割脂焙乾堅滑若鋪玉一幅百錢曾不疑江南老人有在者爲予嘗說江南時李主用以蔵秘府外人取次不得窺城破猶存數千幅致入本朝誰謂奇漫堆閒屋任塵土七十年來人不知而今製作巳輕薄比扵古𥿄誠堪嗤古𥿄精光肉理厚邇歲好事亦稍推五六年前吾永叔贈予兩軸令寶之是時頗叙此本末遂號澄心堂𥿄詩我不善書心每愧君又何此百幅遺重增吾赧不敢拒且置縑箱何所爲二月雨後有蚊蚋春夜一二蚊蚋飛乆不見之尙可喜而今稍喧來聒人向後更暖柰爾觜春寒春晝自陰陰雲容薄更深蝶寒方歛翅花冷不開心亞樹靑帘動依山片雨臨未嘗辜景物多病不能㝷荅韓三子華韓五持國韓六玉汝見贈述詩聖人扵詩言曾不專其中因事有所激因物興以通自下而磨上是之謂國風雅章及頌篇刺美亦道同不獨識鳥獸而爲文字工屈原作離騷自哀其志窮憤世嫉邪意寄在草木蟲邇來道頗䘮有作皆言空烟雲寫形象葩卉詠靑紅人事極䛕謟引古稱辨雄經營唯切偶榮利因被蒙遂使世上人只曰一藝充以巧比戲弈以聲喻鳴桐嗟嗟一何陋丼用無言終然古有登歌緣辭合徴宮辭由士大夫不出扵瞽矇予言與時軰難用猶篤癃雖唱誰能聽所遇輙瘖聾諸君前有贈愛我言過豐君家好兄弟響合如笙叢雖欲一一報强說恐非衷聊書類頑石不敢事磨礱前以詩荅韓三子華後得其簡因叙下情前者報君詩妄說良有以昔予在京師多爲人所詆短章然無工實未甘藝比因君有過褒聊且發憤悱何言敢爲師乃是貴不韙平常遭口語攅集猶毒矢此論苟一出是非必蜂起偶爾道瘖聾多疑巳竊指雖恃不欺衷恨未致速死安得二頃田歸耕曷爲耻誰能事州郡雞狗徒聒耳過頴橋懷永叔昔送之官東郡時夜䦨對酒風揭屋君今淮海予再過古驛依依老槐緑椹澗晝夢誰謂死無知每出輙來夢豈其憂在途似亦會相送初看不異昔及窹始悲痛人間轉靣非淸魂殁猶共靈樹舗夕夢晝夢同坐偶夕夢立我左自置五色絲色透縑囊過意在畱補綴恐衣或綻破殁仍憂我身使存心得墮汝州王待制以長篇勸予復飮酒因謝之前因飮酒多乃苦傷營衛嘔血踰數升幾不成病肺上念父母老下念妻兒稚不死常抱痾於身寧自貴樊子來勸我止飮良有謂公復遺我詩責我詞甚毅指以年齒衰非酒何養氣春飮景可樂夏飮暑可避秋飮心忘愁冬飮暖勝被醉歌人不怪醉言人不忌在酒功實多止酒酒何罪假如壽九十今子巳半世不飮徒自苦未必止爲利胡汨妄與眞恐乖逹者意屈原吟澤畔方悟獨醒累子居今之時安免人病議是以告子勤子守亦謬計我讀纔一過不覺顏起愧自茲願少飮但不使疾熾書此以謝公公言誠有味陪王待制淸涼院觀牡丹賦詩公言牡丹盛未覩古人詩品衆自爭貴葉多方見奇名因他姓著色爲别根移華髪我何感洛陽年少時和王待制牡丹詠誰移洛川花一日來汝海濃淡百般開風露幾畨改傍欄人自醉惜翦春有待使君方少年共賞喜我在洛陽牡丹古來多貴色殁去定何歸淸魄不應散艷花還所依紅棲金谷妓黄值洛川妃朱紫亦皆附可言人世稀汝州等慈寺閣望嵩岳崢嶸古寺閣蒼山挿晴簷少室出天外巍巍何尊嚴王都在其下風露國所霑日暮飛雲歸巳失中頂尖睡意少時好睡常不足上事親尊日拘束夜吟朝誦無暫休目胔生瘡臂消肉今踰四十無所聞又况䘮妻仍獨宿虛堂淨掃焚淸香安寢都忘世間欲花時啼鳥不妨喧清暑北窓聊避燠葉落夜雨聲滿堦雪下暁寒低壓屋四時自得興味佳豈必鏘金與鳴玉萬事易猒此不猒眞可飬恬無夭促且夢莊周化蝴蝶焉顧仲尼譏朽木人事幾不如夢中休用區區走榮禄三月十四日汝州夢我歸十九年飮不負升斗昨夕夢見之謂須多置酒雖慰魂來言定不復入口俟當返吾廬且爲貯罌缶夢寐何敢欺從笑愚所守再别仲議前别歲月遠道同情相親三旬忽相見愈厚不猒頻昔云思數靣今無愧古人睠然東去懷紛若陌上塵夕發陽翟我行陽翟道慕雨原上急麒麟塜相望霹靂碑下立農耕傍山去鬼火迸林入莫問泉下人馬隤衣更濕缺月缺月來照屋角時西家狗吠東家疑夜深精靈鬼𥘉動僁窣古莾無風吹道次靈井井靣水不動傍分龍鱗激泉氣時生漚上湧光的皪深苔翠堪染石底清可覿旱歲或來祠彈絃屬靈覡荅江十鄰幾蔡州雖非遐作書素所懶春風領燕來得君詞欵欵燕廻須在秋此報莫言緩何日見嵇康重彈廣陵散喜謝師厚及第時第一甲二十八人君名在二十三宿雨洗新綠朝日𥘉聞鸎風從天門來吹下玉簡名列星二十八經緯何縱横南方朱鳥目光熖令人驚其餘撒沙衆龜龞瓜瓠明吾欣安石後世世有令聲孟夏二日通判太愽惠庭花二十枝云是手植因以爲荅前日巳春盡夏卉抽嫩青唯君所植花餘紅猶滿庭常惜畏景逼贈未及飄零欲挿爲之醉但慙髪星星水丘扵西湖得活鯽魚三尾見遺余頃在襄城獲數尾時歐陽永叔方自乾德移滑臺畱待其至且有詩後居京師蔡仲謀者亦有以贈乃思襄時所畱復有詩扵今三得三詠之矣襄城得圓䱶畱以待吾友大梁又得之始憶終按酒今君復持贈重念滁陽守滁陽石瀬中此物豈無有三得實嘉遺我敢自私口口且不爭丼事亦難利誘和江鄰幾見寄自此許州起慶曆六年夏盡其年終清風當晝起吹我庭下槐軒軒枝上葉碎影亂緑苔左右無人聲時有啼禽來啼禽感所懷其音一何哀思歸無曉夕血滴山榴開曰予當是時爲之腸九廻江子方謫官復有擬古才遠寄平淡辭曷報瓊與瓌雀奪燕巢生四雛去年燕營巢啣泥入我廬秋歸春復來横被雀所居翩然去不較義者欲與除毁覆必傷卵愛彼此何踈乃竢長黄口逐之寧曰紓果得生四雛卉色頭戢如後當還燕巢穿屋不害余和歐陽永叔啼鳥十八韻南方窮山多野鳥百種巧口乗春鳴深林參天不見日滿壑呼嘯誰識名但依音響得其字因與尔雅殊形聲我昔曾有禽言詩粗究一二啼嚎情苦竹岡頭泥滑滑君時最賞趣向精餘篇亦各有思致恨未與盡衆鳥評君今山郡日無事靜聽鳥語如交爭提壺相與來勸飮戴勝亦助能勸耕我念此鳥頗有益如欲使君勤以行勸耕幸且强職事勸飮亦兾無獨醒杜鵑蜀魄哭歸去小人懷土愼勿聽城頭春鳩自謂拙鵲巢輙處安得平高窠喬木美毛羽哢吭葉底無如鶯口中調簧定何益下啄蚯蚓孰曰清自餘多類不足數一一推本煩神靈我居中土别無鳥老鴉鸜鵒方縱横教雛呌噪日群集豈有勸酒花下傾願君切莫猒啼鳥啼鳥扵君無所營和永叔桐花十四韻湛湛碧井水其上有梧桐春隨井氣生白花飛濛濛曉枝滴丼露味落寒泉中結實待瑞羽歲晚半枯空桐旣無鳯皇井豈濳蛟龍乃知至神物未易令人逢當時集頴川偶值黄次公次公入爲相此鳥曷不從遂使神鶡雀竟用奇怪窮我言非毁古欲遵平直蹤我願二千石但使德化隆有桐鳯不來扵桐無愧容有鳯政不舉扵鳯何爲崇荅君桐花篇聊以發我衷和王仲儀詠癭二十韻汝水岀山險汝民多病癭或如鷄精滿或若猿嗛並女慙高掩襟男大闊裁領飮水擬注壺吐詞侔有鯁樗里旣巳聞杜預亦不幸秦人號智囊吳瓠繫狗頸常住頥彾㣔安及脛只欲仰問天無由俯窺井挾帶歲月深冐犯風霜冷猒惡雖自知剖割且誰肯不唯羞把鏡仍亦愁弔影内療煩羊厴外砭費針頴在木曰楠榴刳之可爲皿此誠無所用旣有何能辟音屏膨脝厠無首臃腫異臚頂難將靣目施可與胎胞逞賢哉臨汝守世德調金鼎氓俗雖醜乖教令日修整風土恐隨遷晨昏憂屢省儻欲便慈顏名城不難請憶吳松江晚泊念昔西歸時晚泊吳江口廻堤遡清風淡月生古柳夕鳥獨遠來漁舟猶在後當時誰與同涕憶泉下婦使者自隨州來知尹師魯寓止僧舍語其處物景甚詳因作詩以寄焉驛使話漢東故人遷謫處所居雖非居有樹卽嘉樹日膳或鷄㹠時𬞞多荀芋夜堂虵結蟠晝戸鵲噪聚著書今未成愛靜巳得趣予欲訪其人炎蒸未能去夏日對雨偶成寄韓仲文昆弟日日城頭雨還添湖上波窓中人自聽門外潦應多不畏車生耳還愁麥化蛾吾廬無所有頻看壁間梭憶將渡揚子江月暈知天風舟人夜相語平明好挂㠶白浪須出浦此身猶在吳歸夢預到楚今日念同來吾妻巳爲土秀叔頭虱吾兒乆失恃髪括仍少櫛曾誰具湯沐正爾多蟣虱變黑居其元懷絮宅非吉蒸如蟻亂緣聚若𧖟初岀鬢搔劇蓬葆何暇嗜梨栗翦除誠未難所惡累形質稚子獲雀雛屋頭小雀雛氣力苦未長乗暄學調羽忽掛蜘蛛網其母不能救啁啾空下上乃爲人所探不是蟲絲枉丙戌五月二十二日晝寢夢亡妻謝氏同在江上早行忽逄岸次大山遂徃逰陟予賦百餘言述所覩物狀及窹尚記句有共登雲母山不得同宮處倣像夢中意續以成篇晝夢與子行早發江上渚共登雲母山不得同宮處何嗟不同宮似所猒途旅樹杪俯烏巢坼㲉方仰乳雄雌更守林號噪見飛䑕䑕驚竪毛怒裊枝如發弩逡廵吼風雲遠望射嵓雨東南横虹霓萬壑水噴吐下㝷歸路迷欲暮各愁語忽覺皆巳非空庭日方午蜜燕㗸芹根泥蜂掇花上蘂帶雨兩股飛所取日能幾調和露與英凝丼滑扵髓天寒百蟲蟄割房霜在匕燕巳成雛歸蜂憂凍餒死乃見萬物心多爲造化使王德言自後圃來問疾且曰圃甚蕪何不治因荅幾日不行圃野草過人頭客怪苦荒穢誰與持鋤鉤雖然自薅薙抱痾方吿休卽當秋風高掃蘀將遲逰夢覩閉目光不揚夢覩良亦審旣非由目光所見定何禀白日杳無朕㝠遇嘗在寢此恨不可窮悲淚空流枕悲書悲愁快扵刀内割肝腸痛有在皆舊物唯爾與此共衣裳昔所製篋笥忍更弄朝夕拜空位繪寫恨少動雖死情難遷合姓義巳重吾身行將衰同穴詩可誦合流曹光道惠鉅李知其炎酷中有此味味亦可樂也輙以詩寄頴傍成蹊李其實小於拳誰知皴枝痩生此紺玉鮮摘以筠梢籠沉以石根泉濛濛粉未落粲粲葉猶連䕃樹咀丼液安知有苦煎報君惜茲樂時詠逍遥篇深夏忽見柰樹上猶存一顆實纍纍後堂柰落盡風雨枝行樂偶散歩倚杖聊縱窺林葉隱孤實山鳥曾未知物亦以晦存悟茲身世爲病癰在吿韓仲文贈烏賊觜生醅醬蛤蜊醬因筆戲荅我嘗爲吳客家亦有吳婢忽驚韓夫子來遺越鄕味與官官不識問儂儂不記雖然苦病癰饞吻未能忌寄光化退居李晉卿乆無歸田人今喜子去禄移家漢水濵日見漢水緑川鱗可爲饔山毛可爲蔌竟歲猒徃還行堤樂風俗青巾艑上郎漆鬢顏如玉倚檣臨落照獨唱江南曲聽若在江南歡然自爲足我心雖有羡未遂平生欲更期畢婚嫁方可事嵒麓買山須買泉種樹須種竹泉以濯吾纓竹以慕賢躅此志應不忘他時同隱錄汝南江鄰幾云鄎南並淮浮光山有張隱居種松檜扵其上飬母甚孝時有猛獸馴庭中又郡西麻田山土沃泉美乆不墾有劉叟者闢而居之近董氏黄氏欲買土爲鄰故江有慕之之作予輙次其韻峩峩淮山上中有隱者棲不知松檜下但見虎豹蹊人群固巳遠樵客入猶迷且奉采蘭飬應無抱玉啼麻田異麻源石路春無泥髙士不近俗更在西嶺西石泉飮自足深壑無人躋不學淮南王安問犬與雞二人逍遥性所樂唯杖蔾復有來慕鄰他年寧荅嵇願君且勉職聖世未易暌魏文以予病渴贈薏苡二叢植庭下走筆戲謝媿無相如才偶病相如渴潩水有丈人薏苡分叢茇爲飮可扶衰餘生幸且活安知惡巳者不願變野葛宛陵先生集卷第二十七宛陵先生集目録卷第二十七荅宋學士寄𥿄二月雨後有蚊蚋春寒荅三韓見贈述詩叙荅三韓簡過頴橋懷永叔椹澗晝夢靈樹鋪夕夢謝王汝州勸復飮陪王待制觀牡丹和王待制牡丹詠洛陽牡丹等慈寺望嵩岳睡意三月十四日汝州夢再别仲儀夕發陽翟缺月道次靈井荅江十鄰幾喜謝師厚及第荅通判惠庭花水丘遺魚和鄰幾見寄雀奪燕巢和永叔啼鳥和永叔桐花和王仲儀詠癭憶吳松江晚泊寄尹師魯夏日寄韓仲文憶將渡楊子江秀叔頭虱稚子獲雀雛丙戌五月晝夢蜜荅王德言夢覩悲書寄曹光道惠李深夏尚見柰樹有實戲荅仲文惠海味寄光化退居李晉卿次酬江鄰幾戲謝魏文惠薏苡目録終
