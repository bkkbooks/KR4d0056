front:
  text: 宛陵先生集卷第五十一
  hash: sha256:681f01bc81c49f1e2728a85016f80cadb52743a9a1e2bdc8daebb016f1cbc127
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_051-1a}
body:
  text: 宋宛陵梅堯臣聖俞著還吳長文舍人詩卷松液化茯苓又因為琥珀遇物必得形毛髮曾不隔君子亦豹變其文蔚可覿個者逢吳侯滿腹貯經籍噴吐五色霓自堪垂典册詩教始二南皆著賢聖迹後世竟翦裁破碎隨刀尺我輩強追倣畫龍成􅔼蝪有唐文最盛韓伏甫與白甫白無不包甄陶咸所索侯初守二郡山水多助益升高觴嘉賔賦筆速鷹翮葺書成大軸許我觀琮壁真物固易辨恨無百金易借從懷袖歸誦玩廢朝夕譬如遊國都敞恍失阡陌苦吟三十年所獲唯巾幗豈比夸受降甲齊熊耳積重見元和風珠玉敵海舶自慙寒餓為何張空避席和正月六日沈文通學士遺溫柑禹書貢厥包未知黃柑美競傳洞庭熟又莫永嘉比適觀隱侯詩獲此殊可喜誦句擘露囊香甘冷尉齒明朝鎖禮闈何睱醉鄰里史供奉羣鶴出珥銀貂侍太清回看雙鶴舞中庭翩翩曾是仙人驥兩兩尚儀君子形靜夜欲還緱嶺月終朝思喋太湖萍莫將樹上雞相並會待歸飛向杳冥雪竇逹觀禪師見寄依韻答巖竇常留雪山雪不有心禪衣百衲重香剎四明深馴鹿來㗸果栽松去作林自緣冠紱纍未解逺公尋和孫端叟寺丞農具十三首田廬結廬野田中其高足以覘坐卧劣自容巢棲未嘗斂但能風雨蔽何惜茅蓬苫終當收穫畢寂寞懸山店揚扇田扇非團扇每來埸圃見因風吹粳籺編竹破筠箭任從高下手不為暄寒變去粗而得精持之莫肯倦樓種農人力巳勤要在布嘉種手持髙斗柄觜瀉三犂壠月下叱黃犢原邉過廢冡安知俠少年玉食金羈擁樵斧適從伐枯桑莫悟刀已缺蠶工向欲迫田事不可徹丁丁背谷聲役役持柯熱積薪高於山焉用先後別耒耜古聖通物宜揉斫資粒食稼穡盡民勤墾耕窮地力推化本神農維時思后稷我老欲歸田兹器巳先識錢鎛詩稱庤錢鎛南畝興農作寧唯務芟剃豈不在刈穫收功尚嘉榖託用隨芒屩太平兹所重坐見銷鋒鍔耰鋤蕪穢或不治良苗安得長薅來露未晞荷去月初上侵煙濕鵝頸近茇翻蟻壤生具自有餘何醉汗沾顙襏襫上襏與下襫青簑苦能織曉披春雨來晚晒陽披側蔽身常自足衝濕曾為得任從野風吹巳敵寒蓬色臺笠力田冒風雨緝籜為臺笠寒簑相與用隂野低迷入足屨固易濡鬢葆何嘗濕斯須未可去赫日實乃急水車既如車輪轉又若川虹飮能移霖雨功自致禾苗稔上傾成下流損少以益甚漢隂抱甕人此理未可諗田漏瓦罌貯溪流滴作耘田漏不為隂晴惑用識早暮候辛勤無侵星簡易在白晝同功以為凖一決不可又耘鼓挂鼓大樹枝將以一耘耔逢逢逺逺近汨汨來田里功既由此興餉亦從此始固殊調猿猴欲取兒童喜牧笛牧人樂下牧背騎吹短笛聲穿五雲低韻入楚梅的誰嗟苦調急自與幽意寂應同堯時民歌將土壤擊和孫端叟蠶具十五首繭館漢儀后親蠶採桑來繭館雲母飾車上鉤籠載車畔援條露巳乾受葉日將晏為言天下婦兹事不可慢織室嘗聞漢皇后織室數來觀宫女豈不勤帝衮得以完亦將成纁黃非用競龍鸞意在奉宗廟後人其可安桑原原上種良桑桑下種茂麥雉雊麥秀時蠶眠葉休􅎥空條漏日多餘椹更誰惜會待黃落來酒壚燒斗石高几桑柔不倚梯摘桑賴高几每於得葉易曾靡憂校披躋升類拾級下上異緣蟻間置草屋傍鳴雞或棲止科斧科桑持野斧乳濕新磨刃繁枿一去除肥條更豐潤魯葉大如掌吳蠶食若駿始時人謂戕利倍今乃信桑鉤長鉤扳桑枝枝間挂桑籠南陌露氣寒東方日光動少婦首且笄幼女角巳總競以採桑歸曾非事梳櫳桑筥采采向桑郊盈盈自持筥持鉤帶月往稚葉和煙貯一心恐蠶飢搔首促儔侣到家傾嫩緑刀几為㕮咀蠶女自從蠶蟻生日日憂蠶冷草室常自溫雲髻未暇整但采原上桑不顧門前杏辛苦得絲多輸官官莫省蠶簇冰蠶三眠休作繭當具簇漢北取蓬蒿江南籍茅竹篙踈無鬱浥竹淨亦森束競畏風雨寒露置未如屋蠶槌三月將掃蠶蠶妾具其器丘植先㧹㧹音摘括辟室亦塗墍衆材踈以成多薄所得寄終老歸簇時應無慙棄置蠶簿河上緯蕭人女歸又織葦相與為蠶曲還殊作筠篚入用此何多往售獲能幾願豐天下衣不歎貧服卉繅盎朝漬一盎繭繅就幾絢絲絲成繭已盡盎亦誰復持道上有墮甑車傍有鴟夷二物且莫笑顧藉各因時紡車蠶月必紡績絲車必挑擲燈下絡緯鳴林端河漢白纎縷自有緒虛輪運無迹腕手巳為勞誰經用刀尺龍梭給給機上梭往反如度日一經復一絲成寸遂成匹虛腹鋭兩端素手投未出陶家挂壁間雷雨龍飛出織婦織婦手不停心與日月速常憂里胥來不待雞黍熟但言督縣官立要機斷軸誰知公侯家賜帛堆滿屋上元從主人登尚書省東樓閶闔前臨萬歲山燭龍銜火夜珠還高樓逈出星辰裏曲蓋遙瞻紫翠間轣轆車聲碾明月參差蓮熖競紅顔誰教言語如鸚鵡便著金籠密鎖關自和沉水香焚金博山杜陵誰復與車還馬尋綺陌知何曲人在珠簾第幾間法部樂聲長滿耳上樽醇味易酡顔更貧更賤皆能樂十二重門不上關又和康莊咫尺有千山欲問紫姑應巳還人似嫦娥來陌上燈如明月在雲間車頭小女雙垂髻簾裏新粧一破顔却下玉梯雞巳唱謾言齊客解偷關和公儀龍圖戲勉五公雄筆厠其間愧似丘陵擬泰山豈意來嘲飯顆句忙中唯此是偷間再和公儀龍圖千重海浪漁人醉百戰沙埸野叟間豈向閙中還得靜乃知朝市即青山放鶉獸烹羊豬鳥烹鴨雞唯鶉不殺置奴而携公坐堂上見而悲悽急令開笯還故棲其間無力飛不齊公只知魚之洋洋鵝之鶂鶂噫兮噫兮莫登樓莫登樓腳力雖健勞雙眸下見紛紛馬與牛馬矜鞍轡牛服輈露臺歌吹聲不休腰鼓百靣紅臂褠先打六么後梁州棚簾夾道多夭柔鮮衣壯僕獰髭虬寶撾呵叱倚王侯夸妍鬪艷目巳偷天寒酒醺誰爾侜倚檻心往形獨留有此光景無能遊粉署深沉空翠幬青綾被冷風颼颼懷抱既如此何須望樓頭莫飮酒莫飮酒酒豈讎顔回不飮不白頭千種稱帝堯百觚號聖丘定國數石無滯留康成三百杯未休阮藉作詩語更道聖賢在前誰與謀喉乾舌強須潤柔照見文字勝膏油依韻和永叔勸飮酒莫吟詩雜言我生無所嗜唯嗜酒與詩一日舍此心腸悲名存貴大不輒思甑空釡冷不俯眉妻拏凍飢數恚之但自吟醉與世違此外萬事皆莫知王公謁請衆去早既襄愈懶身到遲日高倦僕顔色沮况騎瘦馬兩耳垂厭此勞苦不喜出唯有文字時能為諸公尚恐竭智慮勤勤勸飮莫我卑再拜受公言竊意公矯時只愛詩謂余癡和永叔內翰來時擘繭正探官走馬傳宣夾路看便鎖青春辭上閣徒知白日近長安思歸有夢同誰説強意題詩只自寬猶喜共量天下士亦勝東野亦勝韓和公儀龍圖憶小鶴聞憶華亭雙鶴雛蒼毛未變頂微朱間情且與稻粱飽寄語休將雞騖驅丁令再歸移歲月王褒端為約僮奴主人必欲看雙舞太液池寬肯放無和永叔內翰思白兔答憶鶴雜言醉翁在東堂為他栽桂樹待將枝條與人折憶著家中玉色兔夜看明月海上來光彩離離入庭戶且問嫦娥一借觀翁家雖有來無路嫦娥對靣幾萬里不勝漸漸西南去是時翁生懷抱惡却恨陸機先憶鶴致令亦念眼迷離不似傍池能飮啄始憂兔飢僮失哺又恐白毛塵土汙仍不如鶴有淺泉自在引吭時刷羽花前舉翅鼓春風只待翁歸向朝暮我聞二公趣向殊一養月中物一養華亭雛一畏奔海窟一畏巢松株我雖老矣無物感欲去東家看舞姝和永叔內翰戲答從他舞姝笑我老笑終是喜不是惡固勝兔子固勝鶴四蹄撲握長啄啄任看色與月光濕只欲走飛情意薄拘之以籠縻以索必不似纎腰夸婥約主人既賢豪能使賓客樂便歸膏靣染髭鬚從今宴會應頻數二月五日雪二月狂風雪寒威曉更加省闈輕妬粉花樹暗添花有夢皆蝴蝶逢𫀆只貯麻凍吟誰料我相與賭流霞聞永叔謂子華日明日聖俞若無書修輸一杯酒和公儀龍圖小桃花三分春色一分休始見桃花著樹頭霰雪斗來如約勒為公留作上林遊感李花二月九日重門雖鎖春風入先圻桃花後李花赤白鬪妍思舊曲舊聲傳在五王家五王不見留華蕚華蕚壞來碑缺落當時李白欲騎鯨醉向江南曾不錯琴高魚和公儀大魚人騎上天去留得小鱗來按觴吾物吾鄉不須念大官常膳有肥羊嘗茶和公儀都藍擕具向都堂碾破雲團北焙香湯嫩水輕花不散口甘神爽味偏長莫夸李白仙人掌且作盧同走筆章亦欲清風生兩腋從教吹去月輪傍宛陵先生集卷第五十一宛陵先生集目録卷第五十一還吳舍人詩卷沈文通遺溫柑史供奉羣鶴和答逹觀見寄和端叟農具十三首和蠶具十五首上元登省東樓自和又和和公儀戲勉再和公儀龍圖放鶉莫登樓莫飮酒和永叔勸飮和永叔內翰和公儀憶小鶴和永叔思兔憶鶴答永叔戲答二月五日雪和公儀小桃花感李花琴高魚和公儀嘗茶和公儀目録終
