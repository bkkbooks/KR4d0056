  text: 宛陵先生集卷第二十四
  hash: sha256:83ce9ff654da4e617c1275881377918a99287be9be4d94c276bd9913320b7ec6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_024-1a}
body:
  text: 宋宛陵梅堯臣聖俞著郭之美忽過云往河北謁歐陽永叔沈子山春風無行迹似與草木期高低新萌芽閉戶我未知忽聞人扣門手把蟠桃枝問我此蟠桃緣何結子遲但笑不復答問者當自推振衣向河朔河朔人偉奇以茲不答意遲子北歸時讀蟠桃詩寄子美永叔韓孟于文詞兩雄力相當偶以怪自戲作詩驚有唐篇章綴談笑雷電擊幽荒衆鳥誰敢和鳴鳯呼其凰孟窮苦纍纍韓富浩穰穰窮者啄其精富者爛文章發生一為宮揫斂一為商二律雖不同合奏乃鏘鏘天之産奇怪希世不可常寂寥二百年至寶埋無光郊死不為島聖俞發其藏患世愈不出孤吟夜號霜霜寒入毛骨淸響哀愈長玉山禾難熟終歲苦飢腸我不能飽之更欲不自量引吭和其音力盡猶勉強嗟我于韓徒足未及其牆而子得孟骨英靈空北邙誠知非所敵但欲繼前芳近者蟠桃詩有傳來北方發我衰病思藹如得春陽欣然便欲和洗硯坐中堂筆墨不能下恍恍若有亡老雞觜爪硬未易犯其場不戰輒自却雖奔未甘降更欲呼子美子美隔濤江其人雖憔悴其志獨昻昻氣力誠尚對勝敗可交相安得二子接揮鋒兩交鋩我亦願助勇鼓旗譟其旁快哉夫子樂一釂宜百觴乖離難會合此志何由償孫司諫知鄧州甫南陽漢名都其俗尚敦朴亡徒頃為盜刺史安與角田野遂焦熬蒿萊思沃濯茲雖得甘露向巳苦風雹更張固所重下令未宜數且觀道傍碑文字今巳剝史尉還烏程宏與君去年别君來竟悲喜乘馬夜訪君備陳昔行李五月辭吳中六月渡楊子七月行喪妻是月子又死買棺無橐金助貸賴知巳嬌兒晝夜啼幼女飮食止行路况炎蒸悲哀滿心耳靑銅不忍照憔悴鄰于鬼八月至都下少長疾未巳一婢復嗑然老媪幾不起君門日預朝僕乘貧可耻十月補王畿受代隔歲紀閉門陋巷中悶默閲書史初聞君至之如見湖山美今聞君復還為我謝雲水故交儻相問懷抱今如此豈乏南飛鴈豈無東下鯉自同嵇康懶作書愁把𥿄薛九宅觀雕狐圖蜀中處士李懷衮手畫皂雕擒赤狐猛爪入頰觜迸血短尾㒔㑛窮蹄鋪雕爭怒力狐爭死二物形意無纎殊一禽一獸固巳别硬羽軟毛非筆模入君此室見此圖如在原野從馳驅寄汶上大第未嘗身一至人猜巧宦我應非彈冠不讀先賢傳説劒休更短後衣瘦馬靑袍三十載故人朱轂幾多違功名富貴無能取亂石淸泉自憶歸蕭著作宰豐城王都二月花正開社雨作隂迎燕子人先春色向江南江南春色歸春水拍岸緑波生荻芽晨羞聊可助甘旨縣塗為政子所諳不敢贈言言日鄙董安員外之信州鉛山簿古岸緑蒲老春帆逆水輕烹鮮聊以芼泝險復兼程可用茲時樂無將遠道驚曾為江上客因贈北行人弟得臣殿丞簽判越州前為山隂宰再為會稽行聊問會稽美禹穴遷所探泰望斯所紀年代已浸深書碑必亡矣剡溪有樵風其事恐非是買臣千載後得無負薪子黃庭昔換鵝道士儻不死行當訪其真願以鵝報爾愼勿笑我癡萬事難可擬摘笋復盈簷緡魚新出水此又食之珍因書悉條理李舍人淮南提刑啄木欲除蠧蠧去樹亦撓何須食微蟲爾腹豈不飽天下本無事自為庸人擾君實知古深終慙用傾巧吳殿丞代州通判舉才不避勢必也知其長王官誠濟濟豈得佐邊疆代郡實雄要昔已選帥良功名乃欲取叱馭登太行和人喜雨仲冬至仲春隂隔久不雨耕農將夫時萌頴未出土帝心實焦勞日夜不安處禱祠煩駿奔肹饗杳無補帝時降金輿遍欵靈真宇百姓知帝勤變愁為鼓舞和氣能致祥是日雲蔽午夕風不鳴條甘潤忽周普巳見堯為君安問誰為輔胥員外之復州景陵尉城隅漢水闊正足槎頭鯿采荇兼登爼施罛不貴錢江帆風勢美竹屋雨聲連必有蒼苔碣留為好事傳李審言歸鄭州嘗從京索間躍馬望春山氣象歸王國丘陵接漢關長榆啼鳥亂細草牧陂間老猒行塗路因歌送子還李舍人見過春泥無處所窮巷少人行忽枉靑絲騎曾非白靣生笑言聊與適雞黍未嘗烹莫歎余貧甚吾儕業本淸春鶻謠春巢纍纍衆鳥哺兒衆鳥不出巢群雛嗷嗷腹甚飢不出巢其謂何上有蒼鶻窺其窠問鶻何仇鶻不我顧我巢有雛開口待哺一日不擊巢雛不食爾憂爾雛衆鳥號呼又可吁來夢忽來夢我于水之左不語而坐忽來夢余于山之隅不語而居水果水乎不見其逝山果山乎不見其途爾果爾乎不見其徂覺而無物泣涕漣如是歟非歟汴之水三章送淮南提刑李舍人汴之水分于河黃流濁濁激春波昨日初觀水東下千人走喜兮萬人歌歌謂何大船來兮小船過百貨將集玉都那君則揚舲兮以糾刑科汴之水入于泗黃流淸淮為一致上牽下櫓日夜來千人同濟兮萬人利利何謂國之漕商之貨實所寄我送行舟于水之次春風吹兩旗君作天王使罟客自求魚淸江莫相避宋次道一百五日往鄭拜墓去不避春雨泣望松柏門颯然風悲響如感泉下魂沃酹向墳土空濕陳草根人歸夜月冷石馬在九原孫太祝毫州簽判微風起船尾雨氣生日腳不愁春路泥正泛春波樂順去疾鳥飛問程殊我度才名留守家更入尚書幕寄靈隱通教僧奇山若洗靑草木生石上根萌不可窮條蔓自增王其隂有高僧日食惟一盎世人久巳踈猿鳥應相向李少傅鄭圃佚老亭莊生述天理老固當念佚舉世用自勞誰能以為必我公謝鼎司嗣子都華秩代言輟帝右作藩輔王室承顏向茲地園宇樂永日佳樹發巳繁修竹移未密春禽時弄吭清景付吟筆朱金待金構榮美安與匹令狐祕丞守彭州挺前時草草别渺漫二十年從宦各所適非為道路偏今始一相遇言愧少壯前子有萬里翮尚不飛雲煙而復走隴蜀欲以條教宣將西過危棧葉暗聞杜鵑未知為郡樂預巳抱愁煎再來與子辭當去復留連且念前期遠歲月實易遷依韻和李舍人旅中寒食感事一百五日風雨急斜飄細濕春郊衣梨花半殘意思少客子漸老尋遊非戢戢車徒九門盛寥寥煙火萬家微今朝甘自居窮巷無限墦間得醉歸依韻和張應之見贈京洛多遊好相與歲月深雖同執一籥吹曲各異音自微衆音響安感萬物心我窮子來唁慷慨發長吟哭尹子漸其弟師魯守潞故人河內守昨日報巳亡同氣泣上黨悲風生太行曩為衆所惜今復人共傷阮藉本真率感槩壽不長次道約食後同敏叔中道平叔如晦詣景德浴以風埃遂止昔思春服成浴乎沂水上仲尼亦所志語此雖未向子今當是時有意同我尚巳邀二三友欲往期畢餉倐然風滿途塵土阻清曠安得一振衣徒希舞雩唱陳經祕校之信州幕東吳海物錯南楚江味多家吳而宦彼風土去幾何既得風土樂可贊政治和歸來識香草為綴楚人歌朱武太博通判常州兼寄胡武平昔我陽夏公嘗兹同郡治政餘作東園草木尚有意豈不務安養斯民歌樂易是時有賢才鄉舉堪皇器今方居冡廬試質當時事願君思前人文雅庶未墜師厚云蝨古未有詩邀豫賦之貧衣弊易垢易垢少蝨難群處裳帶中旅升裘領端藏迹詎可索食血以自安人世猶俯仰爾生何足觀依韻和中道寶相花嘉卉得所托植君之寢陽開榮同此春淡艷自生光不為露益色不為風盡香節換葉巳密尚可見餘芳擬陶體三首手問足共生一體中出處常相并所動輒有迹何不擇地行履舄雖可蔽步武豈無聲嘗思汝為玉請刖見直誠足答手上下各有分同質實異支要用固爾先當念扶我危我刖爾獨安何以幸華夷且願縮袖間操執自有時目釋我居元首間分並日月光左右各照曜盲一豈相妨尚恐有所翳獨見不能強嗟爾手與足何為欲競傷捉馳自有職勿使心悲涼贈葉山人傾珍奉賔客傲物去珥貂貴來不以屈飮酒且逍遙黃金百鎰盡左右無纎腰但存丹砂術有道在一瓢李廷臣通判蔡州夾路青青草隨君去未休亦將離思遠還共翠心抽細藉車輪穩薰牽野蔓柔王孫歸不久冉冉莫經秋朱櫻明珠摘木末紅露貯金盤始見侍臣賜已為黃雀殘味兼羊酪美食猒楚梅酸苑囿東周盛纍纍映葉丹悼子小名十十舟行次符離我子死阿十臨之但驚迷至傷反無泣欵定始懷念內若湯火集前時喪爾母追恨尚無及邇來朝哭妻淚落襟袖濕又復夜哭子痛併肝腸入吾將仰問天此理豈所執我惟兩男子奪一何太急春鳥獨蔓延哺巢首戢戢懷悲自爾歸我家未嘗猒貧窶夜縫每至子朝飯輒過午十日九食虀一日儻有脯東西十八年相與同甘苦本期百歲恩豈料一夕去尚念臨終時拊我不能語此身今雖存竟當共為土和中道雨樹一旬苟不雨萬木昏蒼蒼朝見洗林葉動搖生輝光晚逢開踈隂枝上漏微陽翠色固以好安得無秋霜永叔寄詩八首并祭子漸文一首因采八詩之意警以為答昔聞退之與東野相與結交賤微時孟不改貧韓漸貴二人情契都不移韓無驕矜孟無􅌤直以道義為己知我今與子亦似此子亦不愧前人為北都健兒昨日至扣門乃得所遺詩上言病中初有寄下言我詠蟠桃枝盛衰開落感殘杏暮春無事羡遊絲班班鳩鳴忽懷念一掃十幅無間辭洛川花圖多品目鬪新爭巧始可疑讀書又憶石夫子似𧖟作繭誠有之鎮陽歸夢北潭北吟此八章誰謂癡最後有文弔尹子壽夭難問信所悲共書大軸許傳玩一日百展曾忘疲報君亦欲齎滿軸恐費𥿄墨令人嗤黃敏復尉新城新城接桐廬山茗久所利江東亡命兒販不畏黥劓堂上千金子捕以操凶器恐非吾徒為勇少乃可避寄永叔夏日永以靜渴鳥方在枝張口不能言翕翕兩翅披庭中有井泉井深無綆縻欲汲假其鄰鄰且非我知鴻鷗矯河上比爾得所宜得宜豈不樂胡然我念之丞相二章丞相之拜冠辨旅至乘馬載驅如彼巨瀦有鴈有鶩有龜有魚蒸然來萃翔泳嘯呼丞相之去乃還印綬乃飭車輪如彼涸津時靡翔羽時靡遊鱗寂兮寂兮豈有嘉賔閔讒狡矯有讒狡讒以戕類狡以媚其貴謂不騫不墜謂人莫爾制而死制之誰謂無鬼孰制之死彼狡之將死若有以見既見既惡之引袂蒙靣謂人莫爾辨而自辨之誰謂無鬼孰俾之譴薛八殿丞有遺未嘗營貨貝貨貝寧為來俸苦月不足貧死口肯開好事忽我恤十千助晨杯薪水巳過豐不得如顏回師厚與胥氏婦來奠其姑雙裾來此室慟哭拜靈牀魂衣想髣佛薄酒湛其觴含悽拊孤稚拭淚問平常我生都無如仰看燕在梁諭烏百鳥共戴鳯惟欲鳯德昌願鳯得其輔咨爾孰可當百鳥告爾間惟烏最靈長乃呼鳥與鵲將政庶鳥康烏時來佐鳯署置且非良咸用所附巳欲同助翺翔以燕代鴻鴈傳書識暄涼鸜鴿代鸚鵡剝舌説語詳秃鶬代老鶴乘軒事昻藏野鶉代雄雞爪觜稱擅場雀豹代雕鶚搏擊肅秋霜蝙蝠嘗入幕捕蚊夜何忙老鴟啄臭腐盤飛使遊揚鵂鶹與梟􅨱待以為非常一朝百鳥猒讒烏出遠方烏伎亦止此不敢戀鳯傍養子頗似父又貪噪豺狼為鳥鳥不伏獸肯為爾戕莫如且斂翮休用苦不量吉凶豈自了人事亦交相弔裴易進士力學未及仕口中已含珠賦命固所負讀書非所辜斂送有兄弟哭泣無妻孥惟此靡薄厚必竟同一途間詠寄呈次道我間日貧縛子間數疾纒間固不可常吾觀與子然吾與子嗜學豈獨間窮年安安者誰歟分亦似所偏寄楚州呂濟叔亭午鳥不下誰復過我廬忽聞扣門者偶出問何如云是山陽吏太守遣置書自惟久窮困遊子安念豫淮隂況要津賔館無暫虛豈意有所逮委曲情未踈報言愧不􅌤聊以謝興居答中道小疾見寄嵇康性彌懶曾不廢養生子姑當妙年何乃勞其精老耽有至論身孰親於名詩本道情性不須大厥聲方聞理平淡昏曉在淵明寢欲來於夢食欲來於羮淵明儻有靈為子氣不平其人實傲佚不喜子纒縈吾今敢告子幸願少適情時能與子飮莫惜倒瓶罌五月五日屈氏已沉死楚人哀不容何嘗奈讒謗徒欲却蛟龍未泯生前恨而追沒後蹤沅湘碧潭水應自照千峰送可教僧歸越萬事猒尋常羡慕每不足居南多北思在遠慙近俗既來橘變枳但見空條緑氣味誰復論孤根逗嵓曲和裴如晦雨中過其亡兄易居人亡雨館寂車馬偶來臨濕衣添新淚故物傷夙心淒淒庭下樹萬葉起哀音此地嘗對語在昔豈知今雨中宿謝胥裴三君書堂急雨射窗鳴燈殘我正寢穴蚓聲苦長流響入孤枕衆醉如不聞強聒亦巳甚夜短竟無寢困瞳劇塵磣和中道雨中見寄雨淫上復落雲暗不少開泥將沒馬脛思子日幾回我既不可往子亦不可來屋漏又苦甚巾舄生莓苔安肯問農畝唯憂無酒材但能置醇酎莫負吾樽罍卷第二十四宛陵先生集目録卷第二十四郭之美忽過讀蟠桃詩寄子美孫司諫知鄧州史尉還烏程薛宅觀雕狐圖寄汶上蕭著作宰豐城董簿之信州鉛山弟得臣簽判越州李舍人淮南提刑吳殿丞代州通判和人喜雨胥尉之復州景陵李審言歸鄭州李舍人見過春鶻謠來夢送淮南李提刑次道往鄭拜墓孫太祝亳州簽判寄靈隱通教僧李少傅佚老亭令狐祕丞守彭州和李舍人寒食和張應之見贈哭尹子漸次道約浴陳經祕校之信幕朱太博常州倅師古邀賦和中道寶相花擬陶體手問足足答手目釋贈葉山人李廷臣通判蔡州朱櫻悼子懷悲和中道雨樹答永叔寄示黃敏復尉新城寄永叔丞相二章閔讒狡二章薛八殿丞有遺師厚來奠其姑諭烏弟裴易進士間詠呈次道寄楚州吕濟叔答中道小疾見寄五月五日送可教僧歸越和裴如晦雨中雨中宿三君書堂和中道雨中見寄目録終
