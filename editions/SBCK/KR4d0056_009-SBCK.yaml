  text: 宛陵先生集卷第九
  hash: sha256:f8b1e7cf6bb36b5683a76b0848719011640150563c7fb51c3617c262f2812daa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_009-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和胡武平懷京下游好南國易悲愁西風起高樹枯荷復送􅀨度鴈寧知數欲問北來音繫書復若故冥飛杳無跡弋者徒有慕况在白蘋洲而懷石渠署石渠多故人鵷鵠方騫翥鏘鳴尚可希綷翼何由附主人賴知已未變疇昔顧乗桴豈仲尼好勇非季路幸依南郡帳不學邯鄲歩自守終日愚都忘向時慮睠戀此江湖親年當喜懼旣􅀗庭闈近又多山水趣邇來對明月千里猶會晤長橋人絕聲舉酒逢秋露逈聞􅀌舟笛煙水在何處俯檻意無涯跳波魚夜乳頗得眞隱情奚湏慕巢許思􅀉梅枝香逺隔蘭溪渡緘之付好風精爽亦隨去依韻和武平九月十五日夜北樓望太湖東吳臨海若看月上青冥河漢微分練星辰淡布螢細煙沈逺水重露裛空庭􅀌坐饒清興惟將影對形依韻武平憶玉晨觀世路多氛垢人間浪逐名是非還自喻寵辱固堪驚薄宦眞何戀丹砂儻可成終尋谷口隱鄭子豈其卿凝碧堂始至荷芰生田田湖上宻復當花競時艷色凌朝日今來蓮巳枯碧水墮秋實更待雪中過羣峰應互出樽有緑蟻醅爼有頳壼橘可以持蟹螯逍遙此居室送劉成伯著作赴弋陽宰我昨之官來值君爲郡􅁺當年巳知名是日纔識靣未乆嗟還都始應羣公薦遂除芸省郞出治江上縣縣劇素所聞其俗到可見水精製盤盂去氷瑩產郊甸鳴箏斵桐梓雕飾雜寶絢有藥化銅鈆方士多伏鍊君今齒尚壯好學常不倦二者定非惑吾言亦狂狷絃歌將有餘幸可窮經傳歸來期著書篋楮盈百卷莫學此踈慵無能守貧賤明朝君當行勉勉自出餞豈無一壼酒豈無一鼎饌冬雷上帝設號令隱其南山下震發固有時曷常事慿怒春以動含生夏以奮風􅀨冬其息不用藏在黃厚土我今來江南歲曆惟建午如何小雪前向曉疑鳴釡蛟虵􅀛蟲厄鱗裂口塊吐蝦䗫不食月深窟僵兩股天公豈物欺若此汨時序或言非天公實乃隂怪主嘗觀古祠畵牛首推連鼓黒雲雜狂飈相與爲肺腑是不由昊穹安能順寒暑吾因考厥事復以驗莽鹵市井欺量衡定知不活汝元惡逆大倫弗加霹靂斧此豈曰無私故予未所取必恐竊天威似將文法侮焉顧五行錯詎畏萬物覩欲扣九門陳恨身無鳥羽劉成伯遺建州小片的乳茶十枚因以爲答玉斧裁雲片形如阿井膠春谿闘新色寒籜見重包價劣黃金敵名將紫笋抛桓公不知味空問楚人茅冬日送暹上人霜風刮地如刀鎌鳥不逺飛魚巳潜何况削髪冷入骨草屨不畏氷雪霑縁山渉水去幾里晝鉢野飯誰來添毗陵舊寺苦欲到索我贈行無乆淹和壽州宋待制九題熈熈閣初日照城樓流暉及菌閣上收花霧紅下見春煙薄信羙是􅊋􅀖而淹佐時略自慙江外人敢慕淮南作春暉亭卉木日巳發中圃日巳嘉歡言樂和景及此鬂未華春風實無幾凌亂枝上花山隂况暮月俯仰誠可嗟白蓮堂蟋蟀在秋堂芙蕖出深水浩露同一色澄澈寒鑑裏佳人耻施朱欲與天眞比沙鳥閑且都誰將擬公子式宴亭從事誰獨賢而來均宴喜幽禽雜嘯呼珍木竟叢􅀝興將物色俱閑猒簫鼓美寧同不聞問訟息時遊此秋香亭高軒盛叢菊可以泛緑罇餘甘自同薺忘憂寧用萱有木皆剥實何草不陳根獨此冐霜艷芬郁滿中園狎鷗亭羣生自知機不可欺以異此雖鷗與馴鷗亦魚所避坐熊臨碧水安得同一致然此海客心還應無有愧齊雲亭城隅結危棟髣髴凌煙霓平觀飛􅀨來俯窺巢禽棲浩蕩􅀌思發􅇈歷蔓草齊長安去不逺何言西北迷美䕃亭野材仍翦茅當此茂林下晴暉葉上明翠影盃中瀉鮮風時颼飀輕裾自蕭灑固􅊋嵇生鍜曷慕巖栖者望僊亭嘗聞淮南王雞犬從此去至今山頭石馬跡尚有處使君辭從官終日絕塵慮望望雲漢間想見賓天馭依韻和僧􅀃上人見訪客從東國來山雲猶在屨是時正窮臘鴈落溪隂暮投宿古城隅雪迷松下路衣楮足蘭荃相過寧猒屢立春前一日雪中訪烏程宰李君俞尋有詩見貺依韻和答粉絮先春拂靣翔臨風躍馬到君堂縣民將喜土膏起令尹未驚農事忙疾呼小吏具山酌便欲盡醉爲詩狂我牽塵俗不得乆何意更煩投夜光送劉比部青山夜來􅀨溪水巳潺湲侵曉桂旗動傷離蘋渚前百壼臨祖道兩槳破春煙舊業西河上歸心向日邊贈月上人彈琴人閑溪上橫刳木素琴寒􅀝一枝玉吳王城畔鏁深房月下空彈􅀌鴈曲冬日陪胡武平遊西余精舍侵晨霜氣嚴溪口氷巳合烏榜將進遲寒篙旋摧拉遙看松竹深雪屋藏山衲登臨興都盡薄暮㳂清霅依韻和武平苕霅二水昔愛伊與洛今逢苕與霅南郭復西城曉色明於甲塵纓庶可濯白鳥誰來狎落日潭上歸魚謌自相答依韻和武平昇卞二山北峰壓城蒼南岫縁溪緑誰知昔人遊尚想叢桂馥鳥獸安可羣呼鳴自爲族儻聞羡門術一躡塵外躅送崔主簿赴睦州清溪舟輕不畏險逆上子陵灘七里峽天翠千重雲木寒古祠鳴野鳥亂石激春湍正與高懷愜寧歌行路難依韻和劉比部留别春雲巳泊簾濃淡半晴天沙草微抽緑林枝逺帶煙况玆逢晩景那更送歸船苦酒聊爲酌無勞辨聖賢送潘供奉承勛與君迹熟情巳親欲將行邁聊感人舉酒不能効時俗半醉苦語資立身長大實好帶刀劒曷不徃助清邊塵門㦸雖高豈自有當思乃祖爲功臣所宜勇躍發竒策嘉名定體庶得眞儻以斯言作狂􅀃乗肥食脆任青春答新長老詩編江東釋子多能詩窻前樹下如蟬嘶朝風暮月只自老建安舊體誰攀躋唯師獨慕陶彭澤竒蹟仍收王會稽嘗示余右軍書一軸此焉趣尚巳不淺更在措意摩雲霓題劉道士奉眞亭降眞沈水生爐煙扣齒曉漱華池泉心存崑閬未可到夜瞻北斗何聯聯顧玆虚室如有遲一草一石幽且妍芝蓋雲軿杳無至不知誰更似楊權依韻和烏程李著作四首縣署西園春入西園何苦誇我曾狂醉洛城花如今老大都無興獨坐晴軒看落霞霅上二首共愛霅溪風物美春來清可鑑􅂡眉蘋生楚客將歸日花暖吳􅁞始浴時臨水竹樓通市陌跨橋雲屋接川湄畵船載酒期君醉巳是無謀助翦夷靚粧艷服遊川上簫鼓聲中俗自歡􅀉語春風休用惡恐教潭水起波瀾早春遊南園東國春歸早南園百卉宜萱芽開翠頴杏蕚破煙姿青壠將鳴雉喬林未囀鸝石尤風莫起芳物畏君吹送簽判張秘丞赴秀州江鷰歸時君亦歸鷰巢未暖君還去去去溪邊楊柳多正值清明欲飛絮競折贈行何所益時當長養傷嘉樹不如舉酒對青山酒罷移舟湏薄暮嘉禾主人余乆知跡冗不擬強攀附儻或無忘問姓名爲言懶拙皆如故送弟赴和州幕夾河爲郡不如古江北江南作冗官湏記長傳一經訓雖貧莫改飮瓢歡歷陽况與吾廬近春榖休言問膳難此日停舟聊舉酌明當水驛自加餐􅀉題徐都官新居假山太湖萬穴古山骨共結峯嵐􅀔不􅀌苔徑三層平木末河流一道接墻隅巳知谷口多花藥秪欠林間落狖鼯誰侍巾鞲此遊樂里中遺老肯相呼送梵才吉上人歸天台頃余遊鞏洛值子入天台當時羣卿士共羡出氛埃荏苒踰一紀􅁍向人間來問子何爲爾言興般若臺雖將發愚闇般若安在哉此教乆巳熾增海非一盃我言亦爝火豈使萬木􅁅蓋欲守中道焉能力損裁子勿疑我言遂以爲嫌猜忽聞擕錫杖思向石橋廻城霞與琪樹璨璨助詩才嘉辭徧人口幸足息巖隈公度以余嘗語洛中花品而此􅀖之人多不敢言花於余今又風􅀨經時花期遂過作詩以見貽故次其韻去年三月來吳中欲擬看花無與從今年二月花偏早發作無節􅀨與風前時晴明要尋賞謂夸洛陽多不容我心豈是限南北美好未必湏深紅姚黃魏品若盡有春色定應天下空因君見贈又及此莫怪還思澗水東留題可及明心堂秭雉巳先嘷卉木蕚漸歇俯檻弄條枚因心悟生滅上人本高胄季父踐清列而能猒紛華樂彼方外􅀃陪武平游雅上人房卞峯亭晩愛池上清羣峰對簷􅂩常恐雲氣生坐令蒼翠隔復繞曲塘隂映實􅀌花拆誰知禪者居來伴使君適送張舍人自安吉移宰桐安逺辭湖上山徙治海邊邑機杼吳俗饒魚蝦越人給操琴在更張􅊋土冝順襲何以贈勤勤薄言玆所及劉彞秀才歸江南鳯鳥不在笯麒麟寧受靽君思此二物中夜忽興歎况值南風來襲蘭歸楚岸送胡武平來見江南昬使君詠汀蘋再看蘋葉老汀畔送歸人人歸多慕戀遺惠在玆民始時繞郊郭水不通蹄輪公來作新塘直抵吳松垠新塘建輿梁濟越脫輈仁言度新塘去隨跡如魚鱗從今新塘樹便與蔽芾均我雖備僚屬筆舌敢妄陳因行録所美願與國風振廻陳郞中詩集嘗觀陳伯玉感遇三十篇矯矯追古道粲爾日星懸今公豈其後佳詠乆巳傳憶爲童子日早誦錦繡妍玆來預官屬而許玩竒編明珠三百琲一一徑寸圎他人握中有未􅀗毫髪焉家貧敢懷寶况近驪龍淵又畏風􅀨作神物不得全再拜捧明月長跪還席前依韻和武平别後見􅀉溪逺檣危一望遙此焉悽絕府中僚巳同鴈鶩依清淺共看鸞皇上泬寥别岸無端縈細柳廻舟不􅃘過新橋醉來事事能生感誰道愁腸酒易銷蘄州廣濟劉主簿相識雖非乆相親似舊年論文君豈後尚齒我慙先慣狎吳兒水將浮楚客船安知不離恨高柳正鳴蟬依韻和僧􅀃夏日閑居見􅀉城郭非清凉山僧抱微疾又况三伏時當玆一禪室炎飊正爍爍溪水徒瑟瑟唯詠氷雪辭可以銷夏日依韻和李宰秋思一葉與風舞巳知天地情將令百菓實競振羣蟲聲陶令欲收秫􅃎人思誓觥更吟君麗句誰爲寫鍾評送儲令赴韶州樂昌嘗聞韶石下虞舜古祠深至樂乆巳寂况持陶令琴炎方不道逺一去值秋霖隱眞亭烏程史尉署作尉慕吾祖吾祖非得時誰似芙蓉國日見芙蓉披凉􅀨隨風來清香入酒巵自得眞隱趣不慙吳市爲􅀃上人遊廬山夙懷高世趣固足林壑情欲遊名山徧遂爲廬岳行又訪逺公蹟東林氣􅁚清瀑布秋影落香爐曉煙生洗蕩萬古慮薫蒸千載名我今滯􅀌宦空羡瓶錫輕和元之述夢見􅀉高秋枕席凉晝寢還清曠不嘲君腹便獨夢予爾訪豈忘相規言仍記羣小謗始知端正心寐語尚不誑􅐞怳何讒人告子亦孟浪吾聞有尸蟲伺惡多相尚耽睡受其惑子心恐成恙勉子守􅁃曹勿使玆物王䰟交昧聰明寤後成清唱誦玩自省循徒爾増怊悵不能檢細微遂使言屢貺雖然甚頑鄙内顧無過當仲尼稱天厭季路猶行行何當謝勤誠爲子傾嘉釀秋日卧疾恭上人來過不及見因以詩答溪上秋霧多溪居曉寒入呼吸遂生痾嘔泄不下粒素知江南地大率皆卑濕乆從吳土居氣候非所襲伏枕欲經旬冠帶拈巳澁女奚特扣關問疾提山笠我非金粟身􅀉謝何暇揖屈性玆不能他時冀來及依韻和守賢上人晩秋書事秋霧鬱不開曚曨夾溪樹深枝尚宿禽寒葉時驚露我居溪之隂早景誠所慕開谿吐初陽獨吟神與晤豈意方袍人而懷此焉趣忽枉􅌦􅅼章無慙惠休句宛陵先生集卷第九宛陵先生集目録卷第九湖州後詩和胡武平懷京下和武平望太湖和武平憶玉晨觀凝碧堂送劉著作弋陽宰冬雷送成伯遺建荈冬日送暹上人和宋待制九題和􅀃上人見訪雪中訪烏程李宰送劉比部贈月上人彈琴陪武平遊西余和武平苕霅二水和武平昇卞二山送崔主簿赴青溪和劉比部留别送潘供奉承勛答新長老詩編題劉道士奉眞亭和烏程李著作四首送簽判張秘丞送弟和州幕􅀉題徐都官假山送吉上人歸天台次答公度留題可及明心堂陪武平游卞峰亭送張舍人劉彞秀才歸江南送胡武平廻陳郞中詩集和武平别後見􅀉蘄州廣濟劉主簿和僧夏日閑居和李宰秋思送儲令赴樂昌隱眞亭􅀃上人遊廬山和元之述夢答恭上人和守賢晩秋書事目録終
