front:
  text: 宛陵先生集卷第四十六
  hash: sha256:8361a16c9fc57d3fd6a4c588dbb9aa91fdbeef2aaf29f36f3a63ac09a9573afe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_046-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和許待制春雪宻雪犯陽和寒階覆短莎條牙摧不展鳥舌噤應多變令巳爲失易消如未苛桃花禹門水早晩見通波送廣西提刑潘比部伯恭白麻新拜大丞相黃􅁓首除南省郞欲使平刑安逺俗莫辭乗傳歷炎荒桂林地險通椎髻陽朔峰竒削劒鋩自有王門舊勲業且湏稀作上書囊大明寺平山堂陸羽烹茶處爲堂備宴娛岡形來自蜀山色去連吳毫髪開明鏡隂晴改畵圖翰林能憶否此景大梁無依韻和王平甫見􅀉尊王興霸國古莫重齊桓仲尼書大法亦莫重更端文章革浮澆近世無如韓徤筆走霹􅆮龍虵􅁬濳蟠颺風何端倪鼓蕩巨浸瀾明珠及百怪容畜知曠寛其後漸衰微餘襲猶未彈我朝三四公合力興憤歎幸時構明堂願爲櫨與欒期琢宗廟器願備次玉玕謝公唱西都予預歐尹觀乃復元和盛一變誰爲難行將三十載衣被劇織紈後生喜成功徃徃舞朱干君家兄弟賢挺拔尤堅完譬彼登㤗山孰辨雲徑盤忽在高高巓兩腋猶抑翰我乆知子名曾未接子驩前者和君詩薄言慙兒肝淮南喜子來袖刺字未漫明日聞渡江留書特相安今又􅀗嘉辭至味非鹹酸依韻和丁元珍見􅀉我從江南來挂席江上正輕舟自行速不與風力競乃省少時學強勉無佳興初如弄機杼未解布絲經利器昩其持或反授人柄及親賢豪游所尚志已定不厭朝市喧不須山林靜不爲煦煦妍不爲嚴嚴冰遇物理自暢區處劇操令仍􅀋楚野筠忽從􅀌根迸便成翠琅玕乆與風霜硬雖然逹吾眞誰復究畢竟世間忘坦途盡欲求宻徑哂我是踈宜乎今蹭蹬蹭蹬誠可嗟所偶亦已併晩逢二三友喜飮恨多病道路何邅廻季秋越春孟平生景慕者邂逅出天幸接迹猶謂榮况此聲顏並實慙寡時用又顧無竒行愛之不􅃘去自旦還至暝在昔濁世賢徒知清酒聖但用醉爲娛一老少不更稍思桃源人翩爾乗漁艇㝷花逐水徃豈念衰與乗歌謳非俗情山響自答應以此謝君勤微言期略聽衮衮不足爲試共幽人評㤗州王學士􅀉車螯蛤蜊車螯與月蛤􅀉自海陵郡謂我抱餘醒江都多美醖老來飮不滿一醉巳關分甘鮮雖所嗜易飫亦莫問嬌女巧收殻燕脂合眉暈貧奩無金玉狼藉生恚忿妻孥喜食之婢妾困埽􅂸行當至京華耳目飽塵坌此味爽口難書爲猒者訓張聖民席上賦紅梅吾家有嘉樹紅蘂開朝霧笑杏少清香鄙梅多俗趣江都別乗居似見句溪圃坐中勿苦疑結子看春暮平山堂雜言蕪城之北大明寺闢堂高爽趣廣而意厖歐陽公經始曰平山山之迤􅆔蒼翠隔大江天清日明了了見峰嶺已勝謝眺齪齪逺視於一窓亦笑煬帝造樓摘星放螢火錦帆落檣旗建杠我今乃來偶同二三友得句欲霜鍾撞􅁍思公之文字世莫􅀟舉酒一使長咽慢肌高揭皷笛腔萬古有作心胸降自感左目忽昏花愁心亂劇麻文書都莫見藥物近慿他眸子終何似形軀且願嘉唯期一開㤗再望日中鴉我不嫌髭白白髭何自落雖然失醜衰將恐日踈薄有生無不老歲事看秋籜一身憂已大毫髮誰能度二月二十八日依韻和孫都官河上寫望河上風煙愛此􅀖吳艘越舸不相降魚鯹矗矗橋邉市花暗深深竹裏窓蹴踘漸知寒食近鞦韆將立小鬟􅀟年光取次湏偷賞何用功名節與幢依韻和試筆偶書洗硯開書几拈毫喜子巢不爲微物撓自向小欄􅃻已逐游絲末還縁翠葉稍因知生理大不必在重爻和張民朝謁建隆寺二次用寫望試筆韻荒臺殘壘舊名􅀖曾􅀃王師此受降西漢衣冠拜原廟五天龍象護經牕蜀岡井味人猶品隋帝宫基闕尚􅀟自古興亡不湏問風鈴閑聽響幡幢躍馬侵星去啼鴉未出巢春裘風易裂從􅀐鐙相􅃻紅日􅀟行柳黃金一抺梢乾坤功力大黙誦易中爻依韻和許待制後園宴賓春來無處不幽芳誰復樽前歎異鄕繞榻綺羅觀舊艶傍池桃杏照新粧柳條拂拂牽絲嫰蘂粉輕輕落酒香聞道主公偏愛客翻思當日醉莎􅂣宛丘城頭有莎􅂣臨淄公毎飮於其間依韻和許待制偶書曉􅀨射船珠瀉盤平明水上舞英殘􅃲雞蹠惡輕泥濕調馬蹄翻軟土乾深屋鷰巢將欲補宻房􅁞蟻尚憂寒爲言楚客甘蔬蔌白芷香牙長嫰􅃢閨思望日赤如橘游梁音信稀愁心常似醉春絮等閑飛江鱖看將爛芹牙吐尚微何時慿鷰子􅀉取錦書歸代書􅀉王道粹學士巳具扁舟訪使君忽逢春􅀨起淮濆花寒蛺蝶猶相守水冷鴛鴦不暫分况約他時來􅀉蹟何湏今日去論文解裝無復山隂興且對荆􅁫與布裙依韻和許待制病起偶書桐柳隂隂翠色叅幔房深䆳靜於巖疾疑不是因虵影方秘曾傳白玉函煉蜜有時蜂競至墜羶無數蟻來㘅女奚困觸屏風響林鳥饑㝷蠧木鵮趨吏喜聞開便閤舞􅁎排北翦春衫嘉賓入幙金樽抹賀客衝風席帽攙談岀古人非騁辨詩陳王化不言讒提綱勿用銖銖較列局縁從物物監龍腦􅂐香盤屈曲虎頭彫枕剔空嵌年踰五十惟躭易能格神明莫若諴依韻和新栽竹斸破煙叢帶筍移映軒臨檻特爲宜龍孫巳見多竒節鳯實新生入翠枝不向阮家林下集還思渭北水邊窺一花一草公休詠慣作蘭臺侍從詩依韻和戲題楊州太守重交情我欲西歸未得行寒食尚賖花水近妻孥煎去到天明依韻和春日偶書甕靣春醅壓嫰藍盤中鵞䏑亦肥甘正宜醉夢輕爲蝶苦怕酬詩宻似􅁞病起羊公方隱几歸來陶令只乗籃河堤古木欣欣暗野水新秧拍拍渰已向官資隨分足莫將忠憤等閒談况於世上諸般猒不作人間一例貪陋巷自知當退縮擁門誰解更趨叅高低趣向難爲合冷暖情懷固飽諳勉意妻兒猶苟禄強顏冠冕未抽簪唯公恩遇留連乆頻對樽罍也􅀒慙依韻和禁煙近事之什狂風􅁀􅀨巳頻過近水棠梨着未多窈窕踏歌相把袂輕浮賭勝各飛堶閒牽白日游絲颺細驀黃金舞帶拖小苑芳菲花􅃲蘂華堂嘲哳燕爭窠西州駿馬頭如剥南國佳人頸似瑳結客追隨傾畵榼分朋游樂藉靑莎鞦韆競打遺鈿翠芍藥將開翦纈羅我病乞求新火炙無心更聽竹枝歌依韻和春日見示春􅀨懶從年少狂一生憔悴爲詩忙不能屑屑隨時軰亦耻區區憶故鄕白玉笛聲親府席六么花拍動衣香龍咽嘹喨留行月鳯翼趨蹌巧定􅂣粉色酒容歡四座花光燭影照西墻虚榮浪貴知多少安得如君展胏腸依韻和偶書相留在昔有言無不讎故於嘉詠豈宜休出奇吳國將能戰探隱漢宫人戲􅍐吹笛夢來猶記曲愛歌老去未忘謳車中變服爲秦客頭上南冠學楚囚日永歡呼遺搏齒夜深談論廢更籌海陵已有從游約今欲西歸且榜舟讀邵不疑學士詩卷杜挺之忽來因出示之且伏高致輒書一時之語以奉呈作詩無古今唯造平淡難譬身有兩目瞭然瞻視端邵南有遺風源流應未殫所得六十章小大珠落槃光彩若明月射我枕席寒含香視草郞下馬一借觀旣觀坐長歎復想李杜韓願執戈與㦸生死事將壇送寧鄕令張沆長沙過洞庭水泊風搖矴青山接夷蠻白晝鳴鴞鸋竹存帝女啼䕫學林雍鑋不嫌卑濕徃教令民湏聽依許待制送行詩韻詠鷰以􅀉江鷰㘅泥日深堂拂玉琴不教關閤戸乃見主人心掠水飛􅊋捷迎風去巳禁短書猶可記聊影託微唫依韻和酬邵不疑見答君才若巨賈旣富仍深藏遂兼碌碌貧共處安可量淊淊大澤陂􅄅漫入幽荒徒欲窮端倪慿高何相望一日以文繡被此糞土墻門徒三千人起予唯􅁲商薄言昩纎悉懷憂思萱忘美􅒄委彫琢以未知我詳但念故時朋所樂來逺方愼勿以名使取敗非相當贈張伯益張伯益風義自足常遊遨醉彈琵琶聲嘈嘈雷車急輥蛟龍號曲終放撥解紫絛勇氣索筆作小􅂐李斯復出秦碑高不數宣王石鼓文快健欲敵橫磨刀奕棋絲桐且置之衆善多取精神勞依韻和邵不疑以􅀨止烹茶觀畵聽琴之㑹彈琴閱古畵煑茗仍有期一夕風􅀨來目喜農畝滋中河不阻澀舟楫亦所宜况聞新疾愈當與嗜好暌何湏顧小約豈不有他時淡泊全精神老氏吾將師幸因答來章敢不以此咨此咨有深理願君勤且思依韻和不疑􅀉杜挺之以病雨止冷淘㑹邵杜二良守相逢欲霑醉促􅂰一開顔衮衮言有味或嘆季路宜成語伯夷是各懷忠義心要終豈同異我實踈賤軀政治未使試預玆高古談懦志生勇氣明當饌湯餅疾雨晦天地一日不見君何止如三歲口腹尚乖期榮華可推􅀋嗟嗟勿復問安恬固無媿獨酌偶作東路歸梁􅂴黃流下汴深眼穿南去翼耳冷北來音風雨昬斜日乾坤入醉吟不憂貧且老自有伯鸞心答杜挺之遺魚乾百年蠧柳根半浮揭屋顚風吹欲倒寸歩泥深登岸難鰍乾助飮隣船老宛陵先生集卷第四十六宛陵先生集目録卷第四十六和許待制春雪送廣西潘提刑大明寺平山堂和王平甫見􅀉和丁元珍見􅀉王學士􅀉車螯席上賦紅梅平山堂雜言自感和河上寫望和試筆偶書和民朝謁建隆寺和許待制宴賔和許待制偶書閨思代􅀉王學士和許待制病起偶書依韻和新栽竹和戲題和春日偶書和禁煙近事之什和春日見示和偶書相留讀邵不疑卷送寧鄕令張沆和許待制送行和不疑見答贈張伯益和不疑烹茶觀􅀞和不疑冷淘㑹獨酌偶作答杜挺之遺鰍魚乾目録終
