  text: 宛陵先生集卷第四十
  hash: sha256:f762590408b765380685b8a941139ccc200356054a98caa1f26117087bb7c88d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_040-1a}
body:
  text: 宋宛陵梅堯臣聖俞著寧陵阻風􅀨􅀉都下親舊晝夜風不止寒樹嚎未休人言􅀨殺風􅀨急風未柔獨扶􅄌母䘮淚與河水流河水有冬竭淚泉長在眸予生五十二再解官居憂昨者母疾亟骨肉相聚愁槖中無一錢緩急何可求母當臨終時囑我貧莫羞隨宜具棺殮厚貸壓人頭死事定無益生償且無由泣涕聽母言心腸如剜鉤小子雖不令長養恩曷酬旦夕期速平後事勿預謀願母强藥食更延百千秋固云莫望我我䰟巳飛遊語畢忽奄逝撫膺呼裂喉未能一物備迷亂將安投艱窘見風義乃有令朋儔致賻或錢帛最力李與劉廷老原甫禁省及石渠奠助日不周裴楊乞銘蓋文􅂐古復遒如晦元明潭饒兩大艦朝索暮泛浮哀憐荷君子才德慙未脩三日違大梁兩宿此遲留聊書同些挽試託楚人謳新霜感前日衣上露今日衣上霜我母䰟何之膏火麋我腸隔棺三寸地如在萬里鄕嚎呼不聞聲飲食空置傍昔時憂我寒縫衣紉線長線長必絮厚要與風霜當又每恐我饑羮臛自調嘗此身内外間莫得頃刻忘舉衣不􅃘着舉筯不下吭一念百感生欲問天蒼蒼過淮侍親數數來浮汴護襯迢迢復渡淮㫖蓄曾無御寒具細君唯有隱居􅁫月銜逺入魚衘浪潮退長汀蚌閣崖素服華顚色相似青銅不􅃘見形骸淮隂天下滔滔乆厭秦英雄蛇䑕竄荆榛少年豪横知多少不及沙頭一婦人桫欏樹李邕有碑桫欏古樹常占歲在昔曾看北海碑今日四方俱大稔不知榮悴向何枝就野人買兎霜濃草白兎初肥蒼鶻調拳獵犬擕剰付錢刀買庖餗不湏縁徑更求蹄使風船清淮直上水連天坐看高帆後復前自是乗風有遲速不由人力愛爭先淮隂侯廟韓信未遇時􅃘饑坐垂釣歸來淮隂市又復逢惡少使之出胯下一市皆大笑龍虵忽雲騰蛭螾豈能料亡命乃爲將出竒還破趙用兵不患多所向孰敢摽功名塞天地翦刈等蒿藋于今千百年水上見􅀌廟鷺衘葭下魚相呼尚鳴呌高皇四海平有酒不共釂古來稱英雄去就可以照又平律一首漢家天下將廟古像公圭百戰自忘楚一時空王齊鄕人奏簫鼓舟子賽豚雞不改寒潮水朝平暮復低入滿浦馬頭攙岸斗鷰尾泊船齊風送寒潮急雲藏晩日低逢人多楚語問客煑吳雞難覔枚臯宅蒼葭處處迷許發運待制見過夜話許公運國儲歲入六百萬上莫究所來下莫有剥怨十年無纎乏功利潛亦建昨除侍從官聊爲磨世鈍比於以舌得此豈愧物論較量多少間未足數劉晏大計荷窘費曷不使預筭欲倍卽能倍但勿惑謗訕擾民可以奪食官可以竄要付與權衡一切出果斷嗚呼任智力長短固有限制財猶制兵太甚則生亂公譬淮隂侯多多自益辨我今聽其談夜去爲扼腕書之俟采詩咨訪不可緩登泰山日觀峰并序予泊􅀲歩山下夢王最彞問韋應物日觀峰詩予卽誦知語不屬謂景彞曰當爲檢韋集覺而函閱韋集無此題尚記夢中所誦首句云晨登日觀峰遂續􅀘之晨登日觀峰海水黃金鎔浴出車輪光隨天行無蹤正視刺我目攢集如劒鋒照曜萬物興磨滅萬物凶草木旣無命必聞石間松當時一避􅀨安得大夫封人而苟不遇抱簡誦六龍重過􅀲歩山魏武敗忘歸􅀌軍處山頂雖憐江上浦鑿巖山巓井豈是欲勞兵防患在萌頴我昔常登臨徘徊愛晴景片􅀨西北來風雷變俄頃疾行下危磴􅋰脫不及整霑濡入舟中㓜子喜抱頸問我適何之衣濕不太冷昨暮泊其陽月黒夜正永鴈從沙際鳴旅枕自耿耿平明夾櫓去廟樹聳寒嶺舉首生白雲飄搖水中影發長蘆江口篙師柂工相整衣龍女廟中來罕狶野祝擊皷降神語老鴉銜肉上樹飛長江無風平似削兩櫓夾舸行將歸南國山川都不改傷心􅄌姥舊時磯龍女祠祈順風龍母龍相依風雲隨所變舟人請予徃出廟旗脚轉旗指西南歸飛帆疾流電長蘆江口發平明白鷺洲前巳朝膳竹根盃珓不欺人世間然諸空當靣西施濺濺溪流散苒苒石髮開一朝辭浣沙去上姑蘇臺歌舞學未穩越兵俄已來門上子胥目吳人豈不哀層宫有麋鹿朱顏爲土􅁅水邊同時伴貧賤猶摘梅食梅莫厭酸禍福不我猜金陵三首恃險不能乆六朝今巳亡山形象龍虎宫地牧牛羊江上鷗無數城中草自長臨流邀月飮莫挂一毫芒金陵逢曉雪撩亂逗雲來已失烏衣巷還成白玉臺山盤猶隱見江轉似昭回一聽高樓笛依稀認落梅每入秦淮口風波更不憂重看後庭樹還起舊時愁故老都無有遺蹤莫可求何人能識意白鷺在寒洲丫頭石此碑也在金陵斷石岡上有吳文帝字焉丫頭石雖斷文字未全訛年筭赤烏近書疑黃􅁚多幾時經霹􅆮異代見干戈更與千秋看松煤定費摩漫書蒲葵兩錢扇漫寫未嫌輕老媪持將去無端色不平閔冡吳天冊中盗發廣陵冡及扉開石樞中環走徹道高濶可通車五尺銅鑄人執兵冠服朱壁石刻位號列侍幽宫隅殿將將軍屬侍郞常侍俱啓棺見其尸􅁂斑顏未渝白璧十􅀟藉雲母一尺鋪黃金塞耳鼻千歲不腐枯生爲貴與冨死與人未􅊋後世逢􅁀禍雖乆將焉如堯舜及周孔豈不固形軀雪中發江寧浦至采石泊舟斫枯葭歊火􅋹岸傍冐嶺雲冥濛漫江雪飛􅀭拖氷脩綱澀岀水朱鬐殭曠然起逺懷風旗轉危檣千帆共辭浦攙錯逆水翔落星始前瞻瞬目巳後相􅚝魚何時來楊花吹茫茫沙草不可辨鴈立知汀長山頭化石婦忽變素質光豈復願聞笛莫逢桓野玉登采石山上廣濟寺船從山下過直上見僧軒繫纜登磯石縁崖到寺門短籬遮竹瀁危路踏松根􅁍看滄江底帆歸煙外昬效阮歩兵一日復一日二首一日復一日一朝復一昬來新去成故俯仰變凉温有貴卽有賤未若賤常存騂牛慕􅀌㹠黃犬悲東門禍福相爲基損益不復言吾祖入吳市應龍非伏轅一日復一日一晨復一夕四序相盛衰三辰運光魄下上有常理憂患何時易先爛泣金燃先焚歎薪積但願逺世網焚爛不能責麒麟出非時未免西狩􅀗鷗鳥浮洪波心巳預海客阻風宿大信口東梁如印􅁞西梁如游魚二山夾大江早暮潮吸嘘解舟辭姑熟速欲還吾廬風逆未可前泊浦近煙墟波中事網􅅈乗月多夜拏冰灘聚鳴鴈霜葭正踈踈是時昴畢中曠􅄅天地虚靜坐人巳眠我慮乆洗如自起取美酒獨酌邀蟾蜍蟾蜍射白光入盞亦躊蹰醉來不解舞欲攬常娥祛昔對謫僊人此意復在予旣醒裂尺素立作數行書􅀉與青山家精靈其有諸早發大信口犬吠知船解村墟尚閉門霜泥粘纜尾冰水閣潮痕撇撇鸊鵜去纎纎舴艋昏梅湖到不逺􅀉信向田園黃池月下共酌得池字將歸謝公郡喜見阮家兒但對月和水郍能酒似池衰形疑鏡照葆􅁂怯霜吹宿鴈不堪託鄕人知未知泊昭亭山下得亭字雲中峯午午潭上樹亭亭乆作大梁客貧留小阮醒灘愁江舸澀祠信楚巫靈日暮渡頭立山歌不可聽送鹽官劉少府古賢我祖南昌尉時危棄去僊劉郞從宦日天子治平年燥茗山中火熬波海上煙吳民不爲盗唯此撓君權太師杜相公篇章眞草過人逺甚而特􅅄後進流于詠言輙依韻和杜詩嘗􅀃少陵豪祖德兼誇翰墨高蘇李爲奴令侍席鍾王北靣使持毫子美祖審言嘗自謂我詩可使蘇李爲奴我書可使鍾王北靣郊麟作瑞唯逢趾天馬能行不辨毛一誦東山零兩句無心更學楚離騷依韻和僉判都官昭亭謝􅀨廻廣教見懷賽􅀨何從事高情苦愛山謝公聯句後謝公有昭亭賽􅀨與何從事聯句詩惠逺過溪間笑處巖相答歸時酒在顏端憂守窮巷無力共躋攀依韻和吳正仲屯田重臺梅花詩桃花巳滿秦人洞杏樹猶存董奉祠莫怪寒梅獨多葉只縁樂府有新詩讀吳正仲重臺梅花詩此樹在靈濟王廟楚梅何多葉縹蔕攢瓊瑰常惜歳景盡毎先春風開龍沙雪爲友靑女霜作媒託根邇廟堂結子助􅂦􅎄吳侯本吳人筆力高崔嵬但詠同姓木予非梁棟材依韻和正仲重臺梅花芳梅何蒨蒨素葉吐層層近臘寒猶勁先春氣巳承冷香傳去逺靜艶宻還増有意常欺雪無功合鏤氷早煙籠玉暖凍􅀨浴脂凝漢女新粧薄燕􅁎瘦骨稜壓枝唯恐折簇蕚似難勝神物終來護江鄕未解矜獨奇心豈欲􅀉逺客何曾不見黃鸝度寧防粉蝶凌月光臨更好溪水照偏能畵軸開雲霧宫刀翦綵繒都無筆可衒莫信巧堪慿丹杏塵多雜夭桃俗所稱故林嘗渴望大􅁃更愁登重和陽春曲聲辭猥媿仍正仲見贈依韻和答平生好書詩一意在抱槧旣無鈌雲劒身世遭黮黭耻游公相門甘自守恬淡妻孥毎寒饑内愧劇剜㦧時賴二三友乞米慰窮􅃤雖然情懷惡亦未廢誦覽如􅀒㑹稽辱欲雪效嘗膽作文持與人百不得一頷聖猶嗜好殊獨取菖蒲歜我愚希六義將使􅀑神感譬彼捕長鯨區區只持罯青天挂虹霓踴跂不可擥太華五千仭妄學巨靈撼幸且同蛙黽近樂在井坎蒼髮况種種存非衞髦髧吳侯琅玕姿而來視薍菼鳯皇五色毛曷羡未翅蝻染夏有正采安用此淺黲乃知叔度陂萬頃見澄澹孟軻患爲師薄劣亦何敢正仲徃靈濟廟觀重臺梅玉盤疊捧溪女歸魚鱗作室待水婔竹間山􅀑入夜啼古廟乆閉誰啓扉屈原憔悴江之沂芙蓉木蘭託興微賈􅁩未召絳灌擠香草嘉禾徒菲菲曾無半辭助訶譏國風幸賴相因休依韻和昭亭山廣教院文鑑大士喜予徃還山暖春煙重林昬古寺藏溪流過曉漲嶺樹見新行馬去侵雲蹟風來襲野芳禪衣頻斗藪蠟􅄚莫趨蹌飛䑕時過擲饑禽或下頏慿欄何所適望堞正相當捧膳溪童絜㘅花鹿女香登臨無險絕不似畏巖墻依韻答逹觀禪師頴公霜露毎懷感江山空復情老便林室靜坐猒巷童聲盡日都無語逢人亦強迎浮生過半百安用此虚名題姑蘇邵氏園居積水夫差國閒居魯叟心石科雲起潤城角竹連隂鷰入池塘晚花開島嶼深應當効踈傅不惜槖中金嘗正仲所道撥醅屈原自著漁父篇餔糟不及漁父賢世無功名多浪死劉伶阮藉于今傳邇來獨酌邀明月唯有靑山李謫僊謫僊殁後幾百年市樓日沽千萬錢沉􅊺豈少當道眠文字不見空月圎吳均之孫何我憐􅀟壺貯醅持置前豈乏阮李詩與瘨淺飮強對春風妍依韻和正仲􅀉酒因戲之上字黃封誰可識偷傳王氏法應眞清淮始變醅猶薄句水新來味更醇欲擬比酥酥少色曾持勸客客何人紅梅雖是吾家物老去無心一醉春淸淮酒本王九傳法於山陽春􅀨春雨􅮕􅮕鳴百舌林花淡淡洗燕脂眼前耳底催人殺不醉三盃大是癡春夜聞雨風味正不寢驟來寒氣增簷斜滴野籜窓缺搖春燈孺子睡中語歸人行未能前溪波暗長定巳沒灘稜早春田行風雪􅀟羊路梅花溪上村鳥呼知木暖雲濕覺山昏婦子來陂下囊壺置樹根予非陶靖節老去愛田園宛陵先生集卷第四十宛陵先生集目録卷第四十寧陵阻風􅀨新霜感過淮淮隂桫欏樹就野人買兎使風船淮隂侯廟又平律一首入滿浦許發運見過登㤗山日觀峯重過􅀲歩山發長蘆江口龍女祠祈順風西施金陵三首丫頭石漫書閔冢雪中發江寧浦登采石山効阮歩兵阻風宿大信口早發大信口黃池月下共酌泊昭亭山下送鹽官劉少府和酬杜太師和簽判謝雨過和正仲重臺梅花讀重臺梅花詩和重臺梅花和答正仲見贈正仲靈濟觀重臺梅和文鑑喜予徃還和逹觀頴師題邵氏園居嘗正仲惠撥醅和正仲􅀉酒春􅀨春夜聞雨早春田行目録終
