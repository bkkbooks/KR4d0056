  text: 宛陵先生集卷第三十六
  hash: sha256:464831b4cc961b71739dbc967e709d065d1afb0c47dc2a41bcc6da432b472397
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_036-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送方進士遊廬山長風沙浪屋許大羅刹石齒水下排歷此二險過湓浦始見瀑布懸蒼崖繫舟上岸入松徑三日踏穿新蠟鞋路盤深谷岀嶺望後山日照前山霾偶逢風雨恐衣濕側􅀝石脇人相乖雨收不覺在高處􅁍見童僕提擕偕水聲不絶鳥聲好藥草香氣侵人懷老僧避俗去足跣野客就澗開門䦱樹巖隱映見寺刹層層杳杳躋雲階塢田將穫烏雀橫秋果正熟猴猿東林淡虀應似舊唯此足以待爾儕子心灑落撇然徃我方塵垢難磨揩讀日者傳答俞生宋忠爲大夫賈誼爲博士同與休沐下訪卜長安市吾不如二人讀書無舉跬借曰當乗肥乗肥非我指唯思泉石間坐卧松風美隱靜山懷賢師自持栢栽二十本種於㑹慶堂新作齋堂祠畵像又興高閣祕天蹤今朝還藉君移栢昨日巳因鵝種松近以羣鵝換松植於路傍九月六日登舟再和潘歙州􅁓硯文房四寶出二郡邇來賞愛君與予予傳澄心古􅁓様君使製之精意餘自茲重詠南堂􅁓將今世人知首尾又得水底碧玉􅃾溪匠畏持如抱虺拜貺䨇珍不可辭年衰只怕歔歈􅀑九月十一日下昭亭舟中平生山野性坐卧愛流水適從昭亭來興自明河起小舟浮輕槎身入星辰裏飲牛誰家郎照􅁂誰家子隔岸心相望翻然洲鵲喜灘頭磷磷石欲贈畏指毁留取自支機成都無􅁲士和張簿寧國山門六題山門按碑本􅁤轍作二􅁤䨇峙作䨇壁弟六句作田外峰巒囘抱兮陳卑尊當從碑本青山中穴爲大門下通􅁤轍高莫論飛雲出納不計限䨇峙平削無刀痕入門復見田園美田外峰巒􅅆抱尊棲靈畜怪不可詰䕫魈徃徃來守閽紫雲巖高巖日照雲常起吹作蘭花透紋綺橫爲歩障看未收山雨一來風滿耳夕陽巖日脚射空金縷直下映壁間梭未織野老先知雨又風明朝望此重雲黑朝陽洞洞門雖向扶桑開洞深不放陽烏入古來道士今莫逢石壁乳流苔正濕漣漪洞流泉决决出洞底自有細浪非風吹山花逐水到山下漏泄人間春未知碧雲洞誰將萬古􅀝雲劒刺破蒼石天窓開下貯泓淵不可極有時月漏清光來將離宣城􅀉吳正仲吳均詩語多竒揭苦倩鴛鴦謝明月昭亭川上此禽閑爲􅀉吳郎我西發西歸千里浮輕舟夜觀蟾光逆水流水流東海月西海各去雖殊意常在月偏皎皎隨人行水亦沄沄非浪改酒盆龍杓閑到吟梅花重葉將誰采湯珙秘校遺沉水管筆一枝沉香細榦天通中束毫爲呼諸葛翁乆從海上厭持握乞與阮籍書途窮物珍豈宜賤子有更後應合歸王公虛堂淨几塵不到硯傍置架􅃢瑚紅乃知用遇自有處君今莫歎居蒿蓬艤舟昭亭送都官暫歸錢塘前枉大梁城詩賦嘉入幙兹對昭亭山將行還有作别離此與彼終始情不薄我爲解覊馬君乃高飛鶴塵蹄未能息徤翅懷棲泊㝷巢望吳田一傍華亭郭况多丹頂雛坐看翔寥廓依韻公擇察推君來何所聞君去何所見自古慕虛名徃徃輕旣靣竊常恃賦禀平直如勁箭是以五十年長甘守貧賤相逢嗟未幾遽逺劇飛電今雖行巳晚多謝勤相唁晏成續太祝遺䨇井茶五品茶具四枚近詩六十篇因以爲謝始於歐陽永叔席乃識䨇井絶品茶次逢江東許子春又出鷹爪與露牙鷹爪斷之中有光碾成雪色浮乳花晏公風流丞相族以此五色論等差逺走犀兵至蓬巷青蒻出篋封題加紋柘冰甆作精具靈味一啜驅昬邪神還氣主讀高詠六十五篇金岀沙巳從鍜鍊出至寶終老不變傳幽遐自惟平昔所得者何異瓦礫空盈車滌心洗腑強爲答愈苦愈拙徒興嗟留題開元寺僊上人平雲閤背市靣山色平目觀白雲漁舟溪上歌游客欄邉聞俯簷翠栢痩蔓籬秋實蕡偶來心意靜塵慮如掃坌送黃生我本東西南北人窮途不復涙霑巾亦知車馬有行色爲見長沮與問津别張景嵩我雖識君晚君能知我心我心昭亭水見底無尺㝷照之不爲隱測之不爲深魚鰕旣混混藻荇亦侵侵終當至滄海浴日開黃金君當下灘去石浪激寒音猶能洗君目病瞖雲銷岑别鍾京我憐鍾氏子冐雨爲求文暫以經兹邁與之書所聞野鷗窺筆硯舟子采蒿芹况有新炊飯簞漿可送君江口遇劉糺曹赴鄂州􅀉張大卿我同陶淵明逺憶顔光禄得錢留酒家醉卧江蕪緑故人巳貴身獨賤籬根枯死佳花菊􅀌鴻飛去鸚鵡洲􅀉聲高樓謝黃鵠使君本是洛陽人嘗憐酩酊銅駞曲休將玉笛城上吹武昌老人聽不足巳知淸音通九霄定應悔說蘄州竹送劉糺曹溪􅁁前日君辭我江上今朝我送君自去蘆洲􅀉消息故人猶在武昌軍􅀉題開元寺明上人院假山石是青苔石山非杳藹山諸峯生鏡裏小嶺傍池間雨不因雲出門疑爲客關何湏費蠟􅄚暫到此中閒􅀉李獻甫何言自我去眼前一似空城中豈無人過目猶飛蟲又猒塵事多枳􅁄生胷中安知秋江水淨碧如磿銅尚恨有世累不及垂釣翁望望當速來止琴視孤鴻行路難途路無不通行貧足如縛輕裘誰家子百金􅀒六博蜀道不爲難太行不爲惡平地乏一錢寸歩隣溝壑題姑蘇豹隱堂靑山崔嵬藏古基文豹不見空齗碑華堂重構猶隱霧地今易主還好竒欲邀明月一去飮常娥將悔出海遲谿邊少年意氣在來徃只借白鹿􅀐自稱山人具肴酒酒酣請我留此辭謫僊墳近何可問當日無詠亦所疑雨還雨濛濛兮欲暮路險絕兮深泥嗟予僕兮甚餒畏予馬兮顛蹄關巳度兮心緩家將至兮渉溪喜膝前兮童稚餉燈下兮女妻哭笑鳥日月轉入地星辰蔽重雲夜色晦若漆怪禽巢未焚其音哭且笑哀樂詎能分方哭且笑時曾莫有以羣哭爲何所悲笑爲何所聞了不預人事吉凶誰復云山行冒雨至村家􅀨急芹泥滑禽鳴苦竹秋野香生草木雲潤上衣裘入石􅂊通馬穿林忽隱牛山家多淺井下照碧峰頭八月九日晨興如厠有鴉啄蛆飛烏先日岀誰知彼雌雄豈無腐䑕食來啄穢厠蟲飽腹上高樹跋觜噪西風吉凶非予聞臭惡在爾躬物靈必自絜可以推始終夜坐夜乆方慮寂空堂燈燭明落葉有暫響暗蟲無停聲力學不爲巳甘貧且徇名聊爲詠懷篇還想阮歩兵八月十五夜有懷天爲水蒼玉月柁潭靣冰萬里絶瑕玷百文巳澄凝山河了然在星斗光莫增借問九州内豈無隂雲興􅒺懷去年秋是夜客廣陵太守歐陽公預邀三四朋乃值連連雨共飮陳華燈旣醉公有詠屬和予未能強賦石屏物固慙無所稱今來宛溪上聊以故歲徴晶明正若此霡霂且何曾美景信難并康樂語足慿題吏隱堂新堂生虚明未悟追隱吏無乃隱非時唯應喧可避移花莫傷根種竹不改翠牀中置素琴亦見陶濳意詠嚴子陵不顧萬乗主不屈千戶侯手澄百金魚身被一羊裘借問此何耳心逺忘九州青山束寒灘濺浪驚素鷗以之爲朋親安慕乗華輈老氏輕璧馬莊生惡犧午終爲藴石玉夐古輝巖陬與潯陽舍弟别昭亭潭上水下與九江通去客解輕舸落潮乗順風􅅆頭迷逺樹沒背見飛鴻寂寞還蓬巷桓彞宅近東九月十八日山中見杜䳌花復開山中泉壑暖幽水寒更華春鳥各噤口游子未還家云誰未及還對此重興嗟何必因啼血顏色勝曙霞記歲買臣四十八猶苦行􅀒薪我免以樵給貧居年與均道上不謳歌妻亦無恚嗔三者固異彼異同􅀟朱輪種胡麻悲哀易衰老鬂忽見二毛苟生亦何樂慈母年且高勉力向藥物曲畦聊自薅胡麻養氣血種以督兒曹傍枝延扶踈脩莢繁槖韜霜前未堅好霜後可炮熬誠非騰雲術顧此實以勞逹觀禪師曇頴住隱靜蘭若或言自比獼猴散走不來頴嘗哂曰吾知是山枇杷爲多始至也未實故其去將實也必羣集後果然頴惡乎俗之好異恐傳以爲人惑欲予詠而播之隱靜山中寺獼猴徃徃過導師歸以去盧橘熟還多禪地寧求悕居人切莫訛未嘗嫌此物任挂古松柯頴公遺碧霄峰茗到山春巳晚何更有新茶峰頂應多雨天寒始發牙採時林狖靜蒸處石泉嘉持作衣囊祕分來五柳家送逹觀禪師歸隱靜寺古律二首初逢洛陽陌再見南徐州所歷幾何時倐去二十秋今復振霜屨還山逺莫留我詠阮公詩物靡必沉浮誰云西海魚夜飛東海頭世人嗟識昧豈是滯林丘栗林霜下熟歸摘禦窮冬帶月涉溪水過山聞寺鐘未嫌雲衲濕巳喜野人逢且莫似盃渡滄波無去蹤冬至感懷銜泣想慈顏感物哀不平自古九泉死靡隨新陽生禀命異草木彼將羡勾萌人實嗣其世一衰復一榮冬至日得師厚宋次道中道書水國欲爲雪野冰將合河人同一陽至淚向八行多朋意今猶在年華悵似過看看四十九應笑此蹉跎擬水西寺東峰亭九詠垂澗藤澗深連石壁石上生長藤􅀌猿來自熟縁飮下復登賴無樵人跡且免束薪蒸嶺上雲我來東峰下逺見西嶺頭白雲忽巳合向此偶遲留人誰問何有自可忘殷憂材中翠萬木總柔翠况復新晴時日色照欲動山氣歛還遲望之如何攬舉袂隨風吹棲煙鳥斑斑逺林鳥極目波煙中各識時早暮不忘巢西東推物得眞意吾將効陶公古壁苔隂壁流暗泉古苔長自好不改春與秋何如路傍草空山正幽藹淨緑無人掃幽徑石縁溪去欲逺磊砢忽礙行旁臨側身險下怱寒流聲幽客慣來徃同此猿鳥情寒溪草靑靑色堪染欲辨不知名根隂託乳魚水底抽新萌康樂池上詠獨與春夢成隂崖竹背嶺斷崖下老竹生扶踈􅀌根石上引勁節松不如莫言霜雪多終見緑有餘臨軒桂山楹無惡木但有緑桂叢幽芳尚未歇飛鳥銜殘紅不見離騷人憔悴吟秋風依韻和逹觀禪師還山後見􅀉雲歸在高嶺人見是無心矯矯將棲鳥遙遙傍故林南方雖有暖臘月易成隂惟恐多風雪幽期未可㝷九華隱士居陳生􅀉松管筆春松抽痩梗削束費長毫雞距初含潤龍鱗不自韜嘗爲大夫後欲寫伯夷高一􅀗山家贈令吾媿汝曹古柳岸側古大柳誰種臨長江中自出蠧蝎百歲成祜腔忽值漲流沒槎牙綴旌幢腹膚藏蛟龍半夜雷砰韸飛霆痕尚白如斬馬陵龎倐爾巨電至萬弩聲裂缸又爲狂風摧所殘惟朽樁卧􅆬越大鼎絕䧬不可扛就􅅡以照漁駭鱗一何厖始知網􅅈細未足禁突撞隆凖以脫去城下徒焚降我從洲上泊昬曉睨舩牕始終覩變毀欲賦挑殘缸吾交評韓詩險韻古莫􅀟安得共詠此但嗟各他􅀖放鵲并序烏鵲啄豆干槽圉夫患之以機得鵲其羣噪如救爲下上突掠甚急知不可脫聲蓋哀予閔之命釋縛放去因爲之辭鵲爲禽之靈智兮胡蹈機而不知爲庸早以困束兮固性命之將危喜逺人之至止兮始屢驗以如期向何預覺兮此何自昬豈專心以謀食兮眛目前之禍根苟所履必慮患兮莫若去人逺以圖存屑餘秼以致死兮誠咎爾而無耻維羣鳴之苦傷兮使吾心之測爾予測孔孟兮爾自解則艱皁聽予言兮釋爾而還撫爾呪爾兮爾無甚頑後誰恤爾兮拓彈方彎聞西山虎猛虎畏白日􅀌客莫夜行彼以不􅁀衆此何獨忘生饑必見人食不食且無名麋鹿能逺遁安得逢怒獰由人不由常役役官有程凍禽高樹繞吾廬薄暮煙氣重將棲立傍巢巳振窺落氄有來同枿枝亦各不偎擁颼颼隂風寒夜雪豈無恐登乾明院碧鮮亭餘喘不苟盡順俗來飯僧東嶺有上方脩竹蔽觚稜下有蒼石案旁挂􅀌蔓藤繫累向塵世更住􅊋未能隱靜遺枇杷五月枇杷實青青味尚酸獼猴定撩亂欲待􅀬應難正月十日五更夢中今年花似去年新去年人比今年老我勸厚地一盃酒收拾白日莫苦早紅梅家住寒溪曲梅先雜煖春學粧如小女聚笑發丹唇野杏堪同舍山櫻莫與隣休吹江上笛留伴􅁃園人􅀉文鑒大士讀書夜寂冷無火捲卷遂成搖膝吟始憶高僧將偈去安知古寺託雲深寒堂正睡逺鐘發野鳥亂鳴殘月沉明日呼兒整籃轝欲煩重過小溪隂海棠江燕入朱閤海棠䌓錦條醉生燕玉頰瘦聚楚宫腰曾不分香去尤宜着意描誰能共吹笛樹下想前朝嘗於宋宣獻宅見圖書明皇於海棠花下卧吹觱䈎寧王吹笛黃幡綽拍送餘干李少府作尉古來淸况於干越城舟中雨新足溪上水初生蒼􅆩岀還没素鷗飛且鳴休將五色棒欲取洛陽名宛陵先生集卷第三十六宛陵先生集目録卷第三十六送方進士遊廬山讀日者傳答俞生賢師持栢種至再和潘歙州下昭亭舟中和寧國山六題􅀉吳正仲湯祕校遺筆艤舟昭亭和公擇察推謝晏太祝遺茶具留題開元平雲閣送黃生别張景嵩别鍾京江口遇劉都糺送劉糺曹􅀉開元寺明師假山􅀉李獻甫行路難題姑蘇豹隱堂雨還哭笑鳥山行冐雨至村家鴉啄蛆夜坐八月十五夜有懷題吏隱堂詠嚴子陵與潯陽舍弟别八月見杜䳌復開記歲種胡麻詠逹觀禪師頴公遺茗送逹觀歸隱靜堂冬至感懷冬至得三友書擬水西東峰亭九詠和逹觀還山見􅀉九華陳生􅀉松筆古柳放鵲聞西山虎凍禽登乾明碧鮮亭隱靜遺枇杷夢中紅梅􅀉文鑒大士海棠送餘干李少府目録终
