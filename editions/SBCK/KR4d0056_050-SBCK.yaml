front:
  text: 宛陵先生集卷第五十
  hash: sha256:d32b30065f9742d0324486c01ad34f0e5ba9310fb72c4d1552305e7a188da79b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_050-1a}
body:
  text: 宋宛陵梅堯臣聖俞著桃花源詩并序嘉祐元年予在京師邂逅與都官員外郎張侯顒遇于書肆中張語徃時相識扵唐俞家今二十三年矣因各言出處張曰實居武陵武陵舊迹可具道始時陶濳爲記與詩其後徃徃賦詠不絶君之仲父昔嘗有作聞君能詩多爲公􅀸大夫諷誦願得一章夸咤遠􅁟亦當買石刋置嵓下旣重其意許其錄㓜時所爲五言歸閱故藁則頗不愜心遂別爲一章以塞張侯之請鹿爲馬龍爲虵鳯皇避羅麟避􅆯天下逃難不知數入海居嵓皆是家武陵源中深隱人共將雞犬栽桃花花開記春不記歳金椎自刼愽浪沙亦殊商顏采芝草唯與少長親胡麻豈意異時漁者入各各因問人閒賖秦已非秦孰爲漢奚論魏􅀳如割􅀲英雄滅盡有石闕智惠屏去無年華俗骨思歸一相送愼勿與世言雲霞出洞沿溪夢􅄰覺物景都失同廻槎心􅀉草樹欲復徃山幽水亂㝷無涯永叔席上分韻送裴如晦得黯字霜華夜夜濃汴水日日减行邁唯恐遲離懷不湏黯逺輕吳江潮乃見丈夫膽君意應洗然吾方困塵􅃤永叔白兎可笑嫦娥不了事走􅁍玉兎來人間分寸不落獵犬口滁州野􅅱􅀗以還霜毛䒠茸目睛􅎋紅絛金練相繫擐馳獻舊守作異玩况乃巳在蓬萊山月中辛勤莫搗藥桂傍杵臼今應閑我欲㧞毛爲白筆研朱寫詩破公顔直􅀫廣文舍下前夜􅀫廣文葉響竹打雪昨夜􅀫廣文窓影竹照月賴此數竿竹與我爲煖􅀬上有寒鵲棲拳足如痩蕨平明欲飛去唶唶􅀂告􅀃我無喜可報煩爾弄觜舌亦嘗苦老鵶鳴噪毎切切爲學本爲道窮蹙令素髪但能得酒飮終日自兀兀送宋中道太博倅廣平行役無冬春車馬無􅀯北急􅀂機上梭離別腸自織其間走聲利晝夜不能息晩得二友生胸蜺吐五色各思强禄仕安肯坐仰食一之毛遂鄕一之太伯國豈無頴脫才可邁古風力明當隔大河去路指斗極誰念平原君能於衆中識裴如晦時亦宰吳江送宋端明知成都其兄相國新鎭河陽伯仲俱􅀖棟朝廷􅀝以隆出爲周九牧入是漢三公歲易星辰轉天均雨露同威聲滿河北事業岀山東賦壓臨卭馬文高益部雄英靈當自伏教化巳先通彀􅀐花川隘壺漿錦里空道途來笮馬都邑貴郫筒刀夢殊祥後鋒車急占中春江湏愛賞花鳯在梧桐戲作嫦娥責我昨旣賦白兎詩笑他嫦娥誠自癡正值十月十五夜月開冰團上東籬畢星在傍如張羅固謂走失應無疑不意嫦娥早覺怒使令烏鵲繞樹枝啅噪言語誰可辨徘徊赴寢褰寒帷又將淸光射我腹但覺軫粟生枯皮乃夢女子下天來五色雲擁端容儀雕瓊刻肪肌骨秀聲音柔響􅀭􅀟眉以理責我我爲聽何擬玉兎爲凡卑百獸皆有偶然白神靈獨冐由所推裴生亦有如此作專意見責心未夷遂云裴生少年爾謔弄温軟在酒巵爾身屈强一片鐵安得妄許成怪奇翰林主人亦不愛爾􅀃爾猶自惜知不知叩頭再謝沋巳去起看月向西􅀯垂送李涇州審言古章乗一障不過提千兵今握數萬衆獨自制名城諸將俯聽命莫敢輒吐聲堂下選騕􅙂帳中圖峥嶸山川在目中虜冦來必平誰人識謝艾只是一書生漢家舊日回中路天子新除太守行牙將握刀趨逺驛羌人下馬拜高旌雲間白草開邉隴山上朱樓壓郡城勇脫區區簿書内壯心應欲請長纓送刁景純學士使北嘗聞朔北寒尤甚巳見黃河可過車驛􅀐駸駸持漢節邉風􅃤􅃤聽胡笳朝供酪粥冰生椀夜卧氊廬月照沙侍女新傳教坊曲歸來偷賞上林花送馬仲途司諫使北毎逆龍鱗司諫諍又持旄節使隂山貂裘不見風霜勁鴈磧遥知道路艱冰膾芥虀非楚味玉苕蘭茁􅀃燕顔單于不敢輕中國名馬新調爲送還重賦白兎永叔云諸君所作皆以嫦娥月宫爲􅀃頗願吾兄以他意别作一篇庶幾高出羣􅀋然非老筆不可毛氏頴出中山中衣白兎褐求文公文公嘗爲頴作傳使頴名字存無窮徧走五嶽都不逢乃至瑯琊聞醉翁醉翁傳是昌􅀺之後身文章節行一以同滁人喜其就籠紲遂與提携來自東見公於鉅鼇之峰正草命令辭如虹筆秃願脫冠以從赤身謝德歸蒿蓬王祁公北園園林多高樛園卉多芳柔紅紫經幾春青枯經幾秋我至毎懷浮觴之􅀸翁但見浮觴之水汨汨流水流日夜曾未休高門世世生賢侯不比平泉碑缺花木記又非家鴟嘯鳯凰樓洛陽城中亦有園與宅常同歐陽翰林携酒遊竹間池舘遺翠羽戸外楊柳繫紫騮今嗟齒似舊屐作博士嘉趣只與心相􅄷强􅀐痩馬徃城北二十三年如轉頭歸來作此辭且應主人求觀楊之美盤車圖谷口長松葉老瘦澗畔古樹身枯高土山慘憺逺復逺坡路曲折盤車勞二車􅅆正轅接軫繼下三車來嶾嶙過橋已有一乗歇解牛離軛童可哂黃衫烏巾驅舉鞭經險就易將及前轂輪傍側輻可數蹄角􅍴錯捲箱聮古絲昏晦三尺絹􅀞此當是展子䖍坐中識別有公子意思徃徃疑魏賢子䖍與賢皆妙筆觀玩磨㓕窮歲年塗丹抹靑尚欺俗旱龍雨日猶賣錢是亦可以秘疑亦不可捐爲君題卷尾願君世世傳􅀉許越州開元冠盖裏無􅀂賀知章乞得鏡湖水洗出明月光行坐鏡與月身衣羽人裳心存黃庭經目視白鳥行歲時忽已古高韻抗彭莊今聞許子春來守稽山傍稽山風月在鏡水菰蒲長臘市開梅蕚霰雪凌早芳卧龍生茗舌皷角催新陽焙邉可以啜樹間可以觴賀老於當日必定無此嘗唯有李白詩酒船芙蓉香安得効白也䞉載借艅艎與君同醉翁智慮收肝腸永叔請賦車螯素脣紫錦背漿味壓蚶菜海客穿海沙拾貯寒潮退王都有美醖此物實當對相去三千里貴力致以配翰林文章宗炙鮮尤所愛旋坼旋沽飲酒船如落埭殊非北人宜肥羊噉臠塊􅀉題郢州白雪樓楚之㐮玉問於宋玉玉時對以郢中歌歌爲白雪陽春曲始唱千人和再唱百人逐至此和者􅂊數人乃知高調難隨俗後來感槩起危樓足接浮雲聲出屋中古客應無怊悵鯤魚孟諸宿樓傾復構春又春酒㵼瑠璃烹錦鱗靑山繞欄㸔不盡眼穿盪漿石城人去知何在寒花雨歛自生嚬今聞太守新梁棟試選淸喉可動塵和永叔答劉原甫遊平山堂􅀉黃土坡陁岡頂寺靑煙􅇈歷浙西山半荒樵牧舊城下一月隂晴連嶼間人指廢興都莫問眼看今古總輸閑劉郞􅀉詠公酬處夜對金鑾歩輦還平山堂留題蜀岡莽蒼臨大􅀖雄雄太守駐旌幢相基樹楹氣􅀔厖千山飛影橫過江峰橋俯仰如奔降雷堂波小雞䳵􅀟陸羽井苔粘瓦缸煎鐺瀉􅂦聲淙淙兩牙鳥爪不易得碾雪恨無居士龎巳見宣城謝公陋吟看逺岫通高窓答張子􅀸秀才公武茫茫九土中天網該時秀有鳯不收羅有麟不􅀗狩賢豪爲咨嗟都邑誦瓊琇而我當是時欲見恨未遘忽過廣平居遇子乃邂逅懷中二新篇幸出洗昬瞀一美韓公才稚圭也一語􅀯方冦鏗然靑琅玕交戞風雨驟輙用告衆多亦未甚便售固知至珍物不入市井貿昨朝驚扉鳴始悟子來扣鉅編高貯襟細卷仍函袖麻衣踏犀靴再拜謹以授因之重感愴世德實有舊文體古爲徒家聲喜能又其間􅐌愚辭愧累將恐詬磨拂李杜光誠與日月􅃲退之心伏降安得此􅀌陋豈能造春榮豈解易星宿一身猶寒饑生未飽蔾豆高高河漢流肯下饋湔漱蟲魚儻無施捉撮不乖繆聊此慰窮愁文章終莫就庭前枯石榴寒雀並淸晝逍遙獨詠歌􅀉翼與報酬江隣幾學士􅀉酥棃興平烹瓊乳咸陽摘冰枝秦女􅀧山日張公開谷時刻破玉漿壺泛融金酒巵適從關中􅀉不見博士卑答劉原甫􅀉糟薑名國萬家城千畦等封侯劚當燕去前醃牙費糟丘無筋􅅯王笑有味三閭羞􅀉入翰林席聖以不撤優又􅀉蓬門下作賦誰肯休唯我廣文舍免爲虀鹽仇劉公漢家裔才學歆向儔胸懷飽經史辨論岀九州曾不奉權貴但與故人投贈辛非贈甘此意當自求銅雀硯歌舞人已死臺殿棟巳傾舊基生黑􅁄古瓦埋深耕玉質先骨朽松棟爲埃輕築􅂃風􅀨剥埏和鉛膏精不作鴛鴦飛乃有科斗情磨失沙礫粗扣知金石聲初求􅅵畆下遂厠几席淸入用固爲貴論古莫與并端溪割紫雲空􅀒世上名韓著毛頴傳何獨稱陶泓儻以較歲年泓當視如兄歐陽永叔王原叔二翰林韓子華吳長文二舍人同過弊廬值出不及見十二月七日枯竹爲門扉不可容車􅀐况如鄭廣文無氊藉賔位窮冬月破七貴客聮玉轡傳騶肅里閭下榻呼童稚問我何所徃共留墻上字兒愚不知誰金章言照地旣屈􅀸大夫恨莫親帚篲星􅄤囬巳高麟趾寧復至戢戢隣巷居相見竊自喟豈料痩老翁能令賢逹至昔時蓬蒿徑安有此盛事元忠示胡人下程圖單于獵罷卧錦紅解鞍休􅀐荒磧中蒼駒騧駱六十疋隱谷映坡分尾鬉九駞五牛羊頗倍沙草晩牧生寒風貴賤小大指五百執作意態皆不同二鷹在臂二鷹架駿犬當對寧爭功氊廬鼎列帳幙擁鼓角未吹驚寒鴻土山高高置烽燧毛囊貯􅀗閑刀弓水泉在側挹其上長河杳杳流無窮素紈六幅筆何巧胡瓌盡妙誰能通今日都城有別識別識共許劉元忠送李大保知儀州出塞開牙帳論兵啓玉鈐漢泉思白馬秦冡弔蒙恬族本西山大聲從渭北兼相如常學劒文士亦何嫌劉元忠遺金橘􅀯方生美果且體橘包微韓彈有輕薄楚萍知是非甘香奉華俎咀嚼破明璣欲換虀鹽腹盈匳忽我歸王原叔内翰宅觀山水圖石蒼蒼連峭峰大山嶤峩雲霧中老松瘦樹無筆蹤巧奪造化何能窮古絹脆裂再粘續氣象一似高高嵩上有荆浩字特歸翰林公願換廷圭一丸墨誰言賣錢湏靑銅范寛到老學未足李成但得平逺工黃金白璧未爲寶文人師臣無不通送廖􅀝歸衡山􅀝來爲其兄求集序於歐陽永叔雌猿夜啼別湘東曉㝷故人背􅀌桐􅀌桐有聲彈不響弦絶曲在埋蒿蓬知音萬古期必逢今日巳聞天下雄陟山渉水不辭逺文章大名居禁中扣門一見顔色喜抱琴三歎含微宮九疇不汨微禹力堯舜豈無明與聰推根致本賢意合叙述况值太史公貿金得玉莫忘寶􅁍過洞庭乗朔風猿休啼月月色好還來舊山伴狙翁宛陵先生集卷第五十宛陵先生集目録卷第五十桃花源詩永叔席上分題永叔白兎直宿廣文舍下送中道倅廣平送宋端明知成都戲作嫦娥責送李涇州二首送景純使北送馬司諫使北重賦白兎王祁公北園觀盤車圖􅀉許越州永叔請賦車螯􅀉題郢州白雪樓和永叔荅原甫平山堂留題荅張子􅀸秀才江學士􅀉酥棃荅原甫􅀉糟薑銅雀硯歐陽諸公見過示胡人下程圖送李太保知儀州劉元忠遺金橘原叔宅觀山水圖送廖􅀝歸衡山目録終
