body:
  text: 宋宛陵梅堯臣聖俞著覽翠亭記郡城非要衝無勞送還徃官局非冗委無文書迫切山商征材巨木腐積區區規規襲不爲宴處乆矣始是太守邵公於後園池傍作亭春日使州民遊遨予命之曰共樂其後别乗黃君於靈濟崖上作亭㑹飮予命之曰重梅今節度推官李君亦於􅅟舍南城頭作亭以觀山川以集嘉賓予命之曰覽翠夫臨高逺眎心意之快也晴澄􅀨昬峯嶺之顚也心意快而笑歌發峯嶺明而氣􅁚歸其近則草樹之煙緜溪水之澄鮮㘅鱗翩來的的有光掃黛侍側嫵嫵發秀有趣若此樂亦由人何則景雖常存人不常暇暇不計其事簡計其善决樂不計其得時計其善適能處是而覽者豈不暇不適者哉吾不信也林和靖先生詩集序天聖中聞寧海西湖之上有林君嶄嶄有聲若高峯瀑泉望之可愛卽之逾清挹之甘㓗而不厭也是時予因適㑹稽還訪於雪中其談道孔孟也其語近世之文韓李也其順物玩情爲之詩則平澹􅃉美讀之令人忘百事也其辭至乎靜正不主乎刺譏然後知趣尚博逺􅀉適於詩爾君在咸平景德間巳有大聞㑹天子脩封禪未及詔聘故終老而不得施用於時凡貴人鉅公一來相遇無不語合慕仰低回不􅃘去君旣老朝廷不欲強起之而令長吏歲時勞問及其殁也諡曰和靖先生先生少時多病不娶無子諸孫大年能掇拾所爲詩請予爲序先生諱逋字君復年六十一其詩時人貴重甚於寶玉先生未嘗自貴也就輒棄之故所存百無一二焉嗚呼惜哉紅鸚鵡賦相國彭城公尹洛之二年客有獻紅鸚鵡籠之甚固復以重環縶其足遂感而賦云蹄而毛翼而羽以形以色别􅀋而聚或嘯或呼逺人而處在鳥能言有曰鸚鵡產乎西隴之層巒巢于喬木之危端其性惠其貌安與禽獸異爲籠檻觀吾謂此鳥曾不若尺鷃之翻翻復有異於是者故得以粗論吾昔窺爾族喙丹而緑今覽爾軀體具而朱何天生爾之乖耶俾爾爲爾􅀋尚或弗取况爾􅊋爾衆不其甚與何者徒欲謹其守固其樞加以堅鏁置以深廬雖使飮瓊乳啄彫胡以充饑渴鑄南金飾明珠以爲關閉又奚得於烏鳶之與雞雛吾是知異不如常慧不如愚巳乎巳乎述釀賦少居楚鄕楚多釀者故觕識酒之然夫酒之作也必良其器必香其泉法式具舉酸敗罕􅏧取有豐約味有醲泊則曰聖曰賢和神懌氣積日彌年自時厥後茲道寢隳昔飮其醇今飮其醨昔也熈熈終日不亂舒暢四肢今也冥冥迷䰟倒􅅎不知其醒吾觀于世未始逹此夫以天下爲壚甖兆庶爲粱米君臣爲麴蘖道德爲酒醴酣仁漱義四海薫和莫知所以逮乎率土澆弊材不授矣君臣乖異法不施矣道德遂薄酒弗飴矣餔詐啜僞昏然而無歸矣安得滌其具更其術時其物清其室然後漬以椒桂侑以棖橘吾將霑醉乎窮日靈烏賦烏之謂靈者何噫豈獨是烏也夫人之靈大者賢小者智獸之靈大者麟小者駒蟲之靈大者龍小者􅀛鳥之靈大者鳯小者烏賢不時而用智給給􅀆爲世所趍麟不時而出駒流汗􅀆擾擾於脩途龍不時而見􅀛七十二鑚􅀆寧自保其堅軀鳯不時而鳴烏鵶鵶􅀆招唾罵於邑閭烏􅀆事將兆而獻忠人反謂爾多㐫㐫不本於爾爾又安能㐫㐫人自㐫爾告之㐫是以爲㐫爾之不告􅀆㐫豈能吉告而先知􅀆謂㐫從爾出胡不若鳯之時鳴人不恠􅀆不驚􅀛自神而刳殻駒􅀒駿而死行智騖能而日􅃥體劬劬􅀆䘮精烏􅀆爾靈吾今語汝庶或汝聽結爾舌兮鈐爾喙爾飮喙兮爾自遂同翺翔兮八九子勿噪啼兮勿睥睨徃來城頭無爾累􅀯有嘉茗賦􅀯有山原兮不鑿不營乃產嘉茗兮􅅝此衆氓土膏脉動兮雷始發聲萬木之氣未通兮此巳吐乎纎萌一之日雀舌露掇而製之以奉乎王庭二之日烏喙長擷而焙之以備乎公􅀸三之日槍旗聳搴而炕之將求乎利嬴四之日嫩莖茂團而範之來充乎賦征當此時也女廢蠶織男廢農畊夜不得息晝不得停取之由一葉而至一掬輸之􅀂百谷之赴巨溟華夷蠻貊固日飮而無厭富貴貧賤不時啜而不寧所以小民冐險而競鬻孰謂峻法之與嚴刑嗚呼古者聖人爲之絲枲絺綌而民始衣播之禾麰菽粟而民不饑畜之牛羊犬豕而􅅴脆不遺調之辛酸醎苦而五味適宜造之酒醴而讌饗之樹之果􅂼而薦羞之於兹可謂俻矣何彼茗無一勝焉而競進於今之時抑非近世之人體惰不勤飽食粱肉坐以生疾藉以靈荈而消腑胃之宿陳􅀂然則斯茗也不得不謂之無益於爾身無功於爾民也哉鳲鳩賦時人謂䳢鶨癡拙禽也茲禽然癡且拙猶能以喙寫心布于辨音者焉曰我智不如燕鴈識氣候之蚤晚隨陽而來知社而返勇不如鵰鶻鷹鸇恣􅅮擊於秋天下無全物落不空拳惠不如鸚鵡鸜鵒入崇堂兮䕃夏屋事言語以如人餌菓粱而飫腹巧不如女匠挂巢室於枝上畏風􅀨之漂搖紩茅莠而宻壯年不如鸛鶴絜羽毛於寥廓希霖􅀨而鳴垤和氣􅀋而靡爵兹五者實無有於羣鳥分馴馴於林表癡亦誠多拙亦不少雖不能趍暄􅫥之時亦毛翮而自持雖不能决爪吻之利亦飮啄而自遂雖不能弄喉舌之辯亦呼鳴而自善雖不能理窠之完亦棲處而自安雖不能適變赴情亦隨宜而自寧噫唯癡與拙天之所生若此而巳矣又烏足爲之重輕麈尾賦野有壯麈兮罹虞人於廣原其身巳殺其肉巳燔其骨巳棄獨其尾之猶存飾雕玉以爲柄入君握而承言聊指麾之可任雖脫落而􅂪恩噫譬諸犬豕其死則均其肉與骨亦莫逡廵自古及今若此泯沒者日有億計曾不一毫以利人是以生若蚍蜉死若埃塵生無以異於其􅀋死不爲時之所珍故仲尼疾沒世而名㓕子長亦著論而有因乃感玆獸而用告乎朋親擊甌賦余觀今樂愛乎清越岀金石之間所謂擊甌者本埏埴異琳球入伶倫兮間齊優其可尚者鳴非瓦釡律度合鼓非土􅇲音韻周和非塤箎上下應作非鐘罄節奏侔而又氷質瑩然水聲脩然度曲冷然入耳瀏然猶有非之者曰善則善矣未若艶女之歌喉何則是謂絲不如竹竹不如肉以其近自然之氣况此曾何叅於樂録之目乎余辨之曰融結合於造化堅白播於陶鈞發和於器導和於人可以樂嘉賓可以暢百神安得絲竹謳吟之匪倫也哉哀鷓鴣賦并序余得二鷓鴣飼之甚勤旣乆開籠肆其意其一翩然而去其存者特愛焉鷓鴣於禽最有名頃未識也思持歸中州與朋友共玩之凡養二年呼鳴日善罷官至蕪湖一夕爲䑕傷死遂作賦以哀云物有小而名著亦有大而無聞吾於禽􅀋得鷓鴣兮不群其音格磔其羽斕斑其生遐僻其趣幽閑飮啄乎水裔棲翔乎竹間徃咨羅者求之於野生致二雛形聲都雅愛之蓄之籠之服之爲日巳乆言馴熟兮縱晞朝旭一逸而不復兮謂之背德非我族兮戀而不去尤可榖兮晨啼暮宿何嗟獨兮固當擕之中國爲士大夫之目兮不意孽䑕事濳伏兮破笯囓嗉何其酷兮嗚呼翻飛逺逝不爲失兮安然飽食不爲福兮焉知不爲名之累兮焉知不爲􅀑所瞰而禍所速兮哀哉誠不如秃鶬鴞鵩兮凡毛大軀妖鳴飫腹何文彩之佳何名譽之淑前所謂大而無聞其自保而自足者與問牛喘賦和人鄧州六首客有感前史問牛喘廣而賦義有由余得摭遺辭掇遺韻索遺意而用以酬夫寒爲冬燠爲夏和爲春肅爲秋和以發生則物萌而抽燠以長養則物盈而周肅以登就則物實而收寒以閉結則物藏而休是則隂陽之道順而爕和之職脩若乃當春而燠是爲行夏令而火侵於木時則有􅀨水不降草樹早落火訛相驚疾疫多作故丞相當是月而見牛喘恐天令之愆錯問從來之逺邇兮或力或暵而可度匪賤人而憂畜實原微而意博所以元化日調萬彚時若及其後世我自我物自物天自天人自人胡爲乎冬胡爲乎春孰謂差忒孰謂平均曰吾委佩而端冕服美而食珍上奉天子下役蒸民夫何預於我哉我亦無愧於玆辰凌霄花賦厥草惟夭厥木惟喬草有柔蔓木有繁條縁根兮附質布葉兮敷苗朱華粲兮下覆本榦蔽兮不昭嗟乎此木幾歲幾年而至於合抱夫何此草一旦一夕而遂曰凌霄是使藜藿蒿艾慕髙􅃩而仰翹翹也安知蘋藻自潔蘭蕙自芳芙容岀汙而自麗芝菌不根而自長或紉珮帶或采頃筐或製裳於騷客或登歌於樂章故得爲馨爲薦爲嘉爲祥皆無附著亦以名􅀭奚必託危柯而後昌吾謂木老多枯風高必折當是時將恐摧爲朽荄不復萌蘖豈得與百卉並列也耶矮石榴樹子賦并序襄城縣庭下生矮石榴徃來者異之予作賦寫其狀因以自勵云有矮石榴高倍尺中訟庭麗戒石訪諸走胥云非封植忽此生榮三傳歲曆宻葉如蓋繁條如織萎蕤下垂疲軟無力緗苞貯露纍纍仄仄下人俯視顚本可識雀愧卑棲而不肯集兮故啾喞以矯翼􅅯􅅯盤盤若屈若鬱紉紉結結非曲非直榦不足攀隂不足息夫何挺質之可惑耶意爲異與爲妖與人以爲異我不知其異曰殊衆人之􅀋􅀋人以爲妖我不知其妖曰乖衆木之翹翹然而不生樊圃臺榭遊觀之所產玆堂下其有以警而有以覩因形􅆷義庶將有補當革蔓衍之多枝無若輭柔之不舉勿俾苞苴之流行勿使吏氓之輕侮勿淟涊以自抑勿猶豫而失處勿闒茸以接卑勿上下之不撫夫如是則異也妖也固弗取維戒懼斯主風異賦庚辰歲三月丙子天大風壬午詔出郡縣繫獄死罪巳下夫風者天地之氣也猶人之呼嘘喘吸豈常哉若應人事之變則余不知故賦其大畧云吾因迓勞適于郊憩亭􅃕日􅉴時羣軰外􅅝曰火來音罹火來喔呼噫嚱岀屋逺望西北之陲亘天接地混混赫赫不見端涯逡廵則赤埃赭霧突盪奔馳陽精失色白晝如晦號空吼穴􅀭砂走塊衆心驚惶廣衢翳昧莫辨誰何執手相對其少頃也稍明故歸人未寧兮相與而爲隊順前者措足之不暇逆進者舉武而愈退睇山川兮安陳趍城郭兮安在所可視者五六歩之内越翌日四方恬霽乾坤黯􅃤物色憔悴牛復馬還絕銜鼻草靡木折莢實墜禽鳥墮死泥滿喙几案傾欹塵覆器民廬毀壞商車顚躓旣而衆曰此何景也伺彼徃來兮問逺邇之所自或曰起浚都播許鄭歷洛汭以及唐鄧漢隋之地稽厥時厥狀無與此土異未迨旬浹德音遐曁是知本聞之不僞聊綴辭也若此言變咎則非愚者之能議乞巧賦孟秋七日夕戸未扃余歸自外見家人之在庭列時花與美果祈織女而丁寧乞天巧之付與惡心手之鈍冥余旣寢而弗顧又烏辨乎列星兒女前曰故事所傳餘千百齡何獨守拙迷猶未醒遂起坐而嘆曰吾試語汝汝其各聽夫芒忽之間變而有氣氣而有形形而有生生而有靈愚愚慧慧自然之經賦巳定矣今返妄營則何異高山之木兮不能守枝葉之亭亭欲􅆷而爲犧􅁚兮利塗飾乎丹青且復天巧與人巧將不同也天孫又安得此而輒私天之巧者總隂陽運四時懸日月星辰而不忒其璇璣鼓雷風􅀨雪而不失其施生萬物死萬物而物得其冝此天之所以任大巧而不虧人之巧者非它直心口手足也心巧於慮口巧於詞手巧於技足巧於馳亦各有極不可強爲故慮之巧不過多智謀使爾多謀多智則精騖而魄離詞之巧不過多辯言使爾多言多辯則鮮仁而行遺技之巧不過多能藝使爾多能多藝則藝成而跡卑馳之巧不過多履歷使爾多履多歷則速老而筋疲如是則吾焉用而乞之吾學聖人之仁義尚恐沒而無知肯乞世間之輕巧以汨吾道而奪吾之所持吾决守此而巳矣爾勿吾疑思歸賦禄有可慕禄有可去何則移孝爲忠曾無内顧則禄可慕而可據上有慈顏以喜以懼故禄可去而不可寓噫吾父八十母髪亦素尚爾爲吏夐焉遐路嗷嗷晨烏其子反哺我豈不如鬱其誰訴惟秋之氣至憀慄而感人日興愁思側睇江濱憶爲童子當此凛辰百果始就迭進其珍時則有紫菱長腰紅芡圎實牛心緑蔕之柿獨苞黃膚之栗青芋連區烏椑五出鴨脚受彩乎微核木􅀲鏤丹而成質素乳之梨頳壺之橘蜂􆁭淹醝榠樝漬􅁡膳羞則有鵁鶄野鴈澤鳬鳴鶉清江之膏蠏寒水之鮮鱗冒以紫薑雜以菱首觴浮茰菊爼薦菁韭坐溪上之松篁掃門前之桐柳僕侍不譁圖書在右或靜黙以終日或歡言以對友信吾親之所樂安閭里其玆乆切切余懷欲辭印綬固非效淵明之􅄶􅂨耻折腰於五斗盖自成人以及今未嘗一日侍傍而稱壽豈得不决去於此時將恐貽恨于厥後􅀑火賦放舟於頴水之上夜憇於項城之野隂氣四垂而􅀨微下左右望之若無覩者有光熒然明於水􅁁人皆謂之􅀑火吾獨未爲然焉噫謂􅀑爲無吾不敢謂之無謂􅀑爲有吾不敢謂之有但觀韓氏之言舊矣曰􅀑無形􅀑無聲旣無聲與形又安得此而明嘗聞巨浸之涯百物皆能發光而吐輝又草木之腐亦能生耀而化飛爾知彼是而此非曰若電者因形乎因􅀔乎苟因形因􅀔則此何疑而弗及嗚呼昔人有論電者隂陽之氣相薄而成何湏形􅀔將就此妄名謂爲物光可也謂爲􅀑火則吾不敢聽􅀑火後吾旣爲􅀑火賦客有謂余曰嘗覩舊􅀃􅀑火曰憐前人有述子何不信言未畢余遽辨曰爾不熟究吾㫖耶吾豈忽而不知且聞兵死之血乆而化之旣云血化安有􅀑爲比夫草木之腐固合其宜宜曰物光又豈爲過此論􅃀如牢不可破尚恐未然更聽吾言彼燁燁者胡可以烹煎彼熒熒者胡可以燠暄彼焰焰者胡可以炎上彼熠熠者胡可以燎原盖無此並蔓􅀃徒繁客慚忸無辭而起余方掩乎衡門魚琴賦并序丁從事􅀗古寺破木魚斵爲琴可愛玩潘叔冶從而爲賦余又和之將以道其事而􅀉其懷爲琴之美者莫若梧桐之孫枝夫其生也附崖石逺水涯隂凝其腋陽削其皮曾亡漫戾而沉實之韻資噫始其遇匠氏也有幸不幸焉故未得盡厥宜其於不偶若䧟於夷刳中刻鱗加尾及鬐宛然而魚日擊而椎主彼齊衆之律令則聲聞􅅝爾而四馳粤有好事者朅來睨之取爲雅器製擬庖犧徽以黃金絃以檿絲音和律調乃升堂室嗚呼琴兮遇與不遇誠由於通窒始時效材雖甚辱兮於道無所失今而决可以叅金石之奏焉無忘在昔爲魚之日針口魚賦有魚針喙形甚小常乗春波來不少人競取之一掬不重乎銖抄其爲針也頴不能刺肌膚目不能穿絲縷上不足以附毉而愈疾下不足以因工而進補以口得名終親技女大非膾材唯便鮓滷烹之則易爛貯之則易腐嗟玉色之可愛聊用實乎雕爼過此巳徃未知其所處靈烏後賦靈烏我昔閔爾之忠告人之凶遭人唾罵於時不容覆巢彈􅀋驅逐西東余是時作賦以弔汝非乗爾困而責爾聰今也主人悟彈者去豐爾食於大倉置爾巢於高樹晨雞不鳴百鳥爭慕傍睨鳯皇下窺鵷鷺爾於此時徒能縱蒼鷹逐狡兎不能啄叛臣之目伺賊壘之去而復憎鴻鵠之不親愛燕雀之來附旣不我德又反我怒是猶秦漢之豪俠逺巳不稱昵巳則譽夫然吾分足而巳矣又焉能顧重刋板序余􅀍命來守宛陵視事之翌日有客謂予曰郡學請鏤版印書公留意否乎乃問其目曰梅聖俞詩集自遭兵火殘編斷簡靡有全者幸郡教官有善本余樂聞而應之曰昔龎叅爲漢陽太守郡人任棠有竒節叅到先候之棠不與言但以薤一本水一盂置戸屏前抱兒伏於戸下叅思其微㫖曰水欲吾清拔薤欲吾擊強宗抱兒當戸欲吾開門恤􅀌率而行之漢陽大治余殿此􅀖之初學官諸生以學校爲言今客又以聖俞梅公詩集爲言客其吾之任棠也與聖俞公以詩聞於當世寔此􅀖之前哲客其欲予先庠序之教而借梅文以爲諭余固淺陋雖不足以發揚幽光敢不率行或庶幾乎如漢陽之治也乃命學官董其事鏤板旣成請序於余余豈敢辭聖俞公之詩簡古純粹華而不綺清而不癯涵泳於仁義之流出入於詩書之府而其工歐陽文忠公巳序於集首此不復道姑敘鏤板之由云爾紹興十年上元日檢校少傅保信軍節度使知宣州軍州事兼管内勸農營田使新安郡開國公食邑五千二百戸食實封二千一百戸汪伯彥後序宛陵先生集卷第六十終宛陵先生集目録卷第六十覽翠亭記林和靖詩集序紅鸚鵡賦述釀賦靈烏賦南有嘉茗賦鳲鳩賦麈尾賦擊甌賦哀鷓鵠賦問牛喘賦和人凌霄花賦矮石榴樹子賦風異賦乞巧賦思歸賦􅀑火賦􅀑火後賦魚琴賦針口魚賦靈烏後賦目録終
