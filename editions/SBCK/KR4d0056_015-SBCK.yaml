front:
  text: 宛陵先生集卷第十五
  hash: sha256:81502ad465ca4f5ccfc452fb7bcaa4b37a84dc85b1bdb9545a21d423874f05c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_015-1a}
body:
  text: 宋宛陵梅堯臣聖俞著觀何君寶畵燕馬易􅀞吳牛難圖馬骨隱細牛骨麤馬毛要宻牛毛踈麤踈必辨别細宻多模胡乃知戴嵩筆能出韓幹徒幹馬精神在韁勒嵩牛怒􅋐無牽拘昨日何家觀小軸絹雖破爛色不渝二頭相觸角競掎前脚如跪後脚舒尾株榻直脊膂蹙筋力寫盡蹄腕􅊋一勝一敗又苦似勝者狠逐敗者趨卷窮赤印置小字置字乃是陶尚書尚書國初人愛畵收幾厨買時不惜金與帛帛載羊車錢載驢後世兒孫不能保賣人窮市無湏􅁷凡目矜新不重故千錢酬直皆咲愚四牛遂爲何氏有裝背入眼天下無坐中吾儕趣已異又喜玄女傳兵符此本實稱閻令畵下筆簡細容顏姝三人􅀑狀一牛首八女二十美丈夫黃帝中間䕃葩蓋霞扇錯玳旌擁朱冠服難知歲月逺但見儀衞森清都復觀鹿臺獨夫受妲巳不笑何由娛酒池肉林騎行䏑剖心斮脛堪悲吁數幅吳王宴西子綵舟張樂當姑蘇宫娥數百簇高下鬒髻一一紅芙蕖危峰細浪得平逺前對洞庭傍大湖商紂夫差可垂誡歷世傳玩叅盤盂鵰鷹草木不足記特詠此事心何如送任太博歸省西都人言少保持家謹載見西京萬石君子舍今歸浣裙切里門重戒下車勤田園一一能爲計僮僕訢訢亦有聞我􅀒洛陽山水乆試因行色􅀉嵩雲送少卿張學士知洪州朱旗畵舸一百尺五月長江水拍天穩去先應望廬岳暫來誰復見龍泉閣經吏部重爲記山識吳王舊鑄錢徃迹可尋軍士少䞉書遺逸附青編觀楊之美畵天官乗車建朱旗赤旛前亞風卷披二龍緩駕蒼髯垂印箱傍挈文籍隨􅀟􅆖推軛如畏遲行從冠服多威儀水官自有眞龍騎兩佐並跨鯨尾螭歩趨羣吏怪眼眉雲生海靣無端涯雷部處上相與期人身獸爪􅀒鼓馳後有同􅀋挾且搥次執電鏡風囊吹青虵有角魚足鬐上下引導神所施地官旣失不可知此畵傳是閻令爲設色鮮潤筆法竒絹理膩滑雞子皮吳生龍王多裂隳八軸展玩忘晨炊李成山水曉景移黃荃花竹雀擁枝韓幹馬本摸搭時神駿都失存毫􅁵日高腹枵眼眥眵邂逅􅀗見何言疲厚謝主翁意不衰他日飽目看無遺李審言遺酒大梁美酒斗千錢欲飮常被饑窘煎經時一滴不入口漱齒費盡華池泉昨日靈昌兵吏至跪壺曾不候報箋赤泥坼封傾瓦盎母妻共嘗婢流涎隣家莆萄未結子引蔓垂過高􅉹巓當街賣杏巳黃熟獨堆百顆充盤筵老年牙踈不喜肉况乃下箸無腥膻空腸易醉忽酩酊倒頭夢到上帝前賜臣蒼龍跨入月不意正值姮娥眠無人采顧傍玉兎便取作腊下九天抜毛爲筆筆如椽狂吟一掃一百篇其間長句􅀉東郡東郡太守終始賢切莫汲竭滑公井留釀此醑時我傳送邵郞中知潭州張鐃疊吹洞庭外縁虎帶刀蠻帥迎且諭漢家綏撫厚莫言湘守事權輕木奴洲近霜包熟斑竹林昏野鳥鳴賈􅁩宅邊寒井在暫留干􅀐漱餘清送楊叔恬應北京辟昔時見子宛丘下丞相待子知子賢子於文字實廣博海客謾估珠盈船欲賣明月一寸魄雖豪未有售以錢通都大邑忽辨寶直取不犯驪龍涎遂作照乗物矜夸魏人前從玆十二車光彩生從先送洪州通判何太博若谷先歸新淦拜官江上客乗馬不乗船獨畏蛟龍浪將歸風􅀨天葛花侵野徑源水入􅃾田君住巴丘下西山道路連五月七日見賣瓠者老圃奪天時馬通爲煦嫗四月彼種􅀲五月此賣􅉚陽陂與糞壤功力且異趣􅀲遲􅉚何早豈不同􅀨露速利乃在人爭先無晩暮和江鄰幾景德寺避暑垤蟻不應􅀨鳴鳶不生風鬱氣若甑炊初陽如火紅躶膚汗交流腯體膏將鎔龍頭費挹酌犢鼻強遮􅂪常畏俗物來去避青蓮宫廣堂鋪琉璃高簷䕃梧桐廊壁畵地獄獄具鑊鋸舂鐵城何焰焰鐵床亦彤彤誰知炮烙死活間傳自西域黃靣翁正􅀋人世苦此􅀬聲利役使亡西東京師貴賃幾椽舍窮煎相似聒欲聾屋頭朝㸑作飮食枕底夕艾驅蚊蟲宜爾近巷江夫子賦詩特壓塵土中送趙諫議知徐州及鹿車幾兩馬幾匹軫建朱幡􅀐彀􅃓􅀨過短亭雲斷續鶯啼高柳路西東吕梁水注千尋險大問天月沉滄海底星隕太微邊莫怪終埋沒文章自可傳使虜嘗專對江湖謫幾年始看還近侍遽此隔重泉沃酒酒空滿託詞詞謾傳視予猶手足莫怪獨澘然算數曾無據仁人亦莫聞狠愚多至老蘭桂苦先焚不竟千秋恨還如萬里分臨風一號慟易􅊌日邊雲昔時賓宴地今見繐幃遮棲室那因鵩從盃不爲蛇曾無越人術竟起漢臣嗟明日東城陌悲凉後部笳曉陌行車過交相歎且驚荀龍聞一蛻穆駿失全鳴不復中書直空餘左史成緒言猶在耳尚想見平生聞高平公殂謝述哀感舊以助挽歌三首文章與功業有志不能成嘗以隮高位終然屈大名遺風猶可見逝水更無情歸􅁲青烏壠韓城苦霧平京洛同逃酒單袍跨馬歸明朝各相笑此分不爲稀公旣叅罏冶予將事蕨薇悲哀無以報有涕向風揮一出屢更郡人皆望酒壼俗情難可學奏記向來無貧賤常甘分崇高不解䛕雖然門舘隔泣與衆人俱歐陽郡太君挽歌二首夫人有賢子徃歲謫夷陵欲使無愁鬱怡然見寢興外詞陽磊磊内畏實兢兢隮壽復終貴共爲時所稱當時丈人歿雖少守􅀌兒以及成名譽何嘗厭蒺藜暮年終饗福隂隲不應欺莫使碧江上獨傳陶母碑依韻和石昌言學士求䑕􅂡筆之什䑕􅂡䑕尾者前遺君謨今以松管代贈江南飛䑕拔長尾勁徤頗勝中山毫其間又有蒼䑕􅂡入用不數南雞毛二物緩急豈常􅀗捕刺徒爾操蠻刀舊藏巳贈蔡夫子報君松管何蕭騷䆳隱堂大梁車馬地塵土飛百尺賢愚走其間朝暮不見迹北望天波門垣垣宗室宅宗室令王孫愛書輕玉帛華宇何深沉但聞列圖籍曲房有窈窕空自事眉額體胖生粹和安石處巖石古來爲善樂豈以歌鍾適讀永叔所撰薛雲衞碣文章如塗金光彩發美器所宜玉石間模寫傳千祀堅堅孝子心森森栢庭閟豈與石麒麟原傍闘蒼翠和石昌言以蜀牋南牋答松管之什蠻牋抽轉龍鱗細秋兎束毫雞距尖楊子校經聊以贈蜀麻江楮報何嫌赤蟻辭送楊叔武廣南招安南方赤蟻大若象潜荒穴洞人莫逢天公合􅀨不决􅀨從橫亂出將自封侵壃凌壤壞城市戰􅋐億倍南柯雄嘗聞穿山食此物此物旣大非常凶張舌流涎莫可餌枉啄不怕長戈舂今令智者以智取卽見蚳醢傳太宮因而使知禍福理天子下令雲從龍走筆戲邵興宗子魚一尾不曾有又諾毗陵蒼䑕毫細粒吳粳誰下咽尖頭越管底能操送李中舍襲之宰南鄭莫問襃中道路難襄陽直上幾重灘蒼煙古栢漢高廟落日荒茅韓信壇出水槎頭一絲挂穿虹􅀨脚兩橋殘土風大抵如南國期會先時俗自安送王察推縝之鄧州昔向南陽憶洛陽秋橙初熟半林黃車過白水沙痕濶鴈落鉗盧稻穟長廢壘漢碑金刻字古原秦冡石爲羊太平羽檄何曾有賓主相歡菊薦觴戲酬高貟外鯽魚天池鯽魚長一尺鱗光鬛動楊枝磔西城隱吏江東客晝日馳來奪炎赫冷氣射屋汗收額便教斫膾傾大白我所共樂仲與伯羡君赴約笑啞啞持扇巳見飛鸞翮欲徃從之雲霧隔送何濟川學士知漢州丞相初得君有志重儒術乃言天下士徒此占清秩遂懲衒鬻人忝冐十八七進君天禄閣此衆爲第一又薦王張韓恬可與君匹吾儕宜慙羞空自預朝韠欲歸無田園強住枉歲日值君乘高軒西望函谷出當時迎長􅀸書史傳未悉車馳及襁􅀒千萬今可詰老農喜君來田租不妄率織婦喜君來縑機當俟畢府胥喜君來督責去􅁀抶疾苦無不求前人唯法律晝錦榮旣浮康民美方溢眞爲丈夫志豈是名過實依韻和逹觀師聞蟬飲餘晨露吸餘風噪遍高枝爲俗聾欲比伯夷清巳甚不餐周粟腹常空依韻和杜相公謝蔡君謨􅀉茶天子歲甞龍焙茶茶官催摘􅀨前芽團香巳入中都府闘品爭傳太傅家小石冷泉留早味紫泥新品泛春華吳中内史才多少從此蒓羮不足誇依韻和接花唯是圃人巧非關元化偏折條違物理遷艷得花權美女嫁寒婿醜株生極妍世間多妄合吾不謂之然送石昌言學士混混拍堤􅀲蔓水軒軒銜尾挂檣船使君東下只朝夕父老走迎無後先古堞秋耕拾銅鏃長淮瀑􅀨入壕蓮鳴猿舞鶴仍持去不憶承明夜直眠書南事大梁國南門驛􅀐方騰趨波波一何急蠻冦圍番禺番禺本無備前賴魏大夫大夫築子城今得守以湏兵雖不滿萬閉壁堪指呼老㓜轉木石壯徤操矛弧廩庫得以完日月不易圖城中舊無井魏鑿安魏由飛語去不使立外郛古稱時有待淺薄皆謂紆曲突與爛額看取報功􅊋送吳照鄰都官還江南霜前江水磨碧銅岸背菱葉翹赤蟲吳郞鬂絲蒼幾縷不羞月上扶桑東羞見清波照人影去時黒髪吹春風五年歸來婦應喜從此不問西飛鴻馮子都詩并序漢霍光愛幸監奴馮子都與梁冀嬖奴秦宮事相對唐李賀作秦宫長辭亦云子都當時巳有詩予因補之黃金畵車屋韋絮縁車輪牽以五采絲藉以刺繡茵出入長信宫晝夜將誰親所親美且少玉頰丹砂脣殷羅縫輕襦明珠攅緇巾半醉卧車中侍婢躡行塵憶昔廣明亭將軍愛憐頻便房不使殉易寵在兹辰嗣侯喜驅逐平樂多從賓青絲穿五銖累室貯百珍歡與子都異矯與子都均用財糞土擲吐氣日月踆天地可齊乆禍患豈有因秋風茂陵下蒼蘚上騏驎七月十六日赴􅁃直有懷白日落我前明月隨我後流光如有情徘徊上高柳高柳對寢亭風影亂踈牖我馬卧其傍我僕倦攣肘寂寂重門扃獨念家中婦乳下兩小兒夜夜啼向母問爺若箇邊天性已見厚不嗟覉枕􅀌不愧棲禽偶内有子相憶外有月相守何似長征人沙塵聽刁斗采芡蝟毛蒼蒼磔不死銅盤矗矗釘頭生吳雞闘敗絳幘碎海蚌吐出眞珠明磨沙漉水莩殻滑斫桂煑釜風波聲齒如編貝嚼明月曼倩不復饑腸鳴莫論一斛貴與賤堂上狼籍無由行史氏南軒庭中碧玉盎上結三重山飛光入酒盃舞翠生髻鬟竹林眠黃麞莎徑欠白鷴主人無倦情窻戸不湏關送河北轉運使陳脩撰學士河隍多宿兵兵食固所湏幸時不戰闘畜養安可無古興十萬師七十萬家輟耕鋤今來歲調餉且與徃昔􅊋不使民轉輓但使民歸租急緩實塞下商賈以利趨關西河東亦如此軍食雖足民實虚公乎抱長才當有所畫謨應不貸内府重錦象牙明月珠邊城預自足寧待臨帑輸莫令稱庭臣爲言桑大夫奉和􅀉宣州廣教文鑒師秋池對門蓮子枯野壁剥月蝸涎塗庭中兩株古楠樹上有山鳥長相呼當時聯巢接飛者一落梁宋一海隅扶桑日枝幾千尺光彩不獨生陽烏送陸介夫學士通判㤗州從來戎馬地饗士日椎牛介胄奉儒服詩書叅將謀隴雲連塞起渭水入關流豈似瀛洲下窮年事校讎送徐君章秘丞知梁州軍蒼壁束江流􅀌軍水上頭蛟龍驚鼓角雲霧裛衣裘午市巴姑集危灘楚客愁使君才筆徤當似白忠州依韻和秋夜對月陳王苑裏望空虚吳客風前憶具區橫閣漸看河影轉繞枝還見鵲驚無蟲催織婦機成素露逼鮫人淚作珠才比陶潜無用處紗巾時任酒沾濡宛陵先生集卷第十五宛陵先生集目録卷第十五觀何君寶畵送任太博歸省送張學士知洪州觀楊之美畵李審言遺酒送邵郞中知潭州送楊叔恬送洪州倅何太博見賣􅉚者和鄰幾景德避暑送趙諫議知徐州送邵戸曹隨侍哭韓舍人五首高平公挽歌三首歐陽郡太君挽歌和石昌言求筆䆳隱堂讀永叔撰薛雲衢碣和昌言蜀牋答松管送楊叔武廣南招安走筆戲邵興宗送李中􅃕宰南鄭送王察推之鄧州戲酬高貟外鯽魚送何學士知漢州和逹觀師聞蟬和杜相公謝蔡君謨茶和接花送石昌言學士書南事送吳都官還江南䆳隱堂讀永叔撰薛雲衢碣和昌言蜀牋答松管送楊叔武廣南招安走筆戲邵興宗送李中􅃕宰南鄭送王察推之鄧州戲酬高貟外鯽魚送何學士知漢州和逹觀師聞蟬和杜相公謝蔡君謨茶和接花送石昌言學士書南事送吳都官還江南馮子都詩并序赴􅁃直有懷采芡史氏南軒送陳脩撰和􅀉宣州廣敎文鑒師送陸學士㤗州倅送徐祕丞知梁州軍和秋夕對月馮子都詩并序赴􅁃直有懷采芡史氏南軒送陳脩撰和􅀉宣州廣敎文鑒師送陸學士㤗州倅送徐祕丞知梁州軍和秋夕對月目録終
