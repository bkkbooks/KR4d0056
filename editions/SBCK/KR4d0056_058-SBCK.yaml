front:
  text: 宛陵先生集卷第五十八
  hash: sha256:79c8f0104b33e6163ad4de0699c28ab7075e3506ce95805d50fc74cd28d9c796
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_058-1a}
body:
  text: 宋宛陵梅堯臣聖俞著吳長文紫微見過豈敢以貧賤而輙傲賢貴但恨門闌遥赫日去可畏痩馬汗長流寸歩出無謂是以逾十旬景慕腸欲沸近因秋􅀨來纎纎有凉氣九陌可以行輕服可以衣方將事請見瘡足痛􅀂䠊忽枉騶􅀐過顔厚言莫旣尚期新醪熟還徃襲經緯乃知君子德曩分替則未范景仁紫微見過亦謁不遇道上逢之朝游翔鳯池暮直中書省無由見顔色况乃當畏景退朝八月朔因得修造請高閎一何新未歸閭巷靜版刺留姓名不遑佇軒屏驅馬返我廬道逢騶從整歛轡莫敢行顧望立俄頃還家稚子言有車來炳炳傳是紫微人將􅅆猶引領如何互相乖徒自想形影更待秋風高緩歩時徃省送王道粹學士知亳州古者二千石高車駕青驪車前陳曲蓋車後建朱旗金皷鳴兩旁壺漿擁通逵所付重威惠所仰撫惸􅊔景亳實鉅屏徃俾國相之國相稱疾還正值民阻饑朝廷急恤養選守莫與宜君嘗典海陵政績爲衆推今授輒辭命大夫多飛綏屢上不得請飭馭俄輕齎旣體堯舜仁又答稷卨知八月風漸高木葉將披披郊原棗巳剥􅂣圃黍可治必期寛賦歛無乃息疲羸何當過苦縣肯暇觀舊碑和江隣幾學士畵􅀑㧞河篇蒲中古寺壁􅀞古􅀞者隋代展子䖍分明八􅀑㧞河戲中建二旗觀􅁍前東廂四􅀑苦用力索尾栧斷一􅀑顛西廂四􅀑來背挽䨇手磓下抵以肩龍頭魚身霹􅆮使持􅃏植立旗左偏㧞山夜义右握斧各司勝􅀒如爭先兩旁撾皷皷四靣聲􅀔助勇努眼圎臂梟張拳擊捧首似與􅁀謔意態全當正大􅀑按􅂰坐三􅀑帶韣一執􅏧操刀擐囊力指督怒髪上直筋舊纒虎尾人身又踣顧蒺䔧短挺金鎚堅高下尊卑二十四二十四􅀑無黃泉角錐競强欲何暏曷不各各還荒埏送制置發運唐子方學士本以諫諍稱今以財賦用所爲各有能何必於兹重東南周萬里海陸竭煑種歛之爲公上豈是與民共民方苦乆弊將缺太平頌有利得設施無不可抑縱大都守繩墨曷異虱處縫從來許國心曾未苟禄俸願無輸羡餘終亦歸侍從次韻和司馬學士慮囚縲囚徃慮問勤恤意不息猛虎在䧟穽挑尾尚求食常憂有詿誤非罪罹􅁀迫藹藹萬乗都憧憧四方客一遭纎微舋鑑垢莫磨拭是以大君心惟恐橫抵摘前法著以律後法編以册每當炎蒸時獄器用刷滌應無古􅁈血地下化爲碧我今因牽吟聊以肝膽瀝刑人皆得辜不似尤地脉間歸卽解鞍浣手嫌控靮昔言善烹魚必先漑釡鬲願言保兢慎切勿厭此􅃥夜月可留翫清樽獨可適一榻寛且平羣動都巳寂可用休其勞不休庶終夕和吳冲􅀸江隣幾二學士王景彞舍人秋興我謂蓬瀛客清切不畏炎及觀秋興篇無逺此窮閻乃知天地大節候無愛嫌寒不爲富減暑不爲貧添向者遭蒸炊靡不同炮燖西風吹􅀨至凉氣何纎纎霈然沃萬物不更畢宿占紈扇捉苦倦盤冰得仍厭蠅癡驅又來蚊嚵喙猶尖絺衣不復浹醅醪壓初甜客有憎壁蝎吳詩客有困靴襜江詩一以磔爲喜一以嬾自謙唯有螭頭人朝立宮殿簷盛誇樓觀高又極星斗瞻王詩予慙異羣公歸意如陶潛自念菊將坼復思禾可鎌春禾作釀熟獨邀影與蟾此樂雖易有彼榮安得兼送覺上人歸湖州富相國與紫衣古寺一盂飯弊衣三歲塵相應維帝祝子巳得袍新范叔復何望原生􅅴自貧歸看五湖上終有泛舟人送閔郎中知池州一送池陽守頗懷當日遊青山臨岸盡翠水入江流楚舊茅爲貢燕來鴈報秋牧之登覽處故事待君脩和吳冲􅀸學士省中植菊園菓巳熟實未墜野卉巳老葉未瘁菊叢是時方發榮潭上籬􅁁俱有爲一從潭島輔長年一自籬根圗暫醉今將移近省中蘭壅培早與陶潛異黃土肥濃沃井泉朱欄屈曲侵堦地勁風不到何動搖清露能霑誰著意看看重九各登高金蘂滿頭無所忌及此頻邀同舍歡向來莫羡鍾繇賜我家蓬藋不足云强對嘉章顔起愧張仲通追賦洛中雜題和嘗歷覽者六章伊川山斷瀉伊流灘聲朝暮急東渡馬將登西堤人巳立日看東西舟爭途如不及誰見捕魚郎寒蓑􅀨中濕洛州上陽宮樹影不隨寒波流天津橋下石激響無時休至清自照物遇險豈能柔東過白馬去凡經幾千秋潛溪寒溪隨山􅅆脩竹隱深寺頗逢老僧談能憶先到事白栝聖君憐緋花土人蒔不到三十秋依俙猶可記真宗嘗駐蹕白栝樹下花譜有潛溪緋一品石樓山腰古石樓杳藹石梯上低窺巖際樹對見龕中像簷中嵩雲飛檻逼伊湍響同遊巳零落歲月成俯仰大字寺庭中兩大樹池上千竿竹竹有紅淚班樹無衆鳥宿昔日白􅀓歸愛吟裴令續間流水西園翻然入他族蘄竹顋肥節腦痩蘄水長笛材洛陽􅀽氏塢此竹舊移來雪霰飽巳乆竅星誰爲開與君作龍吟吹發江南梅次韻任屯田感予飛内翰舊詩二十四年君日哦翰林風韻郢中歌歲華荏苒都如昨世事升沉亦苦多燕國駿蹄猶待樂荆山美寶巳逢和賸求海内多何用爛醉人間理莫過歷覽昔賢皆泯泯㝷思魯􅅱自波波我今不敢希高躅蹇歩年來任跌􅋸次韻答德化尉郭功甫遂以送之江南有嘉禽乗春弄清吭流音入我耳慰愜若􅀗貺朝聽巳􅀌高暮聽轉幽曠何多燕雀羣聲跡不相傍始聞汾陽生文行衆所諒獨哦青山間悼古或悲愴弃官不屈人頗學陶元亮是時予愛之顔采莫得望倐然能見過逺渉丹湖浪袖携一卷詩行槖更無長固與俗人殊於焉識敦尚嗟嗟二千石不知子所向駭子發論高萬仞聳􅀌嶂又如決河湍捧土安可障吾方歎瓌材恨未逢良匠信哉騏驥駒誰用伯樂相自從昔還朝汨汨走俗狀未嘗􅀉子書子言今行行亦似昧相知曾非事高閌把筆誠不勤强意乃爲妄兹晨去湓城聊以和子唱子辭猶瀑布敢挹不知量送李師錫太博通判懷州洛陽古道登北邙河内碧山橫太行朝􅀐快馬暮可到風物人心皆故鄕竹林無蹤懷阮籍路傍有家嗟宣王别乗差同二千石教民唯在親耕桑送潘士方建昌軍壘近僊山麻源第三谷靈運詩亦存魯公記可讀幸時無㓂攘閑日望雲木儻見西王母白麟如白鹿來㝷鳥爪人神光生石屋無念癢背搔還恐罹怒扑學道我未成鍊氣不飽腹安得羽翼生下上同黃鵠送君想君遊星斗壇􅁁竹次韻和吳仲庶舍人送德化郭尉蒲葉高帆十二幅秋風逆水滿檣開是時不畏浪頭起到日定將船尾堆用舍東方言虎䑕賤踈梅福比蒿萊少年才辨無如美廬岳峰前莫滯􅅆和劉原父舍人樂郊詩太守東平來固殊阮歩兵歩兵醉乗驢太守整佩纓事物旣巳遺駕車出東城園荒乆不治道路生棘荆地僻人馬入草間狐兎驚舊池堙猶窊遺址巋不平窊者使之濬巋者使之營博野高榭起陳漁危臺成榭前東山秀臺下盧泉清傍塢梧竹宻翳水芹藻幷渠渠有深堂燕賔飛玉觥芍藥廣陵美謔贈鄭女情公子莫言歸古人未以輕欲知學山簡倒載去欹傾送張聖民學士知登州慕君才行美風義亦倜儻在逺恨未逢旣近不屢徃非以近爲輕恃易遂成曩倐爲東牟守别我駐征鞅又作千里遙依然復懷想昔聞之罘山秦碑元有兩一存東頂中一在西頂上􅂐實丞相斯缺剥不可倣願言試歷覽聞見欲以廣海晴望石橋神僊事􅐞怳始皇安得長隂怪役罔象橋斷水無涯焉知有方丈邇者地出金發掘懷沃壤良民皆逐末兹事誰用長凡爲二千石唯在勸耕紡幸君經術高教化人所仰送王言秀才歸建昌來時槐開花去日木隕葉作賦未得薦著書巳盈篋舊居近僊壇獨徃遇農饁莫問鳥爪人欲取月桂捷次韻和劉原甫遊樂郊贈同遊積歲阻顔色何以慰我思聞初遊樂郊頗慕登望詩下車未幾日倐見白露滋月弦不常滿星畢屢巳離幸無風􅀨晦時從寮宷嬉大喜酒客難莫顧尚書期獨守詩書愚未悟朝夕疲引領君子風東首自忘移但當觀魚鳥辟去旄與麾優悠民亦康何必苦吏爲次韻和王尚書答贈宣城花木􅀲十韻百菓各􅅴酸或由人所植木􅀲聞衞詩贈好非玉色投此瓊􅅼報蓋重車馬餙貴賤今旣殊凌􅁓字翕赩一一如明珠自得見安格復何備國風庶亦見王澤捧之爲重賜誦巳乃忘食幸資藥品用少助宣調力南土加文章中州異肥瘠公將和􅂦餗微意願㝷繹九月晦日謁韓子華遂留邀江鄰幾同飮是夕值其内宿不終席明日有詩予次其韻乗興驅車偶一來旋呼江老舊遊陪驚風送􅀨寒初動舉酒浮蛆撥不開騏驥鞴時聞内宿琵琶彈急怨虛催接籬帶去令傳様自此逢歡未便廻送王省副寶臣北使紫服黃金帶銀鞍翠錦韀犯寒辭漢省持禮入胡天左袵通華語名王接右賢舊山􅅆可記碣石與燕然送李學士公逹北使萬里使窮域山川入馬蹄駞鳴沙水凍鵰擊雪雲低食飮羊兼酪供迎虜雜奚禮成􅅆近日喜聽早朝雞送祖擇之學士北使燕山常苦寒漢使渉窮臘路長人馬愁風急沙霰雜宿造氊廬開行逢獵􅀐合獻鮮秃髪馳問譯華言答毎食冰生盤欲飮酒凍榼見其酋長時國禮何勤納中朝厚仁恩四海望閶闔乃知日月光照必蠻夷匝歸來易輕裘賜對延英閤送許璋監簿歸泰州木枯鳥不巢泉涸魚不游我非魚鳥情貧􅅞路阻脩高陽有令子嗣世學巳優前日來京城問恤􅃘涕流今失王府薦命竒言非讐家聲喜未墜辭我還海陬爲酌一壺酒叙懷心如抽子之伯父殁遣奠固莫由豈欲寡恩義力薄難置郵因􅀉縁睫淚灑向君衣裘送棣州唐虞部人持左符去馬逆北風行古路草初白大河冰未成暖科桑柘美寒織杼梭鳴風俗巳如此憇棠無訟爭金陵有美堂李白愛山如洛陽三盃爲歌愁日長廢基臺殿不可識玉燕舊棲王謝堂公來碧瓦起棟宇羅列圗畵牙作牀池頭古月城下江照見萬里冰雪光江流不盡月不死寒浪素影東西翔願公樂此殊未央慎勿區區思故鄕送張中樂屯田知永州畏向瀟湘行不入洞庭去鞍馬踏關山衣裘冐霜露零陵三千里楚俗未改故王澤乆巳覃國刑亦當措皆聞柳宗元山水㝷不飫其記若丹青因來問潭歩石燕飛有無香草生觸處僊姑異麻姑歲月樓中度不食顔渥赭言語神靈預莫將車􅀐喧獨徃探幽趣有信報我知惡欲驅塵慮宛陵先生集卷第五十八宛陵先生集目録卷第五十八吳紫微見過范紫微見過不遇送王學士知亳州江學士􅀞􅀑㧞河篇送發運唐學士和司馬學士慮囚和秋興送覺上人歸湖州送閔郞中知池州和省中植菊賦張仲通六章和感予飛舊詩次答郭功甫送懷倅李太博送潘士方之建昌和吳舍人送郭尉和劉舍人樂郊詩送張學士知登州送王秀才歸建昌和原甫遊樂郊和王尚書花木􅀲九月晦謁子華送王省副北使送李學士北使送祖學士北使送章監簿歸㤗州送棣州唐虞部金陵有美堂送張屯田知永州目録終
