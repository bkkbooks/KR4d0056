  text: 宛陵先生集目録卷第四
  hash: sha256:4e39182bd5afcb7870f13a30b53db62394cb1b948304c79a86fd1e29ee687752
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_000-1a}
body:
  text: 池州後詩上池州陳生見過春隂春晴對月植梔子樹百舌提壼鳥青梅挾彈篇五日登北山􅀉新安錢倅得永叔回書建德新􅉹詩九月五日謝學士􅀉醖九月見梅花答新安錢學士答陳五進士謝賓客挽歌三首徃東流江口􅀉内代内答訪礦坑老僧除夕與家人飮立春在元日遊水簾巖詠官妓從人夏􅀨五日與陳眞卿飮彼鴷吟感遇雪詠臘日出獵和楊敏叔秋晚田家陶者縣署叢竹巧婦聞永叔謫夷陵聞尹師魯謫富水􅀉饒州范待制詠右丞醉圗猛虎行白鷴後園桃李花道傍虎跡行悼李道士野田行水輪詠山村行鳴雉詞􅀉公異弟去春城讀范公述嚴祠碑禽言四首讀梅子眞傳目録終重刻宛陵梅聖俞詩集序明賜進士嘉議大夫都察院右副都御史奉勅督撫南畿吉郡宋儀望譔詩自三百篇後騷􅃟􅁇作風雅斯存樂府歌謡六義兼􅇱屈宋蘇李代稱宗工繇両漢以還文人學士掞藻􅄍竒竝登辤􅁐人懐隋璧家寳靈蛇可謂彬彬盛矣䆮及魏􅀳體裁屢更雖材難兼贍而代擅􅀁長綜其實要以不詭于性情為至律詩濫觴六朝而獨盛有唐然自元和而降斯􅁤復榛韓退之文雄一代而風人之旨缺焉餘無論矣有宋􅁇興文總徃代歐蘇曽王最稱大家然論其詩求􅀁謂唐人之音蔑如也予在弱冠覽歐陽公􅀁序梅聖俞詩未嘗不太息想見其為人既購其集讀之陶寫性靈名状物理辤清而興逸頗與宋調殊致王文康謂二百年無此作信矣後生末學動舌則黜宋人如是則登歌清廟之什至矣彼閭閻里巷孱夫􅄔婦短謳㣲吟亦謂之風非邪夫聲成文而音㑹情觸景􅀄感生苟臻其致皆􅁕以薦宗廟而和神人歐公論聖俞詩使得用于朝廷作為雅誦以咏歌大宋之功徳庶幾復追啇周魯頌之音其賛慕如此聖俞既窮于詩竟不得厠大僚其後官至都官貟外􅀰予􅀁善大叅梅君純甫氏守徳都官族裔也萬暦乙亥冬再巡宣州相與談及良乆大叅君曰先都官集板乆訛缺明公倘有意焉幸甚遂以家蔵繕本令都官裔孫郷進士一科来呈予廼命宣城令姜子竒方刻焉刻成一科致其大叅君書先公集頼歐公序之流傳至令明公又歐公邑人倘賜之言則先都官假寵于公者猶在歐公也予不得辤􅂺以昔􅀁嚮慕于都官者序而歸之丙子春二月宛陵先生詩集序予聞世謂詩人少逹而多窮夫豈然哉盖世􅀁傳詩者多出扵古窮人之辭也凡士之藴其􅀁有而不得施扵丗者多自放扵山巔水涯外見􅆉魚草木風雲鳥獸之状􅀋徃徃探其竒恠内有憂思感憤之鬱積其興扵怨刺以道覉臣寡婦之􅀁歎盖愈窮則愈工然則非詩之能窮人殆窮者而後工也予友梅聖俞少以䕃􅀘為吏累舉進士抑扵有司困扵州縣凡十餘年年今五十猶從辟書爲人之佐鬰其􅀁畜不得􅁬見扵事業其家宛陵㓜習扵詩自爲童子出語已驚其長老既長學乎六經仁義之􅀃其爲文章簡古純粹不求苟􅀃扵丗丗之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂扵詩而彂之故其平生􅀁作扵詩尤多丗既知之矣而未有薦扵上者昔王文康公嘗見而歎曰二百年無此作矣雖知之􅀷亦不果薦也若使其幸得用扵朝廷作為雅頌以詠歌大宋之功徳薦之清廟而追啇周魯頌之作者豈不偉歟奈何使其老不得志而為窮者之詩廼徒彂扵􅆉魚物􅀋覉愁感歎之言丗徒喜其工而不知其窮之乆而􅀅老也可不惜哉聖俞詩既多不自􅀵拾其妻之兄子謝景初懼其多而易失也取其自洛陽至扵吴興以來􅀁作次為六十卷予嘗􅄝聖俞詩而患不能盡得之􅃍喜謝氏之能次也􅂺序而蔵之慶暦六年三月右正言知制誥知滁州事歐陽脩序刻宛陵先生集後叙大中丞䑓宋公檄宣城刻梅􅚾官詩粤期鍥局告成扵執事者令竒方􅋿􅀼効􅃥云眀興右文化洽豹變一峕上􅀦之英簮茟而鳴盛中林之士結薻以揚芬煥若霞綺之亘雲空爛若春荑之薄鏡水嘉􅂭間蓋益稱彬郁焉􅂚嘗不掩材徃古矜妍異代㢤而觀采者卒亡逃扵反唇此其故殆且難言之􅚾官固宋人藉令今三尺子􅁸而譚詩猒宋人目不及瞬也顧攷􅚾官􅀁為詩核事模情棊􅍌星寘啇音幽韵苦雨飄風使讀者宛肰其身􅍓而惻肰其心揺即無論止虖禮義要亦有概扵中非直尚輔頰之感無論汪洋乎江海要亦􅂑義天山非直趂􅇕者供一朝之晬樸質堇存風雅未墜先民有言文章匿采匪盛世之徴􅋿尚輔頰而趂􅇕者其敝也夫善歌者使人㡭其聲而響必報之中丞公是舉也其意在斯矣竒方不侫間覆覧鑑宋事西北跳梁兵威日頓􅚾官著孫子有味乎權竒之指其朧月夜隂􅀉歐陽夷陵諸詠或蒿目而憂乎當世豈與彼平章月露流連光景者已㢤在昔輙以文士􅁼掇春華不及䆋實􅀅緩急非益是黯扵通方者爾中丞公文質並茂緼義風生誦其詩尚論其世是舉也其意者在斯乎意者其或在斯乎孝亷君一科謂竒方公部吏屬為殿如此語曰為黔之物必資乎墨狐裘羔袖令忱有媿色萬曆丙子季秋月吉直隷寧􅀦府宣城縣知縣􅁥利姜竒方譔刻宛陵先生集後終書梅聖俞詩藁後廬陵歐陽􅁱譔凢樂逹天地之和而與人之􅂔相接故其疾徐􅁬動可以感扵體歡愉惻愴可以察扵聲五聲单出扵金石不能自和也而工者和之然􅈽其噐知其聲莭其㢘肉而調其律吕如此者工之善也今指其噐以問于工曰彼簨者􅙇者堵而編執而列者何也彼必曰鼗皷鍾磬􅁝管于戚也又語其聲以問之曰彼清者濁者剛而􅁬柔而曼衍者或在郊或在廟堂之下而羅者何也彼必曰八音五聲六代之曲上者歌而下者舞也其聲噐名物皆可以數而對也然至于動盪血脉流通精神使人可以喜可以悲或歌或泣不知手􅁕鼔舞之􅀁以然問其何以感之者則雖有善工猶不知其􅀁以然焉盖不可得而言也樂之道深矣故工之善者必得于心應于手而不可述之言也聼之善亦必得于心而㑹以意不可得而言也堯舜之時夔得之以和人神舞百獸三代春秋之際師㐮師曠州鳩之徒得之為樂官理􅀦家知興亡周衰官失樂噐淪亡散之河海逾于百􅀊間未聞有得之者其天地人之和􅂔相接者既不得泄于金石疑其遂獨鍾扵人故其人之得者雖不可和于樂尚能謌之為詩古者登謌清廟太師掌之而諸矦之􅀦亦各有詩以道其風􅁟性情至扵􅄬壼饗射必使工歌以逹其意而為賔樂盖詩者樂之苗裔與漢之蘇李魏之曺劉得其正始宋齊而下得其浮􅁋流佚唐之時子昻李杜沈宋王維之徒或得其淳古澹泊之聲或得其舒和髙暢之莭而孟郊賈島之徒又得其悲愁鬰堙之氣由是而下得者時有而不純焉今聖俞亦得之然其體長扵本人情状風物英􅂠雅正變態百出哆􅀆其似春凄􅀆其似秋使人讀之可以喜可以悲陶暢酣􅃴不知手􅁕之􅀅鼔舞也斯固得之深者邪其感人之至􅀁謂與樂同其苗裔者邪余嘗問詩于聖俞其聲律之髙下文語之疵病可以指而告余也至其心之得者不可以言而告也余亦􅀅以心得意㑹而未䏻至之者也聖俞乆在洛中其詩亦徃徃人皆有之今􅀅吿歸余囙求其藁而冩之然夫前􅀁謂心之􅀁得者如伯牙鼔琴子期聼之不相語而意相知也余今得聖俞之稿猶伯牙之琴絃乎右宋都官貟外郎宣城梅堯臣聖俞宛陵集六十卷今宣城太守􅀽旭廷輔􅀁重刻也何為刻之表先賢以儀後進者太守職也始宣城郡政乆弛􅀽君至殚志竭慮薙姦滌􅁾朞嵗之間横民以戢良民以妥脩舉學政爰興教化表章先賢風勵多士扵是脩都官之墳率學諸生行展謁之禮而詢求其文盖郡人莫或知者及訪都官之後始得此編遂刻以傳聖俞當仁宗朝與韓范當歐諸公㳺聖俞詩名特盛扵時最􅀄王文康公曙覽之歎曰二百年無此作矣而見知歐公􅀹􅀷相與􅀹密時盖有擬歐梅扵韓孟者非宣城山川靈秀之􅀁鍾歟今天下學士君子皆知聖俞為宣之傑出顧宣之人有不䏻知此􅀽君之心􅀁不容巳也聖俞平生􅀁著又有唐載廿六卷詩小傳廿卷注孫子十三篇又嘗編脩唐書此亦後来宣之人􅀁當知也因并及之正統已未冬十一月乙已朔光祿大夫少師兵部尚書兼華盖殿大學士廬陵楊士竒題宣城􅀹廷弼􅈓
