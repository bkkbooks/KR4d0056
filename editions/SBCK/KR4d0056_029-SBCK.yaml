front:
  text: 宛陵先生集卷第二十九
  hash: sha256:a5437c4edee178fdc8c1c0542a43e9ff109373d9608069ebce787ae4376b4754
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_029-1a}
body:
  text: 宋宛陵梅堯臣聖俞著陽翟縣城凝嵩亭西北望嵩色憶上大室時陟彼巳不淺坐此安能知今誰絶壁下但見前峰危正與曩未異目存迹焉追王仲儀寄闘茶白乳葉家春銖兩􅀡錢萬資之石泉味特以陽芽嫩宜言難購多串片大可寸謬爲識别人予生固無恨依韻和王道損風雨戲寄小雪􅂊過大雪前蕭蕭風雨􅁓窓穿而今共唱新詞飮切莫相邀薄暮天􅋐䳺鶉孫曼叔邀作脫命秋隼下鳴闘自爲勇爭雄在􅁆粒一敗􅀔莫擁慙將縮䄂問懷􅀒黙而拱勝且勿苦欣猶驚辱與寵和道損欲雪與家人小兒軰飮陰雲濃􅎹野風獵樹高鳴寒禽並枝立頗以見物情目前兩稚子爲慰豈異卿欲置一壺酒且獨對婦傾韓持國邀賦闘山鵲俗有巧闘心畜此巧闘禽搏擊無迅節爪觜自相侵胡能知遠人角勝合百金鳯皇安在哉徒此望丹岑依韻和酬韓仲文昆季聮句見謝予前與道損㳺西湖淨居堂因至其第冬日晴且暖林塘思淨居徃興都未盡遂經韓氏廬韓氏兄弟賢各各趨義塗吾儕與之㳺何異田蘇俱經疑反此質學陋慙無餘况茲諸少年高論傾國都以及治民術縱横無所拘又渉方外說扵道曾不殊詩評杜兼李方法禇與虞啜茗豈非好㗖栗强爲娛乆猒官局檢聊休體質舒次第極言笑左右排圖書終日欣愽約貶異正則扶所頼存泛愛未以我爲愚持歸接士論頗亦􅁼販沽復聮長詩來味若餐􅌦􅃾其辭多自損似欲大厥譽顏子乃庻幾仲尼稱弗如不猒會遇頻雲龍實相須最和躡麟趾舉歩未敢渝種藥雲外陽翟山實與嵩歩接山中採藥人能自辨苗葉當須斸其根以遂素所愜野蘀包舊􅁟遠置風雨捷故本含新芽枯莛帶空莢植雖乖地􅀔培壅得專輙冬誰論臭香春定引蜂蝶豈惟識草木庻用補羸􅒒荅韓六玉汝戲題西軒吾軒今扵水吾居易爲足誰與哦其間風牕數竿竹雖無泉石淸尚不愧茅屋所樂違俗暄此趣大巳熟和韓五持國乞分道損山藥之什不種東陵􅀲不利千畦韭山藥􅁆十本帶􅁟移野叟故葉萎未醒傷根亦何咎旣爲君子好豈與騷人􅀒騷人比畵工丹靑出其口欲分欄下苗馳奴仍置簍主人可無􅈔所尚非獨有從茲各勤灌肯在園􅂼後今雖勝曝蓄畢意資玉臼人事固已然秘方看繫肘送長陵淸辨師歸寧山房古栢暗近在漢陵邊天供不爲樂母心常所懸朝途髪根冷暮野鳥行先子道豈殊衆誰云絶世縁依韻和李密學會流杯亭園林固足勝景著必人賢將泛杯中物遠分湖水泉來從百花底轉向衆賔前易醉縁多病陪公愧少年依韻和韓子華陪王舅道損宴集韓氏兄弟八人而七人在坐雲低未成雪寒氣已侵席凍醪傾白濁乾果列紫赤風微時破靣亭敞宜張帟來望野興通古城何額額邀射􅃓鈞開破的翦羽白助中聲喧呼不覺屢傾幘醉驚一發功誰許百金易非等將帥能聊將賔友適中酒作暴謔心親語多劇吾徒固不羇安可限常格去忌無俗流起酌驚臧􅀗八龍觀諸韓頭角相戢迫參差玉峰前愛慕不知夕誰嗟短景移能使吝情釋爲賀主人翁賢甥無乆隔此會舉世稀頻頻奚所惜飮韓仲文家飮酒衆所嗜未若朋會樂終日不爲荒扵時豈多怍坐客十餘人七子實棣蕚杯行發嚴令孰不資善謔巧詞劇猱捷辨機如弩彍醉舌强且遲罰觥奚屢酌正言訐詭䛕簡禮去酬酢迭嘲果與􅂼相呼花間藥是非不親親笑語何落落夜歸歡有餘孩稚扶仍噱玉汝贈永興氷蜜梨十顆梨傳眞定間其􅅴曰如蜜君得咸陽中味兼氷作質遺之析朝醒亦以蠲煩疾吾兒勿多嗜不比盤中栗王道損贈永興氷密梨四顆名果岀西州霜前競以收老嫌氷熨齒渇愛密過喉色向瑤盤發甘應蟻酒投僊桃無此比不畏小兒偷寄題滁州豐樂亭泠泠幽谷泉近在靑峰下使君去窮源林外留車馬一徑穿篠深蔽日復瀟灑行盡逢泓澄翠影如可瀉雲樹陰其旁造物將有假引水開石池結宇覆碧瓦乃知愛玩心朝夕未忍捨近移溪上石怪古蒼蘚惹芍藥廣陵來山卉雜夭冶春禽時相鳴賔從不應寡欲問淮􅀯趣還思洛陽社勝事巳不辜吟觴無倦把和韓仲文西齋間夜有懷道損舅及予冬日每苦短方愛夜漏永積雲寒擁齋徘徊延月影獨能懷親友出門見參井是時發淸詠筆若天􅂹騁前此諸韓來飮獨仲連以小兒病不至明日仲連有夜坐見懷之什因成荅章夜與賢豪飮方聞黙坐時我斟相樂酒君詠寄來詩莫恨殊喧寂眞縁篤愛􅄌何當因雪興過此未應遲奉和子華持國玉汝來飮西軒我誠官局冷終日事靡括每躭古人書似與世俗闊同道三四人來過慰饑渴迭相陳語言曾未猒刀呾自中將過晡畱飯具麄糲薄酒繼以斟不覺寒日没愚妻方罷沐供飯愧倉卒凍婢昧煎和親調首忘髴每食各驚顧誰謂不黔突倦僕暖吾薪饑馬飽吾秣馬無歸嘶聲僕有顏色活安穩不知疲明缸仍爲撥醉言實無次曾未窮本末諸君競相先岀口論莫奪復云天地間此能有幾達我聞顏汗下恐後謗難遏其間常有言但未見疵齾終當輕有若悔目巳屢䀣莫八反信哉群玉林豈得依朽枿吾心爲之然收舌如斷割寄音謝豪俊茲藴只圭撮和道損喜雪宻雪巳迎臘隨風來拂巾偏知寒夜屋不管醉歸人暗積空庭合偷裝衆樹新沃田將望歲􅎹癘且忘貧薄厚曾無意飄揚似有因旣能先覆物乃見未饒春作陣從天落何功得地均暫欣供一賞惜逐馬蹄塵荅持國遺魦魚皮膾海魚沙玉皮翦膾金虀釅遠持享佳賔豈用餙寳劒予貧食幾稀君愛則巳泛終當飯葵藿此味不爲欠與仲文子華陪觀新水磑湖壖此興磑許俗見仍稀激射􅊃因􅀔囘環豈息機水如嵓下過人悟雪中歸坐想韓夫子心應不道非與道損仲文子華陪泛西湖氷消湖巳緑􅄅􅄅鴨頭春船學吳兒刺吟稀楚老新對山憐去鳥隔樹識逰人誰念滄江上風柔採白蘋和持國石蘚石根雲常蒸老蘚宻扵毯濕翠連澗陰淨緑繞嵒坎不異泉上芹丰茸猶可擥安知山中客遠寄趣已淡同諸韓飮曼叔家富貴豐盤餐日可侑淸角不與賢者俱飽食何所學吾友雖日貧邀賞不辭􅁆質衣爲酒肴出論輕管樂其饌精且􅅴刀几孰親握是時予苦眩引去意頗􅃀羸馬雪中歸醉醒誰復較和仲文西湖野歩至新堰二首決決堰根水層層湖上田寒魚猶著底白鷺巳飛前履惜春泥滑衣從澁蔓牽偶來成野望歸興自留連潭上水容暖野中寒吹横行塘人已晚吟歩日難更凍地坼枯􅀛齗氷流破鏡王都且不遠樂此林泉性送韓奉禮崇道將欲侍親去獨要予贈言世風還自有文體不須論稍愛春波急微生野岸行舟寧覺遠幾日到都門諸韓來會别諸韓行有日别思更依依獨歎從予少還看似子稀呼童􅊃奏酒灑水爲開扉蘇合染裘美雪中閶闔歸送仲文三年不岀戸孝行閭井聞近俗遂知化豈非由所薫御琴趨國門何必長守墳美哉若君子忠可移扵君送子華識君雖恨晚說詩屢解頥吾徒固難合所合終不移冐寒躍馬來且言行有期河上氷始坼輕棹去未遲送仲連别緒如亂絲欲理還不可却悲嬌女詩寧戀更效左是時遠道懷紛紛上歸舸憐君正如此豈任風雨俀送玉汝談笑去拘忌乃見相與深風騷得徃返但見非知音明日車馬北豈不動離襟春風蘼蕪緑别恨生遥岑玉汝遺橄欖􅀯國青青果涉冬知始摘雖咀澁難任竟當􅅴莫敵來從萬里外或以苦口擲所投同木􅀲欲報無􅌦璧和王待制岀郊馬上口占寄兄損道次韻日暖寒郊不起風使君車騎岀城中遥知望處思兄弟鴻鴈連連下遠空寄題蘇子美滄浪亭聞買滄浪水遂作滄浪人置亭滄浪上日與滄浪親宜曰滄浪叟老向滄浪濵滄浪何處是洞庭相與鄰竹樹種已合魚蟹時可緡春羮芼白菘夏􅂦烹紫蓴黄柑摘霜晚香稻炊玉新行吟招隱詩􅂴戴醉中巾憂患兩都忘還徃誰與頻昨得滁陽書語彼事頗眞曩子初去國我勉勿迷津四方不可之中􅁟百物淳今子居所樂豈不遠埃塵被髪異泰伯結客非春申莫與吳俗尚吳俗多文身蛟龍刺兩股未變此遺民讀書本爲道不計賤與貧當須化閭里庻使禮義臻送河東轉運劉察院塞郡屯師乆飛芻始得人權傾擁旄將詔輟繡衣臣舊里過京洛辭家渡盟津紫裘蘇合染驄馬玉環辰榆莢關頭雨梨花谷口春高車方陟險豐膳暫違親山􅀔北臨岱地雄西隔秦行臺知不遠能使問安頻依韻和玉汝對月見懷西軒坐見沙頭月復憐衣上輝正如從我飮還欲照君歸相逐影徒是共嗟歡巳非夜深依岸落寒色入傷違依韻和玉汝舟中見懷遥聞岀舟望始愛川原廣春氷未破時旋拉寒篙響鳴鴈似相隨遠日􅊃一仰能知狀物工把筆獨見想同道損持國訪孔旼處士高廬當大道節士不肯過窮巷獨秉德車馬一何多􅀔力走䛕謟禮義服委佗是以被褐人長甘北山阿曰今豈有愧漁上有行歌二月十四夜霜欣欣東園杏忽值春飛霜粲然彼䌓英萎若岀沸湯旣能與之榮而復使之傷向來肅殺時已共百卉黄今同草􅄍心不似草心長天理固難測誰要必其常送謝師􅀡南陽上墳躍馬清明前行將拜􅀌壠松吹送悲聲縁纓淚如湧三歲宰􅀯方奠斚阻親捧山下獨徘徊雨來雲蓊蓊奉和持國曼叔方叔送師􅀡歸馬上同賦之什郊外桃李花赤赤復白白爲君歌古曲行子在􅀯陌衆人各巳歸春風送無跡安知春風送到處花當客我病岀獨難併請春風讁此情無遠近千里不能隔和韓子華寄東華市玉版鮓客從都下來遠遺東華鮓荷香開新包玉臠識舊把色絜巳可珍味佳寧獨捨莫問魚與龍予非愽物者喜雨冬渉春無雨侵晨忽沛然燕曾知社後雷未發聲前細濕林花暗輕霑􅁟脉全看看一百五風􅀔莫狂顛送王判官之江陰軍幙易知徃時初渡江頗愛江􅀯美誰知坐卧間思及烟波裏絮逐􅚝魚繁䜴添蒓線紫君行語風物到日應相似送王龍圖源叔之襄陽忽驚車騎臨乃是荆州長登堂語岀處陳事猶夢想别逾二十年相遇今始兩爵位異禮􅁆齒髪可下上但問我何有而獨不愛曩敢吿守拙愚此道未嘗枉行當至峴山羊公存廟像簫鼔有時奠道德其可仰依韻和持國新植西軒開地臨廣衢崇崇十餘畝新軒稍偏北治圃亦西酉盎中植菡蓞水不過升斗小桂未得地驗活徒搯朽上乏幽禽啼下多穴蟻走藥苗雖無補欲比山中有澆灌同一時萌芽或先後松株不滿尺廊廟色已厚禀性久且堅物理豈無偶㯶櫚仍未大散葉􅂊八九夏緑與冬青各各自爲友吾軒還處西脩竹爾後取兩莫論是非但可吟對酒送師􅀡之會稽宰其兄在餘姚天下風物佳莫出吳與越新罷吳官來又隨越舸發連宰吳越間皆邇蛟鼉窟伯氏復同郡邑境接民垈寧將内隔外正似肉附骨姚江遺魚􅈉稽山奉笋蕨足得相交歡高堂未華髪送子意不盡念逐有明月西湖觀新出鵞兒道損持國曼叔請予賦之春菢畏雷後㲉開形已完嫩毛輕染蘗小掌未全丹見物初能啑浮波尚怕寒山陰無道士更長換應難宛陵先生集卷第二十九宛陵先生集目録卷第二十九陽翟凝嵩亭王仲儀寄闘茶和王道損風雨闘䳺鶉和道損欲雪闘山鵲和仲文聮句種藥荅王汝西軒和持國分題僊藥送長陵辨師歸寧和密學流杯亭和子華陪宴飮韓仲文家玉汝遺氷密梨王道損遺密梨寄題滁州豐樂亭和仲文西齋閒夜荅仲連和子華飮西軒和道損喜雪荅持國遺魦膾陪觀新水磑陪泛西湖和持國石蘚同諸韓飮曼叔和仲文西湖野歩送韓奉禮諸韓來會别送仲文送子華送仲連送玉汝玉汝遺橄欖和王待制岀郊寄題蘇子美滄浪亭送河東劉運使和玉汝對月和玉汝舟中見懷和訪孔旼處士二月十四夜霜送師直上墳和諸友歸馬上同賦和子華寄玉版鮓喜雨送江陰王判官送襄陽王龍圖和持國新植西軒送師直㑹稽宰賦觀西湖新鵞兒目録終
