front:
  text: 宛陵先生集卷第五十四
  hash: sha256:65764a30d488867fae06742904e8707a7e6450be24a1e1afbc49a9d054598a29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_054-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和王景彞憶秋隴首欲看飛去雲槎頭安得卷輕輪流烏不轉西􅁁日乗馬猶知果下人空渴魏臺氷在井從悲楚客淚縁巾炎炎赫日偏憎老眼耳昬聾半塞塵七夕永叔内翰遺鄭州新酒言值内直不暇相邀詰朝持鄭醖向夕望星津俗意願􅄈巧古心思變淳予窮少陵老公似謫僊人獨對金鸞月宮詞付小臣依韻和永叔乆在病告近方赴直道懷見􅀉二章浴堂深殿近皇居秋夕詞臣直宿初宮女穿針爭落月官奴持燭看殘書萬家乞巧心無盡斜漢飛光望有餘枕上江山夢猶熟五更寒􅀨過簾踈玉轡瓏瓏岀絳宫青槐馳道曉煙中塵頭尚裛洗車􅀨馬耳前趨吹鬛風聞􅀃自將身許國不湏仍以醉爲公我今才薄都無用六十棲棲未歎窮文豹篇贈黃介夫壯哉南山豹不畏白額虎澤霧毛雖雜鼮䑕朝將具􅂡暮爲乳文章子雲乆巳許還笑大夫費五羖天子仗中儀勿舉尾與旂常願看取送韓欽聖學士京西提刑王朝慎常刑恐民䧟非辟分命遣使車謬枉得舉摘兼之勸農桑欲野無曠􅂩韓侯夙所志功利豈止百茫茫唐鄧間荒土無牛跡邵閼廢未乆柘陽仍舊白二地倘復營萬世不可易昔在漢家時近親多占籍苟或非膏􅃾當應徙畿赤毎念輒歎嗟未能俾盡畫天將富斯民事與願不隔其易謂何如拾芥由琥珀我今送韓侯書以贈無責送陸子􅂂學士通判宿州雷􅀨初過草木新汴堤楊柳緑隂勻巳看􅀞舸遂流水不惜長條折與人淮境秋傳蠏螯美郡齋凉愛蟻醅醇雎南莫乆留才子宣室歸來問􅀑神得福州蔡君謨密學書并茶薛老大字留山峰百尺倒挿非人踪其下長樂太守書矯然變怪神淵龍薛老誰何果有意千古乃與竒筆逢太守姓岀東漢邕名齊晉魏王與鍾尺題􅀉我憐衰翁刮青茗籠藤纒封􅁓中七十有一字丹砂鐵顆攅芙蓉光照陋室恐飛去鏁以漆篋緘重重茶開片銙碾玉白亭午一啜驅昬慵顔生枕肱飲瓢水韓子飯虀居辟雍雖窮且老不媿昔逺荷好事紓情悰韓子華吳長文石昌言三舍人見訪當時載酒客共過草玄人今日一寒士能來三侍臣竹門容大馬金絡照諸隣雞痩莫爲具阮家依舊貧送吉老學士兩淛提刑重本恤刑天子聖舟車持詔使臣賢部中漢吏無􅁈獄葑上吳人益美田重過故鄕逢故老一聞鳴鶴記山川不湏歌管唯詩酒况有餘杭白樂天永叔内翰見訪七月二十六日内相能來顧爲郞樂有餘兒童爭拂榻門巷劣容車掩扇知秋意窺墻省舊書經年三枉駕未與故人踈送石昌言舍人還蜀拜掃紫微星宿何煌煌掖垣華閣上相當舍人亦與泰階近兩兩聮裾如鴈行其間飛星入王壘天子賜告歸故鄕錦韀金轡照棧去文園渴令難可望楊雄位卑纔執㦸豈有爵禄多文章石公官顯職且貴還家展墓酹椒漿太守趨塵里人避岷山松栢風凄凉椎牛行酒與􅂄舊􅂄舊醉歸呼此郞公置名分共其樂敦厚世俗時陶唐郞呼只作曩日視安知鏘玉侍明光歸來􅁍向鳯池直詔言一岀稱廟堂廟堂蕭曹不草草潤色鼓動辭琅琅鼇頭蓬萊便可到蜀人更賀烹猪羊送劉元忠學士還南京昔見相公登瀛洲今見公子爲校讐鯤鵬變化三千載我生安得不白頭君前拜恩父前慶暫向南都乗順流南都留守頗爲喜將吏入賀靴聲遒酒與銀瓮羊臠炙上下和煦移凉秋歸來􅁍上柳堤路西風徤馬控花虬送潤州通判李屯田過江始與風沙隔京口山連北固牢刺史丰儀於體重􅀖人全伏此名高宴盤紫蟹方多味古寺青林不厭遨定挈傳家舊圗籍漕河應莫費吳艘􅀉題知儀州太保蒲中書齋中條挿逺近黃河瀉直斜蒲坂之城在其涯渠渠碧瓦十萬家官商工農各擾擾侯獨理齋窓照紗侯方守􅁁聽胡笳滿屋蓄書凡幾車他年不按清商樂亦莫學種東陵􅀲老繫戰馬向庭下厨架整娖齊籖牙朝聞鳴雞夕聞鵶眼昬秋匣生銅花兒孫誦習且盈耳客來休論常山虵哭孫明復殿丞三首魯國先生殁夷門吉士哀因讒君席逺時􅉠帝恩該寂寞高宮啓悠揚茜旐􅅆昔賢皆不免松下作寒􅁅舊葉居東岱中年謁紫庭要塗無徃跡至死守殘經詔許求遺藁朋隣與葬銘世人無怪我涕淚爲之零自古春秋學皆知不可過生前恩禮少殁後薦章多妻子將焉託田園有幾何汶楊秋樹裏黃鳥謾聽歌程文簡公挽詞三首嘗預巖廊政終爲社稷臣作藩安舊俗飮酒得賢人塟禮鐃蕭咽明儀幣馬陳泉堂一經掩原上只麒麟將相榮難及唐虞世巳遭名將官愈大節固位同高哀悼王朝輟鐫埋史筆操空山伊水外松栢冷蕭騷關塞秋雲冷伊川苦霧隂薤歌金鐸碎蒿里石宮深燃漆爲長夜栽松作茂林空留舊冠劒家廟四時心送李殿丞通判蜀州嘗聞蜀國海棠盛因送李侯宜有詩日愛西湖照空錦醉看春􅀨洗燕脂郡無公事中園樂民喜羣邀匝樹窺望帝鳥啼空有血相如人恨不同時晨鮮深淺非由染解賦才華未得知聞􅀃趙高今巳老試教圗􅀞兩三枝八月十夜廣文直聞永叔内當聞向蓬萊蓿鼇峰第幾層秋聲暗葉􅀨殘夢空堂燈推枕感􅀌鴈抽琴彈壞陵誰知廣文直桃簟冷於冰和公儀龍圖新居栽竹二首八月竹根移要􅀨逢隂便向阮家求請公静聽蕭蕭葉斗變江􅀯一夜秋都城有地誰栽竹只見寒樗與老槐聞種琅玕向新第翠光秋影上屏來贈京西陳郎中忽枉乗軺車鏘然響金轡駐軫與我言琅琅有深意乃知故相家事業巳不墜信哉渥洼種千里可立致顯祖實令君名聲取高位伯叔與懿考聮榮重當世于今多昆孫朱紫紛曵地勉勉崇令德蘇李著難至送董著作知北海縣君嘗佑王屬議平天下刑岀宰得古邑農鋤多帶經素琴伴飮酒緑蘚生訟庭舉首望海鴈高懷在青冥送王微之學士知池州秋江􅄅然生寒潮北風吹帆上青霄旗脚舒舒戰紅鬛旗心閃閃交皂鵰檣下徤兒發金鐃屋上鸞僮鳴紫簫岸傍舟人望且拜溪口直入當高譙正聞皷角波動搖齊山舞翠挹岧嶤郭西猛虎夜莫入太守號令如怒飈長戈椿爾喉長刀斷爾腰牙兵將吏無敢􅅝新威烈烈野火燒讀永赦集古録目古史書不足磨璞鐫美辭周宣石鼓文巳缺秦政嶧山字苦隳西漢都無半畫在黃初而上猶得窺下及隋唐莫可數奇言偉迹恐所遺信都力粘大小軸集十爲秩仍第之隨目證訛甲癸推青編是非皆究知有益於古今不疑碑雖滅絕事弗移後人覽録尚若披信都用意無窮期天􅁅地燼乃終畢信都信都名愈出依韻和永叔秋日東城郊行郊原物老莽然中寓興驅車向國東夾道名園迷屈曲壓枝秋實亂青紅寒畦覆緑將收菜野蝶䨇飛尚繞叢田父欣來問行幸依稀還似闘鷄翁送王景彞學士使虜持節共知過碣石衘蘆相背有飛鴻地寒狐腋着不暖沙闊馬蹄行未窮隴上牛羊衝宻霰帳前徒御立駿風歸時莫問程多少􅁍到河湟杏蕚紅哭王幾道職方三首前罷邯鄲守􅀌高與世違青雲舊知在白首故園歸旣沒無兒女元貧只帳幃平生洛陽友從此更應稀我今過五十萬事日消磨熟識世間寡故交泉下多葉秋知易隕松耐竟如何嘗亦悲前哲荒墳野䑕窠得君音信近安穩在緱山不是國醫悞寧辭蜀道艱終然有脩短猶免歷間關便作千秋别霑襟沸淚班君當入西川官雖抱病無由免待闕於緱氏因衂血國醫以藥下之乗虛而卒依韻和楊直講九日有感也持黃菊蘂時望白衣人苜蓿從來厭茱茰􅁍乍親護霜雲不􅊌吹㡌客何貧莫要悲搖落秋花更勝春王侍講原叔挽詞三首衣冠今盛族蘭玉舊嘉聲博古無遺悞遭時有重名䰟輿臨水發靈馬向郊鳴歸塟商丘外森森栢巳成稽古逢堯舜鏘金侍冕旒生員尊鄭學子舍預䕫謀翰苑事猶著岱宗䰟巳遊無情是天地玉樹掩蒿丘丹旐秋風急清笳曉月寒明衣裛草露素士挽桐棺行哭賓徒盛觀儀里巷殫空餘舊編在千載莫能刋送公儀龍圗知杭州在昔漢中微我祖入吳門公今領名都千􅀐擁高軒與古異岀處素節古本原江觀白馬潮水花長鯨奔山飄月桂子天香一國繁壯竒巳若此纎侈尚亦存舊聞其風俗色易而柔温太守朝駕車閭巷焚蘭蓀太守暮還府燈燭照旗旛清歌延冠蓋廣湖浮酒樽成都與餘杭天下莫比論彼爲公故鄕此爲公􅅯藩吏民宜寡事愷悌有謠言和楊直講夾竹花圗桃花夭紅竹淨緑春風相間連溪谷花留蜂蝶竹有禽三月江南看不足徐熈下筆能逼真壐素􅀞成纔六幅蕚繁葉宻有向背枝痩節踈有直曲年深粉剥見墨縱描冩工夫始驚俗從初李氏國破亡圗書􅊌入公侯族公侯三世多衰微竊貿檐頭由婢僕太學楊君固甚貧直縁識别爭來鬻朝質綈袍暮質琴不憂明日鐺無粥裝成如得驪頷珠誰能更問龍牙軸竹真似竹桃似桃不待生春長在目送李端明知河中府才業人終服聦明帝所聞來希叚干木去識大馮君金絡鳴津口朱旗􅀧鴈羣山河虞舊國簫鼓漢橫汾古堞臨秋月高樓等白雲應同羊叔子緩帶隔􅅝氛依韻和永叔内翰西齋手植菊花過節始開偶書見􅀉晝惜日易沉夜惜月易曉重陽種菊花此意爾大好所嗟時節晚又失澆培早開榮獨是遲造化徒費巧霜前擁繁蕚籬下同隕槁微根發再緑復笑王孫草莊生語鵬鷃樂不計大小能齊乃有餘但恐知者少常愛阮嗣宗遇酒醉則倒杯中得賢趣世上逐金裊依韻和丁學士陪諸公城東飮黃花秋草滿荒臺䏈馬鳴珂未欲􅅆上苑自將馳道隔高林空望白雲開薦肴巳去紗籠􅇈賜醖新從蟻甕來天氣正清風景好重門雖禁不辭杯宛陵先生集卷第五十四宛陵先生集目録卷第五十四和王景彞憶秋永叔七夕遺新酒和永叔見􅀉文豹篇贈黃介夫送京西王提刑送陸學士宿州倅得君謨書并茶三舍人見訪送吉老兩淛提刑永叔見訪送石舍人還蜀拜掃送劉學士還南京送潤倅李屯田􅀉題儀州書齋􅂘孫明復程文簡公挽詞送蜀倅李殿丞聞永叔廣文直和公儀新居栽竹贈陳京西郞中送董著作知北海縣送王學士知池州讀永叔集古録目和永叔秋日郊行送王學士使虜哭王職方和楊直講九日有感王侍講原叔挽詞送公儀龍圗知杭州和夾竹花圖送李端明知河中府和永叔西齋植菊和丁學士目録終
