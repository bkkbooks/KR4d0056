  text: 宛陵先生集卷第七
  hash: sha256:dd1f34eb987e0cb5b213da483da425910a78e20b24d28a044c26d80decde6e9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_007-1a}
body:
  text: 宋宛陵梅堯臣聖俞著夏日晩霽與崔子登周襄故城􅀨脚收不盡斜陽半古城獨擕幽客歩閑閱老農耕寶氣無人發隂蟲入夜鳴余非避喧者坐愛逺風清永叔􅀉澄心堂􅁓二幅昨朝人自東郡來古􅁓兩軸緘縢開滑如春氷宻如蠒把玩驚喜心徘徊蜀牋脆蠧不禁乆剡楮薄慢還可咍書言􅀉去當寶惜愼勿亂與人翦裁江􅀯李氏有國日百金不許市一枚澄心堂中唯此物靜几鋪寫無塵埃當時國破何所有帑藏空竭生莓苔但存圖書及此􅁓輦大都府非珍瓌于今巳踰六十載弃置大屋􅉹角堆幅狹不堪作詔命聊備麤使供鸞臺鸞臺天官或好事持歸祕惜何嫌猜君今轉遺重增愧無君筆札無君才心煩收拾乏匱櫝日畏撦裂防嬰孩不􅃘揮毫徒有思依依還起子山哀聞尹師魯赴涇州幙胡􅀐犯邊來漢兵皆死戰昨聞衞將軍賢俊多所薦知君慮不淺永對未央殿天子喜有言軺車因召見籌畫當冕旒袍魚賜銀茜曰臣豈身謀而邀陛下睠青衫出二崤白馬如飛電關山冐風露兒女泣霜霰軍客壯士多劒藝匹夫衒賈􅁩非俗儒愼無輕寡變夏日陪提刑彭學士登周襄王故城聊隨漢使者一上周王城片􅀨北郊晦殘陽西嶺明野禽呼自别香草問無名誰復􅁰離詠但興箕頴情王殿丞赴莫州日就余求釣竿數莖以徃今因其使回戲贈去日覔釣竿定能垂釣否若不暇釣魚釣竿當去取詠蜘蛛日結一尺網知吐幾尺絲百蟲爲爾食九腹常苦饑宋著作􅀉鳯茶春雷未出地南土物尚凍呼譟助發生萌頴強抽團爲蒼玉璧隱起􅀟飛鳯獨應近臣頒豈得常寮共顧玆實賤貧何以叨贈貢石碾破微緑山泉貯寒洞味餘喉舌甘色薄牛馬湩陸氏經不經周公夢不夢雲脚俗所珍鳥觜誇仍衆常常濫盃甌草草盈罌甕寧知有竒品圭角百金中祕惜誰可邀虚齋對禽哢觀水并序庚辰秋七月汝水􅍊至溢岸親率縣徒以土塞郭門居者知其􅀔危皆結菴于木末徬徨愁嘆故作是詩秋水漫長堤郊原上下迷􅀌城閉板築高樹見巢棲耳猒蛙聲極漚生􅀨􅀧齊渚間牛不辨誰爲掃隂霓大水後城中壞廬舍千餘作詩自咎不如無道國而水冐城郭豈敢問天災但慙爲政惡湍廻萬瓦裂槎向千林閣獨此懷百憂思歸卧雲壑依韻和李君讀余注孫子我世本儒術所談聖人篇聖篇闢乎道信謂天地根衆賢發藴奥授業稱專門傳箋與注解璨璨今猶存始欲沿其學陳跡不可言唯餘兵家􅀃自昔罕所論因暇聊發篋故讀尚可温將爲文者備豈必握武賁終資仁義師焉愧道德藩揮毫試柝理巳猒前軰繁信有一日長可壓千載䰟未渉勿言淺尋流方見源廟謀盛䕫卨正議滅烏孫吾徒誠合進尚念有親尊新霽登周王城行行古城頭歷覽古城下水鳥傍人煙河流隔桑柘秋山豁晴翠野老親時稼民訟今巳稀閑登猒官舍依韻答李晉卿結交篇上交執正道下交守竒節當爲蘭死香勿作竹枯裂試看温玉堅何似春氷折貴賤事乃見古今情不别平生相與親晏歲誰可决君能持此意足以表風烈秋日屬疾體羸易生疾况乃凌秋隂微寒薄膚腠飮藥增衣衾一日失所治百骸將不任當從華氏學聊欲爲戲禽田家高樹䕃柴扉青苔照落暉荷鋤山月上尋徑野煙微老叟扶童望羸牛帶犢歸燈前飯何有白薤露中肥苦􅀨秋空幾旬􅀨四海低鵬翮晝不見日精夜不見月􅅎灑盡天漢流蒸爛女媧石塗潦將埋輪牛馬困負軛羣蟲無土蟄百果就枝坼安能誅隂虬坐使天地闢聞永叔復館因以􅀉賀東方有鎩禽巳喜羽翰揷重來金馬門莫忘黃牛峽黃牛無冬春逺水生鱗甲今非昔日憂賀酒特新壓九月一日去歲南陽與謝公别今謝巳沒授衣念徂節闔棺傷故人故人昔送我把酒湍水濱只道後期易豈知無會因死生意不及欲語鼻先辛旣乏羡門術安得如松筠寒暑更數十應亦同埃塵弔李膺辭隂蜺橫天長劒欲抉匣頴未露兮精鋼已折層氷塞川猛炬方烈凝氣未銷兮高熖巳滅雖忠毅之有志兮當衰運之閉結嗟身禍之不免兮甘就死於縲絏何賢者之景慕兮或自表而謝絕惟荀公之􅀗御兮見顏間之氣恱奚服媚之若茲兮蓋操秉乎峻節風裁獨高而罕接兮號龍門而無凡轍允簡亢不容於時兮玉雖碎而猶潔痛漢綱之頽圯兮又何毀乎賢哲歷千古而可悲兮故余不得而靣結叨此􅀖而長民兮過舊隴而増咽嗟異代之有遇兮若登履乎閫闑對風樹之蕭蕭兮想䰟氣之未竭聊感槩於斯兮寫憂心之惙惙送李康伯赴武當都監城下漢江流滄波照􅁂秋山川包楚塞風物似荆州試聽清砧發何如畵角愁遙知絕戎事水味有槎頭重送得朋如得寶何恨相知晩舊友貴來踈嗟君行復逺秋城隔寒水驛路入蒼巘古情深不深所祝加餐飯田家語庚辰詔書凡民三丁籍一立校與長號􅃓箭手用備不虞主司欲以多媚上急責郡吏郡吏畏不敢辨遂以屬縣令互搜民口雖老㓜不得免上下愁怨天􅀨淫淫豈助聖上撫育之意耶因録田家之言次爲文以俟採詩者云誰道田家樂春稅秋未足里胥扣我門日夕苦煎促盛夏流潦多白水高於屋水旣害我菽蝗又食我粟前月詔書來生齒復板録三丁籍一壯惡使操􅃓䪅州符今又嚴老吏持鞭扑搜索稚與艾唯存跛無目田閭敢怨嗟父子各悲哭南畆焉可事買箭賣牛犢愁氣變乆􅀨鐺􅇲空無粥盲跛不能耕死亡在遲速我聞誠所慙徒爾叨君禄􅁍詠歸去來刈薪向深谷檢覆葉縣魯山田李晉卿餞於首山寺留别我本山水鄕看山常不足自從到官來塵事便拘束嘗聞此山寺法宇深雲木無由一來過夢想向巖谷按田趨隣疆跨馬渉平陸良友送我行偶與賞心屬禪庭鳴白雞祖席歌黃鵠野氣逼人寒嵐光添酒緑言離非逺離但愛交情篤重游應有期君亦行車促卧羊山亂石若羣羊縁崗卧斜日曾非左慈化更想初平叱無羶穴蟻去有乳寒泉出誰憶灞陵原纍纍冡傍質汝墳貧女時再􅀧􅃓手老㓜俱集大􅀨甚寒道死者百餘人自壤河至昆陽老牛陂僵尸相繼汝墳貧家女行哭音悽愴自言有老父􅀌獨無丁壯郡吏來何􅁀縣官不敢抗督遣勿稽留龍鍾去擕杖勤勤囑四隣幸願相依傍適聞閭里歸問訊疑猶強果然寒􅀨中僵死壤河上弱質無以託橫尸無以葬生女不如男雖存何所當拊膺呼蒼天生死將柰向昆陽城試看昆陽下白骨猶㗸鏃莫願隍水頭更添新􅀑哭老牛陂吳牛行欲老漢馬焉得肥筋力不可恃遊子當念歸􅀟鳬觀山下溪流照城郭幽庭栢子風自落古壇蒼蘚少人行不見􅀟鳬見黃雀葉公廟真物還見驚從來人所悼今看古壁畵應合當時好己卯歲紫微謝公赴南陽過葉縣陪遊興慶精舍題名壁間而去庚辰歲余來按田因訪舊跡䀌然于懷故作此謠以志其悲昔與南陽太守行車騎休時訪庭栢今來重看壁間題太守巳爲泉下客獨留清血是門人怊悵便令生死隔觀扱兎莽莽蒿萊下紛紛狡兎迷枯枝坐守者若箇是忘歸燈花灼灼生寒燼終朝照席明從教占有驗燃滅本無情魯山山行適與野情愜千山高復低好峰隨處改幽徑獨行迷霜落熊升樹林空鹿飮溪人家在何許雲外一聲雞游元紫芝琴堂訪古歷荒城城􅀌落日鳴人琴兩不見破月高臺傾至香山寺報秀叔家近心還速川長馬易疲望山􅀌寺出渡水夕陽遲來向林間宿歸湏月上時只應庭際鵲巳報汝先知寒草寒草纔變枯陳根巳含緑始知天地仁誰道風霜酷送崔秀才晨風無定巢逺􅀉鷦鷯枝天寒鼓翼健粒食寧所窺大澤多羣羽翺翔各有時今子振衣去焉能乆迍覊少年遊太學着盡篋中衣獨劒自爲伴無家何處歸秋蓬隨野轉寒鵲遶林飛霄漢有知己行行寧乆微思逺􅀉師厚馬蹄踐霜雪不畏道路寒游子重衣裘慈母懸心肝懸心幾千里冉冉歲已殘大河今漸涸逺目常不乾度鴈朝夕聞尺書􅀉亦難願同車輪復勿比弦上丸送師厚歸南陽會天大風遂宿高陽山寺明日同至姜店徃日送子春風前春風酣酣杏正妍今來送歸秋風後秋風摵摵沙滿川馬鬛斜傾毛瑟縮馭吏噤唫足後先弊裘吹裂寒入骨枯株磨戞火欲燃忽逢古寺出巖腹與君下馬相留連殿堂高下就山􅀔松栢森聳侵雲巓長廊落葉卷若掃丈室垂幔翻如褰像塑神母乳九子抱擕撫玩皆可憐􅁍令逺客自生念欲見㓜稚心煩煎擁爐對坐日昬黒龕燈共借僧榻眠雖然覆衣冷如鐵不及在家貧無氊曲肱難寐要天曉兩股凍痺仍筋攣桹桹殘夜木魚響起看昴畢傾西􅄤怒號斗息東方白童僕整肅吾將還老僧掃壁持筆硯請予強此題歲年出門並轡至山店茅屋揭盡餘尺椽又據胡床一談笑君不解飮聊開筵程次都無五百里篋中可乏一囊錢拂衣頻起畏日昃應恐慈母心懸懸顧我便當江海去􅁍思此地何由縁疲馬疲馬不畏鞭暮途知幾千當湏量馬力始得君馬全依韻和永叔子􅂂冬夕小齋聯句見􅀉遙知夜相過對語冷無火險辭􅋐尖竒凍地抽笋􅩮唫成欲􅀉誰談極唯思我學術窮後先文字少許可敢將蠡測海有似脂出輠必餓嘗見憂此病各又果弊駕當還都重門不湏鏁到時春怡怡萬柳枝娜娜定應人折贈只恐絮巳墮行槖且不貧明珠藏百顆永叔嘗見嘲謂自古詩人率多寒餓顚困屈原行吟於澤畔蘇武㗖雪於海上杜甫凍餒於耒陽李白窮溺於宣城孟郊盧仝栖栖道路以子之才必類數子今二君又自爲此態而反有飯顆之誚何耶古塜南陽道中作此以下汝州罷官再至鄧州葬希深南陽古原上荒塜若魚鱗劒佩不爲土衣冠應化塵枯骸託魑魅細草沒麒麟何必問名氏漢家多近親仲春同師直至壠山雪中宿穰亭與子乗羸馬夜投山家宿風雪滿綈裘燈火深竹屋烹雞頼主人吠犬憎倦僕明發到巖前春荑凍雲木依韻和師直仲春雪中馬上自􅀝春風暖輕袍犯雪來過塘迷緑水拂樹雜芳梅山蔽峰難辨樵通徑易開野行方有味緩轡不湏催和師直早春雪後五壠道中作來尋谷口春正值隂雲結日暮氷霰繁宿亭􅀌飯設侵晨登壠去始見羣峰列草凍未抽心松枯猶抱節川傍認飛鷺林上墜殘雪何意待芳菲遲留未堪折依韻和師直晩歩徧覽五壠川窮覽川原勝經行未猒頻樵深但聞斧谷暖自留春臨水何妨坐看雲忽滯人誰家煙塢裏竹樹逺相隣暮春過洪氏汝曲小園三月花已休閑來羡叢薄河回地􅀔偏􅀨入灘聲惡緑草旋抽心青梅猶帶蕚主人歸未歸誰省曾遊樂雷祕校入闕擬官時將登舟過輦下與君先後發同走向京華羡躍青驪去將乗烏榜賒着鞭辭宿􅀨渡水踏春沙聞道求爲縣應當學種花登許昌城望西湖試望許西偏湖光浸曉煙岸痕添宿􅀨草色際平田夏木隂猶薄朱荷出未圎人閑緑波靜幽鷺挿頭眠孫主簿惠上黨寺壁胡霈然書墨迹一匣上黨佛祠何可觀開元瑞物圖高閣又有長廊古壁上復是名軰題丹雘當時泥用絲作筋意欲千載無剥落書竒畵妙了不識訛傳墨土能治平聲瘧寺僧不惜人搯取筆畫遂缺如鳥啄後來好事恐磨滅寶刀裁剗泥如剥取之龕置緑板匣便寶箱楮同美璞拂拭還看體􅀔生盤屈蒼虬舞鸞鷟在昔不畏屋壁壞今也常恐兒童撲夫君知我心所重南歸贈以致誠慤此時雖喜落吾手老大腕硬無由學但當拜貺不敢忘莫爲報言曾未數􅀉永興招討夏太尉代人寶元元年西夏叛天子命將臨戎行二年孟春果來冦高奴城下皆氐羗五原偏師急赴敵晝夜不息趨戰塲馬煩人怠當勁虜雖持利器安得強二師覆敗乃自取豈是廊廟謀不臧朝廷又選益經略三幙賢俊務所長或取李悝備邉策或欲五道出朔方仲夏科民挾􅃓矢季冬括驢賫道糧官軍未進復犯塞搴旗殺將何倡狂遂令士卒愈沮氣欲使乗障膽不張我願助畫跡且逺側身西望空凄凉庶幾一言可禆益臨風欲􅀉鳥翼翔所宜畜銳保城壁轉饋先在通行商守而勿追彼自困境上未免小􅴠攘譬如蚊虻􅏐膚體實於肌血無大傷此言雖小可喻逺幸公采用不我忘誠知公慮若裴度聖上聽用同憲皇當時豈不歷歲月猶且衆鎭未陸梁况今鷹犬乏雄勇便擬馳騁徒蒼惶且緩湏時勵犀卒終期拉朽功莫當桓妬妻昔聞桓司馬娶妾貌甚都其妻南郡主悍妬誰與俱持刀擁羣婢逕徃將必屠妾時在窻前解鬟臨鏡梳鬒髪雲垂地瑩姿氷照壼妾初見主來綰髻下庭隅歛手語出處國破家已殂無心來至此豈願奉君娛今日茍見殺雖死生不􅊋主乃擲刃前抱持一長吁曰我見猶憐何况是老奴盛怒反爲喜哀矜非始圖嫉忌尚服美傷哉今亦無宛陵先生集卷第七宛陵先生集目録卷第七汝州後詩夏日晚霽永叔􅀉澄心堂􅁓聞尹師魯赴涇幙夏日陪彭學士登城王殿丞求釣竿詠蜘蛛宋著作􅀉鳯茶觀水大水後城中作和李君讀余著孫子新霽登周王城答李晉卿結交篇秋日屬疾田家苦􅀨聞永叔復館􅀉賀九月一日弔李膺辭送李都監赴武當重送田家語檢覆葉縣魯山田卧羊山汝墳貧女昆陽城老牛陂􅀟鳬觀葉公廟悲巳卯歲謝紫微觀扱兎燈花魯山山行游元紫芝琴堂至香山寺報秀叔寒草送崔秀才思逺􅀉師厚送師厚歸南陽疲馬和永叔冬夕聯句古塜仲春同師直雪中和師直雪中馬上和師直早春和師直晩歩暮春過洪氏小園雷秘校入闕擬官登許昌城孫主簿惠墨跡􅀉永興夏太尉桓妬妻目録終
