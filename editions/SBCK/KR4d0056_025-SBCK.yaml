front:
  text: 宛陵先生集卷第二十五
  hash: sha256:fd68ae56b3441989e034a7846955557ff26d7660af71e52076177d4928bce281
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_025-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送謝寺丞新賜及第赴扶溝宰世所重登科如君特才選麗賦驚宗工妙譽動京輦行鷁路非遐雙旗風欲展􅊃閱民版餘應不􅀒墳典和李廷老三月十四日三月日幾望士㳺溱水陽溱流巳渙渙有美此翺翔偶來適此願月色同滿牀士曰陟少室女曰歸大梁及晨各異役悲喜竟囘腸芍藥有遺風贈好期不忘固匪子能逮是焉繼新章苦􅀬赤日若射火林風不動梢羸汗尙流沛冠服豈堪包貴人諒有禀慣習非強教􅀼觀行車馬坌蕩劇煨炮寧思山中人石泉浸兩骹劉薛二君過予遇雨猛雨迫好鳥止我屋室隅是時有劉薛亦旣此焉俱我厩秣爾馬我厨飯爾奴二人乃可語因觀爾馬圖古筆得神妙俗工非所模收圖雨且止鳥飛當駕驅荅廷評宗說遺冰仲夏遘餘閏屋室如炊蒸孰云窮處者言贈太官冰時靡有暍死實亦頼友朋定能涼一席旣巳却靑蠅吾心乆自信飮巳不以矜劉牧殿丞通判建州平生交㳺少海内寡與期識君且恨晚一見巳將離人言何嗟别曾此非舊知借曰匪我舊亦旣接音詞譬彼空林鳥止息偶同枝忽有振翮去尚爾鳴聲悲我今臨流送安顧俗所爲和中道伏日次韻伏日每苦􅀬古來亡事侵嘗聞東方朔割肉趨庭隂百職當早罷將畏赫日臨我無歸遺人懷念空霑襟和蔡仲謀苦􅀬大􅀬曝萬物萬物不可逃燥者欲出火液者欲流膏飛鳥猒其羽走獸猒其毛人亦畏絺綌况乃服冠袍廣厦雖云託呼風不動毫未知林泉間何以異我曹蠅蚊更晝夜膚體困爬搔四序苟迭代會有秋氣高儼上人粹隱堂十年不出戸世事皆剗鋤時無車馬㳺焚香坐讀書有堂曰粹隱惟見安且舒心遠迹非遠歲月速輪輿寓目暫爲實過者卽爲虛譬若開是室终日於此居欲問昨日事巳􅁴今日踈明朝却視今復與前何如􅊃悟此中樂猶觀濠上魚送鄭太保瀛州都監秋氣入關河匈奴乆巳和琱􅃓􅊃可試寶劔不須磨草木將搖落牛羊自􅃦訛能知塞垣景持以贈吾歌送刁安豐嘗㳺芍陂上頗見楚人爲水有鳥魚美􅁟多薑芋宜寧無董生孝將奉叔敖祠舊令乃吾友寄聲於此時劉八飮將散分得非休沐不得㑹閏五月晦日君非休沐時茲㑹豈能得我無官局縈幸爾預歡適莫辭衝雨歸歸時烏㡌側贈張處士聞爾閑於琴􅃦處未嘗輟抱之京師來豈與工師列一奏流水聲落指鳴决决旣曰林壑人安事塵􅁟轍將行與蔡仲謀飮分席上果得桃曾無千歲人安見千歲實􅊃效昔所投􅌦瑤報非一荅裴送序意我欲之許子有贈爲我爲學勿所偏誠知子心苦愛我欲我文字無不全居常見我足吟詠乃以述作爲不然始曰子知今則否固亦未能無諭焉我於詩言豈徒爾因事激風成小篇辭雖淺陋頗尅苦未到二雅未􅃘捐安取唐季二三子區區物象磨窮年苦古著書豈無意貧希禄廪塵俗牽書辭辯說多碌碌吾敢虛語同後先唯當稍稍緝銘誌願以􅈂法書諸賢恐子未諭我此意把筆􅁣歎臨長川和張士曹應之晚景遠空雲解駁南陌雨􅀄收獨鳥去烟外斜陽明樹頭涼飈虛枕席漲澇起汀洲㑹有從軍役將離更暮愁送楊浩秘丞入蜀有才不得試志亦無所干有母不得養法當之遠官雖曰在民政孝心寧得安志願且未遂而趨蜀道難行思叱馭者勿復苦長歎乙酉六月二十一日予應辟詐昌京師内外之親則有刁氏昆弟蔡氏子予之二季友人則胥平叔宋中道裴如晦各携肴酒送我于王氏之園盡懽而去明日予作詩以寄焉性僻交㳺寡所從天下才今朝誰岀祖親戚持樽罍晚節相知人唯有胥宋裴所欠謝夫子歸穰尚未􅅆岸傍逢名園繫舟共徘徊嘉蓮如笑迎照水呈丹顋南庭莆萄架萬乳纍將磓群卉競􅃈細紫紅相低偎㝷常固邂逅孰辨落與開酒闌各分散白日將西頽城隅遂有隔北首望吹臺開封古城阻淺聞永叔䘮女去年我䘮子與妻君聞我悲嘗俛眉今年我聞若䘮女野岸孤坐還增思思君平昔憐此女戲弄􅂰下無不宜昨來稍長應慧􅃛想能學母粉黛施幾多恩愛付涕淚灑作秋雨隨風吹風吹北來霑我袂哀樂相恤唯巳知自古壽夭不可詰天高杳杳誰主之以道爲任自可遣目前况有寧馨兒寄謝開封宰薛賛善予生多不偶事事相與背適從平川役乃遇河决潰舟膠在中野寸歩使心痗誰知赤縣尹勤恤每外内文符􅅚亭長㓂盗虞䑕軰仍能饋餅餌童稚仰所賚今又置酒壺惠問亦已再令我淸夜飮是夕值月晦獨酌効謫僊而復無影對如何亡情㳺似亦有世態家人誠可同况我昨䘮配雖曰預朝裾左右無粉黛兀然唯書史舊學猒􅃈碎欲探文字工下筆語多礙却思君西齋新治虛可愛燕坐禽鳥寂吟哦簿書退此樂吾未如區區勞覆載草木草木無處所動搖知風形今日萬葉黄昨日萬葉青青旣漸衰變黄亦漸凋零人生恃歲月種栢滿郊坰夢登河漢六月二十九日夜夢上河漢星辰布其傍位次稍能辯羅列爭光芒自箕歷牛女與斗􅈂相當旣悟到上天百事應可詳其中有神官張目如電光玄衣乗蒼虬身珮水玉璫丘蛇與穹龞盤結爲紀網我心恐且怪再拜忽禍殃臣實居下􅁟不意渉此方旣得接威靈敢問固不量有牛豈不力何憚使服箱有女豈不工何憚縫衣裳有斗豈不柄何憚挹酒漿卷舌不得言安用施穹蒼何彼東方箕有惡務簸揚唯識此五者願言無我忘神官呼我前告我無不臧上天非汝知何苦詰其常豈惜盡吿汝於汝恐不祥至如人間疑汝敢間於王扣頭謝神官臣言大爲狂駭汗忽爾覺殘燈熒空堂寄宋次道中道再來魏闕下舊友無一人或爲美官去或爲泉下塵晚歲相知者操節許松筠日世常山公伯仲文學均與我􅁆還徃以義爲比鄰屢假篋中書校證多䕶眞次述盈百卷補亡如繼秦中作淵明詩平淡可擬倫于時多驕佚黄卷罕所親昨以興西師徃徃劔射伸短衣誇走馬睅目語常瞋欲效西山勇遂笑東魯仁捨本趨富貴乃與市賈濵以此較於子素業固未泯前日之許昌别君巳經旬偶然值河決窮坐如涸鱗臨風思有寄夜詠還逹晨日蝕赫赫初出咸池中浴光洗跡生天東不覺有物來晦昧團團一片如頑銅前時蝦蟇食爾妃天下戢戢無有忠責罵四方誰膽大仰頭憤憤唯盧仝欲持寸刃去其害氣力雖有天難通是時了無毫芒益徒有文字辯且雄仝死于今百餘載日月幾度遭􅃒蒙有人見之如不見誰肯開口咨天公老鴉居處已自穩三足􅂦峙何乖慵而今有觜不能噪而今有爪不能攻任看怪物瞖天眼方且省事保爾躬日月與物固無惡應由此鳥招禍凶吾意髣髴料此鳥定亦閃避離日宮安逢后羿不乖暴􅀡與審慤彎强􅃓射此賈怨鳥以謝毒惡蟲二曜各安次災害無由逢􅀯不􅀹赤鳥東不誚蒼龍北􅀛勿􅄍氣西虎勿嘯風五行不汨陳虞舜生重瞳我今作此詩可與仝比功寄王江州休嗟謫官去山根勝窮邊當職言無隱他時事好還何嘗聞堠火唯是對爐烟潮到盆城否猶期信可傳薛九公期請賦山水字詩薛君堂懸山水字請我試作山水詩呼童磨墨慰君意强作安得有好辭昔年曾是杜陵客東城水上横此碑字方􅁆尺形􅀔徤豈似取次筆畫爲東城父老語於我推本剏自開元時不知當時何所用費功鑱刻爲瓌奇我去長安十載後此石誰輦來京師􅁐中構殿激流水暮春修褉浮酒巵是時祠臣出不意酒半使賦或氣萎日斜鳴蹕不可駐未就引去如鞭笞脫我幸得預此列玉階立寫從然萁今雖下筆不稱意巳書滿幅令君嗤七夕有感去年此夕肝腸絶歲月淒凉百事非一逝九泉無處問又看牛女渡河歸過開封古城荒城臨殘日雞犬三四家豈復古阡陌但問新桑麻頽垣下多穴所窟狐與蛇漢兵墮銅鏃靑血爲􅁟花通判桃花㕔自此詩許州起慶曆五年秋盡六年夏種桃西庭下有意延東風東風與雨至染出枝上紅花底有小鳥其字曰桃蟲旣於桃得名爲桃言女工翦羅作舞衣奉君歡莫窮舉杯無愧者避世武陵翁任廷平歸京并序廷平任君徃者登進士科入許幙後二年予被太原公辟與君爲代君之嚴君以太子少保致仕西都西都去許其道有三北趨鄭過函谷而至洛陽其途而遠西趨汝由闕塞而河南其途小艱然邇扵北道西北趨登封歷轘而至洛師其途險惡不與二道比君之歸也捨二道之平易踐西北之險惡何哉是非急扵拜慶耶豈特與人情異歟噫人以爲險在君爲易由出扵天誠不爲難也出天誠易險道可謂孝也乎及其行予故作詩以送之言之少室西定陟轘轅險歸心不避危夕枕屢成魘秋聲故􅁐空野氣荒陵掩獨念京洛塵曾將客衣染和通判太愽雞冠花十韻神農記百卉五色異甘酸乃有秋花實全如雞幘丹籠烟何聳聳泫露更團團取譬可無意得名殊足觀逼眞歸造化任巧即彫剜赤玉書畱魏丹砂句誦韓魏文帝與鍾繇求玉玦書論玉云赤如雞冠韓文公闘雞聮句云頭垂碎丹砂誠能因物比誰謂一時難有客驅辭頴臨風運筆端嘗嗟古吟缺每惜此芳殘揣情苦精妙繼音慙未安秋夜感懷風葉相追逐庭響如人行獨宿不成􅄰起坐心屏營哀哉齊體人魂氣今何征曾不若隕籜繞樹猶有聲涕淚不能止月落雞號鳴依韻和通判八月十五夜招翫月二章㝷常圓魄豈不好競愛今宵分外明明極只知無隔礙誰言桂樹向中生一年一見最堪惜百歲百夕能幾多縱有明年似今夕明年同㑹復如何蚯蚓蚯蚓在泥穴出縮常似盈龍蟠亦以蟠龍鳴亦以鳴自謂與龍比恨不頭角生螻蟈似相助草根無停聲聒亂我不􅄰每夕但欲明天地且容畜憎惡唯人情秋風秋風不饒物斗至聲巳惡青林葉尚䌓雖好將恐落人意誠愛惜節候肯相若白髪無再玄盛衰茲可度韓宗彥寺丞通判鄧州徃歲陪祠泰壇下始一相見如相知我今入幙君有待喜得欵語勝前時便嗟陳事日侵汨雖欲􅁆靣曾無期忽聞兵吏巳迎候馬有行色車將脂賀君有意事清簡太守亦鄙㝷常爲騏􅂹歩驟豈局促鳯皇羽翼多威儀漢家近親不復有召父舊聞扵今隳隳由狂者生利害曾未略究民間宜秪言引水幸圭賦矯請罷毁功何施千載厚惠一日去至今農畆空嗟咨夫子才高識且遠勿畏􅀔力重扶持他年人作去思頌願以大字書長碑韓欽聖問西洛牡丹之盛韓君問我洛陽花爭新較舊無窮巳今年誇好方絶倫明年更好還相比君疑造化特着意果乃區區可羞耻嘗聞都邑有勝意旣不鍾人必鍾此由是其中立品名紅紫葉繁矜色美萌芽始見長蒿萊氣熖旋看􅎹桃李乃知得地偶增異遂出群葩號奇偉亦如廣陵多芍藥閭井荒殘無可齒淮山邃秀付草樹不産髦英産佳卉人扵天地亦一物固與萬􅁼同生死天意無􅀻任自然損益推遷寧有彼彼盛此衰皆一時豈關覆燾爲偏委呼兒持􅁓書此說爲我緘之報韓子夢感生哀百十載死苦千萬春何爲千萬春厚地不復晨我非忘情者夢故不夢新宛若昔之日言語㝷常親及窹動悲腸痛逆如刮鱗秋鴈秋鴈多夜飛前羣後􅀌來儔合鳴自得􅃗去音巳哀哀音能感人腸酸非食梅共將形影對安得不早衰依韻和通判把菊有寄湖邊草樹多蠧葉巳少色唯菊不畏霜淡艷如有德自與蘭並生非因人所植愛貴曾未猒秋日短苦逼朋好各相望採持空歎息臨杯不能飮對案不能食借問君何憂節物感人極曹承制知永康軍脩鐡驄黄金羈年少蜀城守蜀城臨古江正在離岸口離岸李凉鑿其利實不乆旣避沫水害又以漑田畝大此百民宜遺祠奉牲酒行當謹厥事無乃爲政首三鳥翩翩三奇鳥各擇松桂宜二鳥同所向並立高高枝一鳥依别樹屈比二鳥卑嗟嗟天下鳥莫與三鳥期三鳥鳴少和蒿間多鸒斯頻頻徒爾黨三鳥安可欺龍箕一首并序在昔賢人良輔之生也或山之神靈和氣之鄰或星之魄曜晶明之所鍾故詩有嵩高之作稱厥甫申傅􅀃騎箕之􅀃又得之前古公之誕日考之星歷月次于箕宜與􅀃同也夫登翊王室爲宋鉅臣豈徒然歟謹依雅頌作龍箕一章十八句以獻龍箕在天莫不孕靈我公生之旣生旣德曾誰與京爰弼帝右繼序其榮之賛我太平萬事其成之殿我輔􅀖庻民其寧之政靡薄厚百職其揚之宜言顯光永錫乎后王迺祝眉壽迺獻兕觥福禄其將之宛陵先生集卷第二十五宛陵先生集目錄卷第二十五送謝寺丞及第苦􅀬和廷老三月十四日劉薛二君過予荅宗說遺氷劉殿丞通判建州和中道伏日和蔡仲謀苦􅀬儼上人粹隱堂送鄭都監瀛州送刁安豐劉八飮將散贈張處士將行與仲謀荅裴送序意和應之晚景送楊秘丞入蜀乙酉六月二十一日聞永叔䘮女寄謝開封薛宰草木夢登河漢寄宋次道中道日蝕寄王江州薛九請賦山水字詩七夕有感過開封古城通判桃花㕔許州起慶曆五年秋六年夏任廷評歸京和通判雞冠花秋夜感懷和通判招翫月蚯蚓秋風韓寺丞通判鄧州韓欽聖問西洛牡丹夢感秋鴈和通判有寄曹承制知永康軍三鳥龍箕目錄終
