front:
  text: 宛陵先生集卷第五十二
  hash: sha256:c5e02ae3dd7a8781b611eecab41d4b765ea9d72da1e62472411745acb1030080
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_052-1a}
body:
  text: 宋宛陵梅堯臣聖俞著刑部㕔㸔竹効孟郊體和永叔用其韻蒼蒼庭中竹事莫歎遲􅄩不同欄下草一歲一􅅆緑朝開花照曜暮落風相逐何如飽霜雪冬夏森寒玉誰將種官舎本合近嚴屋不可一日無蕭灑看未足阮生豈其愚林中醉􅙩醁我當明月時移床來此宿較藝和王禹玉内翰分庭答拜士傾心􅁍下朱簾絶語音白蟻戰來春日暖五星明處夜堂深力搥頑石方逢玉盡撥寒沙始見金淡墨牓名何日出清明池􅁐可能㝷再和廉纎小􅀨破花寒野雀争巢􅃲作團手卷白雲光引素舌飛明月響傾盤羣公錦繡爲腸胃獨我塵埃滿肺肝强應小詩無氣味猶慙白髪厠郞官謝永叔答述舊之作和禹玉天下才名罕有䨇今逢陸海與潘江筆生造化多多辦聲滿華夷一一降金帶繫袍􅅆禁署翠娥持燭侍唫窓人間榮貴無如此誰愛區區擁節幢較藝贈永叔和禹玉今看座主與門生事事相同舉世榮並直禁林司詔令又來西省選豪英飛龍借馬天􅁁下光禄供醪月底傾食葉􅁞聲句偏美當時曾記賦將成戲答持燭之句依韻和永叔盧仝只有赤脚婢吏部曾唫似笑仝紅燭射眸從結客清歌帖耳苦憐翁歸時雖巳過寒食芳物猶能逐暖風但􅀧紗籠續清夜西園遊興古何窮重答和永叔我家唯有一團月掛在颼颼草屋東玉兎巳爲公取玩更休窺望桂叢中又依韻多病相如不復云更何曾有卓文君他時我向㑹稽去只是荆􅁫與布裙刑部㕔海棠見贈依韻答永叔二首搖搖墻頭花蒨蒨有好色高枝笑粲粲低枝明皪皪但與風相撩不與風相得風吹莫苦急游子歎日􅉴彭祖與顔囘相去猶􅕿息每觀形影篇曷在神所釋不可廢我唫畢竟焉免白搖搖墻頭花一一如舞娥春風買艶逸艶逸此何多不爲遊􅉕撓卽爲狂蝶過日光苦給給魯􅅱白波波人生若朝菌不飲柰老何楊雄寂寞居豈若阮生歌春􅀨呈主文蛟龍上漢魚潛動梁棟生雲鷰未知風􅀧稍聞寒瓦急玉條初向畵簷垂何郞夜聽應逢句謝眺朝觀必有詩老大莫將文字困爲公牽强不勝疲謝鷴和公儀聞有白鷴夢遂作白鷴詩詩記白鷴語意公於鶴私公意無薄厚爾將聽我辭朝給一瓢水畫給一盎糜曾不令爾渴曾不令爾饑事事不異鶴安得於鶴疑鶴鳴爾不和鶴舞爾不隨無以一供恱飽食畨頑癡公所念爾乆李白當畜之白固有篇詠公偶未暇爲遣爾心不平謂此鈍見遺我持爾此意請公吟莫遲公便納我言濡筆灑淋漓書爾在南方野羽霜雪披弄啄紅豆實飛上桄榔枝翡翠不敢顧孔雀不敢窺將擬是白鳯脩尾晝漣漪虺頸而雞首峩峩如有儀而今與鶴争此識固巳卑公初待爾厚鷴兮知不知較藝將畢和禹玉窓前高樹有棲鵲記取明朝飛向東家在望春門外住身居華省信難通夜聞相府催張牓曉聽都堂議奏中龍閣鳯池人漸隔猶因朝謁望鼇宮送白鷴與永叔依韻和公儀致鷴猶恐鷴饑渴細纎筠籠小瓦缸玉兎精神憐巳乆金鑾人物世無䨇休爭白鶴臨清沼且律鳴雞向緑窓美羽竒毛有多少爾身高穩勝他􅀖書事和韓子華舍人見慿蝴蝶過墻飛􅁍夢翩然入綺闈欲撲翅輕縈不住覺時疑有粉沾衣明經試大義多不通有感依韻和范景仁舍人明經與進士皆欲取公􅀸自是俗儒陋非於吾道輕昔由羔鴈聘今乃草萊并不措一辭去縁何禄代耕出省有日書事和永叔辭家綵勝人爲日歸路棃花􅀨合晴庭下鞦韆應未拆籠中鸚鵡卽聞聲千門走馬將看牓廣市吹簫尚賣餳巳是瓊林芳草晚不湏遊處避門生定號依韻和禹玉言出君門日遥聞紫禁鍾詔書中使降駿馬上閑供天下持平手毫偏不置􅅐文從有司較卷是近臣封勝陣無容敵精兵巳善攻明朝當奏號鴛鷺看歸雝􅀉桂州張諫議和永叔桂林太守幾時行泛汴桃花浪巳騰目極雲隂低逺樹夜寒風急亂春燈巢鳴翡翠愁無限水宿鴛鴦冷不勝陽朔山前好峰嶺爲公憐愛萬千層觀張中樂書大字芝旭馳名世有孫大書如曉過秋原長松怪栢皆成炭豫氏觀傍不解吞張淳􅅱獻詩永叔同永叔和之張君獻詩詩詞巧美女挿花嬌醉春公答七言夸筍笴我無千里學騏驎夜吟謝眺澄江練露濕陶濳漉酒巾歸去應將錦囊貯巳勝珠玉莫愁貧上馬和公儀煙火千門曉欲開五花驕馬看徘徊井閭巳是經時隔親舊全如逺别來帝闕重看多氣象天街新霽少塵埃振冠浣服無容乆便見池門放牓催太師杜公挽詞五首國佐三公進師臣一品歸接賔忘素貴還綬逺危機憶奉追尊冊當觀副輅旂生榮人莫及無恨掩泉扉慶曆中改謚章聖五后公奉冊乗副玉輅出宣德門旣老仍開國因歸得賜金念懷知主意堅介見臣心筆扎尚存􅁓性情猶託吟向來門下客東首淚盈襟前歲因侍講王内翰歸省其兄於睢陽上賜公金莫怪霑襟血無由作弔賓故池歸去鴈春信見何人巳寫虛堂影猶鐫守􅃁麟門生與舊吏將立道傍珉言爲當代法行不古人慙天子貴元老史官傳美談名高漢亞相學士晉征南有子卽家寶未嘗金玉貪見録㝷常詠親裝復手題言從永嘉後重與建安齊自古難知巳􅀌生每擇棲春風􅀉黄鳥爲向墓間啼去歲同在殖郞中謁公公岀手裝僕詩一軸送方云秀才下第從來釣者意豈不在得魚餌寡魚口多曾非投竿踈向登百金貴首尾必吹噓竭澤古所戒但保腹中書風雷變有時且復歸孟豬送張待制知越州滄海東􅁁㑹稽郡朱輪逺下相臣家巳同雲漢星庭轉不與鑑湖風月賖越箭抽萌供美茹秦山堆翠照高牙買臣嚴助來時貴破盗論功未足誇送甥蔡駰下第還廣平爾持金錯刀不入鵝眼貫巳遭俗弃擲妄意堪憤惋他時有識别終必爲寶玩懷之歸河朔慎勿輒鎔鍜改作毛遂錐頴脫奚足筭送唐紫微知蘇臺洞庭五月水生寒盧橘楊梅巳滿盤泰伯廟前看走馬闔閭城下見􅆖鸞吳娃結束迎新守府吏趨鏘拜上官曾過楊州能慣否劉郞盞底勸湏寛韓持國遺洛筍龍孫春吐一尺牙紫錦包玉離泥沙金刀璀錯截嫰節銅駞不與大梁賖持􅀉韓郞緑蒲束莫令衛女苦思家韓郞才調偏能賦分餉唯思楚景差因之善謔誦淇奥欲學報投無木􅀲萊宣遺酒白日對芳樹靜夜愛明月我飲雖不多盃杓安可闕破屋有空缸冷竈無黔突投餐聞韓辱乞食使陶訥鑒此不求人終身其鏤骨儻有佳客過未免貰􅂁笏風從東南來語向西北發西北多鳯雛枝間報清越玉壺盛曉露贈置醉莫歇􅁍少可飲人爲告月休沒送王正􅀸寺丞赴睢陽幙廢囿孝王國離宮天子都古今雖且異文物未嘗無族有栽槐美名從得桂殊應聞漢丞相待士倒樽壺題玉汝遺油朝讀百􅁓書夜成幾篇書明明白晝有陽烏黕黕暗室無蟾蜍目晴湏藉外物光日月不到卑蔀居君能置以滑油壺暝照文字燈熖舒婦將膏髪雲􅁂梳缾底濁濃留脂車所益旣如此所感當何如王幾道罷磁州遺澄泥古瓦二硯澄泥叢臺泥瓦斵鄴宮瓦共爲几案用相與筆墨假賦無左思作書媿右軍寫初從故人來來自邯鄲下物因人以重謬當好事者送咸陽主簿王秘校昔見蘭叢牙今見連蔓􅀲持入咸陽市本出故侯家五色相鉤蔕秦人應自誇行當七月薦乞巧雜盤花和楚屯田同曾子固陸子􅂂觀予堂前石榴花堂下一匹鄭䖍馬欄􅁁兩株安石榴但能有酒邀佳客亦任狂花落素甌俗女紅裙無好色主人白髪自侵頭欲歌翠樹芳條曲巳去洛陽三十秋送史供奉汴口都大河爲中國患亦爲中國利其患齧堤防其利通糧饋分流入浚汴萬貨都城萃積淫或􅁀漲旱暵或滯㚄䟽導欲其宜經度有所異曩者多邀功用之殊未至十私而五公歲乆害愈熾潰溢必歸尤廟堂難决議明明聖天子自選中常侍銀璫挿在貂身小勇且智上從廣武城下及淮與泗􅅆險帖鑿繁所畫由所􅀉嘗以勤厥身又能和衆吏前日有盡心于今病憔悴此職方藉人加餐當自爲吕晉叔著作遺新茶四葉及王游共家原坂嶺歲摘建溪春爭先取晴景大窠有壯液所發必竒頴一朝團焙成價與黃金逞吕侯得鄕人分贈我巳幸其贈幾何多六色十五餅每餅包青蒻紅籖􅆞素檾屑之雲雪輕啜巳神魄惺㑹待嘉客來侑談當晝永送畢甥之臨卭主簿雜言自我歷官三十年有脚未曾行蜀川李白嘗言道之艱險長嗟難劇上青天鳥悲猿嚎馬蹄脫苔梯􅀨棧愁傾顚蒼崖下窺不見底但聽雷聲輥石懸湍濺曉盤青泥上高煙暮盤青泥到下泉劒閣如劒巉然割腸刺恨今古連爾去三千九百里巴山小馬烏皮韀一婦一奚行李單家具日貨能幾錢人皆畏避不敢徃此獨敢徃何所便况是初宦無逺適心意自許非由銓異乎哉我今送爾徒哀憐依韻和公儀龍圖招諸公觀舞及􅀞三首落花淨掃青隂長野蝶閑飛緑草閒侍從退來看鶴舞便將樽酒欲招閑隂森園圃墻東地携挈兒童樹下吟更約天􅁁鳯皇侶閱書觀􅀞味尤深初約看花花巳盡重新邀客客應歡真花旣不能長艶􅀞在霜紈更好看卷第五十二宛陵先生集目録卷第五十二和永叔看竹較藝呈禹玉再和和禹玉答永叔和禹玉贈永叔和永叔戲答持燭重答和永叔又依韻和答永叔海棠春􅀨呈主文謝鷴和公儀較藝將畢和禹玉和公儀送白鷴書事和韓子華明經試大義和永叔岀省有日和禹玉定號和永叔􅀉張桂州觀中樂書大字同永叔和酬張淳􅅱上馬和公儀杜太師挽詞送方云下第送張待制知越州送甥蔡駰下第送唐紫微知蘇臺韓持國遺洛筍萊宣遺酒送王寺丞睢陽幙韓玉汝遺油王幾道遺古瓦硯送咸陽王主簿和諸公觀予石榴花送史供奉吕晉叔遺新茶送畢甥臨卭簿和公儀觀舞及􅀞目録終
