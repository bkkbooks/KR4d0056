front:
  text: 宛陵先生集卷第五十三
  hash: sha256:d81855c91a65ad4b8539f642c00df4352edcfb1157a0436cde22830c39efb155
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_053-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送王介甫知毘陵吳牛常畏􅀬吳田常畏枯有樹不䕃犢有水不滋䅳孰知事春農但知急秋租大守追縣官堂上怒奮鬚縣官促里長堂下鞭扑俱不體天子仁不恤黔首逋借問彼爲政一一何所殊今君請郡去預喜民將蘇毎觀二千石結束辭國都絲韀加錦縁銀勒以金塗兵吏擁後隊劒撾盛前驅君又不若此革轡障泥烏欵行問風俗低意􅀐更駑下情靡不逹略細舉其麤曾肯爲衆異亦罔爲世趨學詩聞已熟愛棠理豈無送曾子固蘇軾屈宋出於楚王馬出於蜀荀楊亦二國自接大儒躅各去百數年高下非近局鈎陳豹尾科登俊何炳縟楚蜀得曾蘇超然皆絕足父子兄弟間光輝自聮屬古何相遼闊今何相邇續朝廷有巨公講索無遺録正如唐虞時元凱同啓沃何言五百載此論不可告二君從兹歸名價同驚俗送建州通判沈太博昔聞醉翁唫是沈夫子所作今聽醉翁吟是沈夫子所彈聲如氷澌下石灘嚼齧碎玉遶齒寒四坐整衣容色端醉翁雖醉無慢官其音正以樂其俗便且安何害酩酊顔渥丹沈夫子邂逅相遇必巳歡玉琴能寫人胏肝人所爲難君不難平明觧舩建谿去輕賫快意不長湍谿東白茗象月團來奉至尊龍屈盤餘爲帶銙與臠片散在六合雲漫漫况君五臟清如水宜飲沆瀣采木欄更留瓦硯贈我看鄴宮鴛鴦誰刻剜送王平甫擬離騷識君兮不早君尚少兮我老蘭與蕙兮多薰搴雜佩兮芳芬蘭倐徃兮蕙隨心俯仰兮徘徊與識吳兮吳樂嘗適楚兮楚恱君何爲兮我闊麒麟縶兮不馳鳳皇蔽兮挑逹均莫悲兮别離悵公子兮何之絶大江兮無波奉赤鯉兮藉荷芼蒓荇兮陳羮親意得兮忘榮世反是兮從貴聊送君兮傷情送僧遊廬山欲遊廬山去將託楚舸梢暮行長河曲月上黃公􅉾悠悠幾千里身世非繫匏恣觀瀑布虹不畏潯陽蛟誦經東林下小宇結香茅韓持國再遺洛中斑竹笋牡丹開盡桃花紅斑笋迸林犀角豐兩株逺􅀉川上鴻韓郞輟口贈楚翁便令剥錦煑荆玉􅅴脆不道簞瓢空小謝舊城昭亭下侵天筀竹谿西東螗螂生後出牙茁羅列滿地爭强雄是時楚翁所食寡朝飯暮飯唯其充今來得此謂過分一貴一賤物苟同送僧惠思大車高馬塵塞􅁤弄石洗泉人不喜􅁣然擺落還吳都歸心勁於弦上矢强弩發復開矢徃不可􅅆常應笑鷰子時能海􅁁來送魯玉太博挽詞三首射筞志何逺闔棺人共疑奠觴朋友去泣血母兄悲霧氣窓間盡車聲戸外知玉樓成作記此語可能欺自昔稱王謝于今亦盛門尚看珠樹秀應見玉麟存書史辛勤學文章苦死論都然莫施設恨向九原吞試問於天下誰從百歲心短長從所盡禍福乃相㝷只以名賓實郍論古至今未能忘物境空復歎人琴蘇明允木山空山枯楠大蔽牛霹􅆮夜落魚鳬洲魚鳬水射幾千秋蠧肌爛隨沙蕩流唯存堅骨蛟龍鏉形如三山中雄酋左右兩峰相挾翊尊奉君長無慢尤蘇夫子見之驚且異買於溪􅅱慿貂裘因嗟大不爲梁棟又歎殘不爲薪槱􅀨侵蘚澁得石痩宜與夫子歸隱丘哀國子黃助教儒者務欲博誦􅀃窮冬秋衣裙未及解含珠以見求閩稱黃夫子常恐學不流有徒如浮萍匝匝圍刳舟聚書將萬卷載行無馬牛去年來京師滿篋分􅀉投半在吳楚間半入趙衛􅑍昨日大官薦青袍變綈裘今朝爲異物寸䘵與命讎獨聞邯鄲公哀之使歛收曷其禀賦薄安得被王侯旅殯欲焉託定將塟何州生爲四方遊死當不擇丘豈必歸故鄕萬里過山頭沅江李氏書堂船從洞庭來非賈卽遊宦宦賈事風檣誰能樂清晏不如蓄書史萬古無與間上觀堯舜仁下覽魏晉􅆲善惡彼旣􅊋智巧徒以辨君心於此得用捨不自慢堂中羅高厨戸外望鳴鴈菰菱可采掇魚鼈可釣汕卒歲身多餘世俗莫習慣張堯夫寺丞改塟挽詞三首洛陽交舊裏過半巳凋殘在昔義投漆最先悲闔棺誰知二紀水重􅁲九原安聞􅀃塞門路白楊風更寒當時嗟遽沒二子未能言頻歲折丹桂買塋遷陸渾重銘太史筆不替故人恩爲善有終慶此焉天意存舊墳爲潤齧新塜得山深斬木來荒路移松出近岑黃鸝啼􅁄上玉女問泉音強作挽人唱儻知哀感心讀黃節推卷磊落黃從事清吟古氣多少年知任俠欲老解登科辨起公􅀸坐時爲慷􅁣歌又持珠玉贈將柰老貧何得陳天常屯田斑笻竹二枚客􅀄西蜀來遺我䨇笻竹上有紅淚斑斷非湘娥哭嘗聞帝䰟哀嚎血滴草木春露灑更新殷痕侵粉緑截爲扶衰杖萬里出洛谷今來入我手君勤意有囑區區四十年重趼生兩足冠丱三男子且與詩書讀翁雖文章窮尚以字􅃒目􅃘弃不以教携歸事樵牧故兹九節贈用助老追逐楊朱非爲岐賈誼非爲鵩及其悲慟時豈不沾盈掬揮之儻着物無迹染林麓因持此竹紋勿歎前人獨送余少􅀸知睦州青山峽裏桐廬郡七里灘頭太守船雲霧未開藏宿鳥坡原將近見燒田養茶摘蘂新春後種橘收包小雪前民事蕭條官政簡家書時問霅溪邊夜直廣文有感􅀉曾子固日暮蛛絲動月暗螢火明方兹歩庭戸浩然懷友生友生將東歸泛􅀂赴海鯨巳從龍門出不慕朱鼈輕朱鼈過吳洲飛飛就東瀛沉浮未可問名有萬里程湏憂小水魴勞勞將尾頳重送曾子固楚澤多年一卧龍新春雷􅀨起鱗蹤誰知天上爭騰躍偶落池中雜噞喁且自摧藏隨浪去何當駕馭使雲從劉累只􅀃古來有暫屈泥蟠莫便慵􅀉題沈比部江州齊雲樓逺目不高不可極朱樓要與浮雲齊江流萬古平泱莽山􅀨一過寒凄迷賈客檣下望吹笛漁郎浦前看斷霓佽飛射蛟水花伏高士種柳煙條低羣鴈有時至自北洪潮到此不更西君家隱侯有八詠風雅未盡留人題雲間月明明雲間月皎皎莫可指雄烏與牡兎萬歲不生子三旬後乃合徒用成甲癸焉見下土物長養各私巳虵蝎滿窟􅂩嗣毒自未巳天地豈有意盛德名不死依韻和梅龍圗觀小録四百鸞皇羽翼成高低輕重出權衡他時俱作公􅀸去誇是王家門下生送鮮于秘丞侁通判黔州壺頭山下俗巴婦曲中聽汲井熬鹽白燒田種榖青巖風來虎嘯江􅀨過龍腥事簡能談者楊雄所草經依韻閻中孚職方􅁀􅀨幸凉天津赫日欲焦拆西北風來斗减威太帝宫庭無暑入大明冠佩退朝歸泠泠冷襲瑠璃簟弈弈涼翻翡翠幃交扇不湏煩素手淋漓誰復汗頻揮愛月終夜每愛月見月常苦稀不􅀨卽雲晦何能藉光輝儻有一夕明豈畏露濕衣素娥領玉兎􅀌寡命亦微堂堂罕開耀多是半掩扉曾􅀒萬家望空似隨人歸一歲復一歲白髪思釣磯吕縉叔云永嘉僧希用隱居能談史漢書講􅀃邀余􅀉之奈􅁐談經者蘭臺著作稱吾儒不兼習爾學􅀂多能毎愛前峰好閑穿弊屐登定將修史筆添傳入高僧依韻和王景彞馬上忽見槐花六月御溝馳道間青槐花上夏雲山退朝側㡌驚時晚近樹聞香暗詠閑新􅀨賈生車喜出舊年潘岳􅁂添班老慙太學無經術空飽虀鹽强徃還送家靜寺丞知洛南秦愛商於地信美洛水南銀鈆與丹砂鑿山民爭貪蜀客善製錦當先務桑蠶衣老以及少使煦如春酣摘􅂼有筍蕨釣庖有巖潭頗同故鄕味將喜􅀗所諳和王景彞省中詠􅀌竹愛此􅀌生竹碧葉琅玕柯結根􅅴泉裏豈必泰山阿曾莫學兎絲徒以附女蘿風􅅆掃庭戸夜月誰與過永叔内翰遺李太博家新生鴨脚北人見鴨脚􅀯人見胡桃識内不識外疑􅀂橡栗韜鴨脚􅀋緑李其名因葉高吾鄕宣城郡每以此爲勞種樹三十年結子防山猱剥核手無膚持置宮省曹今喜生都下薦酒壓葡萄初聞帝􅁐夸又復主第襃纍纍誰採掇玉椀上金鼇金鼇文章宗分贈我巳叨豈無異鄕感感此微物遭一世走塵土􅁂顚得霜毛陸子􅂂示秦􅂐寶其文曰二十六年皇帝盡并兼天下諸侯黔首大安號爲皇帝乃詔丞相斯館法度量則不一嫌疑者皆明一之秦旣并諸侯斯乃一度量鑄寶以永傳萬世俾勿䘮精銅不生花小􅂐著丞相一沒咸陽宮千秋事更王陸君居洛城客有來渭上曰因農人耕發壤破古藏遂􅀗此物還文完字何壯始號爲皇帝立語巳超矌意將愚黔首釁起危博浪其後同玉璽不隨驪山葬今蓄於君家徒爾資竒尚物以用爲珍異時皆似妄王屋高送王屋知縣孫秘丞王屋山高無猿猱下有黃河水滔滔天壇半夜見海白光動古邑雞先嘷雞先嘷絶吠􅋙巖居林栖吏莫搔山膚有時得虞獵不比􅇾肉烹連毛聞君今去將効陶縣前種柳芟蓬蒿不問公田問民俗民安事簡教兒曹河􅀯太守喜愷悌如此可以無厭勞聽文都知吹簫晏虞部遣求一見之虞舜巳去蒼梧野秦女􅆖鸞無復下簫管人間不解傳帝樂部中能亦寡欲買小鬟試教之教坊供奉誰知者晏識文公始致來勸接賤生宜强且乃呼側坐吹一曲驚顧頓嘶堂下馬吾妻閨中聞不聞稚女扳簾笑嬌奼未敢多聽便遣還贈飮單盃向身瀉雜言送王無咎及第後授江都尉先歸建昌白袍來黃綬􅅆來跨蹇驢􅅆跨馬麻源三谷桂花開江都作尉入風埃主人劉向西京才心如明月無不照恐君巳到還鸞臺宛陵先生集卷第五十三宛陵先生集目録卷第五十三送王介甫知毗陵送曾子固蘇軾送建倅沈太博送王平甫擬離搔送僧遊廬山持國再遺竹笋送僧惠思送魯玉太博挽詞蘇明允木山哀國子黃助教沅江李氏書堂張寺丞改塟挽詞讀黃節推卷得陳天常斑竹送余少􅀸知睦州夜直廣文􅀉子固重送曾子固􅀉題江州齊雲樓雲間月和梅龍圖觀小録送鮮于秘丞黔倅和閻職方􅁀􅀨愛月縉叔邀􅀉永嘉僧和景彞馬上見槐花送家靜知洛南和景彞省中􅀌竹永叔遺李氏新鴨脚子􅂂示秦􅂐寶送王屋知縣孫秘丞聽文都知吹簫雜言送王無咎及第目録終
