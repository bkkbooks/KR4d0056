front:
  text: 宛陵先生集卷第四十五
  hash: sha256:b0dafc254ba6fadc2d8c8d4229cc8367bb6cb1a481b7214889b55c2e7099e1b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_045-1a}
body:
  text: 宋宛陵梅堯臣聖俞著五月十七日四皷夢與孺人在宫庭謝恩至尊令小黃門宣諭曰今日社與􅀸喜此佳辰便可作詩進來枕上口占同謁未央殿共霑明主恩冕旒親日月蹈舞荷乾坤龍尾三重峻螭頭幾級尊德音欣社日撫語走黃門隂㑹皆如實陽開不復存空餘破窻月流影到牀垠依韻和吳季野題岳上人澄心亭空山舊逕緑苔滿古寺齋盂白薤蒸暑􅀨坐中飛漠漠野泉林外落層層從來勝絕皆離俗未有幽深不屬僧唯愛溪頭一㝷水莫聞流浪莫聞澄次韻和馬都官宛溪浮橋在昔當陽侯建橋臨大川洪波不爲阻馳道南北連何此小溪上擬􅁚坦且平馬頭分朱欄水底裁碧天白􅀨􅂃大笮斷虹生橫舷游魚不可見車􅀐乆臨淵􅀉隱靜山懷賢長老山有枇杷樹樹多獼猴羣高僧心不着一似五峰雲隨飈來溪口石上起氤氲果熟獼猴去自向瀑澗分次韻和馬都官苦􅀬日光亭午時赫若鎔黃金鳴鳶不生風流雲不成隂赤地有焦土烈野無沃霖涸潭深幽幽枯嶽高岑岑火龍將焚鬛陽烏多渇心肌膚非木石絺綌煩衣襟氷盤不可見空對瓊􅅼吟歷陽過杜挺之遂約同入汴滄海瀉玉自外天牛斗傍邊客正廻人􅀃維摩居士病我同王子雪舟來汀沙沮洳潮新落山日曈曚霧始開去約河隄春柳動與君吹紫歩徘徊和胡公踈送嶼師移居寶光寺宋日天王寺梁時太子園地猶隨世變物豈與人存欲問移居意還應避俗喧相期唯有月夜夜在高原胡公踈示祖擇之盧氏石詩和之盧肇家􅀽州太守􅅾山客來過盧家㝷怪石盧家百物今巳空唯石難移留舊蹟埋沒尚存三四分􅀨淋日炙如皴皵太守惻然呼徤兒荷鋤秉鍤爭來役徤兒掘土不爲堅旋旋剜沙見圭􅂩漸竒漸異人忘勞更索更深知幾尺痩峰削出嵩華骨虚竅鑿破蛟螭額千指曵繩車四輪擊鼓助力歸東陌東陌頭頭湖水傍黃泥洗盡何蒼碧故宅愈冷東湖喧貴賤競觀無礙隔太守自憐堅直心愛少憎多屢遭謫南至蒼梧及桂林名山徧訪無窮僻所宜厭慣不入眼向此歌吟尤愛惜我思永叔滁陽時大誇古翠菱溪􅀗作詩逺􅀉予與蘇高唱相隨無節拍今知賢人趣向同玩好託情忘俗格建康從事胡公踈一見詫君如李白雄才落筆瀉天河綴韻􅀌清仍險窄入探虎穴誰爲難辭通造化方能敵殿後吾雖膽力強獨鞭疲馬終無益逢曾子固前出秦淮來船尾偶攙鷰遽傳曾子固願欲一相見順風吹長帆舉手但慕羡楊子東園頭下馬情眷眷昔始知子文今始識子靣吐辭亦何嚴白晝忽飛霰我病不飮酒烹茶又非善冷坐對寒流蕭然未知倦眞州東園國賦有常計計者豈不賢日夜疲精神自鑒膏火前新春力有餘鋤荒東乳偏壘上以起榭掘沼以秋蓮竹栢爲冬榮桃李爲春妍役役吳楚艘來泊常留連下江忘其險入漕忘其邅許公作此意吾亦見其權不獨利於已願書棠樹篇行吟持轡趨代北妄意希名馬代北馬如雲由來重取舍王官待才能高下不苟且行都未脩飭黃金誰變瓦吾當保吾眞甘歸事田野寘蟻橘林下正在結實時附縁與出入安可責於斯養大不問細使逺不問遲逺遲必有報細大必有期休哉豢龍氏終自辨蛟螭僧子思以卷來見明珠與翡翠中國反好之詩書出鄒魯誦學無蠻夷服彼而習此養騂安問犂古者耕釣士處心􅊋處卑譬彼乃可語吾病強扶持依韻和楊州許待制竹拄杖楚竹翦霜叢何慙漢使笻鳩形􅊋用刻馬箠不同功挺特生難變支離分已窮輕肥思比鶴短髪任如蓬􅀝以爲高趣持之見素風歩郊聊實下行樂偶從東屢刺莓苔破深穿苑圃通辯繁時畫地黙意或書空古血有湘跡舊林無阮蹤將渠誰覺老要此豈關慵莫駭傾巢鳥湏虞蠧穴蟲誰能求道術跨作上天龍遇畵工來嵩朝來又入􅀭州郭千萬中人識者誰唯有來嵩曾畵我依俙見似昔年時省符上人春秋一萬八千字不間吳人楚人事佛衣儒談世已罕節行又與其徒異徃來楊州三十年曾見華堂荆􅁄地獨聞依舊坐焚香尚把殘編討遺意沈學士景休知眞州太守旛旗近國門州民迎望若雲屯家風自有東陽詠主道新移北海罇紅錦臂韝觀粉質塗金珂勒駕朱軒他時儻取春秋對莫以周襄出鄭論送杜君懿屯田通判宣州京兆外郞稱善書當時相與集江都日書藤􅁓爭持去長鉤細畫如􅃢瑚自玆乖隔三十載始駕吾鄕別乘車吾鄕素誇紫毫筆因我又加蒼䑕􅂡最先賞愛杜丞相中間喜用蔡君謨爾後倣傳無限數州符縣板仍抹塗䑕雖可殺不易得猫口奪之煩叱驅若君字大笔亦大穿墉􅃈質無長覘君到官治事餘呼諸葛試問渠張聖民學士出御書并法帖共閱之又一軸蘇子美書杜懿病焉氷膠楚舸歲將窮廣陵別乗憐老翁殷勤來邀強一徃虚堂肴酒羅甘豐我病胃寒不下咽七筯謾舉叨席中主人欲客心意歡岀以飛帛騰龍鸞刑政二字布楷法古今書帖未足觀坐間杜子好弄筆詆譏前軰無全完一見寶蹤天下妙稽首贊仰舌吻乾如此別識已太險我不頌詠還應難讀黃莘秘校卷嵇康昔彈廣陵散商聲高與宫聲緩託名山􅀑未傳人古桐紉絲絲不斷一聞殭卧竊其音世間雖得能亦罕賢明以之知盛衰愚昧以之爲妄誕頃年過我在蕪城忽聽長拍去欲􅂴鳯凰養雛飛未高雞鶩成羣翅終短龍章秀骨苦輕時繼作五絃湏欵欵贈許待制歲旦生旦天曆重更端哲人玆命世嘗聞月旦評况是高陽裔椒花作壽杯爆火通罏桂穹􅀛及蒼鶴尚以千年係曰惟五行秀復與明時契他日求老成不湏從渭汭答宣闐司理司理義趣深傳訓或得失後人語雖淺辨識猶百一歐陽最知我初時且尚窒比以爲橄欖廻甘始稱逆老於文學人尚不卽究悉宜乎與世士橫爾遭詬喞誓將黙無言􅀒暄方抱􅂰非非孰是是都莫答問詰歲暮宣叅軍辭如鮑昭逸粲然傾明珠襃我頗過實便言楚江萍光彩侔旭日自慙流浪蹤不得蒿芹匹復爲苦硬句酬報強把筆答鵞湖長老紹元示太玄圖鵞湖有鵞吾不問鵞湖無鵞吾不疑道士湏換黃庭經釋子自明太玄辭噫嘻兮此意逈與山隂別我亦曾非逸少爲新韻曾子進早春新雷歲旦發聲嚴氷管寒銷細滴簷花甲將看枝上拆虵鱗不復地中濳黃河分􅂀來應早白首歸朝意自恬強欲擬君爲秀句便無才思似江淹依韻和馬都官齊少􅀸酬和同時沈宋稱二豪曾􅀃龍門奪錦袍我對前流接淸唱㤗山輕重於鴻毛贈江寧王高士自古江南風俗美喜君高趣慕先賢藥無逺近寜論報家有圖書不計錢巳住秦淮借風月遍㝷吳國舊山川塵纓我繫未能解毎一來過駐􅀞船答蕭淵少府卷君先大夫臨終時夢中嘗賦曉寒歌􅀐龍跨魚不是誕直對上帝傳吟哦才如李賀天亦少宜其在世尤難多文章父子不相似君今平易祖襲郍錮鐵錦褧各有用高下安得與等科大都精意與俗近筆力驅駕能逶迤野雉五色且非鳯知時善鳴雞若何答孫直言都官卷具深相割啗不如無勇人以詩而酬詩徒用多少均我言雖至簡意切誰見親汲井欲到深磨鑑欲盡塵寒泉與青銅光潔靡故新臨觴報嘉貺醉語是天眞依韻王司封寶臣答卷王家再見仲宣詩魚目盈車換斗璣自愧不從靈蚌吐誰教相並夜蟾飛暫增光價千金重終覺枯陳一芥微已屈至珍來彈雀恩虵銜報此能希高士王君歸建業風􅀨起春寒乗潮曉帆送目看􅀲歩雲心近茅家洞忽覺柳已青來時枝尚凍羡爾向江南正開新釀甕吕寺丞家膳春雨薄無泥野苗青入爼深堂開畵圖飛鳥驚寒渚名筆今寂寥嘉賓競推許主人何太勤不異具雞􅁰趙秘校見訪文學儒家子儒本通天人蠨蛸尚先喜吾黨何迷津津亭一相過不笑復不嚬應此識恬泊曾匪慢爾賓答張令卷嘗聞甥似舅似舅詩尤少古意得河源新聲變春鳥讀之不敢倦十未能一曉顚倒文字間使吾心擾擾依韻答㤗州王道粹學士見􅀉君同黃鵠游海嶠我學白雲歸帝鄕已愛徤翅自鼓舞誰憐􅀌影猶飄􅀭安得相從在霄漢于今留滯嗟縶韁欲隨輕風挹君袂滿野春雨生迷茫依韻和孫浦二都官展墓由大明精舍而歸新松煙翠入衣巾􅀨後岡原不起塵霜露悲懷今正切曾非結客去㝷春拜壠忽生寒食心應縁春入感啼禽淚沾宿草根仍凍馬立荒沙跡巳深野老輟耕風料峭山房開晝日隂森歸鞍􅁍望原頭路􅇈歷輕煙物景沈張聖民席上聽張令彈琴一聽履霜霜滿足再聽緑水聲縁谷我行日月春波嫰苔沙􅀨侵魚目漁歌晩唱泛水來天浸滄浪光可掬坐中此意自絃生中郞五弄人難熟人知難熟獨善彈彈拍未終脂駕速鄭衞古來多喜聞卒章爲我歌淇澳時聖民赴齊少卿家㑹走筆送王琪江南二月草青青送子歸時已滿汀誰信而今有忠義秪知七日哭秦庭宣司理餉蒸鵝昔年相國籠之贈今日叅軍饟以蒸一咀肥甘酬短句定應無復謗言興宛陵先生集卷第四十五宛陵先生集目録卷第四十五五月十七日夜夢和題岳上人澄心亭和馬都官溪橋􅀉隱靜賢長老和馬都官苦􅀬歷陽過杜挺之和公踈送嶼師和示擇之盧氏石詩逢曾子固眞州東園行吟僧子思以卷來見和許待制竹拄杖遇􅀞工來嵩省符上人沈學士知真州送杜屯田宣倅閱張學士岀書讀黃秘校卷許待制歲旦生旦答宣闐司理答鵞湖長老和曾子進早春酬和馬都官齊少􅀸贈江寧王高士答蕭少府卷答孫都官卷和王司封答卷王高士歸建業吕寺丞家膳趙秘校見訪答張令卷和答王學士見􅀉和孫浦二都官聽張令彈琴走筆送王琪宣司理餉蒸鵝目録終
