front:
  text: 宛陵先生集卷第三十九
  hash: sha256:1516d3a7c70097cacdae415f366cd253d9650ca0aeedf6f3df32a661eed39208
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_039-1a}
body:
  text: 宋宛陵梅堯臣聖俞著韓子華遺冰六月侍臣方賜冰我賦得之從友朋開盤一見水玉璞置坐百歩無青蠅􅀬膚收汗起疹粟不有消渴同茂陵杜子每思赤脚踏韓老嘗苦如甑烝慙無二公才與學享此足與俗軰矜二十二日起居退聞宣三館諸公觀瑞蓮來朝十二旒將出未央殿微聞嘉蓮開獨許侍臣見嘉蓮其如何層樓擁霞片玉輦下天泉曰昃不知倦恩魚應亦喜跳沫珠欲濺誰憐與衆歸愽士臣䟽賤依韻吳沖卿秋蟲梧桐葉未老露滴玉井牀秋蟲如里胥促織何苦忙苒苒機上絲入夜爲䑕傷織婦中夕起投梭重徊徨那聞草根聲膏入然肝腸天子固明聖措意如陶唐下民唯力穡不見田疇荒豈知裒歛人督責矜徤强所以機中女心􅃲日月光年年租稅在聒耳信巳常哀哉四海人無不由此戕吳侯當㕔時靜坐愛初凉方將同佳人歡樂舉盃觴䌓鳴雜螇螰感愴情不皇况􅂪朝家恩兄弟登俊良意慮宜恤物以慰衆所望今者秋蟲篇不異七月章陌上二女素手搴􅇈䍦柔纎明春荑轉眄動桂葉陽語啓瓠犀阿姊金盛珠阿妺繅籍圭吹香襲行路豈獨下蔡迷無悔婦人未四十容貌巳改前男年踰五十􅄝慾固自偏勿以色敵心色衰心易遷勿以愛恃乆愛移乆多愆明鏡知惡看何湏妬嬋姢弔瑞新和尚示化何悲戚俱焚只衲衣巳隨原火盡空見野雲飛寫影誰方丈栽松舊翠微當年渡江鉢弟子獨將歸依韻和吳沖􅀸新葺南齋移病新秋厭直廬自將僮僕治前除巳栽楚客江邉草不學嚴陵瀬上漁紅穗拂欄何蒨粲緑叢無水亦蕭䟱從今有月君湏飮况與朋親共舍居江鄰幾遷居聞君遷新居應比舊居好復此假布囊家具何草草我貧無囊假來僮笑欲倒所笑還徃人生計不足道非用僮僕知雖貧自懷寶聞刁景純侍女瘧巳前時君家飮不見吹笛􅁎君言彼娉婷病瘧乆屢治隔日作寒􅀬經時銷膏脂毉師尤飮食冷滑滯在脾次聞有􅀑物水火隂以施乃因道士逐實得􅀑所爲手灑桃枝湯足學夏禹馳呵叱出門牆勿復顧嘔遺今雖病且巳皮骨尚尫羸豈暇理舊曲未能􅀞蛾眉當期重相見風月臨前墀景純以侍兒病期與原甫月圎爲飲古龍水底鳴素秋江雲不飛江賈愁金陵舊族天禄游家有善笛能娛侯憶侯前年罷姑孰自買蘄州飽霜竹腮肥頂瘦裁青玉鑚鑿商聲五音足牛渚磯邉夜泊時平波不起月中吹老魚跳舞􅀛岀泥雌蛟怨泣雄鼉悲新還中都人罕知交親奏酒隔簾幃丹脣一發妙響馳醉客欲見寧非癡昨夜劉郎辭玉巵主人勸謝當勿疑渠今纒瘧尚苦羸他日海蟾圎未遲圎未遲凉肝脾畏肝􅀬生腦脂生脛脂不得窺永濟倉書事神武立四極收兵銷衆豪輸糧來萬國積􅁃下千艘􅆛虎肥於豢麒麟老向槽中州無殍餓南土竭脂膏黃䑕羣何畏青鳩啄且嚎古梁生菌耳朽堵岀蠐螬樹腹懸虵蛻絲窠挂鳥毛塵埃雖自汨朱墨亦能操直宿愁風雨經年弊褐袍仲尼猶作吏我輩勿爲勞依韻和礠守王幾道屯田暑夜懷􅀉地厚天青㝠故交榮謝井何當一壺酒以昔相與傾君今二千石未徃戀山楹山楹夜對月􅀌懷豈忘情貴者幾何逝賤者幾何生夏簟且安寢明星上東城依韻和孫侔鴈蕩二首海􅁁巉絶有蒼山怪怪竒奇物􅁚閑百丈素流珠噴薄千重紅樹火回環逺㝷僧寺石屏下時遇野人雲屋間今日京華見君說便思輕舸出東關鴈蕩高高路莫通㘅蘆秋翼人雲峰山頭水濶不見影巖下沙平時有蹤千仞柱天何歛閃萬工揮筆漫輕濃葛巾蠟􅄚未能著空羡青蒼重復重赴刁景純招作將進酒呈同㑹日光如鎔金湧上滄海流一朝復一朝鑄出萬古愁大鑪石破碎世事安得休明月只照夜時時如屈鉤常娥與玉兎擣藥何所瘳大患不自治更被蝦蟆偷我思天地間二物最取尤措置尚如此細故曷用憂著書欲傳道未必如孔丘當時及後代見薄彼耽周功名信難立德行徒自脩勞勞於我生蔕挂同贅疣不如聽隣笛就其舉盃甌笛不煩教養酒不煩取求從今醉至春從夏醉至秋勿禁雞㹠魚間薦鶉鴈鳩况多􅀯方物醎醒美咽喉計較無以過試共阮籍謀薛簡肅夫人挽詞四首蕭公當貴日小吏引輕軒四德有遺美六親無異言立􅀌傳世嗣垂範在閨門澮水終歸柎秋雲逐去䰟嘗聞求子婿不似怒甘公莫以昔人比皆爲當世雄家聲新慶續國禮舊恩隆必與齊姜墓千秋蠬樹同冠劒將朝去常知好直言戒辭猶可託先見乆應存瑩白冰兼玉清芬蕙與蓀堂塗從此閉何日􅁲丘原美合周詩播䰟先岱嶽歸空堂遷舊榻素月照靈衣珠翠香沉匣丹青影挂幃百年親戚淚併作露霏霏送淮􅀯提刑孫學士淮􅀯木老霜欲飛順令恐縱諸侯威命書纔岀邸􅁺謁巳見衣繡車迎歸樂莫我聽筵莫迓清如蟾蜍夜吐暉不湏乆作平反吏自合橫經親帝闈八月三日詠原甫庭前林檎花秋蠧無完葉踈叢有瘁莖偶來庭樹下重看露葩榮衆自守常理獨開偏見情從今數霜月結子尚能成送河陽通判張寺丞從冨公辟子諒張公愛神鍔佩服近玉麟又拭華隂土光彩一以新百里無惡獸千里無􅁈人今朝欲何之去上延平津應當出匣飛騰波決秋旻送淮􅀯轉運李學士君錫王都重兵廩命使總八方淮􅀯舟車衝三楚籠利長惟時有才彥數計等桑羊八月賜詔行朱斾挿大航汴湍入秋漲東鼓下鏜鏜今日發大梁明朝過雎陽雎陽授經地父老認道傍同業八十人或貴或爲郎先生殁大官弟子無荷囊乃知詩書傳要在明三綱隋未聞仲淹來學去佐唐唐初稱名臣鮮及杜與房親見慕義人專門起輝光我聞房杜流巳顯惟王張雲漢幾萬里星宇爭耀芒歸來立螭頭莫愛魚稻鄕君錫與王伯庸張端明同在雎陽希文講下重送楊明叔并序行而有以贐者助所不足也車馬子有裘服子有貨貝子有所可贈者詩言爾故先爲七言以送將以道彼美而樂乎徃也子不爲重邀予以規又作五言應其請君將㑹稽去舊蹟可以嬉子因狀其美贈子臨路岐子不以爲樂但願有以規噫吾豈無說畏子未及禆旣求不語子吾曷􅃘子欺前年子渡淮夜泊洪澤湄有􅀑稱使者來吿風波期子時再拜謝乃被隣船嗤逡廵􅀑復至復附船家兒怒彼慢嗤士明當使驚危船兒傍舷廻走若一足䕫翌日各解舟岀浦風動旗子獨乗安流彼受橫浪吹此事非子傳焉得他人知昨逢令弟藴備述果不疑越俗素重鬼愼勿啓其私子口有仁義子腹有書詩子嘗談王道怪語固未宜近聞蘇才翁問子辟者誰得非外戚侯子怒巳翌眉今我倘得罪甘與蘇同之送董傅秀才之汝隂社燕巳歸盡秋鸎猶繞林乆爲梁國客不起灞陵心徒歩赴朋館逺遊無槖金汢君丈人意莫入楚鄕深鄰幾常止此行送張子野屯田知渝州舊居苕溪上乆客咸陽東歸來得虎符馳馬向巴中歌將聽巴人舞欲教渝童况嘗善秦聲樂彼渝人風忠州白使君竹枝詞頗工行當繼其美貢葛勿怱怱送楊子充愈知資陽縣家近古臨卭聞多木蘭樹其人襲芳馨乃有相如賦成名三十年始見列鴛鷺岀爲資陽長秋􅁂巳􅀧素天子愛黔􅀺歸與蜀民諭當時同洛陽過半作丘墓屈指今所存無如君􅇰故唯酒可餞行不飮車空駐送司馬學士君實通判鄆州君家世典史君復續祖爲蘭臺未成書汶陽從巳知將行我何贈一誦溪堂詩聞彼多蒲魚可助􅂦與巵在昔阮嗣宗初赴東平時醉扶乗蹇驢圖畵猶可披今見國門外徒馭不驅馳十里馬一歇五里車一脂不得同鴈羣相送過寒陂送陳殿丞知韶州從益韶州使君行請問韶石名傳聞古帝舜石上奏九成鳯皇爲之下朱鳥不復鳴舊祠亡玉琯四序安得平至今􅀯方􅀬臘月裘服輕事外共廢酒曲江風物淸􅀉岳州孫屯田琳從來洞庭好都在岳陽樓明月一千里寒光三萬秋年華有時盡風物不知休太守憐予句應如沈隱侯大愚大愚不量能品藻輙巳出朝以軻爲同暮以丘爲四其人豈鷹雀鳩蛤化五日指鹿危二世師歆造新室雖云詐力尚終日殞斧鑕宛陵先生集卷第三十九宛陵先生集目録卷第三十九諱子華遺冰宣三館觀瑞蓮和吳沖卿秋蟲陌上二女無悔弔瑞新和尚和沖卿新葺􅀯齋江鄰幾遷居聞刁景純侍女瘧已景純期原甫飮永濟倉書事和幾道暑夜懷􅀉和孫侔鴈蕩赴景純招作將進酒薛蕳肅夫人挽詞送淮􅀯孫提刑詠原甫林檎花送張寺丞冨公辟送淮􅀯李轉運重送楊明叔送董秀才之汝隂送張子野知渝州送楊子充知資陽縣送司馬君實鄆州倅送陳殿丞知韶州􅀉岳州孫屯田大愚目録終
