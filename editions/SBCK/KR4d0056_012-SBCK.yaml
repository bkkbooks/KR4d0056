  text: 宛陵先生集卷第十二
  hash: sha256:71b7a153a119928ca71c286588f0e4bba7114bb9d1b8d4ad13249163958dd977
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_012-1a}
body:
  text: 宋宛陵梅堯臣聖俞著擬李益竹牕聞風􅀉苗發司空曙牕前風動竹聲碎影仍繁衝扉忽自啓出候初迎門驚雀枝未定乳蜂窠暫翻飄飄一舉袂聊更遲來轅擬宋之問春日翦綵花應制上林花未有中禁綵先成葉逐翦刀出蘂從粧粉生紅繁内人手香染侍臣纓不是將春競天心重發榮郡閣閱書投壼和呈相國晏公較量人世無窮樂羅列平生未見書聊奉投壼祭征虜休言繫劒馬相如畵樓晩去聞寒角縹帙看來落蠧魚日􅀗誨言皆舊學不慙貧賤帶經鋤梅花江南臘月前溪上照水野梅多少株艷薄自將同鵠羽粉寒曾不逐蜂􅂡桃根有妹猶含凍杏樹爲鄰尚帶枯楚客且休吹玉笛清香飄盡更應無擬張九齡詠鷰􅆌􅆌􅀟來鷰長年與社違任從新曆改只向舊巢歸永日當人語輕寒逆􅀨飛自親梁棟慣不識海鷗機遲雪風嚎大澤晩雲覆女墻低驚霰夜將集廣庭朝復迷鶯鳴寒蔽日鴈泊凍生谿會待飄花宻開軒意外題欲雪復晴隂雲不成雪碧瓦有繁霜日氣生簾額冰條結井牀飛烏鳴自樂古木晝仍殭誰意斗晴後苦寒勝北方送􅂪寺丞赴郢州郢國當時唱猶傳白雪眞問今非昔日和者幾何人客自射飛鴈漁能供躍鱗芳洲墮馬處吾祖漢名臣聞角一聲催客夢星斗轉西簷風卷梅花去愁從柳塞添馬鳴霜滿鬛龍泣凍生髯高樹朝光動城頭落海蟾和人雪意凍雲低垂野逺樹昬未分朝來庭竹上摵摵霰巳聞扣門有兵吏嘉命傳相君趨閤展熊席卷幔飄爐薫桂漿貯榼美馬乳薦實蕡賓屬兩三人從容奉評文逺稽先儒言風賦可以羣宻置筆與硯唯待雪雰雰雪旣不可待日暮人半醺明朝􅀗方楮徤思欲凌雲詠楊高品馬厩猢猻嘗聞養騏驥辟惡繫獮猴供奉新教藝將軍舊病偷聊看縁柱杪尚想傍崖頭更祝南州使如拳試爲求和欲雪二首貂裘著不暖牙帳曉初開朔氣還先及流風亦屢催擬聞人詠絮將見使傳梅公復憂民畝龍沙幾日來雪欲漫天落雲初著地垂臂鷹過野徤走馬上冰遲公子多論酒騷人自詠詩都無少年意只卧竹牕宜梅花巳先羣木得春色不與杏花爲比紅薄薄逺香來澗谷踈踈寒影近房櫳全枝惡折憎鄰女短笛橫吹怨楚童墜蕚誰將呵在􅁂蘂殘金粟上眉蟲和十一月八日圃人獻小桃花二絶當時開向杏花後今日綻當梅蕚前不畏雪霜何太甚繁英如火滿枝燃前占寒食一百六算到其時未合開丹艷巳先灰管動不由人力與栽培和梅花時時不甘春著力年年能占臘前芳水邊攀折此中女馬上嗅尋何處郞山舍更清栽作援鳯樓偏巧學成粧團枝宻宻都如雪野雀飛來翅合香再送􅂪寺丞赴郢州彎􅃓落飛鳥少也向幽州來作漢官屬耻爲戎國留身輕抛馬轡地暖猒狐裘慣見顏如玉江邊問莫愁擬王維觀獵晏相公坐中探賦白草南山獵調􅃓發指鳴原邊黃犬去雲外皁鵰迎近出長陵道還看小苑城聊從向來􅀐回望夕陽平擬陶潜止酒多病願止酒不止病不巳止之懼無歡雖病未宜止且欲止人事事止不經耳次誦止足言行當止田里田里止誰親止樂山水美旣止何所助唯酒與止喜以言止不止未必止爲是止酒儻不瘳枉止徒可耻止亦隨化遷不止等亦死愼勿道止酒止酒乃君子擬杜甫玉華宫松深溪色古中有鼯䑕鳴廢殿不知年但與蒼崖平􅀑火出空屋未繼華燭明暗泉發虚竇似作哀絃鳴黃金不變土玉質空令名當時從輿輦石馬埋􅁄荆獨來感舊物煎懷如沸羮區區人世間誰免此虧盈擬韋應物殘燈照此寒夜中欲殘紅燼尾空堂㓕復明獨宿擬山􅀑和十一月十二日與諸君登西園亭榭懷舊書事冬日蕭條公府清獨將諸吏上高城而今何處異疇昔鐵墓下聞狐夜鳴又莎徑依然見莎葉蓮花無復有蓮花更看白水滿城下􅀃着當時龍骨車和小􅀨蛟龍潠白霧天外細濛濛霑土曾無跡昬林似有風卷旗妨酒舍濕翅下洲鴻稍見斜陽透西雲一半紅擬韓吏部射訓狐黃昬月暗妖鳥鳴尨然鈍質麤豪聲慿凶自異立屋角潜事觜吻欲我驚豈知慣聞此醜狡呼集􅀑物夸隂獰夕盗雞雛無畏避曾遭彈射沉泥坑汝今病翼未甚愈還作舊態侵平明陽烏瞳瞳出東海照汝宜喪膽與精何爲世人苦憎汝汝常盗物資已榮儻有􅃓矢勿汚辱殺此非得去惡名養雛四三巳相似眼腦實異鸞皇生一朝車輪翅墮地狐䑕入穴梟黨烹得韓持國書報新作茅廬聞君作茅廬正在西軒西定移舊􅂼圃稍改新藥畦其高如伯鸞况亦有隱妻今方漢德盛不必之會稽和新晴雲開日照㦸衣寒淨掃平沙路巳乾吏散庭除少公事畦挑芽甲足春盤要聽林上鳴鳩變試歩塘隂緑水寛誰詠陳根有微緑烏蟾易失似跳丸責躬詩所稟介且拙嘗耻朋比爲皎皎三十年半語曾未欺身微德不著尚使人見疑省已當自責實􅀒聖相知聖相雖明察不假束藴辭扣言巳可罪引去豈非宜嘗惠山泉吳楚千萬山山泉莫知數其以甘味傳幾何若飴露大禹書不載陸生品甞著昔唯廬谷亞乆與茶經附相襲好事人砂缾和月注持叅萬錢鼎豈足調羮助彼哉一勺微唐突爲霖澍䟽濃旣不同物用誠有處空林癯靣僧安比侯王趣糟淮鮊寒潭縮淺瀨空潭多鮊魚網登肥且美糟漬奉庖厨昔聞漁父賢嘗勉楚人餔楚人懷沙死葬腹千歲餘今玆有遺意敢共盃盤踈和臘前漢家戍日看看近雲景蒼茫巳歲昬欲驗方書治百藥預調飛走獵平原土人薫肉經春美宫女藏鈎舊戲存獨把凍醪驚節物草芽微動見庭萱題臘藥尚書晏相公臘日投壺輸詩七首便以臘日所用物賦先成四首上呈頽顏早覺衰乃藉藥扶持及此季冬日預脩來歲宜􅂦成無大見􅁡煉有蜂知借問月中兎長年何所爲臘酒韋氏月録云臘日造四月成汲井轆轤鳴寒泉碧甕盛欲爲三伏美方俟十旬清夢憶黃公舍徒聞韋氏名熟時梅杏小獨飮効淵明臘脯畋獵得封獸割鮮爲腵脩易甘非愛日不敗任經秋可用資賓豆何妨鄙薦䐹考之新月録美脆勝庖牛臘笋南岡深竹養去聲下有鷓鴣鳴破臘初挑箘吕氏春秋日和之美竹越之簵箘誇新欲比瓊薦盤香更美案酒味偏清馬援當時見曾將禹貢評伏波至荔浦見冬筍上言禹貢厥包橘柚疑是謂也和挑菜十二月十二日中圃本膏壤始覺氣候偏出土蓼甲紅近水芹芽鮮挑以寶環刀登之饌玉筵僻逺尚含凍安占春陽前造物非有意地􅀔使之然和臘日獵鼓逄逄奏寒冰齾齾消正憐風日暖不似雪霜朝敢問祠黃石休從擊皁鵰楚郊梅蕚未壠麥巳多苗啄木二首十二月十二日陪歩後園所聞見城頭啄枯楊城下啄枯桑朝啄不停咮暮啄不充腸寒風正洌洌蠧穴蟲且殭况玆園林逈剥剥響何長食蠧非嫌蠧聲來古木高誰將琵琶弄寫入相思槽語鴆此以上三首􅀘前投壼所輸七首客語南方鴆啄虵掀巨石遂令山中人多竊禹歩跡誰云不可轉鳥啄猶能擲和淮陽燕秀才我官忝博士曾昧通經術前因辟書來亦不習文律循舊臨學宮虎革被羊質􅀝席未能講占牘聊置日朴鈍旣若玆愧彼噉􅀥栗令者登俊賢充詔冠庭實􅀖伯乃宗公惟帝舊良弼置醴餞以行行行季冬月騏驥入覊駕千里終不蹶慙予延䕃人安得結子韈心雖羡名􅂣才命甘汩沒禄仕二十年屢遘龍牓揭在昔見麻衣于今盡超越是以對盃觴謹嚴微敢忽寧唯畏後生自恨踈節骨肴羞羅食案包核備時物里婦或窺觀戸下紅裙出歸應願生男生男付􅁓筆乃信讀書榮况卽服緼韠長歌食苹詩聲淡異鳴瑟和石昌言求牡丹栽昔年藥欄下巳多香草名更移花本去聊助日邊榮莫問西都品存吾舊友評㑹應包蕚吐可與魏姚并帶土歸金谷封根近玉京謫僊方醉詠不􅀝錦宫城歐陽永叔有花品和十二月十七日雪窮冬勁臘巳過半曉雪先春何處來豈是全資南畝麥多應不分北枝梅庭中未許野童掃林上唯愁狂吹催莫問兎園同賦客相如居右最爲才建溪新茗南國溪隂暖先春發茗芽采從青竹籠蒸自白雲家粟粒烹甌起龍文御餅加過玆安得比顧渚不湏誇送詹彥廸祕校之越夙懷山水心夢寐向東越聞爲會稽行獨此羡明發渡江信春潮泊館食野蕨平時異梁鴻但泛鏡湖月謝人惠茶山色巳驚溪上雷火前那及兩旗開采芽幾日始能就碾月一罌初􅀉來以酪爲奴名價重將雲比脚味甘廻更勞誰致中􅍽水况復顏生不解杯和立春玆日何所喜所喜物向榮㡜縷作翠柳意先新陽生塗金鏤爲勝義不首時輕増年巳歎老斗酒聊自傾和謝仲􅃓廷評新理北園園吏乗冬和荷鋤去宿莽主人因其勤築土截荒壤移枯復窊缺剗徑就平廣東北􅀝高城巇險不可上愛彼林木深便爲丘壑想更待春風歸日探花卉長但願多置酒應得時一徃和謝仲􅃓廷評栽竹移得溪邊翠來爲庭下隂惜根存舊土帶筍助新林暗換蕭蕭葉知虛寸寸心東風莫搖撼培壅未應深和歲除日一年三萬六千刻玉漏唯餘十二時去日苦多誰會惜殘隂全少頗能知巳驚顔貌徐徐改不奈烏蟾冉冉馳萬國明朝賀新歲東風依舊入春旗明井在城東南顯晦有難必孰云幽不明深井發寒泉光若月色盈隂陽信竒變曷用究厥情譬彼出炎火投薪丹熖成吾人勿驚異但自汲缾罌楊公懿得頴人惠糟鮊分餉并遺楊叔恬頭尾接清淮淮魚日登網吳蒓芼羮美楚糟增味爽云誰得嘉貺曾靡獨爲享乃知不忘義分遺及吾黨和楊袐校得糟鮊食魚何必食河魴自有詩人比興長淮浦霜鱗更􅃾美誰憐按酒敵庖羊春雪臘前望盈尺姦縮不應乞萬物及向榮而反事凝凓與􅀨暗爭能不念傷彼茁雖然便消釋終是乖氣律新陽豈憚沮暴柳未爲屈隨風􅀔更巧著樹媚且密誰將背時棄乃欲逞果必摧花自作花旋積旋巳失上天施命令冬春不相匹生物與死物其道安可壹嗚呼此飛雪何爲在今日和謝公儀學士正月十七日􅀨後復雪本祈春􅀨成春雪應悞小桃先次開西漢枚生誰復召南朝何遜自多才潑除燈火上元去挫􅁍勾萌六出來前此解衣争貰酒不知爲瑞與爲災先是七日祈􅀨九日霈然至于今伐桑二月起􅁞事伐桑人阻饑巳傷持斧缺不作􅀒薪非聊給終朝食寜虞卒歲衣月光無隔礙􅀡照破荆扉夢登天壇夜夢登天壇壇上兩僊人來時乗白鳯去時乗白麟我問不我語颯颯山中􅀨寒食日過荆山山郵雖禁火嶺樹自生煙嗚咽同歸櫓悲哀欲問天泣親非泣玉流淚劇流泉春鮆橫刀膾何心更食鮮濄口得䨇鱖魚懷永叔春風午橋上始迎歐陽公我僕跪䨇鱖言得石瀬中持歸奉􅄌媪欣詠殊未工是時四三友推尚以爲雄于兹十九載存没復西東我今淮上去沙嶼逢釣翁因之􅀗二尾其色與昔同錢將青絲繩羮芼春畦菘公乎廣陵來值我號蒼穹何爲號蒼穹失怙哀無窮烹煎不暇餉泣血語􅀌􅂨生平四海内有始鮮能終唯公一榮悴不媿古人風歲寒亭種花邀青春種栢要晏歲乃知風露前已辨雪霜􅀔時俗愛芳菲不妨鳴鶗䳏他年都門歸寧昩始終計澄虛閣箘圃隔􅅝紛閑來衣練裙檻邉生静意水底見微雲斜照􅅆晴景幽芳襲薄薫主人多賦詠不减沈休文舟次泗上逢黃令因以詩送向曉入汴尾隔河聞人聲得聲不得貌問識舊時名泊舟忽來及袖詩多賢英言除丹徒宰暫作七閩行東南幾千里日夕挂帆輕渡江蒓巳老未足助杯羮最知便道出先見縣人迎依韻和許發運游泗州草堂寺之什入寺豈縁齋阮公方詠懷心將超紫府手欲拍洪崖雲霧波初淨塵埃鑑巳揩但能傾玉醑不假列金􅁫逺客歸空􅄩千檣密自挨醒論時事正醉戴野巾喎風俗通吳楚清渾見汴淮遙知香刹外獨與賞心諧依韻和許發運眞州東園新成䟽鑿近東城蕭森萬物榮美花移舊本黃鳥發新聲曲閣池傍起長橋柳外橫河渾逺波漲雨急斷虹明雲與危臺接風當廣厦清朱鬐有自躍翠栢種初生香草猶能識山苗未得名南峰及西嶺常共酒盃平宛陵先生集卷第十二宛陵先生集目録卷第十二擬李益竹窻聞風擬宋之問春日郡閣閱書梅花擬張九齡詠鷰遲雪欲雪復晴送􅂪寺丞赴郢州聞角和人雪意詠楊高品馬厩猢猻和欲雪二首和梅花和十一月八日獻桃花和梅花再送􅂪寺丞擬王維觀獵擬陶潜止酒擬杜甫玉華宫擬韋應物殘燈和與諸君登西園亭和小􅀨擬韓吏部射訓狐得韓持國作茅廬和新晴清躬詩嘗惠山泉糟淮白和臘前題臘藥臘酒臘脯臘笋和挑菜和臘日啄木二首語鴆和燕淮陽秀才和石昌言求牡丹栽和十二月十七日雪建溪新茗送詹祕校之越謝人惠茶和立春和謝廷評北園和謝廷評栽竹和歲除日明井楊公懿惠糟鮊和楊秘校得糟鮊春雪和謝學士􅀨後雪伐桑夢登天壇寒食過荆山濄口得􅀟鱖魚歲寒亭澄虚閣泗上逢黃令和許發運游草堂寺和許發運東園目録終
