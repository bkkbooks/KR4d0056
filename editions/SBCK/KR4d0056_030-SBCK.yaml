  text: 宛陵先生集卷第三十
  hash: sha256:8848b17989f9c8c589dd53875bde39e2f18541878aba874d4864f0e9ce8dd64d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_030-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送李密學赴亳州倦輸關内粟遂請頴川符治績可稱􅇰士民將以蘇譙都君命重苦縣祖風殊僊檜畱陰在甘棠卽化敷行舟通遠水候騎溢長衢他日人懷望烟雲自滿湖送樊秀才歸安州開元有謫僊酒隱向安陸子嘗慕其人文字不拘束月下每醉吟落􅁓輙􅁆幅今當安陸歸白酒村中熟一名猶未成􅀟親淚盈目切莫苦㗸杯無心不擇祿去去烟水間野禽嘷古木聞聲不得名將投山舍宿此􅃐自可嘉非如走塵轂依韻李密學合流河口見懷二水交流抱閭井淸潭幾曲自淵回巳浮畵舸遥遥去更愛􅀟鷖泛泛來觀理􅂼野薺不堪食蕪菁今正肥夏畦人所病老圃方可窺乳雀爭㗸蝶鳴鴉各護兒扵陵豈復有空學桔橰爲哭尹師魯謫死古來有無如君甚􅁈文章不世用器業欲誰論野鳥災王傅招辭些屈原平生洛陽友零落幾人存泛舟和持國綠源去未窮夾岸樹濛濛弱蔓低侵水殘芳不隱叢浣衣思越婦折笋擬江童薄暮廻船處潭魚動鏡中欲晚訪韓持國忽道損見過不克徃持國示詩因荅西雲沉日脚命僕駕我車我車巳在庭有客方詣廬談笑不覺夕雞􅁰且煩渠重約勿以怪但當摘園􅂼送京西轉運李刑部移京東轉運鉞列藩環王都遂分東西道統制連别京守臣多碩老外臺持權綱才具必美好公今且更踐入用頗不早乃令山東粟餉饋歲可保古路趨汶陽長風吹緑草送李庭老歸河陽五月馳乗車歸心豈畏暑道上多淸陰日中不遑處函谷自控帶大河無險阻時平獨徃還拜壽觴屢舉詠􅀟杏子其核亦然子核成􅀟杏將寄同心人定棲鴛鴦魄爲物豈無因和王仲儀楸花十二韻春陽發草木美好一同時桃李雜山櫻紅白開䌓枝楸英獨歩媚淡紫相參差大葉與勁􅆬蔟蕚宻自宜圖岀帝宮樹聳向白玉墀高絶不近俗􅈂許天人窺今植郡庭中根遠未可移但欣東風來不恨和䝭遲山禽勿蹙􅂿蜂蝶休掇之昔聞韓吏部爲爾作好詩愛陰無纖穿就影東西隨公今亦牽此端坐曾莫疑目昏我目忽病昬白晝若逢霧窺驚􅀟物􅀟書輙下筆誤來人髣髴是飛鳥朦朧度紜紜孰辨别此巳忘好惡送韓八太祝歸京師求醫少年絜而􅃾茸茸頷有鬚冐􅀬跨馬去去去天王都借問去何謂就醫將疾驅客曰實誑我徤壯其非夫敢告固不紿但怪所見愚瘠者未必病病者未必癯天馬不着肉日走萬里途山熊豈無膏養體唯恐痡滯結在扵内安得形肌膚厥貌雖美好厥疢勿須􅁷療之欲其漸熾之非愛軀此行不飮别安得持酒壺記春水多紅雀傳云自新羅而至道損得之請余賦赤羽異蒿鷃來自東夷國群集成臯間翩翩皆一色舉臆發朱砂爲瑞應火德穿屋彼非􅁼啄粟慙與食淸聲殊啁啾所蓄每陋逼應當放之去重展萬里翼持國遺食乞食非爲貧妻病妾且死晨㸑不煖釜朝飯亦輟七遺我我所恤食我我所耻我耻曾我求我恤寧我止應乏豈在豐赴義實未鄙漂母殊下鄕爲惠得終始捫蝨得蚤茲日頗所愜捫蝨反得蚤去惡雖未殊快意乃爲好物敗誰可必鈍老而狡夭穴蟻不囓人其命常自保同道損世則元輔㳺西湖扵卞氏借􅀟鶴以觀塘蒲䕃綠水菡蓞艷修渚想像華亭野但欠鳴鶴侶同來三四人趣向頗相與思見此淸禽無能覿翔羽城隅有大第世本官吳楚嘗同太湖石不惜持金取欲作園林勝園林寧暇覩今當問其家借賞無吾拒果亦致之來􅁬毛如喜舞雖生滄海心翅重不得舉還爾稻􅆝貪崇丘在何所送上虞孫主簿稽山參雲深剡水與天碧行將啼鳥親翫不㳺鱗隔况世住新安又嘗爲粤客風物知所諳窮幽梯翠壁寄題金州孫御史處陰亭有形則有影畏影當念形日月難乆晦處陰乃暫停光照不復離疾走何所寧當是誚尼父我軰烏忍聽結廬雖可託夜燭亦熒熒􅈂躬觀罔兩將此同醉醒石榴榴枝苦多雨過熟坼已半秋雷石罌破曉日丹砂爛任從雕爼薦豈待霜刀判張騫西使時蒟醬同歸漢七夕古來傳織女七夕渡明河巧意世爭乞神光誰見過隔年期已拙舊俗驗方訛五色金盤果蜘蛛浪作窠同諸韓及孫曼叔晚逰西湖三首晚日城頭落輕鞍果下凉野蜂㗸水沫舟子剝菱黄木老識秋氣徑幽聞草香幅巾聊去檢不作楚人狂爍電未成雨凉風先入衣青天忽開影紅日尚餘暉蛺蝶作團起蜻蜓相戴飛嘲謔不覺夕跨馬月中歸舟中演滿意不淺却坐林塘景欲昏翠色蜻蜓立菱蘂靑絲騕梟秣城根韓玉汝遺澄心􅁓二軸􅀄得此物歐陽永叔又得扵宋次道又得扵君伯氏子華今則四矣三得澄心􅁓吾嘗再有詩粗能條本末不復語興衰堪入右軍跡慙無㓜婦辭君家兄弟意將此比烏絲和王仲儀二首㳺伏栢林下食栢遂生香空知噬臍患豈有周身防赤豹以尾死猛虎以睛䘮儻或益扵用捐軀是其常凌霄花草木不解行隨生自有理觀此引蔓柔必憑高樹起氣􅁼固未合縈纒豈由巳仰見蒼虬枝上發彤霞蘂層霄不易凌樵斧誰家子一日摧作薪此物當共委七月二十一夜聞韓玉汝宿城北馬鋪暗樹秋風擺葉鳴桃枝竹簟冷逾淸孤燈淡淡短亭客半夜蕭蕭聞雨聲夢過三陵夢過漢陵間秋風石馬閒當年侍臣淚泣盡向三山詠扇翦紈成薄質誰將擬月輪閔竭夏后德同我天王仁及至爲時用豈必美畵人何憂秋風來退保蔵其眞送曼叔襄城尉昔君乗紫騮來獵荒城下復乗紫騮去不逢亭長罵溪風欲渉時山雪獨歸夜此趣信所諳羇官莫悲叱送吳給事自許昌移淮西􅈂道昔參輔獨將天下憂忠言悟明主退請拜諸侯坐閤政方舉移藩心所求蔡人迎且喜許俗愛難畱夾路車徒盛分壃禾􅁰秋穆陵無夜閉仁化自公修亳州李宻學寄御􅀥一篋沛譙有鉅􅀥味甘蜜相差其赤如君心其大如王􅀲嘗貢趨國門豈及貧儒家今見待士意下異盧仝茶食之無猒飫詠德曾未涯九月五日夢歐陽永叔朝鏡惡白髪夕夢對故人常恨道路隔忽喜顏色親相笑勿問年靑銅早傷神雞嚎天欲白向者猶疑眞自尉氏南至京皆水及人脛陸行畏水深舟行畏水淺河流去時閤涂潦歸時踐事與時相違我慙行處蹇人生莫爲客爲客此安免九月十六日自許昌􅅆至京師胥平叔宋中道迓于郊外今日至國門二子來迎我適遇信陵塜塜􅁄秋葉墮翩翻隨人飛拂馬右或左謂此獨無情亦與吾意可裴如晦赴河陽幕嚎風一夜動作雪欲愁客客莫苦嗟行農望明年麥方來笑語同又是關河隔主人賢且智不待子所畫送韓子華十月拜掃白露巳變霜孝心竟悲惻薦衣如念存拜壠不遑息帶劔蓬池外兼程困馬力禮畢便當還扵誠乃爲得送韓六玉汝宰錢塘予嘗訪林逋湖上頃㝷高士廬正值浸湖雪雪中千萬峰參差縣前列僧居或隱見岸樹隨曲折驚鳬如避人遠向寒烟滅濳希爲子男儻得遂䟱拙今逾二十年志願徒切切方聞落君手與我曾未别景多詩莫窮歸載􅎹車轍得曾鞏秀才所附滁州歐陽永叔書荅意客從淮上來徃問故人信袖衘藤􅁓書題字遠巳認旣喜開其封固覺減吾吝新詩不作寄乃見子所愼向來能如今豈有得觀舋􅀯方歲苦􅀬生蝗復饑饉憂心日自勞霜髪應滿􅁂知予欲東歸曉夕目不瞬貧難乆待乏薄禄藉霑潤雖爲委吏冗亦自甘以進相望未得親終朝如抱􅐄追詠崔奉禮小園前此訪君時巳觀堂宇邃安知中屏開自有幽林致花搴嵓桂紅石擘雲根翠正當秋風來不見摇落意日得吟其間何須去爲吏宋中道快我生女爾嘗喜詛予生女竟勿怪今遂如爾口是宜爲爾快亦旣以言酬固且殊眦睚慰情何必男茲語當自戒詠宋中道宅㯶櫚青青㯶橺樹散葉如車輪擁蘀交紫髯歲剥豈非仁用以覆雕輿何憚尅厥身今植公侯第愛惜知幾春完之固不長只與薺本均幸當勅園吏披割見日新是能去窘束始得物理親詠秤聖人防爭心衡權爲之設後世失其平有星徒爾列物物尙可欺銖銖不須别將淳天下民安得必毁折詠􅁚韓子華邀賦軀大力無用遠物賞馴柔食芻與飮水百倍扵馬牛猶能絡金覉不可伏車輈蒼舒曾智秤千鈞空􅎹舟依韻荅惠勤上人釋子本樂靜宜不事物牽我慙姑蘇守復賞杼山然三歲與之别其學巳增前忽此有來贈老拙謬躭研荅顯忠上人驅馬傍馳道歸自許西偏高車非舊貴立避槐樹邊心雖欲徃謁僕餒行不前是甘處窮巷晨笑微生烟儻有好事者扣門與留連或有袖中詩語熟氣頗全曾不􅁼緇褐始可令勉㫋京師百許寺知幾相差肩送韓仲文奉使徃使匈奴國持節豈辭遥朔北正苦寒風汝與雪飄燕山何處是漢銘應巳銷前車渡氷河後騎鳴金鑣行行至穹廬尊我不敢囂玉爵親獻酬名裘進狐貂禮成復命日菀抑舒楊條送劉司勲奉使授命岀絶域北至單于庭駞鳴沙磧遥馬倦朔雪零幽州古道上胡笳應夜聽嘗聞昔時語􅀯看北辰星使囘儻可記乃得驗天形依韻和歐陽永叔秋懷擬孟郊體見寄二首我居西北地秋無東􅀯風木脫不塞望高臺空九重音塵安可得鴻鴈鳴霜中日看紫苔生乃見三經窮一聞離騷篇寫盡楚客胸胸懷如寶匣夜夜吼生銅秋思公何高堆積自嵱嵷岀爲悲秋辭萬仭見孤聳念我老扵詩我髪實種種而後傷故人故人多作塜陰風夜木嘷窸窣聞􅀑悚獨我忘形骸百事乃纎冗不眠霜月上霜月如可捧裴如晦自河陽至同韓玉汝謁之朝聞單騎歸徑走至其第扣門童僕頑拒我色甚戾不顧遂登堂有馬堂下繫辨詐大呼卿稍應西屋際逡廵冠帶岀靑綬何曵曵有似縮殻􅀛藏頭非得計况與二三子交分乆巳締恕爾避客􅀹新還復新婿詠王宗說園黄木芙容水中兼木末相擬有嘉花玉蘂圻蒸粟金房落晚霞渉江從楚女采菊聽陶家事與離騷異吾將搴以誇二馬舊馬十年跨老劣多緩行新駒三萬錢頗愛舉蹄輕不使異芻林均飬存其情君門趨早朝風勁力巳生依韻和許主客詠影荅影陶濳興長吟爲我聽與之相遇日曾不異扵形動靜隨生趣存藏委曜靈莊周疾走意推本置諸銘寄題周源貟外衢州萃賢亭昨朝江􅀯客語子川上亭有時飛雨來不見前山靑卉蕚人未識鳥響日可聽旣將遲賢者無使童僕扄荅楚僧智普始與吳僧顯忠來過今見二人詩進扵舊矣我􅀄見子時子作楚人語復與吳客來音俱變齊魯乃知乆處益薫蕕可同舉更當富扵學茲言􅊃以補鴨雛春鴨日浮波羽冷難伏卯嘗因雞抱時託以雞窠暖三旬殻旣坼乳毛寒脛短雞寧辨其雛翅擁情欵欵一日向水涯所禀殊未斷泛然去中流雞呼心悹悹人之苟異懷􅀒義不足筭有志在飬毓勿論報德限有覩十一月七日來恨我馬遲去恨我馬疾馬蹄塵作雲巳隔粲然質時時顧且遙亂緒如有失宛陵先生集卷第三十宛陵先生集目録卷第三十送李密學亳州送樊秀才歸安州和李密學見懷觀理􅂼哭尹師魯泛舟和持國荅持國示詩送李轉運移京東送庭老歸河陽詠􅀟杏和仲儀楸花目昬送韓太祝求醫賦紅雀持國遺食捫虱得蚤同道損逰西湖送上虞孫簿寄題金州處陰亭石榴七夕同諸韓晚逰西湖韓玉汝遺澄心􅁓和仲儀麝香和凌霄花聞玉汝宿城北夢過三陵詠扇送曼叔襄城尉送吳給事移淮西李密學寄亳州􅀥九月五日夢永叔尉氏􅀯至京水及人脛宋平叔郊外見迓裴如晦赴河陽幕送子華拜掃送玉汝宰錢塘得曾鞏附永叔書追詠崔氏小園宋中道快予生女詠次道宅㯶櫚詠秤詠􅁚子華邀賦和荅惠勤上人荅顯忠上人送韓仲文奉使送劉司勲奉使和永叔秋懷見寄同玉汝謁裴如晦詠黄木芙蓉二馬和許發運詠影寄題衢州萃賢亭荅楚僧智普和鴨雛有覩目錄终
