front:
  text: 宛陵先生集卷第六
  hash: sha256:804c0a1d1cd30533b700dd83d6e942c44bd61016dbe6377477a8c8b725694d1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_006-1a}
body:
  text: 宋宛陵梅堯臣聖俞著祫禮頌聖德詩􅄎哉孝享將事于寧文武卿士􅃣劔在庭爰俟帝齋風霰其零風霰不已鈎陳豹尾龍旂太常立列比比帝居路寢百辟就次至于榖旦漫漫翳翳帝入靈宫左撞黃鐘陞階置玉日氣瞳鴻鴻鴻杲杲氛駁隂掃宿于太宫月星皓皓侍祠之臣鵠舉鷺振或捧其匜或進其巾輔相夾導俯僂鱗鱗圭瓉以陳登歌以均東向虚位發爵親親平明帝還紫宸序班望帝之顏穆穆閑閑簷歩廊廊雪浮陽光大楹爛爛朱陛煌煌稱祝萬壽萬壽無疆􅁍登寶輿以御端門揭雞肆赦雷動乾坤于時都人于時媍女于時蠻夷異口同語天子萬年仁聖之主臣時執冊與物咸覩敢播于詩庶聞九土奬諭勑梅堯臣省所進祫享詩事具悉爾學優而粹行懿而淳以詩自名爲衆所服矧乃詠歌祖宗之功德述禮樂之聲容宜􅀍朱絃以薦清廟載披來獻深用歎嘉故玆奬諭想宜知悉祫享觀禮二十韻􅁲惟陽月吉孝享禮方脩齋幄嚴宮殿羣臣奉冕旒北風先集霰夜雪競侵幬羽仗天街立龍笳􅁚魏流翌朝升寶輅夾道列華輈琳宇躬將欵珠塵宻未收撞鐘鈞奏合奠玉日光浮捧冊叨於左觀儀得以周帝來清廟下月欲大刀頭旣祼還初次更衣戴逺游黃麾轉槐路朱輦駕雲虬武士羅金甲中人着錦褠千官入稱慶萬國與同休􅁍出紫宸閤俄登宣德樓雞星傳巽令鶴馭作天郵肆赦通皇澤深仁被九州巍巍百世業坦坦四夷柔惠及高年叟恩差五等侯力田仍給復有道俾旁求何以歌堯美玆同擊壤謳寶元聖德詩齋誠羽衞陳庚戌推蓂莢靈宫容物備清廟威儀攝遲明導玉輿出宿戒清堞冥濛雲霧低泱漭乾坤接時雪凝九霄金笳競三疊來賓萬國會受職百神協中夜卽壇壝濃隂駁鱗鬛及爾圭幣升煥然星斗曄華鍾帝樂張法從天衢躡端門清旭上肆宥歡聲浹寶圖增大號元曆開皇刼吉甫獨何人詠歌􅀭聖業送胡臣秀才汴水日夜淺歸船不可留天高雲就嶺地冷鴈􅅆洲江館魚堪食家林橘已收平生素業在莫見里人羞送張秀才之淮南聊爲楚客唱一送淮南行出汴逺心喜移舟􅀌岫橫危帆將進浦寒霧不分城枚乗舊居處向來秋草生還文雅師書帙編絕不加新于今十二春緑窻重展目靜几勿生塵豈愛吾廬日終將道者親莫嫌同刺字漫滅看難眞依韻和徐元輿讀􅀉内詩戲成鴛鴦同白首相得在中河水客莫驚咲雲間比翼多送賢良田太丞通判江寧世爲燕趙客慷􅁣有奇才對策漢庭後拜官江國來舟從􅀲歩去潮自蔣山回心􅀉城頭月相隨上古臺送邵夢得永康軍判官且歸洛中明年春赴任言離洛陽日正值春風前伊水矯白鷺蜀山鳴杜䳌輕袍游宦去匹馬度關年若過君平肆窮通可問焉送蕭監丞濬宰臨邑羡君先拜邑殘臘見登車逺驛寒雲重長郊積雪餘行當勸民稼始信帶經鋤還到濟南日應傳古尚書南隣蕭寺丞夜訪别憶昨偶相親相親如舊友雖言我巷􅊋正住君家後壁裏射燈光籬根分井口來邀食有魚屢過貧無酒明日定徂征􅊃玆酌升斗宵長莫惜醉路逺空廻首讀司馬季主傳贈何山人長安新􅀨後九陌少行人同輿有宋賈游市懷隱淪日聞古賢哲必與醫􅁲隣來過季主室再拜語逡廵矍然悟辭貌何爲居埃塵捧腹乃大咲吾道非爾臻驥慙罷驢駟鳯豈燕雀親筮占聊助上功利儻及民大夫與博士登車若䘮神今我見何遯始驗太史眞順性誨善惡不離義與仁言孝諭爲子言忠諭爲臣又得蜀嚴比寧將日者均京都盛􅀛筴坐肆如魚鱗噤口不正言唯能辨冬春鴻㝠復所慕安得雞鶩馴臘日雪風毛隨校臘浩浩古原沙寒入􅃓聲徤隂藏兎徑賒馬頭迷玉勒鷹背落梅花少壯心空在悠然感歲華依韻和雍丘尉王祕校兆見􅀉東瞻􅂎國城半日鳥飛程度鴈不曾下新文誰􅀉評舊年因使至秀句欲人驚聊効題齋壁先賢亦以旌送新安張尉乞侍養歸淮甸天兵出塞日西尉去官初􅁍衣老萊服曾無梅福書春郊欲廻鴈寒水正沉魚任意歸舟駛風煙亦自如依韻和子聰見􅀉嘗念餞行舟風蟬動去愁獨登􅀌岸立不見逺帆收及送故人盡亦嗟歸迹留洛陽君更憶寧復醉危樓送何遯山人歸蜀春風入樹緑童稚望柴扉逺壑杜䳌響前山蜀客歸到家逢社燕下馬澣征衣終日自臨水應知已息機􅀉衡山福嚴長老衡山幾千里聞在湘川側雲霞不可到峰壑無由識方丈開其間青松隱寒色飛鴻尚莫過况􅀉􅀟鳬翼曲渚橋送張祕校赴慶州幕野客伐山桂橫爲曲渚橋勢危寧過馬徑狹欲通樵小艇何妨繫離䰟正此銷想君廻首處虹影在林椒􅀯陽謝公祈􅀨雲龍本職􅀨不􅀨其失職萬草欲焚如千疇幾赭色刺史爲民憂侵晨車競飭朅來欵宫祠豈不念􅁰稷靄隨輪軒霶􅑛徧畛域孰謂雲龍愚能成仁惠德濯濯羣物新葱葱衆苗殖莫比邵父渠初慙用人力西禪院竹古寺帶脩岡青葱萬竿玉春梢長舊林夏􅀨濕新緑幽禽嘯呼雜晩照隂晴續解帶欲忘歸壷觴歡自足新霽望岐笠山謝紫微坐中賦北望直百里峩峩千仭青斷虹迎日盡飛􅀨帶龍腥隂壑烟雲畜陽崖草木靈登臨終不猒時許到玆亭師厚生日因以詩贈龍驥產龍駒良金出良冶良冶無頑礦駒龍豈凡馬致逺在御徒作礪由工者君子生慶門詩書未嘗捨進道期日隆無愧金馬下晝寢嘗聞晉高士時􅅯北窻風及爾寂無慮始知機盡空便便嘲巳解栩栩夢何窮一寤復一寐百年消此中過白水下馬獨懷古翛然臨渡風眞人去來乆流水自無窮􅀨闊沙痕漲灣平野色通曾興漢家業今與百川同泛舟城隅呈永叔藤竹繞城隂煙梢拂濠水山禽時一鳴楚客􅀌舟裏􅀌舟穿緑荷獵獵􅀨新過誰思暮江上只尺採蓮歌送永叔歸乾德淵明節本高曾不爲吏屈斗酒從故人藍輿傲華紱悠然日逺空曠爾遺羣物飮罷卽言歸胸中寧鬱鬱代書􅀉歐陽永叔四十韻始謫夷陵日當居建德年一書􅁈逐客四詠繼稱賢自謂臨江徼相逢莫我先白醪封畵榼素鯉養泓泉戒吏收山栗呼童惜沼蓮只期東浦過共醉小溪邉日日占風勢時時到水堧安知貪挂席不肯暫廻船自爾皆無定歸歟亦未然指程幾一月泝險歷三年魚鳥都難問音塵杳莫傳因之走羸僕試與訪南遷比及過牛峽還聞迎璧田報言雖不􅀗吉語喜多全我解歸堯闕君移近漢淵問途曾未逺命駕亦何縁衰野今行矣隆中有待焉鄕亭􅀲接畛風化蟻同羶卽欲朋簮盍翻爲俗事牽愛嬰嬌啞啞􅄝寢復便便雞􅁰煩爲具輪轅豈得前􅀉聲勤以謝幸子恕而憐來貺誠爲望論情恐未􅂢嘗親馬南郡果謁謝臨川遂得窺顏色重忻論簡編聊咨别後著大出篋中篇問傳輕何學言詩詆鄭箋飄流信窮厄探討愈精專道舊終忘倦評文欲廢眠寧知主人貴但見左魚懸所至同風月相歡憶澗􅈆清歌嗟在耳素髪怪侵顚翠堞時登眺芳洲屢泝㳂難醒撥醅醁􅊋猒落頭鮮坐竹聽啼鳥臨流聒嘒蟬􅀌亭起歸夢南陌去􅀭鞭出餞陪􅀟斾方蘄歷廣􅝬始生山吏敬頗釋利途邅會靣辭何吐離膺事巳塡空餘郡樓望野色際平煙漸嘉樓望􅀨陪謝守冐􅀨上城頭凄凄欲報秋雲低宻藏樹風急暗侵樓漸積荷珠重新添沼鑑幽慿欄未能去公自念民疇和謝舍人洊震盛夏萬物當長養驕陽不􅀨誰爲憂天無纎雲野頳色草木焦卷如經秋南陽太守自引咎不以天時爲怨尤齋精潔慮祠望内僚屬奔從無停輈謾取詩言占離畢徒依風俗驗鳴鳩忽聞郡北直百里岑岑岐笠藏靈湫持牲遣吏詣其下爼豆未徹升隂虬電光劃劃遶巖壁雷聲隱隱生山陬擁雲馳􅀨自東上西風斗猛雲還收神龍蓄志未發泄明日更與頑陽讎黤靄隂黒若卷海䏈綿霹􅆮能破仇沃然原隰洗妖氣浩爾溝瀆􅀭平流九榖有登百姓喜蜿蜒歆祀神何羞和謝舍人新秋西風一夕狂古屋吹可恐微變蜻蛚吟斗摧蚊蚋勇朝驚露墜梧逺愛雲飛隴還憶舊溪遊水清漁箔壅中秋新霽壕水初滿自城東偶泛舟廻謝公命賦時余將赴襄城齋舫談經後官池載酒行斜陽鳥外落新月樹端生演􅃞思江蒲夷猶繞郡城東轅有遺恨日日物華清陪謝紫微晩泛積􅀨漲秋壕輕舟此共遨菰蒲歛鋩鍔蓮芡熟􅐤韜岸靜魚跳月林喧鳥避篙歸時興不淺風物正蕭騷奉陪覽秀亭抛堶聊爲飛礫戲愈切愈紛如自是取􅀔闊非關用意踈悞驚花鳥起亂破錦苔初童指拾將秃多慙賈勇餘傷馬此馬季父爲樞直日恩賜以遺余吾貧只一馬昨日忽云䘮庭樹齧無膚秋郊誰復放空傷駿骨埋固乏弊帷葬况本出天閑因之重怊悵一日曲此而下離南陽作妾家鄧侯國肯愧邯鄲姝世本富繒綺嬌愛比明珠十五學組紃未嘗開戸樞十六失所適姓名傾里閭十七善歌舞使君邀宴娛自玆著樂府不得同羅敷凉温忽荏苒屢接朝大夫相歡不及情何異逢路衢昨日一見郞目色曾不渝結愛從此篤暫隔猶恐踈如何遂從宦去渉千里途郞跨青驄馬妾乗白雪駒送郞郞未速别妾妾仍􅀌不如水中鱗􅀟􅀟依緑蒲不如雲間鵠兩兩下平湖魚鳥尚有託妾今誰與俱去去約春華終朝怨日賖一心思杏子便擬見梅花梅花幾時吐頻搯欄竿數東風若見郞重爲歌金縷汝州後詩依韻和謝副閤􅀉新酒聞道芳洲景氣新􅁍輸鷗鷺日相親小槽酒熟玻瓈色誰憶高臺共賦人送劉子思殿丞宰巫山千里向巴東青山不可窮峽猿初入聽蠻語未全通暮雪思梁國朝雲識楚宫吏人迎拜處嘶馬入丹楓朔風􅀉永叔朔風嘷枯枝逺鴈不能起日色寒無光原野澹千里所思在南國遐路闊音㫖潜鱗亦安託冰結長河水峩峩旣未泮獵獵終不巳悠然傷我心歷亂非可擬襄城對雪二首風急夜窻鳴暗知庭下積曉幔忻以捲虚堂睡成癖飄颻初縈林凌亂欲侵席擁扉人莫掃何似袁家宅登城望宻雪浩浩川野昏誰思五原下甲色千里屯凍禽立枯枝饑獸齧陳根念彼無衣褐愧此貂裘温雪夜留梁推官飮晝雪落旋消夜雪寒易積燈清古屋深爐凍殘煙碧爲沽一斗酒暫對千里客酒薄意不淺輕今湏重昔重昔是年華飄飄猶過􅂩一醉冐風歸平明馬無跡南陽謝紫微挽詞三首忽驚南郊信半夜雪中來遂哭寢門外始嗟梁木摧文章千古盛風韻故人哀憶昨臨湍水寧知隔夜臺平昔聞嚴助承明猒直廬請章來未乆􅂢館遽何如無復淮南諭曾成太史書蒼蒼不可問揮涕望輀車自古豈無死賢哉獨可悲家貧留旅櫬門慶有諸兒里社當存祀􅀖人定立碑還同羊叔子罷市見遺思永叔自南陽至余郊迓焉首訪謝公奄然相與流涕作是詩以寫懷郭門臨汝水鏡色入高衢鞍馬過其上塵襟蕩巳無及郊逢故友出涕各霑襦神物喪頭角空存尾與軀溝木失匠斵誰施藍與朱並轡不能語斯文其巳夫歸來授予館自爲炊彫胡且勿猒玆會日月易以徂贈琴僧知白上人南方來手抱伏犧器頽然造我門不顧門下吏上堂弄金徽深得太古意清風蕭蕭生脩竹搖晩翠聲妙非可傳彈罷不復記明日告以行徒興江海思教授宋著作還何以擬君子雲鴻肅羽儀將過上林苑先集孝王池唼藻有餘樂漸磐方得時野塘歸莫晩白水逺連陂宛陵先生集卷第六宛陵先生集目録卷第六池州後詩下祫禮頌聖德詩奬諭祫享觀禮二十韻寶元聖德詩送胡臣秀才送張秀才之淮南還文雅師書帙和徐元輿送田賢良江寧倅送邵夢得送蕭監丞南隣蕭寺丞夜訪讀司馬季主傳臘日雪和王祕校見􅀉送張尉乞侍養和子聦見􅀉送何山人歸蜀􅀉衡山長老渚橋送張秘校南陽謝公祈􅀨西禪院竹新霽望岐笠山贈師厚生日晝寢過白水泛舟偶呈永叔送永叔歸乾德代􅀉永叔四十韻漸嘉樓望􅀨和謝舍人洊震和謝舍人新秋中秋新霽陪謝紫微晩泛陪覽秀亭抛堶傷馬一日曲汝州後詩和謝副閤􅀉新酒送殿丞宰巫山朔風􅀉永叔襄城對雪雪夜留梁推官飮謝紫微挽詞三首永叔南陽至贈琴僧知白宋教授還邸目録終
