body:
  text: 宛陵集巻三十三宋梅堯臣撰五月二十夜夢尹師魯昨夕夢師魯相對如平生及覺語未終恨恨傷我情去年聞子喪旅寄誰能迎家貧兒女幼迢遞洛陽城何當置之歸西望淚縁纓五月二十四日過髙郵三溝甲申七月七未明至三溝先妻南陽君奄化向行舟魂去寂無迹追之固無由此苦極天地心瞀腸如抽泣盡淚不續岸草風颼颼柎殭尚疑生大呼聲裂喉柁師為我歎挽卒為我愁戊子夏再過感昔涕交流恐傷新人心彊制揩雙眸未及歸旅櫬悲恨何時休過茱萸堰茱萸堰在吳牛死茱萸堰廢吳牛閑吳牛閑東南百貨來如山詠歐陽永叔文石硯屏二首虢州紫石如紫泥中有瑩白象明月黑文天畫不可窮桂樹婆娑生意發其形方廣盈尺間造化施工常不沒虢州得之自山窟持作名卿硯傍物鑿山侵古雲破石見寒樹分明秋月影向此石上布中又隱孤壁紫錦藉圓素山祗與地靈暗巧不欲露乃值人所獲裁為文室具獨立筆硯間莫使浮埃度永叔進道堂夜話海風驅雲來池雨打荷急虚堂開西窻晚坐凉氣入與公話平生事不一毫及初探易之奥大衍遺五十乾坤露根源君臣排角立言史書星瑞亂止由不戢巨惡叅大美微顯豈相襲陳疏見公忠曽無與朋執文章包元氣天地得嘘吸明吞日月光峭古崖壁澀淵論發賢聖暗溜聞鬼泣夜䦨索酒巵快意頻舉挹未竟天已白左右如啓蟄贈劉謀閤副聲名赫赫在窮塞睂宇堂堂真丈夫腰劒臂弓輕赴敵無人不伏魏黄鬚長蘆江口風駕晚潮急浪頭相趂過水歸𤓰歩小船下秣陵多鷗舞不停翅燕飛輕帖波今來學楚客薄暮愛漁歌金陵懷古秦莫恃棧閣吳莫恃塹江不能恃以德二國竟亦降邇來屢興廢由險輕萬邦誰知荒凉城空存如刳腔我今經其下弔古語媿哤嗟哉石頭潮助怒常舂撞江畔江畔蔆蒲碧無主吳牛夜􅕁江干歸舟人不悟月已上花脚野蚉撩亂飛慈姥山石崖下竹鞭江水浸石壁峭直無鳥蹤穴垂青竹根瘦蛇愁作龍霹靂雨脚入濕㸃莓苔封世人不得用八馬今乖慵阻風老魚吹浪不肯休一夜南風打籬響灘下輕舟未可行山脚盤渦似車輞慈姥磯下蘆汀泱漭外露斂見孤嶂行舟每出觀漸近已殊狀傍來認飲牛正去忽側盎水壑陰若春野鳥時與相且待風色廻出口始浩蕩早發吳雞鳴隔山江月半在水齧齧出岸潮霅霅入蒲葦解䋏泛明鏡接天知幾里我家今不遥正住句溪尾望夫石征骨化為塵柔肌化為石髙山共蒼蒼臨水望脈脈青青巻為髪缺月低照額千古遺恨深終不見車軏過褐山磯值風山口風偏急磯頭水似煎喧聲殊倦聽逆上正難牽暗石誰愁礙長塗未擬前江心㸔白浪巻起大於船褐山磯上港中泊風惡舟難進聊依浦裏邨岸潮生蓼節灘浪聚蘆根日脚看看雨江心漸漸昬篙師知蟹窟取以助清樽宿磯上港夜深風浪息月正在南斗遠水生白煙疎螢出荒莽照蟹屢爇薪張魚未發笱獨能憐野客游宦意何有謁昭亭廟連峰到溪止澄溜向潭㵼廟道走山腰雀雛鳴屋瓦古壁畫雲雷空庭儼輿馬眷予來故鄉潔齋陳奠斚尚想昔丱童維愚託民社每從諸父賽朅至此祠下今齒踰不惑雙親世似寡過此無所禱曷慕逢時者昭亭潭上别行舟晚解去親戚各還家淚落正濕衣腸翻如轉車借是昭亭水相隨亦有涯予今遊宦意曽不學匏𤓰宣州環波亭冒暑駐輪轂徘徊北壕上棟宇起中央芙蓉生四向今吾太守樂慰此郡人望雨從昭亭來水入句溪漲蜻蜓立欄角朱鯉吹荷浪岸木影下布水鳥時引吭心閑不競物興適每傾釀薄暮詠醉歸陪車知幾兩昭亭山曰山何必髙要在出雲雨昭亭非峻峰雄雄若蹲虎旱嵗一來祠霈然隨瀝酤有草牧爾牛有薪資爾斧有溪出其陰有潭在其塢獸則貛與貉魚則魴與鱮山雛水羽聲下上相雜伍呼名如謙恭號叫若怒侮崖竹或節疎嶺松或腹腐巨蜂結層房養子窟深土何事山中人采以為市賈其容固巳多其忍吾未取泊姑熟江口邀刁景純相見時陳州晏相公辟尾生信女子抱柱死不疑吾與丞相約安得不顧期徘徊大江側念此親相知欲留時已晚欲去情難持引領望軒車豈能慰我思願聞下士禮無曰屈非宜見牧牛人隔江吹笛朝與牛出牧晝與牛在野日暮穿林歸長笛初在骻面尾騎且吹音響未成雅隨風吹遠近舉調任髙下我方江上來平溜若鏡㵼悠悠經醉耳亦足發蕭灑苟能和人心豈必奏韶夏鄭聲實美好蠧情如剔剮况其荒敗迹亦又甚裂瓦南箕成簸揚寺孟詠侈哆我今留此詩誰謂馬喻馬依韻和歐陽永叔中秋邀許發運看取主人無俗調風前喜御夾衣凉競邀三五最圓魄知比尋常特地光豔曲旋教應可聽秋花雖種未能香曽非惡少休防準衆寡而今不易當永叔詩云仍約多為詩準備共防梅老敵難當與夏侯繹張唐民游蜀岡大明寺秋葉已多蠧古原看更荒廢城無馬入破冢有狐藏寒日稍清迥羣山分漭蒼田衣指白水此下是雷塘寄麥門冬於符公院佳人種碧草所愛凌風霜佳人昔已殁草色尚蒼蒼陸行載以車水行載以航于今五六年與我道路長思人不忍弃期植寒冢傍我嗟復北去安得畢此喪留植精舍中遠挈防根傷他時京峴下不比野蒿黄送張唐民楚甸有行客西風一孤舟遠隨淮月上若與星槎浮野岸襲幽芳氣清露巳秋得意美魚蟹白酒問沙頭秋夜同永叔看月青天有右目昬明不常開常時翳雲氣古鑑生莓苔秋夜特清徹乃顧漸西廻靈兔不擣藥是夜無纖埃與君玩流景置酒臨層臺單衣濕白露鳴鴈方南來以言歡未終鴈聲一何哀中秋不見月荅永叔天嫌物兼美而使密雲藏巳向石屏見何須照席光和永叔中秋夜㑹不見月酬王舍人主人待月敞南樓淮雨西來斗變秋自有嬋娟侍賔榻不須迢遞望刀頭池魚暗聽歌聲躍蓮的明傳酒令優更愛西垣舊詞客共將詩興壓曹劉觀永叔集古録古碑手集一千巻河北關西得最多莫怕他時費人力他時自有錦蒙駞觀舞坐上作誰憐嬌小好腰支老大而今莫那伊太守風流未應淺更教多唱楚人辭留别永叔舊友競留連我征時已晚但言㑹合難豈道行路遠行路到有期别離未即返明當各相思念此去且嬾觀永叔畫真良金美玉不可畫可畫唯應色與形除却堅明盡非闕世人何得重丹青畫真來嵩廣陵太守歐陽公令爾畫我憔悴容便傳髣髴在縑素只欠勁直藏心胷與我貨布不肯受比之醫卜曽非庸公今許爾此一節爾只丹青其亦逢别後寄永叔前日辭親淚又為别友出愁極反無言欲言詞已窒荷公知我詩數數形美述兹道日未堙可與古為匹孟盧張賈流其言不相昵或多窮苦語或特事豪逸而於韓公門取之不一律乃欲存此心欲使名譽溢竊比於老郊深媿言過實然於世道中固且異謗嫉交情有若此始可論膠漆登揚州北門樓上山如澹墨畫城中水似輕藍挼揚州今似刀州景似聽中和樂職歌因目痛有作巳為貧孟郊􅂸作瞎張籍詩句但口吟世事不眼歴既能分好惡難用變青白讀書聽吾兒且未廢朝夕宿邵埭聞雨因買蕅芡人廻呈永叔秋雨鴈來急夜舟人未眠亂風燈不定暝色樹相連寒屋猛添響濕窻愁打穿明朝持蕅使書此寄公前寄許主客昨日山光寺前雨今朝邵伯堰頭風野雲不散低侵水魚艇無依尚蓋蓬蕅味初能消酒渴蓼芳猶愛照波紅揚州有使急廻去敢此寄聲非塞鴻八月二十二日廻過三溝不見沙上雙飛鳥莫取波中比目魚重過三溝特惆悵西風滿眼是秋蕖牛背雙鸜鵒牛背雙鸜鵒煙陂共入時草枯行解美日晩趂羣遲閑載寧辭遠相鳴不間雌初驚牧人去飛上野桑枝廣陵歐陽永叔贈寒林石硯屏磷磷石屏上濃澹樹林分隔水見寒島暗枝藏宿雲賢哉吾益友持以贈離羣琥珀不須問中心多化蚊岸貧無能事耕穫亦不有雞豚燒蚌曬槎沫織蓑依樹根野蘆編作室青蔓與為門穉子將荷葉還充犢鼻裩邨豪日擊收田鼓時稱大有年爛傾新釀酒飽載下江船女髻銀釵滿童袍翠㲲鮮里胥休借問不信有官權晩雲黕黕日脚雲斷續如破灘忽舒金翠尾始識秦女鸞又改為連牛綴燧懷齊單伺黑密不囂額額城未剜風吹了無物猶立船頭看荇荇葉光於水鉤牽入遠汀淺黄雙蛺蝶五色小蜻蜓老死懷江女飄浮笑楚萍西風莫苦急孤蕊有餘馨晩日晩日晴還暖人閑見物機葉枯蟲自裏窻響蜜尋歸林下見收柿水邊聞擣衣吾嗟久為客却媿寄荆扉寄酬發運許主客淮上秋來物意閑又乗輕舸信帆還一浮一没水中鳥更遠更昬天外山斜幅纒踍兵吏至濃金灑紙頷珠頒欲酬巳覺不能敵盡日臨風思自慳前日前日揚州去酒熟美蟹蜊秋風淮陰來沙暖拾蚌螄不言爾貧富只繫其鄙夷漢重二千石後世何忽之淮陰青環瘦鐵纜繫在淮陰城水脛多長短林枝有直横山䕫一足走妖鳥九頭鳴韓信祠堂古誰將胯下平哀王孫泗水赤龍將欲飛瘦蛟在泥雲未歸冰繭煮灰寒水擊長大王孫抱飢色誰知適自下鄉來日昃可哀猶未食菰飯白漿持與君王孫王孫何復云沛公歌赤帝醉提龍劒行徑草沒人壯士驚白蛇斷裂不可續神嫗哀哀夜深哭酒醒自負氣生虹從者日畏天下雄秦皇玉輿來向東安知隱在芒碭中婦人自識雲氣從王命艱哉豐沛公宛陵集巻三十三
