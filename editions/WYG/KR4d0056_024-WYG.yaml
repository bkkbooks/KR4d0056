body:
  text: 宛陵集卷二十四宋梅堯臣撰郭之美忽過云往河北謁歐陽永叔沈子山春風無行迹似與草木期髙低新萌芽閉戸我未知忽聞人扣門手把蟠桃枝問我此蟠桃縁何結子遟但笑不復荅問者當自推振衣向河朔河朔人偉竒以兹不荅意遟子北歸時讀蟠桃詩寄子美永叔韓孟於文詞兩雄力相當偶以怪自戲作詩驚有唐篇章綴談笑雷電擊幽荒衆鳥誰敢和鳴鳯呼其皇孟竆苦纍纍韓富浩穰穰竆者啄其精富者爛文章發生一為宮揫斂一為商二律雖不同合奏乃鏘鏘天之産竒怪希世不可常寂寥二百年至寳埋無光郊死不為島聖俞發其藏患世愈不出孤吟夜號霜霜寒入毛骨清響哀愈長玉山禾難熟終歳苦飢腸我不能飽之更欲不自量引吭和其音力盡猶勉彊嗟我於韓徒足未及其牆而子得孟骨英靈空北邙誠知非所敵但欲繼前芳近者蟠桃詩有傳來北方發我衰病思藹如得春陽欣然便欲和洗硯坐中堂筆墨不能下怳怳若有亡老雞觜爪硬未易犯其場不戰輒自却雖奔未甘降更欲呼子美子美隔濤江其人雖憔悴其志獨昂昂氣力誠尚對勝敗可交相安得二子接揮鋒兩交鋩我亦願助勇鼔旗譟其傍快哉夫子樂一釂宜百觴乖離難㑹合此志何由償孫司諫知鄧州甫南陽漢名都其俗尚敦樸亡徒頃為盗刺史安與角田野遂焦熬蒿萊思沃濯兹雖得甘露向已苦風雹更張固所重下令未宜數且觀道傍碑文字今已剥史尉還烏程宏與君去年别君來竟悲喜乗馬夜訪君備陳昔行李五月辭吳中六月渡揚子七月行喪妻是月子又死買棺無橐金助貸賴知已嬌兒晝夜啼幼女飲食止行路况炎蒸悲哀滿心耳青銅不忍照憔悴鄰於鬼八月至都下少長疾未已一婢復嗑然老媪幾不起君門日預朝僕乘貧可恥十月補王畿受代隔嵗紀閉門陋巷中悶黙閱書史初聞君至之如見湖山美今聞君復還為我謝雲水故交儻相問懷抱今如此豈乏南飛鴈豈無東下鯉自同嵇康嬾作書愁把紙薛九宅觀鵰狐圖蜀中處士李懷衮手畫皂鵰擒赤狐猛爪入頰觜迸血短尾㒔㑛竆蹄鋪鵰爭怒力狐爭死二物形意無纖殊一禽一獸固已别硬羽軟毛非筆模入君此室見此圖如在原野從馳驅寄汶上大第未嘗身一至人猜巧宦我應非彈冠不讀先賢傳説劒休更短後衣瘦馬青袍三十載故人朱轂幾多違功名富貴無能取亂石清泉自憶歸蕭著作宰豐城王都二月花正開社雨作隂迎燕子人先春色向江南江南春色歸春水拍岸緑波生荻芽晨羞聊可助甘㫖縣涂為政子所諳不敢贈言言且鄙董安員外之信州鉛山簿古岸綠蒲老春帆逆水輕􅖒鮮聊以芼泝險復兼程可用兹時樂無將逺道驚曽為江上客因贈北行人弟得臣殿丞僉判越州前為山隂宰再為㑹稽行聊問㑹稽美禹穴遷所探秦望斯所紀年深已浸深書碑必亡矣剡溪有樵風其事恐非是買臣千載後得無負薪子黄庭昔換鵝道士儻不死行當訪其真願以鵝報爾慎勿笑我癡萬事難可擬摘筍復盈檐緡魚新出水此又食之珍因書悉條理李舎人淮南提刑啄木欲除蠹蠹去樹亦撓何須食微蟲爾腹豈不飽天下本無事自為庸人攪君實知古深終慙用傾巧呉殿丞代州通判舉才不避世必也知其長王官誠濟濟豈得佐邉疆代郡實雄要昔已選帥良功名乃欲取叱馭登太行和人喜雨仲冬至仲春隂隔久不雨耕農將失時萌穎未出土帝心實焦勞日夜不安處禱祠煩駿奔􅆄饗杳無補帝時降金輿徧款靈真宇百姓知帝勤變愁為鼓舞和氣能致祥是日雲蔽午夕風不鳴條甘潤忽周普已見堯為君安問誰為輔胥員外之復州景陵尉城隅漢水闊正足槎頭鯿采荇兼登俎施罛不貴錢江帆風勢美竹屋雨聲連必有蒼苔碣留為好事傳李審言歸鄭州嘗從京索間躍馬望春山氣象歸王國邱陵接漢關長榆啼鳥亂細草牧陂閑老猒行涂路因歌送子還李舎人見過春泥無處所竆巷少人行忽枉青絲騎曽非白面生笑言聊與適雞黍未嘗􅖒莫歎余貧甚吾儕業本清春鶻謡春巢纍纍衆鳥哺兒衆鳥不出巢羣雛嗷嗷腹甚飢不出巢其謂何上有蒼鶻窺其巢問鶻何仇鶻不我顧我巢有雛開口待哺一日不擊巢雛不食爾憂爾雛衆鳥號呼又可吁來夢忽來夢我于水之左不語而坐忽來夢余于山之隅不語而居水果水乎不見其逝山果山乎不見其塗爾果爾乎不見其徂覺而無物泣涕連如是歟非歟汴之水二章送淮南提刑李舎人汴之水分于河黄流濁濁激春波昨日初觀水東下千人走喜兮萬人歌歌謂何大船來兮小船過百貨將集玉都那君則揚舲兮以糺刑科汴之水入于泗黄流清淮為一致上牽下櫓日夜來千人同濟兮萬人利利何謂國之漕商之貨實所寄我送行舟于水之次春風吹雨旗君作天王使罟客自求魚清江莫相避宋次道一百五日往鄭拜墓去不避春雨泣望松柏門䬃然風悲響如感泉下魂沃酹向墳土空濕陳草根人歸夜月冷石馬在九原孫太祝亳州僉判微風起船尾雨氣生日脚不愁春路泥正泛春波樂順去疾鳥飛問程殊我度才名留守家更入尚書幕寄靈隱通敎僧寄山若洗青草木生石上根萌不可竆條蔓自増王其隂有髙僧日食惟一盎世人久已疎猨鳥應相向李少傅鄭圃佚老亭莊生述天理老固當念佚舉世用自勞誰能以為必我公謝鼎司嗣子都華秩代言輟帝右作藩輔王室承顔向兹地園宇樂永日佳樹發已緐脩竹移未密春禽時弄吭清景付吟筆朱金待金構榮美安與匹令狐祕丞守彭州挺前時草草别渺漫二十年從宦各所適非為道路偏今始一相遇言媿少壯前子有萬里翮尚不飛雲煙而復走隴蜀欲以條敎宣將西過危棧葉暗聞杜䳌未知為郡樂預已抱愁煎再來與子辭當去復留連且念前期逺嵗月實易遷依韻和李舎人旅中寒食感事一百五日風雨急斜飄細濕春郊衣棃花半殘意思少客子漸老尋游非戢戢車徒九門盛寥寥煙火萬家微今朝甘自居竆巷無限墦間得醉歸依韻和張應之見贈京洛多游好相與嵗月深雖同執一籥吹曲各異音自微衆音響安感萬物心我竆子來唁慷慨發長吟哭尹子漸其弟師魯守潞故人河内守昨日報已亡同氣泣上黨悲風生太行曩為衆所惜今復人共傷阮籍本真牽感槩夀不長次道約食後同敏叔中道平叔如晦詣景徳浴以風埃遂止昔思春服成浴乎沂水上仲尼亦所志語此雖未向子今當是時有意同我尚已邀二三友欲往期畢餉倏然風滿塗塵土阻清曠安得一振衣徒希舞雩唱陳經祕校之信州幕東吳海物錯南楚江味多家吳而宦彼風土去幾何既得風土樂可贊政治和歸來識香草為綴楚人歌朱武太博通常州兼寄胡武平昔我陽夏公嘗兹同郡治政餘作東園草木尚有意豈不務安養斯民歌樂易是時有賢才郷舉堪皇器今方居冢廬試質當時事願君思前人文雅庶未墜師厚云蝨古未有詩邀予賦之貧衣弊易垢易垢少蝨難羣處裳帶中旅升裘領端藏迹詎可索食血以自安人世猶俯仰爾生何足觀依韻和中道寳相花嘉卉得所託植君之寢陽開榮同此春澹豔自生光不為露益色不為風盡香節換葉已密尚可見餘芳擬陶體三首手問足共生一體中出處常相并所動輒有迹何不擇地行履舄雖可蔽歩武豈無聲嘗思汝為玉請刖見直誠足荅手上下各有分同質實異支要用固爾先當念扶我危我刖爾獨安何以幸華夷且願縮袖間操執自有時目釋我居元首間分竝日月光左右各照曜盲一豈相妨尚恐有所瞖獨見不能彊嗟爾手與足何為欲競傷捉馳自有職勿使心悲凉贈葉山人傾珍奉賔客傲物云珥貂貴來不以屈飲酒且逍遥黄金百鎰盡左右無纖腰但存丹砂術有道在一瓢李廷臣通判蔡州夾路青青草隨君去未休亦將離思逺還共翠心抽細藉車輪穩薰牽野蔓柔王孫歸不久冉冉莫經秋朱櫻明珠摘木末紅露貯金盤始見侍臣賜已為黄雀殘味兼羊酪美食猒楚梅酸苑囿東周盛纍纍映葉丹悼子小名十十舟行次符離我子死阿十臨之但驚迷至傷反無泣款定始懷念内若湯火集前時喪爾母追恨尚無及邇來朝哭妻淚落襟袖濕又復夜哭子痛并肝腸入吾將仰問天此理豈所執我惟兩男子奪一何太急春鳥獨蔓延哺巢首戢戢懷悲自爾歸我家未嘗猒貧窶夜縫每至子朝飯輒過午十日九食齏一日儻有脯東西十八年相與同甘苦本期百嵗恩豈料一夕去尚念臨終時拊我不能語此身今雖存竟當共為土和中道雨樹一旬苟不雨萬木昬蒼蒼朝見洗林葉動摇生輝光晩逢開疎隂枝上漏微陽翠色固已好安得無秋霜永叔寄詩八首并祭子漸文一首因采八詩之意警以為荅昔聞退之與東野相與結交賤微時孟不改貧韓漸貴二人情契都不移韓無驕矜孟無靦直以道義為已知我今與子亦似此子亦不媿前人為北都健兒昨日至扣門乃得所遺詩上言病中初有寄下言我詠蟠桃枝盛衰開落感殘杏暮春無事羡游絲班班鳩鳴忽懷念一埽十幅無閑辭洛川花圖多品目鬭新爭巧始可疑讀書又憶石夫子似蠶作繭誠有之鎮陽歸夢北潭北吟此八章誰謂癡最後有文弔尹子夀天難問信所悲共書大軸許傳玩一日百展曽忘疲報君亦欲齎滿軸恐費紙墨令人嗤黄敏復尉新城新城接桐廬山茗久所利江東亡命兒販不畏黥劓堂上千金子捕以操凶器恐非吾徒為勇少乃可避寄永叔夏日永以靜渴鳥方在枝張口不能言翕翕兩翅披庭中有井泉井深無綆縻欲汲假其隣隣且非我知鴻鷗矯河上比爾得所宜得宜豈不樂胡然我念之丞相二章丞相之拜冠弁旅至乘馬載驅如彼鉅瀦有鴈有鶩有龜有魚烝然來萃翔泳嘯呼丞相之去乃還印綬乃飭車輪如彼涸津時靡翔羽時靡游鱗寂兮寂兮豈有嘉賔閔讒狡二章矯有讒狡讒以戕類狡以媚其貴謂不騫不墜謂人莫爾制而死制之誰謂無鬼孰制之死彼狡之將死若有以見既見既惡之引被䝉面謂人莫爾辨而自辨之誰謂無鬼孰俾之譴薛八殿丞有遺未嘗營貨貝貨貝寧為來俸苦月不足貧死口肯開好事忽我恤十千助晨杯薪水已過豐不得如顔回師厚與胥氏歸來奠其姑雙裾來此室慟哭拜靈牀魂衣想髣髴薄酒湛其觴含悽拊孤稺拭淚問平常我生都無如仰看燕在梁諭烏百鳥共戴鳯惟欲鳯徳昌願鳯得其輔咨爾孰可當百鳥告爾間惟烏最靈長乃呼鳥與鵲將政庶鳥康烏時來佐鳯署置且非良咸用所附已欲同助翺翔以燕代鴻鴈傳書識暄凉鸜鴿代鸚䳇剥舌說語詳秃鶬代老鶴乘軒事昂藏野鶉代雄雞爪觜稱擅場雀豹代鵰鶚搏擊肅秋霜蝙蝠嘗入幕捕蚊夜何忙老鴟啄臭腐盤飛使游揚鵂鶹與梟鵩待以為非常一朝百鳥猒讒烏出逺方烏伎亦止此不敢戀鳯傍養子頗似父又貪噪豺狼為鳥鳥不伏獸肯為爾戕莫如且斂翮休用苦不量吉凶豈自了人事亦交相弔裴易進士力學未及仕口中已含珠賦命固所負讀書非所辜斂送有兄弟哭泣無妻孥惟此靡薄厚必竟同一塗閑詠寄呈次道我閑日貧縛子閑數疾纒閑固不可常吾觀與子然吾與子嗜學豈獨閑竆年安安者誰歟分亦似所偏寄楚州呂濟叔亭午鳥不下誰復過我廬忽聞扣門者偶出問何如云是山陽吏太守遣置書自惟久竆困游子安念予淮隂况要津賔館無暫處豈意有所逮委曲情未疎報言媿不靦聊以謝興居荅中道小疾見寄嵇康性彌嬾曽不廢養生子姑當妙年何乃勞其精老聃有至論身孰親於名詩本道情性不須大厥聲方聞理平澹昬曉在淵明寢欲來於夢食欲來於羹淵明儻有靈為子氣不平其人實傲佚不喜子纒縈吾今敢告子幸願少適情時能與子飲莫惜倒缾罌五月五日屈氏已沉死楚人哀不容何嘗奈讒謗徒欲却蛟龍未泯生前恨而追沒後蹤沅湘碧潭水應自照千峰送可敎僧歸越萬事猒尋常羡慕每不足居南多北思在逺慙近俗既來橘變枳但見空條綠氣味誰復論孤根逗巖曲和裴如晦雨中過其亡兄易居人亡雨館寂車馬偶來臨濕衣添新淚故物傷夙心淒淒亭下樹萬葉起哀音此地嘗對語在昔豈知今雨中宿謝胥裴三君書堂急雨射窗鳴燈殘我正寢穴蚓聲苦長流響入孤枕衆醉如不聞彊聒亦已甚夜短竟無寢困瞳劇塵磣和中道雨中見寄雨淫止復落雲暗不少開泥將沒馬脛思子日幾廽我既不可往子亦不可來屋漏又苦甚巾舄生莓苔安肯問農畝唯憂無酒材但能置醇酎莫負吾尊罍宛陵集卷二十四
