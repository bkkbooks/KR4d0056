  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_016-1a, image: WYG1099/WYG1099-0117c.png}
body:
  text: 宛陵集卷十六宋梅堯臣撰和曹光道風拔三檜飄風西北至樹苦萬繂牽君家三古檜緐根龍地纒其固謂不拔朱欄擁靑塼今同秀林木摧倒誰復憐安得百力士扶持尚可全愼勿伐作薪豈無庭燎然飲劉原甫家原甫懷二古錢勸酒其一齊之大刀長五寸半其一王莽時金錯刀長二寸半主人勸客飲勸客無夭妍欲出古時物先請射以年我料孔子履久化武庫煙固知陶氏梭飛去風雨天世無軒轅鏡百怪爭後先復聞豐城劒已入平津淵聊讎二百載儻有書畫傳嗢呼纔十一便可傾觥船探懷發二寶太公新室錢獨行齊大刀鎌形末環連文存半辨齊背有模法圓次觀金錯刀一刀平五千其文如此精銅不蠹蝕肉好鉤婉全為君舉酒盡跨馬月娟娟送嘉州監押曹供奉測舊友尹師魯甞作送子文文存人已殁行復我何云平時為郡尉遐方宜撫軍定過揚雄宅野鶴自成羣荅仲原太傅八日遺酒陶潛九月九無酒望白衣何言先一日雙榼忽我歸借問遺酒誰天宗分日暉明當酌大斗黃菊羔醅肥李賀諸王孫作詩字欲飛聞多錦囊句將報慙才微送張生還和州山頭孤石望來久天外行人今獨歸藥囊自有留生術不管淮南木葉飛李康靖少傅夫人挽詞二首九月秋風急三川苦霧迷卜邙新隧啓度鞏短簫齊寶劒知終合靈蟾已隕西松門來㑹葬車馬㡬千蹄板輿曽至鄭靈輤此歸周行哭人増慕凝笳月正秋九原開祔穴故土覆新邱歲晏寒松下茅苫孝子留送韓文饒寺丞宰蕭山吳㑹未探穴廣陵先看潮橫江百馬怒卷海萬鼙嚻舟楫凌湍發魚龍接浪跳薄言増勇氣少當舉山瓢蔡君謨示古大弩牙黃銅弩牙金錯花銀䦨線齒如排沙上立準度可省括箭溝三道前直窊其度四寸寸五刻鋈光歷歷無纖差蔡侯出此問誰得往年客遺來琅邪琅邪築城穿厚壤旣獲磨洗爭傳誇莫知歲月孰製作精妙近世應難加發機髙下在分刻今人妄射功仍賖願侯擬之起新法勿使邉兵死似麻和劉原甫省中新菊華省切星斗沉沉嚴燕房秋風茂陵孫種菊爛生光天晴蝴蝶飛上下舞雙黃劉郎才筆豪移榻吟在傍日晚吏已㪚殘景上粉牆有酒無飲伴掇英襟裾香還思陶淵明棄官歸柴桑東籬獨此物盈把恨無觴賴有白衣來好事遺壺漿適意各一時豈乏同舍郎依韻和仲源獨夜吟秋鴻聲澀秋絃苦塗金博山煙夜吐寂歷虛堂燈暈生誰人共聽西窗雨寄題周敦美琨瑶洞仙人采玉驅雄龍列山剖璞靑腔空因䆳為堂曲為室石乳溜壁光玲瓏仙歸龍去草樹長蔽翳不復人蹤通指疆買墅下峰下洗斸務欲險怪竆地鱗鹿迹尚莫到安問樵老諸牛童古人未得今已得萬景付與由天公何當歸來歛頭角任從寶我生白虹陰溪淺水菖蒲緑下有蝦蟇雙眼紅及時佐酒斫兩股勿使更入明月中許生南歸大盤小盤堆明珠海估眩目迷精麄斗量入貢由掇拾未必一一疵纇無不貢亦自有光價此等固知魚目殊許生懷文頗所似暫抑安用頻増吁倚門老母應日望霜前稻熟舂紅稃歸來爛炊多釀酒洗蕩幽憤傾盆盂九卿有命不愁晚朱邑當年是嗇夫得沙宛榅桲戲酬蒺藜已枯天馬歸嫰蠟籠黃霜冒榦不比江南查柚酸橐駝載與吳人看寄題杭州廣公法喜堂淘靑研朱畫屋梁黃漆柏障連曲房日暉月色不須照了了自可窺毫芒夕陰花歛似欲病飛鳥不驚烏帽郎深山竆谷謾幽僻喜得吳儂是藥囊題滿公僧録西明軒赤萍纔落鄧林外靑銅半磨傍露明飛光斜入了不隔坐臥一榻琉璃平西方古胡黃金質貝葉傳寫烏行橫謂曉此教居此軒滿壁圖畫遙峰生寄題撫州戴秀才息心亭蒼蒼開幽林峰嶺日相對雲歸垂衣纓泉落響環珮仕宦雖有負耳目得以貸俯仰宇宙中晏然維進退送臨江軍監酒李太博三江卑溼地北客宦遊稀霧氣多成雨雲蒸易損衣白醪燒甕美黃雀下田肥未辨殊方語山歌半是非道損司門前日過訪别且云計程二月到郡正看暗惡海棠頗見太守風味因為詩以送行蜀州海棠勝兩川使君欲賞意已猛春露洗開千萬株燕脂㸃素攢細梗朝看不足暮秉燭何暇更尋桃與杏青泥劒棧將度時跨馬莫辭霜氣冷送雪竇長老曇穎朝從雪竇請暮巻雲衲輕莫問居士病自從他方行吳霜㸃髭根海烏随衆迎安隱彼道場萬事都㤀情送襄邑知縣杜君懿太博霜落水未落令君將度河農耕休叱耒女織罷鳴梭赤幘驅亭長丹砂挈印窠無慙浚儀政才比陸雲多送晉原喬主簿太守登車時我病不能出遥期玩海棠度險馬屢叱唯畏行邁遟惡欲及春日何為愛此花曽非桃杏匹生紅濃復淺瘦蔕脩且密湖傍㡬十樹雕盤擁新漆酒傾琉璃盆月上歡未畢縣官同逺宦簿領無督詰刻意詠芳菲追補李杜失十一月十三日病後始入倉曽非雀與鼠何彼大倉為狐裘破不温黃狗補其皮霜花逐落月綴在枯槀枝予年過五十瘦寢冰生肌閔尚衣盜袴昔聞廉叔度能使民多袴多袴非或貪持新不忘故嗟嗟亦王官奚自門閥汙中府中紋綾袖之呼馬去左右即其私邀索乃就捕三公出死狗訓導能有素今同竊鈇者見爾皆此趣胡夫人挽歌子哲已哉胡夫人其夀七十餘其子哀母死一夕髭皓如髭白髮亦白長號守茅廬扶棺埋吳雲來㑹傾市墟誰復向寒月臥冰求鯉魚裴直講得潤州通判周仲章鹹豉遺一小缾金山寺僧作鹹豉南徐别乗馬不肥大梁䝿人與年少紅泥罌盎鳥歸飛我今老病寡肉食廣文先生分遺微贈裴直講水棃二顆言太尠荅吳甘三顆以為多走筆呈之緑橘似甘來太學大棃如水出咸陽莫將多少為輕重試擘霜包㡬瓣香送樂職方知泗州長堤凍柳不堪折竆臘使君單騎行蘇合輕裘霜莫犯銅牙大弩吏先迎山㫄楚賈連檣泊水上禹書寒磬清試向郡樓東北望煙波千里月臨城和劉原甫十二月十日試墨海神不朝雪不作大梁塵土蔽天髙道傍牛喘復誰問佛寺吹螺空唱號相公跪香恬且佚陛下減膳心焦勞因君試墨偶有激勇辭壯筆揮長刀予無奈何亦思飲飲竭甖甕從餔糟十二月十三日喜雪三日朔風吹暗沙蛟龍卷起噴成花花飛萬里奪曉月白石爛堆愁女媧大明廣庭踏朝駕雉尾不埽黏宮鞾宫中才人承聖顔捧觴稱夀呼南山三公免責百姓喜斗酒十千誰復慳送劉職方知汾州齊西河風俗厚尚翅古所聞子夏有遺廟干木有遺墳太守下車日當先此二君不必汾水上秋風看鴈羣十三日雷後晚過天漢橋堤上行堤上殘風雪橋邉盛酒樓據鞍衰意盡倚檻豓歌留海月開金鑑河冰臥玉虬當年洛陽醉偏憶董糟邱送崔黃臣殿丞之任廬山驊駒西行四千里直度經橋百尋水石上菖蒲未見花蒙頂茶牙初似觜采時應憶故園春故園開焙亦思人其間杜鵑不中聽掩耳聊看錦雉馴靑崖鞭垂瘦蛇尾仙人搯節隨鱗起斫取他年跨馬歸劒棧秦山多折箠十九日出曹門見水牛拽車只見吳牛事水田只見黃犂負車軛今牽大車同一羣又與騾驢走長陌卬頭闊歩塵蒙䝉不似綏耕泥洦洦一一夜眠頭向南越鳥心腸誰辨白吳太博遺柑子太學先生欺緑橘裴如晦近有贈吳興才士與黃柑黃柑似日勝崖蜜帶葉初擎翠竹籃還料楚王曽未識徒將萍實詫江南和普公賦東園十題擷芳亭結宇東園中種花待春風口歌金縷衣手折枝上紅今日映緑髮他年羞靑銅清心堂寂莫外物亂境清心亦淸彼皆居深谷此獨處重城夷齊食薇蕨千古首陽名石筍削出靑山根峭立碧玉垂不作湘竹老不染帝子啼不為盤中蔬豈與煙茁齊待月亭明月過三五飛出滄海遟佳人望清夜隔樹光離離不須磔蝦蟇寒魄自有虧虛白堂空堂絶纖塵虚靜自生白長風吹月東窗戸如不隔漆園兹趣深赤水珠難索假山太山不可歴石齒齧人足聊集怪與竒蒼蒼都在目何須引寒流平地作溪谷書齋聖賢有事業皆在經籍中已愛牙作籖可輕山賜銅還來讀詩禮不用辨魚蟲小池小池依小山山晴翠光入無容羣蛙鳴間有孤鶴立曽不起波瀾石郵風自急紫竹西南産脩竹色異東筠緑裁簫映檀脣引枝宜鳳宿移從㡬千里不改生幽谷山茶紅蘤勝朱槿越丹看更大臘月冒寒開楚梅猶不奈曽非中土有流落思江外宛陵集巻十六
