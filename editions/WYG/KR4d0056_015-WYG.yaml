body:
  text: 宛陵集卷十五宋梅堯臣撰觀何君寶畫燕馬易畫吳牛難圖馬骨隱細牛骨麄馬毛要密牛毛疎麄疎必辨别細密多糢糊乃知戴嵩筆能出韓幹徒幹馬精神在韁勒嵩牛怒鬭無牽拘昨日何家觀小軸絹雖破爛色不渝二頭相觸角競椅前腳如跪後腳舒尾株榻直脊膂蹙筋力寫盡蹄腕殊一勝一敗又苦似勝者狠逐敗者趨巻窮赤印置小字置字乃是陶尚書尚書國初人愛畫收㡬㕑買時不惜金與帛帛載羊車錢載驢後世兒孫不能保賣人窮市無須㬰凡目矜新不重故千錢酬直皆笑愚四牛遂爲何氏有裝背入眼天下無坐中吾儕趣已異又喜𤣥女傳兵符此本實稱閻令畫下筆簡細容顔姝三人鬼狀一牛首八女二十美丈夫黃帝中間蔭葩蓋霞扇錯玳旌擁朱冠服難知歲月逺但見儀衛森清都復觀鹿臺獨夫受妲已不笑何由娛酒池肉林騎行䏑剖心斮脛堪悲吁數幅吳王宴西子綵舟張樂當姑蘇宮娥數百簇髙下鬒髻一一紅芙蕖危峰細浪得平逺前對洞庭傍太湖商紂夫差可垂誡歴世傳玩參盤盂鵰鷹草木不足記特詠此事心何如送任太博歸省西都人言少保持家謹載見西京萬石君子舍今歸浣裙切里門重戒下車勤田園一一能為計僮僕訢訢亦有聞我負洛陽山水久試因行色寄嵩雲送少卿張學士知洪州朱旗畫舸一百尺五月長江水拍天穩去先應望廬岳暫來誰復見龍泉閣經吏部重為記山識吳王舊鑄錢往迹可尋軍士少賸書遺逸附靑編觀楊之美畫天官乗車建朱旗赤旛前亞風巻披二龍緩駕蒼髥垂印箱傍挈文籍隨雙驂推軛如畏遟行從冠服多威儀水官自有眞龍騎兩佐並跨鯨尾螭歩趨羣吏怪眼睂雲生海面無端涯雷部處上相與期人身獸爪負鼔馳後有同類挾且搥次執電鏡風囊吹靑蛇有角魚足鬐上下引導神所施地官旣失不可知此畫傳是閻令爲設色鮮潤筆法奇絹理膩滑雞子皮吳生龍王多裂隳八軸展玩忘晨炊李成山水曉景移黃荃花竹雀擁枝韓幹馬本摸搭時神駿多失存毫釐日髙腹枵眼眥眵邂逅獲見何言疲厚謝主翁意不衰他日飽目看無遺李審言遺酒大梁美酒斗千錢欲飲常被飢窘煎經時一滴不入口潄齒費盡華池泉昨日靈昌兵吏至跪壷曽不候報箋赤泥坼封傾瓦盎母妻共嘗婢流涎鄰家葡萄未結子引蔓垂過髙牆巔當街賣杏巳黃熟獨堆百顆充盤筵老年牙踈不喜肉况乃下箸無腥羶空腸易醉忽酩酊倒頭夢到上帝前賜臣蒼龍跨入月不意正值姮娥眠無人來顧傍玉兔便取作腊下九天拔毛為筆筆如椽狂吟一埽一百篇其間長句寄東郡東郡太守終始賢切莫汲竭滑公井留釀此醑時我傳送邵郎中知潭州張鐃疊吹洞庭外縁虎帶刀蠻帥迎且諭漢家綏撫厚莫言湘守事權輕木奴洲近霜包熟班竹林昏野鳥鳴賈誼宅邉寒井在暫留千騎潄餘清送楊叔恬應北京辟昔時見子宛邱下丞相待子知子賢子於文字實廣博海客謾估珠盈船欲賣明月一寸魄雖豪不肯售以錢通都大邑忽辨寶直取不犯驪龍涎遂作照乗物矜夸魏人前從兹十二車光彩生從先送洪州通判何太博若谷先歸新淦拜官江上客乗馬不乗船獨畏江龍浪將歸風雨天葛花侵野徑源水入腴田君住巴邱下西山道路連五月七日見賣瓠者老圃奪天時馬通為煦嫗四月彼種𤓰五月此賣瓠陽陂與糞壤功力且異趣𤓰遟瓠何早豈不同雨露速利乃在人爭先無晚暮和江鄰㡬景德寺避暑蛭蟻不應雨鳴鳶不生風鬱氣若甑炊初陽如火紅躶膚汗交流腯體膏將鎔龍頭費挹酌犢鼻彊遮蒙常畏俗物來去避靑蓮宮廣堂鋪琉璃髙檐蔭梧桐廊壁畫地獄獄具鑊鋸舂鐵城何燄燄鐵牀亦彤彤誰知炮烙死活間傳自西域黃面翁正類人世苦此熱聲利役使亾西東京師䝿賃㡬椽舍竆煎相似聒欲聾屋頭朝㸑作飲食枕底夕艾驅蚊蟲宜爾近巷江夫子賦詩特壓塵土中送趙諫議知徐州及鹿車㡬兩馬㡬匹軫建朱幡騎彀弓雨過短亭雲斷續鶯啼髙柳路西東呂梁水注千尋險大澤龍歸萬古空莫問前朝張僕射毬場細草緑蒙蒙送邵戸曹隨侍之長沙青袍㑹稽椽采服湘江行水館魚方美犀舟枕自淸鷓鴣啼欲雨螮蝀見還晴風土雖卑溼醇醪可養生晨起裴吳二直講過門云鳳閣韓舍人物故作五章以哭之平生交友淚又哭寢門前魯叟不言命楚人空問天月沉滄海底星隕太微邉莫恨終埋沒文章自可傳使虜嘗專對江湖謫㡬年始看還近侍遽此隔重泉沃酒酒空滿託詞詞謾傳視予猶手足莫怪獨潸然算數曽無據仁人亦莫聞狠愚多至老蘭桂苦先焚不竟千秋恨還如萬里分臨風一號慟易散日邉雲昔時賔宴地今見繐幃遮棲室那因鵩從杯不為蛇曽無越人術竟起漢臣嗟明日東城陌悲凉後部笳曉陌行車過交相歎且驚荀龍聞一蛻穆駿失全鳴不復中書直空餘左史成緒言猶在耳尚想見平生聞髙平公殂謝述哀感舊以助挽歌三首文章與功業有志不能成嘗以隮髙位終然屈大名遺風猶可見逝水更無情歸卜靑烏壟韓城苦霧中京洛同逃酒單袍跨馬歸明朝各相笑此分不為稀公旣參鑪冶予將事蕨薇悲哀無以報有涕向風揮一出屢更郡人皆望酒壺俗情難可學奏記向來無貧賤常甘分崇髙不解䛕雖然門館隔泣與衆人俱歐陽郡太君挽歌二首夫人有賢子往歲謫夷陵欲使無愁鬱怡然見寢興外詞陽磊磊内畏實兢兢隮夀復終䝿共為時所稱當時丈人殁雖少守孤兒以及成名譽何嘗厭蒺藜暮年終饗福陰騭不應欺莫使碧江上獨傳陶母碑依韻和石昌言學士求鼠䰅筆之什鼠䰅鼠尾者前遺君謨今以松管代贈江南飛鼠拔長尾勁健頗勝中山毫其間又有蒼鼠䰅入用不數南雞毛二物緩急豈常獲捕刺徒爾操蠻刀舊藏已贈蔡夫子報君松管何蕭騷䆳隱堂大梁車馬地塵土飛百尺賢愚走其間朝暮不見迹北望天波門垣垣宗室宅宗室令王孫愛書輕玉帛華宇何深沉但聞列圖籍曲房有窈窕空自事睂額體胖生粹和安石處嵓石古來為善樂豈以歌鐘適讀永叔所撰薛雲衛碣文章如塗金光彩發美器所宜玉石間摹寫傳千祀堅堅孝子心森森柏庭閟豈與石麒麟原傍鬭蒼翠和石昌言以蜀牋南牋荅松竹之什蠻牋抽轉龍鱗細秋兔束毫雞距尖揚子校經聊以贈蜀麻江楮報何嫌赤蟻辭送楊叔武廣南招安南方赤蟻大若象潛荒穴洞人莫逢天公合雨不􅒙雨從橫亂出將自封侵疆凌壤壞城市戰鬭億倍南柯雄甞聞穿山食此物此物旣大非常凶張舌流涎莫可餌枉啄不怕長戈舂今令智者以智取即見蚳醢傳太宫因而使知禍福理天子下令雲從龍走筆戲邵興宗子魚一尾不曽有又諾毘陵蒼鼠毫細粒吳秔誰下咽尖頭越管厎能操送李中舍襲之宰南鄭莫問襃中道路難襄陽直上㡬重灘蒼煙古柏漢髙廟落日荒茅韓信壇出水槎頭一絲挂穿虹雨脚兩橋殘土風大抵如南國期㑹先時俗自安送王察推縝之鄧州昔向南陽憶洛陽秋橙初熟半林黃車過白水沙痕闊鴈落鉗盧稻穟長廢壘漢碑金刻字古原秦冢石為羊太平羽檄何曽有賔主相歡菊薦觴戲酬髙員外鯽魚天池鯽魚長一尺鱗光鬛動楊枝磔西城隱吏江東客晝日馳來奪炎赫冷氣射屋汗收額便教斫膾傾大白我所共樂仲與伯羡君赴約笑啞啞持扇已見飛鸞翮欲往從之雲霧隔送何濟川學士知漢州丞相初得君有志重儒術乃言天下士徒此占淸秩遂懲􅃷鬻人忝冒十八七進君天禄閣此衆為第一又薦王張韓恬可與君匹吾儕宜慙羞空自預朝韠欲歸無田園彊住枉歲日值君乗髙軒西望圅谷出當時迎長卿書史傳未悉車馳及襁負千萬今可詰老農喜君來田租不忘率織婦喜君來縑機當俟畢府胥喜君來督責去暴抶疾苦無不求前人唯法律晝錦榮旣浮康民美方溢眞為丈夫志豈是名過實依韻和達觀師聞蟬飲餘晨露吸餘風噪遍髙枝為俗聾欲比伯夷淸已甚不餐周粟腹常空依韻和杜相公謝蔡君謨寄茶天子歲嘗龍焙茶茶官催摘雨前牙團香已入中都府鬭品爭傳太傅家小石冷泉留早味紫泥新品泛春華吳中内史才多少從此蒓羮不足誇依韻和接花唯是圃人巧非關元化偏折條違物理遷豓得花權美女嫁寒壻醜株生極妍世間多妄合吾不謂之然送石昌言學士混混拍堤𤓰蔓水軒軒銜尾挂牆船使君東下只朝夕父老走迎無後先古堞秋耕拾銅鏃長淮瀑雨入壕蓮鳴猨舞鶴仍持去不憶承明夜直眠書南事大梁國南門驛騎方騰趨波波一何急蠻寇圍番禺番禺本無備前賴魏大夫大夫築子城今得守以須兵雖不滿萬閉壁堪指呼老幼轉木石壯健操矛弧廪庫得以完日月不易圖城中舊無井魏鑿安轆轤魏由飛語去不使立外郛古稱時有待淺薄皆謂紆曲突與爛額看取報功殊送吳照鄰都官還江南霜前江水磨碧銅岸背菱葉翹赤蟲吳郎鬢絲蒼㡬縷不羞月上扶桑東羞見清波照人影去時黑髮吹春風五年歸來婦應喜從此不問西飛鴻馮子都詩幷序漢霍光愛幸監奴馮子都與梁冀嬖奴秦宫事相對唐李賀作秦宫長辭亦云子都當時已有詩予因補之黃金畫車屋韋絮縁車輪牽以五采絲藉以刺繡茵出入長信宫晝夜將誰親所親美且少玉頰丹砂脣殷羅縫輕襦明珠攢緇巾半醉臥車中侍婢躡行塵憶昔廣明亭將軍愛憐頻便房不使殉易寵在兹辰嗣侯喜驅逐平樂多從賔靑絲穿五銖累室貯百珍歡與子都異矯與子都均用財糞土擲吐氣日月踆天地可齊久禍患豈有因秋風茂陵下蒼蘚上騏驎七月十六日赴庾直有懷白日落我前明月隨我後流光如有情徘徊上髙柳髙柳對寢亭風影亂疎牖我馬臥其傍我僕倦闕肘寂寂重門扃獨念家中婦乳下兩小兒夜夜啼向母問耶若箇邉天性已見厚不嗟羇枕孤不愧棲禽偶内有子相憶外有月相守何似長征人沙塵聽刁斗采芡蝟毛蒼蒼磔不死銅盤矗矗釘頭生吳雞鬭敗絳幘碎海蚌口出眞珠明磨沙漉水莩殻滑斫桂煮釡風波聲齒如編貝嚼明月曼倩不復飢腸鳴莫論一斛䝿與賤堂上狼籍無由行史氏南軒庭中碧石盎上結三重山飛光入酒杯舞翠生髻鬟竹林眠黃麞莎徑欠白鷴主人無倦情窗戸不須關送河北轉運使陳脩撰學士河隍多宿兵兵食固所須幸時不戰鬭畜養安可無古興十萬師七十萬家輟耕鉏今來歲調餉且與往昔殊不使民轉輓但使民歸租急緩實塞下商賈以利趨關西河東亦如此軍實雖足民賣虛公乎抱長才當有所畫謨應不貸内府重錦象牙明月珠邉城預自足寧待臨帑輸莫令稱庭臣為言桑大夫奉和寄宣州廣教文鑒師秋池對門蓮子枮野壁剥月蝸涎塗庭中兩株古楠樹上有山鳥長相呼當時聮巢接飛者一落梁宋一海隅扶桑日枝幾千尺光彩不獨生陽烏送陸介夫學士通判秦州從來戎馬地饗士日椎牛介胄奉儒服詩書參將謀隴雲連塞起渭水入關流豈似瀛洲下竆年事校讎送徐君章祕丞知梁山軍蒼壁束江流孤軍水上頭蛟龍驚鼓角雲霧裛衣裘午市巴姑集危灘楚客愁使君才筆健當似白忠州依韻和秋夜對月陳王苑裏望空虛吳客風前憶具區橫閣漸看河影轉繞枝還見鵲驚無蟲催織婦機成素露逼鮫人淚作珠才比陶潛無用處紗巾時任酒霑濡宛陵集巻十五
