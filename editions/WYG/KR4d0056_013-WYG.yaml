body:
  text: 宛陵集卷十三宋梅堯臣撰禁中瑞竹同本異莖孤竹二君子聖人知獨清但將竒節並何用首陽名依韻和集英殿秋宴殿幄陳金石宫梧集鳳皇侍臣嚴虎帳法衮被龍章九榖初登稔羣黎共樂康宴盤犀作鎮舞綴錦成行玉盌盛冰滑紗籠奏饌凉廡深容小語槐密漏微陽庭立衛兼霍坐尊蕭與張清塵汲瑶井泛宇藹天香獸躍縁橦地旗開踏鞠場樓傳紅幘唱簾隱内家妝鴟攫曽無彈蜂來誤有芳門傍銅鑄馬帝所翠爲觴萬國趨王會諸公佩水蒼螭頭左史筆陛楯半更郎雅著明時樂需言盛得光添花慕平一賜菊異元嘗身已陪多士心寧媿下鄉薄才何足補歌詠播殊疆啼禽盆繭未成絲破袴勸可脱安知増羞顔赤脛衣短褐汴堤鶯古堤多長榆落莢鵝眼小其下迅黃流其上鳴黃鳥安知舟中人黑鬢日巳少千里歸大梁玉笛聞䆗窕終朝不成曲幽響在林表莫羨沙路行金鞭馳裊裊四月二十七日與王正仲飲我來自楚君自呉相遇汎波銜舳艫時時舉酒共笑樂莫問罌盎有與無醉憶曩同吾永叔倒冠落佩來西都是時豪快不顧俗留守贈榼少尹俱髙吟持去擁鼻學雅闋付唱纎腰姝山東腐儒漫側目洛下才子爭歸趨自兹離散二十載不復更有一日娯如今舊友巳無幾歳晚得子欣爲徒四月二十八日記與王正仲及舎弟飲孟夏景苦長與子舟中飲酒行三四巡病嘔聊就寢仲氏又發霍洞下忽焉甚湯劑不能勝悶絶口巳噤我嘔雖未平驚走豈遑枕叫號使呼醫子怪亦莫諗遽白何至斯葛巾推小品且尤食物間羶腥失調餁所餉惟豬雞况此乏箘蕈以子獨無恙未必因滑瀋稍覺陽脈回慄膚猶㾕㾕儻其遂不起孰肯謂素稟吾鄉千里遥幸免成貝錦紹巖上人寧親爾教禁足不出户盛夏畏蹈螻蟻蹤赤日去省巳忘律曷若冠帶共甘濃送許州知録王殿丞霜花如鵠毛萬里㸃枯槀曉入蓬池道寒侵蘇合袍重來社櫟長舊寄里門髙去事黃丞相無辭執板勞慈氏院假山風濤春斷越山骨聚集竒險成千峰碧甕爲潭立涎石直疑嵓底藏蛟龍夜與鄰幾持國歸紅塵夜不息横衢若煙霧朝見車馬來暮見車馬去軍中目炯炯馬上情遽遽交相知是誰飛先無覓處十月晦夢遊嵩山明日訪宋中道見次道寄宿岳寺忽夢嵩峰下同遊失姓名山腰荒輦道嵓竇落泉聲黒石文難辨蒼苔蹟易成他時傳洛詠知是陸雲兄十一月七日雪中聞宋中道與其内祥源觀燒香三日不相見逢人問始知同車侵朔雪臨水拜靈龜絮撲鴛鴦帶花圑蛺蝶枝如何東郭叟足迹自穿綦和江鄰幾詠雪二十韻十一月將雪寒誰計有無雲横凍鵩翼霰集泣蛟珠萬里風爲使千門玉作樞縞衣來自鄭濤鷺卷從呉積甲聞熊耳觀鵝入越都庭槐髙臃腫屋蓋素糢糊騁巧能藏醜論功解飾枯巢禽皆白鳳來獸必騶虞遼俗休誇豕燕丹久望烏袒裘無壯臂附火念焦髗歌竹休王滿餐毛活使蘇亡羊何可問别鶴不應孤靡密同脂網縈回似舞姝漸深由片片取重本銖銖日月方収照乾坤不辨隅雖輕自相壓更潔亦終渝飢虎僵幽谷㳺龍脫勁䰅佳人調蜜蔗公子擁貂狐共是空囊客曽非暖席儒黄昬特過我興與灞陵俱送張遂州華省名郎意若西相如橋柱舊曽題已將符節爲邦守不畏關山入馬蹄千里過秦看素滻三年還蜀度青泥里門錦綬何為樂外奏嚴君内阿㜷送周寺丞宰新鄭仲冬吉徂征曉月在環玦京水生層冰梅山見殘雪縣庭槐已古堂壁碑未缺惟吾故交意贈子以為别尹師魯有志古堂記送余郎中知鄭州西接都門纔百里壓城殘雪照牙旗風煙古是諸侯國鴈鶩新來僕射陂餽食且依當日具鑄刑無改昔人爲濃薰舊舍青綾被不越常衙睡足時送胡都官知潮州自昔揭陽郡刺史惟韓侯韓侯初來時問吏瀧水頭到官諭鱷魚夜失風雨湫乃知抱正直異類尚聽謀潮雖處南粤禮義無遐陬勿言古殊今唯在政教脩適聞豫章士勇往登犀舟不畏惡溪惡疊鼔齊歌謳逺持天子命水物當自囚更尋賢侯迹書上揭陽樓送晏太祝之宣城監税每愛昭亭傍清灘石可數兩岸脩竹林孤城嚴晚鼔自辨越人言難廋楚鄉語郭門春聚船江賈無多取送張正臣赴泰州幕敲冰冰未泮塞河流玉段輕舸莫言遟古城滄海畔春皋蘭蕙茁晚井魚鰕亂時平無羽書此樂異王粲月下懷裴如晦宋中道九陌無人行寒月浄如水洗然天宇空玉井東南起我馬臥我庭帖帖垂頸耳霜花滿黒鬛安欲致千里我僕寢我廏相背肖兩巳夜深忽驚魘呼若中流矢是時興我懷顧影行月底唯影與月光舉止無猜毁吾交有裴宋心意月影比尋常同語黙肯問世俗子願嚔上辛祈榖爲獻官猛虎不獨宿鴛鴦不雙棲虞舜遊蒼梧帝子夜向瀟湘啼時既禪禹妃亦老老淚灑竹無髙低流根及筍駮紅蘚此情乃與天地齊我今齋寢泰壇下侘傺願嚔朱顔妻和司馬學士上辛祀事出郊寄馮學士侵曉度南薰禁鐘猶可聞春郊㣲有霰上苑稍藏雲齋館人相望官橋路巳分寧同鳥烏樂翔集自成羣同蔡君謨江鄰幾觀宋中道書畫君謨善書能别書宣獻家藏天下無宣獻既殁二子立漆匣甲乙収盈㕑鍾王眞蹟尚可覩歐褚遺墨非因模開元大厯名流夥一一手澤存有餘行草楷正大小異㸃畫勁宛精神殊坐中鄰幾素近視最辨纎悉時驚吁逡巡蔡侯得所得索硯鋪紙纔須臾一埽一幅太快健檀溪躍過瘦的顱觀書巳畢復觀畫數軸江吳種稻圖稻苖秧秧水拍拍羣鷺矯翼人荷鉏陂塍髙下石籠密竹樹參倚荆籬疎大車立輪轉流急小犢欺顧穉子驅令人頻有故鄉念春事况及蠶桑初虎頭將軍畫列女二十餘子拖裙裾許穆夫人尤窈窕因誦載馳誠起予予無書性無田區美人雖見身老癯舉頭事事不稱意不如倒盡君酒壺上元夜雪有感去年昭亭陽今夜苦風雪及雪在京城宵燈亦將滅石花廣袖輕梅蕊新妝潔悤悤競還家陌上亂車轍上元雪春雪如蝴蝶春燈如百花漫漫飛不巳愁殺千萬家我今無復夢擁被讀南華送李才元學士知廣安軍楊栁未堪折柔條時倚風朱輪過灞上杜宇響襃中危棧憎春雨晴林發曉紅不須言蜀政當自學文翁送王推官宰上洛先歸關中跨馬獨歸日春風隨度關客裘將欲綻社燕亦同還洛水源邊邑秦人隱處山君家有鳬舄切莫向雲間送信安張從事吉甫兼寄白使君西洛故人少世家今亦稀憐君能及禄過我苦言歸㳺宦長城下生涯舊國㣲使君應借問出處竟多違送懷州張從事仲賔行色在車馬西亭新雨過移家從上黨佐幕向三河皁莢林初暗黄粱酒未和七賢無復有舊迹尚應多宛陵集卷十三
