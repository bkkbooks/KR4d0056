body:
  text: 宛陵集巻二十宋梅堯臣撰次韻和劉原甫紫微過予飲酒所居汴水近未有鼓吹蛙昨日春雨晴車騎臨我家我家苦僻逺庭下無泥沙爲撇甕面醅爲煎鷹爪茶乳羮芼紫蒓密果飣乾𤓰與我相對飲但恨諸友遐笑語雖同昔放浪不少加忽觀壁間字坐歎目昬花公壯尚若此我老死豈賒門前賣桃李呼買婀娜華東檐大槐樹上有鳥雀譁恃舊無猜嫌醉弁已傾斜將去還見規禮數何檢差後從江韓來褫帶歡莫涯送湯延賞秀才下第歸參差緑柳上撩亂黄鸎飛失意暫時屈獨嗟千里歸淮船行欲駛江􅚝去應肥謝朓吾郷守欣欣見綵衣送門人歐陽秀才游江西客心如萌芽忽與春風動又隨落花飛去作西江夢我家無梧桐安可久留鳳鳳巢在桂林烏哺不得共無忘桂枝榮舉酒一以送荅來上人春日即事南國三衣客王城一見春花明馳道逺雨漲御溝新茗憶山中物雲懷嶺上鄰如何異鄉感却出解空人送楊申職方通判信州從來饒信吏愛寶襲侈越莫買冰玉盤蒼山斲明月明闕有時生窮巖有時喝君常抱清節歴職老無闕與我年齒同獨未變華髮又爲江外行畫舸羡明發送勾諶太丞通判潁州潁川倒灣流欄船曲轉鉤吏迎如太守民望亞諸侯芳圃深通野寒湖半抱州前賢多舊迹佳詠聽君留和永叔六篇幷序嘉祐四年春御試進士翰林學士歐陽永叔韓子華集賢校理江鄰㡬同爲詳定官有詩六篇出而使予和焉詳定幕次呈同舍苑樹天邉雨露勻羣公偷看錦叢新眼穿欲折無由折賞到人間不是春代鳩婦言不如作繭依蠶蔟以絲自裹還自足與爾爲婦過一生怒即分飛同轉目辛勤哺雛寄鵲巢子母生離因爾逐羽毛曽未顔色衰飲啄不計豐儉時天陰輒遣呼輒歸恩情紙薄誰信之朝爲夫婦夕行路世間反覆那能知伋妻白母非美事後代仿此誠堪悲看花呈子華内翰時不選數老獨嗟鬢毛未變目未花愛公深殿見桃李長才髙詠無能加紅英灼灼弄日色穠豔皎皎生鉛華長廊垂幕風不動映柳黄鶯吟未涯燕銜新泥補巢缺蝸壓峻陛臨角斜是時唯聞鳥雀閙盡日不聽車輪譁雖傳此景無分到但訝習慣猶豪誇他年造物倘有意不使齪齪居貧家禁中鞓紅牡丹洛中花之竒者與公同是洛陽客今日論年皆作翁一見此花知有感衰顔不似舊時紅和鄰幾學士桃花深殿有春人到稀武陵雖說昧當時躊躇莫憶人間世恐至塵中悔却遲啼鳥提胡蘆提胡蘆爾莫勸翁沽美酒公多金錢賜醇酎名聲壓時爲不朽百舌子百舌子春泥方滑滑泥雖滑滑輦道平莫學竹雞言易發深宮許爾來報春便是好鳥同其羣淸聲囀入君王耳安用穿叢苦避人桃李無言何所益畢竟有謝須紛紛莫以榮華長不歇人間已見翟公門安不忘危誰可貴貴時能憶困時聞縉叔以詩遺酒次其韻雜言君嘗謂我性嗜酒又復謂我耽於詩一日不飲情頗惡一日不吟無所爲酒能銷憂忘富貴詩欲主盟張鼓旗百觚孔聖不可擬白眼步兵吾久師君多賜壺能以遺向口滿盌傾玻瓈醇釀甘滑泛緑蟻從此便醉醒無期旣以樂吾真亦以泰吾身莫問今人與古人和范景仁王景彞殿中雜題三十八首並次韻殿幕閑興宮殿深沉處鶯花爛熳時關關哢清吭蒨蒨發朱蕤天上春應早人間日轉遲得賢如漢盛五字變周詩游延羲閣後藥欄授經聞漢帝嘗此講秦餘一日承丹詔同時見子虛來游瓊閣外閑傍藥欄初柳絮輕黏履薇條澀惹裾解歸巢上燕思寄袖中書此鳥如矜愼飛飛與客疎龍柏花非龍香葉非柏獨竊二美誇芳㽔苦練不分顔色近紫荆未甘開謝遲羣公莫以得地貴竟費佳句何足思延羲閣牡丹花中第一品天上見應難近署多紅藥層城有射干生雖由地勢開不許人看天子何時賞宮娥捧玉盤奉呈諸君參天朱閤峻拂地柳條垂太液緑波漲建章春漏遲長人執兵立小豎插花嬉但只逢人說無由預此時細竹森森漢宮竹託本異孤生玉砌縁根迸朱欄與筍平朝煙生密翠晚影漏斜明應待女媧采參差鳳琯清夜賦月從東殿生叢竹照脩竦葉間清露滴枝上寒禽動閑覺萬慮空靜聞嚴鼔重官燭翦更明相看應似夢三月九日迎駕前殿臨朝百辟囬後宮庭閤九重開鳴梢已自金階出黄屋初迎玉輦來不問偷桃方朔飽誰知載㦸子雲才羣官望幸無名姓只有窮吟許外陪浹日光陰天上早氣候日邉温懸蟢時過眼飛蟲稍入軒看花成子大聞燕養雛喧每覺瑶池宴風飄管吹繁宮槐漢家宮殿蔭長槐嫩色蔥蔥不染埃天仗龍旂穿影去鈎陳豹尾拂枝來青蟲挂後蜂銜子素月生時桂並栽我意方同杜工部冷淘唯喜葉新開有折景福殿後酴醾花至者有鳥銜花出清香不畏風初從上林發來過未央中蔟蔟霜苞密層層玉葉同誰將作美酒醉看月生東詩癖人間詩癖勝錢癖搜索肝脾過幾春嚢槖無嫌貧似舊風騷有喜句多新但將苦意摩層宙莫計終窮涉暮津試看一生銅臭者羡他登第亦何頻石詠君王愛石醜百孔皆相通怪狀一如此補天有何功匪言不可轉安得來宮中女豈比柱礎瑩然受磨礱逾旬重說已經旬應懷獨寢人通宵彈玉枕白晝拂牀塵幾想迎雕輦何當快倦身門前車馬立疑是角生輪晨起月向西樓下天光候日開殘星明寶鑑百舌響宮槐玉井傳新汲金爐換宿灰黄門馳有詔唱第許卿來金沙花金有披沙得花應不可多栽培由地力豔色與天和玉座君王賞朱欄將相羅稱觴千萬壽繁葉奈香何賜食誰言出相是山東今日求賢欲致功玉饌滿盤來禁裏鵠羮分鼎下天中但知愷悌酬君賜舊訝權輿向國風曽笑侏儒飽欲死宜思薇蕨不忘忠賜酒時頒光禄酒花出漢宮牆湛露承天渥流霞落羽觴近親龍尾道逺襲雀頭香溺殿人誰見終知曼倩狂賜書善經二字選來金殿盡英豪帝筆親承始是遭就裏少年唯賈誼其間蜀客乃王褎善經有意尊儒甚推擇方知待士髙歸付子孫傳百世深堂閑挂亦蕭騷賜燭天子賜燭昬夜時嫦娥閉月栽桂枝稱量髙下唯妍辭相與盡心無附離求安去病如上池照耀不容毫髮私品藻一定何可移光燄奪晝資爾爲宣王徒美庭燎詩魏帝自徹月殿披我朝好士萬古垂搜索賢俊登蒿藜孰不力吐肝膽脾枉用宴飲生脛脂雲龍將見升騤騤燃此必欲無所遺收殘喜氣如蒸炊蜜蜂慙媿空多知賜果前日宮醪賜玉樽今朝持果小黄門乾桃熏李非時物置案盈盤不次恩投以赤心思武帝握同𤣥璧詠劉琨嘗聞食奠陳玊業知是豳公幾世孫檜詠文章老重欲追古便作帝宫蒼檜詩靑蔥玉樹傳楊子盤屈洪桃見左思龍鱗已愛松身直珠實還看柏葉垂秀木豔叢那可擬但將霜雪定堅姿柳絮陶令生涯漉酒巾門前種柳萬條新花今吹作蓬萊雪曲舊得於關塞人應與殘英閑是伴不隨舞蝶去爭春可憐輕質都無定一落銀河莫問津殿後書事天子尋常幸直廬裹頭宮女捧雕輿紅泥已賜春醅酒黄帕曽經御覽書林果鳥應銜去後燕窠蟲有落來餘禁中事事能傳詠播在人間不是虛雨夜電光初照樹峩峩葉上微風與雨和玉腕愁聞無處奈庭花暗落不應多長楊靜響千重瓦太液寒生幾寸波洗濯靑春如有意平明濕羽未離柯景福殿水宮井蛟龍夭矯垂曉缾初汲喝禽窺淸泠已向金盆貯甘滑還從玉椀知九醖酒醇由此得小團茶味爲留遲閤門地脈應相似翰苑曽邀詠昔詩歐陽永叔曽邀予賦閤門水雨後新晴殿閤曉初日霧烟中柳重宮腰弱花肥粉頰豐渥恩君自厚藜藿我纔充草木欣欣發誰知造化功象戲象戲本從棊局爭後宫龜背等人情今聞儒者飽無事亦學婦人閑鬭明堂上有竒誰可勝樽中賭酒令方行直驅猛獸如尋邑何似昇平不用兵再觀牡丹聞說偷觀近玉欄腸如車轂轉千盤無人憶著洛陽日走馬魏王隄上看白牡丹白雲堆裏紫霞心不與姚黄色鬬深閑伴春風有時歇豈能長在玉階陰紫牡丹葉厎風吹紫錦囊宮爐應近更添香試看沉色濃如潑不媿逢君翰墨場七寳茶七物甘香雜蕊茶浮花泛緑亂於霞啜之始覺君恩重休作尋常一等誇庖煙羃䍥庖煙出綵油欲通雲霧未能周濕薪燒盡日亭午試問霏霏何處浮省中漢相家人尚苦疑不言温室樹何枝君今坦坦無猜忌夸說皇居盡入詩天上紫微垣裏月光飛玉佩腰間正陸離天上去來知幾日蟠桃結子是歸時明月明月已生城上頭小星光滅大星流來朝放牓出宫去何處殘花轉入溝再賦誰人重詠大刀頭只願長明不願流縱使西傾必東出寧同寒水㵼宮溝殿中柳絮玉几當中寶作牀無端絮惹御袍香羣公唱第魚龍化列侍金階若堵牆宛陵集巻二十
