  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_052-1a, image: WYG1099/WYG1099-0371a.png}
body:
  text: 宛陵集卷五十二宋梅堯臣撰刑部㕔看竹效孟郊體和永叔用其韻蒼蒼庭中竹事莫歎遲速不同欄下草一歳一廻緑朝開花照曜暮落風相逐何如飽霜雪冬夏森寒玉誰將種官舍本合近巖屋不可一日無瀟灑看未足阮生豈其愚林中醉醽醁我當明月時移牀來此宿較藝和王禹玉内翰分庭荅拜士傾心却下朱簾絶語音白蟻戰來春日暖五星明處夜堂深力搥頑石方逢玉盡撥寒沙始見金澹墨牓名何日出清明池苑可能尋再和㢘纎小雨破花寒野雀爭巢鬭作團手巻白雲光引素舌飛明月響傾盤羣公錦繡為腸胃獨我塵埃滿肺肝彊應小詩無氣味猶慙白髮厠郎官謝永叔荅述舊之作和禹玉天下才名罕有雙今逢陸海與潘江筆生造化多多辦聲滿華夷一一降金帶繫袍廻禁署翠娥持燭侍吟窗人間榮䝿無如此誰愛區區擁節幢較藝贈永叔和禹玉今看座主與門生事事相同舉世榮並直禁林司詔令又來西省選豪英飛龍借馬天邊下光禄供醪月厎傾食葉蠶聲句偏美當時曽記賦將成戲荅持燭之句依韻和永叔盧仝只有赤脚婢吏部曽吟似笑仝紅燭射眸從結客清歌帖耳苦憐翁歸時雖已過寒食芳物猶能逐暖風但㸃紗籠續清夜西園遊興古何窮重荅和永叔我家唯有一團月挂在颼颼草屋東玉兔巳為公取玩更休窺望桂叢中又依韻多病相如不復云更何曽有卓文君他時我向㑹稽去只是荆釵與布裙刑部㕔海棠見贈依韻荅永叔二首搖搖牆頭花蒨蒨有好色髙枝笑粲粲低枝明皪皪但與風相撩不與風相得風吹莫苦急游子歎日􅉴彭祖與顔囬相去猶瞬息每觀形影篇曷在神所釋不可廢我吟畢竟焉免白搖搖牆頭花一一如舞娥春風買豓逸豔逸此何多不為游蜂撓即為狂蝶過日光苦給給魯叟白波波人生若朝菌不飲奈老何揚雄寂寞居豈若阮生歌春雨呈主文蛟龍上漢魚潛動梁棟生雲燕未知風㸃稍聞寒瓦急玉條初向畫簷垂何郎夜聴應逢句謝朓朝觀必有詩老大莫將文字困為公牽彊不勝疲謝鷴和公儀聞有白鷴夢遂作白鷴詩詩記白鷴語意公於鶴私公意無薄厚爾將聴我辭朝給一瓢水晝給一盎糜曽不令爾渴曽不令爾飢事事不異鶴安得於鶴疑鶴鳴爾不和鶴舞爾不隨無以一供恱飽食畨頑癡公所念爾久李白當畜之白固有篇詠公偶未暇為遣爾心不平謂此鈍見遺我持爾此意請公吟莫遲公便納我言濡筆灑淋漓書爾在南方野羽霜雪披弄啄紅豆實飛上桄榔枝翡翠不敢頋孔雀不敢窺將擬是白鳳脩尾晝漣漪虺頸而雞首峩峩如有儀而今與鶴爭此識固已卑公初待爾厚鷴兮知不知較藝將畢和禹玉窗前髙樹有棲鵲記取明朝飛向東家在望春門外住身居華省信難通夜聞相府催張牓曉聴都堂議奏中龍閣鳳池人漸隔猶因朝謁望鼇宮送白鷴與永叔依韻和公儀致鷴猶恐鷴飢渴細織筠籠小瓦缸玉兔精神憐已久金鑾人物世無雙休爭白鶴臨清沼且伴鳴雞向緑窗美羽奇毛有多少爾身髙穏勝他邦書事和韓子華舍人見憑蝴蝶過牆飛却夢翩然入綺闈欲撲翅輕縈不住覺時疑有粉霑衣明經試大義多不通有感依韻和范景仁舍人明經與進士皆欲取公卿自是俗儒陋非於吾道輕昔由羔鴈聘今乃草萊并不措一辭去縁何禄代耕出省有日書事和永叔辭家綵勝人為日歸路棃花雨合晴庭下鞦韆應未拆籠中鸚鵡即聞聲千門走馬將看牓廣市吹簫尚賣􅄳已是瓊林芳卉晚不須遊處避門生定號依韻和禹玉言出君門日遙聞紫禁鐘詔書中使降駿馬上閑供天下持平手毫偏不置胸文從有司較巻是近臣封勝陣無容敵精兵已善攻明朝當奏號鴛鷺看歸雝寄桂州張諫議和永叔桂林太守幾時行泛汴桃花浪巳騰目極雲陰低逺樹夜寒風急亂春燈巢鳴翡翠愁無恨水宿鴛鴦冷不勝陽朔山前好峰嶺為公憐愛萬千層觀張中樂書大字芝旭馳名世有孫大書如曉過秋原長松怪柏皆成炭豫氏觀傍不解吞張淳叟獻詩永叔同永叔和之張君獻詩詩詞巧美女插花嬌醉春公荅七言夸筍笴我無千里學騏驎夜吟謝朓澄江練露濕陶潛漉酒巾歸去應將錦囊貯已勝珠玉莫愁貧上馬和公儀煙火千門曉欲開五花驕馬肯徘徊井閭已是經時隔親舊全如逺别來帝闕重看多氣象天街新霽少塵埃振冠浣服無容久便見池門放牓催太師杜公挽詞五首國佐三公進師臣一品歸接賔忘素䝿還綬逺危機憶奉追尊册當觀副輅旂生榮人莫及無恨掩泉扉慶歴中改謚章聖五后公奉册乗副玉輅出宣徳門既老仍開國因歸得賜金念懷知主意堅介見臣心筆札尚存紙性情猶託吟向來門下客東首淚盈襟前歳因侍講王内翰歸省其兄於睢陽上賜公金莫怪霑襟血無由作弔賔故池歸去鴈春信見何人已冩虚堂影猶鐫守冢麟門生與舊吏將立道傍珉言為當代法行不古人慙天子䝿元老史官傳美談名髙漢亞相學嗣晉征南有子即家寶未嘗金玉貪見録尋常詠親裝復手題言從永嘉後重與建安齊自古難知已孤生每擇棲春風寄黄鳥為向墓間啼去歳同在植郎中謁公公出手裝僕詩一軸送方云秀才下第從來釣者意豈不在得魚餌寡魚口多曽非投竿疎向登百金䝿首尾必吹噓竭澤古所戒但保腹中書風雷變有時且復歸孟豬送張待制知越州滄海東邊㑹稽郡朱輪逺下相臣家已同雲漢星庭轉不與鑑湖風月賖越箭抽萌供美茹秦山堆翠照髙牙買臣嚴助前時䝿破盜論功未足誇送甥蔡駰下第還廣平爾持金錯刀不入鵝眼貫已遭俗弃擲妄意堪憤惋他時有識别終必為寶玩懷之歸河朔慎勿輒鎔鍛改作毛遂錐穎脫奚足算送唐紫微知蘇臺洞庭五月水生寒盧橘楊梅已滿盤泰伯廟前看走馬闔閭城下見驂鸞吳娃結束迎新守府吏趨鏘拜上官曽過揚州能慣否劉郎盞厎勸須寛韓持國遺洛筍龍孫春吐一尺芽紫錦包玉離泥沙金刀璀錯截嫩節銅駞不與大梁賖持寄韓郎緑蒲束莫令衞女苦思家韓郎才調偏能賦分餉唯思楚景差因之善謔誦淇澳欲學報投無木𤓰萊宣遺酒白日對芳樹靜夜愛明月我飲雖不多杯杓安可闕破屋有空缸冷竈無黔突投餐開韓辱乞食使陶訥鑒此不求人終身其鏤骨儻有佳客過未免貰袍笏風從東南來語向西北發西北多鳳雛枝間報清越玉壺盛曉露贈置醉莫歇却少可飲人為告月休没送王正卿寺丞赴睢陽幕廢囿孝王國離宮天子都古今雖且異文物未嘗無族有栽槐美名從得桂殊應聞漢丞相待士倒樽壺韓玉汝遺油朝讀百紙書夜成幾篇書明明白晝有陽烏黕黕暗室無蟾蜍目睛須藉外物光日月不到卑蔀居君能置以滑油壺暝照文字燈燄舒婦將膏髮雲鬢梳缾厎濁濃留脂車所益既如此所感當何如王幾道罷磁州遺澄泥古瓦二硯澄泥叢臺泥瓦斲鄴宮瓦共為几案用相與筆墨假賦無左思作書媿右軍冩初從故人來來自邯鄲下物因人以重謬當好事者送咸陽主簿王祕校昔見蘭叢芽今見連蔓𤓰持入咸陽市本出故侯家五色相鉤蔕秦人應自誇行當七月薦乞巧雜盤花和楚屯田同曽子固陸子履觀予堂前石榴花堂下一匹鄭䖍馬欄邊兩株安石榴但能有酒邀佳客亦任狂花落素甌俗女紅裙無好色主人白髮自侵頭欲歌翠樹芳條曲已去洛陽三十秋送史供奉汴口都大河為中國患亦為中國利其患齧隄防其利通糧饋分流入浚汴萬貨郡城萃積淫或暴漲旱暵或滯疐疏導欲其宜經度有所異曩者多邀功用之殊未至十私而五公歳久害愈熾潰溢必歸尤廟堂難決議明明聖天子自選中常侍銀璫插在貂身小勇且智上從廣武城下及淮與泗廻險帖鑿緐所畫由所寄甞以勤厥身又能和衆吏前日有盡心于今病憔悴此職方藉人加餐當自為呂晉叔著作遺新茶四葉及王游共家原坂嶺歳摘建溪春爭先取晴景大窠有壯液所發必奇穎一朝團焙成價與黄金逞呂矦得鄉人分贈我已幸其贈幾何多六色十五餅每餅包青篛紅籖纒素檾屑之雲雪輕啜巳神魄惺㑹待嘉客來侑談當晝永送畢甥之臨卭主簿自我歴官三十年有脚未曽行蜀川李白嘗言道之艱險長嗟難劇上青天鳥悲猨號馬蹄脫苔梯雨棧愁傾顛蒼崖下窺不見厎但聴雷聲輥石懸湍濺曉盤青泥上髙煙暮盤青泥到下泉劒閣如劒巉然割腸刺眼今古連爾去三千九百里巴山小馬烏皮韉一婦一奚行李單家具日貨能幾錢人皆畏避不敢往此獨敢往何所便况是初宦無逺適心意自許非由銓異乎哉我今送爾徒哀憐依韻和公儀龍圗招諸公觀舞及畫三首落花淨埽青陰長野蝶閑飛緑草間侍從退來看鶴舞便將樽酒欲招閒陰森園圃牆東地攜挈兒童樹下吟便約天邊鳳皇侶閱書觀畫味尤深初約看花花已盡重新邀客客應歡真花既不能長豔畫在霜䊵更好看宛陵集巻五十二
