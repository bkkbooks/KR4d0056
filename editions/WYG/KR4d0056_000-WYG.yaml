  text: 宛陵集目録别集類二宋卷一西京詩五十六首卷二西京詩五十首卷三西京詩六十一首卷四池州後詩五十八首卷五池州後詩上二十八首池州後詩下三十三首卷六池州後詩三十七首汝州後詩十一首卷七汝州後詩五十一首卷八汝州後詩四十三首湖州後詩六首卷九湖州後詩四十六首卷十湖州後詩六十五首卷十一湖州後詩五十九首卷十二詩六十三首卷十三詩二十九首卷十四詩十六首卷十五詩四十六首卷十六詩四十四首卷十七詩六十四首卷十八詩四十六首卷十九詩三十五首卷二十詩五十二首卷二十一詩四十四首巻二十二詩四十三首卷二十三詩四十二首卷二十四詩五十九首卷二十五詩四十四首卷二十六詩四十七首卷二十七詩四十四首卷二十八詩五十八首卷二十九詩五十首卷三十詩五十六首卷三十一詩五十七首附記一首賦一首卷三十二詩六十一首卷三十三詩五十四首卷三十四詩六十四首卷三十五詩三十七首卷三十六詩五十二首卷三十七詩六十首卷三十八詩四十七首卷三十九詩二十七首卷四十詩四十五首卷四十一詩四十首卷四十二詩三十八首卷四十三詩六十三首卷四十四詩三十八首卷四十五詩三十七首卷四十六詩三十二首卷四十七詩五十二首卷四十八詩四十二首卷四十九詩二十八首卷五十詩二十九首卷五十一詩五十首卷五十二詩三十七首卷五十三詩三十二首卷五十四詩三十三首卷五十五詩三十四首卷五十六詩二十九首卷五十七詩三十首卷五十八詩三十四首卷五十九詩三十四首卷六十記一首序一首賦十九首臣等謹案宛陵集六十巻附録一卷宋梅堯臣撰堯臣字聖俞宣城人官屯田都官員外郎其詩初為謝景初所輯僅十巻歐陽修得其遺藁増併之亦止十五巻其増至五十九巻又他文賦一巻未詳何人所編陳振孫謂即景初舊本修為作序者殆未詳考修序文耳通考載正集六十巻外有外集十巻此為明姜竒芳所刋巻數與通考合惟無外集祗有補遺三篇及贈答詩文墓誌一巻亦不知何人所附陳振孫謂外集多與正集複出或後人刪汰重複故所録者止此耶宋初詩文尚沿唐末五代之習栁開穆修欲變文體王禹偁欲變詩體皆力有未逮歐陽修崛起為雄力復古格其時曽鞏蘇軾蘇轍陳師道黄庭堅等皆尚未顯其佐修以變文體者尹洙佐修以變詩體者則堯臣也其詩㫖趣古淡惟修深賞之邵博聞見後録載傳聞之説謂修忌堯臣出已上每商㩁其詩多故刪其最佳者其誕妄甚矣乾隆四十一年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序予聞世謂詩人少逹而多窮夫豈然哉蓋世所傳詩者多出扵古窮人之辭也凡士之藴其所有而不得施扵世者多喜自放於山巔水涯之外見蟲魚草木風雲鳥獸之狀類往往探其竒怪内有憂思感憤之鬱積其興扵怨刺以道羇臣寡婦之所歎而寫人情之難言蓋愈窮則愈工然則非詩之能窮人殆窮者而後工也予友梅聖俞少以廕補為吏累舉進士抑扵有司困扵州縣凡十餘年年今五十猶從辟書爲人之佐鬱其所畜不得奮見扵事業其家宛陵幼習扵詩自爲童子出語巳驚其長老既長學乎六經仁義之説其爲文章簡古純粹不求苟合扵世世之人徒知其詩而巳然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂扵詩而發之故其平生所作扵詩尤多世既知之矣而未有薦扵上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用扵朝廷作為雅頌以詠歌大宋之功徳薦之清廟而追商周魯頌之作者豈不偉歟奈何使其老不得志而爲窮者之詩廼徒發扵蟲魚物類羇愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩既多不自収拾其妻之兄子謝景初懼其多而易失也取其自洛陽至扵呉興以來所作次為六十卷予嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能次也輒序而藏之慶厯六年三月右正言知制誥知滁州事歐陽修序
