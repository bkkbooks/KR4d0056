body:
  text: 宛陵集卷九宋梅堯臣撰依韻和胡武平懷京下游好以下湖州後詩南國易悲愁西風起髙樹枯荷復送雨度鴈寧知數欲問北來音繫書復若故冥飛杳無迹弋者徒有慕况在白蘋洲而懷石渠署石渠多故人鵷鵠方鶱翥鏘鳴尚可希綷翼何由附主人頼知巳未變疇昔顧乘桴豈仲尼好勇非季路幸依南郡帳不學邯鄲步自守終日愚都忘向時慮睠戀此江湖親年當喜懼既獲庭闈近又多山水趣邇來對明月千里猶會晤長橋人絶聲舉酒逢秋露迥聞孤舟笛煙水在何處俯檻意無涯跳波魚夜乳頗得眞隱情奚須慕巢許思寄梅枝香逺隔蘭溪渡緘之付好風精爽亦隨去依韻和武平九月十五日夜北樓望太湖東呉臨海若看月上青冥河漢㣲分練星辰澹布螢細煙沉逺水重露裛空庭孤坐饒清興惟將影對形依韻武平憶玉晨觀世路多氛垢人間浪逐名是非還自喻寵辱固堪驚薄宦眞何戀丹砂儻可成終尋谷口隱鄭子豈其卿凝碧堂始至荷芰生田田湖上宻復當花競時艷色凌朝日今來蓮已枯碧水墮秋實更待雪中過群峰應互出樽有緑蟻醅俎有赬壺橘可以持蟹螯逍遥此居室送劉成伯著作赴弋陽宰我昨之官來值君爲郡掾當年巳知名是日纔識面未久嗟還都始應羣公薦遂除芸省郎出治江上縣縣劇素所聞其俗到可見水精製盤盂去冰瑩産郊甸鳴筝斲桐梓雕飾雜寳絢有藥化銅鉛方士多伏鍊君今齒尚壯好學常不倦二者定非惑吾言亦狂狷絃歌將有餘幸可窮經傳歸來期著書篋楮盈百巻莫學此疎慵無能守貧賤明朝君當行勉勉自出餞豈無一壺酒豈無一鼎饌冬雷上帝設號令隱其南山下震發固有時曷常事憑怒春以動含生夏以奮風雨冬其息不用藏在黃厚土我今來江南歳厯惟建午如何小雪前向曉疑鳴釡蛟蛇龜蟲厄鱗裂口塊吐蝦蟇不食月深窟僵兩股天公豈物欺若此汨時序或言非天公實乃陰怪主嘗觀古祠畫牛首椎連鼔黒雲雜狂飇相與爲肺腑是不由昊穹安能順寒暑吾因考厥事復以驗莽鹵市井欺量衡定知不活汝元惡逆大倫弗加霹靂斧此豈曰無私故予未所取必恐竊天威似將文法侮焉顧五行錯詎畏萬物覩欲扣九門陳恨身無鳥羽劉成伯遺建州小片的乳茶十枚因以爲荅玉斧裁雲片形如阿井膠春溪鬭新色寒籜見重包價劣黃金敵名將紫筍抛桓公不知味空問楚人茅冬日送暹上人霜風刮地如刀鎌鳥不逺飛魚已潛何况削髮冷入骨草屨不畏冰雪霑縁山涉水去幾里晝盋野飯誰來添毗陵舊寺苦欲到索我贈行無久淹和夀州宋待制九題熙熙閣初日照城樓流暉及菌閣上収花霧紅下見春煙薄信美是殊邦而淹佐時略自慙江外人敢慕淮南作春暉亭卉木日已發中圃日巳嘉歡言樂和景及此鬢未華春風實無幾凌亂枝上花山陰况暮月俯仰誠可嗟白蓮堂蟋蟀在秋堂芙蓉出深水浩露同一色澄澈寒鑑裏佳人恥施朱欲與天眞比沙鳥閑且都誰將擬公子式宴亭從事誰獨賢而來均宴喜幽禽雜嘯呼珍木竟叢倚興將物色俱閑厭簫鼔美寧同不聞問訟息時遊此秋香亭髙軒盛叢菊可以泛緑樽餘甘自同薺忘憂寜用萱有木皆剥實何草不陳根獨此冒霜豓芬郁滿中園狎鷗亭羣生自知機不可欺以異此雖鷗與馴鷗亦魚所避坐熊臨碧水安得同一致然此海客心還應無有媿齊雲亭城隅結危棟髣髴凌煙霓平觀飛雨來俯窺巢禽棲浩蕩孤思發羃䍥蔓草齊長安去不逺何言西北迷美䕃亭野材仍翦茅當此茂林下晴暉葉上明翠影杯中㵼鮮風時颼飅輕裾自蕭灑固殊嵇生鍛曷慕巖棲者望仙亭嘗聞淮南王雞犬從此去至今山頭石馬迹尚有處使君辭從官終日絶塵慮望望雲漢間想見賔天馭依韻和僧説上人見訪客從東國來山雲猶在屨是時正窮臘鴈落溪陰暮投宿古城隅雪迷松下路衣楮足蘭荃相過寧厭屢立春前一日雪中訪烏程宰李君俞尋有詩見貺依韻和荅粉絮先春拂面翔臨風躍馬到君堂縣民將喜土膏起令尹未驚農事忙疾呼小吏具山酌便欲盡醉爲詩狂我牽塵俗不得久何意更煩投夜光送劉比部青山夜來雨溪水巳潺湲侵曉桂旗動傷離蘋渚前百壺臨祖道兩槳破春煙舊業西河上歸心向日邊贈月上人彈琴人閑溪上横刳木素琴寒倚一枝玊呉王城畔鎖深房月下空彈孤鴈曲冬日陪胡武平遊西余精舍侵晨霜氣嚴溪口冰已合烏榜將進遲寒篙旋摧拉遥看松竹深雪屋藏山衲登臨興都盡薄暮沿清霅依韻和武平苕霅二水昔愛伊與洛今逢苕與霅南郭復西城曉色明扵甲塵纓庶可濯白鳥誰來狎落日潭上歸魚歌自相荅依韻和武平昇卞二山北峰壓城蒼南岫縁溪緑誰知昔人遊尚想叢桂馥鳥獸安可羣呼鳴自爲族儻聞羨門術一躡塵外躅送崔主簿赴睦州清溪舟輕不畏險逆上子陵灘七里峽天翠千重雲木寒古祠鳴野鳥亂石激春湍正與髙懷愜寧歌行路難依韻和劉比部留别春雲已泊簾濃澹半晴天沙草㣲抽緑林枝逺帶煙况兹逢晩景那更送歸船苦酒聊爲酌無勞辨聖賢送潘供奉承勛與君迹熟情已親欲將行邁聊感人舉酒不能効時俗半辭苦語資立身長大實好帶刀劒曷不往助清邊塵門㦸雖髙豈自有當思乃祖爲功臣所宜踴躍發竒䇿嘉名定體庶得眞儻以斯言作狂說乘肥食脆任青春荅新長老詩編江東釋子多能詩窗前樹下如蟬嘶朝風暮月只自老建安舊體誰攀躋唯師獨慕陶彭澤竒蹟仍収王會稽嘗示余右軍書一軸此焉趣尚已不淺更在措意摩雲霓題劉道士奉眞亭䧏眞沉水生爐煙扣齒曉潄華池泉心存崑閬未可到夜瞻北斗何聯聯顧兹虚室如有遟一草一石幽且妍芝蓋雲輧杳無至不知誰更似羊權依韻和烏程李著作四首縣署西園春入西園何苦誇我曽狂醉洛城花如今老大都無興獨坐晴軒看落霞霅上二首共愛霅溪風物美春來清可鑑䰅眉蘋生楚客將歸日花暖呉蠶始浴時臨水竹樓通市陌跨橋雲屋接川湄畫船載酒期君醉巳是無謀助翦夷靚妝艷服遊川上簫鼓聲中俗自歡寄語春風休用惡恐教潭水起波瀾早春遊南園東國春歸早南園百卉宜萱芽開翠穎杏萼破煙姿青壠將鳴雉喬林未囀鸝石尤風莫起芳物畏君吹送僉判張祕丞赴秀州江燕歸時君亦歸燕巢未暖君還去去去溪邊楊柳多正值清明欲飛絮競折贈行何所益時當長養傷嘉樹不如舉酒對青山酒罷移舟須薄暮嘉禾主人余久知迹冗不擬彊攀附儻或無忘問姓名爲言嬾拙皆如故送弟赴和州幕夾河爲郡不如古江北江南作冗官須記長傳一經訓雖貧莫改飲瓢歡歷陽况與吾廬近春榖休言問膳難此日停舟聊舉酌明當水驛自加餐寄題徐都官新居假山太湖萬穴古山骨共結峰嵐勢不孤苔徑三層平木末河流一道接牆隅已知谷口多花藥秖欠林間落狖鼯誰侍巾㡚此遊樂里中遺老肯相呼送梵才吉上人歸天台頃余遊鞏洛值子入天台當時羣卿士共羨出氛埃荏苒踰一紀却向人間來問子何爲爾言興般若臺雖將發愚闇般若安在哉此教久巳熾増海非一杯我言亦爝火豈使萬木灰蓋欲守中道焉能力損裁子勿疑我言遂以爲嫌猜忽聞攜錫杖思向石橋迴城霞與琪樹璨璨助詩才嘉辭徧人口幸足息巖隈公度以余嘗語洛中花品而此邦之人多不敢言花扵余今又風雨經時花期遂過作詩以見貽故次其韻去年三月來呉中欲擬看花無與從今年二月花偏早發作無節雨與風前時晴明要尋賞謂夸洛陽多不容我心豈是限南北美好未必須深紅姚黃魏品若盡有春色定應天下空因君見贈又及此莫怪還思澗水東留題可及明心堂秭雉已先號卉木萼漸歇俯檻弄條枚因心悟生滅上人本髙胄季父踐清列而能厭紛華樂彼方外説陪武平㳺雅上人房卞峰亭晚愛池上清羣峰對檐隙常恐雲氣生坐令蒼翠隔復繞曲塘陰映實孤花拆誰知禪者居來伴使君適送張舎人自安吉移宰同安逺辭湖上山徙治海邊邑機杼呉俗饒魚鰕越人給操琴在更張殊土宜順襲何以贈勤勤薄言兹所及劉彞秀才歸江南鳳鳥不在笯麒麟寧受靽君思此二物中夜忽興歎况值南風來襲蘭歸楚岸送胡武平來見江南昬使君詠汀蘋再㸔蘋葉老汀畔送歸人人歸多慕戀遺惠在兹民始時繞郊郭水不通蹄輪公來作新塘直抵呉松垠新塘建輿梁濟越脱輈仁言度新塘去隨迹如魚鱗從今新塘樹便與蔽芾均我雖備僚屬筆舌敢妄陳因行録所美願與國風振迴陳郎中詩集嘗觀陳伯玉感遇三十篇矯矯追古道粲爾日星懸今公豈其後佳詠久已傳憶爲童子日早誦錦繡妍茲來預官屬而許玩竒編明珠三百琲一一徑寸圓他人握中有未獲毫髮焉家貧敢懷寳况近驪龍淵又畏風雨作神物不得全再拜捧明月長跪還席前依韻和武平别後見寄溪逺檣危一望遙此焉悽絶府中僚已同鴈鶩依清淺共看鸞皇上泬寥别岸無端縈細柳迴舟不忍過新橋醉來事事能生感誰道愁腸酒易銷蘄州廣濟劉主簿相識雖非久相親似舊年論文君豈後尚齒我慙先慣狎呉兒水將浮楚客船安知不離恨髙柳正鳴蟬依韻和僧説夏日閑居見寄城郭非清凉山僧抱微疾又况三伏時當兹一禪室炎飇正爍爍溪水徒瑟瑟唯詠冰雪辭可以銷夏日依韻和李宰秋思一葉與風舞已知天地情將令百果實競振群蟲聲陶令欲収秫豳人思誓觥更吟君麗句誰爲寫鍾評送儲令赴韶州樂昌嘗聞韶石下虞舜古祠深至樂久已寂况持陶令琴炎方不道逺一去值秋霖隱眞亭烏程史尉署作尉慕吾祖吾祖非得時誰似芙蓉國日見芙蓉披凉雨隨風來清香入酒卮自得眞隱趣不慙呉市爲説上人遊廬山夙懷髙世趣固足林壑情欲遊名山徧遂爲廬岳行又訪逺公蹟東林氣象清瀑布秋影落香爐曉煙生洗蕩萬古慮薰蒸千載名我今滯孤宦空羨缾錫輕和元之述夢見寄髙秋枕席涼晝寢還清曠不嘲君腹便獨夢予爾訪豈忘相規言仍記羣小謗始知端正心寐語尚不誑惝怳何讒人告子亦孟浪吾聞有尸蟲伺惡多相尚耽睡受其惑子心恐成恙勉子守庾曹勿使茲物王魂交昧聪明寤後成清唱誦玩自省循徒爾増怊悵不能檢細微遂使言屢貺雖然甚頑鄙内顧無過當仲尼稱天厭季路猶行行何當謝勤誠爲子傾嘉釀秋日臥疾恭上人來過不及見因以詩荅溪上秋霧多溪居曉寒入呼吸遂生疴嘔泄不下粒素知江南地大率皆卑濕久從呉土居氣候非所襲伏枕欲經旬冠帶拈巳澀女奚特扣關問疾提山笠我非金粟身寄謝何暇揖屈性茲不能他時冀來及依韻和守賢上人晚秋書事秋霧鬱不開曚曨夾溪樹深枝尚宿禽寒葉時驚露我居溪之陰早景誠所慕開谿吐初陽獨吟神與晤豈意方袍人而懷此焉趣忽枉瓊玖章無慙惠休句宛陵集卷九
