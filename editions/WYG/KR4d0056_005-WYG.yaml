body:
  text: 宛陵集卷五宋梅堯臣撰贈黃庭筠舉進士橘柚生南國幽林日蔥蒨上有嘉禽鳴五色被餘絢彼美發華英厥包待秋薦根本當自持無爲風土變和滕公游穿山洞洞口水石淺潺潺㵼緑蒲縁源進巖竇隂黒人境殊中言有物怪蟠蟄春未蘇霖雨雖有意風雷莫肯扶風雷自鼔盪不久當何如幸欣禪林近鐘梵來有無回䇿履幽逕衣香草露濡老僧長松下麋鹿與之俱溪雲時見起山鳥自相呼羨爾得兹樂何用勞形軀陳眞卿將有秋試倐見訪不日告行送扵北門歌鵠庭為五言以贈送君北岡上舉酒歌黃鵠黃鵠去何髙天池待棲宿寧復戀江湖聊兹混雞鶩暉暉振羽裳不羨淵明菊秋日詠蟬羣蟲喜炎熱此獨愛髙陰薄蜕聊依葉清深巳出林人閑感衰節風急雜遥砧虚腹曽何竟常憂螗斧侵范饒州夫人挽詞二首聽飲大夫日止言京兆辰嘗憂伯宗直曽識仲卿貧蒿里歸魂逺芝山旅殯新江邊有孤鶴嘹唳獨傷神君子喪良偶拊棺哀有餘莊生慙擊缶潘岳感㳺魚夕苑凋朱槿秋江落晩蕖猶應思所歴入室淚漣如弔礦坑惠燈上人生棲雲際巘没𦵏寺傍邨破案殘經卷新墳出樹根松悲隔溪路月照舊山門自昔多詩句而今幾許存寄題石埭權縣樂尉碧瀾亭遥知溪上亭秋水瀁泠泠雲影無時翠嵐光到底清危樓喧晚鼔驚鷺起寒汀聊作淵明飲臨流酒易醒斑竹管筆翠管江潭竹斑斑紅淚滋束毫何勁直在槖許操持欲寫湘靈怨堪傳虞舜辭蔚然君子器安用俗人知古意月缺不改光劒折不改剛月缺魄易滿劒折鑄復良勢利壓山岳難屈志士腸男兒自有守可殺不可苟觀博陽山火十月原野枯連山起狂燒髙燄過危峰飛火入遐嶠玉石被焚灼誰能見輝耀猿猱失輕捷亦不暇相弔長風又助惡怒號生萬竅炎炎赤龍奔劃劃陰電笑願傾寒江潮勢逆難沃澆願傾天河水雖順雲衢遥青松心巳爛蔓草根未焦小農候春鉏寒客失冬樵誰知兼幷子平陸閑肥饒不易天地意長養非一朝聞鴈寄歐陽夷陵閑坐獨無寐鴈來更未䦨聲長河漢迥影落户庭寒荆楚橘包熟瀟湘楓葉丹南飛過三峽試問故人㸔送謝舎人奉使北朝漢使下西清邊人擁道迎寒笳隨宿堡衛甲出孤城犯雪貂裘重衝風錦綬輕山川辭國逺車騎踏沙行授館氊爲幄供庖酪和羮戎王拜天賜敵帥伏名卿紫塞千烽静黄雲萬里平甘泉歸奏日重見鳳池榮觀放鷂子白晳少年子秋郊臂蒼隼日暖飢目開風㣲雙翅緊草際鳴鶉驚蒿間黃雀窘下鞲誠必獲得俊還復哂碎腦此非辜食肉爾何忍取樂在須臾我心良惻憫食橙寄謝舍人洞庭朱橘未弄色襄水錦橙巳變黃玉臼𢷬齏憐鱠美金盤案酒助杯香雖生南土名猶重未信中州客厭嘗欲寄白苞憑驛去只應佳味怯風霜夜聞居人喊虎猛虎豈云猛潛藏伺天昬行行出叢薄稍稍入孤邨孤邨何所利所利犬與㹠誰知仁者勇去惡義自敦採白术呉山霧露清群草多秀發白术結靈根持鉏採秋月歸來濯寒澗香氣流不歇夜火煮石泉朝煙徧巖窟千歳扶玉顔終年固𤣥髪曾非首陽人敢慕食薇蕨寓言寒燈不照逺光止一室明小人不慮逺義止目前榮燈既無久燄人亦無久情誰言結明月明月豈長盈送李尉子京之邵武光澤母老不擇禄一官勤夙興長河未結凍去客巳懷冰露蟬不飽腹志士甘曲肱逺方人所畏所畏非所兢銅坑碧鑛不出土青山鑿不休青山鑿不休坐令鬼神愁朝日日色纔出海曉月無光彩曉月在青空不與日色同誠知大君徳照耀無不通失鷓鴣愛翫日巳久開籠爲馴故㸃臆雪花圓連袪浪紋素鉤輈格磔鳴􅀈㲞翻翁去誰知煙渚深緑水脩篁處過小石潭樹老石連潭潭深煙翠入羣魚石下游獨鳥潭上立泉暖草長緑山髙風自急徘徊興不窮苔屐雲霑濕縣齋對雪宻雪夜來積起見萬物春山川忽改色草木一以新古邑失荒穢王路覆平均從兹慶豐年蹈詠慙小臣對花有感新花朝竟姸故花色顦顇明日花更開新花何以異山中夜行孤客心多恐寒風夜度溪山長羸馬困月黒怪禽啼逺火生樵舍荒榛亂野蹊喜言林館近聞犬入猶迷啄木中園啄盡蠹未肯出林飛不識黃金彈雙翎墜落暉夢與公度同賦蕅華追録之呉王舊宫闕水殿芙蓉披濁泥留玉骨疑是葬西施西施魂不滅嬌􅃩照清池和綺翁逰齊山寺次其韻蒼山南望截雲煙中有紺宇通諸天長橋直度清溪水寒湖収潦曠平田古木隂森大堤上千峰濃澹髙樓前龍筍未逬角出縮虎石亂踞筋拳攣陰崖乳泉濕苔蘚陽谷暖氣留蘭荃澗户曉闢煙的的松軒夜啟月娟娟聞有謫仙乘興入飄然欲拍洪厓肩玩㳺逐勝不覺逺露竒發怪工無全捫蘿但識康樂徑飲酒安問逺公禪清猨不到俗士耳香草巳入騷人篇水鳥念佛次浄界野鹿銜花來象筵在昔探賞猶可數深景秀句今得傳辭韻險絶兹所駭何特杜牧專當年重以平澹若古樂聽之疏越如朱絃祕藏褚中爲不朽咨諏坐上皆曰然誰意麤官獲此貺洗去鄙吝空池邊聊欲報言罕驛使春郊唯見鴈連連范待制約㳺廬山以故不往因寄平昔愛山水兹聞廬嶽逰逺期無逸興獨往畏湍流舉手謝雲壑棲心慙鳥鷗香爐碧峰下應爲一遟留范饒州坐中客語食河豚魚春洲生荻芽春岸飛楊花河豚當是時貴不數魚鰕其狀已可怪其毒亦莫加忿腹若封豕怒目猶呉蛙庖煎苟失所入喉爲鏌鋣若此喪軀體何須資齒牙持問南方人黨護復矜誇皆言美無度誰謂死如麻我語不能屈自思空咄嗟退之來潮陽始憚餐籠蛇子厚居柳州而甘食蝦蟇二物雖可憎性命無舛差斯味曽不比中藏禍無涯甚美惡亦稱此言誠可嘉徐元輿見邀與諸君同遊至峰山溪上作春霽重行行行行在墟里攄懷厭樓觀寓興欣山水斷壁翠連雲寒流清見底主人開緑樽下馬臨芳芷澄溜㵼灣漘跳波生石齒園林始弄萼皋壠時鳴雉談謔忘機心笑言驚俗耳曠哉兹日遊何羨稽山美和元輿遊春次用其韻乘閑多逺興信馬與君行碧樹斜通市清流曲抱城山花髙下色春鳥短長聲日暮吾廬近還歌空復情留别李君君頗有歸意而未遂酌我樽中酒知君羨北歸如何沙上鳥逺逐片帆飛離蕪湖至觀頭橋江口泊來久菰蒲長舊苖爭雛洲鵲鬭遺子浦魚跳宿岸欣逢戍歸船競趂潮時時望鄉樹巳恨白雲遥馬祕書始約同行久而未至因以寄渡江落我前入汴居我後日日是南風時時爲回首逢船一借問逺櫂見來否明朝儻相及閑步河堤柳寄建德徐元輿才子方爲邑千峰對縣門静寒琴意古閑厭鳥聲喧山茗烹仍緑池蓮摘更繁訟稀應物詠庭下長蘭蓀詠苜蓿苜蓿來西域蒲萄亦既隨胡人初未惜漢使始能持宛馬當求日離宫舊種時黃花今自發撩亂牧牛陂汴河雨後呈同行馬祕書雨霽晚虹収河堤淨如埽清隂拂人樹翠色垂流草漢漕走王都華言雜夷獠時方同馬生野泊聊論道夏日汴中作倚櫂望平野低雲宻未収黄鸝度髙柳歸燕拂行舟濁水不堪照清江空憶遊晚晴蒸潤劇喘月見呉牛夢故府錢公故相方來夢分明接座隅只知冠劒是不道死生殊西府㸔如舊東山詠久徂遽然興寤歎不覺淚霑䰅謝紫微以畫鷺二軸爲寄白鷺畫雙素粉毫幽趣多翹沙依折葦刷羽對衰荷浦思懸秋壁江情憶釣蓑因君逺相寄詩詠對滄波宿州河亭書事逺泛千里舟暫向郊亭泊觀物趣無窮適情吟有託林中鵶舅獰席上蠅虎攫雨久草苖盛田蕪𤓰蔓弱香秔稺子慣脫粟家人薄少年都下來聊問時所作新衣尚穿束舊服變褎博我今貧且賤短褐隨冝著晚泊觀鬭雞舟子抱雞來雄雄跱髙岸側行初取勢俯啄示無憚先鳴氣益振奮擊心非愞勇頸毛逆張怒目眥裂盰血流何所爭死鬬欲充玩應當激猛毅豈獨專晨旦勝酒人自私粒食誰爾喚緬懷彼興魏傍睨當衰漢徒然驅國衆曽靡救時難羣雄自苦戰九錫邀平亂寳玉歸大姦干戈託竒算從來小資大聊用一長歎聞表兄施先輩上第昔人事功名五十未爲老而今君已及得桂誠非早所慰白頭親且將黃綬好吾始日夜心望盡京關道拜慶早歸來莫變秋庭草雍邱逢錢寺丞載陽殷勤魏公子落莫呉王孫下客獨垂淚傷心思舊恩廟子灣辭廟子灣風俗云有白黿憑險日爲波潮以驚異上下余過而作辭云我之東萊兮過彼雍邱舟師奏功兮濁水湍流歴長灣兮勢曲鈎傾髙斗折兮若奔虬潛伏怪物兮深幽幽發作暴漲兮爲潮頭土人立祠兮在彼沙洲老木蒼蒼兮蟬噪啾啾輸卒引繂兮蓬首躶體劇縲囚赤日上煎兮膠津蹙氣塞咽㗋胸盪肩挨同軛牛足進復退不得休竟持紙幣挂廟陬微風飄揚如喜収我今語神神聽不何不歸海事陽侯穹魚大龜非爾儔奚必區區此汴溝驚愚駭俗得肴羞去就當決何遲留送蔡侍禁赴長沙寒葉下瀟湘之官逐鴈行水經蔆浦晩船過橘洲香二女竹林外三閭楓葉傍平時息戎律物景助才章送馬廷評之餘姚越鄉知勝楚君去莫辭遥曉日魚鰕市新霜橘柚橋河流通海道山井應江潮近邑逢鷗鳥先應避畫橈送秀州海鹽知縣李寺丞呉帆千里去邑屋富魚鹽霜鶴亭皋唳風烏海客占滄涼朝日近紫翠晚山尖若過陸機宅寒蕪應不嫌送馬廷評知康州南去晉康郡風帆幾千里辭家上洞庭落葉過湘水瀧吏迎使君壺漿出蠻壘問俗言未通觀風想先喜曽非異方趣頗與華人擬期子寄梅花無由問行李過鳴鴈城九月過鳴鴈斜陽上廢臺兵車千載會桑柘萬疇開代謝隨秋草英靈化死灰我来空詠古寒鳥有餘哀送余駕部江州内史九江行潦収波已清何時鷁舟上逺見爐峰迎野色連葭菼秋香薦橘橙寒潮如特送不肯過湓城依韻和陳祕校見寄鬱鬱東堂桂常期接袂攀羽翰殊不及蓬蓽却空還江水幾經歳鑑中無壯顔音塵能見問誰道隔雲山送張子野祕丞知鹿邑忽作五年别相逢雙鬢疎不知從此去當見復何如公秫時爲酒晨庖日有魚沛譙風物美聊以樂琴書送王紫微北使天子命儒臣遐方重専對持書下西閣擁節來窮塞貂服紫䝉茸虎旗光綵綷將迎走氊騎衛從羅金鎧當宣漢恩德更使敵欣戴幾日過陰山南飛鴈相背九月都下對雪寄永叔師魯陰風中夜鳴宻雪逗曉積誰言有蓬巷但見鋪瑶席忽憶在山中開户羣峰白當時吟不厭盡日坐巖石傍徨懷故人憔悴爲遷客欲泛剡溪船路長安可適劉弟示詩一軸走筆荅之昔與伯氏吟青銅照人髪今又讀君詩寒冰徹人骨時時探古趣往往到月窟清濟流不休終期至溟渤劉十秀才見過尋以爲寄次韻和酬放言破崖岸塵事盡磨刮况此氣澄明幽襟亦軒豁竟日坐衡茅同心異胡越吾道今不孤長吟爲君發依韻和劉敞秀才安得采虚名師道欲吾廣雖然存術業曽不計少長孔孟久已忘冨貴得亦儻後生不聞義前輩懼爲黨退之昔獨傳力振功不賞舌吻張洪鐘小大扣必響近世復泯滅務覺多忽怳今子誠有志方駕已屢枉自慙懷道淺所得可下上正如種青松而欲託朽壤典冊皆可尋聖言皆可仰幸無増我過此語固不爽依韻和劉十秋霖秋草更緑秋霖衰長安逰客未成衣淒淒斗欲變寒色一夜獨語㸔燈輝送劉十往荆渚臨水一太息解舟當落暉上樓人巳逺極目鳥空飛荆楚時方晏江湖客未歸定知吟憶處林外月光㣲宛陵集卷五
