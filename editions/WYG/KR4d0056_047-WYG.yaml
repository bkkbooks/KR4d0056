body:
  text: 宛陵集巻四十七宋梅堯臣撰觀邵不疑學士所藏名書古畫野性好書畫無力能自致每遇髙趣人常許出以視邵侯多奇玩留我特開笥首觀阮與杜驢上瞑目醉阮籍杜甫韓幹貌四馬臨流解鞍轡花驄照夜白正側各畜意繫衣穿袴鞾坐立皆廏吏精神宛如生于顋復穿鼻梅雞徐熙花竹間寒雀睡逸少自冩真對鏡絶相類數本失姓名古胡幷老驥山水樹石硬荆闗藝能至荆浩闗穜巨然李成者落筆愈奇異人物張僧繇雖傳恐非是其餘又莫究模搭似未備周秦已來書行草楷篆隸聲名舊烜赫一一果可喜邵侯愛我曹咸使紙尾記况侯有古學小字刻珉翠各贈墨本歸懷寶誰肯忌先至山陽懷杜挺之與君同川塗舟發偶後先順風吹我帆巳過飛鳥前寄聲託飛鳥微意或可傳定逢檣上烏暫向彼留連薄暮楚城下踟躕問來船絶句五首風過已午未肯止酒病嬰我心無憀船頭拍翅野鴨浴水上擺子獰魚跳岸邊稺子戲把釣蚯蚓作餌青條長上去下來船不定自飛自語燕爭忙夜欲三更飢鼠鬭燈殘一㸃小星紅邨邊坎坎賽神鼓船厎抨抨駕浪風葑田青灰博奕局島樹墨榅煙雨圗巳去揚州百餘里囬頭還隔㡬重湖蝦蟇號沫為科斗蜾臝銜蟲化細腰蠹穴荒陂有多少乾風濕雨各飛跳淮南轉運李學士君錫示卷李氏世能詩落落為時豪漢陵唐太白始競二雅髙益端正封賀才各傾吳濤于今幾代孫手持切玉刀功利既及民又將薄風騷示我照乗珠光彩生褐袍曽非貧家有懷歸徒増勞神物必難祕恐隨風雨逃觀王氏書先觀雍姬舞六么妍葩發􅃩春風搖舞罷英英書大字玉指握管濃雲飄風馳雨驟起變怪文鰩晝飛明珠跳席客聚立驚且歎筆何勁健人柔夭昔時裴旻能劒舞丹青助氣精神超藝雖不同意有㑹世事相假非一朝書二客論呈李君錫學士我慕杜挺之磊落髙世談又愛王平甫才雄天馬驂二人相議平最重李淮南踒跎文館彦委曲部政諳能蘇煮海民變使供租甘雖持使者權不作自裹蠶諄諄無威慠雍雍激㢘貪書戒易滿人縦愚須起慙始時邊海鹽亭民常官逋其錢往往給腐米為直弃之而去浸久亭民無本多逃者今俾中戸就邑納租給亭民民乃大利逃者復還留别李君錫學士淮南尚喜風流在客有殷勤載酒過不醉不歸情可見相看相笑意如何瞭眸自解持髙論長頸稀逢缺善歌舊愛陽闗亦休唱西還從此故人多過山陽水陸院智洪上人房有蘇子美墨蹟十載七來此每嗟多異今池灰休辨劫川月解明心遺墨悲蘇倩髙情想遁林能閑常似舊翹立水邊禽淮隂侯功既髙天下身何不自防已能成漢業無復假齊王復恥噲為伍安知呂所忘空名流未竭淮水共湯湯閏三月八日淮上遇風杜挺之先至洪澤遣人來迎曉出淮口時夜來風已止半路逢怒號客心愁欲死忠信雖可仗魚鼈將異此但慕前行舟漸入孤汊裏猶能有餘力遣助良可喜宿洪澤舟子起添纜夜潮同雨來寒聲相亂急逺夢自然廻水鳥鳴還睡風燈暗復開宦游嘗作客未息為貧催泗州郡圃四照堂官艫客艑滿淮汴車馳馬驟無閑時豈有餘力事棟宇後園荒草長離離朱侯下車百職舉亦治宴豆頻遊嬉梁冠爵弁各得禮道路溢譽亡髙卑因隙作堂名四照虚光轉納娥與羲面面懸窗夾花藥春英秋蕊冬竹枝射堋寛闊習武事鏡沼清淺吹文漪侯之此意寧自樂夷情勞士俱忘疲後來出口勤灑埽莫作廏埓生蒿蔾泗守朱表臣都官剏北園樹藝北壕上直對髙城隂使君朱輪來歌管樽酒深風雷生淮雨雲物冒楚岑戰舠習追逐飛凌捷水禽不獨耳目觀乃見預禦心事閑賔從樂景美臺榭臨今人忘羇旅灑慮起微吟依韻和誠之淮上相遇一别逋翁久不逢亦知諸葛臥龍中幾年三致千金冨今日重追二謝風形槁已能同散木鬢霜從聽著寒篷飛光入酒舊時月來照狂歌猶未窮泗州觀唐氏書唐氏能書十載聞誰教精絶向紅裙百金買書蒲葵扇不必更求王右軍同朱表臣及諸君游樊氏園五年前上去乃從許公過舊物此君在後生新筍多朱櫻繁且熟黄鳥啄仍歌一一如當日乗髙奈興何七里灣得朱表臣寄千葉樓子髻子芍藥誰稱為近侍冝與牡丹尊霞綷千千葉香撩黯黯魂紅樓思俠少寶髻奉王孫賸插不堪照顔衰汴水渾倂日得朱表臣酪及櫻桃昨日酪將熟今朝櫻可餐紫蒓休定價黄鳥未新殘甘滑已相美齒牙仍尚完應知消客熱逺贈盎盈盤阻淺挺之平甫來飲泛淮忌水大我行浩以漫泝汴忌水淺我行幾以乾偶與困滯并將獨為此難窮隄有來客芬芳可與言共休緑榆隂置酒聊慰安主人雖倉卒猶得具甘酸酸漬楚梅青甘摘夏櫻丹引觴吞日光耳熱不復歎俛仰已陳迹未可忘茲歡誰思費生術幻惑寧盤桓依韻和表臣奎野亭淮光抱城去山翠落樽前魯叟欲浮海楚人休問天野雲將拂幔水鳥不驚船歴覽誰能賦今聞太守賢依韻和表臣先春亭雜花紅間白逺樹短參長天近春歸疾城髙地易凉千尋浮逺水五兩動連檣置酒未終樂山煙生暝隍和表臣河南庾署西軒飛烏欲下蟾生時斜光冷魄常相隨右山左水清洗目虛簷曲檻生揚眉白魚甘肥網可得公酒美滑杯可持臨淮使君有閑佚長橋直度來莫遟依韻和表臣見贈中間㑹與别不啻二十年向來君之官我必贈以篇今過臨淮郡惠好情聮聮訪我車騎都宴我鶯花然此當舟航衝旅泊逾百千迓髙而撫下酒壺櫃食連使予一日為立可見華顛遽行恐勞君數里不得前三月汴水淺蹇滯無我先君乃遺我詩盛稱我為賢比之少陵豪望我何太全又令入時用目堪事髙眠安能事孔聖終學美周宣勤荅以明懷矢辭敢欺天依韻和表臣聞與挺之宣叔平甫飲舟淺不能進反羨車馬馳同行各在野有酒相與期隄上聞禽處桑間落日時使君羊筍贈更飲更追隨表臣是日送蒸羊筍束表臣惠蜀牋偕玉硯池蜀牋珉硯池為贈知雅故慙無右軍書亦乏左思賦環水象辟雍紋花如織素願傳君徳政况已聞行路表臣以阻水見勉次其韻野叟津難問賢人酒不空行吟同去國退翼欲乗風憂巳先天下窮方坐井中予生一如此安得免衰翁聞宣叔挺之圍棊人以棊銷日我觀棊輒寐未必盡死生何茲較愚智只將多勝少復取生為利不若酒之賢悠然共醒醉五倩篇奏方響琵琶倩然五蛾眉妙曲動金絃犀椎玉鈴鈴龍撥雷􅟁􅟁響急能愈靜意閑情常專主人昔結客一醉百金捐觀濤來吳都遇我泗水邊夜飲向明月非同聞鄰船釋悶呈挺之平甫燕丹未歸馬未角卞子抱玉無兩脚孤城食盡兵未却度笮中懷挂一索我輩於此酒冝酌百歳千秋奈何樂釋滯帝在蒼梧妃泣竹蘇武餐毛海西曲窮山逺道車折軸深井渴汲綆不續我輩於此酒正緑䝿無奈何歡且足依韻和表臣憶遊竹園山寺山攜謝公妓竹似阮家林花發日初暖鳥啼春欲深朱櫻連葉摘緑酒帶醅斟猶想聞歌吹僧房未暇吟依韻和挺之晨起見寄時阻汴淺淺水不堪泛暗灘時激聲晨都望迢遞窮旅思屏營芳草同誰藉投壺自喚名得君晨起詠逺逺見交情李宣叔祕丞遺川牋及粉紙二軸蜀人𢷬玉屑楚客調金粉製牋君有贈草疏我無藴冝書揚雄辭莫冩屈原憤誰識此意微曽非事摇吻錢志道推官遺紗帽逺贈烏紗帽能無白也詩山花不更插野客莫驚窺次韻和表臣惠符離去歳重醖酒時與杜挺之李宣叔王平甫飲於阻水仍有筍醬之遺贈以榴花酒沉清䝿隔年不憂航滯磧為汎琖如船加品盈盤内無花到眼前還招李杜醉野釀莫稱賢表臣齋中閱畫而飲嘗觀韓幹馬人物亦如生君收四病骨無肉只崢嶸二匹痒磨樹二匹縦其情意思若不任千里未可行古絹蠧已盡彩色無精明歎惜傳至此幾人金帛輕隋時有名筆獨冩嚴君平猶持杖頭錢罷肆心莫營魁然中䝿人坐榻不知名畫中有畫屏山石侔天成今時長沙叟獼猴檞林横疏毛與設色前代何角爭餘存品雖髙我未易敢評主人愈好事緘笥酒壺傾寄送許待制知越州喜公新拜㑹稽章五月平湖鏡水光䓿萏花迎金板舫葡萄酒㵼玉壺漿雲歸秦望山頭靜雨洗若邪溪上凉天子不能煩侍従可將吟咏報時康依韻和王司封離白沙塗中感懷淮雨夜飛氛祲銷星纒歴歴轉隨杓黄童謾對日如月賈誼休悲鵩似鴞市骨已知求駿馬輶車何用載田驕不唯忠憤心如此王佐才髙賦小鷯將赴表臣㑹呈杜挺之莫怪去遟遟予心君亦知膝前嬌小女眼厎寧馨兒學語渠渠問牽裳歩歩隨出門雖不逺情愛未能移醉中和王平甫用其韻王𤓰未赤方牽蔓李子纔青巳近樽我最年髙雜年少風流還有杜陵孫將解舟走筆呈表臣昨夜謳吟瀉春酒今朝波浪下黄河主人不暇悤悤别為倩流鶯寄語過荅再和舟行纔及二三里巳復淺流如凍河君有短書誰逺寄時因燕子拂牆過非意篇呈表臣人言㕑傳繁乃是郡久例一日苟不脩未免衆吠睨飽尚謗所興飢必愠不細損之禮漸隳存之禮未替心莫忽賤微義莫徇䝿勢我將取是然敢以為君計依韻和錢深推官見寄無才不敢學陽秋嗜酒時能問大酋前日偶従河上飲文章何可並英遊依韻荅宣叔行舟相隔見寄汴漲濺濺費挽牽輕舟難若上青天只知乗駛及先去不意遟留落那邊力漕篇呈發運王司封寶臣兵外肢强兵内體壯斂之盡歸歳以多餉東南軸艫銜尾而上浮江浮淮泝汴之湍汴湍不常水衡不官惟虞溢毁靡虞舟槃舟槃糧覆糧孰為足大計之數萬百惟六帛幣錯貨三倍其穀曰主厥漕王之藎臣日憂河涸運智煩神以舫實土約流束津百歩之間若牙與齦朝漲夕降滯舸次鱗亟乞于朝朝不即報下上經營風并日曝其躬其勤秉心有操士豈無禄視此則冒彼以榮佚此以劬耗願荅其劬錫命錫誥四月十三日唐店寄錢推官昨夜月如水君能攜酒來破除愁悶去洗蕩肺腸開露氣林間落河聲地厎廻相知不須早語合自無猜徒歩訪李宣叔宣叔有詩依韻荅渡河誰道去我重子雲才鴻鴈汀洲去牛羊井落徠乍行初覺倦暫語不能該日色看看暮將歸意復徊荅髙判官知唐君夜飲露宿勤王客相從月下來黄流何日漲緑酒暫時開風定燈花爛天髙斗柄廻醉言多脫略吾黨不須猜宛陵集巻四十七
