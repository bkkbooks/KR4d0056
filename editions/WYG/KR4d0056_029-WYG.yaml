body:
  text: 宛陵集巻二十九宋梅堯臣撰陽翟縣城凝嵩亭西北望嵩色憶上大室時陟彼巳不淺坐此安能知今來絶壁下但見前峰危正與曩禾異目存迹焉追王仲儀寄鬬茶白乳葉家春銖兩直錢萬資之石泉味特以陽芽嫩宜言難購多串片大可寸謬為識别人予生固無恨次韻和王道損風雨戲寄小雪纔過大雪前蕭蕭風雨紙窻穿而今共唱新詞飲切莫相邀薄暮天鬬㱃鶉孫曼叔邀作脫命秋隼下鳴鬬自為勇爭雄在數粒一敗勢莫擁慙將縮袖間懷負黙而拱勝且勿苦欣猶驚辱與寵和道損欲雪與家人小兒軰飲陰雲濃壓野風獵樹髙鳴寒禽並枝立頗以見物情目前兩穉子為慰豈異卿欲置一壺酒且獨對婦傾韓持國邀賦鬬山鵲俗有巧鬬心畜此巧鬬禽搏擊無迅節爪觜自相侵胡能知逺人角勝合百金鳳皇安在哉從此望丹岑依韻和酬韓仲文昆季聯句見謝予前與道損遊西湖淨居堂因至其第冬日晴且暖林塘思淨居往興都未盡遂經韓氏廬韓氏兄弟賢各各趨異塗吾儕與之游何異田蘇俱經疑反此質學陋慙無餘况兹諸少年髙論傾國都以及治民術縱横無所拘又渉方外說於道曾不殊詩評杜兼李字法褚與虞啜茗豈非好啗栗彊為娛久厭官局檢聊休體質舒次第極言笑左右排圖書終日欣博約貶異正則扶所賴存汎愛未以我為愚持歸接士論頗亦類販沽復聯長詩來味若餐瓊腴其辭多自損似欲大厥譽顔子乃庶幾仲尼稱弗如不猒㑹遇頻雲龍實相須最和躡麟趾舉歩未敢渝種藥雲外陽翟山實與嵩少接山中採藥人能自辨苗葉當須斸其根以遂素所愜野籜包舊土逺置風雨㨗故本含新芽枯莛帶空莢植雖平地勢培壅得專輒冬誰論臭香春定引蜂蝶豈唯識草木庶用補羸苶荅韓六玉汝戲題西軒吾軒今於水吾居易為足誰與哦其閒風窻數竿竹雖無泉石清尚不媿茅屋所樂違俗喧此趣大巳熟和韓五持國乞分道損山藥之什不種東陵𤓰不利千畦韭山藥數十本帯土移野叟故葉萎未醒傷根亦何咎既為君子好豈與騷人負騷人比畫工丹青出其口欲分欄下苗馳奴仍置簍主人可無恡所尚非獨有從兹各勤灌肯在園蔬後今雖勝曝蓄畢意資玉臼人事固巳然秘方看繫肘送長陵清辨師歸寧山房古柏暗近在漢陵邊天供不為樂母心常所懸朝塗髪根冷暮野鳥行先子道豈殊衆誰云絶世縁依韻和李密學㑹流杯亭園林固足勝景著必人賢將泛杯中物逺分湖水泉來從百花厎轉向衆賔前易醉縁多病陪公媿少年依韻和韓子華陪王舅道損宴集韓氏兄弟八人而七人在坐雲低未成雪寒氣已侵席凍醪傾白濁乾果列紫赤風微時破面亭敞宜張帟來望野興通古城何額額邀射弓鈞開破的翦羽白坐中聲喧呼不覺屢傾幘醉驚一發功誰許百金易非等將帥能聊將賔友適中酒作暴謔心親語多劇吾徒固不羈安可限常格去忌無俗流起酌驚臧獲八龍觀諸韓頭角相戢廹參差玉峰前愛慕不知夕誰嗟短景移能使吝情釋為賀主人翁賢甥無久隔此㑹舉世稀頻頻奚所惜飲韓仲文家飲酒衆所嗜未若朋㑹樂終日不為荒於時豈多怍坐客十餘人七子實棣萼杯行發嚴令孰不資善謔巧詞劇猱㨗辨機如弩彍醉舌彊且遲罰觥奚屢酌正言訐詭諛簡禮去酬酢迭嘲果與蔬相呼花間藥是非不親親笑語何落落夜歸歡有餘孩穉扶仍噱玉汝贈永興冰蜜棃十顆棃傳真定間其甘曰如蜜君得咸陽中味兼冰作質遺之析朝酲亦以蠲煩疾吾兒勿多嗜不比盤中栗王道損贈永興冰蜜棃四顆名果出西州霜前競以收老嫌水熨齒渴愛蜜過喉色向瑶盤發甘應蟻酒投仙桃無此比不畏小兒偷寄題滁州豐樂亭泠泠幽谷泉近在青峰下使君去窮源林外留車馬一徑穿篠深蔽日復瀟灑行盡逢泓澄翠影如可㵼雲樹陰其傍造物將有假引水開石池結宇覆碧瓦乃知愛玩心朝夕未忍捨近移溪上石怪古蒼蘚惹芍藥廣陵來山卉雜夭冶春禽時相鳴賔從不應寡欲問淮南趣還思洛陽社勝事巳不辜吟觴無倦把和韓仲文西齋閑夜有懷道損舅及予冬日每苦短方愛夜漏永積雲寒擁齋徘徊延月影獨能懷親友出門見參井是時發清詠筆若天驥騁前此諸韓來飲獨仲連以小兒病不至明日仲連有夜坐見懷之什因成荅章夜與賢豪飲方聞黙坐時我斟相樂酒君詠寄來詩莫恨殊喧寂真縁篤愛慈何當因雪興過此未應遲奉和子華持國玉汝來飲西軒我誠官局冷終日事靡括每躭古人書似與世俗闊同道三四人來過慰飢渴迭相陳語言曾未猒刀呾自中將過晡留飯具麤糲薄酒繼以斟不覺寒日沒愚妻方罷沐供飲媿倉卒凍婢昧煎和親調首忘髴每食各驚顧誰謂不黔突倦僕暖吾薪飢馬飽吾秣馬無歸嘶聲僕有顔色活安穩不知疲明釭仍為撥醉言實無次曾未窮本末諸君競相先出口論莫奪復云天地間此能有幾達我聞顔汗下恐後謗難遏其間常有言但未見疵齾終當輕有若悔目已屢䀣莫八反信哉羣玉林豈得依朽枿吾心為之然收舌如斷割寄音謝豪俊兹藴只圭撮和道損喜雪密雪巳迎臘隨風來拂巾偏知寒夜屋不管醉歸人暗積空庭合偷裝衆樹新沃田將望嵗壓癘且忘貧薄厚曾無意飄揚似有因既能先覆物乃見未饒春作陣從天落何功得地均暫欣供一賞惜逐馬蹄塵荅持國遺魦魚皮膾海魚沙玉皮翦膾金齏釅逺持享佳賔豈用飾寳劍予貧食幾稀君愛則巳汎終當飯葵藿此味不為欠與仲文子華陪觀新水磑湖壖此興塏許俗見仍稀激射聊因勢回環豈息機水如巖下過人悟雪中歸坐想韓夫子心應不道非與道損仲文子華陪泛西湖冰消湖已緑𣺌𣺌鴨頭春船學吳兒刺吟稀楚老新對山憐去鳥隔樹識遊人誰念滄江上風柔採白蘋和持國石蘚石根雲常蒸老蘚密於毯濕翠連澗陰淨緑繞巖坎不異泉上芹丰茸猶可擥安知山中客逺寄趣巳澹同諸韓飲曼叔家富䝿豐盤餐日可侑清角不與賢者俱飽食何所學吾友雖日貧邀賔不辭數質衣為酒肴出論輕管樂其饌精且甘刀几孰親握是時魚苦眩引去意頗確羸馬雪中歸醉醒誰復較和仲文西湖野歩至新堰二首決決堰根水層層湖上田寒魚猶著厎白鷺巳飛前履惜春泥滑衣從澀蔓牽偶來成野望歸興自留連潭上水容暖野中寒吹横行塘人已晩吟歩日難更凍地坼枯龜斷冰流破鏡王都且不逺樂此林泉性送韓奉禮崇道將欲侍親去獨要予贈言世風還自有文體不須論稍愛春波急微生野岸根行舟寧覺逺幾日到都門諸韓來㑹别諸韓行有日别思更依依獨歎從予少還看似子稀呼童聊奏酒泗水為開扉蘇合染裘美雪中閶闔歸送仲文三年不出户孝行閭井聞近俗遂知化豈非由所薰御琴趨國門何必長守墳美哉若君子忠可移於君送子華識君雖恨晚說詩屢解頤吾徒固難合所合終不移冐寒躍馬來且言行有期河上冰始坼輕櫂去未遲送仲連别緒如亂絲欲理還不可却悲嬌女詩寧戀更效左是時逺道懷紛紛上歸舸憐君正如此豈任風雨俀送玉汝談笑去拘忌乃見相與深風騷得往返但見非知音明日車馬北豈不動離襟春風蘼蕪緑别恨生遥岑玉汝遺橄欖南國青青果渉冬知始摘雖咀澀難任竟當甘莫敵來從萬里外或以苦口擲所投同木𤓰欲報無瓊璧和王待制出郊馬上口占寄兄道損次韻日暖寒郊不起風使君車騎出城中遥知望處思兄弟鴻鴈連連下逺空寄題蘇子美滄浪亭聞買滄浪水遂作滄浪人置亭滄浪上日與滄浪親宜曰滄浪叟老向滄浪濵滄浪何處是洞庭相與鄰竹樹種已合魚蟹時可緡春羮芼白菘夏鼎烹紫蓴黄柑摘霜晚香稻炊玉新行吟招隐詩嬾戴醉中巾憂患兩都忘還往誰與頻昨得滁陽書語彼事頗真曩子初去國我勉勿迷津四方不可之中土百物淳今子居所樂豈不逺埃塵被髮異泰伯結客非春申莫與吳俗尚吳俗多文身蛟龍刺兩股未變此遺民讀書本為道不計賤與貧當須化閭里庶使禮義臻送河東轉運劉察院塞郡屯師久飛芻始得人權傾擁旄將詔輟繡衣臣舊里過京洛辭家渡孟津紫裘蘇合染驄馬玉環辰榆莢關頭雨棃花谷口春髙車方陟險豐膳暫違親山勢北臨岱地雄西隔秦行臺知不逺能使問安頻依韻和玉汝對月見懷西軒坐見沙頭月復憐衣上輝正如從我飲還欲照君歸相逐影徒是共嗟歡已非夜深依岸落寒色入傷違依韻和玉汝舟中見懷遥聞出舟望始愛川原廣春冰未破時旋拉寒篙響鳴鴈似相隨逺日聊一仰能知狀物工把筆獨見想同道損持國訪孔盿處士髙廬當大道節士不肯過窮巷獨秉德車馬一何多勢力走諛諂禮義服委佗是以被褐人長甘北山阿曰今豈有媿漁上有行歌二月十四夜霜欣欣東園杏忽值春飛霜粲然彼繁英萎若出沸湯既能與之榮而復使之傷向來肅殺時巳共百卉黄今同草吐心不似草心長天理固難測誰要必其常送謝師直南陽上墳躍馬清明前行將拜孤壟松吹送悲聲縁纓淚如湧三嵗宰南方奠斝阻親捧山下獨徘徊雨來雲蓊蓊奉和持國曼叔方叔送師直歸馬上同賦之什郭外桃李花赤赤復白白為君歌古曲行子在南陌衆人各已歸春風送無迹安知春風送到處花當客我病出獨難併請春風讁此情無逺近千里不能隔和韓子華寄東華市玉版鮓客從都下來逺移東華鮓荷香開新包玉臠識舊把色潔巳可珍味佳寧獨捨莫問魚與龍予非博物者喜雨冬渉春無雨侵晨忽霈然燕曾知社後雷未發聲前細濕林花暗輕霑土脈全看看一百五風勢莫狂顛送王判官之江陰軍幕易知往時初渡江頗愛江南美誰知坐卧間思及烟波裏絮逐􅚝魚緐豉添蒓線紫君行語風物到日應相似送王龍圖源叔之襄陽忽驚車駕臨乃是荆州長登堂語出處陳事猶夢想别逾二十年相遇今始兩爵位異禮數齒髮可下上但問我何有而獨不愛曩敢告守拙愚此道未嘗枉行當至峴山羊公存廟像簫鼓有時奠道德其可仰依韻和持國新植西軒開地臨廣衢崇崇十餘畝新軒稍偏北治圃亦西酉盎中植䓿萏水不過升斗小桂未得地驗活徒掐朽上乏幽禽啼下多穴蟻走藥苗雖無補欲比山中有澆灌同一時萌芽或先後松株不滿尺廊廟色巳厚禀性久且堅物理豈無偶㯶櫚仍未大散葉纔八九夏緑與冬青各各自為友吾軒還處西脩竹爾後取兩莫論是非但可吟對酒送師直之㑹稽宰其兄在餘姚天下風物佳莫出吳與越新罷吳官來又隨越舸發連宰吳越閒皆邇蛟鼉窟伯氏復同郡邑境接民垡寧將内隔外正以肉附骨姚江遺魚蟹稽山奉筍蕨足得相交歡髙堂未華髮送子意不盡念逐有明月西湖觀新出鵝兒道損持國曼叔請予賦之春菢畏雷後㲉開形已完嫩毛輕染蘗小掌未全丹見物初能啑浮波尚怕寒山陰無道士更長換應難宛陵集巻二十九
