body:
  text: 宛陵集巻五十三宋梅堯臣撰送王介甫知毗陵吳牛常畏熱吳田常畏枯有樹不蔭犢有水不滋䅳孰知事春農但知急秋租太守追縣官堂上怒奮鬚縣官促里長堂下鞭扑俱不體天子仁不恤黔首逋借問彼為政一一何所殊今君請郡去預喜民將蘇每觀二千石結束辭國都絲韉加錦縁銀勒以金塗兵吏擁後隊劒撾盛前驅君又不若此革轡障泥烏款行問風俗低意騎更駑下情靡不達略細舉其麤曽肯為衆異亦罔為世趨學詩聞已熟愛棠理豈無送曽子固蘇軾屈宋出於楚王馬出於蜀荀揚亦二國自接大儒躅各去百數年髙下非近局鈎陳豹尾科登俊何炳縟楚蜀得曽蘇超然皆絶足父子兄弟間光輝自聮屬古何相遼闊今何相邇續朝廷有巨公講索無遺録正如唐虞時元凱同啓沃何言五百載此論不可告二君從兹歸名價同驚俗送建州通判沈太博昔聞醉翁吟是沈夫子所作今聴醉翁吟是沈夫子所彈聲如冰澌下石灘嚼齧碎玉遶齒寒四坐整衣容色端醉翁雖醉無慢官其音正以樂其俗便且安何害酩酊顔渥丹沈夫子邂逅相遇必已歡玉琴能寫人肺肝人所為難君不難平明解船建谿去輕齎快意不長湍谿東白茗象月團來奉至尊龍屈盤餘為帶銙與臠片散在六合雲漫漫况君五臟清如水宜飲沆瀣采木欄更留瓦硯贈我看鄴宮鴛鴦誰刻刓送王平甫擬離騷識君兮不早君尚少兮我老蘭與蕙兮多薫搴雜佩兮芳芬蘭倏往兮蕙隨心俯仰兮徘徊與識吳兮吳樂嘗適楚兮楚恱君何為兮我闊麒麟縶兮不馳鳳皇蔽兮挑達均莫悲兮別離悵公子兮何之絶大江兮無波奉赤鯉兮藉荷芼蒓荇兮陳羹親意得兮忘榮世反是兮從䝿聊送君兮傷情送僧遊廬山欲遊廬山去將託楚舸梢暮行長河曲月上黄公坳悠悠㡬千里身世非繫匏恣觀瀑布虹不畏潯陽蛟誦經東林下小宇結香茅韓持國再遺洛中斑竹筍牡丹開盡桃花紅斑筍迸林犀角豐兩株逺寄川上鴻韓郎輟口贈楚翁便令剥錦煮荆玉甘脆不道簞瓢空小謝舊城昭亭下侵天筀竹谿西東螳蜋生後出牙茁羅列滿地爭強雄是時楚翁所食寡朝飯暮飯唯其充今來得此謂過分一䝿一賤物苟同送僧惠思大車髙馬塵塞軌弄石洗泉人不喜慨然擺落還吳都歸心勁於弦上矢強弩發復開矢往不可廻常應笑燕子時能海邊來送魯玉太博挽詞三首射䇿志何逺闔棺人共疑奠觴朋友去泣血母兄悲霧氣窗間盡車聲户外知玉樓成作記此語可能欺自昔稱王謝于今亦盛門尚看珠樹秀應見玉麟存書史辛勤學文章苦死論都然莫施設恨向九原吞試問於天下誰從百歳心短長從所盡禍福乃相尋只以名賔實那論古至今未能忘物境空復歎人琴蘇明允木山空山枯楠大蔽牛霹靂夜落魚鳬洲魚鳬水射幾千秋蠧肌爛隨沙蕩流唯存堅骨蛟龍鏉形如三山中雄酋左右兩峰相挾翊尊奉君長無慢尤蘇夫子見之驚且異買於溪叟憑貂裘因嗟大不為梁棟又歎殘不為薪槱雨侵蘚澀得石瘦宜與夫子歸隠邱哀國子黄助教儒者務欲博誦說窮冬秋衣裙未及解含珠以見求閩稱黄夫子常恐學不流有徒如浮萍匝匝圍刳舟聚書將萬巻載行無馬牛去年來京師滿箧分寄投半在吳楚間半入趙衞陬昨日大官薦青袍變綈裘今朝為異物寸禄與命讎獨聞邯鄲公哀之使斂收曷其稟賦薄安得被王矦旅殯欲焉託定將葬何州生為四方遊死當不擇邱豈必歸故鄉萬里過山頭沅江李氏書堂船從洞庭來非賈即遊宦宦賈事風檣誰能樂清晏不如蓄書史萬古無與間上觀堯舜仁下覽魏晉簒善惡彼既殊智巧徒以辯君心於此得用舍不自慢堂中羅髙厨戸外望鳴鴈菰蔆可采掇魚鼈可釣汕卒歳身多餘世俗莫習慣張堯夫寺丞改葬挽詞三首洛陽交舊裏過半巳凋殘在昔義投漆最先悲闔棺誰知二紀水重卜九原安聞說塞門路白楊風更寒當時嗟遽殁二子未能言頻歲折丹桂買塋遷陸渾重銘太史筆不替故人恩為善有終慶此焉天意存舊墳為潤齧新冢得山深斬木來荒路移松出近岑黄鸝啼棘上玉女問泉音彊作挽人唱儻知哀感心讀黃節推巻磊落黃從事清吟古氣多少年知任俠欲老解登科辨起公卿坐時為慷慨歌又持珠玉贈將奈老貧何得陳天常屯田斑邛竹二枚客初西蜀來遺我雙邛竹上有紅淚斑斷非湘娥哭嘗聞帝魂哀號血滴草木春露灑更鮮殷痕侵粉緑截為扶衰杖萬里出洛谷今來入我手君勤意有囑區區四十年重趼生兩足冠丱三男子且與詩書讀翁雖文章窮尚以字遮目忍弃不以教攜歸事樵牧故兹九節贈用助老追逐楊朱非為岐賈誼非為鵩及其悲慟時豈不霑盈掬揮之儻著物無迹染林麓因持此竹紋勿歎前人獨送余少卿知睦州青山峽裏桐廬郡七里灘頭太守船雲霧未開藏宿鳥坡原將近見燒田養茶摘蕊新春後種橘収包小雪前民事蕭條官政簡家書時問霅溪邊夜直廣文有感寄曽子固日暮蛛絲動月暗螢火明方兹歩庭戸浩然懷友生友生將東歸泛若赴海鯨已従龍門出不慕朱鼈輕朱鼈過吳洲飛飛就東瀛沈浮未可問名有萬里程須憂小水魴勞勞將尾赬重送曽子固楚澤多年一臥龍新春雷雨起鱗蹤誰知天上争騰躍偶落池中雜噞喁且自摧藏隨浪去何當駕馭使雲從劉累只說古來有暫屈泥蟠莫便慵寄題沈比部江州齊雲樓逺目不髙不可極朱樓要與浮雲齊江流萬古平泱莽山雨一過寒凄迷賈客檣下望吹笛漁郎浦前看斷霓佽飛射蛟水花伏髙士種柳煙條低羣鴈有時至自北洪潮到此不更西君家隠侯有八詠風雅未盡留人題雲間月明明雲間月皎皎莫可指雄烏與牡兔萬歲不生子三旬後乃合徒用成甲癸焉見下土物長養各私已蛇蝎滿窟隙嗣毒自未已天地豈有意盛徳名不死依韻和梅龍圗觀小録四百鸞皇羽翼成髙低輕重出權衡他時俱作公卿去誇是王家門下生送鮮于祕丞侁通判黔州壺公山下俗巴婦曲中聴汲井熬鹽白燒田種榖青巖風來虎嘯江雨過龍腥事簡能談者揚雄所草經依韻閻中孚職方暴雨幸凉天津赫日欲焦拆西北風來斗減威太帝宮庭無暑入大明冠佩退朝歸泠泠冷襲瑠璃簟奕奕凉翻翡翠幃交扇不須煩素手淋漓誰復汗頻揮愛月終夜每愛月見月常苦稀不雨即雲晦何能藉光輝儻有一夕明豈畏露濕衣素娥領玉兔孤寡命亦㣲堂堂罕開耀多是半掩扉曽負萬家望空似隨人歸一歳復一歲白髮思釣磯呂縉叔云永嘉僧希用隠居能談史漢書講說邀余寄之奈苑談經者蘭臺著作稱吾儒不兼習爾學若多能每愛前峰好閑穿弊屐登定將修史筆添傳入髙僧依韻和王景彞馬上忽見槐花六月御溝馳道間青槐花上夏雲山退朝側帽驚時晚近樹聞香暗詠閑新雨賈生車喜出舊年潘岳鬢添班老慙太學無經術空飽齏鹽彊往還送家靜寺丞知洛南秦愛商於地信美洛水南銀鉛與丹砂鑿山民爭貪蜀客善製錦當先務桑蠶衣老以及少使煦如春酣摘蔬有筍蕨釣庖有巖潭頗同故鄉味將喜獲所諳和王景彞省中詠孤竹愛此孤生竹碧葉琅玕柯結根甘泉裏豈必泰山阿曽莫學兔絲徒以附女蘿風為埽庭戸夜月誰與過永叔内翰遺李太博家新生鴨脚北人見鴨脚南人見胡桃識内不識外疑若橡栗韜鴨脚類緑李其名因葉髙吾鄉宣城郡每以此為勞種樹三十年結子防山猱剥核手無膚持置宮省曹今喜生都下薦酒􅎹葡萄初聞帝苑夸又復主第褒纍纍誰採掇玉椀上金鼇金鼇文章宗分贈我已叨豈無異鄉感感此微物遭一世走塵土鬢顛得霜毛陸子履示秦篆寶其文曰二十六年皇帝盡并兼天下諸侯黔首大安號為皇帝乃詔丞相斯館法度量則不一嫌疑者皆明一之秦既并諸侯斯乃一度量鑄寶以永傳萬世俾勿喪精銅不生花小篆著丞相一殁咸陽宮千秋事更王陸君居洛城客有來渭上曰因農人耕發壤破古藏遂獲此物還文完字何壯始號為皇帝立語已超曠意將愚黔首釁起危博浪其後同玉璽不隨驪山葬今蓄於君家徒爾資奇尚物以用為珍異時皆似妄王屋髙送王屋知縣孫祕丞王屋山髙無猨猱下有黄河水滔滔天壇半夜見海白光動古邑雞先號雞先號絶吠獒巖居林棲吏莫搔山膚有時得虞獵不比􅇾肉􅖒連毛聞君今去將效陶縣前種柳芟蓬蒿不問公田問民俗民安事簡教兒曹河南太守喜愷悌如此可以無猒勞聴文都知吹簫晏虞部遣求一見之虞舜已去蒼梧野秦女驂鸞無復下簫管人間不解傳帝樂部中能亦寡欲買小鬟試教之教坊供奉誰知者晏識文公始致來勸接賤生宜彊且乃呼側坐吹一曲驚顧頓嘶堂下馬吾妻閨中聞不聞穉女扳簾笑嬌奼未敢多聴便遣還贈飲單杯向身㵼雜言送王无咎及第後授江都尉先歸建昌白袍來黄綬廻來跨蹇驢廻跨馬麻源三谷桂花開江都作尉入風埃主人劉向西京才心如明月無不照恐君已到還鸞臺宛陵集巻五十三
