  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_056-1a, image: WYG1099/WYG1099-0396a.png}
body:
  text: 宛陵集巻五十六宋梅堯臣撰送謝師厚太博通判汾州頻官吳越飽秔稻况住南陽多水田北登太行入汾曲正穫䆉稏秋風前晉人朴厚自寡訟軟炊玉粒何鱗鮮君方少壯齒頰健甘美不負經腹便有意南飛寄我信滿川鳴鴈下連連依韻和永叔都亭館伴戲寄去年鏁宿得聮華二月牆頭始見花今日都亭公感物明朝太學我辭家送李君錫學士使􅆻丹弔慰昨日匈奴來告哀殿門不識桃花開今聞君去作弔使正值鴈嘷從北廻風巻黄雲無逺近山留白雪猶枯荄歸看車馬汗流沬逃暑為傳河朔杯送邵裔長洲主簿姑蘇城頭烏哺時長洲草緑春袍歸魯桑葉小蠶出遲吳田水暖牛耕肥里胥爭迎縣寮喜入門先自易綵衣拜親然後及王事簿書豈得長相鞿送薛公期比部歸綘州展墓風雨棃花殘松柏墓門晩嗣子千里駒羊腸九折坂春裘不畏寒行路不為逺舊來河内守父老將衣挽送次道學士知太平州因寄曽子固春浦楊花撩亂飛春江魮魚來正肥采石新林兒女去茭白蒲牙艇子歸歸令煮魚不得熟已望使君船上磯上磯亦不待潮應爭牽篾纜泥汙衣姑熟溪頭槌大鼔紅抺鞾刀趨俯僂牙兵可擬岸傍蘆森森甲立雄南土更得西州謝法曹新咏定多傳樂府依韻和劉原甫舍人揚州五題時㑹堂二首歳貢蜀岡茶似䝉頂茶能除疾延年今年太守采茶來驟雨千門禁火開一意愛君思去疾不縁時㑹此中杯雨發雷塘不起塵蜀崐岡上煖先春煙牙才吐朱輪出向此親封御餅新竹西亭結雨竹西若若川揚州歌吹思當年劉郎若向風前唱夢入青樓事惘然春貢亭夢谷浮船穏且平泊登岡頂看茶生始從官屬二三輩時聴春禽一兩聲蒙谷茗園葱倩與山籠一夜驚雷發舊叢五馬留連未能去土囊深處路微通崐邱寺即煬帝離宮隋家宮殿昔初成不道荒凉獸迹行今日知來髙處望山川興廢使人驚送江陰僉判晁太祝去無珠履為上賔進船申浦憶春申江田插秧鵓姑雨絲網得魚雲母鱗青夭折桂香未滅紫豉煮蒓甘更新平時况可樂風月吳物信美聊前陳送晁質夫太守知深州蕪蔞問古亭春入饒陽城豆粥君王逺壺漿刺史迎地凉宜牧馬塞近慣調兵為寄井泉石老來思目明送少卿知宣州先歸霅上汴水清明下宣城太守行鴨頭吳蕩緑燕尾楚船輕族本三陽重詩從小謝清州民還最喜門下舊通名送朱表臣職方提舉運鹽蜃竈煮溟㴾航鹹播楚越官榷利言盈盜販弊相汨連艘以轉致攪灰或沈沒雖使日鞭黥未易窮姦窟朝廷用朱侯提職欲無闕矦因許專畫拜跪陳其說曰臣有更張敢以肝膽竭荆湘嶺下城恃逺不畏罰堂堂事私賈遮吏遭驅突願使商自通輸金無㬥猝淮江且循常約束備本末國用必餘貲亭民無滯物事下丞相府論議不可拔從之東南蘇拒之財賦遏聴侯侯往施所便黔黎活五味既和調萬里銷狂悖汴水桃花時犀舟順流發過淮逢絮􅚝泊岸採蘆蕨挂帆趨浪頭應不勞歲月依韻和李君錫學士北使見寄行色見車馬為之具壺觴暫辭甘泉宮逺奉左賢王蒙茸春裘薄匼匝金絡光唯知君命重不數沙路長魯酒雖入脣邉笳易廻腸歸來立螭頭言動書不忘送張山甫秘校歸􅚆氏去年來折桂今年來娶婦得意春風前還家寒食後蓬巷鬧雞犬藤花蔭井臼􅚆山白醪醇重酌髙堂夀送江東轉運楊少卿世言楚使者乃是漢名卿曽欲察黄綬但能勤列城江山無改故草樹幾更榮有意息民甚不同闕羨盈冝春宴射篇李駙馬請賦雜言風雨未過桐華時冝春苑中棃萼披天子賜宴羣臣嬉少年都尉方追隨暮歸遲喜聮留後兄弟雙弓射熊皮矦宗戚族坐上少伯仲相頋驚恩私鳳皇樓髙玉簫吹金絡駮馬不肯騎自戒危溢作後規何郎莫媿書與詩送王樂道太丞相如既擊劒仲宣亦從軍二人當其時皆以能賦聞韓公守武垣犀兵若屯雲幄中欲寄畫才智莫有君請之天子所朝奏夕離羣為沽斗酒飲為買赤鯉焚魚盡酒亦盡醉起衣袂分送楚屯田知扶溝客亭多少路花信幾番風折柳贈新翠種桃思舊紅淵明節已異潘岳趣還同政治有餘力歸來辭賦工呂山人同荆供奉見過街上春泥踏始開山人忽同供奉來老怒行遲報我晚怒氣欲拔庭中槐聞說道心調伏久等閑休要起嫌猜觀劉元忠小鬟舞桃小未開春意濃梢頭緑葉映微紅君家歌管相催急枝弱不勝花信風次韻奉和永叔謝王尚書惠牡丹大梁有公子洛陽有游俠昔時意氣相憑陵不問興亡事栽插栽紅插緑鬭青春春風與開春雨䬃兩都冨貴不相殊走馬尋芳何合雜只聞年少競爭先摘葉齅花身更捷安知遺愛舊留守馳獻百葩光浥浥尚書最重歐陽公盈盤分去蜂偷獵但能為樂飲醇酒何必署名黄紙牒翰林職清文字稀不比外官煩應接曩公為花曽作譜端相用意隨蝴蝶擬王擬妃姚與魏歳歲年年千萬葉還將顔色定髙低緑珠雖美猶為妾從來鑒裁主端正不藉娉婷削肩胛舊品既著新品増偏惡妒芽須打拉嘗憶同朋有七人每失一人淚緣睫唯我與公今且存無復名園共攜榼公因尚書戴紅紫白髮欺公生匼匝磨墨揮毫興不衰作詩坐使劉曹怯副本能傳幸一觀口誦舌摇徒囁囁送王郎中知江隂持歸漢省青綾被去看吳都白馬潮疊鼔渡江寒浪伏鳴鐃入境野雲飄魚穿楊柳誇鮮膾人采芙蓉學細腰家有二槐為太守弟兄誰似李文饒送閻仲孚郎中南游山水蜀山難於上青天聞之李白為舊傳蜀客往返曽又然奇峰又與三峽連巫陽神女暮為雨飛入楚臺王夢旃相如揚雄不道此宋玉景差其賦偏西州才子邯鄲守懷章往代尚踰年家住岷峨多此宦乗閑因借下江船未浮洞庭沅湘去還探禹穴希馬遷春申樓觀已不見子胥怒濤猶滿川錢塘太守同郷里一見君來顔已喜甘饌香脆與君游詩貯篋囊攜不起浣沙溪頭西子家自尋錦石菖蒲花埽歸成都與士誇君平曽已悟星槎次韻和永叔甞新茶雜言自從陸羽生人間人間相學事春茶當時採摘未甚盛或有髙士燒竹煮泉為世誇入山乗露掇嫩觜林下不畏虎與虵近年建安所出勝天下貴賤求呀呀東溪北苑供御餘王家葉家長白芽造成小餅若帶銙鬭浮鬭色頂夷華味久廻甘竟日在不比苦硬令舌窊此等莫與北俗道只解白土和脂麻歐陽翰林最别識品第髙下無攲斜晴明開軒碾雪末衆客共賞皆稱嘉建安太守置書角青翦包封來海涯清明纔過已到此正見洛陽人寄花兔毛紫盞自相稱清泉不必求蝦蟇石缾煎湯銀梗打粟粒鋪面人驚嗟詩腸久飢不禁力一啜入腹鳴咿哇次韻再和建溪茗株成大樹頗殊楚越所種茶先春喊山搯白萼亦異鳥觜蜀客誇烹新鬭硬要齩盞不同飲酒爭畫虵從揉至碾用盡力只取勝負相笑呀誰傳雙井與日注終是品格稱草芽歐陽翰林百事得精妙官職况已登清華昔得隴西大銅碾碾多歳久深且窊昨日寄來新臠片包以􅀢篛纒以麻唯能䞉啜任腹冷幸免酩酊冠弁斜人言飲多頭顫挑自欲清醒氣味嘉此病雖得優醉者醉來顛踣禍莫涯不願清風生兩腋但願對竹兼對花還思退之在南方嘗說稍稍能㗖蟇古之賢人尚若此我今貧陋休相嗟公不遺舊許頻往何必絲管喧咬哇送許當職方通判泉州乳鳥不逺飛乳獸不逺遊異類尚有戀人獨安所求許侯恰為郡乃甘貳一州得以奉雙親時物供膳羞竹箭水順疾紅旗插歸舟歸舟莫苦急睢陽多舊儔丞相正喜士尊酒應為留清源六千里到日魚蟹秋宛陵集巻五十六
