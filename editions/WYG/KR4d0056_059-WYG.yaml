body:
  text: 宛陵集卷五十九宋梅堯臣撰陽武王安之寄石榴安榴若拳石中藴丹砂粒割之珠落盤不待蛟人泣舊友大河濵作宰實畿邑嚴霜百果熟為贈忽我及始時童稚嬌爭取㺅猿集老夫所食微何暇更収拾聊荅君意勤作詩恨短澀寄致仕余少卿仕苦戀朝廷多為老所逼朝廷雖愛賢不欲竭其力君歸頗得宜湖上遂偃息男能智自謨孫亦俛就職人事當置之自可樂胷臆和吳沖卿學士冬日私居事人知何晏宅近住白楊頭車馬不還往詩書多蓄収風庭吹落葉霜樹立鳴鳩頗與市朝逺閉門凡幾秋和吳沖卿藏菜霜前收美菜欲以禦冬時備乏且増品挑親那復思菖葅嗜西伯薑食語宣尼未免效流俗竟將罌盎為依韻和王景彞學士紫宸仲冬早謁朝開閶闔九重深望拜珠旒照玉簪霜氣稍廻龍陛峻日光微轉鳳樓陰庭中細仗穿旗脚案外薰爐對殿心我預千官少禆補欲將歌頌播堯音依韻荅景彞謝予訪其居日暮乗羸馬因過太史家竹窗談脫麈槐樹暝棲鴉邦瘁稽前詠人亡起彼嗟夜分歸不寐猶照角巾斜其日聞石昌言卒哀石昌言舍人三首十一月二日朔日望顔色衣冠朝帝閽西靈未生魄東岱已收魂弔哭新居啓封題舊箧存善人吾不見何可問乾坤聖賢無不死夀夭復何云唯有名常在其餘理莫分朝榮金玉寶暮殞蕙蘭焚今日寢門哭緒言長絶君賈誼過秦畢相如諭蜀歸二人名既大一日命何微痟似烏常渴災成鵩不飛百年今已矣冰結淚霑衣鄭州王宻諫潄玉齋渠渠梁照日泯泯水分京激作飛巖勢流為雜佩聲圖書無近蹟草樹有冬榮景落人閒處漂花出古城書李學士北使集後蘇武艱窮只四篇五言風格到今傳節旄盡落都無詠枉在胡中十九年送李學士河東轉運重持使者節北上太行行未注螭頭筆來賙塞下兵朱轓邦伯至黄綬縣官迎臘雪臨闗宻宵烽出􅕤明山川壯汾晉戎馬說幽幷此部多才俊其人不易輕次韻和吳仲庶苗蔡二村墅閒居聞說江南庾子山卜居泉石愛孱顔古來得喪何須問世上榮枯只等閒髙闕浮雲徒有戀夕陽飛鳥亦知還予貧不及三君子老愧朝紳進退閒送良玉上人還崐山來衣茶色袍歸變椹色服孤舟洞庭去落日松江宿水煙晦琴徽山月上巖屋野童遥相迎風葉鳴橡槲依韻和宋次道學士紫宸早謁陸生聲譽在雲間來預簪裾謁帝顔冠劒有容夔與禼文章全盛馬兼班耽耽玉宇龍纒棟藹藹金鋪獸齧環却出常衙殿前過㦸衣風動自相攀和次道省中初直江南太守歸夜直省中闈霜氣冷侵被月光斜入扉官奴休執燭侍史正薰衣展轉不成寐幽懷吟更微去年宋中道自洺州以書令魏殊來謁予魏遂託主第後辭歸予因中道之兄次道有孔雀賦以送魏生置從南海桄榔林籠入西州鸚鵡地聳冠翕翼脩尾張鱗鱗團花金縷翠一身燦爛文章多引聲笙竽奈逺何五侯池館不可戀桂樹深枝自有窠鳳皇樓頭饒燕雀入屋穿簾非爾樂非爾樂去何之北方佳人或歌咢依韻和宋中道見寄歳在涒灘初别子子遒廣平裨郡理廉頗臺傾有遺址今逢四方弓久弛時不用兵皆樂鄉念我貧居天子庠抱經臨案空循行貌垢不洗顔蒼蒼得時少壯相揄揚獨行無侶心浶浪腸如轆轤轉井牀内飢外寒膚粟芒若此煎炒何心腸王都浩浩多球琅懷珉安可爭焜煌舊朋升騰皆俊良殁不發語生括囊巍巍堯舜開明堂大調金石來鳳皇鴛鴦戢翼方在梁福祿其宜無不臧已甘老死填溝隍殭尸闔棺猶目張仲尼生世尚徨徨豈能強聒爭蹌蹌未由見子舉以觴北望大河衣袂攘牽牛横漢不服箱欲往乗車無可當天駟有星名曰房又欲乗馬行幽荒牛雖蹄瑩馬眼光既不我駕路阻長我懷炳炳何日忘半夜攬琴彈履霜冩意緘辭無鴈將低雲作雪正蒼茫雷逸老以仿石鼓文見遺因呈祭酒吳公石鼔作自周宣王宣王發憤蒐岐陽我車我馬攻既良射夫其同弓矢張舫舟又漁􅡈鱮魴何以貫之維栁楊從官執筆言成章書在鼓腰鐫刻藏歴秦漢魏下及唐無人著眼來形相村童戲坐老死喪世復一世如鳥翔唯閱元和韓侍郎始得紙本歌且詳欲以氊衣歸上庠天官媕阿駞肯將傳至我朝一鼔亡九鼔缺剥文失行近人偶見安碓牀亡鼔作臼刳中央心喜遺篆猶在􅅖以臼易臼庸何傷以石補空恐舂粱神物㑹合居一方雷氏有子胡而長日模月仿志暮強聚完辨舛經星霜四百六十飛鳳皇書成大軸緑錦裝偏斜曲直筋骨藏攜之謁我巧趨蹌我無别識心傍偟雖與乃父非故鄉少與乃父同盃觴老向太學鬢已蒼樂子好古親縑箱誰能千載師史倉勤此冷淡何肝腸而今祭酒禆聖皇五經新石立兩廊我欲效韓非癡狂載致出闗無所障至寶宜列孔子堂固勝朽版堆屋牆然須雷生往度量登車裹護今相當誠非急務須紀綱太平得有朝廷光山水大字輦已甞於此豈不同粃糠海隅異獸乘舟航連日道路費芻糧又與兹器殊柔剛感慨作詩聊激昂願因諫疏投皁囊夜觀奎壁正吐芒天有河鼔亦焜煌持比負鼎干成湯和宋次道奠石昌言舍人金羈白馬曉朝天嘒管行車暮已傳上帝樓成何遽召青霄路絶不應還飄階隕葉聲凄若隔幕孤燈夜寂然來奠一觴空湛湛却思平昔淚漣漣和王景彞寄呂縉叔白盡髭鬚史未成不知能賦易登瀛三冬足用腐儒飽千里從看跛鼈行知有清名在公議自無餘力到髙閎磻溪八十猶垂釣祖例推來亦後生依韻和宋次道荅弟中道喜還朝白首謬陪兄弟間阿連初喜客兒還池塘夢句君能得咳唾成珠我未閒陋巷閉門誰扣扣茂林飛鳥自班班歸來又接同袍㑹月下朱閎不用闗依韻和荅王安之因石榴詩見贈當年仕宦忘其卑朝出飲酒夜賦詩伊川嵩室恣游覽爛熳徧歴焉有遺是時交朋最為盛連值三相更保釐謝公主盟文變古歐陽才大何可涯我於其閒不量力豈異鵬摶蒿鷃隨見君弟兄入太學俊譽籍籍聞一時而今兩鬢各已白偶因贈酬言及斯升沈是非休要問百歳歡樂誰能期陽武王安之寄兔魚原上一雙兔河中兩尾魚兔皮空被褐魚腹不藏書長跪置逺意故人情何如二物本潛伏誰言罝網疎崢嶸歲亦晚將駕歸吾廬依韻和王景彞對雪天雪霰成先暴集地中陽復已如期穿林陡覺縈風急入袖初驚學舞遲樓上温貂方貰酒竹閒寒雀未辭枝平眀君向螭頭立玉座爐煙細細時依韻和荅永叔洗兒歌夜夢有人衣帔蜺水邊授我黄龜兒生男前一夕夢道士贈龜一枚仰看星宿正離離玉魁東指生斗威明朝我婦忽在蓐乃生男子實秀眉自磨丹砂調白蜜辟惡辟邪無寶犀我慙暮年又舉息不可不令朋友知開封大尹憐最厚持酒作歌來慶之畫盆香水洗且喜老駒未必能千里盧仝一生常困窮亦有添丁是其子重送祖擇之北使文章世徳已能傳得桂髙枝二十年持節欲同蘇武勁下帷曽似董君賢衣裘莫厭風霜重鞍馬寜辭嵗月緜一過范陽應感槩歸來圖畫彼山川題老人泉寄蘇眀允泉上有老人隠見不可常蘇子居其間飲水樂未央淵中必有魚與子自徜徉淵中苟無魚子特翫滄浪日月不知老家有雛鳳皇百鳥戢羽翼不敢言文章去為仲尼歎出為盛時祥方今天子聖無滯彼泉􅅖景彞率和唐崇徽公主手痕詩兩壁美人虹已収蒼崖纎手蘚痕秋和親只道能稽古沉略從來不解羞漢月眀明掌中照邊塵漠漠指間㽞昭君歿後更多恨彈作琵琶曲未休觀黄介夫寺丞所収邱潛畫牛邱畫吳牛希戴嵩吳牛角偃彎如弓老牯望牸犢望母母下平坡離牧童牧童吹笛坡頭坐古樹蕭騷葉戰風黄君買畫都城中不惜滿貫穿青銅賣從誰家不肖子傳自幾世賢卿翁今時貴人所尚同竟借觀玩題紙窮紙窮磊落見墨妙東府西樞三四公應識古人丹青蹟願推此意佐國論况乃聖徳同堯聦題嘉興永樂院檇李亭土化吳王甲骨朽越王兵五月菖蒲草千年檇李城蒲根蛙怒嚎城上烏夜鳴吳越滅已久客心空屏營落日孤亭閒悠悠鐘磬聲吳沖卿鼔契猶是唐時契有司嘗欲冒耕上不許暮契出朝契歸出入未嘗逢日暉雄雌曽不離鐘室百年刓弊知者稀時移世異不改易俗眼厭舊君前非君王萬年千年夀獨憐古器與衆違昨日霜華厚如雪百官凍鞾朝紫微吳王偷就温漏火始一識之増歎唏不知逄逄六街鼓自此發號通帝闈人閒鐘鼓有多少多少亂鳴誰肯譏江鄰幾寄羊羓去歳為翊造者細肋胡羊臥苑沙長春宮使踏霜羓蒺蔾苗盡初蕃息苜蓿盤空莫歎嗟自乏良謀甘更鄙猶能大嚼快無涯磨刀為削朝霞片時引清盃興轉嘉周仲章都官示巻因以贈之赭白西北來本是天馬種朝秦暮至吳嵩華如歴冢伯樂曽未逢垂頭牧青隴今朝顧我鳴振鬣耳聳聳聲生秋風悲已喪荆軻勇誰牽駕鸞車髙躡雲勢擁宛陵集巻五十九
