body:
  text: 宛陵集巻十七宋梅堯臣撰除夜雪擊鼔人驅鬼漫天雪送寒臘從今日盡花作舊年看著樹多還墮隨風積更乾明朝預王㑹畏濕兩梁冠和吳沖卿元㑹千官車馬閶闔來晝漏始上閶闔開峩峩左右升龍進昨夜雪飛雲作堆殿前冠劒魚鱗立東風入仗旗脚廻黃鐘一奏寶扇掩玳簾卷起香霧排鳴梢未盡霹靂響翠輦已退黃金階聖人端冕御法座大樂旅作聲和諧羣公抃蹈丹墀下尚書奏瑞四夷懷乗輿却入更衣閤通天絳袍陞玉榻百拜稱觴萬歳聞兩廊賜食簪裾帀曲傳大定舞綴疎波旋煙斂飭宫車衞官解嚴多士退日光停午氣象舒吳君才華天下傑歸來作詩傳石渠石渠祕䆳無凡愚石渠酬唱皆嚴徐我慙短學復在後收餘掇棄聊以書元日頻年無入閤今日預朝元丹陛發金奏侍臣稱玉樽旗旌摇細仗雲霧啓千門却出蒼龍闕衣冠萬馬屯依韻和仲源暮冬見寄曽未學黃庭衰顔已可驚詩能如阮籍評不媿鍾嶸玉軫調初美冰壺想更淸兔園風雪甚還聽鴈來聲送韓子文寺丞通判瀛洲嘗聞河間守介直天下無選才才且殊鐵網收珊瑚珊瑚得亦難鐵網取亦劬况兹戎馬郊為貳維多謨新春度滹沲冰上少馳驅十七日和原甫風花偶書用其韻風花不戀枝脱萼亂翻飛自學空中雪寧同垣上衣繞庭回旋久無著衆鳥爭銜何處歸貽妄怒飲食無逺近所美䝿甘軟南方食蝦蟇密捕向淸畎齒咀口且諱聞語輒忿喘此物何醜惡猶勝螺螄蜆西蜀亦取之水田名穀犬彼士不為慙吳人休獨愐豈須若中州牛羊􅖒大臠十六日㑹靈火章聖皇帝興三宫三宫鼎峙何崇崇天聖七年六月尾玉清始災壇宇空于今二十有五載上元後夜星軫中乃聞㑹靈五殿火丹燄赤天明月紅千楹萬棟一夕盡赤煙奔突西南風先時二日車駕幸為民祈福輸清衷大臣驕蹇不從祀岳靈不歆為不恭若此示變猶影響宜鑒陛下無惰容神非怒乙遂及甲天意警聖不警凶不獨洪水累堯德堯仁未忍流驩共送潘司封知解州其父嘗守此州鹽池暗湧蚩尤血紅波爛爛陽烏熱岸㫄遺老記南風五月滿畦吹作雪白徑嶺上橐駝鳴太行山中騏驥苶古人射利今人同行商不困何由設朱轓太守自東來先世大夫留故轍是非取與應不移秦人休􅃷張儀舌飲酒呈鄰㡬原甫天地不爭行日月不爭明晝夜自顯晦冬春自枯榮夸父逐日死共工觸天傾二子不量力空有千古名寄語賢與愚何嘗見長生我願㑹良友醉顔日常赬東海為酒樽五湖為杯羹海罄湖且竭盡倒為解酲苟死不復知苟生徒牽情項籍乗牛車馳上廣武城强梁取秦鹿慷慨猶為輕歸來臥酒家豈得慙公卿樂亦但如此舉世任營營寄渭州經略王龍圖西城橐駝來賀蘭入貢美玉天可汗蕭關夜開月團團彈筆古峽鳴哀湍前將軍不擐甲取大官今將軍能撫士尚盤桓河西五郡兵氣完駿馬躍棧無箭瘢我嗟乗劣不受鞍焉得乞與都人看二十一日雪中赴宿懷鄰㡬原甫正月東都雪多於舊臘時酒賔臨迥閣野雀集枯枝馬向西城度花從上苑遟劉郎與江叟相對定爭棊送永興通判薛虞部灰宫盜玉秦樓空南山不老天無竆蘚碑剥爛少文字雨耕拾寶牛蹏中其㫄築城聚貔虎黃土岌嶪如削銅西州吏人氣吐虹摧鱗歛角聽相公少年别乗勤爾躳幕府甚盛瓊瑶叢送宣州簽判馬屯田兼寄知州邵司勲寒溪翠拖碧玉帶蒼山晴臥蛻骨龍水邉苦竹抽肥筍石上老蕨拳紫茸泊船繫纜宿明鏡昭亭廟古攢瘦松陰風雨電潭心起雲遮北嶺如墨濃田秧浸緑白鷺立内史出喜嘉賔從昔時謝公來賽神蘭肴作椒金作鍾聮詩姓何名已失板蠧粉落蟲鳥蹤我鄉復傳召南化磨鏤黑石君亦逢觀拽龍舟懷裴宋韓李截春流築沙坻拽龍舟過天池尾矯矯角岐岐千夫推萬鱗隨驚鴻鵠沉魚龜春三月輕服時薄水殿習水嬉馬特特來者誰魏公子人不窺車轔轔集其涯邯鄲倡士交馳銀缾索酒傾玻瓈用錢如水贈舞兒却入上苑看鬭雞擊毬彈金無不為適聞天子降玉輦當門虎脚看大旗春風吹花入行􅀈紅錦百尺爭蛟螭雲蓋廻綵䌫維明年結客觀未遟二月四日雪前日春風初擺條昨夜雪飛深一尺北帝及臘不行令東皇發煦遭爾厄侵時奪氣四時錯歡問上天何不責天髙地厚語難通俛首下土徒叩額或言莫信難可聞鶴鳴至微猶不隔休問天問顔蹠休看花看壟麥荅劉原甫生早多交友常恨㑹遇稀每念相笑語昨是今或非重惜向時游出處苦乖違從今儻有酒莫問棃栗微前夕呼我飲遣奴來叩扉暗犯風雪往醉脫冠服歸夜來新霽月清吐萬里輝劉郎戴幅巾江叟披褐衣相過無百步誰虞竊訶譏三家若循環但知具甘肥聞語十方璉長老舊居廬嶽寺新化給孤園還享國人供應無塵事喧有來聽喻筏一悟見吹幡不憶爐峰下臨溪看飲猨十一日垂拱殿起居聞南捷二月雪飛雞狗狂錦衣走馬回大梁入奏邕州破蠻賊絳袍玉座開明堂腰佩金魚服金帶榻前拜跪稱聖皇一朝嚴氣變和氣初令漏泄飛四方將軍曰靑才且武先斬逗撓兵後彊從來儒帥空賣舌未到已愁茅葉黃徘徊嶺下自稱疾詔書切責仍勉當因人成功喜受賞親戚便擬封侯王昔日苦病今不病銅鼔弃擲無鏢鎗十五日雪三首寒令奪春令六花侵百花塘冰膠燕觜野水澀芹牙擁柱輕於絮吹墀净若沙乳禽飢啄木誰誤撥琵琶新雷奮蛇甲密雪鬭鵝毛正欲裁輕縠重令著弊袍沙泉流復凍煙萼坼還韜只待鄰醅熟微聲聽酒槽春風九十日一半已消磨準擬看花少依稀詠雪多官車猶載炭菢鵲不離窠向此興都盡戴家誰復過聞密賜朝聞政府賀捷回夕賜明月五千枚巍巍聖皇德所該廟略付與何有哉况未覆穴翦渠魁宜先戰士老與孩傾肝瀝膽謝不敏豈可便恃張良才送衛眞宰晏寺丞罷長安捨琴辭苦縣解劒入圅關鵲報逺人至馬衝春雨還荒榛郊北囿蔥翠國南山歸見蕭何政條令舊鎬間江鄰㡬饌鰌泥鰌魚之下曽不享嘉賔又嫌太健滑治洗煩庖人煎炙亦苦腥未嘗輒向脣江侯昔南官家膳無此珍昨日邀我餐下箸勝紫鱗乃知至賤品唯在調甘辛淘渠開春溝畎春泥五步掘一塹當塗如壞堤車無行轍馬無蹊遮截門戸鷄犬迷屈曲措足髙復低芒鞵苔滑雨淒淒老翁夜行無子攜眼昏失脚非有擠明日尋者爾瘦妻手提幼女哭嘶嘶金吾司街務欲齊不管人死獸顚啼蓬生麻中麻畦無曲本蓬質有樛莖所託脩仍直安能縱復橫擇鄰聞舊母益友記諸生蕭艾從兹逺蒿萊不可幷何嗟蔣詡徑孰念衞人行儻匪縁其地秋風廣漠驚賣鹿角魚水中龍角而足海小魚角矗矗不擬龍乃擬鹿譬彼蝸抗繭犢漬以鹹鹵久且醭持賣都市參鼎餗此人何苦厭豬羊甘爾臭味不飽腹夜與原甫江家步歸二十三日丹砂漆盤盛井水冷浸半坼山櫻花始見春色不奈喜黃昬招飲夜還家劉郎居南我居北陌上泥開天正黑風吹蠟燭燒未明素絲作履惜不得髙陽關射亭星弧射狼夜夜張角弓備寇不可忘將軍屯師古關下不尚武力何由彊日與兵官來㑹此弓須射硬箭射長更如羿中九烏斃獨見杲杲明扶桑京師逢賣梅花五首此土只知看杏蕊大梁亦復賣梅花此心還似庾開府不惜金錢買取誇驛使前時走馬廻北人初識越人梅淸香莫把荼􅐘比只欠溪頭月下杯憶在鄱君舊國傍馬穿脩竹忽聞香偶將眼趂蝴蝶去隔水深深㡬樹芳曾見竹籬和樹夾髙低斜引過紫扉對門獨木危橋上少婦髻鬟猶戴歸此去吾鄉二千里不看素萼兩三年移根種子誰辛苦上苑偷來直㡬錢三月五日欲訪宋中道遇雪而止蝴蝶飛時雪鬭輕滿街撩闕得人驚欲尋宋子東城去馬畏春泥不敢行觀文丁右丞挽辭二首預政公槐亞談經帝席陳儉恭齊國相淸淨漢廷人去夢嘗爲蝶遺文不解麟一聞車馬幸豐賜及孤臣春風百花發露挽九原歸白馬悲鳴駐黃鸝下上飛壠邉新柏盛門外弔人稀獨見東牀客攀車淚溼衣廷老傳沛語戲作夷門市裏侯嬴老公子時能釋禮過莫問孟嘗招致客薛中遺俗尚應多送胥平叔寺丞赴洛單車細馬出虎牢春雲黕黕百舌號穀雨已近花欲盡秉燭夜飲朝坐曹因君重思昔日歡醉筆狂埽嵩邱髙于今零落二十載縱在各各歎二毛試採上陽何首烏刮切仍致苦竹刀俗情相望亦異此競欲折筍籠含桃送婺州通判徐殿丞赴上當在後年夏疾湍怒蛟龍不畏東風逆沄沄奔長淮千里在咫尺辭梁始及晨過宋尚未夕南州豈難到何處淹行迹三月十日韓子華招飲歸成清明曉赴韓侯家自買白杏丁香花雀眼塗金銀蔑籠貯在當筵呼舞娃舞娃取捧笑向客不顧插壞新烏紗朝來我舍報生子賀勸大白浮紅霞酒狂有持梧桐板暴謔一似鄱陽槎袒裼擊鼔禰處士當時偶脫猛虎牙褊衷不容又何益鸚鵡舟上空蒹葭送下第親舊花開風雨惡坐見紛紛落明日結子時又復有脫萼莫嗟樹漸老樹老子亦著共愛西枝繁不數東枝弱他年㑹有春却看西枝薄燕一避吳宮火千年楚屋春翅迎風雨健聲入戸庭頻掠水過長渚銜蟲落覆塵休將漢皇后故故比輕身雨春雲易成雨一日㡬廻陰燕濕飛猶快花寒色更深邀車愁客逺盤馬畏泥侵向晚晴光吐西窗緑影臨晴風埽天如鑑雲開日似萍苑花猶帶濕蔬甲巳微靑蝶翅粉應薄塘漘波更渟尋春不惜醉莫笑髮星星送胡公疎之金陵緑蒲作帆一百尺波浪疾飛輕鳥翮𤓰步山傍夜泊人石頭城邉舊遊客月如冰輪出海來江波千里無物隔自古有恨洗不盡于今萬事何由白依稀可記鮑家詩寂莫休尋江令宅楊花正飛魮魚多食膾舉酒謝河伯但令甘肥日飽腹誰用麒麟刻靑石去舸已快風亦便寧同步兵哭車軛送裴虞部知信州攢靑歴歴正面山刺史日坐雲屛間楚人竟握水精璞漢女買作月珮環時惟産寶不重穀願當化俗無弃菅往辭丞相相有言物景清絶何由攀送李推官之岳州崑崙燕子五兩竿霧露薄水平湖寒風帆美滿八百里夕從岳陽樓上看魚跳鷺立月鉤下星斗爛爛垂䦨干羽書不到樽俎裏蠻兵况去荆楚安試尋燕公舊賦筆磨圭刻碧獨可完和和之南齋畫壁歌終南下臨長安城峻欄髙檻黃金嬴嵩山亦近洛陽陌鮮車怒馬一日程大梁平廣帀千里不見雲峰來眼厎其間自有髙趣人埽室呼工巖壑啓初疑巨靈勇擘華不比將軍能聚米暗雨輕煙滿室中塵事如脂一朝洗又將餘力作脩竹石上數莖風撼玉葉斜枝亞寒聲盡節老根獰生意足何須踐苔眠緑陰然後始爲嵇阮公三賢歌詠已見意舞女不看頻整簪嫣婦黃金一丸入雲端羣貧望逐滿長安衆人爲䝿嫣不惜弃擲如泥資彈射藏身葉厎有能嗚辜負春風拖雨翮不飛上天訴至珍㡬人辛勤揀砂石送端式歸漳州來居天王都常夢苦竹溪乃識髙僧趣不爲利物迷海燕乗華屋區區竟銜泥安知矯翼鷗豈類斷尾鷄性同而質殊何必莊指齊送黄殿丞通判潤州前年江州飛火龍樓殿化盡山將鎔今聞榱棟復華壯大閣渠渠出波上南徐别乗簡且閑下馬岸㫄呼畫舫永日江風不畏人檝師猱獰欺白浪衣上京塵莫厭多斗擻中流雲在望揀花紫絲暈粉綴蘚花緑羅布葉攅飛霞鶯舌未調香萼醉柔風細吹銅梗斜金鞍結束果下馬低枝不礙無䦨遮長陵小市見阿姊濃薰馥郁升鈿車莫輕貧賤出閭巷迎入漢宮人自誇次韻和端式見贈不爲阮步兵發詠怨朝陽不學屈大夫行吟思搴芳其雨豈無時細佩空自香吾道不苟合我懷固有常江南一畞宅近在句溪㫄仕官且如此夢寐安敢忘以子論言多重歌木桃章楊公藴之華亭宰月徑千里大中有神娥宮宫㫄種玉桂柯葉垂瓏瓏蝦蟇穴其根出輒氣墨蒙光魄縱復吐血赤如頑銅不知從何時更使人蹤通年年折桂枝寛少尚易充今年拗都盡秃株立童童株秃莫爾攀墮雲雙手空歸來走海上買鶴問吳翁端午前保之太傅遺水墨扇及酒畫扇雙酒壺置前兵吏立言將國匠奇重以風義執樹石冰上看山河月中入便持菖蒲飲不畏靑蠅及送汝陰宰孫寺丞艑郎唱㯭燕尾下穎水落日蛇鱗生緑蒲被岸漁網舉黃鳥啄葚繰車鳴吏無詬租官正來不借魴鱮與吏􅖒饋吏人情見里黨官非喜慢知官清和曇穎師四明十題雪竇山重雲不藏春深竇常有雪曉月號松猨晴壁挂海霓終怳無心人區區佩環玦龍隱潭老龍戀潭窟不雨亦不雲吐涎出溪滑吹腥隔林聞疾雷驅未去魚鼈競紛紛含珠林山爲驪龍蟠谷作驪龍顋珠樹存其間誰採明月來何須循海隅笑蚌未成胎偃蓋亭旣將茅覆檐復有松爲蓋五里入山時憩此得寒籟曽無康樂遊但見雲衲㑹雲外菴山僧好寂靜入雲恨不深峰間一雨昏林表孤燈沉往來有猨狖呼嘯自成音石筍峰巨石如龍孫聳聳煙霧裏明明落溪口納納喧灘齒何當助齋盂菌蕃徒爲美宴坐巖智覺禪師於此不睡心危身亦危衽席尚顚墜如何巖石上來坐自安意能諭死生間無論寤與寐三層瀑山頭出飛瀑落落鳴寒玉再落至山腰三落至山足欲引煮春山僧房架刳竹丹山洞山無鳳皇飛洞有仙人迹蝙蝠大如鴉莓苔偏上屐自慙無道骨安問縁雲客獅子巖巖形若狻猊不能千里走豈無鳥獸羣當假風雷吼寄謝棲息人想像眞妄有宛陵集巻十七
