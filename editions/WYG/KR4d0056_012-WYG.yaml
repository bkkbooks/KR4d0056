body:
  text: 宛陵集卷十二宋梅堯臣撰擬李益竹窗聞風寄苖發司空曙窗前風動竹聲碎影仍緐衝扉忽自啓出誤初迎門驚雀枝未定乳蜂窠暫翻飄飄一舉袂聊更遟來轅擬宋之問春日翦綵花應制上林花未有中禁綵先成葉逐翦刀出蕊從妝粉生紅緐内人手香染侍臣纓不是將春競天心重發榮郡閤閲書投壺和呈相國晏公較量人世無窮樂羅列平生未見書聊奉投壺祭征虜休言擊劒馬相如畫樓晚去聞寒角縹帙看來落蠧魚日獲誨言皆舊學不慙貧賤帶經鉏梅花江南臘月前溪上照水野梅多少株豓薄自將同鵠羽粉寒曽不逐蜂鬚桃根有妹猶含凍杏樹為鄰尚帶枯楚客且休吹玉笛清風飄盡更應無擬張九齡詠燕眇眇雙來燕長年與社違任從新厯改只向舊巢歸永日當人語輕寒逆雨飛自親梁棟慣不識海鷗機遟雪風號大澤晚雲覆女牆低驚霰夜將集廣庭朝復迷鶯鳴寒蔽日鴈泊凍生谿會待飄花密開軒意外題欲雪復晴陰雲不成雪碧瓦有緐霜日氣生簾額冰條結井牀飛烏鳴自樂古木晝仍殭誰意斗晴後苦寒勝北方送䝉寺丞赴郢州郢國當時唱猶傳白雪眞問今非昔日和者幾何人客自射飛鴈漁能供躍鱗芳洲墮馬處吾祖漢名臣聞角一聲催客夢星斗轉西檐風卷梅花去愁從栁塞添馬鳴霜滿鬛龍泣凍生䫇髙樹朝光動城頭落海蟾和人雪意凍雲低垂野逺樹昬未分朝來庭竹上摵摵霰已聞扣門有兵吏嘉命傳相君趨閣展熊席卷幔飄爐薰桂漿貯榼美馬乳薦實蕡賔屬兩三人從容奉評文逺稽先儒言風賦可以群密置筆與硯唯待雪雰雰雪既不可待日暮人半醺明朝獲方楮健思欲凌雲詠楊髙品馬廏猢猻嘗聞養騏驥辟惡繫獼猴供奉新教藝將軍舊病偷聊看縁柱杪尚想傍崖頭更祝南州使如拳試爲求和欲雪二首貂裘著不暖牙帳曉初開朔氣還先及流風亦屢催擬聞人詠絮將見使傳梅公復憂民畆龍沙幾日來雪欲漫天落雲初著地垂臂鷹過野健走馬上冰遲公子多論酒騷人自詠詩都無少年意只臥竹窗宜梅花巳先群木得春色不與杏花爲比紅薄薄逺香來澗谷疎疎寒影近房櫳全枝惡折憎鄰女短笛橫吹怨楚童墜萼誰將呵在鬢蕊殘金粟上闕蟲和十一月八日圃人獻小桃花二絶當時開向杏花後今日綻當梅萼前不畏雪霜何太甚緐英如火滿枝然前占寒食一百六筭到其時未合開丹豓已先灰管動不由人力與栽培和梅花時時不甘春著力年年能占臘前芳水邊攀折此中女馬上齅尋何處郎山舍更清栽作援鳳樓偏巧學成妝團枝密葉都如雪野雀飛來翅合香再送䝉寺丞赴郢州彎弓落飛鳥少也向幽州來作漢官屬恥為戎國留身輕抛馬轡地暖厭狐裘慣見顔如玉江邊問莫愁擬王維觀獵晏相公坐中探賦白草南山獵調弓發指鳴原邊黃犬去雲外皁鵰迎近出長陵道還看小苑城聊從向來騎回望夕陽平擬陶潛止酒多病願止酒不止病不巳止之懼無歡雖病未宜止且欲止人事事止不經耳次誦止足言行當止田里田里止誰親止樂山水美既止何所助唯酒與止喜以言止不止未必止為是止酒儻不瘳枉止徒可恥止亦隨化遷不止等亦死慎勿道止酒止酒乃君子擬杜甫玉華宫松聲溪色古中有鼯䑕鳴廢殿不知年但與蒼崖平鬼火出空屋未繼華燭明暗泉發虚竇似作哀絃鳴黄金不變土玉質空令名當時從輿輦石馬埋棘荆獨來感舊物煎懷如沸羮區區人世間誰免此虧盈擬韋應物殘燈照此寒夜中欲殘紅燼尾空堂滅復明獨宿擬山鬼和十一月十二日與諸君登西園亭榭懷舊書事二首冬日蕭條公府清獨將諸吏上髙城而今何處異疇昔鐵墓下聞狐夜鳴莎徑依然見莎葉蓮塘無復有蓮花更看白水滿城下説著當時龍骨車和小雨蛟龍潠白霧天外細濛濛霑土曽無迹昬林似有風卷旗妨酒舍濕翅下洲鴻稍見斜陽透西雲一半紅擬韓吏部射訓狐黄昬月暗妖鳥鳴尨然鈍質麤豪聲憑凶自異立屋角潛事觜吻欲我驚豈知慣聞此醜狡呼集鬼物夸陰獰夕盜雞雛無畏避曾遭彈射沉泥坑汝今病翼未甚愈還作舊態侵平明陽烏曈曈出東海照汝宜喪膽與精何爲世人苦憎汝汝常盜物資已榮儻有弓矢勿汚辱殺此非得去惡名養雛四三已相似眼腦實異鸞皇生一朝車輪翅墮地狐鼠入穴梟黨烹得韓持國書報新作茅廬聞君作茅廬正在西軒西定移舊蔬圃稍改新藥畦其髙如伯鸞况亦有隱妻今方漢徳盛不必之會稽和新晴雲開日照㦸衣寒淨埽平沙路已乾吏散庭除少公事畦挑芽甲足春盤要聽林上鳴禽變試步塘陰綠水寛誰詠陳根有微綠烏蟾易失似跳丸清躬詩所稟介且拙嘗恥朋比爲皎皎三十年半語曽未欺身微德不著尚使人見疑省已當自責實負聖相知聖相雖明察不假束藴辭扣言巳可罪引去豈非宜嘗惠山泉呉楚千萬山山泉莫知數其以甘味傳幾何若飴露大禹書不載陸生品嘗著昔惟廬谷亞乆與茶經附相襲好事人砂缾和月注持參萬錢鼎豈足調羮助彼哉一勺㣲唐突爲霖澍疏濃既不同物用誠有處空林癯面僧安比侯王趣糟淮白寒潭縮淺瀨空潭多鮊魚網登肥且美糟漬奉庖厨昔聞漁父賢嘗勉楚人餔楚人懷沙死𦵏腹千嵗餘今兹有遺意敢共杯盤疎和臘前漢家戍日看看近雲景蒼茫已歳昬欲驗方書治百藥預調飛走獵平原土人熏肉經春美宮女藏鈎舊戲存獨把凍醪驚節物草芽微動見庭萱題臘藥尚書晏相公臘日投壺輸詩七首便以臘日所用物賦先成四首上呈頽顔早覺衰乃藉藥扶持及此季冬日預脩來歳宜鼎成無犬見蜜煉有蜂知借問月中長年何所爲臘酒韋氏月録云臘日造四月成汲井轆轤鳴寒泉碧甕盛欲爲三伏美方俟十旬清夢憶黄公舍徒聞韋氏名熟時梅杏小獨飲效淵明臘脯畋獵得封獸割鮮爲腵脩易甘非愛日不敗任經秋可用資賔豆何妨鄙薦䐹考之新月録美脆勝庖牛臘筍南山深竹養去下有鷓鴣鳴破臘初挑箘呂氏春秋曰和之美竹越之簵箘誇新欲比瓊薦盤香更美案酒味偏清馬援當時見曽將禹貢評伏波至荔浦見冬筍上言禹貢厥包橘柚疑是謂也和挑菜十二月十二日中圃本膏壤始覺氣候偏出土蓼甲紅近水芹芽鮮挑以寳環刀登之饌玉筵僻逺尚含凍安占春陽前造物非有意地勢使之然和臘日獵鼔逄逄奏寒冰齾齾消正憐風日暖不似雪霜朝敢問祠黄石休從擊皁鵰楚郊梅萼未壟麥已多苖啄木二首十二月十二日陪步後園所聞見城頭啄枯楊城下啄枯桑朝啄不停咮暮啄不充腸寒風正洌洌蠧穴蟲且殭况兹園林迥剥剥響何長食蠹非嫌蠧聲來古木髙誰將琵琶㺯冩入相思槽語鴆此以上三首補前投壺所輸七首客語南方鴆啄蛇掀巨石遂令山中人多竊禹步迹誰云不可轉鳥啄猶能擲和淮陽燕秀才我官忝博士曽昧通經術前因辟書來亦不習文律循舊臨學宮虎革被羊質倚席未能講占牘聊置日朴鈍既若兹媿彼啖棗栗今者登俊賢充詔冠庭實邦伯乃宗公惟帝舊良弼置醴餞以行行行季冬月騏驥入羈駕千里終不蹶慙予延䕃人安得結子韤心雖羨名場才命甘汨没禄仕二十年屢遘龍榜揭在昔見麻衣于今盡超越是以對杯觴謹嚴微敢忽寧唯畏後生自恨疎節骨肴羞羅食案包核備時物里婦或窺觀户下紅裙出歸應願生男生男付紙筆乃信讀書榮况即服緼韠長歌食苹詩聲澹異鳴瑟和石昌言求牡丹栽昔年藥欄下已多香草名更移花本去聊助日邊榮莫問西都品存吾舊友評會應包萼吐可與魏姚幷帶土歸金谷封根近玉京謫仙方醉詠不倚錦官城歐陽永叔有花品和十二月十七日雪窮冬勁臘已過半曉雪先春何處來豈是全資南畞麥多應不分北枝梅庭中未許野童埽林上唯愁狂吹催莫問園同賦客相如居右最爲才建溪新茗南國溪隂暖先春發茗芽采從青竹籠蒸自白雲家粟粒烹甌起龍文御餠加過兹安得比顧渚不須誇送詹彦迪祕校之粤風懷山水心夢寐向東越聞爲會稽行獨此羨明發渡江信春潮泊館食野蕨平時異梁鴻但泛鏡湖月謝人惠茶山上已驚溪上雷火前那及兩旗開采芽幾日始能就碾月一罌初寄來以酪爲奴名價重將雲比脚味甘迴更勞誰致中􅍽水况復顔生不解杯和立春兹日何所喜所喜物向榮㡜縷作翠栁意先新陽生塗金鏤爲勝義不首時輕増年已歎老斗酒聊自傾和謝仲弓廷評新理北園園吏乘冬和荷鉏去宿莽主人因其勤築土截荒壤移枯復窊缺剗徑就平廣東北倚髙城巇險不可上愛彼林木深便爲邱壑想更待春風歸日探花卉長但願多置酒應得時一往和謝仲弓廷評栽竹移得溪邊翠來爲庭下隂惜根存舊土帶筍助新林暗換蕭蕭葉知虚寸寸心東風莫摇撼培壅未應深和歳除日一年三萬六千刻玉漏唯餘十二時去日苦多誰會惜殘陰全少頗能知已驚顔貎徐徐改不奈烏蟾冉冉馳萬國明朝賀新歳東風依舊入春旗明井在城東南顯晦有難必孰云幽不明深井發寒泉光若月色盈陰陽信竒變曷用究厥情譬彼出炎火投薪丹燄成吾人勿驚異但自汲缾罌楊公懿得潁人惠糟鮊分餉幷遺楊叔恬頭尾接清淮淮魚日登網呉蒓芼羮美楚糟増味爽云誰得嘉貺曽靡獨爲享乃知不忘義分遺及吾黨和張秘校得糟鮊食魚何必食河魴自有詩人比興長淮浦霜鱗更腴美誰憐按酒敵庖羊春雪臘前望盈尺姦縮不忍乞萬物及向榮而反事凝凓與雨暗争能不念傷彼茁雖然便消釋終是乖氣律新陽豈憚沮暴栁未爲屈隨風勢更巧著樹媚且密誰將背時弃乃欲逞果必摧花自作花旋積旋已失上天施命令冬春不相匹生物與死物其道安可壹嗚呼此飛雪何爲在今日和謝公儀學士正月十七日雨後復雪本祈春雨成春雪應誤小桃先次開西漢枚生誰復召南朝何遜自多才潑除燈火上元去挫却勾萌六出來前此解衣争貰酒不知爲瑞與爲災先是七日祈雨九日霈然至扵今伐桑二月起蠶事伐桑人阻飢已傷持斧缺不作負薪非聊給終朝食寧虞卒歳衣月光無隔礙直照破荆扉夢登天壇夜夢登天壇壇上兩仙人來時乘白鳳去時乘白麟我問不我語颯颯山中雨寒食日過荆山山郵雖禁火嶺樹自生煙嗚咽同歸櫓悲哀欲問天泣親非泣玉流淚劇流泉春鮆横刀膾何心更食鮮濄口得雙鱖魚懷永叔春風午橋上始迎歐陽公我僕跪雙鱖言得石瀨中持歸奉慈媪欣詠殊未工是時四三友推尚以爲雄于兹十九載存没復西東我今淮上去沙嶼逢釣翁因之獲二尾其色與昔同錢將青絲繩羮芼春畦菘公乎廣陵來值我號蒼穹失怙哀無窮烹煎不暇餉泣血語孤𠂻生平四海内有始鮮能終唯公一榮悴不媿古人風嵗寒亭種花邀青春種柏要晏歳乃知風露前巳辨雪霜勢時俗愛芳菲不妨鳴鶗䳏他年都門歸寧昧始終計澄虚閣箘圃隔嚻氛閑來衣練裙檻邊生静意水底見㣲雲斜照迴晴景幽芳襲薄薰主人多賦詠不減沈休文舟次泗上逢黄令因以詩送向曉入汴尾隔河聞人聲得聲不得貌問識舊時名泊舟忽來及袖詩多賢英言除丹徒宰暫作七閩行東南幾千里日夕挂帆輕渡江蒓巳老未足助杯羮最知便道出先見縣人迎依韻和許發運遊泗州草堂寺之什入寺豈縁齋阮公方詠懷心將超紫府手欲拍洪厓雲霧波初淨塵埃鑑已揩但能傾玉醑不假列金釵逺客歸空速千檣密自挨醒論時事正醉載野巾喎風俗通呉楚清渾見汴淮遥知香刹外獨與賞心諧依韻和許發運眞州東園新成疏鑿近東城蕭森萬物榮美花移舊本黄鳥發新聲曲閣池傍起長橋栁外横河渾逺波漲雨急斷虹明雲與危臺接風當廣厦清朱鬐㸔自躍翠柏種初生香草猶能識山苖未得名南峰及西嶺常共酒杯平宛陵集卷十二
