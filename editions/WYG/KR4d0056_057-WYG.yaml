body:
  text: 宛陵集巻五十七宋梅堯臣撰送葛都官南歸不羨新為赤縣尹惟羨暫向江南歸江南羃羃梅雨時風帆差差並鳥飛罾竿夾岸長若桅水籠畜魚鮮且肥家在千山古溪上先應喜鵲噪門扉楊樂道留飲席上客置黄紅絲頭芍藥洛陽賣牡丹江都買芍藥賣與冨人歡買為游子樂萬絲必同心千葉必同萼五色相淺深百金相厚薄栽培動經年風雨便成昨蕭條洛陽城索寞江都郭賴有一春花能無十千酌朝看門擁車暮見門羅雀甞聞月厎人欲把月桂斫要使清光多四海意開廓我亦愛明月常滿不願落上弦過楊侯乃值寒雨作共飲三四人不覺傳鳴柝持葩金谷豪朱黄何灼爍還思溱洧上士與女相謔實此香草芳請我賦其略酒䦨為追詠思拙筆屢閣項羽羽以匹夫勇起于隴􅅿中遂將五諸侯三年成霸功天下欲滅秦無不慕強雄秦滅責以徳豁達歸沛公自矜奮私智奔亡竟無終送陳郎中知和州藹藹尚書郎出為二千石伯父歴將相兄弟皆烜赫前罷永嘉守民俗遮阡陌獨將海松歸夸與都下客今去烏江邊寂寞空舊跡當求虞姬草無風舞隨拍城頭可曠望千里波月白俱助使君歡平時遺吏責送薛十水部通判幷州幷州自古近邊地牛酒常行十萬兵少尹曽為五府辟將軍况有舊家聲桑麻故已知風俗邱隴何須訪姓名聞說至今猶好馬試求安穏衆中行寄題西浴致仕張比部靜居院四堂張侯歸靜居堂宇結四隅堂中何所有書畫羅籖㕑四堂各異名名異義亦殊夷心與㑹真内以道徳娛清白及金䦨外為子孫模西南夜落蟾東北朝生烏天門風相通盛衰理可無舊爾松檜樹間之花石株雨晴氣􅇋佳鄰里或來俱遣摘班林筍共持香秔盂飯畢循徑行不使僮僕扶所至舊衣坐遍歴日過晡時遇園果熟甘漿而粉膚就技掇鮮羙咀味銷冰酥以此樂歳月豈是忘形軀禮法不我棄勞吝不我紆上不媿二疎下不泛五湖自有逍遥趣幸世遭唐虞送洪祕丞知大寧監三峽蠻溪上千山楚俗兼婦人樵入市官井貨專鹽魑魅或為患獼㺅常可嫌君能厚風化男子使腰鎌送江西轉運馮廣淵學士五月江南行南風江惡遡乗潮雖有信不過湓城去船經香爐峰峰前須暫住三年少尹勞始得看瀑布到官未必閑舉察憂財賦廻思廬山􅅖塵土已生慮尚存滕王閣無忘一登顧依韻和永叔景靈致齋見懷翰林文字本雄強况復齋祠向靜坊髙樹黄鸝無去意深廊朱幕動微凉不嗟門外塵沙苦只覺壺中歳月長庭下陰苔未教埽榴花紅落㸃青蒼雜言送當世待制知揚州馮廣陵老人爭持壺酒朝言送少年使君暮言迎少年太守少年俱是玉墀人文章快利生銅吼莫作蕪城賦事往復何有莫聴嵇康琴商聲豈堪久今當太平非不偶星宿煌煌羅北斗揚州古冨變荒凉萬俗一心依父母地包淮海江湖寛貨走荆吳楚越厚開釀刲羊願遇賔天下沄沄不輕口送蘇公佐屯田知單州柏上有羣烏一烏飛向東方棲城頭與人司吉凶八月禾已穫九月黍已舂竟持美酒相慶樂年豐借問何能爾時平無困窮王平甫惠畫水臥屏臨流别君時羨君觀吳潮君行識我意遣畫一幅綃畫作繞牀屛滔滔隨驚飇前浪雪花巻後浪白馬跳宛然千萬重不似筆墨描窊亞亂我目坐卧疑動摇夜燈照河漢如有織女招朝日下天窗東海無秦橋秦橋不可度織女不可邀但慕乗桴公空能誦唐堯甞聞挾柘彈意必在食鴞終當五湖上歸去學漁樵送萬州武寧段尉希元相見三十載喜君始成名新袍照江綠白髮憎鑑明臨水必觀魚獨傷魚命輕朝為淵厎游暮為釡中烹彼方路艱逺其民亦天氓餒之則為盜非是惡厥生捕多勿夸能能在不犯兵依韻荅黄介夫七十韻春風不擇草萬卉皆發萌盛夏一長養秋實俱與成舂粒以蒸炊刈枯以煎烹工師調五音不問咸與韺自取衆律和黍谷動華英可以薦祖廟可以陳帝庭良將統萬卒所向若驚霆戰鬭衆益勇號令夜益明破敵必拉朽不見堅陣横我觀欲物際亦在農力興我觀合奏時亦在考擊并我觀成功日亦在閒得情草木有美惡造化無喜憎五聲有髙下一致不可評三軍用貔虎不較蚊睫螟大君設時網廣海無漏鯨磊落黄夫子為學不自輕四十登賢科良賈售百朋得志豈計晚成名等衆榮舊交半存殁新知慕徒傾老鶴晴一唳隨風無近聲好論古今詩品藻笑鍾嶸欲埽李杜壇未審誰主盟我衰百事倦白首聊窮經兩目生昏花猶勝張籍盲讀書愛日永秉扇自驅蠅但惡亂我思非與小物勍清飇颯然來喜得如弟兄散帙空堂上垂冠髮星星載誦堯舜篇幸今時太平不學遁世士投竿泛東溟不襲貪生人煉氣噏日精不羨冨䝿翁歌吹滿重城獨守螢火光莫擥蟾蜍晶人生轉頭間未免一銘旌區區逐甘鮮鼎鼎夸佩纓安知西山餓熟識緜上耕彼勿歎鳳衰此正歌鴻冥分合殁窮巷迹澀蹈髙閎妻子易為飽粟帛不足營豈乏一器飯豈乏一杯羮肯為濁河濁願作清濟清韓愈甞有言百物皆能鳴特稱孟東野貧箧文字盈到死只凍餒何異埋秦阬今我已過甚日醉希歩兵神仙多羽翼一一飛蓬瀛乃知無道氣難可強留形鄙性實樸鈍曽非傲公卿昔隨衆一往或值􅉪議騰曰我非親舊曰我非門生又固非賢豪安得知爾名是時聞此言舌直目且瞠俄然我有荅賢相持權衡喜士同周公其徳莫與京我去豈不送我往豈不迎自為筋力寡路逺艱於行未若歸教子遺金徒滿籯歳月苦易得顔貌日可驚身雖厭役役心亦逺硜硜歸思吳州橘夢憶楚江萍試看兩圍棊白黑何所争朝脫泥塗困暮失雲衢亨物理既難常達生重飛觥曽以文豹章逺喻子懷能曩者恃貴勢悔說烏鳥靈烏靈反見怒終恨屈此誠當時語頗錯盍呼為大鵬於兹儻遇之應解頸頬赬韻盡意未盡且用此報瓊永叔内翰見索謝公遊嵩書感歎希深師魯子聦幾道皆為異物獨公與余二人在因作五言以敘之昔在洛陽時共遊銅駞陌尋花不見人前代公侯宅深堂鏁塵埃空壁鬭蜥蜴楸陰布苔緑野蔓纒石碧池魚有偷釣林鳥有巧射園隷見我來朱門暫開闢園婦見我還便埽車馬跡何以埽馬跡實亦畏他客我輩唯適情一葉未甞摘他人或所至生果不得惜又憶遊嵩山勝趣無不索各具一壺酒各蠟一雙屐登危相扶牽遇平相笑噱石𢷬雲衣輕巖裂天窗窄上飲醒心泉髙巔􅘇寒液下看峰半雨廣甸飛甘澤夜宿岳頂寺明月入戸白分吟露氣冷猛酌面易赤明朝循歸塗兩脛痛若刺日旴就馬乗香草路迫阨却望峻極居已與天外隔薄暮投少林潄濯整冠幘碑觀廵幸僧指古定空壁誓將新詠章燈前互詆摘楊生護已短一字不肯易明年移河陽簿書日堆積忽得謝公書大夸遊覽劇自嵩歴石堂蘚花題洞額其文曰神清固非人筆畫乃知二公貴逆告意可賾遂由龍門歸里􅕤環數驛我時詩已荅或歌或辨責責我不喜僧性實未所獲凡今三十年纍冢拱松柏唯與公非才同在不同昔昔日同少壯今且異肥瘠昔日同微祿今且異烜赫昔同騎破韉今控銀轡革昔同自謳歌今執樂指百死者誠可悲存者獨窮厄但比死者優貧存何所益送謝師直祕丞通判莫州兼寄張和叔河湟宿兵地勁勇天下聞侵疆古甚熾薄伐詩所云往今勢且異利害理頗分逺以塘設險遂輕甲屯雲昔傳甞膽國能破怒蛙軍越雖隔大江吳遭若枯焚實由恃阻懈抉目悲伍員夫子負美才議論髙不羣况有令兄弟今亦貳河汾助守戒不虞慎勿倚和獯張侯為刺史大族獨此君法明而不奇可共飾以文送白秀才福州省親士憂行不脩不憂祿不及之子久好學何患名未立聖時開賢科子獨不肯入固非逺仕進服期難赴集南歸慰親顔道路正暑濕悠悠幾千里赤日薄行笠暫憩青林下賴有寒泉汲漱齒去塵埃土風須漸襲送温州楚屯田鴈蕩山頭鴈如隨太守來秋風既與至春日定同廻上宰無忘舊明時必用才白於章句老經册向螢開送僧在已歸秀州前歲嘉興火僧居化劫灰四方持缽去千里渡江來心向王城講縁從海客廻水天聞唳鶴不復有塵埃送祖印大師顯忠黄紙賜祖印鑄名不鑄金力笑蘇季子責望小人深渡江見海月秋光上遥林團團冰玉盤瑩然如禪心題譯經院同文軒有書無異文有車無異軌貝多得㫄行白馬來萬里清軒延髙僧一歳譯幾紙譯罷坐焚香庭草灑寒水和江鄰幾學士得雷殿直墨竹二軸昔見雷子之小篆今見雷子之墨竹節瘦已似蛟龍孫葉暗曽無鳳皇宿江翁得之尤愛憐作詩寫意酬雙軸挂在空堂坐臥看如玩蕭蕭巖畔緑莫疑昬黑眼生花松煤濃色切寒鴉不問主人兼客至眀朝騎馬到君家永叔内翰見過我居城東隅地僻車馬少忽聞大尹來僮僕若驚鳥入門且坐笑豐頬光皎皎問我餐若何依舊抱糜麨問我詩若何亦未離纒繞我庭有棃莧不堪秣騕褭我壺無醪醴不能犒介佋乃喜百事稀來此與世矯固非傲不往心實厭擾擾韓子華内翰見過但見公軒過未見我馬去我懶宜我嫌公曽不我惡秋雨天街凉蕭蕭入槐樹遥聴髙車聲騶導門前駐僕夫驚入扉遽曰能來顧度量何其宏始終不改遇索以新詩章徧覽日欲暮誠慙兜離音唐突韶與濩眀朝當負荆人莫譏貴附送董察推赴江寧金陵從事去不歎食無魚尺鯉日登俎故鄉時得書衰荷摘短袂秋蘚曳長裾若見府公問年來嬾更疎次韻和司馬君實同錢君倚二學士見過棲棲太學官日厭塵坌積朋游絶經過都未昧相識幸得養疎慵不能事役役天京二賢佐向晚忽來覿笑我似盧仝環然空四壁只欠長鬚奴訴尹惡少摘移榻近簷楹談詩俄至夕廻車閭巷隘跛馬愁所歴平眀看蒼苔已覺生轍跡次韻和錢君倚同司馬君實二學士見過府僚忽方駕乃知決訟餘大尹不苛察羣吏不牽拘甞稱二三賢助治無偏隅新晴乗此凉行行過我居何以延君子唯有滿牀書何以解君頥淡句無足娛何以留君久燈燭已照塗登車莫言逺騶從美且都夾道行人止按轡寧馳驅我老焉所羨送子立躊躇送閬州駐泊荆供奉青天不可上蜀道未嘗行每說襃斜險唯聞猿鳥聲去為千里客自握一方兵所重恩威立無將逺戍輕江鄰幾沈文通二學士見過東城車馬多巷無蹄與轍如何二賢豪侵晨顧衰苶喜言雨後凉早暮脫炎熱愛子屋室靜塵土都已絶不唯清耳目亦粗養愚拙江碑讀頭陀沈賦甞雌霓固知世徳髙學問冠時哲我慙於其間荆華參蟻垤然推鵬鷃分自足不少别君歸邀此吟把筆強搜抉送夀州司理張元輿清川夜流明月光城上有烏啼女牆月明不掩斗與氣鳥啼未歸雲㸃霜霜寒月冷古時獄下有苔蠧之雄鋩水方軒眉大靈智見我西北天門􅅖自言昔有切玉寶嗟今非後百鍊鋼用之補履亦何益穎脫未如錐處囊誰能為封華陰土背負七星生焜煌君去味我書此意莫歎淮水來湯湯宛陵集巻五十七
