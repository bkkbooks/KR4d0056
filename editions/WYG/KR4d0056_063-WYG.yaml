front:
  text: 余被命來守宛陵視事之翌日有客謂余曰郡學請鏤版印書公留意否乎乃問其目曰梅聖俞詩集自遭兵火殘編斷簡靡有全者幸郡教官有善本余樂聞而應之曰昔龎參為漢陽太守郡人任棠有奇節參到先候之棠不與言但以薤一本水一盂置戸屏前抱兒伏於戸下參思其微旨曰水欲吾清拔薤欲吾擊強宗抱兒當戸欲吾開門恤孤率而行之漢陽大治余殿此邦之初學官諸生以學校為言今客又以聖俞梅公詩集為言客其吾之任棠也與聖俞公以詩聞於當世寔此邦之前哲客其欲余先庠序之敎而借梅文以為諭余固淺陋雖不足以發揚幽光敢不率行或庶幾乎如漢陽之治也乃命學官董其事鏤版既成請序於余余豈敢辭聖俞公之詩簡古純粹華而不綺清而不癯涵泳於仁義之流出入於詩書之府而其工歐陽文忠公已序於集首此不復道姑敘鏤版之由云爾紹興十年上元日檢校少傅保信軍節度使知宣州軍州事兼管内勸農營田使新安郡開國公食邑五千二百戸食實封二千一百戸汪伯彦後序
