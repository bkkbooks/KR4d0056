body:
  text: 右宋都官員外郎宣城梅堯臣聖俞宛陵集六十巻今宣城太守袁旭廷輔所重刻也何為刻之表先賢以儀後進者太守職也始宣城郡政久弛袁君至單志竭慮薙姦滌穢朞歳之間横民以戢良民以妥修舉學政爰興敎化表章先賢風勵多士於是修都官之墳率學諸生行展謁之禮而詢求其文蓋郡人莫或知者及訪都官之後始得此編遂刻以傳聖俞當仁宗朝與韓范冨歐諸公游聖俞詩名特盛於時最初王文康公曙覽之歎曰三百年無此作矣而見知歐公尤深相與尤密時蓋有儗歐梅於韓孟者非宣城山川靈秀之所鍾歟今天下學士君子皆知聖俞為宣之傑出顧宣之人有不能如此袁君之心所不容已也聖俞平生所著又有唐載廿六巻詩小傳廿巻注孫子十三篇又嘗編修唐書此亦後來宣之人所當知也因并及之正綂己未冬十一月乙巳朔光祿大夫少師兵部尚書華蓋殿大學士廬陵楊士奇題宛陵集拾遺
  hash: sha256:0c8f4176818c358d6c66c5715694918c70aea3c154d5202986cc421331a1eaa2
