body:
  text: 宛陵集卷十宋梅堯臣撰臧子文剡縣主簿以下湖州後詩剡縣無淺深歴歴能見底潛鱗莫見窺塵紱聊堪洗古木澤上隂遺祠巖下啓應識道傍碑因風奠醪醴余令之會稽新昌越舸將渡西陵時臘雪欲作隂雲垂古岸潮迴夜冰閣氷上鯉魚紅尾鬐知君奉親聊自得窮冬渉險仍熙熙縣民但可觀此意休羨江邊孝女碑傳神恱躬上人握中一寸毫寳匣百鍊金鑑貌不鑑道寫形寧寫心古人固不識今人或所欽依然見其質儼爾恨無音子誠丹青妙巧奪造化深妍媸必盡得幻妄恐交侵文曜師之南徐班班上川羽薄暮未安巢擾擾方外士歳晏遊逺郊正值風霜急晚冰隨深敲何時居巖下都把塵事抛送芝上人歸姑蘇身衣竺乾服手援犧氏琴緐聲不願奏古意一何深晏景託孤艇倦飛還舊林闔閭城下寺幾里認鐘音唐寺丞知南雄州前林尚含凍南國史君行逆水春風峭孤舟挂席輕踏歌聞舊俗信鬼有頽氓當識朱衣貴壺漿擁道迎依韻和孫秀才朱長官見寄二首同韻古來冨貴蹈危機樂性安貧莫謂非未及功名蒼鬢改欲從疎嬾五湖歸昔年司志逢時盡今日相親似子稀犀僕忽辭雲海上逺持雙璧扣吾扉謝尉西歸曽爲洛陽客喜見洛陽人每憶舊遊處相逢借問頻當時伊水上醉㺯巖花春而今絶兹樂欲語已酸辛明朝君當去又復與誰親唯應有素月相照寒溪濵陳浩赴福州幕梅殘杏將坼楊栁都未堪欲贈無所贈春風吹酒酣逺山猶帶雪野水已如藍羽檄不應有詩書自可躭示沈生稺子每多疾始與藥物親由兹沈生迹遂歴吾門頻我居無鳥鼠乃知屋室貧舉世競趨利爾非閭井人和潘叔治早春遊何山泛泛寒溪流縈紆向山去淺石長蒲茸朝煙暖巖樹捨舟當禪扉踏蘚汚野屨誰愛鮑參軍登臨多秀句張法曹歸闕海底日未上屋頭羣雀喧晨興溪館迥坐聽櫓聲煩出户望行舸羨心如野猨暮春余亦去爲見故人言送張叔展北歸江南春候早水暖野芹生北客欲歸日故人持贈行莫嫌爲物薄言采幽蘭幷休惜臨流醉髙帆去櫂輕依韻和叔治晚春梅花楚人住處將爲援越使傳時合有詩常是臘前混雪色却驚春半見瓊姿笛吹逺曲還多怨風送清香似可期我欲細㸔持在手誰能爲折向南枝僧元復院枕流軒寺外寒流駛開軒静者棲淺深看藻荇出没愛鳬鷖一悟此中趣萬縁皆可齊誰來驚節物岸木長春荑惱儂期我以踏青花間儻相遇果然南陌頭翩若驚鴻度不語彊躊躇羞人映芳樹兩心常自憐兩目空相注依依不得親薄暮還愁去記取似丹葩知開在何處相逢晚日南城歸橋邊見郎去逺逺逐郎迴羅衣汙㣲汚不惜汚羅衣要與郎相顧留連芳苑中肯謝花夭嫭傍欄思晤言羞畏情誰諭草草各還家幽懷是飛絮檣烏檣頭飛去烏夜夜啼聲碎猶不如水禽雙棲向煙外煙外少分張渚間多蘙薈休同八九子反哺人誰愛過華亭晴雲號鶴幾千隻隔水野梅三四株欲問陸機當日宅而今何處不荒蕪月暈月暈已知風燈花先作喜明日挂帆歸春湖能幾里逢謝師直昔嵗南陽道中别今向華亭水上逢把酒語君悲且喜流光冉冉去無蹤回自青龍呈謝師直共君相别三四年巖巖瘦骨還依然唯髭比舊多且黑學術久已不可肩嗟余老大無所用白髪冉冉將侵顚文章自是與時背妻餓兒啼無一錢幸得詩書銷白日豈顧富貴摩青天而今飲酒亦復少未及再酌腸如煎前夕與君歡且飲飲纔數琖我已眠雞鳴犬吠似聒耳舉頭屋室皆左旋起來整巾不稱意挂帆直走滄海邊便欲騎鯨去萬里列缺不借霹靂鞭氣沮心衰計欲睡夢想先到蘋渚前與君無復更留醉醉死誰能如謫仙青龍海上觀潮百川倒蹙水欲立不久却迴如鼻吸老魚無守隨上下閣向滄洲空怨泣推鱗伐肉走千艘骨節専車無大及幾年養此膏血軀一旦翻為漁者給無情之水誰可憑將作尋常自輕入何時更㸔㺯潮兒頭戴火盆來就溼社前欲社先知雨將歸未見花那能長作客夜夜夢還家水次髑髏不知誰氏子枯首在沙洲肉化烏鳶腹肢殘波浪頭曽聞南面樂寧有九原愁厚𦵏不爲貴漢官其登邱葉大卿挽辭三首位列名卿重年躋賜几尊臧孫宜有後定國巳髙門舊族聲華逺名藩治行存秋風簫吹咽隴隧起雲根自古賢才少滔滔豈足云善人安得見清譽久來聞器隕龍文鼎魂歸馬鬛墳豐碑幾當立籍甚著遺芬終始爲全徳生榮殁亦榮里人悲畫翣郡吏拜銘旌石馬天麟肖松枝國棟成更㸔追孝意捧土作新塋湖州寒食陪太守南園宴寒食二月三月交紅桃破纇栁染梢陰晴不定野雲密黕黕鼓聲湖岸坳使君千騎出南圃歌吹前導後鳴鐃是時輙預車馬末傾市競觀民業抛竹亭臨水美可愛嗑􅖾草木皆吐苞遊人春服靚妝出笑踏俚歌相與嘲使君白髪體尤健自晨及暮奏酒肴爾輩少年翻易倦倚席欠伸誰得教公雖不責以正禮我意未容誠斗筲逡巡秉燭各分散小人爭路何呶呶牡丹洛陽牡丹名品多自謂天下無能過及來江南花亦好絳紫淺紅如舞娥竹陰水照増顔色春服貼妥裁輕羅時結遊朋去尋玩香吹酒面生紅波粉英不忿付狂蝶白髪彊插成悲歌明年更開余已去風雨摧殘可奈何惜春三首九十日春無幾日不堪風雨競吹花舞英逐水向何處泛泛斜溪伴晚霞前日㸔花心未足狂風暴雨忽無憑此身不及深溪水隨得殘紅出武陵春色斗空花亦休緑園深鎻更誰遊殘枝遺萼不中㸔暮雨霏霏起暗愁花孃歌花孃十二能歌舞籍甚聲名居樂府荏苒其間十四年朝作行雲暮行雨格夫氣俊能動人人能動之無幾許前歳適從江國來時因讌席相微語雖有幽情未得傳暗結殷勤度寒暑去春送客出東城舟中接膝已心傾自茲稍稍有期約五月連航並釣行曲隄别浦無人處始笑鴛鴦浪得名爾後頻逢殊嬿婉各恨從來相見晚月下花前不暫離暫離巳抵銀河逺青鳥傳音日幾迴雞鳴歸去暮還來經秋度臘無纎失愛極情專易得猜前時南圃尋芳卉小忿不勝投袂起官私乘興作威稜督促倉皇去閭里蕭蕭風雨滿長溪一舸翩然逐流水忽逢小史向城來泣淚寄言心欲死願郎日日致青雲妾已長甘在泥滓更悲恩意不得終世事誰憑何若此郎聞兹語痛莫深天地無窮恨無巳我今爲爾偶成章便欲緘之託雙鯉程山人歸歙州新安固與吾鄉鄰山水清絶殊可擬我今暫來子亦歸空聽杜鵑雲樹裏重過南園誰作此園爲宴喜而今樂事已難幷佳人去後門長鎖蔓草離離上古城送滕監簿歸寧岳陽乃翁守西鄙胡騎敢馮陵撫士無餘貨吏以文結繩向聞來三堂今復走巴陵泝流幾千里雲夢苦炎蒸風檣易陣馬猶使勇氣増子今逺寄省寄謝余豈能江山可留詠燕許昔嘗曾寄題千步院兼示諲上人郊郭山林有美處皆爲釋子所棲託髙閑不與時俗侵寂静豈唯魚鳥樂朝望平田插稻苖暮看西邨収雨脚早夏陪知府學士登疊嶂樓髙陵自可眺况復更層樓峩峩衆山翠活活寒溪流新篁未埽籜縁險已脩脩曲道出林杪飛宇跨城頭春餘衆芳歇子結纍蔓抽庭空野鼠竄日暝啼禽留誰知郡府趣適有林壑幽主人易吾土惟襲是瀛洲伊我去閭井爾來三十秋昔望白雲下今從輕軒㳺得孫仲方畫美人一軸駿駒少馴良美女少賢徳嘗聞敗君駕亦以傾人國因觀壁間畫筆妙仍竒色持歸非奪好來者恐爲惑塗次寄羅道濟去年五月君到官紅蕖正開湖水寛共酌汀洲不知暮扣舷月露霑衣寒今年我罷欲歸去朋酒久來無此歡移舟不忍便爲别競挈杯肴情未闌城闉欲閉各分散溪雲暗澹生悲端明日抱酲風雨急野蓮空看寄君難和潘叔治題劉道士房畫薛稷六鶴圖啄食窮年見俛啄但有飢乏意雖存玉山禾不入丹青喙因思方朔嘲此豈優諧類顧歩舉足徒有勢行沙遂無蹤迴頸誠已久未知竟何從安能見儔侶顧望自顒顒唳天引吭向層霄聲聞期在耳鼓吻意豈疎知音何巳矣安得九皋同流響入萬里舞風如逢仙圃風飄颻奮雙翅拊節余欲助和歌誰爾類但㸔矯然姿固與迴雪異警露孤標近仙壇依約聞墜露儼如舉止揚稍見神爽悟曉月坐清軒寒添壁間素理毛六鶴皆不同初生薛公筆况兹刷羽者奮迅如天質墨客懷賞心題詩仍我率留題毗陵潘氏宅假山人心本好静世事方擾擾邱壑未去時庭中結山小長欲見蒼翠何湏聽猨鳥有志同尚平當期昬嫁了觀居寧畫草蟲古人畫虎鵠尚類狗與鶩今看畫羽蟲形意兩俱足行者勢若去飛者翻若逐拒者如舉臂鳴者如動腹躍者趯其股顧者注其目乃知造物靈未抵毫端速毗陵多畫工圖冩空盈幅寧公實神授坐使羣輩伏草根有纎意醉墨得已熟權豪不可致節行今仍獨和穎上人南徐十詠鐵甕城壍江以爲池増山以爲壁鐵甕喻其堅金城非所敵前朝經喪亂曽是輕鋒鏑覽古一徜徉空聽漁浦笛北固山山勢自北來髙城倚爲固當時偶登臨邇者遂淪誤㣲雲思作雨古樹嘗霑露今非恃險艱草木藏狐兔京口水江頭潮正平日照土山口坐見逺來舟髙帆忽前後將隨入浦風稍度遥圻栁客無南北虞信是承平久金山寺山與衆山殊寺非諸寺擬無面不當江有林皆照水南泠隔呉會北渡通揚子還看上下帆日日何常巳望海樓嘗聞觀蹄涔詎識海水大浩浩與天同滔滔衆流會平吞江作練逺瀉河如帯終日郡樓間欲取長鯨鱠季子廟信如季子賢自昔知能幾依約有荒祠寂寥無奠篚壞梁生濕菌古木憑山鬼英靈豈顧兹青史辭亹亹鶴林寺松竹暗山門颼飀給青吹傳聞宋髙祖舊宅爲兹寺地以黒龍升經因白馬至何必問興亡山川應可記夫子篆季札墓傍碑古稱尼父篆始沿春秋義十字固莫淺磨敲任牧童侵剥因野蘚嗟爾後之人萬言書不顯甘露寺山頭百畞宫庭下千年樹在昔甘露霏嘗疑神物護陰連殿閣寒聲撼雷霆怒瞻影衛公堂英魂想來去范公橋謂公天下才非專一方惠及此作輿梁力行無鉅細既異國喬爲將同傅嵓濟礱石亘長川寧須伐山桂邵伯堰下王君玉餞王仲儀赴渭州經略席上命賦未破河西冦朝廷尚有憂淮南命儒帥塞上足封侯莫擐黄金甲須存百勝謀昔嘗經黠虜今去正防秋悼亡三首結髪爲夫婦扵今十七年相㸔猶不足何况是長捐我鬢已多白此身寧久全終當與同穴未死淚漣漣每出身如夢逢人彊意多歸來仍寂寞欲語向誰何窗冷孤螢入宵長一鴈過世間無最苦精爽此銷磨從來有脩短豈敢問蒼天見盡人間婦無如美且賢譬令愚者夀何不假其年忍此連城寳沉埋向九泉淚平生眼中血日夜自涓涓瀉出愁腸苦深扵浸沸泉紅顔將洗盡白髪亦根連此恨古皆有不須愚與賢秋日舟中有感天乎余困甚失偶淚滂沱世事隨時逺秋風順水多鰥魚空戀穴獨鳥未離柯嵗月都無幾存亡可奈何兒嬌從自哭婢騃不能呵已覺愁容改休將舊鑑磨弊衣留暗垢殘藥恨沈疴斗厭驅驅役終期老薜蘿書哀天既喪我妻又復喪我子兩眼雖未枯片心將欲死雨落入地中珠沈入海底赴海可見珠掘地可見水唯人歸泉下萬古知巳矣拊膺當問誰憔悴鑑中鬼宛陵集卷十
