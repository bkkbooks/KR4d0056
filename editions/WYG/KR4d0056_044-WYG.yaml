  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_044-1a, image: WYG1099/WYG1099-0321c.png}
body:
  text: 宛陵集巻四十四宋梅堯臣撰寄維揚許待制當時永叔在揚州中秋待月後池頭約公準擬與我敵是夜二雄張利矛我時小却避其銳風愁雨阻嫦娥羞主人持出紫石屏上有朏魄桂樹婆娑而枝虬作詩誇詫疑天公愛惜光彩向此収四坐稽顙歎辯敏文字響亮如清球更後數日我北去相與送别城門樓誰知康成能飲酒一飲三百杯不休雞鳴各自便分散山光寺側停畫舟我來謁公公未起卧索大白須扶頭而今倏忽巳八載公領府事予居憂歐陽始是玉堂客批章草詔傳星流問公可憶羊叔子雖在軍中常緩帶而輕裘寄聲千里能信不紫微亭在池州江雲如旗脚墨㸃飛鴈行平圃采芳菊上水酌桂漿為言此何時杜子逢重陽醉思莊生達哂彼齊景傷至今孤亭間獨有九日章昔我來齊山山僧迎道傍騎馬到寺門亂石屹若牆值雨不徧歴但取山泉嘗牧之舊游處苔滑屐莫將却返弄水涯隔溪望青蒼絶頂見茅屋洪波日湯湯雲霞與鴈鶩還動秋客腸去逾十五年游宦韓陳梁哀哀遘禍殃乃再居南方欲往尚未可追吟寄支郎聞臨淄公薨至和癸巳十二月兮友人語我火犯房芒射鉤鈐而拂上相兮禍非弼臣誰可當昨日聞太宰悟天道而畏忌兮歸臥其第三拜章太宰既不得請而賜黄金百兩以為夀兮諫官御史猶擊強明年孟陬臨淄公薨兮果然邦國撓棟梁豈無神醫善藥以起疾兮固知稟命有短長公自十三歲而先帝兮謂肖九齡冝相唐後由石渠鳳閣禁林以登樞兮俄佩相印居廟堂出入藩輔留守兩都兮其民詠歌盈康莊官為㗋舌勲爵一品兮經筵講義尊蕭匡年踰順耳不為夭兮文字百巻存縑箱子孫侁侁同鴈行二女䝿壻冨與楊未知歸葬何土鄉臨川松柏安可忘我為故吏摧肝腸灑淚作雨春悲凉精魄其歸於天乎必為星宿還髙張骨肌其歸於土乎必為蕙芷不滅香墓碑墓銘誰能盡其美我為欲傳萬古須歐陽吳正仲遺二物詠之金琖子鍾傳令公謂之醒酒花鍾令昔醒酒豫章留此花黃金琖何小白玉盌無瑕始入吳郎宅還歸楚客家従茲不能醉只恐賣流霞疊石十片寒湖滑千秋白浪根蒼蒼古崖色疊疊老苔痕欲象巨鼇頂俯當科斗盆唯愁作險說平地起崐崙依韻和宣城張主簿見贈韓子於文章所䝿不相傚譬彼古今人同心不同貌吉従志久慕亦以重名教鳴鐘與亨鼎易厭非苦樂禄仕不及親揚名可為孝君方佐大邑美錦同翦鉸遂令吾鄉民綢直無曲橈既暇乃作詩欲與前人較朝來忽有贈捧若管窺豹又如捕鯨魚空自持網罩心降醉且睡昬昬不知覺送吳正仲婺倅歸梅谿待闕山水東陽去未去朋親苕霅朝復朝更無越相逃名舸猶看吳王送女潮海燕歸齊聲滿屋谿梅開過子生條明年十月吏迎處七里灘前櫂奏簫再送正仲擬君杜鵑花發當杜鵑時朱袍照白日光彩生路岐自比青鼠爪中心如亂絲絲亂復不理况復逺别離傾觴恨不深立馬恨不遟千山従此隔三歲或前期爾後各寄書空識滿紙辭非如笑言樂但有牽懷悲念昔蘇與李徘徊問何之鐵獺新買小馬也朝乗鐵獺上青山最滑春苔亂石間出入白雲勝蠟屐玉驄雖䝿未應閑送回上人因往湖州謁吳正仲雲出任西東飄然意莫窮山川生眼界巾舄徧區中去去曽無著勞勞本是空梅谿人可見重爾似泓公送徐綘祕校罷涇尉而歸去年茶熟君得補今來茶熟君已去心曽不計茶有無隼在髙風自騰翥昨日我送吳侯歸未忍重臨離别處不若羣公憐禰衡相逐縱横唯栁絮志來上人寄示酴醿花并壓塼茶有感京都三月酴醿開髙架交垂自為洞素葉層層紫蕊香釀歸光禄春生甕東陌西池走鈿車芳林廣囿飛朱鞚二年不到大梁城江邊淚滴肝腸痛况茲齒髪漸衰老已是憂愁不如衆宣城北寺來上人獨有一叢盤嫩蕻去歲遊吳求不得今朝還喜自持送眼厎雖同往日看樽前所憶皆成夢又置新茶采雨前鳥觜壓塼雲色弄對花却酒煮香泉彊詠才慙非白鳳聞鶯最好聲音最好聽似調歌舌更丁寧髙枝抛過低枝立金羽脩眉墨染翎杜鵑蜀帝何年魄千春化杜鵑不如歸去語亦自古來傳月樹啼方急山房客未眠還將口中血滴向野花鮮依韻和李察推留别我學猶肥腱一食輙易厭君何以名虛每來車馬淹經術素所淺道義安得漸獨有寒苦吟可與前古兼今者抱悲哀憔悴居窮閻愁鳴無好音亟别空顧瞻詩言留彼美欲和慙無鹽短兵當長戈焉得不盡殲又如握枯蒿逆風乗烈炎膏盲靡自療誰復望鍼砭送李節推挈内歸寧池陽幷李察推往南康軍嫁妹二君同行江上雙畫舸風帆或先後晚共泊蘆洲欣同幕中友一過長風沙一住䝿池口當時驄馬客今是憑熊守每憐諸女賢與壻來為夀上去至南康嫁妹事箕帚不畏楊瀾險不為廬峰秀二君情義著我送何須酒新開墳路古徑約城斜鉏荒可過車直穿深篠去不比繞邨賖伐樹侵籬脚禆塍掘澗沙欲為蘭若處松柏屬吾家送鄒秀才游浙鞍傍帶劔魚皮鞘馬後攜童越葛衫度水縁山君厎急區區為荅古千巖四月三日張十遺牡丹二朶已過穀雨十六日猶見牡丹開淺紅曽不爭先及春早能陪芍藥到薫風依韻和唐彦猷華亭十詠顧亭林顧亭林湖在東南三十五里湖南又有顧亭林傳是顧野王居鄉林空林木不見古人居猶尋古人蹟更與古人疎昔為賢豪里今作魑魅墟湖邊夜夜月光彩波上餘寒穴金山有寒穴出泉甘清山頭寒泉穴淨若鏡面平熨齒敲冰冷貯缾微玉聲傍有野鹿跡上啼林鳥青何由一往挹况復方病醒吳王獵場在華亭谷東今其地為桑陸孫氏有吳國四海未息戈獵以耀威武平野萬騎羅英雄魏與蜀貔虎一何多世事異莫究但見桑麻坡柘湖在南七十里吳越春秋海鹽淪沒為柘湖吳地記秦時有女子入湖為神今存其祠柘土久陷沒千歳嗟水濵不復吳鹽邑空有秦女神浩蕩呑海日曠闊迷天津扁舟誰能往旦暮逢漁人秦始皇馳道在崐山南四里有大闕通吳成秦帝觀滄海勞人何得脩石橋虹霓㫁馳道鹿麋遊車轍久已沒馬跡亦無留驪山寳衣盡萬古空冢邱陸瑁養魚池在縣西今名瑁湖云陸瑁所居也來觀瑁湖水乃是陸生居春塘草㡬變誰膾此中魚莫容科斗應亦有魯王餘不隨蛟龍飛神鼈未可除華亭谷在縣縈紆三百里入松江斷岸三百里縈帶松江流深非桃花源自有漁者舟閑意見水鳥日共泛觥籌何當騎鯨魚一去㡬千秋陸機宅華亭谷水東有崐山即其宅機詩云髣髴谷水陽婉孌崑山陰我思陸平原廢宅荒草深才髙乃速禍事往不可箴飢烏噪樹顛野鼠窟庭陰黃耳亦已死家書無復尋崑山華亭谷東二里有崑山陸機祖葬而生機雲人以崑山出玉以擬其美焉陸氏㡬世祖葬此生令名猶如産美璞遂爾傳嘉聲寒巖畜奇秀源水日東傾何言千載間二子不更生三女岡在東南八十里云是吳王葬女為三岡吳王葬三女因留此岡名已化被粲質合有蘭蕙生嬋娟夜月照晻藹朝霧平古魂如未泯不逺闔閭城李獻甫於南海魏侍郎得㭨子見遺魏公番禺歸逢子蕪江口贈以越王頭還同月支首割鮮為飲器津漿若美酒我獨媿先生饌致崇師友應知愈飢渴况是懷思久齊民要術云其俗為之越王頭時魚四月時魚逴浪花漁舟出沒浪為家甘肥不入罟師口一把銅錢趂槳牙烏賊魚黃馬二君餉海若有醜魚烏圖有烏賊腹膏為飯囊鬲冒貯飲墨出沒上下波厭飫吳越食爛腸夾雕蚶隨貢入中國中國捨肥羊啗此亦不惑依韻和行之枇杷予送紅梅與之五月枇杷黄似橘誰思荔枝同此時嘉名巳著上林賦却恨紅梅未有詩送紅梅行之有詩依其韻和綴綴紅梅肥似蠟濛濛飛雨灑如脂吳郎齒軟食不得翻憶張公大谷棃送王宗望罷宣城尉歸京南土梅已黃北人舟競發去意方若渴望林殊未歇言歸向梁宋獨歎滯楚越行聞拜卿屬恩下蒼龍闕寄題南陵息亭蕖閣竹裏有清館池中多蕅花日光穿岸脚水影射簷牙柱穴蜂歸響爐檀火過窊已知民訟息漉酒費巾紗讀問月我讀太白問月詩乃知白也心太癡明月在上爾在下月行豈獨君相隨白兔𢷬藥亦何療嫦娥孤棲欲嫁誰古人今人被磨滅休問有來都幾時唯有長照金樽裏此言萬世不可移但能自醉月自落夜夜如此誰復疑一月二十二三日半是風雨相乖離常願晴明對以飲耳邊流水勝鳴絲五月十日雨中飲梅天下梅雨綏綏如亂絲梅生獨抱愁四顧無與期妻孥解我意草草陳酒卮檻外百竿竹新筍髙過之竹色入我酒變作青瑠璃一飲眼目光再飲言語遲三飲頽然兀左右歎我衰有鳥従東來引頭闖深枝發聲醒我醉提壷美無疑典衣不直錢唯是布與絺安得如古人車傍挂鴟夷次韻和吳季野游山寺登望文脊山山屬宣城楚客好山水五月上髙峰峰頂望文脊草樹皆有容身既近猨鳥必欲追喬松石壁出雲背苔磴千萬重下視霹靂飛忽起枯株龍却還僧居宿暮踐樵子蹤作詩留粉牆削藳為我封美璞世未識獨令和氏逢宛陵集巻四十四
