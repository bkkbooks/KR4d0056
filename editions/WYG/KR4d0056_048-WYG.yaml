  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_048-1a, image: WYG1099/WYG1099-0347a.png}
body:
  text: 宛陵集卷四十八宋梅堯臣撰依韻和劉原甫舍人赴揚州塗次贈予翩翩河中船我船緩而西君船迅而東緩迅各所尚不意中路逢驥馬方騰雲野鶴還就籠亦言出處異同是天地中我豈不知命人空嗟其窮何當遂逸性川上作釣翁聞禽禽鳴脫破袴定無新易故此語莫相譏善貧知有素表臣都官至十三里店風雨催車騎駸駸來自南道傍有茅屋寧容使君驂不謂忽下馬濕衣逢我談田家已刈楚田婦正好蠶既將國漕急復與民事諳他年此茅屋便比棠樹甘泊徐城寄杜挺之王平甫十里五里一值淺千愁萬愁過徐城王君論與河流阻杜老談思月色清岸若屹牆空自面樹如張蓋欲誰傾二人儻及親朝夕更晩更遲何計程至第四舖二首第四舖前風雨急搭河過盡不憂灘却愁蓬溺空征槖始信人間行路難輕舟已過第四鋪憶著陽闗末尾聲怊悵杜公行厎急白醪何處得同傾倡嫗歎萬錢買爾身千錢買爾笑老笑空媚人笑死人不要過青陽驛使風天應憐逆旅乞與順風初不假卒添力任從帆自疎燕攙舟尾健鷁漱水花餘會與王都近何須問疾徐蠅乗炎出何許人意以微看怒劒休追逐疑屏漫指彈與蚊更晝夜共蜜上杯盤自有堅冰在能令畏不難蟬柳上一聲蟬沙頭千里船行經朝雨後思亂暑風前物趣時時改人情忽忽遷感新猶感舊更復幾多年鶯緑柳陰猶薄黄鸝囀已清年年舟上客處處樹頭聲髣髴佳人語依稀太子笙夕陽聴不足飛入舊荒城雞昂然大雄雞髙冠紫沉羽星占太史局樹棲丞相府知時不失晦得食曽呼伍幸無終夜鳴須防人起舞鶴何時别遼海俛啄雜庭鵾去作仙人駕來乗衞國軒雲中晴引唳松上舊能言俱說長千歳予非學羨門挑燈杖油燈方照夜此物用能行焦首終無悔横身為發明盡心常欲曉委地始知輕若比飄飄梗何邀世上名蛙陂蛙怒目生科斗亦縱横自得君王揖能為鼓吹聲越人嘗入饌秦客不須驚誰解縁明月徒誇兩股輕鳩一世為巢拙長年與鵲爭欲知雲脚雨先向屋頭鳴頸上玉花碎臆前檀粉輕何時將刻杖扶助老夫行蚊向晚化汚積羣飛來戸庭蟭螟許巢睫琥珀為留形夜色徧容蔽雷音亦感聴猶矜負山力血食也霑醒鹿羣處空山中跡在深松下周穆得同狼秦人指為馬驚頋逺世網脫質去田野誰思充腵脩自是全無者犬常隨輕騎獵不獨朱門守鷹前任指蹤雪下還狂走人思上蔡遲書寄華亭後莫將呼作龍粱肉纔經口豕司原豢俗豨日見容陰昵喜比為白麟惟憂不豐溢烈飇澤雨作真聲向人出司原悔何由肝膽空駭慄蛟橋邉三尺劒江上六鈞弧漢武帝何處周將軍已無織綃深有室泣淚自為珠誰為九淵害人猶能爾圗兔迷蹤在塵土衣褐戀蓬蒿有狡誰窮穴中書惜拔毫獵從原上脫靈向月邊逃死作功勲戒良弓合自弢魚洛水美赬鯉入河西去時三春登玉浪一日到天池垂釣豈容羨小麟應莫隨腹中無匕首巳不助吳兒龜玉府有寶龜名存骨未朽初為清江使因落豫且手白玉刻佩章黄金鑄印紐辭聘彼莊生曳塗誠自有鰕自生江海涯小大形拳曲宮簾織以鬚水母憑為目䝿將蔽其私賤用資不足於物豈無助况能參鼎肉至靈璧鎮於許供奉處得杜挺之書及詩去冬過尋歴陽守江沙半遮當利口口頭沙蹙浪如山浦漵排舟魚貫柳却畏浪髙難苦留聞解符來時不久平明挂席入揚州主人釀成百斛酒酒上玉蛆如笑花一日倒空罌與缶主人亦欲君舊友請我遲君同此首清明君果渡江至與君繼舳曽無負過淮風緊到洪澤使人助我如臂肘暮春泝汴汴流澀自假輕航去如走千憂萬阻經靈璧留書津吏情何厚副之佳句二十言文昌光芒夜侵斗平時相恤以此稀緩急求之更難有風牽月挽望符離水館野亭能駐不葛巾輕服約登歩葱􅌜冷淘誇甚滫書中不說王平甫應又先行君在後我今趂君君趂王趂入大梁須執手永城杜寺丞大年暮春白杏花孤素發殘枝非闗比衆遲殷勤勝菖葉重疊為農時午日三首有酒不病飲况無菖蒲根空懷楚風俗角黍弔沉魂佳人五色縷道士絳囊符瘦臂不中繫百邪何用驅百草堪為藥舟行不及收岸傍蕭與艾從聴到寒休晚得菖蒲薄暮得菖蒲猶勝竟日無我焉能免俗三揖向樽壺祭貓自有五白貓鼠不侵我書今朝五白死祭與飯與魚送之于中河呪爾非爾疎昔爾齧一鼠銜鳴遶庭除欲使衆鼠驚意將清我廬一從登舟來舟中同屋居糗糧雖甚薄免食漏竊餘此實爾有勤有勤勝雞豬世人重驅駕謂不如馬驢已矣莫復論為爾聊欷歔依韻和酬太師杜相公衍相國推心本至平欲揚蕭艾作蘭馨孤根易變終微賤美澤難霑漫晦冥楚客嘗聞紉若若王孫誰復顧青青東風已與生成足不敢希蓂在帝庭依韻荅僧圎覺早梅江南自寒苦花不與時同清向三冬足香傳一國中雲湖藏舊市雪樹認新豐未有虧冰素隨妝入漢宮雍邱遇雨日暮風雨急逆水舟難牽波波入杞國悄悄誰憂天闐闐陂中雷羃羃隄外煙驟然沃大熱蒸飫如炊煎飲水徒脹滿渴喉殊未蠲摇蓬已煩倦汗額常不乾如何一席地長少皆在前衣巾不敢去又以禮數纒安得化嚴石兩脛没流泉每暑起此念念之凡幾年終當逐逸志奚必事華顛廟子灣下作廟子灣下百尺船杞人楚人相雜牽水厎老唇倚以怪樹頭挂紙吹作錢江蛟海鵾千萬里軒風簸日蠻島邊長安舊去天尺五此在大梁眉啑前髙冠長劒乃不畏沙雨夜起噴腥涎留侯廟下作貌如女子心如鐵五世相韓韓已滅家童三百不足使倉海君初去相結秦皇東從博浪過力士袖椎同決烈曉入沙中風正昬誤擊副車搜跡絶亡命下邳圮上游老父墮履意未别顧謂孺子下取之心始不平終折節舒足既受笑且去行及里所還可說可教後當五日來三返其期付書閱他日則為王者師果輔髙皇號奇傑留國存祠汴水傍逄逄簫鼓賽肥羊赤松不見天地長黄石共葬邱冢荒髙車再過謝永叔内翰世人重䝿不重舊重舊今見歐陽公昨朝喜我都門入髙車臨岸進船篷俯躬拜我禮愈下騶徒竊語音微通我公聲名壓朝右何厚於此瘦老翁笑言啞啞似平昔妻子信說如梁鴻自兹連雨泥沒脛未得謁帝明光宮冒隂履濕就稅地親賔未過知巷窮復聞傳呼公又至黄金絡馬聲瓏瓏紫袍寶帶照屋室飲水啜茗當清風邀以新詩出古律霜䫇屢頷摇寒松因嗟近代䝿莫比官為司空仍侍中今成冢邱巳寂寞文字豈能留無窮以此易彼可勿媿浮榮有若送雨虹須㬰斷滅不復見唯有明月常當空况我學不為買禄直欲到死攀軻雄一飯足以飽我腹一衣足以飾我躬老雖得職不足顯願與公去歡樂同歡樂同治園田潁水東李審言相招與刁景純周仲章裴如晦馮當世沈文通謝師厚師直㑹開寶塔院自君命我飲朝暮雨傾瓦城東與城北大道泥沒馬敢忘主人勤顛撲困馭者衆客亦如期陳肴藉蘭若馮裴與沈謝辯論過終賈刁周事老成危坐言語寡酒半時謔劇揣狀類摹冩或譏項髮秃或指舌端傻或將冠帶身勸作梁武捨謂我大耳兒此實已見假又效井市態屈強體非雅順風手沙沙逆風口哆哆竟席屢絶倒去忌肝膽㵼規規豈無儕達識髙天下送周仲章都官通判湖州溪水日霅霅弁峰日峩峩中有水精宮此名其謂何湖水傳玉孃揚光遡嫦娥昔人美清夜髙樓發微歌風流百年餘所歴才彦多我嘗居其下醉舞或傞傞君行貳郡事結騎黄金珂容儀苦白晳度橋鳴槖駝士女夾道看秋風吹縠羅言是公侯家大體儂弗過問儂厎未辨撑船入芰荷應莫勸蠶織生計非杼梭依韻荅吳安勗太祝我於文字無一精少學五言希李陵當時巨公特推許便將格律追西京卞和無足定抱寶乗驥走行天下老玉已累人馬不逢皇皇何之飢欲倒還思二十居洛陽公侯接跡論文章文章自此日怪奇每出一篇爭誦之其鋒雖銳我敢犯新語能如夏侯湛于今窮困人已衰不見懸金規呂覽乃遭吾子求琢磋珠璣獲斗奈我何吳沖卿學士以王平甫言淮甸㑹予予久未至沖卿與平甫作詩見寄荅之老馬力盡道路長豈若壯驥思騰驤項窮臨流歎不逝燕骨埋沒庸可傷我今六十趨南北飢腸不足面黧黑少年心志一㸃無千里區區安所得往居閭門乏經過閉戸讀書多廢食便從冠帶向仕塗彊顔希禄非貪職昨逢王倩昧平生一見如舊心相傾談經樹下任日炙酒狂便欲騎長鯨誰意同行有遲疾先入大梁凡幾日大梁故人憐鈍衰迭為寄唱辭嚴密卒章言買羊與酒雖齒動摇能飫溢亦知紅頰教新成更願舊朋邀六七宛陵集巻四十八
