body:
  text: 宛陵集巻五十五宋梅堯臣撰次韻和池守王微之訪别君榮初出守我老未東歸病眼生花早蒼毛似葉稀往還従更少談笑暫相依不及秋鴻翼能隨向楚飛寄題資州錢固秀才道勝堂醮壇舊山下髙卧一儒生有室羅經籍無心取組纓芋肥収歲計柑熟摘霜晴暫向京都見添書入蜀城送黄國博知撫州逆水乗風上蒲帆滿挂檣日行知幾里江渺不分疆宿浦隨潮入逢人問路長臨川十萬戸勸勞執壺漿觀韓玉汝胡人貢奉圗時世重古不重新破圗誰畫舊胡人臂鷹捧盤犀利水鐵鎻獅子同麒麟翹翹雉尾插頭上深目鉅鼻青搭巾塗朱㸃綠筆畫大筋骨怒露蠻祠神茜袍白馬韓公子從何得此來秘珍定應海客逺為贈中國未覩難擬倫公子自言吳生筆吳筆精勁瘦且勻我恐非是不敢賛退歸書此任從嗔送韓文饒賛善宰河南退之曽作河南宰韓氏于今又見君縣政從來人有望家聲不墜世多文後池分洛貯藍水髙檻看嵩迷嶺雲主簿堂前七葉樹手栽應莫已刳焚送刁秘校授漣水主簿歸四明省親桂得嫦娥枝婦得黄姑女直歸東海頭翁嫗笑相語何當却之官古縣入平楚莫嫌簿書緐百事由區處依韻和永叔戲作琵琶轉撥聲繁促學作飢禽啄寒木木蠧生蟲細穴深長啄歊鏗未充腹擺絃疊響入衆耳發自深林荅空谷上絃急逼下絃清正如螗螂捕蟬聲坐中賔歡呼酒飲門外客疑將欲行主人語客客莫去彈到古樹裂丁丁内賔外客曽未聴乍聞此曲無不驚還憶昭君出塞日烏孫帳下邊馬鳴安知如今有樂事能使女奚飛玉觥女奚年小殊流俗十月單衣體生粟言事闗西楊廣文廣文空腹貪教曲曲奇譜新偷法部妙在取音時轉軸翰林先生多所知又笑畫圗收滿屋不肯那錢買珠翠任從堆插階前菊功曹時借乃許出他日求觀龜殻縮我嗟老鈍不如渠幸得交朋時借娛但樂休計有與無送吳仲庶殿院使北漢朝重結單于好歲遣名臣禮數増紫鼠皮裘從去著飛龍廏馬借來乗天寒將遇磧中雪鼻息暗添髭上冰定見南鴻起歸思家書欲寄不堪憑送呂沖之司諫使北邉人多識朝廷禮譯者交傳應對辭千里闗山隨地逺百年信誓有天知曚曚白日穿雲出漭漭黄沙作霧吹知去燕京幾千里秋笳亂動月明時送孫隠之都官通判秀州柳條枯落盡不折意徘徊泛汴趨殘水到吳看早梅無端聴鶴唳有信寄鴻來聞說閭亭改靈光化劫灰依韻和王平甫見寄兄為太守兩輪朱仲泛吳人燕尾艫且看洞庭多橘柚莫懷江國有枌榆少游山水殊非俗老愛詩書又似愚百事輸君休問我風沙不比在雲湖得王介甫常州書斜封一幅竹膜紙上有文字十七行字如瘦棘攢黑刺文如温玉爛虹光别時春風吹榆莢及此已變蒹葭霜道途與弟奉親樂後各失子懷悲傷到郡紛然因事物舊守數易承蔽藏搜姦證謬若治絮蚤蝨盡去煩㸑湯事成條舉作書尺不肯勞人魚腹將魚沈魚浮任所適偶爾及我為非常勤勤問我詩小傳國風纔畢葛屨章昔時許我到聖處且避俗子多形相未即寄去慎勿怪他時不惜傾箱囊知君亦欲此從事君智自可施廟堂何故區區守黄巻蠧魚尚恥親芸香我今正值鴈南翔報書與君倒肺腸直須趂此筋力強炊粳烹鱸加桂薑洞庭緑橘包甘漿舊楚黄橙綿作瓤東山故游攜舞孃不飲學舉黄金觴谿如罨畫水泱泱刺船靜入白鷺傍菱葉已枯鏡面凉月色飛上白石牀坐看魚躍散星芒左右寂寂夜何長烏棲古曲傳吳王千年萬年歌未央莫作腐儒鍼膏肓莫作健吏繩餓狼儻如龔遂勸農桑儻如黄霸致鳳皇來不來亦莫愛嘉祥司馬君實遺甘草杖美草將為杖孤生馬嶺危難從荷篠叟寧入化龍岐去與秦人采來扶楚客衰藥中稱國老我嬾豈能醫逢雷太簡殿丞長安初見君君頷微有鬚後於河内逢秀俊美䫇胡又㑹在桐鄉談詩多孟盧學書得天然鍾王不能奴荏䒣三十載邂逅遇京都朝接北扉飯暮應西垣呼坐中如夢寐相語故人無昔由處士召胸懷開廟謨今看髭已白議論恥非夫拜章陳時事皆與相意符其識固不淺其用當亦殊人多惜老大我復歎羇孤終朝重相笑為君傾酒壺雷太簡遺蜀鞭蜀道山之峭壁兮如快刀一削平無痕其間春雷驚龍走竹根迸石垂虺尾骨節瘦密風霜吞野夫采之縋懸蔓分寸脫死持還奔他人不可得此物乃重太守公侯孫獻來一錢不肯要只乞斗酒抱歸村太守立性豈諂䝿將贈故人唯義存我騎瘦馬固莫稱破韉爛轡沙塵昏明日試執趨君門孰不怪視竊笑言得雷太簡自製䝉頂茶陸羽舊茶經一意重䝉頂比來唯建溪團片敵湯餅頋渚及陽羨又復下越茗近來江國人鷹爪夸雙井凡今天下品非此不覽省蜀荈久無味聲名謾馳騁因雷與改造帶露摘牙穎自煮至揉焙入碾只俄頃湯嫩乳花浮香新舌甘永初分翰林公豈數博士冷醉來不知惜悔許已向醒重思朋友義果決在勇猛倏然乃以贈蠟囊収細梗吁嗟茗與鞭二物誠不幸我貧事事無得之似贅癭送呂寺丞希彥邠州僉判自有仲宣樂從軍仍近親闗河歴周鄭風雪過咸秦原上方驅馬鞍傍忽起鶉世家傳釣玉重問渭川濵送施司封福建提刑命使得才臣欽刑聖主仁銅苗休問發田種去教親白茗出溪上紅蕉連海濵輕車莫道逺詔意重生民江鄰幾暫來相見去後戲寄低頭拜我蒼䫇翁來如飛鳥去如風一夕共飲斗柄北平明已向函闗東衆中舊騎跛鼈馬塞下新買連錢驄疾驅似逐鄧林日不肯暫住行何窮送徐無黨歸婺州吳蠶吐柔絲越女織美紈機杼固已勤刀尺誠獨難裁縫失分寸長短為損殘嘗聞仲山甫能補帝衮完衮完民衣足天下無苦寒徐從信都學染翦宜弃冠彼實山甫徒爾亦非綷剜東歸道自勝人誰故時看依韻和永叔内翰酬寄揚州劉原甫舍人東望淮海間恨無鴻鵠羽鴻鵠日已飛風雪歳將暮憶聴談老莊達生無恐懼我今齒髮疎何異樹有蠧辭别不必道俛仰已成故書問雖惟為夢寐則往屢乗桴思仲尼好勇慙季路願希隆中卧不是邀三頋二公廊廟才酬寄封尺素皋夔久相稱舜禹時已遇舉杯向明月此意聊可寓和韓欽聖學士襄陽聞喜亭亭欄下望漢江水淨緑無風寫鏡明日脚穿雲射洲影槎頭擺子出潭聲檣帆落處逺鄉思砧杵動時歸客情使者徘徊有佳興髙吟不減謝宣城許仲塗屯田以新詩見訪許氏世工詩渾棠格力微獨能兼古律無不是珠璣捧巻光蓬室停車照竹扉陽春復髙調自昔和人稀荅祖擇之惠黄雀鮓李白勸爾莫逐炎洲翠亦莫近吳宮燕爾不聴我言禍患今乃見吳火時雖無越羅日生變空知稻粱肥豈悟杯盤薦我不聞爾聲謬成先生饌咀嚼勿言非雉鴈猶充饍覽顯忠上人詩昔讀逺公傳頗聞髙行僧廬山將欲雪瀑布結成冰尋跡數百載歴危千萬層師來笑賈島只解詠嘉陵依韻和吳長文舍人對雪懷永叔内翰紫禁低雲拂綺櫳西垣人憶玉堂翁撚髭覓句方傳詠著樹成花尚舞空不管因風吹塞外任教飛片落杯中曉來城郭遮無路阮籍驅車莫歎窮送王巖夫秘校通判滑州昔聞信都侯嘗作畫舫齋空戸兩向闢尊席長對排左顧樹若岸右盼堵成崖既無風波虞但與物景諧一從信都去來者趣意乖屋室改庫廏花木為薪柴君當訪其蹟更葺安舊碑記石儻尚在塵土加洗楷然後釀井泉吟醉前人偕寄言靈河守髙此别乗懷和宋次道荅弟中道寄懷陸家兄弟苦西東黄耳傳書近已通共歎流年同轉轂各驚華髮似飛蓬河冰夜合知霜勁塞霧朝開見日紅臘盡春來又相逺江南江北望歸鴻元日閤門拜表遇雪呈永叔六花隨表拜東廂庭下遥呼萬歳長王㑹圗中陳璧馬漢官儀裏濕旂常因風亂絮霑螭首似鵠輕毛落井牀素髮垂冠少顔色衆人休笑老為郎王樂道太丞立春早朝近臣頭上黄金勝殿前拜賜東風應蓼芽疏甲簇春盤肉抺長絲何亘亘寛衣武卒轝至庭人歸下箸殊難稱我家無火甑生塵㡜柳綵花空著興空著興將厎為但願得米資晨炊不管飛霙與麥宜千官隊中身最卑五日一謁前旒垂上元夕有懷韓子華閣老一歳老一歲新年思舊年東樓嘗共望九陌聴爭先白髮更中笑舞姝應轉妍追隨都已倦強對月明前錢君倚學士日本刀日本大刀色青熒魚皮帖欛沙㸃星東胡腰鞘過滄海舶帆落越棲灣汀賣珠入市盡明月解絛換酒琉璃缾當壚重貨不重寶滿貫穿銅去求好㑹稽上吏新得名始將傳玩恨不早歸來天禄示朋游光芒曽射扶桑島坐中燭明魑魅遯呂䖍不見王祥老古者文事必武備今人裦衣何足道干將太阿世上無拂拭共觀休懊惱依韻和杭州梅龍圗入懷見寄東都車馬苦飛霾南國桅帆喜過淮船背插旗風自展沙頭迎浪雪相排白魚已薦糟増味紅稻新炊粟猒懷定似謝公迎逺岫錢塘應合有髙齋送周直孺秘校和州都曹箭頭破賊棄不為筆端射䇿取桂枝殿前脫袍改舊色庭下折腰甘去時歴陽郡小太守好督郵官閑衆吏嬉江邊竹園啼竹雞竹裏種花春過遲東望望夫雲脚垂煙雨隔岸風檣攲濕鴈不起沙上嘶君思歴亂如盎絲宛陵集巻五十五
