body:
  text: 宛陵集巻五十一宋梅堯臣撰還吳長文舍人詩巻松液花茯苓又因為琥珀遇物必得形毛髮曽不隔君子亦豹變其文蔚可覿今者逢吳侯滿腹貯經籍噴吐五色霓自堪垂典册詩教始二南皆著賢聖跡後世竟翦裁破碎隨刀尺我輩彊追仿畫龍成􅔼蜴有唐文最盛韓伏甫與白甫白無不包甄陶咸所索侯初守二郡山水多助益升髙觴嘉賔賦筆速鷹翮葺書成大軸許我觀琮璧真物固易辨恨無百金易借従懷袖歸誦玩廢朝夕譬如遊國都惝怳失阡陌苦吟三十年所獲唯巾幗豈比夸受降甲齊熊耳積重見元和風珠玉敵海舶自慙寒餓為何張空避席和正月六日沈文通學士遺温柑禹書貢厥包未知黄柑美競傳洞庭熟又莫永嘉比適觀隠矦詩獲此殊可喜誦句擘露囊香甘冷熨齒明朝鏁禮闈何暇醉鄰里史供奉羣鶴出珥銀貂侍太清廻看雙鶴舞中庭翩翩曽是仙人驥兩兩尚儀君子形靜夜欲還緱嶺月終朝思啑太湖萍莫將樹上雞相並㑹待歸飛向杳冥雪竇達觀禪師見寄依韻荅巖竇常留雪山雪不有心襌衣百衲重香刹四明深馴鹿來銜果栽松去作林自縁冠紱累未解逺公尋和孫端叟寺丞農具十三首田廬結廬野田中其髙足以覘坐臥劣自容巢棲未甞斂但能風雨蔽何惜茅蓬苫終當收穫畢寂寞懸山店颺扇田扇非團扇每來場圃見因風吹穅􅀈編竹破筠箭任從髙下手不為暄寒變去麤而得精持之莫肯倦樓種農人力已勤要在布嘉種手持髙斗柄觜㵼三犂壠月下叱黄犢原邊過廢冢安知俠少年玉食金羈擁樵斧適從伐枯桑莫悟刀已缺蠶工向欲迫田事不可徹丁丁背谷聲役役持柯熱積薪髙於山焉用先後别耒耜古聖通物宜揉斲資粒食稼穡盡民勤􅛮耕窮地力推化本神農維時思后稷我老欲歸田兹器已先識錢鎛詩稱庤錢鎛南􅅿興農作寧唯務芟雉豈不在刈穫收功尚嘉穀託用隨芒屩太平兹所重坐見銷鋒鍔耰鉏蕪穢或不治良苗安得長薅來露未晞荷去月初上侵煙濕鵝頸近茇翻蟻壤生具自有餘何醉汗霑顙襏襫上襏與下襫青蓑苦能織曉披春雨來晚曬陽披側蔽身常自足衝濕曽為得任從野風吹已敵寒蓬色臺笠力田冒風雨緝籜為臺笠寒簑相與用陰野低迷入足屨固易濡鬢葆何嘗濕斯須未可去赫日實乃急水車既如車輪轉又若川虹飲能移霖雨功自致禾苗稔上傾成下流損少以益甚漢陰抱甕人此理未可諗田漏瓦罌貯谿流滴作耘田漏不為陰晴惑用識早暮候辛勤無侵星簡易在白晝同功以為準一決不可又耘鼔挂鼔大樹枝將以一耘耔逄逄速逺近汩汩來田里功既由此興餉亦從此始固殊調猨㺅欲取兒童喜牧笛牧人樂下牧背騎吹短笛聲穿吳雲低韻入楚梅的誰嗟苦調急自與幽意寂應同堯時民歌將土壤擊和孫端叟蠶具十五首繭館漢儀后親蠶採桑來繭館雲母飾車上鉤籠載車畔援條露已乾受葉日將晏為言天下婦兹事不可慢織室常聞漢皇后織室數來觀宮女豈不勤帝衮得以完亦將成纁黃非用競龍鸞意在奉宗廟後人其可安桑原原上種良桑桑下種茂麥雉雊麥秀時蠶眠葉休摘空條漏日多餘椹更誰惜㑹待黃落來酒壚燒斗石髙几桑柔不倚梯摘桑賴髙几每於得葉易曽靡憂校披躋陞類拾級下上異縁蟻閑置草屋傍鳴雞或棲止科斧科桑持野斧乳濕新磨刄繁枿一去除肥條更豐潤魯葉大如掌吳蠶食若駿始時人謂戕利倍今乃信桑鉤長鉤扳桑枝枝間挂桑籠南陌露氣寒東方日光動少婦首且笄幼女角已􅟰競以採葉歸曽非事梳櫳桑筥采采向桑郊盈盈自持筥挂鉤帶月往稺葉和煙貯一心恐蠶飢搔首促儔侶到家傾嫩緑刀几為㕮咀蠶女自従蠶蟻生日日憂蠶冷草室常自温雲髻未暇整但采原上桑不顧門前杏辛苦得絲多輸官官莫省蠶簇冰蠶三眠休作繭當具簇漢北取蓬蒿江南藉茅竹蒿疎無鬱浥竹淨亦森束競畏風雨寒露置未如屋蠶槌三月將埽蠶蠶妾具其器邱植先㧹音摘括辟室亦塗塈衆材疎以成多薄所得寄終老歸簇時應無慙弃置蠶薄河上緯蕭人女歸又織葦相與為蠶曲還殊作筠篚入用此何多往售獲能幾願豐天下衣不歎貧服卉繰盎朝漬一盎繭繰就幾絢絲絲成繭已盡盎亦誰復持道上有墮甑車傍有鴟夷二物且莫笑顧藉各因時紡車蠶月必紡績絲車方挑擲燈下絡緯鳴林端河漢白纖縷自有緒虚輪運無跡腕手已為勞誰經用刀尺龍梭給給機上梭往返如度日一經復一絲成寸遂成匹虚腹銳兩端素手投未出陶家挂壁間雷雨龍飛出織婦織婦手不停心與日月速常憂里胥來不待雞黍熟但言督縣官立要斷機軸誰知公侯家賜帛堆滿屋上元從主人登尚書省東樓閶闔前臨萬歳山燭龍銜火夜珠還髙樓迥出星辰裏曲蓋遥瞻紫翠間轣轆車聲碾明月參差蓮燄競紅顔誰教言語如鸚鵡便著金籠密鏁闗自和沉水香焚金博山杜陵誰復與車還馬尋綺陌知何曲人在珠簾第幾間法部樂聲長滿耳上樽醇味易酡顔更貧更賤皆能樂十二重門不上闗又和康莊咫尺有千山欲問紫姑應已還人似嫦娥來陌上燈如明月在雲間車頭小女雙垂髻簾裏新妝一破顔却下玉梯雞已唱謾言齊客解偷闗和公儀龍圗戲勉五公雄筆厠其間媿似邱陵擬泰山豈意來嘲飯顆句忙中唯此是偷閑再和公儀龍圖千重海浪漁人醉百戰沙場野叟閑豈向鬧中還得靜乃知朝市即青山放鶉獸烹羊豬鳥烹鴨雞唯鶉不殺置奴而攜公坐堂上見而悲悽急令開笯還故棲其間無力飛不齊公只知魚之洋洋鵝之鶂鶂噫兮噫兮莫登樓莫登樓脚力雖健勞雙眸下見紛紛馬與牛馬矜鞍轡牛服輈露臺歌吹聲不休腰鼔百面紅臂韝先打六么後梁州棚簾夾道多夭柔鮮衣壯僕獰髭虬寶撾呵叱倚王侯夸妍鬭豔目已偷天寒酒醺誰爾侜倚檻心往形獨留有此光景無能遊粉署深沉空翠幬青綾被冷風颼颼懷抱既如此何須望樓頭莫飲酒莫飲酒酒豈讎顔囬不飲不白頭千鍾稱帝堯百觚號聖丘定國數石無滯留康成三百杯未休阮籍作詩語更遒聖賢在前誰與謀㗋乾舌強須潤柔照見文字勝膏油依韻和永叔勸飲酒莫吟詩雜言我生無所嗜唯嗜酒與詩一日舍此心腸悲名存䝿大不輒思甑空釡冷不俛睂妻孥凍飢數恚之但自吟醉與世違此外萬事皆莫知王公謁請衆去早既衰愈嬾身到遲日髙倦僕顔色沮况騎瘦馬兩耳垂猒此勞苦不喜出唯有文字時能為諸公尚恐竭智慮勤勤勸飲莫我卑再拜受公言竊意公矯時只愛詩謂余癡和永叔内翰來時擘繭正探官走馬傳宣夾路看便鏁青春辭上閤徒知白日近長安思歸有夢同誰說強意題詩只自寛猶喜共量天下士亦勝東野亦勝韓和公儀龍圖憶小鶴聞憶華亭雙鶴雛蒼毛未變頂微朱閑情且與稻粱飽寄語休將雞騖驅丁令再歸移歳月王襃端為約僮奴主人必欲看雙舞太液池寛肯放無和永叔内翰思白兔荅憶鶴雜言醉翁在東堂為他栽桂樹待將枝條與人折憶著家中玉色兔夜看明月海上来光彩離離入庭户且問嫦娥一借觀翁家雖有來無路嫦娥對面幾萬里不聲漸漸西南去是時翁生懷抱惡却恨陸機先憶鶴致令亦念眼迷離不似傍池能飲啄始憂兔飢僮失哺又恐白毛塵土汚仍不如鶴有淺泉自在引吭時刷羽花前舉翅鼓春風只待翁歸向朝暮我聞二公趣向殊一養月中物一養華亭雛一畏奔海窟一畏巢松株我雖老矣無物惑欲去東家看舞姝和永叔内翰戲荅從他舞姝笑我老笑終是喜不是惡固勝兔子固勝鶴四蹄撲握長啄啄任看色與月光濕只欲走飛情意薄拘之以籠縻以索必不似纖腰夸婥約主人既賢豪能使賔客樂便歸膏面染髭鬚從今晏㑹應頻數二月五日雪二月狂風雪寒威曉更加省闈輕妒粉苑樹暗添花有夢皆蝴蝶逢袍只紵麻凍吟誰料我相與賭流霞聞永叔謂子華曰明日聖俞若無詩脩輸一杯酒和公儀龍圗小桃花三分春色一分休始見桃花著樹頭霰雪斗來如約勒為公留作上林遊感李花二月九日重門雖鏁春風入先折桃花後李花赤白鬭妍思舊曲舊聲傳在五王家五王不見留華萼華萼壞來碑缺落當時李白欲騎鯨醉向江南曽不錯琴髙魚和公儀大魚人騎上天去留得小鱗來按觴吾物吾郷不須念大官常膳有肥羊甞茶和公儀都藍攜具向都堂碾破雲團北焙香湯嫩水輕花不散口甘神爽味偏長莫夸李白仙人掌且作盧仝走筆章亦欲清風生兩腋從教吹去月輪傍宛陵集卷五十一
