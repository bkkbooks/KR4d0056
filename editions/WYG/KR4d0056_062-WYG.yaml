body:
  text: 宛陵集拾遺宋梅堯臣撰得餘干李尉録示唐人干越亭詩因以寄題餘水之干越之鄙築基相對琵琶尾琵琶日日有秋聲鴈過洞庭風入葦南斗戛湖波不起長刀剡峰碧耳耳姱娥夜出在寒谿青銅瑩磨光幾里朝因吳客幅蒲輕滿紙如蠶書可喜送君石祕校尉河内古縣太行下老槐三四株以言新作吏不似舊為儒黄綬心猶壯青雲志豈無漢朝吾逺祖不道此官麤雙羊山㑹慶堂記余以附城之地勢勝神靈所栖故建閣曰寶章以嚴帝書為堂曰㑹慶以安吾先君先叔畫像有僧澄展願歳時奉香火澄展先叔於其有恩雖然抑之不肯背本堂之前許其置佛俾報恩奉佛兩得焉况吾之親域在其右欲因以固護初余一發意吾鄉孝子義士咸助以資噫愛人之愛親者知其有親也不愛人之愛親者知其不有親也不有其親則孟子所謂慕少艾慕妻子慕君者歟余老矣慕親而不可得見見墳㫄之草樹不敢慢常若吾親髣髴在其下唯恐令傷一草樹切切焉不忍去欲常居此則業為王官欲致為臣又無以自給僧能專事藉以守之守之必精潔其宇無令棄俗趣而樂處之余之存心者此耳堂之經畫始終由吾里人張景崇景崇力為之者愛吾有其心以吾貧不能自為也衆人亦由景崇然後從而愛之愛他人之愛親者於其親可知矣吾不得不書以示後人知吾鄉之多禮義又書其姓于石陰至和二年八月初吉宛陵梅堯臣記
  hash: sha256:05c678057447f5d9740249af29cf095f61915cbc42cf20ab01920b767fd86b38
