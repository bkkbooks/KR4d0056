body:
  text: 宛陵集卷十一宋梅堯臣撰謁雙廟以下湖州後詩八月過宋都泊舟雙廟側永懷此忠良遺烈傳碑刻五位儼朝裾千年同血食當時多苟生貴爵曽誰識縱今有邱墳都巳荒荆棘古人非輕死扵義實罕得英骨化埃塵令名同鳥翼飛翔出後世景慕無終極豈若目前榮未没聲已息西登孝王城王氣由邦國送弟禹臣赴官江南昔與子同歸夜向𤓰洲泊持杯月正清遄水平如削爾來蘆岸深須防虎潛搏行行無朋友遇事自斟酌和永叔晉祠詩幷州古來稱近胡山雄氣壯民足儲山根晉水發源處平如皎鑑潛決疏漸流漸急不可測以至㶁㶁鳴清渠豈惟俯可見毛髮况乃了了看龜魚下溉平田幾百頃稻苖䆉稏曽不枯興亡莫問隨水逺廟深草樹空扶疎伊君持節過其下愛此佳趣聊停車北望故城無舊物泱漭野色連邱墟已向風前聽好鳥只畏落日聞蒼狐晉人須識漢使美冉冉青䫇似緑蒲得李殿丞端州硯鮫龍所窟處其石美且堅蠻匠斲爲硯漢官求費錢持歸向都邑爭乞如瓦塼豈識萬里險謬竊好事傳書謝師厚至爾來哭爾姑清淚滴塵几一聞在目言不謂今則死而猶意逺行所念當至止秋風忽助號萬木欲摧毁詠蘇子美庭中千葉菊樹子生與衆草生不與衆草榮彼皆春爭葩兹獨秋吐英千葉共一萼百蔕共一莖幽亭聳扶疎獨本非㨋撐吾友蘇子美有酒對自傾香隨青陵蝶色映黃金鶯昨日偶來過頗興陶令情豈敢復言詩君家有子卿新冬傷逝呈李殿丞惡老今逼衰孤寂仍足悲寒風一夜起曩事無不思手澤在故物黙歴非故時夢寐猶平常反悟恨莫追人生苦情累安得木石爲頼有同舎郎相語彊解頤送趙升卿之韶幕舟車歴盡險風物乃還君俎肉應多味虞韶不復聞林鳴異音鳥山冒欲晴雲若弔張丞相空祠舊近墳蘇子美竹軒和王勝之庭無十步廣有竹纔百个子時哦其間賔交或來和琴壺置于旁圖籍亦在左誰憐脩脩影只畏寒日過誰憐青青枝下有暗葉墮我期霰雪時來聽幽聲臥應當爲設榻勿使賞心剉持以報主人此闕不可破偶書寄蘇子美君詩壯且竒君筆工復妙二者世共寳一得亦難料我今或盈軸體逸思益峭有如秋空鷹氣壓城雀鷂又如飲巨鍾一舉不能釂既釂心已醉顚倒視兩曜吾交有永叔勁正語多要嘗評吾二人放撿不同調其扵文字間苦硬與惡少雖然趣尚殊握手幸相笑寄題洪州李氏涵虚閣耳熟滕閣美未爲豫章遊近聞東湖上可見西山頭朝愛雲氣生暮數島行幽主人趣向逺登覽日不休父兄已三人挂冠此遲留他年儻一徃風物詠可周送蕭祕校比從江南來又從江南去孤舟隨鴈羣晚泊定何處霜橙可爲齏冰鱠思下箸此興吾不知薄言聊所慕送李殿丞通判處州拜官將近親不畏千里險泝流上贑水石亂波驚颭舟人素已諳曲折就迴閃豈虞失便利倚慣憂亦掩昔余從平流悸夢尚成魘今逢子方去青䋏絲新染沙頭有候吏惴立板方歛鴻鴈正來翔競看朱服儼古劒篇送蔡君謨自諫省出守福唐生銅夜夜鳴剉鐵未嘗缺主人久提􅂝何事贈離别借問豈酬恩請看鐔上血休慙補履功出處異施設雜興主人有十客共食一鼎珍一客不得食覆鼎傷衆賔雖云九客沮未足一客嗔古有弑君者羊羮爲不均莫以天下士而比首陽人送逐客王勝之不及遂至屠兒原犯霜出國門送客客已去猶意行未逺策馬過寒戍川長不見人沙没前岡路始聞雲木深忽逢朱亥墓金鎚一報恩義烈垂行素何須文學爲寄語長沙傅送周仲章太傅之鉅野仲月霜氣嚴朝來厚如雪鴻鴈各南飛羽毛將恐折征塗履以足侵骨寒扵鐵得罪此爲輕君恩大懽恱鄴中行武帝初起銅雀臺丕又建閣延七子日日臺上羣烏飢峩峩七子宴且喜是時閣嚴人不通雖有層梯誰可履公幹才俊或欺事平視美人曽不起五官褊急猶且容意使忿怒如有鬼自兹不得爲故人輸作左校濵扵死其餘數子安可存紛然射去如流矢鳥鳥聲樂臺轉髙各自畢逋誇疐尾而今撫卷迹已陳唯有漳河舊流水親郊前三日大慶殿雪中皇帝率群臣發章聖五后冊將郊先奉冊拜立未央廷天表君心孝人驚曉雪零冕旈紛㸃綴劒佩溼晶熒曲蓋曽無用羣臣敢自寧鑪煙静齋幄井氣凍宮缾明日來壇下中宵已見星忠上人攜王生古硯誇余云是定州漢祖廟上瓦爲之因作詩以荅硯取漢廟瓦誰恤漢廟隳重古一如此吾今對之悲既寳若圭璧未知爲用時讀後漢書列傳漢家誅黨人誰與李杜死死者有范滂其母爲之喜喜死名愈彰生榮同犬豕異同吾聞聖賢心不限親與疎義殊目前乖道同異代俱堯舜及周孔千載趨一塗盜跖誚孔氏弟子將黨歟蹠自驅其衆日念殺不辜河濵捧土人海畔逐臭夫塞川豈量力同趣即爾徒爾既不自過反以此爲紆蔡仲謀遺鯽魚十六尾余憶在襄城時獲此魚留以遟歐陽永叔昔嘗得圓鯽留待故人食今君逺贈之故人大河北欲膾無庖人欲寄無鳥翼放之巳不活烹煮費薪棘雜擬忽聞敵騎渡河水月魄夜脅陰貂寒獨侍金輿立城角龍蛇不展繞旗竿荅中上人卷吹笛皆學龍吹笙皆學鳳又扵笙笛間髙下不相中得其精者稀得其麤者衆况扵眞出音千載不復夢爲爾學笙歟頗已臻妙弄送蘇子美勇爲江海行風波曽不懼但欲尋名山扁舟無定處南有鵬若鴞臉有石若鋸毒草見人摇短狐逢影怒不遐尚苦乖更逺饒瘴霧東土乃濵海蜃鼉仍可怖殻物怪𤨏屑蠃蜆固無數鹹腥損齒牙日月復易飫二方既若此往矣無久駐竟當西北來醉酎炙肥羜夏不厭漿酪冬不厭雉兔勿言專口腹口腹人所務天台信竒偉石橋非坦步廬岳趣最幽飢腸看瀑布此致雖爲髙實亦難久慕君行聽我言不聽到應悟晚歸聞李殿丞訪别言巳屢來不遇蕭條一陋巷頻日見馬蹄歸來稺子告有客云將暌始知君其南復歎我向西豈不懷念慕吾親書新齎曰吾五男子愛惜無不齊所要立門户安用同犬雞齪齪守此客馴馴戀此棲二季留左右足以共挈攜身許逺就禄幸又奉阿㜷今年還都下路喪子與妻囊罄厭外役進退類籓羝終當改江邑儻得致音題刁景純將之海陵與二三子送扵都門外遂宿舟中明日留饌膾人言汴水駛奈何巳冬乾蔡雖平且慢臘月行亦難唯聽夜冰合爲君愁苦寒暫維青絲䋏邀膾白玉盤行人反飫我扵理殊未安所忻能自養不復道加餐寄洪州致仕李國博湖上悠然度幾春勇抛榮禄遂天眞青蒲翠竹圍華屋白酒黃雞命里人果下有時乘小駟兒曹方見擁朱輪田園嵗入千鍾美肯似疎家苦畏貧同謝師厚宿胥氏書齋聞䑕甚患之燈青人已眠飢鼠稍出穴掀翻盤盂響驚聒夢寐輟唯愁几硯撲又恐架書齧癡兒効貓鳴此計誠已拙聞子美次道師厚登天清寺塔二三君少壯走上浮圖巔何爲苦思我平步猶不前苟得從而登兩股應已攣復想下時險喘汗頭目旋不如且安坐休用窺雲煙謝師厚歸南陽效阮步兵一日復一朝一暮復一旦與子相經過少會不言散我心終未極歳月忽云晏嘶馬思長道孤鳥逐前伴駕言慕儔侶懷抱若冰炭南臨白水湄風雪振髙岸意恐慈母念疾馳節已換解劒登北堂幼婦笑粲粲弊裘一以縫征塵一以澣而我客大梁衣垢自悲歎師厚明日歸南陽夜坐有懷明朝子當去我若雲失龍龍歸雲未歸索莫將安從半夜出户望參畢已正中倏然變陰黒烈烈鳴窗風窗鳴不得寐擁被一悲翁永叔贈酒大門多竒醖一斗市錢千貧食尚不足欲飲將何縁豈能以口腹屈節事豪權閉户飽扵齏作詩涌如泉一日復一夕醒目常不眠窮臘忽可怪雙壺故人傳呼兒欲自酌瓦盞無完全其能饔甘脆而况侑夭妍却令情懷惡分與冨貴偏収拾不復嘗排置屋角邊儻宜嘉客至傾倒相與顚何暇問濃薄但覺窗扉旋誰識我爲我賔主各頽然始得語且橫既醉論益堅曽不究世務閑氣爭古先畢竟兩未决辨吻空流涎嗟我儒者飲聒耳無管絃雖云暫歡適終久還愁煎自甘不偶死寧慕金印懸願頻致此物勿恤瘡檐肩得山雨急雨射蒼壁濺林跳萬珠山根水壅壑漫竅若注壺范殿丞通判秦州天水出名馬多稱黄金羈正值羌已和邊草復離離乘肥固未失所藴不得施主人本燕客寧獨事書詩志尚功名間管樂猶一時去去勿復道磊落爲男兒陳繹越州從事母夫人老母兄黜夫人從爾之會稽恐傷爾心不敢泣春岡細雨聞竹雞時亦藏淚未出臉奈何相與頭傾低誠知就禄非獲已應欲退耕無舊畦辛著作知西京永寧躍馬西畿令家塋在洛陽衣霑寒食雨花發故宫牆冷澹鳩鳴屋寛閑水滿塘送君悲漸老空憶釣伊魴依韻和師厚别後寄吾與爾别未及旬吾家依舊甑生塵閉門不出將誰親自持介獨輕貨珍盤餐豈有鹹酸辛苦吟輟寢昬繼晨夜光忽怪來何頻採拾若在滄浪垠和者彌寡唯陽春普浄院佛閣上孤鶻我新税居見寺閣金碧照我破屋前日㸔閣上聚鳩鴿巢棲飲哺忘窮年雕檐畫壁屎汚徧以及像塑頭與肩寺僧不敢施彈射忽有蒼鶻張毒拳鴉鳴鵲噪鸜鵒叫怒鶻來此窺腥羶鶻心決烈不足畏瞥碎一腦驚後先死鳥墮空未及地返翅下取如風旋獨當屋脊恣撦磔啄肉披肝腸弃捐老鴟無藝又很怯盤飛欲近飢目穿逡巡鶻飽自飛去争殘不辨烏與鳶群兒指㸃路人笑我方吟憶秋江邊蜂春風無主撩亂時分羣養子各守脾争掇花腴爲臘蜜年年共割不我稽俄逢主人若過慮畏爾有蠆成噬臍宻將惡物毒爾族爾曽不得同醯雞王雖爾名爾何補造甘爲利乃自取並遊並出慙羸駕康衢嬾著鞭蹇驢能勝馬擘道去如煙何用嗟遲疾從來有後先所期皆一至我到爾應還寄宣州可眞上人昭亭山色無纎塵昭亭潭水見游鱗長松碧篠入古寺石上髙僧度幾春元夕同次道中道平叔如晦賦詩得閒字金輿在閶闔簫吹滿人寰九陌行如晝千門夜不關星通河漢上珠亂里閭間誰與聮輕騎宵長月正閒正月十五夜出逰不出只愁感出遊將自寛貴賤依儔匹心復殊不歡漸老情易厭欲之意先䦨却還見兒女不語鼻辛酸去年與母出學母施朱丹今母歸下泉垢面衣少完念爾各尚幼藏淚不忍看推燈向壁臥肺腑百憂攅同次道遊相國寺買得翠玉罌一枚古寺老柏下叟貨翠玉罌獸足面以立𤓰腹肩而平虚能一勺容色與藍水幷我獨何爲者忽見目以驚家無半鍾畜不吝百金輕都人莫識寳白日雙眼盲送惠懃上人遽告我行何所之東南爾土爾自知山水佛事不暇說去何速兮來何爲公卿貴人見爾喜爲爾買屋匃爾資王城幸可樂歳月野鶴終是思陂池去去雲霞不容侣却應來此如前時聞賣韭黄蓼甲百物凍未活初逢賣菜人乃知糞土暖能發萌芽春柔美已先薦陽和非不均芹根守天性憔悴澗之濵董著作嘗爲叅謀歸話西事子說頗驍勇築城収漢疆提兵無百騎偷路執生羌大將罪專輒舉軍皆感傷歸來出萬死羸馬亦摧藏戲寄師厚生女生男衆所喜生女衆所醜生男走四鄰生女各張口男大守詩書女大逐雞狗何時某氏郎堂上拜媪叟薛中舎宰聞喜秦人宦于秦百事順耳目山川我已疎風物子所熟維美行邁時親賔祖車轂空將離别心欲出無童僕聮句附古木含清吹池上增晚凉余懷本逹曠謝少卿聮此傲羲皇孤鷗可與狎絳幽岸足以觴幸有彭澤酒堯臣便同永嘉堂潘生起爲夀維王子齊陳章林端見新月衍草際聞寒螿照水螢影亂良臣拂筵蓼花香徘徊戀嘉境坐使歸興忘少卿希深洛中冬夕道話有懷善慧大士因探得江字韻聮句彼有上人者妙談心所降希深逹空知不二觀行本無雙堯臣久阻飄花席因思響雪窗希深社中雖得逺方外自非龎堯臣夢幻慙他劫風塵厭此邦希深終期親道樹何必憶重江堯臣希深本約遊西溪信馬不覺行過據鞍聮句有意訪西溪順塗吟思迷及兹詢野老已恨過芳蹊希深醉客但多興幽禽空自啼無由駐金勒林表日光低堯臣同希深馬上口占送九舅入京城親聮句之子洛中來芳樽喜暫開人誇阿連少吾媿士衡才希深丹闕鳳皇去清川鴻鴈迴都門春色美相送思悠哉堯臣玉麈尾寄傅尉越石聮句齋中獨何物持之想見君惟兹玊麈尾信美而有文夫子善談道亹亹詞如雲在握昔同色傾坐今離羣絳况託懷袖好曽親蕙蘭薰常許助閑放扵焉探典墳既乃阻清燕復屈驅䖟蚊自殊白團扇未畏秋葉紛堯臣風瑟聮句竅竹漏天風張絃擬嶧桐佳名從此得妙響未曽窮希深夜静危臺上人閑皎月中依依聽不足秋露滿蘭叢堯臣冬夕會飲聮句與君數夜飲唯恐酒盞空今我苦欲淺堯臣語志難此同陳編侑歡適謝景初間謔何魁雄婢子寒且倦堯臣主人哦不窮燈青屢結花景初煎響時鳴蟲穴鼠暗出没堯臣風鴈髙雍容冰霜覆瓦屋景初貂狐輸貴翁孤牀乏暖質堯臣苦語有澹工咀嚼患䏑小景初煨炮驚殻紅落蟾斜入竅堯臣逺漏㣲遞風醉心欺睡魄景初細書刺昬瞳吽呀聞争犬哮吼厭啼􅐒撥火亂赬豆附灸雙彎弓乾果硬迸齒堯臣寒齏酸滿胷枯蛤擘無肉澹脯燒可饔語必造聖賢樂已過鼔鐘紙窗幸未曙景初絮被令旋縫凍痺兩股鐵跑抓雙鬢蓬脬尿既嬾溺裩蝨唯欲烘器皿足缺齾捧執無妖穠兒女寒不寢堯臣僮僕困欲瞢豈無富貴徒笑此飢寒蹤丈夫固有負道義久已充墨子不黔突齒輩且得封勉哉梅夫子塞者終自通景初問荅送九舅席上作金鑿落希深問留贈行人須滿酌銀缾况有宜城醪及取春風花照灼小屛風問希深座隔流塵素影融方牀六尺偃清晝慙無玉枕名通中玉蟾蜍希深問廁君筆硯誠有諸可愛亭亭寒月照瑩然四座凝冰壺金錯刀問希深連環交刃吹風毛美人贈我萬錢貴何必翦犀誇孟勞青雲梯問希深尺木爲階行勿迷勸修道業生羽翼天門九襲須攀隮鳳于飛希深問差差粹羽今逢時桐花正美矞雪亂家庭玉樹須來儀宛陵集卷十一
