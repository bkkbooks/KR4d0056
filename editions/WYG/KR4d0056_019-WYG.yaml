body:
  text: 宛陵集巻十九宋梅堯臣撰次韻和酬裴寺丞喜子脩書唐宋典冊竟騈羅漢詔重令與削磨古聖規模猶可法衆賢馳騁必無蹉旣除太史來爲尹遂用非才往補訛代匠只憂傷手甚君宜憐我不遑他送趙虞部士宏知蜀州春風跨臘至雪作蝴蝶飛偏知蜀太守撩亂撲行衣何當海棠下歌管紅袖圍一飲一斗酒決訟如發機洛陽花自好聽從杜鵑歸月蝕有婢上堂來白我事可驚天如靑玻瓈月若黑水精時當十分圓只見一寸明主婦煎餅去小兒敲鏡聲此雖淺近意乃重補救情夜深桂兔出衆星隨西傾次韻和酬刁景純春雪戲意雪與春歸落歲前曉開庭樹有餘妍楊花撲撲白漫地蛺蝶紛紛飛滿天胡馬嘶風思塞草吳牛喘月困沙田我貧始覺今朝冨大片如錢不解穿次韻和楊樂道待制詠雪梁苑孝王跡灞陵遊客心牧羊來海上泛櫂向山陰興賞曽何淺羈棲亦以深穆歌猶在竹郢曲自傳琴旗凍霑天仗槍寒拂羽林且爲豐歲慶休作苦寒吟掩帙都忘慮焚香靜擁衾晴明一登閣暮色徧髙岑次韻和景彞閏臘二十五日省宿君嘗編史似吳兢又直甘泉馬踏冰重臘雪花方漫漫宿㕔書架自層層案頭羙酒初温火簾厎微風欲動燈永夜未眠鐘已發此心閑寂是髙僧姪宰與外生蔡駰下第東歸事莫必有勝必勝難可持邇來罕相見世上多誇馳黄金鑄佩印白玉刻佩龜朝見恃赫赫夕見同蚩蚩方得靡不羡旣處焉所施此理非一日更後當應知志士無終窮斯言非爾欺次韻和永叔省樹髙槐雪壓條沉沉古屋蔽疏寮每嗟守印如枯木欲棄明珠學緯蕭漸老但知貧賤樂向來徒用歲時銷新年不管魚龍躍安得乘風入剡樵次韻和范景仁舍人對雪三尺没腰雪京華頻歲無髙低相掩覆竅隙似封糊帖缺都迷醜増妍不問枯因時混貧冨遇物得圓觚眩目曽何數流風不可圖冥冥山霧合浩浩海雲鋪未覺花飛葉先看霰集珠落機裁扇素獵野割膚腴粲爾娥奔月皤然叟赴酺薄才今揣稱小巧媿非夫嘉祐已亥歲旦呈永叔内翰階前去年雪鏡裏舊時人不覺應銷盡相看只似新屠酥先尚㓜綵勝又宜春獨愛開封尹鍾陵請去頻次韻和吳沖卿歲暮有懷舊厯巻將盡慨然増永懷唯希歩兵醉莫作太常齋孟浪從人笑疎愚共世乖定知當汩没名不與功偕次韻和沖卿元日天心欲銷變元㑹罷來朝新歲起今日舊年猶昨宵凍雲低覆闕殘雪稍封條又聽驅儺鼓羣邪不可饒次韻和景仁對雪北風吹雪至浩蕩地疑無奕奕將如舞漫漫欲似糊沙場行不盡銀漢落應枯興發詩千首豪吞酒百觚山川容可改圭璧巧能圖花竟因酥㸃砧爭似練鋪未燖調鼎鵠全混蔽旒珠懷昔餐衣絮誰今食豢腴善歌知寡和醵飲遂成酺衆筆排堅陣多多困老夫次韻三和景仁對雪北度龍沙逺南來狗犬無玉階三尺峻粉壁萬重糊獸餒行迷穴禽寒立竝枯長川平界限大屋竦稜觚稍見蓬萊闕初張雲霧圖受降鍪甲積罷獵羽毛鋪被褐思懷寶游都學賣珠車皆陳鋈轡人盡得瓊腴縞已贈吳札席將開漢酺鳳池批詔手特地逞工夫次韻和永叔新歲書事見寄尖風細細欲穿簾殘雪微銷凍結檐琖裏醇醪無限滿鏡中白髮不知添妍童喜舞開羅幕小吏愁澌入硯蟾幸得從公持直筆定應無復歎齏鹽送辛都官有終知鄂州衣上大梁雪門前武昌車使君行有期將逢鳥隼旟車動自轣轆旟輕自舒舒去都越千里城在江上居黄鶴有髙樓樓頭挂蟾蜍下見鸚鵡洲葭茁可以菹爲弔禰處士沉蹤異三閭憶昔我仲父五馬來歭䠧願君訪舊跡因報八行書次韻王景彞正月十六夜省宿過景靈街宮街不閉東城月圓影纔虧夜色春自躍金羈來宿省從他錦帳欲誇人燈光逺近疑爭晝歌韻髙低競起塵我老都無游樂意似君淸枕睡侵晨送韓玉汝太傅知洋州三首圅關見殘雪褎谷聞春禽禽響通朱輪馬嘶入靑林花明亂石路雲抱寒泉岑天外漢江來城下漁網沉庖供縮項鯿坐使宮娥斟農桑不須教古俗自通今渭入秦宮古褎分蜀道難泉聲春雨後月色曉程寒蠶浴桑牙短禽啼杏萼丹從來稱邵杜民俗在君安春風東來㡬萬里相送入關如有情灞陵原邉柳條暗咸陽橋畔桃花明自古恨别此兩處十千美酒瑠璃傾日落未落車馬動子規滴血壯士驚行哉使君負膽氣蜀道雖險心常輕是時門前大桐樹爛漫紫萼啼流鶯弟兄同懷不可見應亦夢覺嗟逺程太白山前一尺雨桑下問蠶田問耕郡城夜開百姓喜喜從迢遞壺漿迎李廷老祠部寄荆柑子踏雪衝風馳小吏帶霜連葉寄黄柑擗包欲咀牙全動舉琖逢衰酒易酣書尾自題知逺意筆頭親荅猒多談故人莫覓新詩巻都似嵇康七不堪韻語荅永叔内翰世人作肥字正如論饅頭厚皮雖然佳俗物已可羞字法歎中絶今將五十秋近日稍稍貴追蹤慕前流曽未三數人得與古昔儔古人皆能書獨其賢者留後世不推此但務於書求不知前日工隨紙泯已休顔書苟不佳世豈不寶收設如楊凝式言且直節脩又若李廷中淸慎實罕侔乃知愛其書兼取爲人優豈書能存久賢哲人焉廋非賢必能此惟賢乃爲尤其餘皆泯泯死去同馬牛大尹歐陽公昨日喜疾瘳信筆寫此語謂可忘病憂黄昬走小校寄我東郭陬綴之輒成篇聊以助吟謳次韻和韓子華内翰於李右丞家移紅薇子種學士院紅薇花樹小扶疎春種秋芳賞愛餘丞相舊園移帶土侍臣淸署看臨除薄膚痒不勝輕𤓰嫩幹生宜近禁廬此地結根千萬歲聮華榮莫比茅茹次韻和吳長文舍人即事見寄莫問春風有後先但逢佳處去揚鞭桃花洞逺迷應久杏樹壇荒迹自傳放與曉寒能幾許即看芳意不多偏古來閑氣爭强弱謾費黄金抛楚權次韻和長文社日禖祀出城曉出春風已擺條應逢社伯馬蹄驕壇邉宿雨微霑麥水上殘冰壅過橋燕子飛來依約近鴈行歸去試教調北扉西掖多才思相與飄飄在泬寥次韻和長文禖祀郊外見寄并呈韓子華鵓鴣知雨在桑中雄逐雌飛自不同胡粉未生輕蝶白燕脂先綻野櫻紅髙髙樹裏鞦韆月獵獵牆頭蓓蕾風曉下祠壇多寄詠衣冠方侍大明宮送馬行之都官昭亭山下送君時不畏西行劔棧危笮馬跨來身更健吳船乗去計非遲錢塘湖上尋雲屋巾子峰前種槿籬此趣已髙天下士不須功業似鴟夷和王景彞詠薜茘植物有薜茘足物有蜥蜴固知不同類亦各善縁壁根隨枝蔓生葉侵苔蘚碧後凋雖可嘉勁挺異松柏和江鄰幾省中賞小桃年年二月賣花天唯有小桃偏占先初見嫩紅無不喜終知俗豔幾多妍鄰翁已折郊園裏貴客爭誇粉署邉可惜工夫吟向此㑹須留醉牡丹前長歌行世人何惡死死必勝於生勞勞塵土中役役歳月更大寒求以􅫥大暑求以淸維餒求以饁維渴求以觥其少慾所惑其老病所嬰冨貴拘法律貧賤畏笞榜生旣若此苦死當一切平釋子外形骸道士完髓精二皆趨死徒足以見其情遺形得極樂昇仙上玉京是乃等爲死安有蛻骨輕日中不見影陽魂與鬼并莊周謂之息漏泄理甚明仲尼曰焉知不使人道傾此論吾得之曷要世間行依韻和長文紫微春雨二首年年潑火雨苦作淸明寒棃花猶半綻塘水已迷漫愁看日更永冷漏夜未䦨酒沫起玉琖燭淚生銅盤春衣向來脫帶眼斗覺寛試問彼侯少何處跨金鞍春雨固多喜雖多安得愁旣能勒花苞又解滋耕疇他添痕痕漲渠有細細流不同離婦怨一落不可收定知矜有年豈似斗粟賙西掖吳夫子吟觀意遲留正聲隮雅頌髙論等陽秋我慙才甚薄難繼東山謳送滕寺丞歸蘇州驅車入蜀時有弟母不往留婦侍母傍以子囑婦養昨得閭門書婦子死泉壤此心那得安弃官提轡鞅東馳三千里鬻馬求吳槳吳槳速如飛歸來拜堂上堂前去時樹已覺枝條長豈無懷抱感爲壽酌春醠次韻和酬永叔春候倏已和林上鳴鳥譁前日是清明驟雨霑棃花初聞結客游愛此物景嘉歌舞未終宴夕暮各興嗟所嗟歸路暗嘶馬自知家公家八九姝鬒髮如盤鴉朱脣白玉膚參年始破𤓰幾日苦霖霪當道跳魚鰕閉門飲濁醪鞦韆繫樹丫羣姝莫要劇爲公歌啞啞公當是日醉歡適不可涯孔氏有髙第内自戰紛華我公豈其然秉直異蓬麻果效歸田去願從招轅車次韻和江鄰幾送客回同過金明池二首送别西亭車馬塵天池回傍欲迷津畫船龍尾何時發丹杏梢頭漏泄春風光猶未老於人獸口泉聲瀉碧津一洗塵襟無俗慮柳條開眼共看春宛陵集卷十九
