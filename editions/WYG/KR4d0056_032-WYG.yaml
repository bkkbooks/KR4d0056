body:
  text: 宛陵集巻三十二宋梅堯臣撰送范景仁學士歸蜀焚黄蒼山過秦梁山盡見川陸下馬古成都訪壟得喬木埽籜開奠席隕淚濕俎肉當時相如歸徒自盛車轂不聞有是為事乃今古獨還因問耆舊亦莫遺隱卜荒祠古柏下殘月杜鵑哭憑君約史筆書作西來目送宋中道鄭州拜埽酣酣道傍杏戢戢壟上柏不知煙火禁但感風露易開關埽墓隧向樹繫車軶灑淚有餘悲麒麟髙幾尺送韓子華歸許昌不值風雨暴杏過棃巳開社後清明前燕與人歸來湖中水方漫誰共泛其隈儻有問顦顇顦顇未忘杯燕涏涏隻來燕飛飛自舞空輕如漢家后斜避楚臺風斗折撩沙觜相髙接草蟲向人全不畏切莫入吳宮送周衍長官知遼州二月遼陽去遼陽草未生春風吹邊沙巻起黄雲平土人耕耨晩種黍何時成塞地寒且薄百役子宜輕寒食墳冢徧青山髙低占原谷向來路巳荒今迷問樵牧渉水到雲林隔岡聞近哭沃酒白楊下悲風何䬃䬃雨止棃園殘鳩聲在茅屋依韻和太祝同諸君遊園湖見寄陽春何處來客自商邱至一唱新詞工始見故人意園林誰與遊卉木欣已媚花上有微陰水邊無近思遥憐數觴豆何必親歌吹牧馬憶當時招延遺舊地不逢浮沼鴈但見銜魚翠日予謬詞律荅句嗟蕪累安能接賢彦樂事聨輕騎獨不負春風塵纓此懷媿聞學士院試含桃薦寢廟詩擬作交交鳴谷鳥粲粲熟荆桃寢廟此先薦離宮將以遨既同羞俎實且異獻溪毛露顆明朝日朱光逼赭袍戴經傳自久漢令著方髙天子從兹食羣臣賜亦叨韓子華約遊園上馬後雨作遂歸誰約玩春物狂風雲驟開擺叢多落蕊蔽路足昬埃逆水燕迎雨將生鵝怕雷嵇康今轉嬾騎馬半塗廻大風夜風晝不止天理何可常正當春木榮擺磨枝葉傷東皇務長養乃值此物狂曷不訴於帝斥之出逺方風伯有罪五孰肯進皂囊往時嵗苦旱救熱雨欲滂吹之不使下雲雷遂深藏復揺江海波白日沉舟航又巻關塞沙千里填河隍拔木與退鷁書傳言巳詳今者天柔和煦煦皆敷芳獨爾何不仁號怒事雄强既其背天時誅殛固所當鳶鳴兼虎嘯助惡黨亦昌春風常愁春雲低誰料春風惡揺扇無定響折幹時聞落吹花擁細草送雨來髙閣江燕倚身輕逆飛前復却送侯寺丞知鞏縣侯洛人伊洛合河流正臨歸鞏路崖壁人畏崩芹泥岸長固山廻邑郭見馬入雲煙暮宰兹雖所淹况與鄉黨附宋次道家摘寶相花歸清平里往嵗見此花開遲手擷羣芳因醉齅今來須約爛熳看及過風雨又已後主人為我特殷勤架底深深掇孤秀宻枝隂蔓不爭開薄紅細葉尖相鬬先時已落已埽除最晩堪憐子所厚呼童歸遺不可緩金盤付與急奔驟暮還巳見映雲髻初拈尚覺香在袖官橋夜市正沽酒沽酒共賞莫待晝送南京僉判宼中舍東風莫迎船船下黄流急送車猶未動顧櫂巳不及離宮佳氣盤賔幕平時入因君報親舊將去江南邑送韓奉禮隨侍之許昌岸之側多菖蒲蒲之下多乳魚乳魚可以饌菖蒲可以葅羡君調膳去且樂因使無忘寄我書金明池遊三月天池上都人袨服多水明揺碧玉岸響集靈鼉画舸龍延尾長橋霓入聲飲波苑花光粲粲女齒笑瑳瑳行袂相朋接游肩與賤摩津樓金間采幄殿錦文窠挈榼車傍綴歸郎馬上歌川魚應望幸幾日翠華過和應之還邑道中見寄向老思舊交欲見恨無翅前時君來都欣喜乃一至亦既勤我懷酌酒去拘忌自從離洛陽此㑹無三四謝尹最賢豪已嗟存沒異因酬馬上篇遂寫相逢意送韓仲文知許州孰不為太守所榮歸故鄉僚官詫舊識邸吏窺新章前去别馬上今仰立道傍野老拜車塵里人持壺漿至家塤篪美謁壟雲日光盛事難盡書且舉國門觴送薛殿丞知達州逺郡古通川雲煙秀重疊江從巴蜀來山與岷峨接啼鳥異方音青林四時葉使君當問俗市賈皆紅頰依韻朱學士廉叔憶潁川西湖春色寄獻尚書晏公且將有宛邱之命物景有先後春工無舊新追歡成杳藹寄詠苦逡廵湖水與濠接岸亭將寺鄰豔花篸舞髻弱藻罥垂緡客奏桓伊笛人歌柳惲蘋何嘗煩几案自得去埃塵縱語曽忘倦從游未覺頻賦詩髙壓古下筆敏如神每想魂俱往終知夢是因廣騷常慕屈感遇亦希陳借問摛詞者當時别乗人喜公移幕府連賞二州春集英殿賜百官宴以雨放春來無㸃雨三月始聞雷曉殿鳴簷急羣公罷食廻燕迎風翅健馬踏霧泥開晚覺微陽透飛光上緑槐送陳太祝歸河陽羸馬度關去夜向河橋歸水風來何急吹裂游子衣到家莫久留速書赴禮闈大對必有藴時哉無闊稀送祖擇之祕丞知海州驥有千里足不使千里馳人有抱長才亦復不得施去去作守長政化尚可為勿云海濵陋豈無彼黔黎事舉訟必簡安能忘酒巵水物錯在俎鹹腥應自宜朐山日相對亦莫厭其卑蒼翠入畫㦸濃澹若秀眉但向此中樂用舍乃繫時戊子三月二十一日殤小女稱稱三首生汝父母喜死汝父母傷我行豈有虧汝命何不長雅雛春滿窠蜂子夏滿房毒螫與惡噪所生遂飛揚理固不可詰泣淚向蒼蒼蓓蕾樹上花瑩潔昔嬰女春風不長久吹落便歸土嬌愛命亦然蒼天不知苦慈母眼中血未乾同兩乳髙廣五寸棺埋此千嵗恨至愛割難斷剛性剉以鈍淚傷染衣蔕花惜落斑嫩天地既許生生之何遽困與用文師師名學佛者何乃愛吾詩吾方嗟世人各各事奔馳蒼鷹絶海至不異攫䑕鴟所趨有逺近所向皆餒飢潄水對無語風動庭樹枝小女稱稱塼銘吾小女稱稱慶歴七年十月七日生至八年三月二十一日死嗚呼鳥獸螻蟻猶有嵗時之命汝不然也汝稟氣血為人豐然晢然其目瞭然耳鼻眉口手足備好其喜也笑不知其樂其怒也啼不知其悲動舌而未能言無口過動股而未能行無蹈危飲乳無犯舌之禁愛惡無有情之系若是則得天真與保和何病夭之遽乎得不推之於偶然而生偶然而化偶然而壽偶然而夭何可必也吾將衣汝衣斂汝棺葬汝于野亦人道之常分汝之魂其散而為大空其復託為人不可知也其質朽而為土不疑矣富䝿百年者尚不免此汝又何寃瘞之日父母之情未能忘故書之塼非欲傳之久且以志其悲云銘曰母孕而夢夢維虺蛇古占女祥夫豈其然邪復占我夢我遺我稱我名命汝平御妾媵既厲而乖胡然乎靡應送吳沖卿學士歸蔡州孟夏日南歸馬耳竪迎風急雨不及避斷霓明向東古城汝水傍化俗寄我公君今去拜慶酥酪美將同下土橋送刁景純忽大風韓子華先歸遺其小方巾明日持還副以此詩昨日汴水頭共餞東去人暴風吹黄沙對面不相親歸來乗大馬誤擲小方巾平明持奴還偷様古逼真刁景純期水門再别以風雨不往餞客客未去明朝當更來風雨尋船嬾車馬向闕帽次覺重清尊想誰開終期江上見俗禮聊損闕韓子華訪石昌言不遇石有詩韓邀和闕嘗聞載酒者去訪子雲居仍值徒御出遂令談竽闕為黍寧乏具題鳳豈有諸一聽負荆語還想藺相如舟中夜聽汴河水聲夏雨漲黄流夜鳴鄰船柁乗危冒險人不識西山餓逢王公慥大博駑馬不惜蹄出門莫畏泥泥中逢故友十載相乖睽但怪蒼鬢色班班俯鐵驪少立不及語交䇿或東西向晩我還舟君來訪長堤對論出處迹存沒生悲啼勿言少壯日志意吐虹霓而今七不堪嬾又甚於嵇寄題洪州慈濟師西軒西軒無落暉所賴西庭竹竹間有古葉竹上有緐緑夜雨一洗梢朝陽似晞沐焚香愛此心自不同諸俗送謝著作歸陳州騏驥泥中行偶蹶未千里終當至髙衢尚苦泥行恥今歸雨濛濛嘶鳴欲何止乃念彼名駒近在清川涘他日見騰驤駑櫪此垂耳和石昌言學士官舍十題病竹水邊移得已傷根枝葉如枯生意少主人不使荒穢侵遂長琅玕勝凡草石榴花春花開盡見深紅夏葉始繁明淺緑秪知結子熟秋霖不識來時有筇竹薏苡葉如華黍實如珠移種官庭特蔥蒨但蠲病渴付相如勿恤謗言歸馬援石蘭言石曽非石上生名蘭乃是蘭之類療痾炎帝與書功紉佩楚臣空有意萱草人心與草不相同安有樹萱憂自釋若言憂及此能忘乃是人心為物易葵花此心生不背朝日肯信衆草能蘙之真似節旄思屬國向來零落誰能持蔬畦手自除荒手自鉏蔥鍼巳插壅薤本朝芸夕灌豈不勤比食翦苗閒且穩水紅江天澹澹江水平江岸有花紅作穗今日特向都城開晝時只合銜魚翠甘菊世言此解制頽齡便當園蔬春競種到秋猶得泛其英爛醉莫辭官有俸蘭楚澤多蘭人未辯盡以清香為比擬蕭茅杜若亦莫分唯取芳聲襲衣美勉致仕李祕監淵明歸柴桑家貧食不足當其勇去時不待秫稻熟借問何以然實恥暫屈辱公嘗為近臣曽不輒媚曲一縁府舍災遂使還秩禄禄仕四十年内乏釜鍾粟歸來託四鄰恓恓無片屋去就異前人其義已介獨譬之食嗟來應自甘退縮當營負郭田漸可事水竹送施景仁太博提㸃江南坑冶楚山豈無銅楚匠豈不工大鑪常乏鑄碧井那得充積弊在鄉縣孰肯以利籠君今承詔行諭民當得中苟能使之發亦莫取之窮此乃事可久山深山自通夜泊虹縣同施景仁太博河上納凉書事與君愛清風移榻就明月月落見星緐星緐如晝熱霑衣輕露墜響岸崩湍齧坐思都城時誰許脚不襪施景仁邀詠泗州普照王寺古檜來尋淮上寺老檜莫知年劫火已鎔像樛枝寧改煙根挐怪石入節駮蒼苔堅欲問浮波箭空嗟此獨傳送王判官同提㸃坑冶地雖不愛寶利在與民共務國不務民儻有安得用孟氏美王囿其說久已誦聊此陳薄言忉怛不能重淮雨雨脚射淮鳴萬鏃跳㸃起漚魚亂目濕帆遠遠來未收雲漏斜陽生半幅舟次山陽呈王宗說寺丞遠客雖有樂莫如逢故人夜懷夷門時月照楚水濵自居扁舟上隨處與船鄰宜將到此日因使報朋親送崔黄臣寺丞宰臨海補官桐廬時巳飽嚴陵釣進吏六百石又得臨海嶠因之論出處足以見風調洪潮可登觀萬里漲川竅收縮尚何歸由來人莫料憑君能賦才庶或窮其妙楚童楚童能捕魚乃在水邊居手取眼不顧情知獺未如鬢上浮萍草㸃㸃緑有餘既挈不暇理歸来莫取渠雜詩絶句十七首自此寶應道中起慶歴七年夏蛙行動萍葉誤觀作游魚稍稍引兩股巳變科斗書青草生水中日日隨水長水落何所依撩亂為宿莽有蟲託斷葑斷葑日夕流不知止息處隨天非自由荒水浸籬根籬上蜻蜓立魚網挂遶籬野船籬外入茸茸翦熟絲雨染臙脂暈滿樹斂黄昬槿花無此分青青老鏡葉下有緐實尖浪頭撥船女刺手終不嫌岸傍草樹密往往不知名其間有啼鳥似與船相迎青蠅何處來聚集滿盤間誰知腹中物變化如循環水上賣𤓰女摘瓜陂上田長麻已不識滿把青銅錢買魚問水客始得鯽與魴操刀欲割鱗跳怒鬐鬛張沙頭風雨來帖水野雲黑如觀曹公營萬弩射船側前時雙鴛鴦失雌鳴不已今更作雙來還悲舊流水度水紅蜻蜓傍人飛款款但知隨船輕不知船去遠塘上挽船人塘泥深及脛落日望前邨心將道塗競燕立茅屋脊燕銜芹岸泥巢成同養子薄暮亦同棲鵲銜髙樹蟬危脇繰車響露腹不曽肥殺之嗟已枉河畔有釣翁團泥為甕缶坐想秦人聲思傾杜陵酒宛陵集巻三十二
