body:
  text: 宛陵集巻四十宋梅堯臣撰寧陵阻風雨寄都下親舊晝夜風不止寒樹嚎未休人言雨殺風雨急風未柔獨扶慈母喪淚與河水流河水有冬竭淚泉長在眸予生五十二再解官居憂昨者母疾亟骨肉相聚愁槖中無一錢緩急何可求母當臨終時囑我貧莫羞隨宜具棺斂厚貸壓人頭死事定無益生償且無由泣涕聽母言心腸如剜鈎小子雖不令長養恩曷酬旦夕期速平後事勿預謀願母强藥食更延百千秋固云莫望我我魂已飛遊語畢忽奄逝撫膺呼裂喉未能一物備迷亂將安投艱窘見風義乃有令朋儔致賻或錢帛最力李與劉廷老原甫禁省及石渠奠助日不周裴楊乞銘蓋文篆古復遒如晦元明潭饒兩大艦朝索暮泛浮哀憐荷君子才德慙未修三日違大梁兩宿此遲留聊書同些挽試託楚人謳新霜感前日衣上露今日衣上霜我母魂何之膏火麋我腸隔棺三寸地如在萬里鄉嚎呼不聞聲飲食空置旁昔時憂我寒縫衣紉綫長綫長必絮厚要與風霜當又每恐我飢羹臛自調嘗此身内外間莫得頃刻忘舉衣不忍著舉箸不下吭一念百感生欲問天蒼蒼過淮侍親數數來浮汴護櫬迢迢復渡淮旨畜曽無禦寒具細君唯有隱居釵月㾗遠入魚銜浪潮退長汀蚌閣崖素服華顛色相似青銅不忍見形骸淮陰天下滔滔久厭秦英雄蛇䑕竄荆榛少年豪横知多少不及沙頭一婦人桫欏樹李邕有碑桫欏古樹常占嵗在昔曽看北海碑今日四方俱大稔不知榮悴向何枝就野人買兔霜濃草白兔初肥蒼鶻調拳獵犬㩦剰付錢刀買庖餗不須縁徑更求蹄使風船清淮直上水連天坐看髙帆後復前自是乗風有遲速不由人力愛爭先淮陰侯廟韓信未遇時忍飢坐垂釣歸來淮陰市又復逢惡少使之出胯下一市皆大笑龍蛇忽雲騰蛭螾豈能料亡命乃為將出竒還破趙用兵不患多所向孰敢摽功名塞天地翦刈等蒿藋于今千百年水上見孤廟鷺銜葭下魚相呼尚鳴叫髙皇四海平有酒不共釂古來稱英雄去就可以照又平律一首漢家天下將廟古像公圭百戰自忘楚一時空王齊鄉人奏簫鼓舟子賽豚雞不改寒潮水朝平暮復低入滿浦馬頭攙岸斗燕尾泊船齊風送寒潮急雲藏晩日低逢人多楚語問客煮吳雞難覓枚臯宅蒼葭處處迷許發運待制見過夜話許公運國儲嵗入六百萬上莫究所來下莫有剥怨十年無纎乏功利潛亦建昨除侍從官聊為磨世鈍比於以舌得此豈媿物論較量多少閒未足數劉晏大計苟窘費曷不使預算欲倍即能倍但勿惑謗訕擾民可以奪食官可以竄要付與權衡一切出果斷嗚呼任智力長短固有限制財猶制兵太甚則生亂公譬淮陰侯多多自益辦我今聽其談夜去為扼腕書之俟采詩咨訪不可緩登秦山日觀峰并序予泊𤓰歩山下夢王景彞問韋應物日觀峰詩予即誦知語不屬謂景彞曰當為檢韋集覺而亟閱韋集無此題尚記夢中所誦首句云晨登日觀峰遂續補之晨登日觀峰海水黄金鎔浴出車輪光隨天行無蹤正視刺我目攢集如劒鋒照曜萬物興磨滅萬物凶草木既無命必聞石間松當時一避雨安得大夫封人而苟不遇抱簡誦六龍重過𤓰歩山魏武敗忘歸孤軍處山頂雖憐江上浦鑿巖山巔井豈是欲勞兵防患在萌穎我昔常登臨徘徊愛晴景片雨西北來風雷變俄頃疾行下危磴屨脫不及整霑濡入舟中幼子喜抱頸問我適何之衣濕不太冷昨暮泊其陽月黑夜正永鴈從沙際鳴旅枕自耿耿平明夾櫓去廟樹聳寒嶺舉手生白雲飄搖水中影發長蘆江口篙師柁工相整衣龍女廟中來宰豨野祝擊鼓降神語老鴉銜肉上樹飛長江無風平似削兩櫓夾舸行將歸南國山川都不改傷心慈姥舊時磯龍女祠祈順風龍母龍相依風雲隨所變舟人請予往出廟旗脚轉旗指西南歸飛帆疾流電長蘆江口發平明白鷺洲前已朝膳竹根杯珓不欺人世間然諾空當面西施濺濺溪流散苒苒石髪開一朝辭浣紗去上姑蘇臺歌舞學未穩越兵俄已來門上子胥目吳人豈不哀層宮有麋鹿朱顔為土灰水邊同時伴貧賤猶摘梅食梅莫厭酸禍福不我猜金陵三首恃險不能久六朝今已亡山形象龍虎宮地牧牛羊江上鷗無數城中草自長臨流邀月飲莫挂一毫芒金陵逢曉雪撩亂逗雲來已失烏衣巷還成白玉臺山盤猶隱見江轉似昭回一聽髙樓笛依稀認落梅每入秦淮口風波更不憂重看後庭樹還起舊時愁故老都無有遺蹤莫可求何人能識意白鷺在寒洲丫頭石此碑在金陵斷石岡上有吳文帝字焉丫頭石雖斷文字未全訛年算赤烏近書疑黄象多幾時經霹靂異代見干戈更與千秋看松煤定費摩漫書蒲葵兩錢扇漫寫未嫌輕老媪持將去無端色不平閔冢吳天册中盜發廣陵冢及扉開石樞中環走徹道髙闊可通車五尺銅鑄人執兵冠服朱壁石刻位號列侍幽宮隅殿將將軍屬侍郎常侍俱啓棺見其尸鬢斑顔未渝白璧十雙藉雲母一尺鋪黄金塞耳鼻千歳不腐枯生為貴與富死與人未殊後世逢暴禍雖久將焉如堯舜及周孔豈不固形軀雪中發江寧浦至采石泊舟斫枯葭歊火石岸旁冒嶺雲冥濛漫江雪飛揚拖氷修網􅉣出水朱鬐殭曠然起遠懷風旗轉危檣千帆共辭浦攙錯逆水翔落星始前瞻瞬目已後相鮆魚何時來楊花吹茫茫沙草不可辨鴈立知汀長山頭化石婦忽變素質光豈復願聞笛莫逢桓野王登采石山上廣濟寺船從山下過直上見僧軒繫纜登磯石縁崖到寺門短籬遮竹瀁危路踏松根却看滄江底帆歸烟外昏效阮歩兵一日復一日二首一日復一日一朝復一昏來新去成故俯仰變凉温有貴即有賤未若賤常存騂牛慕孤㹠黄犬悲東門禍福相為基損益不復言吾祖入吳市應龍非伏轅一日復一日一晨復一夕四序相盛衰三辰運光魄下上有常理憂患何時易先爛泣金燃先焚歎薪積但願遠世網焚爛不能責麒麟出非時未免西狩獲鷗鳥浮洪波心巳預海客阻風宿大信口東梁如印蠶西梁如游魚二山夾大江早暮潮吸嘘解舟辭姑熟速欲還吾廬風逆未可前泊浦近烟墟波中事網罟乘月多夜挐冰灘聚鳴鴈霜葭正疎疎是時昴畢中曠渺天地虚靜坐人巳眠我慮久洗如自起取美酒獨酌邀蟾蜍蟾蜍射白光入盞亦躊躇醉來不解舞欲攬嫦娥袪昔對謫仙人此意復在予既醒裂尺素立作數行書寄與青山家精靈其有諸早發大信口犬吠知船解邨墟尚閉門霜泥黏纜尾冰水閣潮㾗撇撇鸊鵜去纖纖舴艋昏梅湖到不遠寄信向田園黄池月下共酌得池字將歸謝公郡喜見阮家兒但對月和水那能酒似池衰形疑鏡照葆鬢怯霜吹宿鴈不堪託鄉人知未知泊昭亭山下得亭字雲中峰午午潭上樹亭亭久作大梁客貧留小阮醒灘愁江舸􅉣祠信楚巫靈日暮渡頭立山歌不可聽送鹽官劉少府古賢我祖南昌尉時危棄闕仙劉郎從宦日天子治平年燥茗山中火熬波海上烟吳民不為盜唯此撓君權太師杜相公篇章真草過人遠甚而特奬後進流于詠言輒依韻和杜詩嘗說少陵豪祖德兼誇翰墨髙蘇李為奴令侍席鍾王北面使持毫子美祖審言嘗自謂我詩可使蘇李為奴我書可使鍾王北面郊麟作瑞唯逢趾天馬能行不辨毛一誦東山零雨句無心更學楚離騷依韻和僉判都官昭亭謝雨廻廣敎見懷賽雨何從事髙情苦愛山謝公聨句後謝公有昭亭賽雨與何從事聨句詩惠遠過溪間笑處巖相荅歸時酒在顔端憂守窮巷無力共躋攀依韻和吳正仲屯田重臺梅花詩桃花已滿秦人洞杏樹猶存董奉祠莫怪寒梅獨多葉只縁樂府有新詩讀吳正仲重臺梅花詩此樹在靈濟王廟楚梅何多葉縹蔕攢瓊瑰常惜嵗景盡每先春風開龍沙雪為友青女霜作媒託根邇廟堂結子助鼎鼒吳侯本吳人筆力髙崔嵬但詠同姓木予非梁棟材依韻和正仲重臺梅花芳梅何蒨蒨素葉吐層層近臘寒猶勁先春氣巳承冷香傳去遠靜豔宻還増有意常欺雪無功合鏤氷早烟籠玉暖凍雨浴脂凝漢女新妝薄燕姬瘦骨稜壓枝唯恐折簇萼似難勝神物終來䕶江鄉未解矜獨竒心豈欲寄遠客何曽不見黄鸝度寧防粉蝶凌月光臨更好溪水照偏能画軸開雲霧宮刀翦綵繒都無筆可􅃷莫信巧堪憑丹杏塵多雜夭桃俗所稱故林嘗渴望大庾更愁登重和陽春曲聲辭猥媿仍正仲見贈依韻和荅平生好書詩一意在抱槧既無鈌雲劒身世遭黮黭恥游公相門甘自守恬淡妻孥每寒飢内媿劇剜憯時賴二三友乞米慰窮慘雖然情懷惡亦未廢誦覽如負㑹稽辱欲雪效嘗膽作文持與人百不得一頷聖猶嗜好殊獨取菖蒲歜我愚希六義將使鬼神感譬彼捕長鯨區區只持罯青天挂虹霓踴跂不可擥太華五千仞妄學巨靈撼幸且同蛙黽近樂在井坎蒼髪况種種存非衞髦髧吳侯琅玕姿而來視薍菼鳯皇五色毛曷羨未翅蝻染夏有正采安用此淺黲乃知叔度陂萬頃見澄澹孟軻患為師薄劣亦何敢正仲往靈濟廟觀重臺梅玉盤疊捧溪女歸魚鱗作室待水婔竹間山鬼入夜啼古廟久閉誰啓扉屈原憔悴江之沂芙蓉木蘭託興微賈誼未召絳灌擠香草嘉禾徒菲菲曽無半辭助訶譏國風幸賴相因依依韻和昭亭山廣敎院文鑑大士喜予往還山暖春烟重林昏古寺藏溪流過曉漲嶺樹見新行馬去侵雲蹟風來襲野芳禪衣頻斗藪蠟屐莫趨蹌飛䑕時過擲飢禽或下頏憑䦨何所適望堞正相當捧膳溪童潔銜花鹿女香登臨無險絶不似畏巖牆依韻荅達觀禪師穎公霜露每懷感江山空復情老便林室靜坐厭巷童聲盡日都無語逢人亦强吟浮生過半百安用此虛名題姑蘇邵氏園居積水夫差國閒居魯叟心石科雲氣潤城角竹連陰燕入池塘晩花開島嶼深應當效疎傅不惜槖中金嘗正仲所遺醱醅屈原自著漁父篇餔糟不及漁父賢世無功名多浪死劉伶阮籍于今傳邇來獨酌邀明月唯有青山李謫仙謫仙殁後幾百年市樓日沽千萬錢沉湎豈少當道眠文字不見空月圓吳均之孫何我憐雙壺貯醅持置前豈乏阮李詩與瘨淺飲强對春風妍依韻和正仲寄酒因戲之上字黄封誰可識偷傳王氏法應真清淮始變醅猶薄句水新來味更醇欲擬比酥酥少色曽持勸客客何人紅梅雖是吾家物老去無心一醉春清淮酒本王九傳法於山陽春雨春雨􅮕􅮕鳴百舌林花淡淡洗燕脂眼前耳底催人殺不醉三杯大是癡春夜聞雨風味正不寢驟來寒氣増簷斜滴野籜牕缺搖春燈孺子睡中語婦人行未能前溪波暗長定已沒灘稜早春田行風雪雙羊路梅花溪上邨鳥呼知木暖雲濕覺山昏婦子來陂下囊壺置樹根予非陶靖節老去愛田園宛陵集巻四十
