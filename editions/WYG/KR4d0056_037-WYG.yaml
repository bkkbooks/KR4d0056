body:
  text: 宛陵集巻三十七宋梅堯臣撰與二弟過溪至廣敎蘭若溪上今尚淺渉馬不及韉岸口出近郭野徑通平田行行渡小橋決􅒙響細泉萬木陰古殿一燈明象筵長廊顔頵碑字體家法傳空堂裴相真白䫇垂過咽名迹兩不滅豈獨畫與鐫髙僧鑿崖腹建閣將雲連祕此龍鸞迹足使臣僕䖍脩竹間長松森衞若被堅是必神物護禹穴空嵗年飯訖過山後井傍擕茗煎探幽偶轉谷忽視昭亭巔蔓草不識名歩側時得牽幽禽聲各異可辨唯杜鵑似驚俗客來聒聒兩耳邊弊廬隔城堞畏暮遽言還道逢張羅歸鳥媒兼死懸遂同山梁雉令我復喟然聊追一日事書以為短篇晚坐北軒望昭亭山少客南京間熟游嵩與華歸來宛溪上厭往昭亭下何以厭昭亭衰遲倦驅駕况復慙詠歌嘉辭前有謝咀嚼在人口甘美如食蔗方同陶淵明苦語近田舍節行固不變出處亦多怕常防惡少年豪横使出胯譬如故將軍尚被亭長罵不若守弊廬讀書至中夜與諸弟及李少府訪廣敎文鑒師山僧邀我軰置酒比陶潛紫蕨老堪食青梅酸不嫌野蜂時入座巖鳥或窺檐薄暮未能去前溪月似鎌至廣敎因尋古石盆寺古寺近田家山尋石盎差化蟲懸縊女啼鸌響繅車僧坐樹間石馬行溪畔沙野香無處辨歸路傍城斜郡人不知古石盆寺在此山之傍舊基存焉山中有井相去可一里豈圖經所傳裴休井歟近城有石盆寺其側亦云裴相井者恐非是何則杜牧有石盆山詩是寺因山名也從近城莫究其由呼盎為盆必風俗訛也觀王介夫蒙亭記因寄題蒙亭吾年將五十尚未暇讀易一聞蒙亭說乃見適所適維時明進退豈不在泉石野服製升越山庖盛雞蹠牀頭龍脣琴案上科斗籍風物稍佳時把酒㑹三益况以兄為郎仕也人豈迫重之愛之深自匪逢時客亢陽和欲行舟者春秋書閔雨乃見先王制有意在黎民山川無不祭今者望雲霓青天絶纖翳為壇割舒鴈盤血陳水汭于時頗精䖍奠爵必親涗向夕有微陰埽然還復霽吾聞先儒言陽驕不能閉此時繫穹旻已力安所詣宣王雲漢詩曽不鑒上帝恨無奡盪舟空自思躍蜧黄鶯二首内家初上翠微宮樹裏窺人在半空笑語漸髙無約束侍臣偷望向雲中西鄰少年今出遊東家女兒未識羞門前烏臼葉已暗日暮問誰牆上頭送懷賢上人歸隱靜兼寄達觀禪師適從山中來復向山中去為報山中人莫厭山中住近城塵土多亂爾煙霞趣野蜂銜漆汁尚欲為蔕固息此可以安其能忘我諭送瑞竹長老歸當塗因寄徐著作謝傅青山路春來蔓草生樵蘇猶不入缾錫莫能行朝上野船去宿逢溪雨鳴多應見康樂曽重遠公名和師承嗣達觀觀徐君頗稱之鶯桑間小婦好聲音映葉穿枝意已深盡日呼郎郎不應蕭蕭風雨到前林守宮嘗聞漢武帝偶問東方朔臣擬作龍呼慙無頭上角夏園夏園甘果熟日覺樹林稀休笑道傍李無人摘自肥孔子廟震宣城霹靂下虚殿破楹非夢凶昔嘗瞻畫衮今實見升龍隱隱雷聲散疎疎霧氣從予知仲尼廟不是蓄乖慵寄酬睦州晏殿丞渚潭吐明月杳杳及吾廬流彩滿懷袖託情非鳥魚朝因南澗雨暮入北畦鉏豈不藉餘潤况兹方飯蔬李仲求寄建溪洪井茶七品云愈少愈佳未知嘗何如耳因條而荅之忽有西山使始遺七品茶末品無水暈六品無沈柤五品散雲脚四品浮粟花三品若瓊乳二品罕所加絶品不可議甘香焉等差一日嘗一甌六腑無昬邪夜枕不得寐月樹聞啼雅憂來唯覺衰可驗唯齒牙動摇有三四妨咀連左車髪亦足驚疎疎疎㸃霜華乃思平生游但恨江路賖安得一見之煮泉相與誇送闞令之潭州寧鄉秋風逆水急挂席飛鳥輕三江去雖遠一日行幾程朝辭洞庭岸暮抵巴陵城長沙古建國地狹賦薄征邑宰愛民者選薦豈非精既曰處民上固當知民情民居篁竹間山獠相雜并敎道苟未至毫髪心起爭太剛易斷折太柔難搘撐䝿在得中道於焉無近名聞多不祥鳥似鴞何足驚遠方此為常慎勿心屏營賈誼度湘水為文弔屈平因君寄杯酒為我酹賈生乾明院碧鮮亭壞衣削髪遠塵垢蛇祖龍孫生屋後不等渭川千户侯尺椽片瓦何嘗有方丈東頭一畝餘中軒四面無窻牖青瓊作枝鈿為葉丹鳯未食蒼䑕走細藤織榻白晝眠寢濃鼻息如雷吼世間百事不歴心門外寒流徹溪口得餘干李尉書録示唐人于越亭詩因以寄題餘水之干越之鄙築基相對琵琶尾琵琶日日有秋聲鴈過洞庭風入葦南斗戞湖波不起長刀剡峰碧耳耳姱娥夜出在寒溪青銅瑩磨光幾里朝因吳客幅蒲輕滿紙如蠶書可喜南軒盆植重臺蓮移種池彤雲赤霧生緒房朝霞變蕊朱粉光白玉入泥不滿盎羽蓋裛露明月璫濁水一石亂鼃黽鑿池五丈如斗方萍根科斗得自在荷芰明年出水央朝天行大車髙蓋徐方來天子雙日延英開犀鞾踏玉陞東陛從臣賜對論宮市諫官御史如指排捧土未能障濁水大夫言斡天關廻黄門白望顔色死始時􅍊奪何縱横有貨晝日不敢行他時五方蛇當酒誰道張郎臨井口㑹勝院沃洲亭前溪夾洲後溪闊風吹細浪龍鱗活孤亭一入野氣深松上藤蘿籬上葛葛花葛蔓無斷時女蘿莫翦連古枝當年吾叔讀書處夜夜濕螢來復去江南雜感樹頭巧婦棲樹下秋蟲織壞衣游子心千里嘗相憶蕩子脚出門便作浮萍根憂來憑五兆拜樹賽黄豚依韻和達觀師山中見寄豶豕在塗龍在澤豺狼食肉麝食柏蹄毛與角不對齒啄觜兩足副以翮既能閑閑住深谷豈使于于佩鳴玉水邊看虹山雨霽夜與明月歸獨宿門前重嶺後羣峰石樓朱殿藏林中銅絲緊轉轆轤響絡緯秋老號西風榮利澹薄無易此彼飲甘醲兹飲水暫將分别向喉舌何異聲色亂眼耳孔孟久沒言可師千古布散葉與枝今來閉户自有趣世上沄沄非我為送萬諤昌秀才志士不戀家安能坐㕮咀儒冠難徒行馬骨瘦可數後僕隔山陂前林遇風雨寒邨夜宿時寂黙誰對語訪石子澗外兄林亭前日秋水漲昨日秋水落偶來尋隱居曾未乖宿諾竹底餘舊徑藤蔓繫新彴馬留岸傍樹風埽林下籜既能置魯酒又復餉楚飵誰知北南澗照影似清洛平生愛幽曠斂迹誠非錯和端式上人十詠幽谷泉幽谷有飛泉入溪知幾里跳珠濺木葉激雨霏巖趾但無箕潁人曽不令洗耳古木隂古木少直枝其下多曲影豈不愛髙陰奈此性所秉千重葉薈翳誰願憩日永寒溪石翠聳寒溪上半隱寒松下水鳥立稜角淵魚游穴罅尋常置庭檻𤨏細不知價孤汀蘋瀟湘歸去人正值江南春始願逢拾羽今乃見採蘋寄語柳使君莫恨日已曛雲際鐘煙昬青櫟道風急隔溪鐘征馬未及息猛虎前有蹤尋聲欲投宿僮僕畏所逢垂崖鞭崖竹出石壁根瘦懸青蛇磔䫇露老節斫骨㸃寒花少年莫翦去騎殺白鼻騧天外峰天外一尺峰國中千仞岳重雲不掩蔽萬里見頭角世人㸔遠碧誰識産美璞秋原菊不為潭上英不助籬邊醉獨占蘭杞鄰原頭自榮悴陶令與太鑿逢人豈無意漁舟火蘆洲一㸃明知有漁人泊江溟杳不分誰方在髙閣是時孤鴈去應認光中落春溪冰春水冰欲開傍岸巳㣲釋魚寒未動鱗獸渡時有迹篙師畏割舟敲拉碎圭璧十月二十一日得許昌晏相公書哀憂向二年朋戚誰與書敢意大丞相尺題傳義廬從來鳯皇鳴不厭寒竹疎茂林多翔鳥要路盛髙車窮巷一如此江深無鯉魚訪施八評事施兄今七十近郭隱茅廬嬾問齊民術喜看莊叟書竹間鳴澗水原際見邨墟識盡窮通理超然樂有餘贈陳無逸秀才良犬不取䑕其人苦尤之近識固未辨善相又能知在鹿忘守穴挃足乃焉而士有志功名局縮秉書詩憔悴未得展磬折忽言卑舉酒一以贈願無羞爾為題陳宰戲綵亭仕宦固已美及親此其難况慕五綵戲而奉興居安翁喜君亦喜翁餐君亦餐嗸嗸園中禽口哺心違丸邑大嵗幸稔衆賴仁政寛還思彼赤子如恐君不歡永慶僧舍松風亭雖按黄金徽滿指清風度但聽松上聲不知松間趣野僧何所樂樂此數株樹寧邀俗客來草緑澗西路寄松林長老大松五丈百嵗餘小松五尺前時種俱有堅完不朽心莫以今輕古為重東溪一片寒玉光夜挂髙枝何所用題松林院靜䆳無塵地青熒續燄燈木魚傳飯鼓山衲見歸僧野色寒多霧溪㾗夜閣冰吾非謝康樂獨往亦何能永州守王公慥寄九巖亭記云此地疑是柳子厚所說萬石亭也因為二百言以荅願當留詠天地磨今古賢愚為埃塵草樹易變改山川無故新眷言零陵守白髪駕朱輪間來問遺老俯迹哀昔人昔人者誰歟元和前放臣下上窮幽荒憔悴楚水濵試觀當此記圖冩未必真最苦來黄溪坐石數游鱗有鳥大如鵠東向立不踆始買鈷鉧潭鄠杜難計緡冉溪袁家洞亂石多磷磷深里與沸白若盡無窮津石渠連巖泓菖蒲被其垠窮勝得其詭衆美誰齊均西澗石為底豈無芹與蘋澗崖如堂席澗響如龍脣折竹埽陳葉羅榻同衆賔其言粲星斗百嵗猶比晨萬石乃淺近尚可資覆巾而况前所說但恐煩鐫珉潘樂二君對雪寄聲似欲予賦適方知之走筆奉呈南方今見雪北客定思家任凍不欺酒競春先著花樓髙休厭上山近未應遮誰問窮居日西窻壓竹斜過永慶院荒凉舊蘭若古屋兩三重庭下已無柏澗邊唯有松石階生薜荔香座缺芙蓉化俗似禪衲破來縫不縫雪中廖宣城寄酒輕舟泛泛昭亭灣春雪漫漫昭亭山寒沙曲渚杳不辨素鷗翔鷺空中還宣城太守閔窮旅雙壺貯醖兵吏頒任從六花壅船户滿酌春色生衰顔醒時但愛雲水好醉後但與天地閑世間取樂必有分何必舞娥尚髻鬟翠竹亭種竹幾千个結亭三四椽遊人多寂靜啼鳥亦留連酒有陶公愛林希阮氏賢我來歸路遠躍馬古城邊彩霓亭髙出嶺頭樹俯窺城下溪半山飛急雨舉手弄晴霓曠望已無極萬縁都與齊自嗟來獨晩征櫂苦言西留别樂和之雪消潭水緑輕舸下灘時漸轉青山去還將故國辭野林看欲動江燕欲逢遲吾語隨州體余慙晚始知松風亭冉冉竹連澗森森松蔭崖始聞清吹度似欲緑琴諧莫識主人意休論髙士懷春城百花發薜荔上陰階雪中懷廣教真上人蒼山闕不遠日日起寒雲堂上㸔飛雪水邊思練裙銅缾生薄凍桂火壓殘薰欲往有餘興林幽路不分下赤山嶺過渡至石子澗别施八評事三嵗守廬次兩廻來澗邊臨塘愛魚樂近竹見人賢今我西歸日逢君小隱年重將車馬去驚起野鷗眠春日拜壟經田家田家春作日日近丹杏破纇場圃頭南嶺禽過北嶺叫髙田水入低田流桑芽將綻霧露裛蠶子未浴箱篚收今我還朝固不遠紫宸已夢瞻珠旒將行賽昭亭祠喜雨未生潭上雲空望山中雨湛湛陳桂樽坎坎奏鼉鼓蕭蕭靈風來蹲蹲祝郎舞莫言春作遲但念寒灘阻何當發泉源緑水浸沙渚不與農者期自將舟人語定作榜歌行暮投丹湖浦瞻祠草樹失認嶺煙霞吐平吞東南吳遠帯西北楚川澤見坡陁龍蛇蹙鱗膂人經興寤歎事往成前古考碑何驗今塗馬立空廡余知骨相貧豈敢望冥許願乗溪流深滂沛隨徹俎若訥上人彈琴祥哀已踰月遇子彈鳴琴安得不成聲子心異吾心十日成笙歌尼父非好音先王禮有節不可過於今莫作風入松懷壟情未任一聞流水曲歸思在溪陰此焉吾所樂目極送歸禽發昭亭二月十三日春泥深一尺車馬重重迹親舊各還城山川空向夕今朝水平岸不畏舟礙磧始隨湍漲發已入青蒼壁落日未逢人孤邨望來客泱泱漫田流青青被壟麥欲霽鳩亂嗚將耕杏先白我無農畝懃千里事行役寄謝昭亭神果不吝深澤乗小舟訪松山法聰上人我從溪口來正值山前雨濕衣逢梵宮有僧善吳語天寒蜜巳空軒靜竹可數歸楫難久留汀鷗自飛舞過鴈洲六言船從鴈洲北去鴈背春風亦歸但見平沙緑水䕡蒿荻筍方肥别達觀文鑒二大士雲衲山中來畫橈江上發何日到山中山花應未歇依韻和文鑒師贈來見寒沙鳥長隨上下波乃知游宦迹不似施松蘿子語馬喻馬吾吟柯伐柯清江挂帆去奈憶故山何宛陵集巻三十七
