  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_039-1a, image: WYG1099/WYG1099-0290c.png}
body:
  text: 宛陵集巻三十九宋梅堯臣撰韓子華遺冰六月侍臣方賜冰我賦得之從友朋開盤一見水玉璞置坐百歩無青蠅熱膚收汗起疹粟不有消渴同茂陵杜子每思赤脚踏韓老嘗苦如甑烝慙無二公才與學享此足與俗軰矜二十二日起居退聞宣三館諸公觀瑞蓮來朝十二旒將出未央殿微聞嘉蓮開獨許侍臣見嘉蓮其如何層樓擁霞片玉輦下天泉日昃不知倦恩魚應亦喜跳沫珠欲濺誰憐與衆歸博士臣䟽賤依韻吳沖卿秋蟲梧桐葉未老露滴玉井牀秋蟲如里胥促織何苦忙苒苒機上絲入夜為䑕傷織婦中夕起投梭重徊徨那聞草根聲膏入然肝腸天子固明聖措意如陶唐下民唯力穡不見田疇荒豈知裒斂人督責矜健强所以機中女心鬬日月光年年租稅在聒耳信已常哀哉四海人無不由此戕吳侯當聽時靜坐愛初凉方將同佳人歡樂舉杯觴緐鳴雜螇螰感愴情不皇况蒙朝家恩兄弟登俊良意慮宜恤物以慰衆所望今者秋蟲篇不異七月章陌上二女素手搴羃䍦柔纖明春荑轉盼動桂葉陽語啓瓠犀阿姊金盛珠阿妹繅籍圭吹香襲行路豈獨下蔡迷無悔婦人未四十容貌已改前男年踰五十嗜慾固自偏勿以色敵心色衰心易遷勿以愛恃久愛移久多愆明鏡知惡看何須妒嬋娟弔瑞新和尚示化何悲戚俱焚只衲衣已隨原火盡空見野雲飛寫影誰方丈栽松舊翠微當年渡江盋弟子獨將歸依韻和吳沖卿新葺南齋移病新秋厭直廬自將僮僕治前除已栽楚客江邊草不學嚴陵瀨上漁紅穗拂欄何蒨粲緑叢無水亦蕭疎從今有月君須飲况與朋親共舍居江鄰幾遷居聞君遷新居應比舊居好復此假布囊家具何草草我貧無囊假來僮笑欲倒所笑還往人生計不足道非用僮僕知雖貧自懷寶聞刁景純侍女瘧巳前時君家飲不見吹笛姬君言彼娉婷病瘧久屢治隔日作寒熱經時銷膏脂醫師尤飲食冷滑滯在脾次聞有鬼物水火陰以施乃因道士逐實得鬼所為手灑桃枝湯足學夏禹馳呵叱出門牆勿復顧嘔遺今雖病且已皮骨尚尫羸豈暇理舊曲未能畫蛾睂當期重相見風月臨前墀景純以侍兒病期與原甫月圓為飲古龍水底鳴素秋江雲不飛江賈愁金陵舊族天禄游家有善笛能娛侯憶侯前年罷姑熟自買蘄州飽霜竹囟肥頂瘦裁青玉鑚鑿商聲五音足牛渚磯邊夜泊時平波不起月中吹老魚跳舞龜出泥雌蛟怨泣雄鼉悲新還中都人罕知交親奏酒隔簾幃丹脣一發妙響馳醉客一見寧非癡昨夜劉郎辭玉巵主人勸謝當勿疑渠今纒瘧尚苦羸他日海蟾圓未遲圓未遲凉肝脾畏肝熱生腦脂生腦脂不得窺永濟倉書事神武立四極收兵銷衆豪輸糧來萬國積庾下千艘貔虎肥於豢麒麟老向槽中州無殍餓南土竭脂膏黄䑕羣何畏青鳩啄且號古梁生菌耳朽堵出蠐螬樹腹懸蛇蛻絲窠挂鳥毛塵埃雖自汨朱墨亦能操直宿愁風雨經年弊褐袍仲尼猶作吏我軰勿為勞依韻和磁守王幾道屯田暑夜懷寄地厚天青冥故交榮謝并何當一壺酒以昔相與傾君今二千石未往戀山楹山楹夜對月孤懷豈忘情䝿者幾何逝賤者幾何生夏簟且安寢明星上東城依韻和孫侔鴈蕩二首海邊巉絶有蒼山怪怪竒竒物象閑百丈素流珠噴薄千重紅樹火回環遠尋僧寺石屏下時遇野人雲屋間今日京華見君說便思輕舸出東關鴈蕩髙髙路莫通銜蘆秋翼入雲峰山頭水闊不見影巖下沙平時有蹤千仞柱天何斂閃萬工揮筆漫輕濃葛巾蠟屐未能著空羨青蒼重復重赴刁景純招作將進酒呈同㑹日光如鎔金湧上滄海流一朝復一朝鑄出萬古愁大鑪石破碎世事安得休明月只照夜時時如屈鉤嫦娥與玉擣藥何所瘳大患不自治更被蝦蟇偷我思天地間二物最取尤措置尚如此細故曷用憂著書欲傳道未必如孔丘當時及後代見薄彼耽周功名信難立德行徒自脩勞勞於我生蔕挂同贅疣不如聽鄰笛就其舉杯甌笛不煩教養酒不煩取求從今醉至春從夏醉至秋勿禁雞豚魚間薦鶉鴈鳩况多南方物鹹腥美咽喉計較無以過試共阮籍謀薛簡肅夫人挽詞四首蕭公當䝿日小吏引輕軒四德有遺美六親無異言立孤傳世嗣垂範在閨門澮水終歸柎秋雲逐去魂嘗聞求子壻不似怒甘公莫以昔人比皆為當世雄家聲新慶續國禮舊恩隆必與齊姜墓千秋壟樹同冠劒將朝去常知好直言戒辭猶可託先見久應存瑩白冰兼玉清芬蕙與蓀堂塗從此閉何日卜邱原美合周詩播魂先岱嶽歸空堂遷舊榻素月照靈衣珠翠香沈匣丹青影挂幃百年親戚淚併作露霏霏送淮南提刑孫學士淮南木老霜欲飛順令恐縱諸侯威命書纔出邸掾謁巳見衣繡車迎歸樂莫我聽筵莫迓清如蟾蜍夜吐暉不須久作平反吏自合横經親帝闈八月三日詠原甫庭前林檎花秋蠧無完葉疎叢有瘁莖偶來庭樹下重看露葩榮衆自守常理獨開偏見情從今數霜月結子尚能成送河陽通判張寺丞從富公弼子諒張公愛神鍔佩服近玉麟又拭華陰土光彩一以新百里無惡獸千里無冤人今朝欲何之土上延平津應當出匣飛騰波􅒙秋旻送淮南轉運李學士君錫三都重兵廩命使總八方淮南舟車衝三楚籠利長惟時有才彦數計等桑羊八月賜詔行朱斾插大航汴湍入秋漲東鼓下鏜鏜今日發大梁明朝過睢陽睢陽授經地父老認道傍同業八十人或䝿或為郎先生殁大官弟子無荷囊乃知詩書傳要在明三綱隋末聞仲淹來學去佐唐唐初稱名臣鮮及杜與房親見慕義人專門起輝光我聞房杜流已顯惟王張雲漢幾萬里星宇爭耀芒歸來立螭頭莫愛魚稻鄉君錫與王伯庸張端明同在睢陽希文講下重送楊明叔并序行而有以贐者助所不足也車馬子有裘服子有貨具子有所可贈者詩言爾故先為七言以送將以道彼美而樂乎往也子不為重邀予以規又作五言應其請君將㑹稽去舊蹟可以嬉予因狀其美贈子臨路岐子不以為樂但願有以規噫吾豈其說畏子未及裨既求不語子吾曷忍子欺前年子渡淮夜泊洪澤􅎠有鬼稱使者來告風波期子時再拜謝乃被鄰船嗤逡廵鬼復至復附船家兒怒彼慢嗤士明當使驚危船兒傍舷廽走若一足䕫翌日各解舟出浦風動旗子獨乗安流彼受横浪吹此事非子傳焉得他人知昨逢令弟藴備述果不疑越俗素重鬼慎勿啓其私子口有仁義子腹有書詩子嘗談王道怪語固未宜近聞蘇才翁問子辟者誰得非外戚侯子怒巳豎睂今我儻得罪甘與蘇同之送董傅秀才之汝陰社燕已歸盡秋鶯猶繞林久為梁國客不起㶚陵心徒歩赴朋舘遠遊無橐金江君丈人意莫入楚鄉深鄰幾常止此行送張子野屯田知渝州舊居苕溪上久客咸陽東歸來得虎符馳馬向巴中歌將聽巴人舞欲教渝童况常善秦聲樂彼渝人風忠州白使君竹枝詞頗工行當繼其美貢葛勿悤悤送楊子充愈知資陽縣家近古臨邛聞多木蘭樹其人襲芳馨乃有相如賦成名三十年始見列鴛鷺出為資陽長秋鬢巳㸃素天子愛黔黎歸與蜀民諭當時同洛陽過半作邱墓屈指今所存無如君最故唯酒可餞行不飲車空駐送司馬君實學士通判鄆州君家世典史君復續祖為蘭臺未成書汶陽從已知將行我何贈一誦溪堂詩聞彼多蒲魚可助鼎與巵在昔阮嗣宗初赴東平時醉扶乗蹇驢圖盡猶可披今見國門外徒馭不驅馳十里馬一歇五里車一脂不得同鴈羣相送過寒陂送程殿丞知韶州從益韶州使君行請問韶石名傳聞古帝舜石上奏九成鳳皇為之下朱鳥不復鳴舊祠亡玉琯四序安得平至今南方熱臘月裘服輕事外共廢酒曲江風物清寄岳州孫屯田琳從來洞庭好都在岳陽樓明月一千里寒光三萬秋年華有時盡風物不知休太守憐予句應如沈隱侯大愚大愚不量能品藻輒巳出朝以軻為同暮以丘為匹其人豈鷹雀鳩蛤化五日指鹿危二世師歆造新室雖云詐力尚終自殞斧鑕宛陵集巻三十九
