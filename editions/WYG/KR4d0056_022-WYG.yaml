body:
  text: 宛陵集巻二十二宋梅堯臣撰次韻景彞奉慈廟孟秋攝事二十韻閟宮初吿饗駕駱已迎秋公衮惟時攝齋廬用爾休椒漿兹往奠鸞馭或來游任姒徽音繼邦家故事脩前期嚴受誓侵曉肅傳騶雞狗藏深戸蚊蠅響暗溝别祠縁相漢舊禮效宗周蕭氣接庭燎鼔聲通市樓樂章分廟奏牲物用毛柔木主升新座牙盤列庶羞叩階除劒履宿羽動梧楸錫胙人移俎焚辭漏晝籌豆籩將降陛胥史劇奔牛事畢歸烏巷陰餘晦綵油驅車多叱咤負擔起歌謳却直中書省重瞻十二旒詞供五更敏詔示四方優密議存王體斜封賛禹謀勤誠酬異等潤色闡嘉猷彊擬鄴中詠我思康樂侯次韻和景彞秋興日月機上梭年華東注波未驚凉葉墜已見白髮多牧馬歸方健調弓力漸和籬邉賸晚菊陶令奈貧何司徒陳公挽詞二首位至三公有恩加賜諡無再調金鉉鼎屢剖玉麟符已歎鸞同穴還嗟鳳少雛擁塗看鹵部誰爲畢三虞公在中書日朝廷百事崇王官多不喜天子以爲忠富貴人間少恩榮殁更隆若非笳鼓咽寂寞奈秋風秋思梧桐在井上蟋蟀在牀下物情有與無節候不相假寥寥風動葉颯颯雨墮瓦耳聽心自靜誰是忘懷者送葉都官赴蜀中倅仲舒每有人之蜀先慿問海棠徒知花厎醉不報樹頭芳上馬秋風急登山古路長西南生片月遥想見清光次韻荅吳長文内翰遺石器八十八件山工日斲器殊匪事樵牧掘地取雲根剖堅如剖玉食具與果具待賔良有勗亦將茶具幷飽啜時出俗公何都贈予金多不入目我家固宜之瓦盌居漏屋得此尤稱竆客來無不足唯應赤腳婢收拾怨常酷夏席堆靑齏冬盤飣旨蓄竟無梁肉饌甚媿蕭家録送張君儀太祝僉判奉寧軍社雨燕巢空古陂蔆葉老燕去春當還蔆枯秋不早莫以西風髙於焉亂懷抱指塗無幾里駛馬一秣草彼美賢主公文章爲世寶笑談樽俎間勿負風月好寄題陽武宰王安之慶豐亭官爲人父母身自奉其親結宇後園中㪚步以怡神寒温適所適朝夕饋爾珍諸孫同在傍嬉戲情各均庭下香草秀梁上乳鳥馴乳鳥名曰烏反哺豈不仁香草名曰蘭相襲使之紉二物已可知百里風俗淳北州人有致達頭魚于永叔者素未聞其名葢海魚也分以爲遺聊知異物耳因感而成詠孰云北海魚乃與東溟異適聞達頭乾偶得書尾寄枯鱗冒輕雪登俎爲厚味向來昧知名漁官疑竊位有如臧文仲不與柳下惠從兹入杯盤應莫慙鮑肆送柳祕丞大名知録瑾言今魏都去聽我願少休地息戎馬牧民苦黄河流渾渾發西極奮奮入九州自古患決溢于今爲瘡疣禹力順而東漢防築其陬完壞非一日利害經千秋主印無切責治水莫輕謀府公山西種貴已爲通侯樽酒與歌舞上客共優游送何都官通判䖍州若谷楚越封圻接帆檣上下頻商通洲橘熟信到嶺梅春白紵歌脩頸金盤饋紫鱗同勤太守職龔遂漢名臣秋雷春雷不發蟄秋雷不收聲向無一日雨今無一日晴昨夕玉女笑閃閃揚目睛雷公與雨師自取號令明舒慘由上天誕妄推五行日月不粒食安問下土耕雖然屋瓦爛還有地菌生損彼以益此誰能較人情堯時不無水用禹水乃平黎民思堯仁往往見於羮猶吾大君意星火立水衡水衡雖努力豈將雷雨爭送俞尚寺丞知蘄春縣應見言風物于今有貢蛇潛蹤逺鼃黽飲露上蒹葭清潔一如此傷殘都莫涯君惟脩職業男耒女繰車和劉原甫白鸚䳇出注輦國注輦在西海去中州四十一萬舟行過西王母三年乃達番禺也能言異國鳥來與舶帆飄嘗過西王母曽殊北海鰩雪衣應不妒隴客幸相饒因憶禰處士舊洲蘭蕙凋送劉定賢良下第赴廣陵令劉蕡不登科衆口誦其策得者爲之羞聞者爲之惜摧藏一時屈論議千古白至今簡篇中一字不敢易其言究時病舂刺若戈㦸引經見大法非蹈春秋僻我朝屢得人無不陞顯赫乃知所中否實命繫通厄中則首公相人情作冠幘否則走仕塗人情作履舄秋風廣陵城千里夷門客壯心雖暫失美實有時獲怊悵以送君致龍翻㸃額九日永叔長文原甫景仁鄰幾持國過飲秋堂雨更靜佳菊粲粲芳置酒延羣公掇英浮新黄心猶慕淵明歸來醉柴桑莫問車馬之去迹亂康莊送鮑都官錢塘通判文鰩游西海夕飛向吳洲朱鼈生明月淵潛未可求由來有變化何能計沉浮君子蹈出處誰將等隅陬臨水賦二者相送無離憂送通州通判刁國博古郡見郎山海雲遮一半陽烏出滄波光彩臨硯案小吏抱牘來磨墨為㸃竄豈以島嶼人百事皆漫漫朝廷通守任不使守專斷是恐繆其才民勞乃生亂辛勤雖然多魚蠏莫知算夜月上蓬瀛偷閑舉杯看因行計較足少别休興歎吳資政挽詞二首天下文章老爲公地厎銘平生懷道德鋪寫若丹靑蒲市一朝罷洛人皆淚零嗟嗟廟堂貴今以柏爲庭峩峩陘土厚自古葬賢人百尺不逢水千年空閉春夜臺埋琬琰隴道刻騏驎西望縁纓淚曽無幕府賔九月二十四日大風秋飇無蹤迹空中聲奔馳枯桑因已驗老病仍先知驚沙入破隙危葉墮緑枝幽懷聒不寐山岳將恐移二十五日雪秋露未爲霜秋空已飛雪著樹増葉危􅎹叢憂菊折平明開戸看斗覺頽檐潔天時莫倉猝誰預衣裘設送唐待制子方北使王命來天外閼氏坐帳中儀雖聘鄰國禮豈異和戎漢使方持節邊人自帶弓唯應沙漠凜不減諫臣風送劉元忠學士歸陳州省親芸香閑祕秩蘇合著新裘公子言歸日天王賜問優治分周太宰禮重漢諸侯拜慶無如樂黄金作酒舟送陳賢良忠正軍僉判書對三千字恩科第一人鯤魚飛北海龍劔躍平津直悟聰文主深論險尅臣已能明世弊枉作幕中賔送韓持正寺丞知餘姚君家二仲父連爲吳越宰錢塘與蕭山治跡應無改魚鰕莫厭腥網罟從人采天晴姚江深縣鼓朝翻海送周介之學士通判定州相公秉文武視卒如嬰兒今徃佐其軍豈不重撫綏我有愚者慮贈君臨路岐相公居幷州拓土曽不疑羌戎起潛變一旦覆我師我師無不勇將吏實易之常抱雪恥志此㫖君所知兵家尤戒貪持重養以威正當土門路自昔屯虎貔朔朝及旬望大校飫酒卮未若投簞醪共飲河水湄古人維其均今人意參差臨事欲之死身往心已移上能同甘苦下必同安危願君因議論兹語何難爲送畨禺杜杆主簿行識桄桹樹初窺翡翠巢地蒸蠻雨接山潤海雲交訟少通華語蟲多入膳庖不須思朔雪梅吐臘前梢還柳瑾祕丞詩編吾友蘇子美聞昔許君詩子美今下世令人重嗟咨當其不得志泥水蟠蛟螭未激西海流安可氣吐霓吳洲逢朱鼈腹有百碧遺他時使我觀我觀顔忸怩便欲焚筆硯奈何難爭馳送張殿丞吉甫知資陽單騎欲之蜀綵衣初過秦王喬鳬是舄陶令酒名巾灞上愁逢雪褎中喜見春兩川風物美不似走京塵丁端公北使出聘天王使來乘御史驄駞車看燕雪貂扇禦嚴風俗向殊方問言從信使通罽庭觀拜舞不似未央中張斯立遂州司理自身買馬箠爲婦置羃䍦將出咸陽門同涉蜀道危疇昔未禄仕日夕講書詩不能靑雲髙乃作黄綬卑前人未遇時往往甘棲遲如築九層臺始起一板基雖然用功深歳久終莫隳我今惜君行無力可致之去勿藉芳草世俗多夸毗寄題哀賢亭馬仲闕龍圖墳前所剏立也蒼蒼墓門樹亦有黄鳥哀賢者不在世常恨埋蒿萊山根入溪泉流響出夜臺東方見子胥助濤髙崔嵬荅建州沈屯田寄新茶春芽研白膏夜火焙紫餅價與黄金齊包開靑篛整碾爲玉色塵逺及蘆厎井一啜同醉翁思君聊引領送曹測崇班駐泊相州知君鄴城去厯覽古時蹟峩峩銅雀臺其下遺瓦礫不化鴛鴦飛多近蟾蜍滴哀哉魏武帝雄智圖九錫俄聞望西陵作妓向朝夕曽何百年間事往如霹靂空餘幾仭土陰峭古蘚碧下有牧羊人上有牂與䍽寒風吹枯草草短聲刺刺珠翠爲埃塵冠劔埋百尺顔回飲一瓢仲尼不暖席擁徒食人肝生莫如盜跖令名今猶存焉在刻金石我軰當太平白首無戰敵又知爲善樂尚媿苟仕籍行行勤撫兵竪威酬德澤十一月二十三日歐陽永叔劉原甫范景仁何聖徒見訪之什夷門魏公子來過抱關人車馬立市中貴義不恥貧市人無不驚此老面黧皴豈將流俗眼能辨玉與珉爾後幾千載此賢埋埃塵誰謂四君子蹈古猶比辰上馬後苑門訪我東城闉爲公開蓬戸沽酒焚紫鱗銀杯靑石盤共飲不計廵薄暮各已醉歡笑頽冠巾來旣無猜嫌去亦無疎親曷若世上士惟顧勢力均次韻和原甫陪永叔景仁聖徒飲余家題庭中枯菊之什九日車馬過我庭黄菊鮮重來踰七旬枯萼無復妍自非凌霜操枝葉徒相連衰敗未忍去根荄尚翹然不意憔悴叢猶爲君子憐固值時節晚豈恨地勢偏直如木上蘿縁蔓欲到天一朝風雪厲零落向暮年至此事乃等髙低復何言公休誇松柏彭祖與顔淵各不相健羡焉能論柔堅願公時飲酒周孔今下泉次韻和永叔飲予家詠枮菊今年重陽公欲來旋種中庭已開菊黄金碎翦千萬層小樹婆娑嘉趣足鬢頭插蕊惜光輝酒面浮英愛芬馥旋種旋摘趂時候相笑相尋不拘束各看華髮已垂顛豈更少年苔色緑自兹七十有三日公又聮鑣入余屋階傍猶見舊枯叢根底靑芽歎催促但能置酒與公酌獨欠琵琶彈啄木所歡坐客盡豪英槐上凍鴟偷側目盤中有肉鴟伺之烏鳥不知啼觜曲諸公醉思索筆吟吾兒暗寫千毫秃明日持詩小吏忙未解宿酲聊和屬送李獻甫寺丞知虹縣先歸金陵今日歸爲美塗金作馬纓願言膏沐婦相望石頭城得邑柳隄合還家梅野晴里中多樂事州牧是名卿衞尉邵少卿挽詞二首位至九卿亞年過七十春桐鄉歸葬日棠樹去思人霧裏開蒿隧原邉起石麟地遥徒有淚灑向北風頻買得吳門宅歸來自種花春風未歌徹東岱已魂賖昔作千年調今爲一日嗟人將鐫美德磨石取江沙次韻和永叔對雪十韻玉月棃梅柳絮字皆不用紛紛何亂目凜凜自開門著莫風難定侵凌物已緐装成新樹色遮盡古苔痕冷入梁王苑淸乗衛國軒欺貧凍蓬蓽増險想轘轅小隙皆能及洪爐逼不温雲衣隨處積水甲等閑屯團戲爲丸轉堆雕作獸蹲豈愁穿破履幸喜有淸樽誰問諸公子髙樓與後園寄題劉仲叟澤州園亭城臨太行谷谷暖宜草木旣移洛陽花又種阮家竹五色雜黄紅一林常翠緑其間廣庭開亦欲危柳築春歸百禽號搏黍及布穀桑上啄椹食林下窺果熟果收椹已盡飛去不須逐婆娑黄楊樹誰謂逢閠縮物猶有進退此理何用告余心當效君未有地可卜綴書豈貪樂且以苟微禄送李灝秀才南歸乘驢雪中來别我千里歸江南梅花發身與越鳥飛幾年客大梁著盡箧中衣空餘一束書去恨知者稀宛陵集巻二十二
