body:
  text: 宛陵集巻二十八宋梅堯臣撰和資政侍郎湖亭雜詠絶句十首逺山插雲千萬重一望不可暫前嶺與後峰翠色濃復澹蓮塘不畏塘雨急鈿葉自相遮紋禽忽驚去衝落波上霞漁潭煙潭深不極鑑碧無蔆花日脚下波心澄江見魚鰕稻畦淺淺碧水平青青稻苗長偏知楚客愛白鷺飛下上苔徑林間夏雨滋復有斜陽照緑淨不摇風從教春草笑流泉石齒嚼寒聲粼粼縈曲處有時浮落英又過城根去小橋伐桂向芳洲跨波灣勢小時愛游人渡游人在林杪漁艇古木刳為舟野藤牽作纜釣人寒雨中逺望煙蓑暗採蔆紫角蔆實肥青銅蔆葉老孤根未能定不及寒塘草汀鷺食魚日巳晚矯翼煙際還不與鴈鶩競風標亦自閑王德言夏日西湖晩歩十韻次而和之雨餘殘照在塘靜獨行行荷積水珠重天收霓帔輕倦禽依卧柳聚蚓殢坳泓帽側林枝礙裳褰野蔓縈芡韜園客剥蒲刃水祅驚決決流泉活濛濛夕霧平榴房生蠧落蛛網害蟲成坎黽無時怒渾魚自樂清髙臺從獸窟古道有根横冩景未能就娟娟月上城新治竹軒作軒仍見竹瀟灑排青幢斜烏與落月靜影晝寒窻光沒影亦沒激水自淙淙夜深猶讀易誰更憶清江麥門冬内子吳中手植甚繁鬱罷官移之而歸不幸内子道且亡而兹草亦屢枯今所存三之一耳遂感而賦云香草葉常碧本生巖澗邊佳人昔所愛移植堂堦前自吳北歸梁復以盆盎遷佳人路中死此草未忍捐與我日憔悴根不通下泉勤勤為澆沃稍見萌穎鮮終當置墳側長茂松柏埏野鴿孤來有野鴿觜眼肖春鳩飢腸欲得食立我南屋頭我見如不見夜去向何求一日偶出羣盤空恣嬉遊誰借風鈴響朝夕聲不休飢色猶未改翻翅如我仇炳哉有靈鳳天抑為爾儔翕翼處其閒顧我獨遲留鳳至吾道行鳳去吾道休鴿乎何所為勿汙吾鐺甌孫曼叔暮行汴上見鶻擊蝙蝠以去語於予野鶻性決裂所食唯獰飛小鳥不入眼拳發强弩機日暮未有獲豈擇大與肥瞥下攫蝙蝠去以填腸飢休笑老鴟飽銜得腐䑕歸寄宋中道爾書我不荅爾怒從爾罵天馬新羈時氣横未可駕儻我一日死爾豈無悲咤唯知道義深小失不足謝棃花憶欲問棃花發江南信始通開應寒食雨落盡故園風白玉佳人死青銅寶鏡空今朝兩眼淚怨苦屬衰公畫竹枝扇石上老瘦竹忽在紈扇中執之意巳凉不待摇清風小節未見粉淚㾗應合紅日將炎暑退畏蠧生秋蟲雨日苦風思江南擺磨萬木聲朝吼暮不止吹沙作雲飛物狀顔色死還念江上山落瀑鳴幾里茅茨松竹間翠滴門前水下窺石穴魚出入數十尾是時殘照微古路誰家子羸馬入煙林區區何若此昔笑今巳迷薄官正如彼何當却歸來臨流重洗耳送謝師厚歸南陽竹館陰以風灑水坐猶熱念子逺歸時焦煙起車轍落日原上微鳥棲人欲别我心明月在相照異盈缺資政王侍郎南京留守百世興王地乗時巳建都離宮萬户寄京邑四方模尹以名臣擇朝仍宿哲俞果資卿屬重將俾國人蘇迎餞車交轍奔馳士結塗許嗟人惠奪宋遟德恩敷日月天闈近山河地勢趨壓城隋柳密開苑漢池枯文物希前代謳歌得大儒鄒枚跡雖古賔從豈今無送通判太博相見不在久見久未必親無為嵗月淺豈不膠漆均猶嗟欲别日事疊如排鱗安得獨攜酒逺送秋水濵和韓子華桂花莫以天下桂皆為月中物猶言月有野豈無狡窟空山桂花多豔色粲然發樵客不知䝿奈何薪㸑屈宿安上人門外裴如晦胥平叔來訪胥裴喜我至冒雨夜出城燈前相對語怪我面骨生為言憔悴志因意多不平亦見子頷鬚長黑已可驚知子有所立毛髪隨世情子心且如舊後軰苦前輕宋中道失小女戲寛之宋子失女嬰苦將造物怪造物本無惡爾責亦巳隘且如工作器寧復保存壞收涙切勿悲他時多壻拜刁經臣將歸南徐許予尋隱居之所及亡室墳地因走筆奉呈欲居江上山試與問京峴常觀鮑家詩心慕已不淺行當卜結廬依農事清畎傍葬吾先妻同穴晚未免買谷勿險深求岡要平顯松竹應所宜蒿萊預教翦我志決不移君言幸須踐尉氏縣阮籍嘯臺古城多瘦棘莽莽連荒臺不見長嘯人黄土空崔嵬北顧蓬池上枯廢生蒿萊當時思大梁還望巳徘徊今我復懷昔豈不傷且哀鳥呼有遺響英靈同土灰送趙仲寶永興乾耀提舉捉賊知君少以勇曾向蕭關戰横刀突魯圍奪馬傷胡箭當時獨免歸猛毅邊人羡今來提漢卒冦盜清秦縣未足賀功名功名他日見合流河堤上亭子隔河桑榆晚藹藹明逺川寒漁下灘時翠鳥飛我前山藥植𤨏細野性仍所便令人思濠上獨詠莊叟篇早至潁上縣夜發曉未止獨行淮水西明知寒草露暗濕瘦驄蹄半滅竹林火數聞茅屋雞秋天畏殘暑不為月光迷欲陰鸜鵒知天風鵓鴣知天雨塗路厭塵昬車馬煩泥阻陰仍老易覺體賁預辛楚安坐與壯年慎勿忘酒脯正陽驛舍夢鄭并州寄書開之即三山圖也我來清淮側夢得鄭公書開書一把玩乃是三山圖山形雄且䆳筆畫簡而踈紙幅不盈尺萬仞勢有餘巻置懷袖中意獲寤已無新㛰前日為新㛰喜今復悲昔閫中事有託月下影免隻慣呼猶口誤似往頗心積幸皆柔淑姿稟賦誠所獲登舟向起風沙地暫假烏榜還浩然起逺思欲與魚鳥閑景目洗巳清詠句稱且慳時看秋空雲兩意濃澹間諭鷗翩翩沙上鷗安用避漁舟漁人在魚利何異爾所求釣蟹老蟹飽經霜紫螯青石殻肥大窟深淵曷虞遭食沫香餌與長絲下沉寧自覺未免利者求潛潭不為邈取􅒕東灣暖無沙有􅒕淵泥下輕舠復翠竿預致曾誰捨刳肉不知數持為楚鄉鮓嗜味固足珍况亦椒橙假潁水費公渡觀飲牛人渡口飲牛歸邨墟夕陽裏黄犢未及羣抱帯過寒水利心乃如仁耕領破不止當時彼何髙獨能譏洗耳潁水潁水苦流瀑淺平秋與冬岸深開地勢厎碧冩天容道枉隨灣去邨淫盡日逢迷魚是潭曲寧見窟蛟龍打魚插葦截灣流寒魚未能越安知罟師意設網遮其闕不須芳餌懸何待清歌發所獲勝綸竿寧聞憂澤竭八月就湖上㑹飲呈晏相公明當是重九黄菊還開不先將掇其英秋逕未能有頽齡無以制但不負此酒紅頰誰使歌公憐牛馬走九日擷芳園㑹呈晏相公今日始見菊雖見未全開猶勝昔無酒持望白衣來破纇浮金英雜蟻巳盈杯何必探丹萸結佩上髙臺自不媿佳節安聽飛鴻哀謝晏相公刻意向詩筆行將二十年嘗經長者目未及古人肩昔慕荀文若多稱王仲宣今慙此微賤重辱相君憐道中謝晏相公寄酒赬泥墨印幾壺醁將慰窮途阮歩兵一夜臨流對明月舉杯愁聽鴈來聲水苔深苔何所若苦詠費毫尖繞繞水仙髮茸茸蛟客䫇緑縈秋石淨嫩值翠篙黏尚芼參差荇薄言無此嫌新鴈塞鴈與寒來夜落汀洲宿泊船人不寐月下聲相續依韻和晏相公微生守賤貧文字出肝膽一為清潁行物象頗所覽泊舟寒潭陰野興入秋菼因吟適情性稍欲到平澹苦辭未圓熟刺口劇蔆芡方將挹溟海器小已瀲灩廣流不拒細媿抱獨慊慊疲馬去軒時戀嘶芻秣減兹繼周南篇短橈寧及艦試知不自量感涕屢揮摻以近詩贄尚書晏相公忽有酬贈之什稱之甚過不敢輒有所敘謹依韻綴前日坐末教誨之言以和嘗記論詩語辭卑名亦淪公曰名不盛者辭亦不髙寧從陶令野公曰彭澤多野逸田舍之語不取孟郊新公曰郊詩有五言一句全用新字琢礫難希寶嘘枯彊費春今將風什付可與二南陳塗中寄上尚書晏相公二十韻驚飇入林鴉亂飛舞空落葉相追隨秋權摧物不見迹但使萬古生愁悲登山臨水昔感别身作旅人安得宜單舟匹婦更無婢朝餐每媿婦親炊平生獨以文字樂曽未敢齒貧賤為官雖寸進實過分名姓巳被賢者知踈愚生不謁豪䝿守此退縮行將衰潁州相公秉道德一見不以論高卑久調元化費精力猶且未倦刪書詩唐之文章剔蕪穢纖悉寧有差毫釐謂其躭學可與語便語淵奥袪佹疑浮言近意不歴口直欲海窟挐蛟螭再拜膝前荷勤誨垂槖稇載歸忘飢解艇水驛無幾舍新詩又遣牙兵持上言行李覽物景聊可與婦陳酒巵下言狂斐頗及古陶韋比格吾不私相公䝿且事翰墨我軰豈得專遊嬉今將蒿芹薦俎豆定亦不以微薄遺嘗令有詠無巨細當因川陸舟車貽日對順流思疾置老魚姦怯潛鱗鬐舟中夜與家人飲月出斷岸口影照别舸背且獨與婦飲頗勝俗客對月漸上我席暝闕亦稍退豈必在秉燭此景巳可愛舟中行自採枸杞子野岸竟多杞小實霜且丹繫舟聊以掇粲粲忽盈盤助吾苦羸苶豈必採琅玕自異驕華人百金求秘丸昔聞王子喬上帝降玉棺此焉即不免但願在世安蔡河阻淺陸乏百鈞駝水假孤艇進潁苦灣灘長曲折劇篆印蔡方阻淺涸寸歩且慳吝膠舟看在前暗磧疑難慎誰能使奡盪空自思禹濬丈夫少壯時必在馳駔駿黄駮維舟飯孤邨隔岸見黄駮闕牧正苦飢瘡鳥復下啄閔心無柘彈投塊徒自數力小不能中汗顔慙且渥入澤王河口逺水路已别古汊未窮源定知前山雨瀑泳至且渾暗生秋草下稍復夏潦㾗更去待月上猶應可到門西華逢李令子翼適從潁水歸道逢西華長不見二十年顔鬚我非曩君問洛陽日舊友多泉壤更别如前時應復少吾黨合流值雨與曹光道飲秋風號衰林秋雨阻歸客賴有故時交舉杯聊岸幘談兵與論文曾不渉陳迹畢竟無所施醉去思泉石寄送謝師厚餘姚宰我從淮上歸君向海澨去安知無幾舍邂逅不相遇頗知飛空雲到月不得附月行既不留雲亦值風故誠知㑹合難豈是忘所赴我雖躡新屩心不捨舊屨誰謂若世人食𤓰思弃瓠君南我起北日見陽鴈度兹欲逺寄音鴈行髙且遽但誦金石言於時儻無忤李密學遺苔醬脯云是自採為之潩流寒且急岸草巳彫摧石髪尚堪把江人曾不來誰將烏榜去留採碧潭隈持作吳鄉味能令案渌杯宛陵集巻二十八
