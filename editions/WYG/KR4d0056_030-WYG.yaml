body:
  text: 宛陵集巻三十宋梅堯臣撰送李密學赴亳州倦輸關内粟遂請潁川符治績可稱最士民將以蘇譙都君命重苦縣祖風殊仙檜留陰在甘棠即化敷行舟通逺水候騎溢長衢他日人懷望煙雲自滿湖送樊秀才歸安州開元有謫仙酒隱向安陸子嘗慕其人文字不拘束月下每醉吟落紙輒數幅今當安陸歸白酒邨中熟一名猶未成雙親淚盈目切莫苦銜杯無心不擇禄去去煙水間野禽嗥古木聞聲不得名將投山舍宿此趣自可嘉非如走塵轂依韻李密學合流河口見懷二水交流抱閭井清潭幾曲自淵回已浮畫舸遥遥去更愛雙鷖泛泛來觀理蔬野薺不堪食蕪菁今正肥夏畦人所病老圃方可窺乳雀爭銜蝶鳴雅各䕶兒於陵豈復有空學桔橰為哭尹師魯謫死古來有無如君甚寃文章不世用器業欲誰論野闕王傅招辭些屈原平生洛陽友零落幾人存泛舟和持國緑源去未窮夾岸樹濛濛弱蔓低侵水殘芳不隱叢浣衣思越婦折筍擬江童薄暮廻船處潭魚動鏡中欲晚訪韓持國忽道損見過不克往持國示詩因荅西雲沈日脚命僕駕我車我車已在庭有客方詣廬談笑不覺夕雞黍且煩渠重約勿以怪但當摘園蔬送京西轉運李刑部移京東轉運鉞列藩環王都遂分東西道統制連别京守臣多碩老外臺持權綱才具必美好公今且更踐入用頗不早乃令山東粟餉餽嵗可保古路趨汶陽長風吹緑草送李庭老歸河陽五月馳乗車歸心豈畏暑道中多清陰日中不遑處函谷自控帶大河無險阻時平獨往還拜壽觴屢舉詠雙杏子其核亦然子核成雙杏將寄同心人定棲鴛鴦魄為物豈無因和王仲儀楸花十二韻春陽發草木美好一同時桃李雜山櫻紅白開緐枝楸英獨歩媚澹紫相參差大葉與勁幹蔟萼密自宜圖出帝宮樹聳向白玉墀髙絶不近俗直許天人窺今植郡庭中根遠未可移但欣東風來不恨和煦遲山禽勿蹙踏蜂蝶休掇之昔聞韓吏部為爾作好詩愛陰無纖穿就影東西隨公今亦牽此端坐曾莫疑目昬我目忽病昬白晝若逢霧窺驚隻物雙書輒下筆誤來人髣髴是飛鳥朦朧度紜紜孰辨别此已忘好惡送韓八太祝歸京師求醫少年潔而腴茸茸頷有鬚冐熱跨馬去去去天王都借問去何謂就醫將疾驅客曰實誑我健壯其非夫敢告固不紿但怪所見愚瘠者未必病病者未必癯天馬不著肉日走萬里塗山熊豈無膏養體唯恐痡滯結在於内安得形肌膚厥貌雖美好厥疢勿須臾療之欲其漸熾之非愛軀此行不飲别安得持酒壺記春水多紅雀傳云自新羅而至道損得之請余賦赤羽異蒿鷃來自東夷國羣集成皋間翩翩皆一色舉臆發朱砂為瑞應火德穿屋彼非類啄粟慙與食清聲殊啁啾所畜每陋逼應當放之去重展萬里翼持國遺食乞食非為貧妻病妾且死晨㸑不煖釜朝飯亦輟匕遺我我所恤食我我所恥我恥曾我求我恤寧我止應乏豈在豐赴意實未鄙漂母殊下鄉為惠得終始捫蝨得蚤兹日頗所愜捫蝨反得蚤去惡雖未殊快意乃為好物敗誰可必鈍老而狡夭穴蟻不齧人其命常自保同道損世則元輔游西湖於卞氏借雙鶴以觀塘蒲蔭緑水䓿萏豔脩渚想像華亭野但欠鳴鶴侶同來三四人趣尚頗相與思見此清禽無能覿翔羽城隅有大第世本官吳楚嘗同太湖石不惜持金取欲作園林勝園林寧暇覩今當問其家借賞無吾拒果亦致之來奮毛如喜舞雖生滄海心翅重不得舉還爾稻粱貪崇邱在何所送上虞孫主簿稽山參雲深剡水與天碧行將啼鳥親翫不游鱗隔况世住新安又嘗為粤客風物知所諳窮幽梯翠壁寄題金州孫御史處陰亭有形則有影畏影當念形日月難久晦處陰乃暫停光照不復離疾走何所寧當是誚尼父我軰烏忍聽結廬雖可託夜燭亦熒熒直躬觀罔兩將此同醉醒石榴榴枝苦多雨過熱坼已半秋雷石罌破曉日丹砂爛任從雕俎薦豈待霜刀判張騫西使時蒟醬同歸漢七夕古來傳織女七夕渡明河巧意世爭乞神光誰見過隔年期已拙舊俗驗方訛五色金盤果蜘蛛浪作窠同諸韓及孫曼叔晩游西湖三首晩日城頭落輕鞍果下凉野蜂銜水沬舟子剥蔆黄木老識秋氣徑幽聞草香幅巾聊去檢不作楚人狂爍電未成雨凉風先入衣青天忽開影紅日尚餘暉蛺蝶作團起蜻蜓相對飛嘲謔不覺夕跨馬月中歸舟中演滿意不淺却坐林塘景欲昬翠色蜻蜓立蔆蕊青絲騕裊秣城根韓玉汝遺澄心紙二軸初得此物歐陽永叔又得於宋次道又得於君伯氏子華今則四矣三得澄心紙吾嘗再有詩初能條本末不復語興衰堪入右軍迹暫無幼婦辭君家兄弟意將此比烏絲和王仲儀二首麝香游伏柏林下食柏遂生香空知噬臍患豈有周身防赤豹以尾死猛虎以睛喪儻或益於用捐軀是其常凌霄花草木不解行隨生自有理觀此引蔓柔必憑髙樹起氣類固未合縈纒豈由已仰見蒼虬枝上發彤霞蕋層霄不易凌樵斧誰家子一日摧作薪此物當共委七月二十一夜聞韓玉汝宿城北馬鋪暗樹秋風擺葉鳴桃枝竹簟冷逾清孤燈澹澹短亭客半夜蕭蕭聞雨聲夢過三陵夢過漢陵間秋風石馬閑當年侍臣淚泣盡向三山詠扇翦紈成薄質誰將擬月輪閔竭夏后德同我天王仁及至為時用豈必美畫人何憂秋風來退藏保其真送曼叔襄城尉昔君乗紫騮來獵荒城下復乗紫騮去不逢亭長罵溪風欲渉時山雪獨歸夜此趣信所諳羈官莫悲吒送吳給事自許昌移淮西直道昔參輔獨將天下憂忠言悟明主退請拜諸侯坐閤政方舉移藩心所求蔡人迎且喜許俗愛難留夾路車徒盛分疆禾黍秋穆陵無夜閉仁化自公脩亳州李密學寄御棗一篋沛譙有鉅棗味甘蜜相差其赤如君心其大如王𤓰嘗貢趨國門豈及貧儒家今見待士意下異盧仝茶食之無厭飫詠德曾未涯九月五日夢歐陽永叔朝鏡惡白髪夕夢對故人常恨道路隔忽喜顔色親相笑勿問年青銅早傷神雞號天欲白向者猶疑真自尉氏南至京皆水及人脛陸行畏水深舟行畏水淺河流去時閤涂潦歸時踐事與時相違我慙行處蹇人生莫為客為客此安免九月十六日自許昌廻至京師胥平叔宋中道迓于郊外今日至國門二子來迎我適遇信陵冢冢棘秋葉墮翩翻隨人飛拂馬右或左謂此獨無情亦與吾意可裴如晦赴河陽幕號風一夜動作雪欲愁客客莫苦嗟行農望明年麥方來笑語同又是關河隔主人賢且智不待子所畫送韓子華十月拜埽白露已變霜孝心竟悲惻薦衣如念存拜壟不遑息帯劒蓬池外兼程困馬力禮畢便當還於誠乃為得送韓六玉汝宰錢塘予嘗訪林逋湖上頃尋髙士廬正值浸湖雪雪中千萬峰參差縣前列僧居或隱見岸樹隨曲折驚鳬如避人逺向寒煙滅潛希為子男儻得遂疎拙今逾二十年志願徒切切方聞落君手與我曾未别景多詩莫窮歸載壓車轍得曾鞏秀才所附滁州歐陽永叔書荅意客從淮上來往問故人信袖銜藤紙書題字逺巳認既喜開其封固覺減吾吝新詩不作寄乃見子所慎向來能如今豈有得觀釁南方嵗苦熱生蝗復饑饉憂心日自勞霜髪應滿鬢知予欲東歸曉夕目不瞬貧難久待乏薄禄藉霑潤雖為委吏冗亦自甘以進相望未得親終朝如抱疹追詠崔奉禮小園前此訪君時巳觀堂宇􅃉安知中屏開自有幽林致花塞巖桂紅石擘雲根翠正當秋風來不見摇落意日得吟其間何須去為吏宋中道快我生女爾甞喜詛予生女竟勿怪今遂如爾口是宜為爾快亦既以言酬固且殊眦睚慰情何必男兹語當自戒詠宋中道宅椶櫚青青椶櫚樹散葉如車輪擁籜交紫䫇嵗剥豈非仁用以覆雕輿何憚克厥身今植公侯第愛惜知幾春完之固不長只與薺本均幸當敕園吏披割見日新是能去窘束始得物理親詠秤聖人防爭心衡權為之設後世失其平有星徒爾列物物尚可欺銖銖不須别將淳天下民安得必毁折詠象韓子華邀賦軀大力無用逺物賞馴柔食芻與飲水百倍於馬牛猶能絡金羈不可伏車輈蒼舒曽智秤千鈞空壓舟依韻荅惠勤上人釋子本樂靜宜不事物牽我慙姑蘇守復賞杼山然三嵗與之别其學巳増前忽此有來贈老拙謬躭研荅顯忠上人驅馬傍馳道歸自許西偏髙車非舊䝿立避槐樹邊心雖欲往謁僕餒行不前是甘處窮巷晨笑微生煙儻有好事者扣門與留連或出袖中詩語熟氣頗全曽不類緇褐始可今勉旃京師百許寺知幾相差肩送韓仲文奉使往使匈奴國持節豈辭遥朔北正苦寒風汝與雪飄燕山何處是漢銘應巳銷前車渡冰河後騎鳴金鑣行行至穹廬尊我不敢嚻玉爵親獻酬名裘進狐貂禮成復命日菀栁舒楊條送劉司勲奉使授命出絶域北至單于庭駝鳴沙磧遥馬倦朔雪零幽州古道上胡笳應夜聽嘗聞昔時語南看北辰星使回儻可託乃得驗天形依韻和歐陽永叔秋懷擬孟郊體見寄二首我居西北地秋無東南風木脫不塞望髙臺空九重音塵安可得鴻雁鳴霜中日看紫苔生乃見三經窮一聞離騷篇寫盡楚客胷胷懷如寶匣夜夜吼生銅秋思公何髙堆積自嵱嵸出為悲秋辭萬仞見孤聳念我老於詩我髪實種種而後傷故人故人多作冢陰風夜木嗥窸窣聞鬼悚獨我忘形骸百事乃纖冗不眠霜月上霜月如可捧裴如晦自河陽至同韓玉汝謁之朝聞單騎歸徑走至其第扣門童僕頑拒我色甚戾不顧遂登堂有馬堂下繫辯詐大呼卿稍應西屋際逡廵冠帯出青綬何曵曵有似縮殻龜藏頭非得計况與二三子交分久巳締恕爾避客尤新還復新壻詠王宗說園黄木芙蓉水中兼木末相擬有嘉花玉蕊折蒸栗金房落晩霞渉江從楚女采菊聽陶家事與離騷異吾將搴以誇二馬舊馬十年跨老劣多緩行新駒三萬錢頗愛舉蹄輕不使異芻秣均養存其情君門趨早朝風勁力已生依韻和發運許主客詠影荅影陶潛興長吟為我聽與之相遇日曽不異於形動靜隨生趣存藏委曜靈莊周疾走意推本置諸銘寄題周源員外衢州萃賢亭昨朝江南客語子川上亭有持飛雨來不見前山青卉萼人未識鳥響日可聽既將遲賢者無使童僕扃荅楚僧智普始與吳僧顯忠來過今見二人詩進於舊矣我初見子時子作楚人語復與吳客來音俱變齊魯乃知久處益薫蕕可同舉更當富於學兹言聊以補鴨雛春鴨日浮波羽冷難伏卵嘗因雞抱時託以雞窠暖三旬殻既拆乳毛寒脛短雞寧辨其雛翅擁情款款一日向水涯所稟殊未斷泛然去中流雞呼心悹悹人之苟異懷負義不足算有志在養毓勿論報德限有覩十一月七日來恨我馬遲去恨我馬疾馬蹄塵作雲已隔粲然質時時顧且遥亂緒如有失宛陵集巻三十
