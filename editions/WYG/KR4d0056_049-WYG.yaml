body:
  text: 宛陵集巻四十九宋梅堯臣撰寄題絳守園池老柏麝不食古色侵青冥淺沼龍不入秋水生浮萍屋屢圬堊幾太守壁上彪蔚遺丹青黑石鐫辭澀如棘今昔往來人不識酸睛欲抉無聲形既不可問不可聽懸泉瀉竇晝未停飛玉貯藍光入屏苞潭梁島甲癸丁蔓刺交綴垂組綎蒼官屭槐朋在庭風蟲日鳥聲嚶嚀卉葩木果黏枝條集臺脫熱昬痾醒闕文韓詩怪若是徑取一二傳優伶仍寄河東薛太守更與斟酌無閑扃陸子履見過劉郎謫去十年歸長樂鐘聲下太微屈指故人無曩日平明騎馬扣吾扉論情論舊彈冠少多病多愁飲酒稀猶喜醉翁時一見攀炎附熱莫相譏重送周都官水上朱樓畫角鳴濛濛雨裏傍舟輕未逢甫里先生謁多見吳興太守迎荷葉半黄蓮子老霜苞微緑橘林明十年不到風煙改君去將詩與畫評送李載之殿丞赴海州𣙜務𤓰蔓水生風雨多吳船發櫂唱吳歌槎從秋漢下應快人憶故園歸奈何世事靜思同轉轂物華催老劇飛梭茶官到有清閑味海月團團入酒蠃和吳沖卿學士石屏吳夫子佩銀龜乗天馬素怪奇忽得虢畧一片石其中白色圎如規又有樹與烏畫手雖妙何能為吳乃持問歐陽公比公曩獲尤可疑疑不為辨賦以詩詩辭粲粲明星垂復遣齎來使我和坐上鉅公㫄睨之范侯實有揚雄學咸云此理難究推我歸滌慮反覆思義雖不經聊解頤月與太陽合朔時陽烏飛上桂樹枝枝上作窠生羣兒人不知天公天公欲俾世間見影著石面如黏黐烏既不得去月亦不可移留為千古作好玩慎勿傾樸同玉碑時在唐書局與歐陽永叔王原叔范景仁㑹食得所示詩永叔贈絹二十匹鳳皇拔羽覆鶉鷃鶉鷃幸脫僵蒿蓬昔公處貧我同困我無金玉可助公今公既䝿我尚窘公有縑帛周我窮古來朋儕義亦少子貢不顧顔淵空復聞韓孟最相善身仆道路哀妻僮生前曽未獲一飽徒說吟響如秋蟲自驚此贈已過足外可畢嫁内禦冬况無杜甫海圗坼天吳且免在褐躬瘦兒兩脛不赤凍病婦十指休補縫㕑中餒婢喜有望服鮮弃垢必所䝉梁上君子切莫下吾非陳實何爾容依韻奉和永叔感興五首泉上有君子齋祠達主誠向來霖雨暴觸處蛟鼉鳴既祈致日出杲杲紓民情天子遣以報固匪媚取名因成感興章庶用語平生蹈道久巳熟情田不須耕既負天下望必憂天下責每聞諫諍辭苦意多矯激心存義勇赤氣與虹霓白所論言必從豈若水投石陰邪日已銷事理頗已得莫將經濟術抑鬱向胷臆勿驚年齒遲勿歎時節晩寒松翳林麓射干生隴坂野蓬隨飄飄秋實綴纂纂萬物更盛衰有益必有損損益皆自然曷増鳬脛短人為智慮役白髮安得免利澤欲及時唯恐不行逺後世豈皆愚計校徒勉勉日出各馳趨皆為利所迫秋蟲至微物役役網自織古來髙世人林下遺憂責扛鼎絶臏者乃自恃以力積金苟如山何異魚貪食唧唧復唧唧長沙何太息秋風入破衣瘦婦思補刺手中把長線無帛縫不得夜夜憂向寒斗柄漸垂北嫁夫欲夫富歡樂要終極歡樂既未能鬢髮霜花易依韻奉和永叔社日玉卵不吞龍嗜肉燕子成兒去華屋老櫪半黄田鼔鳴樹下宰平誰似玉茂陵常說泣秋風王母惜傳雙鬢緑東方伏日思早歸長飢不及侏儒腹豶豕新􅖒白醪熟奮衣地坐無拘束驪山夜寒坑底哭漫把漆書留冢竹社日飲永叔家雨未雨濛濛野田擊鼔賽社翁折條跨馬社翁去醉叟臥倒棃葉紅遨頭主人邀客飲玉酒新賜蓬萊宮彭宣不預後堂㑹康成一舉三百鍾更邀明月出海厎爛醉等是歸蒿蓬八月十三日觀長星長星彗雲出天狗欲墮鳴狗埽不見跡昭昭河漢横河漢秋轉淨箕斗垂光晶勸爾長星酒收祲看太平送李才元學士知邛州太守車煌煌莫如還故郷昔登蜀郡籍今得臨邛章過家禮耆舊接境跪壺漿寒經道路逺春入山川長俗將樂其化詔亦美其良相如有遺跡誰復酒壚傍弔仲源世家吳季子皇籍漢諸孫嘒管行車失虚堂隠儿存枝摧從玉樹星隕自天垣寧復下貧賤停驂來里門送梁學士知襄州騎吹荆州去喬林漢水前郷亭逢故老牛酒問髙年翠巘臨闗路黄柑逐賈船習家池館在賔從與留連送薛氏婦歸絳州在家勗爾勤女功無不喜既嫁訓爾恭恭已乃逺恥我家本素風百事無有侈隨宜具奩箱不陋復不鄙當須記母言夜寐仍夙起慎勿窺窗戸慎勿輒笑毁妄非勿較競醜語勿辨理每順舅姑心况逆舅姑耳為婦若此能乃是儒家子看爾十九年門閫未嘗履一朝陟太行悲傷黄河水車徒望何處哭泣動鄰里生女不如男天親反由彼送劉繼鄴秀才歸當塗鵷雛始出巢欲矜五色羽乃見郡鴟盤壤中將有取梧桐與竹實安得在平土所趣固巳殊而何不逺舉幸失網羅目冝還蘭蕙圃故郷有嘉林其下可以處㑹侍朝陽鳴賀虁成律呂送裴如晦宰吳江吳江田有秔秔香舂作雪吳江下有鱸鱸肥膾堪切炊秔調橙韲飽食不為餮月從洞庭來光映寒湖凸長橋坐虹背衣濕霜未結四顧無纖雲魚跳明鏡裂誰能與子同去若秋鷹掣送撫州通判袁世弼寺丞帆疏疏纖緑蒲二十四幅輕江湖髙秋逆水上天去朝過𤓰歩暮濡須長風沙頭問鯉魚大孤山側鳴寒烏魚腹無書報家信憑烏為到西山區西山松柏應更好及取之官來拜埽送石昌言舍人使匈奴燕然山北大單于漢家皇帝與璽書持書大夫腰金魚飛龍借馬出國都胡沙九月草已枯草上霜花如五銖白裘貂帽著不暖莽莽黄塵車款款野廬邊月出隴來風靜天遥鴈聲短聞到􅄢庭尤苦寒譯言揉耳不譏彈公於是時巳觀禮踏雪再拜辭可汗依韻和宋中道觀八月二十八日車駕朝謁景靈宮都人夾望禁槐傍閶闔初來旭日光雕玉翠鞍牽騕褭盤龍朱輦爛文章焚香閟殿開嚴帳汲水寒溝灑廣莊一見天顔萬人喜却廻宮禁樂聲長度支蘇才翁挽詞三首子美同葬二十識君貌交游非一朝魄光沉碧海志業隕青霄洛客舊為社楚人今作招素車京峴路應不似嶣嶤盛世雖多士唯公與衆殊髙才飛健鶻逸句吐明珠未入周官采爭持楚璞模莫悲泉骨朽青史見賢愚自昔愛春物樽深眼厎紅日斜花在落身醉客西東殁歎千年隔生悲百事空君嘗知此理不悞學陶公重送袁世弼臨川内史謝康樂貝葉翻經有故臺春草生塘猶夢句秋蕖出水似君才驐雞肥脆聊供膳篘酒甘濃可薦杯亦說右軍遺跡在墨池科斗喜風雷留題景徳寺吉祥講僧我講異爾講我書非爾書彼將希白馬此亦猶大車皆行國都内轍不入委閭世人日擾擾來慕清凉居閤門水朝堂嘉祐元年九月九日宿齋歐陽永叔張叔之孫之翰命賦宮井固非一獨傳甘與清釀成光禄酒調作太官羹上舍鋹缾貯齋廬玉茗􅖒相如方病渴空聽轆轤聲朝堂宿齋玉屬陪祠日宮廬寓宿時鐘來建章逺月過羽林遲寒入青綾被風牽翠鳳旗賈生誰復召安問鬼神為送杜挺之郎中知䖍州大庾嶺邊無臘雪惟有梅花與明月月光如水來向人太守得閑杯耳熱吹香入酒望梁宋正是苦寒緜可折亦當念君君行南南方無冰地不裂此身不到五侯門肥羔釀酒槐槽咽玉色少年生頰春解笑吟腸冷如鐵衝風冒霰入廣文老與諸生開反切重嗟君逺隔江湖雖得豐甘牙已缺官娥執樂一千指脩頸慢肌衣錯纈定逢賔客彊排娖舞徹六么紅袖掣人競羨君君愈疲夜歸坐閤思予說送吳辯叔知鞏縣言為西邑宰本是洛陽人送驛往歸魏迎車來入秦山川成鞏固陵廟壯威神好學河陽政栽花作縣春當世家觀畫冰蠶吐絲織纖紈妙娥貌入聲玉輕邯鄲曲睂淺臉鵶髮盤白角瑩薄垂肩冠銅青羅衫日月團紅裙撮暈朝霞乾手中把筆書小字字以通情形以觀形隨畫去能長好歳歳年年應不老相逢熟識眼生春重伴忘憂作萱草送韓僉判玉汝還南京持賀太禮表天子甘泉祀歡聲浹九圍緑章馳騎入朱服佩魚歸賦雪上賔席買鬟更舞衣清池無限鴈莫道信音稀宛陵集巻四十九
