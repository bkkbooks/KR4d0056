body:
  text: 宛陵集巻二十五宋梅堯臣撰送謝寺丞新賜及第赴扶溝宰世所重登科如君特才選麗賦驚宗工妙譽動京輦行鷁路非遐雙旗風欲展聊閱民版餘應不負墳典和李廷老三月十四日三月日幾望士游溱水陽溱流已渙渙有美此翺翔偶來適此願月色同滿牀士曰陟少室女曰歸大梁及晨各異役悲喜竟回腸芍藥有遺風贈好期不忘固匪子能逮是焉繼新章苦熱赤日若射火林風不動梢羸汗尚流沛冠服豈堪包貴人諒有禀慣習非彊敎竊觀行車馬坌蕩劇煨炮寧思山中人石泉浸兩骹劉薛二君過予遇雨猛雨廹好鳥止我屋室隅是時有劉薛亦既此焉俱我廏秣爾馬我㕑飯爾奴二人乃可語因觀爾馬圖古筆得神妙俗工非所模收圖雨且止鳥飛當駕驅荅廷評宗說遺冰仲夏遘餘閏屋室如炊蒸孰云窮處者言贈太官冰時靡有暍死實亦賴友朋定能凉一席既已却青蠅吾心久自信飲已不以矜劉牧殿丞通判建州平生交遊少海内寡與期識君且恨晩一見已將離人言何嗟别曾此非舊知荅曰匪我舊亦既接音詞譬彼空林鳥止息偶同枝忽有振翮去尚爾鳴聲悲我今臨流送安顧俗所為和中道伏日次韻伏日每苦熱古來亡事侵嘗聞東方朔割肉趨庭隂百職當早罷將畏赫日臨我無歸遺人懷念空霑襟和蔡仲謀苦熱大熱曝萬物萬物不可逃燥者欲出火液者欲流膏飛鳥猒其羽走獸猒其毛人亦畏絺綌况乃服冠袍廣厦雖云託呼風不動毫未知林泉間何以異我曹蠅蚊更晝夜膚體困爬搔四序苟迭代㑹有秋氣髙儼上人粹隱堂十年不出户世事皆剗鉏時無車馬遊焚香坐讀書有堂曰粹隱惟見安且舒心逺迹非逺嵗月速輪輿寓目暫為實過者即為虛譬若開是室終日於此居欲問昨日事已覺今日疎明朝却視今復與前何如聊悟此中樂猶觀濠上魚送鄭太保瀛州都監秋氣入關河匈奴久已和琱弓聊可試寳劒不須磨草木將摇落牛羊自寢訛能知塞垣景持以贈吾歌送刁安豐嘗遊芍陂上頗見楚人為水有鳥魚美土多薑芋宜寧無董生孝將奉叔敖祠舊令乃吾友寄聲於此時劉八飲將散分得非休沐不得㑹閏五月晦日君非休沐時兹㑹豈能得我無官局縈幸爾預歡適莫辭衝雨歸歸時烏帽側贈張處士聞爾閑於琴寢處未嘗輟抱之京城來豈與工師列一奏流水聲落指鳴決決既曰林壑人安事塵土轍將行與蔡仲謀飲分席上果得桃曾無千嵗人安見千嵗實聊效昔所投瓊瑶報非一荅裴送序意我欲之許子有贈謂我為學勿所偏誠知子心苦愛我欲我文字無不全居常見我足吟咏乃以述作為不然始曰子知今則否固亦未能無諭焉我於詩言豈徒爾因事激風成小篇辭雖淺陋頗尅苦未到二雅未忍捐安取唐季二三子區區物象磨窮年苦苦著書豈無意貧希禄廪塵俗牽書辭辨說多碌碌吾敢虛語同後先唯當稍稍緝銘誌願以直法書諸賢恐子未諭我此意把筆慨歎臨長川和張士曹應之晩景逺空雲解駮南陌雨初收獨鳥去煙外斜陽明樹頭凉飇虛枕席漲潦起汀洲㑹有從軍役將離更暮愁送楊浩祕丞入蜀有才不得試志亦無所干有母不得養法當之逺官雖曰在民政孝心寧得安志願且未遂而趨蜀道難行思叱馭者勿復苦長歎乙酉六月二十一日予應辟許昌京師内外之親則有刁氏昆弟蔡氏子予之二季友人則胥平叔宋中道裴如晦各攜肴酒送我于王氏之園盡歡而去明日予作詩以寄焉性僻交遊寡所從天下才今朝誰出祖親戚持尊罍晩節相知人唯有胥宋裴所欠謝夫子歸穰尚未廻岸傍逢名園繫舟共徘徊嘉蓮如笑迎照水呈丹顋南庭蒲萄架萬乳纍將磓羣卉競瑣細紫紅相低偎尋常固邂逅孰辨落與開酒䦨各分散白日將西頽城隅遂有隔北首望吹臺開封古城阻淺聞永叔喪女去年我喪子與妻君聞我悲嘗俛睂今年我聞君喪女野岸孤坐還増思思君平昔憐此女戲弄膝下無不宜昨來稍長應惠黠想能學母粉黛施幾多恩愛付涕淚灑作秋雨隨風吹風吹北來霑我袂哀樂相恤惟己知自古夀夭不可詰天髙杳杳誰主之以道為任自可遣目前况有寧馨兒寄謝開封宰薛賛善予生多不偶事事相與背適從平川役乃遇河決潰舟膠在中野寸歩使心痗誰知赤縣尹勤恤每外内文符飭亭長寇盜虞䑕輩仍能饋餅餌童稺仰所賚今又置酒壺惠問亦巳再令我清夜飲是夕值月晦獨酌效謫仙而復無影對如何忘情游似亦有世態家人誠可同况我昨喪配雖曰預朝裾左右無粉黛兀然唯書史舊學猒𤨏碎欲探文字工下筆語多礙却思君西齋新治虚可愛燕坐禽鳥寂吟哦簿書退此樂吾未如區區勞覆載草木草木無處所動摇知風形今日萬葉黄昨日萬葉青青既漸衰變黄亦漸彫零人生恃嵗月種柏滿郊坰夢登河漢六月二十九日夜夢上河漢星辰布其傍位次稍能辨羅列爭光芒自箕歴牛女與斗直相當既悟到上天百事應可詳其中有神官張目如電光𤣥衣乘蒼虬身佩水玉璫邱蛇與穹鼈盤結為紀綱我心恐且怪再拜忽禍殃臣實居下土不意渉此方既得接威靈敢問固不量有牛豈不力何憚使服箱有女豈不工何憚縫衣裳有斗豈不柄何憚挹酒漿卷舌不得言安用施穹蒼何彼東方箕有惡務簸揚唯識此五者願言無我忘神官呼我前告我無不臧上天非汝知何苦詰其常豈惜盡告汝於汝恐不祥至如人問疑汝敢問於王叩頭謝神官臣言大為狅駭汗忽爾覺殘燈熒空堂寄宋次道中道再來魏闕下舊友無一人或為美官去或為泉下塵晩嵗相知者操節許松筠日世常山公伯仲文學均與我數還往以義為比隣屢假箧中書校證多護真次述盈百卷補亡如繼秦中作淵明詩平澹可擬倫于時多驕佚黄巻罕所親昨以興西師往往劒射伸短衣誇走馬睅目語常瞋欲效西山勇遂笑東魯仁捨本趨富貴乃與市賈濵以此較於子素業固未泯前日之許昌别君已經旬偶然值河決窮坐如涸鱗臨風思有寄夜詠還達晨日蝕赫赫初出咸池中浴光洗迹生天東不覺有物來晦昧團團一片如頑銅前時蝦蟇食爾妃天下戢戢無有忠責罵四方誰膽大仰頭憤憤唯盧仝欲持寸刃去其害氣力雖有天難通是時了無毫芒益徒有文字辨且雄仝死于今百餘載日月幾度遭遮蒙有人見之如不見誰肯開口咨天公老鴉居處已自穩三足鼎峙何乖慵而今有觜不能噪而今有爪不能攻任看怪物瞖天眼方且省事保爾躬日月與物固無惡應由此鳥招禍凶吾意髣髴料此鳥定亦閃避離日宮安逮后羿不乖暴直與審慤彎強弓射此賈怨鳥以謝毒惡蟲二曜各安次災害無由逢南不由赤鳥東不誚蒼龍北龜勿吐氣西虎勿嘯風五行不汨陳虞舜生重瞳我今作此詩可與仝比功寄王江州休嗟謫官去山根勝窮邉當職言無隱他時事好還何嘗聞􅕤火唯是對爐煙潮到盆城否猶期信可傳薛九公期請賦山水字詩薛君堂懸山水字請我賦作山水詩呼童磨墨慰君意彊作安得有好辭昔年曾是杜陵客東城水上横此碑字方數尺形勢健豈似取次筆畫為東城父老語於我推本剏自開元時不知當時何所用費力剗刻為瓌竒我去長安十載後此石誰輦來京師苑中構殿激流水暮春脩禊浮酒卮是時詞臣出不意酒半使賦或氣萎日斜鳴蹕不可駐未就引去如鞭笞脫我幸得預此列玉階立冩從然萁今雖下筆不稱意已書滿幅令君嗤七夕有感去年此夕肝腸絶嵗月凄凉百事非一逝九泉無處問又看牛女渡河歸過開封古城荒城臨殘日雞犬三四家豈復古阡陌但聞新桑麻頽垣下多穴所窟狐與蛇漢兵墮銅鏃青血為土花通判桃花㕔自此詩許州起慶歴五年秋盡六年夏種桃西庭下有意延東風東風與雨至染出枝上紅花厎有小鳥其字曰桃蟲既於桃得名為桃言女工翦羅作舞衣奉君歡莫竆舉杯無媿者避世武陵翁任廷平歸京并序廷平任君往者登進士科入許幕後二年予被太原公辟與君為代君之嚴君以太子少保致仕西都西都去許其道有三北趨鄭過圅谷而至洛陽其塗而逺西趨汝由闕塞而河南其塗小艱然邇於北道西北趨登封歴轘而至洛師其塗險惡不與二道比君之歸也捨二道之平易踐西北之險惡何哉是非急於拜慶邪豈特與人情異歟噫人以為險在君為易由出於天誠不為難也出天誠易險道可謂孝也乎及其行予故作詩以送之言之少室西定陟轘轅險歸心不避危夕枕屢成魘秋聲故苑空野氣荒陵掩獨念京洛塵曾將客衣染和通判太博雞冠花十韻神農記百卉五色異甘酸乃有秋花實全如雞幘丹籠煙何聳聳泫露更團團取譬可無意得名殊足觀逼真歸造化任巧即雕剜赤玉書留魏丹砂句誦韓魏文帝與鍾繇求玉玦書論玉云赤如雞冠韓文公闘雞聮句云頭垂碎丹砂誠能因物比誰謂一時難有客驅辭頴臨風運筆端嘗嗟古吟缺每惜此芳殘揣情苦精妙繼音慙未安秋夜感懷風葉相追逐庭響如人行獨宿不成寐起坐心屏營哀哉齊體人魂氣今何征曾不苦隕籜繞樹猶有聲涕淚不能止月落雞號鳴依韻和通判八月十五夜招玩月二章尋常圓魄豈不好競愛今宵分外明明極只知無隔礙誰言桂樹向中生一年一見最堪惜百歳百夕能幾多縱有明年似今夕明年同㑹復如何蚯蚓蚯蚓在泥穴出縮常似盈龍蟠亦以蟠龍鳴亦以鳴自謂與龍比恨不頭角生螻蟈似相助草根無停聲聒亂我不寐每夕但欲明天地且容畜憎惡唯人情秋風秋風不饒物斗至聲已惡青林葉尚緐雖好將恐落人意誠愛惜節候肯相若白髪無再𤣥盛衰兹可度韓宗彦寺丞通判鄧州往歳陪祠泰壇下始一相見如相知我今入幕君有待喜得款語勝前時便嗟陳事日侵汨雖欲數面曾無期忽聞兵吏已迎候馬有行色車將脂賀君有意事清簡太守亦鄙尋常為騏驥歩驟豈局促鳯皇羽翼多威儀漢家近親不復有召父舊聞於今隳隳由狂者生利害曾未略究民間宜秖言引水幸圭賦矯請罷毁功何施千載厚惠一日去至今農畝空嗟咨夫子才髙識且逺勿畏勢力重扶持他年人作去思頌願以大字書長碑韓欽聖問西洛牡丹之感韓君問我洛陽花爭新較舊無窮已今年誇好方絶倫明年更好還相比君疑造化特著意果乃區區可羞恥嘗聞都邑有勝意既不鍾人必鍾此由是其中立品名紅紫葉緐矜色美萌芽始見長蒿萊氣燄旋看壓桃李乃知得地偶增異遂出羣葩號竒偉亦如廣陵多芍藥閭井荒殘無可齒淮山邃秀付草樹不産髦英産佳卉人於天地亦一物固與萬類同生死天意無私任自然損益推遷寧有彼彼盛此衰皆一時豈關覆燾為偏委呼兒持紙書此說為我緘之報韓子夢感生哀百十載死苦千萬春何為千萬春厚地不復晨我非忘情者夢故不夢新宛若昔之日言語尋常親及寤動悲腸痛逆如刮鱗秋鴈秋鴈多夜飛前羣後孤來儔合鳴自得隻去音已哀哀音能感人腸酸非食梅共將形影對安得不早衰依韻和通判把菊有寄湖邉草樹多蠹葉已少色唯菊不畏霜澹豔如有徳自與蘭並生非因人所植愛貴曾未猒秋日短苦逼朋好各相望採持空歎息臨杯不能飲對案不能食借問君何憂節物感人極曹承制知永康軍脩鐵驄黄金羈年少蜀城守蜀城臨古江正在離岸口離岸李凉鑿其利實不久既避沬水害又以溉田畝大此百民宜遺祠奉牲酒行當謹厥事無乃為政首三鳥翩翩三竒鳥各擇松桂宜二鳥同所向並立髙髙枝一鳥依别樹屈比二鳥卑嗟嗟天下鳥莫與三鳥期三鳥鳴少和蒿間多鸒斯頻頻徒爾黨三鳥安可欺龍箕一首并序在昔賢人良輔之生也或山之神靈和氣之隣或星之魄曜晶明之所鍾故詩有嵩髙之作稱厥甫申傅說騎箕之說又得之前古公之誕日考之星歴月次于箕宜與說同也夫登翊王室為宋鉅臣豈徒然歟依雅頌作龍箕一章十八句以獻龍箕在天莫不孕靈我公生之既生既徳曾誰與京爰弼帝右繼序其榮之贊我太平萬事其成之殿我輔邦庶民其寧之政靡薄厚百職其揚之宜言顯光永錫乎后王廼祝眉夀廼獻兕觥福禄其將之宛陵集卷二十五
