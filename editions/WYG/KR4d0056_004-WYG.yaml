body:
  text: 宛陵集巻四宋梅堯臣撰池州進士陳生惠然見過不日且行因以詩贈别呼童具雞黍頗識故人期竹館忽枉駕山樽聊解頤醉歌返北郭春雨生東陂便與千峰隔登髙空復思春陰濃澹雲無定淒微氣宇寒鳩鳴桑葉吐邨暗杏花殘客子行裘薄春塘野水寛輕雷欣巳發謬作採茶官春晴對月雲埽魚鱗静天開桂魄清棃花鑑中色杜宇晝時聲寥落將寒食羈離念故京都無惜春意樽酒爲誰傾植栀子樹二窠十一本於松側舉世多植蘗而我學種栀顔色固不别良苦誠異宜團團緑階側豈畏秋風吹同心誰可贈爲詠昔人詩百舌天窗明未明䬃䬃過微雨巳聞髙樹頭百舌間關語幽人枕上聽不聽變盡春聲始飛去提壷鳥山路暗松篠幽禽語前後上言勸提壷下言勸酤酒但取醒復醉莫問升與斗人生朝菌榮緑髮可無負青梅梅葉未藏禽梅子青可摘江南小家女手㺯門前劇齒軟莫勝酸弃之曽不惜寧顧馬上郎春風滿行陌挾彈篇長安細矦年尚小獨出春郊不須曉手持柘彈霸陵邊豈惜金丸射飛鳥金丸射盡飛鳥空解衣市酒向新豐醉倒銀缾方肯去去臥紅樓歌吹中不管花開與花老明朝還去杜城東五日登北山望競渡南山傳競渡多在屈平祠簫鼔滿流水風煙生畫旗千橈速飛烏兩舸刻靈螭盡日來江畔誰知輕薄兒寄新安通判錢學士昔人言訪舟江水賦清泚冬春常一色深淺皆見底崖日半寒潭登明動朱鯉君懷素巳髙塵慮都應洗得歐陽永叔回書云見來客問予動静備詳昨日使人囘聞君與之坐君問我何爲但云思寡過寡過真未能得便北窗臥此趣今巳深世間誰與和建德新牆詩山廨不營堵筠篁爲密籬初年固可蔽晏歳不能支巳被巢蜂蠹復爲荒葛虆夏雨久枯脆秋風遂傾欹雞鶩恣穿逸牛羊來踐窺我議欲板築羣走皆不怡首吏先進白土疎不可爲潦雨忽暴集澗流如突馳我心賾其極斯語其見欺用竹乃户率破得縁而私冬歛葺西角春調完北陲循環日有壞煩擾無虚時介決勿爾惑遂飭闢其基榛莾一芟去畚鍤能悦隨膏潤非朽壤峭削隱金鎚荏苒未踰月屹如長雲垂疏壍備水害既圬復蓬茨豈唯禦貛豹亦以防狐貍且有内外隔絶聞閭巷卑安然兹燕息來者勿吾隳九月五日得姑蘇謝學士寄木蘭堂官醖公田五十畞種秫秋未成杯中無濁酒案上唯丹經忽有洞庭客美傳烏與程言盛木蘭露釀作甕間清木蘭香未歇玉盎貯華英正值菊初坼便來花下傾一飲爲君醉誰能解吾酲吾酲巳不解百日毛骨輕九月見梅花江南風土暖九月見梅花逺客思邉草孤根暗磧沙何曾逢寄驛空自聽吹笳今日樽前勝其如秋鬢華新安錢學士以近詩一軸見貺輒成短言用叙單悃早事太尉府謬以才見論身作邑中吏日陪丞相尊嵩山雲外寺伊水渡頭邨泉味入香茗松色開清樽題詩人半醉馬上景巳昬歸來屬後乘冠蓋迎國門悠悠失貧賤苒苒歴凉温而今處窮僻落莫思舊恩終日自鮮適終年長不言已覺人事寡惟聞雞犬喧東風有來信滿幅蘭與蓀深知故人意遺我滌𡨕煩一章言罨畫谿好如目存何須到雲壑便若遊花源一一先造化可以輕瑤琨成誦今在口願將醒病魂荅陳五進士遺山水枕屛妙畫能成趣谿山迥得君漁舟長映浦巖樹半藏雲征鳥無時没橫橋有處分數峰來枕席曾不媿移文謝賔客挽歌三首位不登三事才冝列四科清名時自得華冕世空多望氣悲埋劒臨風歎逝波呉阡蒿作里楚挽薤成歌會𦵏千人至來觀數郡過無由親執紼東首淚滂沱自昔居門下游觀必許偕豈將千里别遂作九泉乖巳恨霜松折行嗟玊樹埋蒼生空有望丹旐不勝懷曩日言歸里飛章願乞骸今朝赤松畔煙壠對蒼崖當年罷會稽還郡錦爲衣老作龍樓貴終將鳳沼違英魂遊岱去石椁渡江歸揚子春風惡南徐過客稀衆帆㸔屢溺素舸獨如飛始見中郎孝松門自有輝往東流江口寄内艇子逐溪流來自碧江頭隨山知幾曲一曲一增愁巢蘆有翠鳥雄雌自相求擘波投逺空丹喙橫輕鯈呼鳴乃不巳共啄向蒼洲而我無羽翼安得與子遊代内荅結髮事君子衣袂未嘗分今朝别君思歷亂如絲棼征僕尚顧侶嘶馬猶索羣相送不出壼倚楹羨飛雲日暮秋風急雀聲檐上集幷作千里愁愁極翻成泣訪礦坑老僧山深無外事日夕愛潺湲趺坐樹間石力耕溪上田解言南國事能詠碧雲篇莫貰逺公酒余非陶令賢除夕與家人飲莫言寒漏盡春色來應早風開玉砌梅薰歇金爐草稺齒喜成人白頭嗟更老年華箇裏催清鏡寧長好立春在元日新春與新歳時候不相先未肯欺殘臘何曾占舊年綴條花翦綵插户栁生煙獨坐空山裏唯驚節物遷遊水簾巖春山時獨往榛穢旋芟斸飛泉蔽幽巖杳藹疏朝旭光垂白龍䫇鳴潄寒潭玉半壁生晝寒隂草潤秋緑穿藤出溪口流沫縈山足莫遣吏人來方歌白雲曲詠官妓從人少爲輕薄誤失行落優倡去作小家婦願同貧里裝無心歌子夜有意學流黃他日東郊上誰人見採桑夏雨林梅初㺯熟宻雨閉重關潤裛衣巾上涼生竹樹間水聲通逺澗雲色暝前山野鳥寂無語公庭盡晝閑五日與陳眞卿飲五日逢南國三年别舊都招魂傳楚客撫節見靈巫蒿艾因時採蛟龍為俗驅清樽與鵞炙忻此故人俱彼鴷吟斷木喙雖長不啄柏與松松柏本堅直中心無蠹蟲廣庭木云美不與松柏比臃腫質性虚杇蝎招猛觜主人赫然怒我愛爾何毁彈射出窮山群鳥亦相喜啁啾㺯好音自謂得天理哀哉彼鴷禽吻血徒爲爾鷹鸇不搏擊狐兔縱横起况兹樹腹怠力去宜濵死感遇衆黙瘖莫辨衆寐盲不知問而使之對覺而使之窺瘖盲自窮矣所感在一時苟昧哲人理寐黙定妍媸雪詠雪色混青冥搴幃宿酒醒龍蛇縁古木鳳鵠舞幽庭宻勢因風力輕姿任物形公堂何寂寞橫案對𤣥經臘日出獵因遊梅山蘭若我與二三騎爭馳孤戍旁逐麋逢野寺息馬據胡牀鷹想支公好人思㶚上狂歸來何薄暮煙火照溪光依韻和楊敏叔呉門秋晚見寄方在洞庭上秋懷那得禁西風楚波急度鴈海雲陰洛客吟初苦騷人思巳深顚毛隨日減冉冉不勝簪田家南山嘗種豆碎莢落風雨空収一束萁無物充煎釡陶者陶盡門前土屋上無片瓦十指不霑泥鱗鱗居大厦縣署叢竹裊裊幽亭竹團團自結叢寒生緑樽上影入翠屏中陶栁應慙弱潘花只競紅方持雪霜操不敢倚春風巧婦巧婦口流血辛勤非一朝莠荼時補紩風雨畏漂摇所託樹枝弱而嗟巢室翹周公誠自感聊復賦鴟鴞聞歐陽永叔謪夷陵共在西都日居常慷慨言今嬰明主怒直雪諫臣寃謫向蠻荆去行當霧雨緐黃牛三峽近切莫聽愁猿聞尹師魯謫冨水朝見諫臣逐暮章從謫官附炎人所易抱義爾唯難寧作沈泥玉無爲媚渚蘭心知歸有日時向斗牛㸔寄饒州范待制山水番君國文章漢侍臣古來中酒地今見獨醒人坐嘯安浮俗談詩接上賔何由趨盛府徒爾望清塵詠王右丞所畫阮步兵醉圖胡公疎新勒石右丞筆通妙阮籍思𤣥虚獨畫來東平倒冠醉乘驢力頑不肯進俛首耳前趨一人牽且顧一士旁挾持捉鞍舉雙足閉目忘窮塗想像得風度纎悉古衣裾玉骨化爲土丹青終不渝而今幾百嵗乃有胡公疎買石遂留刻漬墨許傳模白黒就髣髴毫芒辨精麤千古畜深意終朝懸座隅誰謂盈尺紙不慙雲霧圖猛虎行山木暮蒼蒼風凄茆葉黃有虎始離穴熊羆安敢當掉尾爲旗纛磨牙為劔鋩猛氣吞赤豹雄威躡封狼不貪犬與豕不窺藩與牆當塗食人肉所獲乃堂堂食人既我分安得爲不祥麋鹿豈非命其類寧不傷滿野設罝網競以充圓方而欲我無殺奈何飢餒腸白鷴喬木暗青山晴川下白鷴春雲生嶺上積雪在囂間緑草張新翳柔冠總翠鬟時哉養文素不是雜斑斑後園桃李花後園桃李花灼灼復皎皎南枝開巳緐北枝縈尚少蘤萼相輝映根本自鈎繞無爲驚風吹紛紛逐飛鳥道傍虎跡行朝履猛虎迹暮宿猛虎林猛虎終夜嘯陰風生逺岑我懷何所畏所畏在官箴傷哉此遺體冒險輕百金脩眞觀李道士年老貧餓無所依忽縊死因爲詩以悼之唐室王子後黃冠事隱淪餐霞不滿腹披雲不蔽身八十不能死縊以頭上巾始慕老莊術終厭道徳貧營營求長生反困甑中塵野田行輕雷長陂水農事乃及辰茅旌送山鬼瓦鼔迎田神青皋暗藏雉萬木欣巳春桑間耦耕者誰復來問津水輪詠孤輪運寒水無乃農者營隨流轉自速居髙還復傾利纔畎澮間功欲霖雨并不學假混沌忘機抱甕罌山邨行征馬去不息幽禽隨處聞深源樹蓊鬱曲塢花氛蒀澹澹平田水濛濛半嶺雲長鬟弄春女溪上自湔裙鳴雉詞雄雉鳴桑林雌雉雊麥隴結愛誠有宜别啄義亦竦哺雛深莽中摧頽錦翅擁辛勤何爾爲應自念遺種寄公異弟池塘去後春一夕生緑草無由夢阿連詩句何能好去春城前日去春城今朝還故陌馬有甚煩意人多逺行色暫爾厭風埃那堪爲久客讀范桐廬述嚴先生祠堂碑二蛇志不同相得榛莽裏一蛇化爲龍一蛇化爲雉龍飛上髙衢雉飛入深水爲蜃自得宜潛㳺滄海涘變化雖各殊有道固終始光武與嚴陵其義亦云爾所遇在草昧既貴不爲起翻然歸富春曾不相助治至今存清芬烜赫耀圖史人傳七里灘昔日來釣此灘上水濺濺灘下石齒齒其人不可見其事清且美有客乘朱輪徘徊想前軌著辭刻之碑復使存厥祀欲以亷貪夫又以立懦士千載名不忘休哉古君子禽言四首子規不如歸去春山云暮萬木兮參雲蜀天兮何處人言有翼可髙飛安用空啼向髙樹提壺提壺蘆酤美酒風爲賔樹爲友山花繚亂目前開勸爾今朝千萬夀山鳥婆餠焦兒不食爾父向何之爾母山頭化爲石山頭化石可奈何遂作㣲禽啼不息竹雞泥滑滑苦竹岡雨蕭蕭馬上郎馬蹄凌兢雨又急此鳥爲君應斷腸讀漢書梅子眞傳子眞實吾祖耿介仕炎漢權臣始擅朝忠良被塗炭輦下莫敢言上書陳治亂是時卿大夫曽不負媿汗其文信雄深爛然今可玩危亡識禍機滅迹思汗漫一朝弃妻子龍性寜羈絆九江傳神仙會稽隱㕓閈舊市越溪陰家山鏡湖畔唯餘千載名撫卷一長歎宛陵集卷四
