body:
  text: 宛陵集巻四十五宋梅堯臣撰五月十七日四鼓夢與孺人在宫庭謝恩至尊令小黃門宣諭曰今日社與卿喜此佳辰便可作詩進來枕上口占同謁未央殿共霑明主恩冕旒親日月蹈舞荷乾坤龍尾三重峻螭頭㡬級尊徳音欣社日撫語走黃門陰㑹皆如實陽開不復存空餘破窗月流影到牀垠次韻和吳季野題岳上人澄心亭空山舊逕緑苔滿古寺齋盂白薤蒸暑雨坐中飛漠漠野泉林外落層層従來勝絶皆離俗未有幽深不屬僧唯愛溪頭一尋水莫聞流浪莫聞澄次韻和馬都官宛溪浮橋在昔當陽候建橋臨大川洪波不為阻馳道南北連何此小溪上擬象坦且平馬頭分朱欄水底裁碧天白雨緊大笮㫁虹生横舷游魚不可見車騎久臨淵寄隠靜山懷賢長老山有枇杷樹樹多獼㺅羣髙僧心不著一似五峰雲隨飇來溪口石上起氤氲果熟獼㺅去自向瀑澗分次韻和馬都官苦熱日光亭午時赫若鎔黃金鳴鳶不生風流雲不成陰赤地有焦土烈野無沃霖涸潭深幽幽枯嶽髙岑岑火龍將焚鬣陽烏多渴心肌膚非木石絺綌煩衣襟冰盤不可見空對瓊玖吟歴陽過杜挺之遂約同入汴滄海瀉玉自外天牛斗傍邊客正廻人說維摩居士病我同王子雪舟來汀沙沮洳湖新落山日曈曚霧始開去約河隄春栁動與君吹紫歩徘徊和胡公疎送嶼師移居寳光寺宋日天王寺梁時太子園地猶隨世變物豈與人存欲問移居意還應避俗喧相期唯有月夜夜在髙原胡公疎示祖擇之盧氏石詩和之盧肇家袁州太守蓬山客來過盧家尋怪石盧家百物今已空唯石難移留舊蹟埋沒尚存三四分雨淋日炙如皴皵太守惻然呼健兒荷鉏秉鍤爭來役健兒掘土不為堅旋旋剜沙見圭隙漸奇漸異人忘勞更索更深知幾尺瘦峰削出嵩華骨虛竅鑿破蛟螭額千指曳繩車四輪擊鼓助力歸東陌東陌東頭湖水傍黃泥洗盡何蒼碧故宅愈冷東湖喧䝿賤競觀無礙隔太守自憐堅直心愛少憎多屢遭謫南至蒼梧及桂林名山徧訪無窮僻所冝猒慣不入眼向此歌吟尤愛惜我思永叔滁陽時大誇古翠蔆溪獲作詩逺寄予與蘇髙唱相隨無節拍今知賢人趨向同玩好託情忘俗格建康従事胡公疎一見詫君如李白雄才落筆瀉天河綴韻孤清仍險窄入探虎穴誰為難辭通造化方能敵殿後吾雖膽力强獨鞭疲馬終無益逢曽子固前出秦淮來船尾偶攙燕遽傳曽子固願欲一相見順風吹長帆舉手但慕羨楊子東園頭下馬情眷眷昔始知子文今始識子面吐辭亦何嚴白晝忽飛霰我病不飲酒􅖒茶又非善冷坐對寒流蕭然未知倦真州東園國賦有常計計者豈不賢日夜疲精神自鑒膏火前新春力有餘鉏荒東乳偏壘土以起榭掘沼以秋蓮竹柏為冬榮桃李為春妍役役吳楚艘來泊常留連下江忘其險入漕忘其邅許公作此意吾亦見其權不獨利於已願書棠樹篇行吟二首持轡趨代北妄意希名馬代北馬如雲由來重取舍王官待才能髙下不苟且行都未脩飾黄金誰變瓦吾當保吾真甘歸事田野寘蟻橘林下正在結實時附縁與出入安可責於斯養大不問細使逺不問遲逺遟必有報細大必有期休哉豢龍氏終自辨蛟螭僧子思以巻來見明珠與翡翠中國反好之詩書出鄒魯誦學無蠻􅆥服彼而習此養騂安問犂古者耕釣士處心殊處卑譬彼乃可語吾病彊扶持依韻和揚州許待制竹拄杖楚竹翦霜叢何慙漢使邛鳩形殊用刻馬箠不同功挺特生難變支離分巳窮輕肥思比鶴短髮任如蓬倚以為髙趣持之見素風歩郊聊實下行樂偶従東屢刺莓苔破深穿苑圃通辯繁時畫地黙意或書空古血有湘跡舊林無阮蹤將渠誰覺老要此豈闗慵莫駭傾巢鳥須虞蠹穴蟲誰能求道術跨作上天龍遇畫工來嵩朝來又入揚州郭千萬中人識者誰唯有來嵩曽畫我依稀見似昔年時省符上人春秋一萬八千字不間呉人楚人事佛衣儒談世已罕節行又與其徒異往來揚州三十年曽見華堂荆棘地獨聞依舊坐焚香尚把殘編討遺意沈學士景休知真州太守旛旗近國門州民迎望若雲屯家風自有東陽詠主道新移北海樽紅錦臂韝觀粉質塗金珂勒駕朱軒他時儻取春秋對莫以周襄出鄭論送杜君懿屯田通判宣州京兆外郎稱善書當時相與集江都日書藤紙爭持去長鉤細畫如珊瑚自兹乖隔三十載始駕吾鄉別乗車吾鄉素誇紫毫筆因我又加蒼鼠鬚最先賞愛杜丞相中間喜用蔡君謨爾後仿傳無限數州符縣板仍抺塗鼠雖可殺不易得貓口奪之煩叱驅若君字大筆亦大穿墉𤨏質無長覘君到官治事餘呼諸葛試問渠張聖民學士出御書幷法帖共閱之又一軸蘇子美書杜懿病焉冰膠楚舸歳將窮廣陵别乗憐老翁殷勤來邀彊一往虛堂肴酒羅甘豐我病胃寒不下咽匕箸謾舉叨席中主人欲客心意歡出以飛帛騰龍鸞刑政二字布楷法古今書帖未足觀坐間杜子好弄筆詆譏前輩無全完一見寳蹤天下妙稽首贊仰舌吻乾如此别識已太險我不頌詠還應難讀黃莘秘校巻嵇康昔彈廣陵散商聲髙與宫聲緩託名山鬼未傳人古桐紉絲絲不斷一聞僵臥竊其音世間雖得能亦罕賢明以之知盛衰愚昧以之為妄誕頃年過我在蕪城忽聽長拍去欲嬾鳳皇養雛飛未髙雞鶩成羣翅終短龍章秀骨苦輕時繼作五言須款款贈許待制歳旦生旦天厯重更端哲人兹命世嘗聞月旦評况是髙陽裔椒花作夀杯爆火通爐桂穹龜及蒼鶴尚以千年係曰惟五行秀復與明時契他日求老成不須從渭汭答宣闐司理六經義趣深傳訓或得失後人語雖淺辨識猶百一歐陽最知我初時且尚窒比以為橄欖廻甘始稱逆老於文學人尚不即究悉冝乎與世士横爾遭詬唧誓將黙無言負暄方抱膝非非孰是是都莫荅問詰歳暮宣參軍辭如鮑昭逸粲然傾明珠襃我頗過實便言楚江萍光彩侔旭日自慙流浪蹤不得蒿芹匹復為苦硬句酬報彊把筆答鵝湖長老紹元示太𤣥圖鵝湖有鵝吾不問鵞湖無鵝吾不疑道士須換黄庭經釋子自明太𤣥辭噫嘻兮此意迥與山陰别我亦曽非逸少為新韻曽子進早春新雷歳旦發聲嚴冰管寒銷細滴簷花甲將看枝上拆蛇鱗不復地中潛黄河分派來應早白首歸朝意自恬彊欲擬君為秀句便無才思似江淹依韻和馬都官齊少卿酬和同時沈宋稱二豪曽說龍門奪錦袍我對前流接清唱泰山輕重於鴻毛贈江寧王髙士自古江南風俗美喜君髙趣慕先賢藥無逺近寧論報家有圖書不計錢已住秦淮借風月遍尋吳國舊山川塵纓我繫未能解每一來過駐畫船答蕭淵少府巻君先大夫臨終時夢中嘗賦曉寒歌騎龍跨魚不是誕直對上帝傳吟哦才如李賀天亦少冝其在世尤難多文章父子不相似君今平易祖襲那錮鐵錦褧各有用髙下安得與等科大都精意與俗近筆力驅駕能逶迤野雉五色且非鳳知時善鳴雞若何答孫直言都官巻具深相割啗不如無勇人以詩而酬詩徒用多少均我言雖至簡意切誰見親汲井欲到深磨鑑欲盡塵寒泉與青銅光潔靡故新臨觴報嘉貺醉語是天真依韻王司封寶臣答巻王家再見仲宣詩魚目盈車換斗璣自媿不従靈蚌吐誰敎相並夜蟾飛暫増光價千金重終覺枯陳一芥微已屈至珍來彈雀恩蛇衘報此能希髙士王君歸建業風雨起春寒乗湖曉帆送目看𤓰歩雲心近茅家洞忽覺柳已青來時枝尚凍羨爾向江南正開新釀甕呂寺丞家膳春雨薄無泥野苗青入俎深堂開畫圖飛鳥驚寒渚名筆今寂寥嘉賔競推許主人何太勤不異具雞黍趙祕校見訪文學儒家子儒本通天人蠨蛸尚先喜吾黨何迷津津亭一相過不笑復不嚬應此識恬泊曽匪慢爾賔答張令巻嘗聞甥似舅似舅詩尤少古意得河源新聲變春鳥讀之不敢倦十未能一曉顛倒文字間使吾心擾擾依韻答泰州王道粹學士見寄君同黄鵠游海嶠我學白雲歸帝鄉已愛健翅自鼔舞誰憐孤影猶飄揚安得相從在霄漢于今留滯嗟縶韁欲隨輕風挹君袂滿野春雨生迷茫依韻和孫浦二都官展墓由大明精舍而歸新松煙翠入衣巾雨後岡原不起塵霜露悲懷今正切曽非結客去尋春拜壟忽生寒食心應縁春入感啼禽淚霑宿草根仍凍馬立荒沙跡已深野老輟耕風料峭山房開晝日陰森歸鞍却望原頭路羃䍥輕煙物景沈張聖民席上聽張令彈琴一聽履霜霜滿足再聽緑水聲縁谷我行日月闕春波嫩苔沙雨侵魚目漁歌晩唱泛水来天浸滄浪光可掬坐中此意自絃生中郎五弄人難熟人知難熟獨善彈彈拍未終脂駕速鄭衞古來多喜聞卒章為我歌淇澳時聖民赴齊少卿家㑹走筆送王琪江南二月草靑青送子歸時已滿汀誰信而今有忠義秖知七日哭秦廷宣司理餉蒸鵝昔年相國籠之贈今日叅軍饟以蒸一咀肥甘酬短句定應無復謗言興宛陵集卷四十五
