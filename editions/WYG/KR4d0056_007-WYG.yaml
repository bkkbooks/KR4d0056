body:
  text: 宛陵集卷七宋梅堯臣撰夏日晚霽與崔子登周襄故城以下汝州後詩雨脚収不盡斜陽半古城獨攜幽客步閑閲老農耕寳氣無人發陰蟲入夜鳴余非避喧者坐愛逺風清永叔寄澄心堂紙二幅昨朝人自東郡來古紙兩軸緘縢開滑如春冰宻如繭把玩驚喜心徘徊蜀牋脆蠧不禁久剡楮薄慢還可咍書言寄去當寳惜慎勿亂與人翦裁江南李氏有國日百金不許市一枚澄心堂中唯此物静几鋪寫無塵埃當時國破何所有帑藏空竭生苺苔但存圖書及此紙輦大都府非珍瓌于今巳踰六十載弃置大屋牆角堆幅狹不堪作詔命聊備麤使供鸞臺鸞臺天官或好事持歸祕惜何嫌猜君今轉移重增媿無君筆扎無君才心煩収拾乏匱櫝日畏撦裂防嬰孩不忍揮毫徒有思依依還起子山哀聞尹師魯赴涇州幕單于犯邊來漢兵皆死戰昨聞衛將軍賢俊多所薦知君慮不淺永對未央殿天子喜有言軺車因召見籌畫當冕旒袍魚賜銀茜曰臣豈身謀而邀陛下睠青衫出二崤白馬如飛電關山冒風露兒女泣霜霰軍客壯士多劒藝匹夫􅃷賈誼非俗儒慎無輕寡變夏日陪提刑彭學士登周襄王故城聊隨漢使者一上周王城片雨北郊晦殘陽西嶺明野禽呼自别香草問無名誰復黍離詠但興箕潁情王殿丞赴莫州日就余求釣竿數莖以徃今因其使回戲贈去日覓釣竿定能垂釣否若不暇釣魚釣竿當去取詠蜘蛛日結一尺網知吐幾尺絲百蟲為爾食九腹常苦飢宋著作寄鳳茶春雷未出地南土物尚凍呼譟助發生萌穎彊抽􅀢團爲蒼玉璧隱起雙飛鳳獨應近臣頒豈得常寮共顧兹實賤貧何以叨贈貢石碾破微綠山泉貯寒洞味餘㗋舌甘色薄牛馬湩陸氏經不經周公夢不夢雲脚俗所珍鳥觜誇仍衆常常濫杯甌草草盈罌甕寜知有竒品圭角百金中祕惜誰可邀虚齋對禽哢觀水并序庚辰秋七月汝水暴至溢岸親率縣徒以土塞郭門居者知其勢危皆結菴于木末傍徨愁歎故作是詩秋水漫長堤郊原上下迷孤城閉板築髙樹見巢棲耳厭蛙聲極漚生雨㸃齊渚間牛不辨誰爲埽陰霓大水後城中壊廬舍千餘作詩自咎不如無道國而水冒城郭豈敢問天災但慙爲政惡湍廻萬瓦裂槎向千林閣獨此懷百憂思歸臥雲壑依韻和李君讀余注孫子我世本儒術所談聖人篇聖篇闢乎道信謂天地根衆賢發藴奥授業稱專門傳箋與注解璨璨今猶存始欲沿其學陳迹不可言唯餘兵家説自昔罕所論因暇聊發篋故牘尚可温將爲文者備豈必握武賁終資仁義師焉媿道德藩揮毫試析理已厭前輩緐信有一日長可壓千載魂未涉勿言淺尋流方見源廟謀盛䕫卨正議滅烏孫吾徒誠合進尚念有親尊新霽登周王城行行古城頭歴覽古城下水鳥傍人煙河流隔桑柘秋山豁晴翠野老親時稼民訟今已稀閒登厭官舍依韻荅李晉卿結交篇上交執正道下交守竒節當爲蘭死香勿作竹枯裂試㸔温玊堅何似春冰坼貴賤事乃見古今情不别平生相與親晏歳誰可決君能持此意足以表風烈秋日屬疾體羸易生疾况乃凌秋隂㣲寒薄膚腠飲藥増衣衾一日失所治百骸將不任當從華氏學聊欲爲戲禽田家髙樹䕃柴扉青苔照落暉荷鉏山月上尋徑野煙㣲老叟扶童望羸牛帯犢歸燈前飯何有白薤露中肥苦雨秋空幾旬雨四海低鵬翮晝不見日精夜不見月魄灑盡天漢流蒸爛女媧石塗潦將埋輪牛馬困負軛羣蟲無土蟄百果就枝坼安能誅陰虬坐使天地闢聞永叔復館因以寄賀東方有鎩禽巳喜羽翰插重來金馬門莫忘黃牛峽黄牛無冬春逺水生鱗甲今非昔日憂賀酒特新壓九月一日去歳南陽與謝公别今謝巳殁授衣念徂節闔棺傷故人故人昔送我把酒湍水濵只道後期易豈知無㑹因死生意不及欲語鼻先辛既乏羨門術安得如松筠寒暑更數十應亦同埃塵弔李膺祠陰霓横天長劒欲抉匣穎未露兮精鋼已折層冰塞川猛炬方烈凝氣未銷兮髙燄已滅雖忠毅之有志兮當衰運之閉結嗟身禍之不免兮甘就死扵縲絏何賢者之景慕兮或自表而謝絶惟荀公之獲御兮見顔間之氣恱奚服媚之若兹兮蓋操秉乎峻節風裁獨髙而罕接兮號龍門而無凡轍允簡亢不容扵時兮玉雖碎而猶潔痛漢綱之頽圯兮又何毁乎賢哲歴千古而可悲兮故余不得而面結叨此邦而長民兮過舊隴而増咽嗟異代之有遇兮若登履乎閫闑對風樹之蕭蕭兮想魂氣之未竭聊感槩扵斯兮冩憂心之惙惙送李康伯赴武當都監城下漢江流滄波照鬢秋山川包楚塞風物似荆州試聽清砧發何如畫角愁遙知絶戎事水味有槎頭重送得朋如得寳何恨相知晚舊友貴來疎嗟君行復逺秋城隔寒水驛路入蒼巘古情深不深所祝加餐飯田家語幷序庚辰詔書凡民三丁籍一立校與長號弓箭手用備不虞主司欲以多媚上急責郡吏郡吏畏不敢辨遂以屬縣令互搜民口雖老幼不得免上下愁怨天雨淫淫豈助聖上撫育之意邪因録田家之言次爲文以俟採詩者云誰道田家樂春秋税未足里胥扣我門日夕苦煎促盛夏流潦多白水髙扵屋水既害我菽蝗又食我粟前月詔書來生齒復板錄三丁籍一壯惡使操弓韣州符今又嚴老吏持鞭扑搜索稺與艾唯存跛無目田廬敢怨嗟父子各悲哭南畒焉可事買箭賣牛犢愁氣變久雨鐺缶空無粥盲跛不能耕死亡在遟速我聞誠所慙徒爾叨君禄却詠歸去來刈薪向深谷檢覆葉縣魯山田李晉卿餞扵首山寺留别我本山水鄉看山常不足自從到官來塵事便拘束嘗聞此山寺法宇深雲木無由一來過夢想向巖谷案田趨鄰疆跨馬涉平陸良久送我行偶與賞心屬禪庭鳴白雞祖席歌黃鵠野氣逼人寒嵐光添酒緑言離非逺離但愛交情篤重游應有期君亦行車促臥羊山亂石若羣羊縁岡臥斜日曽非左慈化更想初平叱無羶穴蟻去有乳寒泉出誰憶㶚陵原纍纍冢傍質汝墳貧女時再㸃弓手老幼俱集大雨甚寒道死者百餘人自壤河至昆陽老牛陂僵尸相繼汝墳貧家女行哭音悽愴自言有老父孤獨無丁壯郡吏來何暴縣官不敢抗督遣勿稽留龍鍾去􅂝杖勤勤囑四鄰幸願相依傍適聞閭里歸問訊疑猶彊果然寒雨中僵死壤河上弱質無以託横尸無以葬生女不如男雖存何所當拊膺呼蒼天生死將奈向昆陽城試看昆陽下白骨猶銜鏃莫願隍水頭更添新鬼哭老牛陂呉牛行欲老漢馬焉得肥筋力不可恃遊子當念歸雙鳬觀山下溪流照城郭幽庭柏子風自落古壇蒼蘚少人行不見雙鳬見黄雀葉公廟兵物還見驚從來人所悼今看古壁畫應合當時好巳卯歳紫微謝公赴南陽過葉縣陪遊興慶精舍題名壁間而去庚辰歳余來案田因訪舊迹䀌然扵懐故作此謡以志其悲昔與南陽太守行車騎休時訪庭柏今來重看壁間題太守已爲泉下客獨流清血是門人怊悵便令生死隔觀扱兔莽莽蒿萊下紛紛狡兔迷枯株坐守者若箇是忘歸燈花灼灼生寒燼終朝照席明從教占有驗然滅本無情魯山山行適與野情愜千山髙復低好峰隨處改幽徑獨行迷霜落熊升樹林空鹿飲溪人家在何許雲外一聲雞㳺元紫芝琴堂訪古歴荒城城孤落日鳴人琴兩不見破月髙臺傾至香山寺報秀叔家近心還速川長馬易疲望山孤寺出渡水夕陽遟來向林間宿歸須月上時只應庭際鵲已報汝先知寒草寒草纔變枯陳根已含緑始知天地仁誰道風霜酷送崔秀才二首晨風無定巢逺寄鷦鷯枝天寒鼓翼健粒食寜所窺大澤多羣羽翺翔各有時今子振衣去焉能久迍羈少年㳺太學著盡篋中衣獨劒自爲伴無家何處歸秋蓬隨野轉寒鵲遶林飛霄漢有知巳行行寧久微思逺寄師厚馬蹄踐霜雪不畏道路寒㳺子重衣裘慈母懸心肝懸心幾千里冉冉嵗已殘大河今漸涸逺目常不乾度鴈朝夕聞尺書寄亦難願同車輪復勿比弦上丸送師厚歸南陽會天大風遂宿髙陽山寺明日同至姜店往日送子春風前春風酣酣杏正妍今來送歸秋風後秋風摵摵沙滿川馬鬛斜傾毛瑟縮馭吏噤唫足後先弊裘吹裂寒入骨枯株磨戛火欲然忽逢古寺出嵒腹與君下馬相留連殿堂髙下就山勢松柏森聳侵雲巔長廊落葉卷若埽丈室垂幔翻如褰像塑神母乳九子抱攜撫玩皆可憐却令逺客自生念欲見㓜稺心煩煎擁爐對坐日昬黒龕燈共借僧榻眠雖然覆衣冷如鐡不及在家貧無氊曲肱難寐要天曉兩股凍痺仍筋攣桹桹殘夜木魚響起㸔昴畢傾西躔怒號斗息東方白童僕肅整吾將還老僧埽壁持筆硯請予彊此題嵗年出門並轡至山店茅屋揭盡餘尺椽又據胡牀一談笑君不解飲聊開筵程次都無五百里箧中可乏一囊錢拂衣頻起畏日昃應恐慈母心懸懸顧我便當江海去却思此地何由縁疲馬疲馬不畏鞭暮塗知幾千當須量馬力始得君馬全依韻和永叔子履冬夕小齋聮句見寄遙知夜相過對語冷無火險辭鬬尖竒凍地抽筍笴吟成欲寄誰談極唯思我學術窮後先文字少許可敢將蠡測海有似脂出輠必餓嘗見憂此病各又果弊駕當還都重門不須鎻到時春怡怡萬栁枝娜娜定應人折贈只恐絮已墮行橐且不貧明珠藏百顆永叔嘗見嘲謂自古詩人率多寒餓顛困屈原行吟扵澤畔蘇武啗雪扵海上杜甫凍餒扵耒陽李白窮溺扵宣城孟郊盧仝栖栖道路以子之才必類數子今二君又自爲此態而反有飯顆之誚何邪古冢南陽道中作此以下汝州罷官再至鄧州葬希深南陽古原上荒冢若魚鱗劔佩不爲土衣冠應化塵枯骸託魑魅細草殁麒麟何必問名氏漢家多近親仲春同師直至壠山雪中宿穰亭與子乘羸馬夜投山家宿風雪滿綈裘燈火深竹屋烹雞頼主人吠犬憎倦僕明發到巖前春荑凍雲木依韻和師直仲春雪中馬上自倚春風暖輕袍犯雪來過塘迷綠水拂樹雜芳梅山蔽峰難辨樵通徑易開野行方有味緩轡不須催和師直早春雪後五壟道中作來尋谷口春正值隂雲結日暮冰霰緐宿亭孤飯設侵晨登壟去始見羣峰列草凍未抽心松枯猶抱節川傍認飛鷺林上墜殘雪何意待芳菲遟留未堪折依韻和師直晚步徧覽五壠川窮覽川原勝經行未厭頻樵深但聞斧谷暖自留春臨水何妨坐看雲忽滯人誰家煙塢裏竹樹逺相鄰暮春過洪氏汝曲小園三月花巳休閑來羨叢薄河回地勢偏雨入灘聲惡綠草旋抽心青梅猶帶萼主人歸未歸誰省曾遊樂雷祕校入闕擬官時將登舟過輦下與君先後發同走向京華羨躍青驪去將乘烏榜賖著鞭辭宿雨渡水踏春沙聞道求爲縣應當學種花登許昌城望西湖城望許西偏湖光浸曉煙岸痕添宿雨草色際平田夏木陰猶薄朱荷出未圓人閑綠波静幽鷺插頭眠孫主簿惠上黨寺壁胡霈然書墨迹一匣上黨佛祠何可觀開元瑞物圖髙閣又有長廊古壁上復是名輩題丹雘當時泥用絲作筋意欲千載無剥落書竒畫妙了不識訛傳墨土能治平瘧寺僧不惜人掐取筆墨遂缺如鳥啄後來好事恐磨滅寳刀裁剗泥如剥取之龕置緑板匣便寳箱楮同美璞拂拭還㸔體勢生盤屈蒼虬舞鸞鷟在昔不畏屋壁壊今也常恐兒童撲夫君知我心所重南歸贈以致誠慤此時雖喜落吾手老大腕硬無由學但當拜貺不敢忘若爲報言首未數寄永興招討夏太尉代人寳元元年西夏叛天子命將臨戎行二年孟春果來冦髙奴城下皆氐羌五原偏師急赴敵晝夜不息趨戰場馬煩人怠當勁虜雖持利器安得强二師覆敗乃自取豈是廊廟謀不臧朝廷又選益經略三幕賢俊務所長或取李悝備邊策或欲五道出朔方仲夏科民挾弓矢季冬括驢齎道糧官軍未進復犯塞搴旗殺將何猖狂遂令士卒愈沮氣欲使乘障膽不張我願助畫迹且逺側身西望空淒涼庶幾一言可禆益臨風欲寄鳥翼翔所宜畜鋭保城壁轉饋先在通行商守而勿追彼自困境上未免小敓攘譬如蚊䖟噆膚體實扵肌血無大傷此言雖小可喻逺幸公采用不我忘誠如公慮若裴度聖上聽用同憲皇當時豈不歴歳月猶且衆鎮未陸梁况今鷹犬乏雄勇便擬馳騁徒蒼惶且緩須時勵犀卒終期拉朽功莫當桓妒妻昔聞桓司馬娶妾貌甚都其妻南郡主悍妒誰與俱持刀擁羣婢逕往將必屠妾時在窗前解鬟臨鏡梳鬒髪雲垂地瑩姿冰照壺妾初見主來綰髻下庭隅歛手語出處國破家巳殂無心來至此豈願奉君娯今日苟見殺雖死生不殊主乃擲刃前抱持一長吁曰我見猶憐何况是老奴盛怒反爲喜哀矜非始圖嫉忌尚服美傷哉今亦無宛陵集卷七
