body:
  text: 宛陵集巻三十四宋梅堯臣撰使風胯下橋南逆水風十幅蒲帆彎若弓淮波帯日魚鱗紅岌岌飛上北斗中龜山始撞人定鐘岸草澀澀鳴秋蟲田家屋上壺脩蔓屋頭綴大壺檐外垂霜乾葉猶苦風斷根未移收挂煙突近開充酒具遲賤生無所用㑹有千金時九月二日夢後寄裴如晦裴生安健否試聞鴈經過處士賦鸚鵡將軍養駱駝食魚今飽未索米奈貧何昨夜分明夢持書認篆窠昭信淮上清淮𣺌然去白浪勢如奔同發已先遠獨行將向昬洲長寧辨路夜泊偶依邨燈火稍覺亂應聞人語喧小邨淮闊洲多忽有邨棘籬疎敗漫為門寒雞得食自呼伴老叟無衣猶抱孫野艇鳥翹唯斷纜枯桑水齧只危根嗟哉生計一如此謬入王民版籍論難知自古難知不遇人朝為蛇䑕暮龍鱗魏齊客溺箐中死亭長妻輕胯下貧白石夜歌誰與進黄金懷印自能伸丈夫只患無才業何恨區區逐路塵九山我經九山問野叟崔嵬一無安曰九且恐斷岸積瓊玖復意陂原多産韭又疑堆壟若柱灸四者未悟叟不言使我臨流獨搔首淮岸秋水刷土骨峭瘦如老石虚沙歸島嶼寒浪漱竅隙下過白魚尾上有蒼獺迹平岡自相連野籜鳴風櫟原有禽倏鳴升遽黙下小禽不盈握羽翮自輕㨗裊裊上雲鳴聲窮如隕葉雀懷啄粟娛鷃有棲蒿愜嗟嗟力甚微枉與鷹鸇接浮來山舊說此山産雲母秦鬼驅卯沙聚結無蒼翠誰云海上移能與潮浮至洞嘘蛟鼉腥廟畫風雷異雲母今有無庶為仙藥餌泊下黄溪黄溪晩來泊得見田家微刺艇斜陽下耕洲載耒歸牛鳴向空犢犬喜入人衣復有返樵者檐枯翹雉肥濠梁感懷天子昔封禪吾叔從金輿廻首泰山下出建雙隼旟來尋觀魚臺遂逺承明廬當時十五詠螢照墨石書渦口秋水見灘底淺沙交浪㾗白魚跳處急宿鴈下時昬帶月入渦尾落帆防石根清淮行未盡明日又前邨夢同諸公餞仲文夢中坐上作已許郊間陳祖席少停車馬莫催行劉郎休恨三千里樽酒十分聽我傾過塗荆二山遇暗石淮流兩山間勢束秋漲急聚石如伏兵斂斂波下立輕舟不可防而况昧所習暗值柂已毁後者戒前及同發去漸遥更愁寒灘澀舟上采菊泯泯平慢流行當季秋月演漾過汀洲汀洲芳杜歇白露夜正霏黄菊寒更發采以泛酒巵不獨映華髮朝暮氣候輒未定寒暄朝暮間挾纊水風生衣綌川陽還緑草藏䆳岸枯櫟植髙山且非天時異順理心自閑荆山和楚人兹楚地泣玉山無所記但見楚人誇産玉古廟幽幽無鬼哭儻有鬼定無足塗山古傳神禹迹今向舊山阿莫問辛壬娶從來甲子多夜淮低激射朝江上嵯峩荒廟立泥骨巖頭風雨過曉日出舟曉日升曈曨波上爛爛黄金鎔羃䍥紫煙生鏡中釣船似畫分横縱風莫從虎雲從龍變作霏霞重復重雞聲雞聲踏曉呼呼起扶桑烏含光如車輪碾雲蹤迹無誰敎夸父逐遠向鄧林趨復從海底轉循環似轆轤采杞誰謂岸無杞條其長矣誰謂杞無實爛其皇矣掇彼征矣檐既盈矣捨棘與蠧造此宜酒維此宜酒我挹我注我飲我助以養我籲泊橛澗觀渡隔岸呼舟楫臨河立馬牛解鞍沙上憩沉網渚間收殘日銜沙尾孤帆落戍頭莫愁暄作雨晚水白煙浮看山寄宋中道前山不礙遠斷處吐尖碧研青㸃無光澹墨近有迹前林横白雲復與後嶺隔孤舟川上人引望不知夕安得老畫師冩寄幽懷客暮雨水上魚吹白露山頭雲與龍附潭中水作潭中雨朱鼈飛過吳洲去鯉魚相隨不知數老蛤銜泥在深處細雨樵行鮫人困卧寒潭底怗波濛濛垂白綃波上女兒飛輕橈逆流自與郎去樵風吹鬢髮不及撩雅翅巻起蠆尾翹儂纈羅帯長繞腰日暮下來吹短簫晨雅雲昬月黑雅不知鼓聲鼕鼕雞報啼睥睨未辨天東西癡雛噪舞羣翅低野桑葉巻風淒淒濃霧不起寒雨迷晨雅却歸巢上棲㑹稽婦食藕莫問濁水泥嫁壻莫問寒家兒寒兒黧黑面無脂驥子縱瘦骨骼竒買臣貧賤妻生離行歌負薪何媿之髙車來駕建朱旗銅牙文弩擐犀皮官迎吏走萬馬蹄江湖晝起横白霓舊妻呼載後乗歸悔淚夜落無聲啼吳酒雖美吳魚肥儂今豢養慙豬雞園中髙樹多曲枝一日挂與桑蟲齊九日次壽州昔人把菊望青榼今我持酒無黄花自催屋裏紅鱗膾不彈牆頭白項雅壽春城髙枕淮水緑蒲疎疎暮帆起登臨不學孟叅軍帽墜山風費嘲紙泊壽春龍潭上夜半黑風破一舟盲風吼空來不識前山遮廻激入灣口暗浪騰水涯喧聞破我船沈沒驚一家晦昧若塗漆心緒如亂麻燈光不出户鬼火空照沙百物任飄蕩薄命誰怨嗟但存此空舟坐類鳥寄槎妻孥皆失色一夕鬢欲華邅惶俟天明頃刻抵嵗遐雨寒雞唱遲况乃城上雅潁上得鯉魚為鱠懷餘姚謝師厚青蓑潭上老赬尾網中魚買作秋盤膾還思遠客書越齏橙熟久楚飯稻舂初雖去故鄉遠不嫌為饌疎邱家渡早發曲潁若秋蛇屈盤鱗甲活問戍得耕人拾魚逢祭獺草窠殘野燒樹挂經流沫百里相對看瀕行媿迂闊水次蘚花秋雨日霏霏碧花生疊疊水邊有神女妝去遺翠靨岸側小家婦不知所宜愜未得未還人自將渾面帖夜行憶山中青熒鬼火動不悟前山雨昬徑梟鳥鳴獨行毛髪聚槲葉枯綴林風動疑有虎低迷薄雲開心喜澹月吐邨醪雨濕破荆籬風摇樹亞旗小槽聲不急挈榼問沽遲摘果野棠熟望人船火隨燈前相對飲還似昔過時川上田家斜光隔河明入照桑柘下皋壟生麥苗青青尚堪把遠見牛羊歸相親童稚野醉歌秋草間頗與世家寡發匀陵秋雨密無迹濛濛在一川孤邨望漸遠去鳥飛已先向晩雲漏日微光人倚船安知偶自適落岸逢沙泉聞鴈濕雲夜不散薄處微有星孤鴈去何急一聲愁更聽心應失舊侶翅巳髙青冥幾日江海上鳬鷗共滿汀牽船人沙洲折脚鴈疑人鋪翅行奈何暮雨來復值寒風生濕毛染泥滓縮頸無鳴聲爾軰正若此猶勝被堅兵田人夜歸田收野更㢠墟里隔煙陂荒徑巳風急獨行唯犬隨荆扉候不掩穉子望先知自是一生樂何須閭井為行次潁州聞張甥宗亮不㨗鄉薦以詩唁而迎之闕陰道雨冷江南書始歎與意異何慙定鑑疎但玉切莫道黔驢不負當時約馳迎一乗車聞櫓舟下中流聞櫓聲隔窻燈已暗巻幔月微明漸遠遥應宿枕驚客心何苦急曽是不縁名鷗陽鷗鳥雙飛去雙飛如有歸並宿向何處汀永落沙沮洳不避近行舟應知心寡慮晴盡朝日吐清光萬里不礙日衆鳥欣哢吭草山川尚鬱蒼百事擇佳日佳日唯晴陽次項城阻風舟不能進風急輕舟晩不前因來泊古渡聊且上平田草穩鶉驚去瞥然却尋孤岸遠吹幘亂華顛斫膾懷永叔髙河古穴深下有蒼鱗鯽出水獰將飛落刀細可織香秔炊正滑白酒美少力但欠平生歡共此中路食夜漁夜漁歸自速短艇若飛雲水動月猶白挐音人不聞廻身明燭底撫巻至宵分我以此為足勞勞非爾羣驚鳬驚鳬雖避人終戀舊所泊盡背船頭去却從船尾落須知取勢髙不是初飛錯十月三日相公花下小飲賦四題拒霜木杪芙蓉花開非紅豔早常畏晩霜寒朱華競衰草九月二十八日牡丹香包已向青春發又見秋深特地開應笑菊殘無意思不能邀賦洛陽才殘菊零落黄金蕊雖枯不改香深叢隱孤秀猶得奉清觴三日讌集蕭然寒圃有殘芳吟遍朱欄向夕陽既許坐陪公衮䝿却慙蒿羽接鸞皇依韻許主客北樓夜㑹一月能逢幾笑歡髙樓紅蠟滴金盤吟餘隴首雲初散唱盡陽關露已寒不管星河漸西落自將煙水去程寛當時坐客各南北誰憶重遊泛木蘭謹和相國屋上菊叢屋上有叢菊結根深瓦縫既無地勢美又乏土力擁乃因塗明生不由人所種亦能應節開焉取入公用公來歩廣庭聞鴈目始縱忽見粲然英降植合常從賔僚席其傍詠玩意已重物莫厭僻遠㑹遇良可頌寒菜畦蔬收莫晩圃吏巳能供根脆土將凍葉萎霜漸濃不應虚匕箸還得間庖饔旨蓄詩人詠從來用禦冬送裴節推歸京遠水未生凍輕舟歸大梁岸廻初向月篙滑始霑霜清世豈淹俊上公存薦章行應重對䇿莫媿漢賢良十月菊上蜂黄蜂得晴日不道菊開稀向蕊晩寒起落叢無力飛輕輕難自舉怗怗一何微莫問巢房處斜陽奈欲歸送江學士睦州通判渉淮淮水淺泝溪溪水遲君到桐廬日正值米茶時試問嚴陵迹今復有誰知和民樂嵗晩場功畢野老相經過有酒自斟酌適意同笑歌大兒緝牛衣小兒護雞窠囷廩見餘積息戍靡負戈林間落熟果屋裏鳴寒梭㑹待朔雪時狐兔生罝闕飫鮮持作腊贈乏不言他是非了莫問此理當如何和晩花春花莫厭早秋草莫厭遲各不相羨慕榮枯乃繫時芙蓉東籬英雖晚亦自宜霜前給給開霜後差差萎深處有孤萼寒月尚見披野蜂徒愛香凍翼不能支抱枝無力去憫然見恩私聞進士販茶自此宣州至和二年五月後山園茶盛四五月江南竊販如豺狼頑凶少壯冒嶺險夜行作隊如刀槍浮浪書生亦貪利史笥經箱為盜囊津頭吏卒雖捕獲官司直惜儒衣裳却來城中談孔孟言語便欲非堯湯三日夏雨刺昬墊五日炎熱譏旱傷百端得錢事酒䏑屋裏餓婦無餱糧一身溝壑乃自取將相賢科何爾當梅雨三日雨不止蚯蚓上我堂濕菌生枯籬潤氣醭素裳東池蝦蟇兒無限相跳梁野草侵花圃忽與欄干長門前無車馬苔色何蒼蒼屋後昭亭山又被雲蔽藏四向不可往靜坐唯一牀寂然忘外慮微誦黄庭章妻子笑我閑曷不自舉觴已勝伯倫婦一醉猶在傍鳥毁燕巢堂間兩胡燕哺雛銜百蟲老雅亦養子偷雛燕巢中燕巢忽墮地六七皆命窮赤身無羽翼腸斷彼雌雄來往徒鳴聲安得置室宫我閔樓窶籔俄巳强雨風從今更生卵不若受女娀五月十三日大水誰知山中水忽向舍外流誰知門前路已通溪中舟窮蛇上竹枝聚蚓登堦陬我家地勢髙四顧如湖滮浮萍穿籬眼斷葑過屋頭官吏救市橋停車當市樓應念此中居望不辯馬牛危湍㵼天河漫漫無汀洲羣蛙正得時日夜鳴不休戢戢後池魚隨波去難留揚鬐雖自在江上多網鈎紛紜閭里兒踊躍竟學泅吾慕孔宣父有意乗桴浮宛陵集巻三十四
