body:
  text: 宛陵集卷二十三宋梅堯臣撰送刁經臣歸潤州兼寄曇師古來山林士一往不復返區區世上名豈畢車自挽前有髙山危後有落日晚未知所止息已慕田家飯愛君京口歸萬事不著眼乗馬飾鞍轡乗舟畫屋版長塗與白浪健駛固莫限力殫風定時各各繫岸棧寄語老空人青崖勿鉏剗贈狄梁公十二代孫國賔雄雉飛上天牝雞白日鳴驅逐鳯皇雛百鳥不出聲豈無鵰與鶚至死莫得爭孤鶴獨不懼使風羽翼成鶴性本君子嘹唳通太清至今有其孫踉蹌田中行明時與稻粱重節亦䝿名爾無沖天力且與鶖鶬并慎勿啄泥穢坐使白鷺輕寄金山曇穎師呈永叔内翰江中峩峩山上有道人住風濤響殿閣雲霧生席屨道人如不聞道人如不顧誰能識此心來往只鷗鷺京洛三十年塵埃一相遇我與信都公已落衣冠故平生守仁義齒髪忽衰暮世事不我拘自有浩然趣未由逢故人坐石語平素寄題刁經臣潤州園亭新作城邉圃陂原上下斜竹多劉裕宅松接戴顒家山色不須買江流何處涯但邀東海月莫聽五更鴉次韻和永叔夜坐鼓琴有感二首夜坐彈玉琴琴韻與指隨不辭再三彈但恨世少知知公愛陶潛全身衰弊時有琴不安絃與俗異所為寂然得真趣乃至無言期舜琴曰朕有語舜鬱陶乎孝悌怨則否傲恨媿豈無我嘗撫巻歎歎此孟氏書此書有深意仁義豈久虛公今乃有感其不在兹歟魚躍與鶴舞物情曽未殊無情則無應何必問鳥魚李尚書挽詞二首相門三世䝿家法百年同天子賜恩禮史臣書祖風笳聲穿苦霧隴穴起寒蓬自古焉能免於兹是始終伊水西頭月青山北脚雲夜臺無復曉隂嶺有時熏龍劒雙埋沒庭蘭竟鬱芬不知門下客誰刻道傍文送朱司封知登州駕言發夷門東方守牟城城臨滄海上不猒風濤聲海市有時望閭屋空虚生車馬或隱見人物亦縱横變怪其若此安知無蓬瀛昨日聞公說今日聞公行行將勸農耕用之卜隂晴送代州錢防禦堂堂鴈門行赫赫符節分紫塞千里障紅旗十萬軍世家王爵䝿祖廟將臣勲鐘鼔陳牛酒衣裘論典墳呼鷹下青漢牧馬出黄雲竇憲何為者燕然解勒文寄題廬陵董氏桂林書齋山東桑柘多江南松桂茂種桑事春蠶栽桂事華構嘗聞雲葢下聚書為大富往往見子孫縁天掇星宿掇星星若珠光彩出屋漏秋收萬種田作酒日為夀亦有千里歸錦衣行白晝次韻永叔乞藥有感子厚論鍾乳要若鵝翎筒安取啗棗栗謂相出山東所産有所美慎勿憑邨僮公問我餌藥石臼將使礱我餌乃藤根得方非倉公曽聞李習之其品今頗同此物俗為賤不入䝿品中吾妻希孟光自春供梁鴻荏苒歳月久顔丹聽益聰雖能氣血盛不療貧病攻何如面黧黒腰金明光宮亦莫如學釣緡鉤懸香藭但知煙水樂寧計身瘠豐我生無快意豈異抱篤癃公乎忽我求略辯雌與雄雄赤而雌白由來不同功沙合固切似朋好殊未竆長年苟不遇笑殺渭上翁和王景彞正月十四日夜有感燈光煖熱夜催春天半樓開飲近臣馳道横頭起山岳露臺周匝簇車輪隔簾豔色多相照下馬輕豪各競新我已暮年殊趣嚮濃油一琖案邉身送雷太簡知虢州牛車讀古書少作游秦客一朝起為郎華省何赫赫若有南山雲時時生枕席雲潤不益老呼吸乗閒隙抱痾初駭聞既愈賴藥石遂請虢太守虢事簡且適况有三堂存韓詩猶可覿永歌復飲酒東平希阮籍次韻和景彞元夕雨晴春雲收暮城九陌灑然清星出紫霄下月從滄海明車音還似晝鼓響已知晴靜閉衡門卧無心學後生早春書局即事薔薇結舊蔓夭桃種新紅傷根桃不死著架蔓依叢要以玩芳物亦寧負春風誰念太行下移谷學愚公古意林中即鹿人常為虎所即虎豈援鹿者亦各求其食趨利不顧害禍患安可息古來遯世上輕彼用智力送李閣使知冀州騕褭黄金絡春風北渡河將軍守漢法壯士發燕歌綠水塘蒲短晴天塞鴈多家聲復年少矍鑠笑㢘頗郭園梅花二月一日未逢柳條青獨見梅蕊好猶怯春風寒不比江南早清香拂酒杯素色欺蓬葆佳人金縷衣唱徹嗟身老送襄陵李令彦輔李宋丞相妹壻永叔少居隨州常往其家公相為近親翰林為故人親舊各䝿顯青袍未離身六十去作令豈慕要路津又思漢東歸便置漉酒巾深希陶淵明澹然意已真食棗齒易黄晉俗誠自淳尚不顧隋珠安肯與此鄰送君識君心埽迹向世塵且歸漢東便欲致仕詠劉仲更澤州園中醜石君家太湖石何從太湖得太湖天東南太行天西北相去三千里雖有何致力古人煩舟車頑質無羽翼竅引木蓮根木蓮依以植秋蛇出其中舌吐虹霓色君常夸於我怪怪亦特特以醜世為惡兹以醜為徳事固無醜好醜好䝿不惑送趙子淵知潁州舊榖不棲畝新春原鹿飢野荒多冦敓詔發撫疲羸驛騎東風急菑田小雨遟應同漢太守膏澤亦能隨寄題楊敏叔虢州吏隱亭賢哉虢略君守虢事頗簡有亭後園中登覽早至晚了了松柏關氣象入醉眼花草發𤨏細禽鳥啼睍睆竟日人不來亦莫去杯琖次韻王舎人憶省中小桃寄江學士淺綻燕脂紫蠟芳深斟吳酎白瓊觴鳯池人憶去年豔雉省客無今日狅髣髴物華先上苑依稀歌吹下昭陽平明社雨莫催促應翫移牀欲近傍去嵗正聞禁中賞花次韻劉原甫社後對雪社日遇羣飲北風歸馬驕陽烏雲斗晦來燕翅難調朝霰侵花冷春英到地消宿酲無酒解薄被覺寒饒爐炭重燃獸衣裘更御貂蟄宮蟲復閉時鳥腹將枵㸃綴何多思輕狅不奈飄唯知妍可玩寧恤氣為妖剡客偶然興海神非次朝唱髙仍和寡公又作長謡次韻永叔二月雪春雲損萌牙未必摧杞菊我心無愛憎隨分樂自足桃李紅間白豈不恱我目杞菊嫩且甘豈不飽我腹看花食蔬仍舉杯趁取衰遟鬢猶綠聞王景彞雪中禖祀還二月漫漫雪齋宮夜寂寥壇場祠乙鳥桑柘響隂梟履帶春泥重駒回廣野驕還批五色詔池上踏瓊瑶來帖云絃歌之外時復林梟哀鳴次韻景彞祀髙禖書事聞說郊禖喜氣翔曽由乙卯命封商今朝鐘鼓登歌祀何日熊羆作夢祥埽雪野廬風凜凜陞壇公衮佩鏘鏘君門賜胙予何有不似矜誇鳯沼傍次韻和永叔雨中寄原甫舎人賴得春巢燕未歸髙檐終日雨衰衰細籠芳草踏青後欲打棃花寒食時美景已嗟空過盡名園猶許誤相隨錦鞍切莫九衢去拍拍一如鵝鴨池社日曽慎赴北園毛君寳祕校將出京示予詩因以荅之古城踏成谷不見人馬蹤古人豈不行舊迹豈不重從何求故歩往返自憧憧觀君百篇詩善畫人形容毫髪無不似落筆任縱横曷如握明鏡物物目所逢贈以東南歸擲去手中邛劉仲更於唐書局中種郁李冷局少風景買花栽作春前時櫻桃過今日雀李新榒條紅蓓蕾婀娜含雨匀舊來薔薇叢饒借與近鄰始移棣萼密不慙車下榛日暮綴書罷暫賞舉杯踆和劉原甫復雨寄永叔階下青苔欲染衣晴光纔漏又霏微衝風燕子銜泥去隔樹鵓鴣嗔婦歸乍冷乍隂將禁火自開自掩不關扉渾身酸削嬾能出莫怪與公往還稀送正仲都官知睦州每嗟相逢少常苦離别多行行復壯壯往往起悲歌古來易水上義士有荆軻捐軀思報恩飲恨歌奈何况彼兒女懷牽纒如蔓蘿是以世間人鬢髪易番番喜君得郡章東歸隨春波灘上嚴子祠繫船聊經過其人當漢興富䝿不可羅足加天子腹傲去釣于河冬披破羊裘夏披破草蓑心中小宇宙尤哂獻玉和我慙賤丈夫豈異帶面儺未免為鬼笑誰知懼揮訶安知如君行收迹已蹉跎空將閑嵗月塵埃浪銷磨正同三峡賈盡力向盤渦續永叔歸田樂秋冬二首秋風忽來鳴蟪蛄豆葉半黄陂水枯織婦夜作露欲冷社酒已熟人相呼坎坎擊鼓坐林下醉去自有兒童扶壯男獨獵南山虎中子已扱荒徑狐田家此樂樂有餘食肉緝皮裘豈無我雖愛之乏寸土待買短艇歸江湖北風如刀割寒骨榖已成囷不倉猝任從密雪落交加旋採乾薪燒榾柮鉏犂滿屋牛在牢鵝鴨亂鳴雞亂發割􅖒炊黍待鄰叟飽向茅檐閑兀兀田家此樂樂無涯誰能一生空汩沒公希平子定何如我效梁鴻終適越和介甫明妃曲明妃命薄漢計拙憑仗丹青死誤人一别漢宮空掩淚便隨邊馬向邊塵馬上山川難記憶明明夜月如相識月下琵琶旋製聲手彈心苦誰知得辭家只欲奉君王豈意蛾眉入虎狼男兒反覆尚不保女子輕微何可望青冢猶存塞路逺長安不見舊陵荒酬楊愈太丞之夀州見别疇昔西州謝法曹聲名籍甚我徒勞升沉一府已荒冢憔悴兩人猶二毛眼見榮華能幾日心知富䝿只秋毫淮南魚美香秔滑飽去清吟豈不髙贈太子太傅王尚書挽詞二首周原開隴隧鹵簿葬名臣北極履聲絶東朝車迹湮藏舟移夜壑棲鵩去承塵共看劉寛墓碑隂幾許人平生性忠厚所守必尊君面實賢愚混心惟白黑分事光中執法書集右將軍天意苦埋沒北邙松柏墳送陜西都運彭待制塞下兵難去關中粟未多君心同漢帝糧道得蕭何圅谷馬蹄入渭橋車轍過地形終險固山色舊嵯峩不媿先賢傳重聽得寳歌歸來奏天子安穩看鳴珂送羅職方知秀州陸雲嘗誇千里蒓便輕羊酪同埃塵君今得郡正千里已患無羊猒此珍乃知南北各所樂乗舟不如乗馬惡水邉不見秦羅敷縱有西施肌肉薄使君事事未稱意綠水芙蓉定何若寄懷劉使君敔昔我從仲父三年在河内春游丹水上花竹弄粉黛人誇走馬來盡眼看沒背薄暮半醉歸插花紅簇隊使君今少年時往勸耕耒安行過樹下野杏正破纇何不學山公酩酊還倒載令人知使君心膽不𤨏碎切莫懲婦翁慷慨臨并代一朝由謗謫雖去民苦愛實計幸不幸豈較進與退因書寄此懷繩墨老且悔贈僕射侍中劉相公挽詞三首處外諸侯重居朝聖主知祅逢庚子日夢異武丁時歸椁關山逺凝笳道路悲欲傳千古迹佐世本無為古今皆可見富䝿不常存歌者未離席弔賔俄在門朱輪空返轍綠酒尚盈樽人事固如此令名貽後昆歎此微末迹見公三十年䝿為天子相能擇大夫賢東第門䦨在南州隴隧延立碑思叔子墮淚峴山前送胥平叔太博通判湖州依依隄邉栁泛泛水中舟舟行無逺近栁影不隨流東風欲粉絮相逐江上頭正見魮魚來貫條尾脩脩使斫横刀膾便銷千里愁檣端燕暫語即飛入髙樓樓中饒客飲共候風色柔明朝同挂帆直過南徐州吳地多平湖䌫柁明鏡秋芙蕖拂兩舷女艇花厎謳不羡乗五馬却逢羅敷羞此官當此時莫憶塵中游寄題張令陽翟希隱堂每讀陶潛詩令人忘世慮潛本太尉孫心逺迹亦去不希五斗粟自種五株樹曠然箕山情復起濠上趣今時有若此我豈不懷慕李士元學士守臨邛日有榖一莖九穟者數本芝數本蓮花連葉並蔕者各一本因賦之臨邛傳瑞物太守在郡時既多九穟榖復有三秀芝芝以保萬夀榖以豐東菑更看芙蓉葉並蔕照清池宛陵集卷二十三
