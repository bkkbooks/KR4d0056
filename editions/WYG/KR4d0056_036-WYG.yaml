body:
  text: 宛陵集巻三十六宋梅堯臣撰送方進士遊廬山長風沙浪屋許大羅刹石齒水下排歴此二險過湓浦始見瀑布懸蒼厓繫舟上岸入松徑三日踏穿新蠟鞵路盤深谷出嶺望後山日照前山霾偶逢風雨恐衣濕側倚石脇人相乖雨收不覺在高處却見童僕提攜偕水聲不絶鳥聲好藥草香氣侵人懷老僧避俗去足跣野客就澗開門䦱樹巖隱映見寺刹層層杳杳躋雲階塢田將穫鳥雀横秋果正熟猴猨􅀈東林澹齏應似舊唯此足以待爾儕子心灑落撇然往我方塵垢難磨揩讀日者傳荅俞生宋忠為大夫賈誼為博士同與休沐下訪卜長安市吾不如二人讀書無舉跬借曰當乗肥乗肥非吾指唯思泉石間坐卧松風美隱靜山懷賢師自持柏栽二十本種於㑹慶堂新作齋堂祠畫像又興髙閣祕天蹤今朝還藉君移柏昨日已因鵝種松近以羣鵝換松植於路傍九月六日登舟再和潘歙州紙硯文房四寶出二郡邇來賞愛君與予予傳澄心古紙樣君使製之精意餘自兹重詠南堂紙將令世人知首尾又得水底碧玉腴溪匠畏持如抱虺拜貺雙珍不可辭年衰只怕擨揄鬼九月十一日下昭亭舟中平生山野性坐卧愛流水適從昭亭來興自明河起小舟浮輕查身入星辰裏飲牛誰家郎照鬢誰家子隔岸心相望翻然洲鵲喜灘頭磷磷石欲贈畏指毁留取自支機成都無卜士和張簿寧國山門六題山門按碑本軌轍作二軌雙峙作雙壁第六句作田外峰巒回抱兮陳卑尊當從碑本青山中穴為大門下通軌轍髙莫論飛雲出納不計限雙峙平削無刀㾗入門復見田園美田外峰巒回抱尊棲靈畜怪不可詰䕫魈往往來守閽紫雲巖髙巖日照雲常起吹作蘭花透紋綺横為歩障看未收山雨一來風滿耳夕陽巖日脚射空金縷直下映壁間梭未織野老先知雨又風明朝望此重雲黑朝陽洞洞門雖向扶桑開洞深不放陽烏入古來道士今莫逢石壁乳流苔正濕漣漪洞流泉決決出洞厎自有細浪非風吹山花逐水到山下漏泄人間春未知碧雲洞誰將萬古倚雲劒刺破蒼石天窻開下貯泓淵不可極有時月漏清光來將離宣城寄吳正仲吳均詩語多竒揭苦倩鴛鴦謝明月昭亭川上此禽閑為寄吳郎吾西發西歸千里浮輕舟夜觀蟾光逆水流水流東海月西海各去雖殊意長在月偏皎皎隨人行水亦沄沄非浪改酒盆龍杓閑到吟梅花重葉將誰采湯珙祕校遺沈水管筆一枝沉香細榦天通中束毫為呼諸葛翁久從海上厭持握乞與阮籍書塗窮物珍豈宜賤子有更後應合歸王公虚堂淨几塵不到硯傍置架珊瑚紅乃知用遇自有處君今莫歎居蒿蓬檥舟昭亭送都官暫歸錢唐前枉大梁城詩賦嘉入幕兹對昭亭山將行還有作别離此與彼終始情不薄我為解羈馬君乃髙飛鶴塵蹄未能息徤翅懷棲泊尋巢望吳田一傍華亭郭况多丹頂雛坐看翔寥廓依韻公澤察推君來何所聞君去何所見自古慕虚名往往輕既面竊常恃賦稟平直如勁箭是以五十年長甘守貧賤相逢嗟未幾遽遠劇飛電今雖行巳晚多謝勤相唁晏成續太祝遺雙井茶五品茶具四枚近詩六十篇因以為謝始於歐陽永叔席乃識雙井絶品茶次逢江東許子春又出鷹爪與露芽鷹爪斷之中有光碾成雪色浮乳花晏公風流丞相族以此五色論等差逺走犀兵至蓬巷青篛出篋封題加紋柘冰磁作精具靈味一啜驅昬邪神還氣王讀髙詠六十五篇金出沙已從鍛鍊出至寶終老不變傳幽遐自惟平昔所得者何異瓦礫空盈車滌心洗腑彊為荅愈苦愈拙徒興嗟留題開元寺仙上人平雲閣背市面山色平目觀白雲漁舟溪上歌游客欄邊聞俯簷翠柏瘦蔓籬秋實蕡偶來心意靜塵慮如埽坌送黄生我本東西南北人窮塗不復淚霑巾亦知車馬有行色為見長沮與問津别張景嵩我雖識君晚君能知我心我心昭亭水見厎無尺尋照之不為隱測之不為深魚鰕既混混藻荇亦侵侵終當至滄海浴日開黄金君當下灘去石浪激寒音猶能洗君目病瞖雲銷岑别鍾京我憐鍾氏子冒雨為求文暫以經兹邁與之書所聞野鷗窺筆硯舟子采蒿芹况有新炊飯簞漿可送君江口遇劉糺曹赴鄂州寄張大卿我同陶淵明遠憶顔光禄得錢留酒家醉卧江蕪緑故人已䝿身獨賤籬根枯死佳花菊孤鴻飛去鸚鵡洲寄聲髙樓謝黄鵠使君本是洛陽人嘗憐酩酊銅駝曲休將玉笛城上吹武昌老人聽不足巳知清音通九霄定應悔說蘄州竹送劉糺曹溪邊前日君辭我江上今朝我送君自去蘆洲寄消息故人猶在武昌軍寄題開元寺明上人院假山石是青蒼石山非杳藹山諸峰生鏡裏小嶺傍池閒雨不因雲出門疑為客關何須費蠟屐暫到此中閑寄李獻甫何言自我去眼前一似空城中豈無人過目猶飛蟲又厭塵事多枳棘生胷中安知秋江水淨碧如磨銅尚恨有世累不及垂釣翁望望當速来止琴視孤鴻行路難塗路無不通行貧足如縛輕裘誰家子百金負六博蜀道不為難太行不為惡平地乏一錢寸歩鄰溝壑題姑蘇豹隱堂青山崔嵬藏古基文豹不見空斷碑華堂重構猶隱霧地今易主還好竒欲邀明月一去飲嫦娥將悔出海遲谿邊少年意氣在來往只借白鹿騎自稱山人具肴酒酒酣請我留此辭謫仙墳近何可問當日無詠亦所疑雨還雨濛濛兮欲暮路險絶兮深泥嗟予僕兮甚餒畏予馬兮顛蹄關巳度兮心緩家將至兮渉溪喜膝前兮童穉餉燈下兮女妻哭笑鳥日月轉入地星辰蔽重雲夜色晦若漆怪禽巢未焚其音哭且笑哀樂詎能分方哭且笑時曾莫有以羣哭為何所悲笑為何所聞了不預人事吉凶誰復云山行冒雨至邨家雨急芹泥滑禽鳴苦竹秋野香生草木雲潤上衣裘入石纔通馬穿林忽隱牛山家多淺井下照碧峰頭八月九日晨興如厠有雅啄蛆飛鳥先日出誰知彼雌雄豈無腐䑕食來啄穢厠蟲飽腹上髙樹跋觜噪西風吉凶非予聞臭惡在爾躬物靈必自絜可以推始終夜坐夜久方慮寂空堂燈燭明落葉有暫響暗蟲無停聲力學不為已甘貧且徇名聊為詠懷篇還想阮歩兵八月十五夜有懷天為水蒼玉月柁潭面冰萬里絶瑕玷百丈已澄凝山河了然在星斗光莫増借問九州内豈無陰雲興緬懷去年秋是夜客廣陵太守歐陽公預邀三四朋乃值連連雨共飲陳華燈既醉公有詠屬和予未能彊賦石屏物固慙無所稱今來宛溪上聊以故嵗徴晶明正若此霢霂且何曽美景信難并康樂語足憑題吏隱堂新堂生虛明未悟追隱吏無乃隱非時唯應喧可避移花莫傷根種竹不改翠牀中置素琴亦見陶潛意詠嚴子陵不顧萬乗主不屈千户侯手澄百金魚身被一羊裘借問此何耳心遠忘九州青山束寒灘濺浪驚素鷗以之為朋親安慕乗華輈老氏輕璧馬莊生惡犧牛終為藴石玉夐古輝巖陬與潯陽舍弟别昭亭潭上水下與九江通去客解輕舸落潮乗順風廻頭迷遠樹沒背見飛鴻寂寞還蓬巷桓彞宅近東九月十八日山中見杜鵑花復開山中泉壑暖幽木寒更華春鳥各噤口游子未還家云誰未及還對此重興嗟何必因啼血顔色勝曙霞記嵗買臣四十八猶苦行負薪我免以樵給貧居年與均道上不謳歌妻亦無恚嗔三者固異彼異同雙朱輪種胡麻悲哀易衰老鬢忽見二毛苟生亦何樂慈母年且髙勉力向藥物曲畦聊自薅胡麻養氣血種以督兒曹傍枝延扶疎脩筴緐槖韜霜前未堅好霜後可炮熬誠非騰雲術顧此實以勞達觀禪師曇頴住隱靜蘭若或言自此獼猴散走不來穎嘗哂曰吾知是山枇杷為多始至也未實故其去將實也必羣集後果然穎惡乎俗之好異恐傳以為人惑欲予詠而播之隱靜山中寺獼猴往往過導師歸以去盧橘熟還多禪地寧求恡居人切莫訛未嘗嫌此物任挂古松柯穎公遺碧霄峰茗到山春已晚何更有新茶峰頂應多雨天寒始發芽採時林狖靜蒸處石泉嘉持作衣囊祕分來五柳家送達觀禪師歸隱靜寺古律二首初逢洛陽陌再見南徐州所歴幾何時倐去二十秋今復振霜屨還山遠莫留我詠阮公詩物靡必沉浮誰云西海魚夜飛東海頭世人嗟識昧豈是滯林邱栗林霜下熟歸摘禦窮冬帯月渉溪水過山聞寺鐘未嫌雲衲濕已喜野人逢且莫似杯渡滄波無去蹤冬至感懷銜泣想慈顔感物哀不平自古九泉死靡隨新陽生稟命異草木彼將漸勾萌人實嗣其世一衰復一榮冬至日得師厚宋次道中道書水國欲為雪野冰將合河人同一陽至淚向八行多朋意今猶在年華悵似過看看四十九應笑此蹉跎擬水西寺東峰亭九詠垂澗藤澗深連石壁石上生長藤孤猿來自熟縁飲下復登賴無樵人迹且免束薪蒸嶺上雲我來東峰下遠見西嶺頭白雲忽已合向此偶遲留人誰問何有自可忘殷憂林中翠萬木總柔翠况復新晴時日色照欲動山氣斂還遲望之如何攬舉袂隨風吹棲煙鳥班班遠林鳥極目波煙中各識時早暮不忘巢西東推物得真意吾將效陶公古壁苔陰壁流暗泉古苔長自好不改春與秋何如路傍草空山正幽藹淨緑無人埽幽徑石縁溪去欲遠磊砢忽礙行旁臨側身險下忽寒流聲幽客慣來往同此猨鳥情寒溪草青青色堪染欲辨不知名根陰託乳魚水厎抽新萌康樂池上詠獨與春夢成陰厓竹背嶺斷厓下老竹生扶疎孤根石上引勁節松不如莫言霜雪多終見緑有餘臨軒桂山楹無惡木但有緑桂叢幽芳尚未歇飛鳥銜殘紅不見離騷人憔悴吟秋風依韻和達觀禪師還山後見寄雲歸在髙嶺人見是無心矯矯將棲鳥遥遥傍故林南方雖有暖臘月易成陰惟恐多風雪幽期未可尋九華隐士居陳生寄松管筆春松抽瘦梗削束費長毫雞距初含潤龍鱗不自韜甞為大夫後欲冩伯夷髙一獲山家贈令吾媿汝曹古柳岸側古大柳誰種臨長江中自出蠧蝎百嵗成枯腔忽值漲流沒槎牙綴旌幢腹膚藏蛟龍半夜雷砰韸飛霆㾗尚白如斬馬陵龎倏爾巨電至萬弩聲裂缸又為狂風摧所殘惟朽椿卧榦越大鼎絶臏不可扛就爇以照漁駭鱗一何厖始知網罟細未足禁突撞隆準以脫去城下徒焚降我從洲上泊昬曉睨船窻始終覩變毁欲賦挑殘釭吾交評韓詩險韻古莫雙安得共詠此但嗟各他邦放鵲并序烏鵲啄豆于槽圉夫患之以機得鵲其羣噪如救為下上突掠甚急知不可脫聲益哀予閔之命釋縛放去因為之辭鵲為禽之靈智兮胡蹈機而不知為庸皂以困束兮固性命之將危喜遠人之至止兮始屢驗以如期向何預覺兮此何自昬豈專心以謀食兮昧目前之禍根苟所履必慮患兮莫若去人遠以圖存屑餘秣以致死兮誠咎爾而無恥維羣鳴之苦傷兮使吾心之測爾予測孔孟兮爾自解則艱皂聽予言兮釋爾而還撫爾呪爾兮爾無甚頑後誰恤爾兮拓彈方彎聞西山虎猛虎畏白日孤客莫夜行彼以不暴衆此何獨忘生飢必見人食不食且無名麋鹿能遠遁安得逢怒獰由人不由常役役官有程凍禽髙樹繞吾廬薄暮煙氣重將棲立傍巢巳振窺落氄有來同枿枝亦各不偎擁颼颼陰風寒夜雪豈無恐登乾明院碧鮮亭餘喘不苟盡順俗來飯僧東嶺有上方脩竹蔽孤稜下有蒼石案旁挂孤蔓藤擊累向塵世更住殊未能隱靜遺枇杷五月枇杷實青青味尚酸獼猴定撩亂欲待熱應難正月十日五更夢中今年花似去年新去年人比今年老我勸厚地一杯酒收拾白日莫苦早紅梅家住寒溪曲梅先雜煖春學妝如小女聚笑發丹脣野杏堪同舍山櫻莫與鄰休吹江上笛留伴庾園人寄文鑒大士讀書夜寂冷無火捲卷遂成搖膝吟始憶髙僧將偈去安知古寺託雲深寒塘正睡遠鐘發野鳥亂鳴殘月沈明日呼兒整籃轝欲煩重過小溪陰海棠江燕入朱閤海棠繁錦條醉生燕玉頰瘦聚楚宮腰曽未分香去尤宜著意描誰能共吹笛樹下想前朝嘗於宋宣獻宅見圖畫明皇於海棠花下卧吹觱篥寧王吹笛黄幡綽拍送餘干李少府作尉古來清况於于越城舟中雨新足溪上水初生蒼獺出還沒素鷗飛且鳴休將五色棒欲取洛陽名宛陵集卷三十六
