body:
  text: 宛陵集巻六宋梅堯臣撰祫禮頌聖德詩以下池州後詩溥哉孝享將事于寧文武卿士冠劒在庭爰俟帝齋風霰其零風霰不巳鈎陳豹尾龍旂太常立列比比帝居路寢百辟就次至扵榖旦漫漫翳翳帝入靈宫左撞黃鐘陞階置玉日氣曈鴻鴻鴻杲杲氛駮隂埽宿于太宫月星皓皓侍祠之臣鵠舉鷺振或捧其匜或進其巾輔相夾導俯僂鱗鱗圭瓚以陳登歌以均東向虚位發爵親親平明帝還紫宸序班望帝之顔穆穆閑閑檐步廊廊雪浮陽光大楹爛爛朱陛煌煌稱祝萬夀萬夀無疆却登寳輿以御端門揭雞肆赦雷動乾坤于時都人于時婦女于時蠻夷異口同語天子萬年仁聖之主臣時執冊與物咸覩敢播于詩庶聞九土奬諭敕梅堯臣省所進祫享詩事具悉爾學優而粹行懿而淳以詩自名爲衆所服矧乃詠歌祖宗之功徳述禮樂之聲容宜被朱絃以薦清廟載披來獻深用歎嘉故兹奬諭想宜知悉祫享觀禮二十韻卜惟陽月吉孝享禮方脩齋幄嚴宫殿群臣奉冕旒北風先集霰夜雪競侵幬羽仗天街立龍笳象魏流翌朝升寳輅夾道列華輈琳宇躬將款珠塵宻未収撞鐘鈞奏合奠玉日光浮捧冊叨扵左觀儀得以周帝來清廟下月欲大刀頭既祼還初次更衣戴逺逰黃麾轉槐路朱輦駕雲虬武士羅金甲中人著錦韝千官入稱慶萬國與同休却出紫宸閣俄登宣德樓雞星傳巽令鶴馭作天郵肆赦通皇澤深仁被九州巍巍百世業坦坦四夷柔惠及髙年叟恩差五等侯力田仍給復有道俾旁求何以歌堯美兹同擊壤謳寳元聖德詩齋誠羽衛陳庚戌推蓂莢靈宫容物備清廟威儀攝遟明導玉輿出宿戒清堞冥濛雲霧低泱􅐯乾坤接時雪凝九霄金笳競三疊來賔萬國會受職百神恊中夜即壇壝濃陰駮鱗鬛及爾圭幣升煥然星斗曄華鐘帝樂張法從天衢躡端門清旭上肆宥歡聲浹寳圖増大號元厯開皇劫吉甫獨何人詠歌揚聖業送胡臣秀才汴水日夜淺歸船不可留天髙雲就嶺地冷鴈廻洲江館魚堪食家林橘巳収平生素業在莫見里人羞送張秀才之淮南聊爲楚客唱一送淮南行出汴逺心喜移舟孤岫橫危帆將進浦寒霧不分城枚乘舊居處向來秋草生還文雅師書帙編絶不加新于今十二春緑窗重展目静几勿生塵豈愛吾廬日終將道者親莫嫌同刺字漫滅看難眞依韻和徐元輿讀寄内詩戲成鴛鴦同白首相得在中河水客莫驚笑雲間比翼多送賢良田太丞通判江寧世爲燕趙客慷慨有竒才對策漢庭後拜官江國來舟從𤓰步去潮自蔣山回心寄城頭月相隨上古臺送邵夢得永康軍判官且歸洛中明年春赴任言離洛陽日正值春風前伊水矯白鷺蜀山鳴杜鵑輕袍㳺宦去匹馬度關年若過君平肆窮通可問焉送蕭監丞濬宰臨邑羨君先拜邑殘臘見登車逺驛寒雲重長郊積雪餘行當勸民稼始信帶經鉏還到濟南日應傳古尚書南鄰蕭寺丞夜訪别憶昨偶相親相親如舊友雖言我巷殊正住君家後壁裏射燈光籬根分井口來邀食有魚屢過貧無酒明日定徂征聊兹酌升斗宵長莫惜醉路逺空廽首讀司馬季主傳贈何山人長安新雨後九陌少行人同輿有宋賈㳺市懷隱淪日聞古賢哲必與醫卜鄰來過季主室再拜語逡廵矍然悟辭貌何爲居埃塵捧腹乃大笑吾道非爾臻驥慙罷驢駟鳳豈燕雀親筮占聊助上功利儻及民大夫與博士登車若喪神今我見何遯始驗太史真順性誨善惡不離義與仁言孝諭爲子言忠諭爲臣又得蜀嚴比寧將日者均京都盛龜筴坐肆如魚鱗噤口不正言唯能辨冬春鴻冥復所慕安得雞鶩馴臘日雪風毛隨校臘浩浩古原沙寒入弓聲健陰藏兔徑賖馬頭迷玉勒鷹背落梅花少壯心空在悠然感歳華依韻和雍邱尉王祕校兆見寄東瞻杞國城半日鳥飛程度鴈不曾下新文誰寄評舊年因使至秀句欲人驚聊効題齋壁先賢亦以旌送新安張尉乞侍養歸淮甸天兵出塞日西尉去官初却衣老萊服曾無梅福書春郊欲回鴈寒水正沉魚任意歸舟駛風煙亦自如依韻和子聰見寄嘗念餞行舟風蟬動去愁獨登孤岸立不見逺帆収及送故人盡亦嗟歸迹留洛陽君更憶寧復醉危樓送何遯山人歸蜀春風入樹緑童稺望紫扉逺壑杜鵑響前山蜀客歸到家逢社燕下馬澣征衣終日自臨水應知已息機寄衡山福嚴長老衡山幾千里聞在湘川側雲霞不可到峰壑無由識方丈開其間青松隐寒色飛鴻尚莫過况寄雙鳬翼曲渚橋送張祕校赴慶州幕野客伐山桂橫爲曲渚橋勢危寧過馬徑狹欲通樵小艇何妨繫離魂正此銷想君回首處虹影在林椒南陽謝公祈雨雲龍本職雨不雨其失職萬草欲焚如千疇幾赭色刺史爲民憂侵晨車競飭朅來款宫祠豈不念黍稷􅀢靄隨輪軒霶􅑛徧畛域孰謂雲龍愚能成仁惠徳濯濯群物新蔥蔥衆苖殖莫比邵父渠初慙用人力西禪院竹古寺帶翛岡青蔥萬竿玉春梢長舊林夏雨濕新緑幽禽嘯呼雜晩照隂晴續解帶欲忘歸壺觴歡自足新霽望岐笠山謝紫㣲坐中賦北望直百里峩峩千仞青斷虹迎日盡飛雨帶龍腥陰壑煙雲畜陽厓草木靈登臨終不厭時許到兹亭師厚生日因以詩贈龍驥産龍駒良金出良冶良冶無頑礦駒龍豈凡馬致逺在御徒作礪由工者君子生慶門詩書未嘗舎進道期日隆無媿金馬下晝寢嘗聞晉髙士時偃北窗風及爾寂無慮始知機盡空便便嘲巳解栩栩夢何窮一寤復一寐百年消此中過白水下馬獨懷古翛然臨渡風眞人去來久流水自無窮雨闊沙痕漲灣平野色通曾興漢家業今與百川同泛舟城隅呈永叔藤竹繞城陰煙梢拂濠水山禽時一鳴楚客孤舟裏孤舟穿緑荷獵獵雨新過誰思暮江上只尺採蓮歌送永叔歸乾德淵明節本髙曾不爲吏屈斗酒從故人籃輿傲華紱悠然目逺空曠爾遺群物飲罷即言歸胸中寧鬱鬱代書寄歐陽永叔四十韻始謫夷陵日當居建徳年一書寃逐客四詠繼稱賢自謂臨江徼相逢莫我先白醪封畫榼素鯉養泓泉戒吏収山栗呼童惜沼蓮只期東浦過共醉小谿邊日日占風勢時時到水堧安知貪挂席不肯暫回船自爾皆無定歸歟亦未然指程幾一月泝險歴三千魚鳥都難問音塵杳莫傳因之走羸僕試與訪南遷比及過牛峡還聞迎璧田報言雖不獲吉語喜多全我解歸堯闕君移近漢淵問塗曾未逺命駕亦何縁衰野今行矣隆中有待焉鄉亭𤓰接畛風化蟻同羶即欲朋簪盍翻爲俗事牽愛嬰嬌啞啞嗜寢復便便雞黍煩為具輪轅豈得前寄聲勤以謝幸子恕而憐來貺誠為望論情恐未捐嘗親馬南郡果謁謝臨川遂得窺顔色重忻論簡編聊咨别後著大出篋中篇問傳輕何學言詩詆鄭箋飄流信窮厄探討愈精専道舊終忘倦評文欲廢眠寧知主人貴但見左魚懸所至同風月相歡憶澗瀍清歌嗟在耳素髪怪侵顚翠堞時登眺芳洲屢泝沿難醒撥醅醁殊厭落頭鮮坐竹聽啼鳥臨流聒嘒蟬孤亭起歸夢南陌去揚鞭出餞陪雙斾方蘄歴廣􅆵始生山吏敬頗釋利塗邅會面辭何吐離膺事巳塡空餘郡樓望野色際平煙漸嘉樓望雨陪謝守冒雨上城頭凄凄欲報秋雲低宻藏樹風急暗侵樓漸積荷珠重新添沼鑑幽憑䦨未能去公自念民疇和謝舎人洊震盛夏萬物當長養驕陽不雨誰爲憂天無纎雲野赬色草木焦卷如經秋南陽太守自引咎不以天時爲怨尤齋精潔慮祠望内僚屬奔從無停輈謾取詩言占離畢徒依風俗驗鳴鳩忽聞郡北直百里岑岑岐笠藏靈湫持牲遣吏詣其下俎豆未徹升隂虬電光劃劃遶嵓壁雷聲隱隱生山陬擁雲馳雨自東上西風斗猛雲還収神龍蓄志未發泄明日更與頑陽讎黤靄陰黒若卷海聯緜霹靂能破仇沃然原隰洗妖氣浩爾溝瀆揚平流九榖有登百姓喜蜿蜒歆祀神何羞和謝舎人新秋西風一夕狂古屋吹可恐微變蜻蛚吟斗摧蚊蚋勇朝驚露墜梧逺愛雲飛隴還憶舊溪逰水清漁箔壅中秋新霽壕水初滿自城東偶泛舟回謝公命賦時余將赴襄城齋舫談經後官池載酒行斜陽鳥外落新月樹端生演漾思江浦夷猶繞郡城東轅有遺恨日日物華清陪謝紫微晚泛積雨漲秋壕輕舟此共遨菰蒲歛鋩鍔蓮芡熟櫜韜岸静魚跳月林喧鳥避篙歸時興不淺風物正蕭騷奉陪覽秀亭抛堶聊爲飛礫戲愈切愈紛如自是取勢闊非關用意踈誤驚花鳥起亂破錦苔初童指拾將秃多慙賈勇餘傷馬此馬季父為樞直日恩賜以遺余吾貧只一馬昨日忽云喪庭樹齧無膚秋郊誰復放空傷駿骨埋固乏弊帷𦵏况本出天閑因之重怊悵一日曲此以下離南陽作妾家鄧矦國肯媿邯鄲姝世本富繒綺嬌愛比明珠十五學組紃未聞開户樞十六失所適姓名傾里閭十七善歌舞使君邀宴娯自兹著樂府不得同羅敷涼温忽荏苒屢接朝大夫相歡不及情何異逢路衢昨日一見郎目色曽不渝結愛從此篤暫隔猶恐疎如何遂從宦去渉千里塗郎跨青驄馬妾乘白雲駒送郎郎未速别妾妾仍孤不如水中鱗雙雙依緑蒲不如雲間鵠兩兩下平湖魚鳥尚有託妾今誰與俱去去約春華終朝怨日賖一心思杏子便擬見梅花梅花幾時吐頻搯欄竿數東風若見郎重爲歌金縷依韻和謝副閤寄新酒以下汝州後詩聞道芳洲景氣新却輸鷗鷺日相親小槽酒熟玻瓈色誰憶髙臺共賦人送劉子思殿丞宰巫山千里向巴東青山不可窮峽猿初入聽蠻語未全通暮雪思梁國朝雲識楚宫吏人迎拜處嘶馬入丹楓朔風寄永叔朔風嗥枯枝逺鴈不能起日色寒無光原野澹千里所思在南國遐路闊音旨潛鱗亦安託冰結長河水峩峩既未泮獵獵終不巳悠然傷我心歴亂非可擬襄城對雪二首風急夜窗鳴暗知庭下積曉幔忻以卷虚堂睡成癖飄颻初縈林凌亂欲侵席擁扉人莫埽何似袁家宅登城望宻雪浩浩川野昬誰思五原下甲色千里屯凍禽立枯枝飢獸齧陳根念彼無衣褐媿此貂裘温雪夜留梁推官飲晝雪落旋消夜雪寒易積燈清古屋深爐凍殘雪碧爲沽一斗酒暫對千里客酒薄意不淺輕今須重昔重昔是年華飄飄猶過隙一醉冒風歸平明馬無迹南陽謝紫微挽詞三首忽驚南郊信半夜雪中來遂哭寢門外始嗟梁木摧文章千古盛風韻故人哀憶昨臨湍水寧知隔夜臺平昔聞嚴助承明厭直廬請章來未久捐館遽何如無復淮南諭曾成太史書蒼蒼不可問揮涕望輀車自古豈無死賢哉獨可悲家貧留旅櫬門慶有諸兒里社當存祀邦人定立碑還同羊叔子罷市見遺思永叔自南陽至余郊迓馬首訪謝公奄然相與流涕作是詩以寫懷郭門臨汝水鏡色入髙衢鞍馬過其上塵襟蕩已無及郊逢故友出涕各霑襦神物喪頭角空存尾與軀溝木失匠斲誰施藍與朱並轡不能語斯文其已夫歸來授予館自為炊彫胡且勿厭兹會日月易以徂贈琴僧知白上人南方來手抱伏羲器頽然造我門不顧門下吏上堂弄金徽深得太古意清風蕭蕭生脩竹摇晚翠聲妙非可傳彈罷不復記明日告以行徒興江海思教授宋著作還何以擬君子雲鴻肅羽儀將過上林苑先集孝王池唼藻有餘樂漸磐方得時野塘歸莫晚白水逺連陂宛陵集卷六
