front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_042-1a, image: WYG1099/WYG1099-0309c.png}
body:
  text: 宛陵集巻四十二宋梅堯臣撰八月十五日夜東軒隔竹已見月清光度谿來移影上素壁與我相徘徊是夜正中秋天地霧露開人疑玉出藥杵不生埃嫦娥倚冰輪豔色若自媒他夕豈不好物意為之摧送楊辯青州司理儒者服褎衣氣志輕王公一落該網中折節長俯躬山東多豪士片言不可窮青土饒嘉棗無以人鈍蒙彼知南楚輕强始必弱終矯志合其情乃是吾徒通行當問友生為我舉杯空隱靜山訪懷賢上人不遇松上垂青蔓蒲根瀉碧泉髙僧來不見却返五峰前遊隱靜山心在名山久積嵗未及遊將過值風雨路不通馬牛丁壯四五人籃輿時更休轉谷逢煙火下隰多田疇偃穟黄壓畝刈麻東盈邱始覺山門深長松如騰虬直上百餘尺蒼髯葉脩脩五峰迎人來冷逼臺殿秋石泉出雲中引入舍下流縁源至巖口巖底魚可鉤天昬碧溪去果熟青猿偷草樹不盡識自起詩人羞濺濺澗水淺苒苒菖蒲稠菖蒲花已晩菖蒲茸尚柔靈根采九節試共野僧求逡廵能致之衰疾無甚憂昔聞有釋子渡江用杯浮棲心向兹地埋骨在林陬駮陰漏斜光徒欲窮巔幽夜還南陵郭幾落猛虎喉路詠五里十里消磨盡千蹄萬蹄來往蹤古今不是不經歴踏破青山重復重書席語送馬御史天意漫漫物自供聞香能至是喧蜂野人割蜜不須盡留與寒脾作御冬送李南玉小人貧於資君子貧於時小人富於貨君子富於辭貧雖同寒飢富不同路岐彼富殁則巳此富名不移丈夫事百變未死安可期明明趨財利莫䘏前人嗤舉家如春蠶仰食不可遲况念宿債窘何媿賤士為買臣嘗負薪相如猶滌巵君思此二人信吾所不欺邇者有趙壹窮憤自興詩乗驥抱美玉樂與和未知古來鮮逢遇後世無苦悲代書寄鴨脚子於都下親友予指老無力不能苦多書書苟過百字便覺筋攣拘京都多豪英往往處石渠作書未可周寄聲亦已疏後園有佳果遠贈當鯉魚中雖聞尺素加餐意何如秋日家居移榻愛晴暉翛然世慮微懸蟲低復上鬬雀墮還飛相趂入寒竹自收當晩闈無人知靜景苔色照人衣昭亭别施度支昭亭送客地來往四十年常視松端日每稽潭上煙風移虎旗脚寒入牛童肩待訪名山去相期廬阜前潘歙州話廬山潘侯話廬山落落尤可伏初云江上來遠見雲中瀑捨舟到雲外觀瀑已巖麓往往逢平田攢攢愛深木竹門懸徑微源水陰藤覆坐石浸兩骹炎膚起芒粟夕陽穿萬峰髙下相出縮尋常杳不分但被煙嵐畜絶頂水底花開謝向淵腹風力豈能加日氣豈能􅫥攬之不可得滴瀝空在掬夜昬投僧居孤燈望溪曲忽聞清磬音漸近幽林屋止侯休多談巳滿我心目懷逰二十年夢􅄰今固熟何當借輕舠一往如飛鶩秋日邨行谿霧晝又收山邨夜初晦飢禽來往飛遠樹青紅碎原上楚牛童屋頭吳婦碓雞肥酒已熟野老邀同軰吳正仲遺蛤蜊紫縁常為海錯珍吳鄉傳入楚鄉新樽前已奪蟹螯味當日蓴羹枉對人送潘歙州潘過宣城而送之一見新安守便若新安江洞徹物不隔演漾心所降逺指治所山已入鄰齋窻捧輿登南嶺䇿馬懷舊邦養親將為壽傾甘抱玉缸觀軍將勞士臠肥堆羊腔下車談詩書上世擁旄幢勿窺淵游鱗無吠夜驚尨他日聞課第天下誰能雙馬都官行之惠柑荔枝醋壺梁霜胡柑熟烘日荔枝美橘柚未為精葡萄安可擬郭生始能贊魏文何謬比二果皆世珍乃遺及賤士而復副醇醯或乞自諸已豈唯享遠味終得為直矣郭璞贊云厥包橘奇者維甘魏文帝記云南方龍眼荔枝寜比西國葡萄石蜜前以柑子詩酬行之既食乃緑橘也頃年襄陽人遺柑予辨是緑橘今反自笑之昔辨荆州誤今為越叟迷黄柑與緑橘正似珷玞圭新安潘侯將行約遊山門寺予以濘淖遂止因為詩以見懷蒼山自為門呀豁異鐫鑱路通石壁盡潦起田穟陷傍嶺有結廬潛潭淨於鑑聞之固欲往久雨濕泥濫莫陪太守車然諾豈誑賺遥遥橋上去望望馬猶站畏滑不肯行非關惜韉䪌依韻自和送詩寄潘歙州潘侯擅詩筆五色神授江世家有大勲佐舜同厖降子孫逢太平少小事書窻源流本慷慨吐論皆經邦量猶圅牛鼎吾徒媿罌缸開口必典實省腹唯空腔作者過我門應笑無㦸幢窮老在弊廬何異守户尨有心希買交白璧無一雙避為師依韻荅李獻甫蛟龍養鬐鬛當在浩浩潯虎豹養文采當在巍巍岑我無太山髙我無滄海深斗水與堆阜恐未慰此心送李逢原禰衡負其才沈沒鸚䳇洲李白負其才飄落滄江頭後亦多效此才薄空羈囚文章本濟時反不能自周吾嘗戒吾曹慎勿異爾流臧倉毁孟軻桓魋廹聖丘雖云推之天未免皇皇求吾今重子學無力薦公闕行當思吾言非教子佞柔重送李逢原歸蘇州吳客歸從楚霜華著馬蹄倦童持弊橐呼艇過寒谿寂寞區中飯依稀日午雞張儀猶舌在不必媿於妻黄國博遺銀魚乾二百枚乾若㑹稽筍色比荆州銀熟宜煨栗火飲助擁爐人低隂欲飛雪酒微生頰熱海上使方來多饟不為餮三和寄潘歙州昔固聞陸海今復有潘江文章吞時英光芒瞻星降爾雅曰降婁奎婁也如游太室陽仰見玉女窻髙才生大國試政來遠邦道傍一相顧冰壺臨瓦缸逸驥美豐肉老䍽慙瘦腔藻詠荅下俚玉鈐鏘寶幢尋言不悟言自笑趂塊尨終知將門豪射鵰常貫雙送天台李令庭芝吾聞天台久未見天台狀去海知幾里去天知幾丈峰嶺隱與出巖壑背與向雲雷反在下泉瀑反在上幽深無窮窺杳𦕈無窮望至險可悸慄至怪可駭喪石橋彎長弓跨絶絃未放當時白道猷平歩入青嶂去為六百石亦見志所尚子欲廣異聞可以一尋訪十一月十二日賽昭亭神冷雨凝雪未成雪潭空魚寒歸石穴長篙扣宂倩鯉魚寄信山頭來奠設魚傳水鳥飛上山山大槎槎乾吹咽旋灰起角巫鼓鳴漆俎銅盤顫牲血琵琶嘈嘈神降言福汝佑汝無災蘖西向啐飲東向廻谿心却望山崔嵬依韻和吳正仲冬至流光冉冉即衰遲物趣廻還似轉規長景巳知今日至孤懷不比少年時阻陪上閤鴛鸞後且與南州父老期况有舂禾新酒熟百分休放手中巵施君挽歌哀鐸悽悽裏銘旌杳杳中澗雲銷繐帳山雨入蒿宮世路行來久泉塗去莫窮素吟應共葬飲韻在松風杜和州寄新醅吳正仲云家有海鮮約予攜往就酌逡廵又云幕中有㑹且罷此飲淮南寄我玉醅酒白蚶海月君家有欲持就味明日期窮羹易覆巳反手從事開筵不可辭燕脂秀臉羅前後長頸善謳須賸謳只恐老來歡意休依韻荅吳正仲罷飲君辭予家傾蟻醅自有嘉味須持來青篾絡缾方出户紅妝侑席已邀杯窮愁一飲猶關分側望羣賢不可陪靜坐紙窻無所得只將文字眼前堆送王景憲奉職清羸將家子苦節自寒儒四壁我何有一錢君亦無下灘船亦急聞鴈日將晡行愛青山口人煙事網罛讀毛祕校新詩毛公明於詩其系宜善續前示五長篇大須傾幾曲豈特元和間欬唾成珠玉送允從上人還廬山山髙雲在下諸壑藏半空千重萬重翠正望落日中不知野僧歸石徑寒易通松間無人埽隕葉如斷􅐢獨行逢莫寒衣裂溪上風依韻諸公尋靈濟重臺梅梅要山傍水次栽非同弱柳近章臺重重葉葉花依舊嵗嵗年年客又來雖愛千枝競緐密還嗟短髪巳衰頽郎官博士留車騎擁蔽脩篁為斫開和正仲再和罷飲吳味欺君彊飲開楚醅因我破愁來何言合美將虛館却憶爭妍就捧杯夜霰已先庭雪集單衣難與毳裘陪踐盟幾欲驅車去塵事無端日日堆和韻三和戲示笭箐畫蛤瓦缸醅海若淮壖各寄來將學時人鬭牛飲還從上客舞娥杯蓬蒿自有蔣生樂珠翠寧容鄭氏陪莫計寒暄與風雪古來黄土北邙堆鄭康成與盧子幹同事馬融融後堂有珠翠之㑹康成不得預焉嘉雪應祈呈權郡通判臘近冬殘雲未合江南青壟麥休肥誰將太守隨車雨一夜從風作雪飛依韻四和正仲四和還如九酘醅更醇更美未嫌來相逢莫作兩般眼一飲不辭三百杯嵇阮當時無俗慮山王雖䝿亦能陪如今世態尤堪薄只把官資滿眼堆袁招飲鄭云自旦至暮三百餘杯雪朔雲生晩雨臘霰集狂風不數花多出安知天更工漫階夜巳積萬物曉初蒙誰憶新豐酒乗驢灞水東宛陵集巻四十二
