body:
  text: 宛陵集卷二十七宋梅堯臣撰荅宋學士次道寄澄心堂紙百幅寒溪浸楮舂夜月敲冰舉簾勻割脂焙乾堅滑若鋪玉一幅百錢曽不疑江南老人有在者為予嘗說江南時李主用以藏祕府外人取次不得窺城破猶存數千幅致入本朝誰謂竒漫堆閑屋任塵土七十年來人不知而今製作巳輕薄比於古紙誠堪嗤古紙精光肉理厚邇嵗好事亦稍推五六年前吾永叔贈予兩軸令寳之是時頗叙此本末遂號澄心堂紙詩我不善書心每媿君又何此百幅遺重贈吾赧不敢拒且置縑箱何所為二月雨後有蚊蚋春夜一二蚊蚋飛久不見之尚可喜而今稍喧來聒人向後更暖奈爾觜春寒春晝自隂隂雲容薄更深蝶寒方歛翅花冷不開心亞樹青帘動依山片雨臨未嘗辜景物多病不能尋荅韓三子華韓五持國韓六玉汝見贈述詩聖人於詩言曾不專其中因事有所激因物興以通自下而磨上是之謂國風雅章及頌篇刺美亦道同不獨識鳥獸而為文字工屈原作離騷自哀其志窮憤世嫉邪意寄在草木蟲邇來道頗喪有作皆言空煙雲冩形象葩卉詠青紅人事極諛諂引古稱辯雄經營唯切偶榮利因被蒙遂使世上人只曰一藝充以巧比戲奕以聲喻鳴桐嗟嗟一何陋甘用無言終然古有登歌縁辭合徵宮辭由士大夫不出於瞽矇予言與時軰難用猶篤癃雖唱誰能聽所遇輒瘖聾諸君前有贈愛我言過豐君家好兄弟響合如笙叢雖欲一一報彊說恐非衷聊書類頑石不敢事磨礱前以詩荅韓三子華後得其簡因敘下情前者報君詩妄說良有以昔予在京師多為人所詆短章然無工實未甘藝比因君有過褒聊且發憤悱何言敢為師乃是貴不韙平常遭口語攢集猶毒矢此論苟一出是非必蜂起偶爾道瘖聾多疑已竊指雖恃不欺衷恨未致速死安得二頃田歸耕苟為恥誰能事州郡雞狗徒聒耳過頴橋懷永叔昔送之官東郡時夜䦨對酒風揭屋君今淮海予再過古驛依依老槐緑椹澗晝夢誰謂死無知每出輒來夢豈其憂在塗似亦㑹相送初看不異昔及寤始悲痛人間轉面非清魂歿猶共靈樹鋪夕夢晝夢同坐偶夕夢立我左自置五色絲色透縑囊過意在留補綴恐衣或綻破歿仍憂我身使存心得墮汝州王待制以長篇勸予復飲酒因謝之前因飲酒多乃苦傷營衛嘔血踰數升幾乎成病肺上念父母老下念妻兒稺不死常抱疴於身寧自貴樊子來勸我止飲良有謂公復遺我詩責我詞甚毅指以年齒衰非酒何養氣春飲景可樂夏飲暑可避秋飲心忘愁冬飲暖勝被醉歌人不怪醉言人不忌在酒功實多止酒酒何罪假如夀九十今子已半世不飲徒自苦未必止為利胡汨妄與真恐乖達者意屈原吟澤畔方悟獨醒累子居今之時安免人病議是以告子勤子守亦謬計我讀纔一過不覺顔起媿自兹願少飲但不使疾熾書此以謝公公言誠有味陪王待制清凉院觀牡丹賦詩公言牡丹盛未覩古人詩品衆自爭貴葉多方見竒名因他姓著色為别根移華髪我何感洛陽年少時和王待制牡丹詠誰移洛川花一日來汝海濃澹百般開風露幾畨改傍欄人自醉惜翦春有待使君方少年共賞喜我在洛陽牡丹古來多貴色歿去定何歸清魄不應散豔花還所依紅棲金谷妓黄值洛川妃朱紫亦皆附可言人世稀汝州登慈寺閤望嵩岳崢嶸古寺閤蒼山插晴簷少室出天外巍巍何尊嚴王都在其下風露國所霑日暮飛雲歸已失中頂尖睡意少時好睡常不足上事親尊日拘束夜吟朝誦無暫休目胔生瘡臂銷肉今踰四十無所聞又况喪妻仍獨宿虛堂浄埽焚清香安寢都忘世間欲花時啼鳥不妨喧清暑北窗聊避燠葉落夜雨聲滿階雪下曉寒低壓屋四時自得興味佳豈必鏘金與鳴玉萬事易猒此不猒真可養恬無夭促且夢莊周化蝴蝶焉顧仲尼譏朽木人事幾不如夢中休用區區走榮禄三月十四日汝州夢我歸十九年飲不負升斗昨夕夢見之謂須多置酒雖慰魂來言定不復入口俟當返吾廬且為貯罌缶夢寐何敢欺從笑愚所守再别仲儀前别歳月逺道同情相親三旬忽相見愈厚不猒頻昔云思數面今無媿古人睠然東去懷紛若陌上塵夕發陽翟我行陽翟道暮雨原上急麒麟冢相望霹靂碑下立農耕傍山去鬼火迸林入莫問泉下人馬隤衣更濕缺月缺月來照屋角時西家狗吠東家疑夜深精靈鬼物動僁窣古莽無風吹道次靈井井面水不動傍分龍鱗激泉氣時生漚上湧光的皪深苔翠堪染石底清可覿旱嵗或來祠彈絃屬靈覡荅江十鄰幾蔡州非所遐作書素所嬾春風領燕來得君詞欵欵燕廻須在秋此報莫言緩何日見嵇康重彈廣陵散喜謝師厚及第時第一甲二十八人君名在二十三宿雨洗新綠朝日初聞鶯風從天門來吹下玉簡名列星二十八經緯何縱横南方朱鳥目光燄令人驚其餘撒沙衆龜鼈爪瓠明吾欣安石後世世有令聲孟夏二日通判太博恵庭花二十枝云是手植因以為荅前日已春盡夏卉抽嫩青唯君所植花餘紅猶滿庭常惜畏景逼贈未及飄零欲插為之醉但慙髮星星水邱於西湖得活鯽魚三尾見遺余頃在襄城獲數尾時歐陽永叔方自乾徳移滑臺留待其至且有詩後居京師蔡仲謀者亦有以贈乃思襄時所留復有詩於今三得三詠之襄城得圓鯽留以待吾友大梁又得之始憶終按酒今君復持贈重念滁陽守滁陽石瀬中此物豈無有三得實嘉遺我敢自私口口且不争甘事亦難利誘和江鄰幾見寄自此許州起慶厯六年夏盡其年終清風當晝起吹我庭下槐軒軒枝上葉碎影亂緑苔左右無人聲時有啼禽來啼禽感所懷其音一何哀思歸無曉夕血滴山榴開曰予當是時為之腸九廻江子方謫官復有擬古才逺寄平澹辭曷報瓊與瓌雀奪燕巢生四雛去年燕營巢銜泥入我廬秋歸春復來横被雀所居翩然去不較義者欲與除毁覆必傷卵愛彼此何疎乃竢長黄口逐之寜曰紓果得生四雛卉色頭戢如後當還燕巢穿屋不害余和歐陽永叔啼鳥十八韻南方窮山多野鳥百種巧口乘春鳴深林參天不見日滿壑呼嘯誰識名但依音響得其字因與爾雅殊形聲我昔曾有禽言詩粗究一二啼號情苦竹岡頭泥滑滑君時最賞趣向精餘篇亦各有思致恨未與盡衆鳥評君今山郡日無事靜聽鳥語如交爭提壺相與來勸飲戴勝亦助能勸耕我念此鳥頗有益如欲使君勤以行勸耕幸且彊職事勸飲亦冀無獨醒杜鵑蜀魄哭歸去小人懷土慎勿聽城頭春鳩自謂掘鵲巢輒處安得平髙窠喬木美毛羽哢吭葉厎無如鶯口中調簧定何益下啄蚯蚓孰曰清自餘多類不足數一一推本煩神靈我居中土别無鳥老雅鸜鵒方縱横敎雛叫噪日羣集豈有勸酒花下傾願君切莫厭啼鳥啼鳥於君無所營和永叔桐花十四韻湛湛碧井水其上有梧桐春隨井氣生白花飛濛濛曉枝滴甘露味落寒泉中結實待瑞羽嵗晚半枯空桐既無鳯皇井豈潛蛟龍乃知至神物未易令人逢當時集潁川偶值黄次公次公入為相此鳥曷不從遂使神鶡雀竟用竒怪窮我言非毁古欲遵平直蹤我願二千石但使徳化隆有桐鳯不來於桐無媿容有鳯政不舉於鳯何為崇荅君桐華篇聊以發我衷和王仲儀詠癭二十韻汝水出山險汝民多病癭或如雞精滿或若猨嗛並女慙髙掩襟男大闊裁領飲水擬注壺吐詞侔有鯁樗里既已聞杜預亦不幸秦人號智囊吳瓠繋狗頸􅀈􅀈常住頤伶仃安及脛只欲仰問天無由俯窺井挾帶嵗月深冒犯風霜冷猒惡雖自知剖割且誰肯不唯羞把鏡仍亦愁弔影内療煩羊厴外砭費鍼頴在木曰楠榴刳之可為皿此誠無所用既有何能辟音屏膨脝厠無首臃腫異臚頂難將面目施可與胎胞逞賢哉臨汝守世徳調金鼎氓俗雖醜乖敎令日脩整風土恐隨遷晨昬憂屢省儻欲便慈顔名誠不難請憶吳松江晩泊念昔西歸時晚泊吳江口回堤遡清風澹月生古栁夕鳥獨逺來漁舟猶在後當時誰與同涕憶泉下婦使者自隨州來知尹師魯寓止僧舎語其處物景甚詳因作詩以寄焉驛使話漢東故人遷謫處所居雖非居有樹即嘉樹日膳或雞㹠時蔬多筍竽夜堂蛇結蟠晝户鵲噪聚著書今未成愛靜已得趣予欲訪其人炎蒸未能去夏日對雨偶成寄韓仲文昆弟日日城頭雨還添湖上波窗中人自聽門外潦應多不畏車生耳唯愁麥化蛾吾廬無所有頻看壁間梭憶將渡揚子江月暈知天風舟人夜相語平明好挂帆白浪須出浦此身猶在吳歸夢預到楚今日念同來吾妻已為土秀叔頭蝨吾兒久失恃髪括仍少櫛曾誰具湯沐正爾多蟣蝨變黑居其元懷絮宅非吉蒸如蟻亂縁聚若蠶初出鬢搔劇蓬葆何暇嗜棃栗翦除誠未難所惡累形質稺子獲雀雛屋頭小雀雛氣力苦未長乘暄學調羽忽挂蜘蛛網其母不能救啁啾空下上乃為人所探不是蟲絲枉丙戌五月二十二日晝寢夢亡妻謝氏同在江上早行忽逢岸次大山遂往遊陟予賦百餘言述所覩物狀及寤尚記句有共登雲母山不得同宫處仿像夢中意續以成篇晝夢與予行早發江上渚共登雲母山不得同宫處何嗟不同宮似所猒塗旅樹杪俯烏巢坼㲉方仰乳雄雌更守林號噪見飛䑕䑕驚竪毛怒裊枝如發弩逡廵吼風雲逺望射巖雨東南横虹霓萬壑水噴吐下尋歸路迷欲暮各愁語忽覺皆已非空庭日方午蜜燕銜芹根泥蜂掇花上蕊帶雨兩股飛所取日能幾調和露與英凝甘滑於髓天寒百蟲蟄割房霜在匕燕已成雛歸蜂憂凍餒死乃見萬物心多為造化使王徳言自後圃來問疾且曰圃甚蕪何不治因荅幾日不行圃野草過人頭客怪苦荒穢誰與持鉏鉤雖然自薅薙抱痾方告休即當秋風髙埽籜將遲遊夢覩閉目光不揚夢覩良亦審既非由目光所見定何禀白日杳無眹𠖇遇嘗在寢此恨不可窮悲淚空流枕悲書悲秋快於刀内割肝腸痛有在皆舊物唯爾與此共衣裳昔所製篋笥忍更弄朝夕拜空位繪冩恨少動雖死情難遷合姓義已重吾身行將衰同穴詩可誦合流曹光道惠鉅李知其炎酷中有此味亦可樂也輒以詩寄頴傍成蹊李其實小於拳誰知皴枝瘦生此紺玉鮮摘以筠梢籠沉以石根泉濛濛粉未落粲粲葉猶連䕃樹咀甘液安有苦熱煎報君惜兹樂時詠逍遥篇深夏忽見柰樹上猶存一顆實纍纍後堂柰落盡風雨枝行樂偶散歩倚杖聊縱窺林葉隱孤實山鳥曾未知物亦以晦存悟兹身世為病癰在告韓仲文贈烏賊觜生醅醬蛤蜊醬因筆戲荅我嘗為吳客家亦有吳婢忽驚韓夫子來遺越郷味與官官不識問儂儂不記雖然苦病癰饞吻未能忌寄光化退居李晉卿久無歸田人今喜子去禄移家漢水濵日見漢水綠川鱗可為饔山毛可為蔌竟嵗猒往還行堤樂風俗青巾艑上郎漆鬢顔如玉倚檣臨落照獨唱江南曲聽若在江南歡然自為足我心雖有羡未遂平生欲更期畢㛰嫁方可事巖麓買山須買泉種樹須種竹泉以濯吾纓竹以慕賢躅此志應不忘他時同隱録汝南江鄰幾云鄎南並淮浮光山有張隠居種松檜於其上養母甚孝時有猛獸馴庭中又郡西麻田山土沃泉美久不墾有劉叟者闢而居之近董氏黄氏欲買土為鄰故江有慕之之作予輒次其韻峩峩淮山上中有隠者棲不知松檜下但見虎豹蹊人羣固巳逺樵客入猶迷且奉采蘭養應無抱玉啼麻田異麻源石路春無泥高士不近俗更在西嶺西石泉飲自足深壑無人躋不學淮南王安問犬與雞二人逍遥性所樂唯杖蔾復有來慕鄰他年寜荅嵇􅂅君且勉職聖世未易暌魏文以予病渇贈薏苡二叢植庭下走筆戲謝媿無相如才偶病相如渇潩水有丈人薏苡分叢茇為飲可扶衰餘生幸且活安知惡已者不願變野葛宛陵集卷二十七
