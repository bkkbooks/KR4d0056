body:
  text: 宛陵集卷十八宋梅堯臣撰依韻和原甫省中松石畫壁冨彦國爲省判日令許道寧画山林與城闕事物不相對唯聞秉道義所處無内外趨煩而毁靜此理乃俗輩昔有天下賢喜得名筆㑹買粉塗南牆松石生屋内石怪如舂濤松偃如起籟畫來二十年數偶未輒愛罕親慿案顔但覩抱犢背雖當省闥嚴晦昧欲何賴今逢茂陵人獨唱亦豪邁依韻和原甫㕔壁許道寧山水云是冨彦國作判官時畫山情水思半軒間試問來居有厎閑唯有才髙方暇佚無論歲月自能攀依韻和劉原甫見寄憶昔游臨汝于時太守賢山尋順風處城得豢龍遷民頸纍纍大池荷一一圓周碑嗟缺矣少室望嶄然羸馬居人後歸禽落我先事還如響荅老去若波旋賦分都應定元功豈得偏不須天以問自可鑒於前王粲今方樂邉韶舊好眠漢宫聊擲彩梵學競通禪語道滔滔是論情往往牽平生二三友南睇不勝悁醉和范景仁賦子華東軒樹次其韻五月十日樹影落東牆影微人已醉休看枝上緑但對睂間翠五月十四日與子華自内中歸君注起居同左史我爲委吏退延和共經南陌東風急側㡌偷看意已多送傅越石都官歸越州代闕越客舟從眞定至夜夜鏡湖生夢寐曉度吳江百尺船洗眼重看㑹稽翠買臣負薪樵徑荒伯鸞賃舂苔臼棄緑橘黃柑帶葉收白秔紫蟹侵霜飤食蟹易美秔易飽緑橘佐酒柑佐醉莫論仕官逺與近布被練袍何所利君恬不忍乞匃爲且返故廬聊以遟吳沖卿出古飲鼎精銅作鼎土不蝕地下千年蘚花冪腹空鳳卵留藻文足立三刀刃微直左耳可執口可斟其上兩柱何對植從誰發掘歸吳侯來助雅飲歡莫極又荷君家主母賢翠羽胡琴令奏側絲聲不斷玉箏緐繞樹黃鸝鳴不得我雖衰苶爲之醉玩古樂今人未識二十四日江鄰㡬邀觀三館書畫録其所見五月祕府始暴書一日江君來約予世間難有古畫筆可往共觀臨石渠我時跨馬冒熱去開㕑發匣鳴鑰魚羲獻墨迹十一卷水玉作軸光疏疏最奇小楷樂毅論永和題尾付官奴又看四本絶品畫戴嵩吳牛望靑蕪李成寒林樹半枯黃荃工妙白免圖不知名姓貌人物二公對奕旁觀俱黃金錯鏤爲投壺粉障復畫一病夫後有女子執巾裾牀前紅毯平圍爐牀上二姝展氍毹繞牀屛風山有無畫中見畫三重鋪此幅巧甚意思殊孰眞孰假丹靑模世事若此還可吁依韻和吳沖卿祕閣觀逸少墨蹟奇哉王右軍下筆若神聖長戈與伏弩無不從號令賢豪雖林立帖歛孰敢競師徒氣揚揚龍虎旗正正勝聲塞宇宙自昔無此盛赫赫猶至今瑰瓉曷云並崇崇中祕書濟濟士游泳墨寶收盈㕑來觀遇已横始知前人蹟鐫多自失勁紙素儻未壞萬古傳莫竟一從歸人間夢寐不能更但媿將短才輒爾接髙詠何羞趙壹窮自有鍾嶸評嘗聞曹將軍尚請賦競病我生羣俊末貧賤亦足慶文成終媿君鉛刀值枯梗同江鄰幾龔輔之陳和叔登吹臺有感在昔梁惠王築臺聚歌吹笙簫無復聞黄土化珠翠當時秦兵强今亦歸厚地我與諸賢良舉酒莫言醉曽誰問孟軻空自有仁義逢羊予晨過北郭見羣羊有羝處前其卭然而偉腯其角拱然而聳其毛茸然而長自膊至腕􅢹􅢹與纓胡相若其羣很逐而擁趨如奉焉及其宰也羝存而羣死之予歸作詩示諸友云牧人垂長䫇驅羊從北道老羝壓大羣毛比長䫇好暮歸同一欄朝出不擇草旣肥當用􅖒從羝羝獨保狡誘以全軀角尾徒爲老依韻和張中樂寺丞見贈朝車走轔轔暮車走􅣗􅣗黄埃蔽車輪赤日爍車屋靡論逺與近安問疎與熟賢愚各有求往返相磨轂我馬不出門我蹟亦以跼心慕中樂賢道義聞且宿其言清而新其貌古不俗書可到二王辯可折五鹿往見未爲勞定交然後篤惠詩何勁敏對敵射銅鏃穿楊有舊手驚雀無全目彊酬非所當冝將弓矢速依韻和原甫對月見邀不至每愛孔北海樽中常不空今無酒與客唯有月兼風逺色曽何隔㣲凉亦已同更期三五夕靜坐接談叢依韻和原甫月夜獨酌月下馬蹄休擾擾夜凉蟲響競囂囂一杯獨飲愁何有孤榻無人膝自摇北斗柄髙天漸轉小冠簪冷髮微凋誰知靜對頽然影竟夕幽懷豈易聊依韻和原甫早赴紫宸朝待旦假寐月落西樓露氣寒大明將謁望清班燭房猶照衣冠上漏舍欲爲魚鳥間入仗采旗開日月在庭公衮儼雲山我慙一似朝宗水亦得隨流到海還依韻和原甫新置盆池種蓮花菖蒲養小魚數十頭之什瓦盆貯斗斛何必問尺尋菖蒲未見花蓮子未見心小鮮不足􅖒安用芎餌沉戸庭雖云窄江海趣已深襲香闕玩芳嘉賔㑹如林寧思千里游鳴櫓上清涔送施屯田提㸃銅場兼相度嶺外鹽入䖍吉江西采銅山未竭南越熬波海將結主人貪利不畏刑白日持兵逾盜竊銅私鑄器鹽奪商死共吏爭蛇鬭穴姦豪乗勢倚蠻陬劫掠聚徒成蟻垤今雖驅翦嶺下平尚恐根存更生孽因擇健才通便民付職與權將有設秋香亭上共爲賔却作主人殊少恱徂東走北十五年只有山川看不别依韻和江鄰幾癸巳六月十日同刁吳韓楊飲范景仁家晚赴館宿覩吳興太守章伯鎮題壁記辛卯仲秋初吉九月十一日十月二十二日十二月十一日壬辰二月一日館直慨然有感江翁多感槩飲㪚來直廬題蹤有舊友連蹇常與渠昨歸天禄下念昔悲有餘未久復外補安能戀淸虛得請向苕霅幽懷寄禽魚髙城浸湖光面面當紅蕖晚乗畫舫游四坐羅輕裾數杯已酩酊萬事應破除不愛趨時近不恤與世疎百歲且過半冉冉將焉如誰慕八十叟猶在磻溪漁嗟哉再宿夕乃自仲秋初淸談固隔絶可見壁上書送林大年寺丞宰䝉城先歸餘杭逋之姪孫東方有竒士隱德珠在淵川壑爲之媚草樹爲之姸殁來十五載獨見諸孫賢煌煌出仕塗皎皎如淮蠙今爲䝉城宰歸問浙江船何時渡揚子夜入明月邉有舄不化鳬有琴何用絃真趣還自得治民唯力田依韻和原甫六月八日曉雨侵曉忽飛雨颯然戸庭凉滴階初聞聲濯樹暗有香吹燭燄閃閃鳴雞濕昂昂稍已便衣冠喜氣睂宇翔安然如涸魚呴沬久已望塵纓自可潔何必念滄浪送余中舍知漢州德陽匹馬易爲秣單車長是輕秋風來棧道宿雨度關城石上樹林暗山根江水明桐花鳳何似歸日爲將行勉裴如晦裴侯失嬰兒心腸如焚煎愛玩白玉玦墜地不復全收拾見顔色瑩澈猶自姸鳳皇生九雛一卵破易捐况多令男子拭淚慰目前送謝寺丞知餘姚其姪師厚嘗宰此邑姚江千里海汐應山井亦與江潮通秋來魚蟹不知數日日舉案將無窮髙堂有親甘可養下舍有弟樂可同縣民舊喜諸郎政芻力莫媿今爲翁與蔣祕别二十六年田棐二十年羅拯十年始見之我今五十二常苦離别煎屈指數離别正去一半年三君異出處相見有後先蔣最㑹遇早羅倍晚於田仕宦比我遲官資居我前此亦漫輕量無限歸荒埏所喜笑語同各驚顔貌遷髪有霜華侵目有蜘蛛懸有酒易以醉有奚徒用姸醒來念功名病螾希蜿蜒安得有園廬寛閑近林泉養魚數千頭種薤三四㕓餘蔬皆稱此嘉果植亦然旣無俗造請窮冬事髙眠囷貯白秔稻酒沽靑銅錢飯過飲數杯令兒誦嘉篇仰首看赤日區區隨天旋朝見出滄海暮見入虞淵畢竟將何窮磨滅愚與賢億億萬萬載筋骨非玉堅桐棺三寸厚在昔誰免焉去去欲及時嗟嗟無由縁别三十弟彦臣二十八日朝辭都城裏暮止汴堤頭滿日非相親寂黙對河流依韻和竇山曇穎長老見寄處山無猒山林鳥正關關月入潭心白花明谷口閑采薪能自至流水不知還聞欲觀滄海髙峰峻亦攀送余中舍監韶州錢監孤靑水中石片白蒼梧雲虞舜不可見簫韶不可聞君爲漢錢官鑿山取銅鑛韶石不生銅留爲千古景七夕詠懷織女無恥羞年年嫁牽牛牽牛苦娶婦娶婦不解留來往一夕光奕奕河漢秋輕傳人世巧未知何時休喜鵲頭無毛截雲駕車輈老鴉少斟酌死欲同造舟明月不到曉是夜曲如鉤天意與物理注錯將何求嘗聞阮家兒犢鼻竹竿頭人生自有分豈媿曝衣樓送弟禹臣王都寓居樹陰少惟有牆隅兩株棗去年相見棗花開今年相别棗實好棗實未剥風莫吹我鬢愁多似蓬葆淮南到時何所逢秋葉蕭蕭蟹應老憶昔共歸江上初對飲蘆洲月如縞半夜魚跳鏡破光萬事􅀈然何足道自此重經二十秋不改靑靑岸旁草送叔昭上人附施屯田歸宣城缾巾過江去逺託故人船借問風濤勢何如杯度年山茶花樹子贈李廷老南國有嘉樹花若赤玉杯曽無冬春改常冒霰雪開客從天目來移比瓊與瑰贈我居大梁蓬門方塵埃舉武尚有礙何地可以栽每游平棘侯大第夾靑槐朱欄植竒卉磨碧爲壅臺於此豈不宜亟致勿徘徊將看榮茂時莫嗤寒園梅送吳照鄰都官通判成都君家婦何賢捨舟具車轂五年夢在梁三年行向蜀迢遞今日同辛勤昔時獨看花久莫留買錦慰不足歸來兒女大婚嫁應相續依韻和原甫昭君辭武帝常勒兵北登單于臺始欲以威伏竟亦慙懷來徒令出塞師萬里求龍媒未弭後世患玉顔困黄埃丹靑不足恨謀慮少徘徊月如漢宫見心向胡地摧在昔李少卿聽笳動悲哀壯士尚如此蛾睂安得開情語旣不通豈止腸九回初冬誠難保死不如草萊再依韻一嫁異域去不復臨鏡臺念昔辭家時豈爲單于來適遐固亦命配醜非由媒始欲竝日月今嗟隨風埃僕侍共慘戚山川空徘徊鴻鴈爲之悲肝腸爲之摧寧聞琵琶樂但聞琵琶哀休言羊酪甘誰喜氊廬開故國萬餘里此生那得回乃知女子薄莫比原上萊飲劉原甫舍人家同江鄰㡬陳和叔學士觀白鷴孔雀鳬鼎周亞夫印鈿玉寶赫連勃勃龍雀刀主人鳳皇池二客天禄閣共來東軒飲髙論雜談謔南籠養白鷴北籠養孔雀素質水紋纖翠毛金縷薄大誇鳬柄鼎不比龍頭杓玉印傳條侯字辯亞與惡鈿劔刻辟邪符寶殊制作末觀赫連刀龍雀鑄鐶鍔每出一物玩必勸衆賔酌又令三雲髻行酒何婥約固非世俗懽自得閲古樂聖賢泯泯去安有不死藥竟知不免此烏用彊檢縛開目即是今轉目已成昨歸時見月上酒醒見月落怳然如夢寐前語誠不錯次韻和永叔退朝馬上見寄兼呈子華原甫公歸初退内朝班馳道南頭躍錦鞍欲雨浮雲猶復暗背陰殘雪愈生寒穿槐已覺春禽語載酒重思結客懽吟寄侍臣知有意翠鬟爭唱口應乾劉涇州以所得李士衡觀察家號蟾蜍硯其下刻云天寶八年冬端州刺史李元德靈卯石造示劉原甫原甫方與予飲辨云天寶稱載此稱年僞也遂作詩予與江鄰㡬諸君和之硯如刳蟇腹如月又若剖瓢萌彊發鐫題天寶年造之刺史李元傳自越刳蟇剖瓢我莫分稱載作年初辨君君雖能辨猶曰寶原甫詩云李侯寶硯劉侯得寶兹偽物吾何云仰天大笑飲君酒硯真硯僞休開口願封漆匣還與侯請共江翁獨持守江詩云劉侯寳此處勿忘慎勿將心逐名轉送劉㢸祕校赴婺源雲木蔥蘢處雞鳴古縣城山髙地多險源近水偏清斫漆資商貨栽茶雜賦征案頭龍尾硯切莫苦求精送閻中孚郎中知磁州簫管梁王臺風雪邯鄲道君行守趙城我向夷門老持麾邦寄重歌袴民欣早重岡古獵場驚兔離衰草次韻和王景彞十四日冒雪晚歸子猷多興憐飛雪向晚歸時又見飄拂馬隨人如著莫舞風吹面亦勝消閉門我作袁安睡呵筆君爲謝客謡記取明朝朝謁去毳裘重戴冷寥寥和王景彞晚逢赴江鄰㡬飲殘雪晚生寒良朋邀我飲逢君三省歸交轡一相審乗興興未盡旣杯杯太甚夜䦨踏月廻火冷人已寢次韻和吳沖卿傷何濟川生愛虛名苦辯亡淪精竭智可哀傷誰將事附三公傳自有文誇古戰場墳土未乾還卜穴挽聲纔絶又新章是非從此方應定弟子猶爭左氏長次韻景彞赴省宿馬上烏紗帽厎靑眸轉朱雀街頭玉轡摇燈火髙樓吹短笛簾籠斜巷隘初宵身歸蘭省唯看月心在天津欲倚橋枕上夜深應不寐羡他年少酒微消送李獻甫覽君南來詩如對江上景今忽告我歸東風生馬頸馬行日㡬里到家梅萼逞重登石頭城爲我一引領送周諫議知襄陽藹藹荆州幾萬家竟持壺酒望髙牙里兒尚唱銅鞮曲耆舊爭隨畫鹿車雄鴨緑頭看漢水肥鯿縮項出漁查鄉人應笑張平子只有歸田賦可誇依韻和原甫㕔壁錢諫議畫蟹諫議吳王孫特畫水物具至今圖冩名不減南朝顧濃澹一以墨􅚺殻自有度意將輕蔡謨殆被蟛蜝誤宛陵集巻十八
