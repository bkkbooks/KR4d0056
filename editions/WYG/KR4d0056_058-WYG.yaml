body:
  text: 宛陵集巻五十八宋梅堯臣撰吳長文紫微見過豈敢以貧賤而輒傲賢貴但恨門䦨遥赫日去可畏瘦馬汗常流寸歩出無謂是以逾十旬景慕腸欲沸近因秋雨來纖纖有凉氣九陌可以行輕服可以衣方將事請見瘡足痛若䠊忽枉騶騎過顔厚言莫既尚期新醪熟還往襲經緯乃知君子徳曩分替則未范景仁紫微見過亦謁不遇道上逢之朝游翔鳳池暮直中書省無由見顔色况乃當畏景退朝八月朔因得修造請髙閎一何新未歸閭巷靜版刺留姓名不遑佇軒屏驅馬返我廬道逢騶從整斂轡莫敢行顧望立俄頃還家稚子言有車來炳炳傳是紫微人將廻猶引領如何互相乖徒自想形影更待秋風髙緩歩時往省送王道粹學士知亳州古者二千石髙車駕青驪車前陳曲蓋車後建朱旗金鼓鳴兩㫄壺漿擁通逵所付重威惠所仰撫惸嫠景亳實鉅屏往俾國相之國相稱疾還正值民阻飢朝廷急恤養選守莫與宜君甞典海陵政績為衆推今授輒辭命大夫多飛綏屢上不得請飭馭俄輕齎既體堯舜仁又荅稷禼知八月風漸髙木葉將披披郊原棗已剥場圃黍可治必期寛賦歛無乃息疲羸何當過苦縣肯暇觀舊碑和江鄰幾學士畫鬼拔河篇蒲中古寺壁畫古畫者隋代展子䖍分明八鬼拔河戲中建二旗觀却前東廂四鬼苦用力索尾栧斷一鬼顛西廂四鬼來背挽雙手磓下抵以肩龍頭魚身霹靂使持鉞鎮立旗左偏拔山夜又右握斧各司勝負如爭先兩㫄撾鼓鼔四面聲勢助勇努眼圓臂梟張拳擊捧首似與暴謔意態全當正大鬼按膝坐三鬼帶韣一執旃操刀擐囊力指督怒髮上直筋舊纒虎尾人身又踣顧蒺蔾短挺金鎚堅髙下尊卑二十四二十四鬼無黄泉角錐竟强欲何睹曷不各各還荒埏送制置發運唐子方學士本以諌諍稱今以財賦用所為各有能何必於兹重東南周萬里海陸竭煮種斂之為公上豈是與民共民方苦久弊將缺太平頌有利得設施無不可抑縱大都守繩墨曷異虱處縫從来許國心曽未苟祿俸願無輸羨餘終亦歸侍從次韻和司馬學士慮囚縲囚徃慮問勤恤意不息猛虎在陷穽摇尾尚求食常憂有詿誤非罪罹暴廹藹藹萬乗都憧憧四方客一遭纖微釁鑑垢莫磨拭是以大君心惟恐横抵摘前法著以律後法編以册每當炎蒸時獄器用刷滌應無古寃血地下化為碧我今因牽吟聊以肝膽瀝刑人皆得辜不似尤地脈閒歸即解鞍浣手嫌控靮昔言善烹魚必先溉釡鬲願言保兢慎切勿厭此役夜月可留翫清尊可獨適一榻寛且平羣動都巳寂可用休其勞不休庶終夕送吳沖卿江鄰幾二學士王景彞舍人秋興我謂蓬瀛客清切不畏炎及觀秋興篇無逺此窮閻乃知天地大節􅇋無愛嫌寒不為富減暑不為貧添向者遭蒸炊靡不同炮燖西風吹雨至凉氣何纖纖霈然沃萬物不更畢宿占紈扇捉苦倦盤冰得仍厭蠅癡驅又來蚊嚵喙猶尖絺衣不復浹醅醪壓初甜客有憎壁蝎吳詩客有困鞾襜江詩一以磔為喜一以嬾自謙唯有螭頭人朝立宮殿簷盛誇樓觀髙又極星斗瞻王詩予慙異羣公歸意如陶潛自念菊將拆復思禾可鎌春禾作釀熟獨邀影與蟾此樂雖易有彼榮安得兼送覺上人歸湖州冨相國與紫衣古寺一盂飯弊衣三歲塵相應維帝祝子已得袍新范叔復何望原生甘自貧歸看五湖上終有泛舟人送閔郎中知池州一送池陽守頗懷當日遊青山臨岸盡翠水入江流楚舊茅為貢燕來鴈報秋牧之登覽處故事待君修和吳沖卿學士省中植菊園果未熟實未墜野卉未老葉未瘁菊叢是時方發榮潭上籬邊俱有為一從潭島輔長年一自籬根圖暫醉今將移近省中蘭壅培早與陶潛異黄土肥濃沃井泉朱欄屈曲侵階地勁風不到何動摇清露能霑誰著意看看重九各登髙金蘂滿頭無所忌及此頻邀同舍歡向來莫羨鍾繇賜我家蓬藋不足云強對嘉章顔起愧張仲通追賦洛中雜題和甞歴覽者六章伊川山斷㵼伊流灘聲朝暮急東渡馬將登西堤人已立日看東西舟爭塗如不及誰見捕魚郎寒蓑雨中濕洛州上陽宮樹影不隨寒波流天津橋下石激響無時休至清自照物遇險豈能柔東過白馬去凡經幾千秋潛溪寒溪隨山廻修竹隠深寺頗逢老僧談能憶先朝事白栝聖君憐緋花土人蒔不到三十秋依稀猶可記真宗甞駐蹕白栝樹下花譜有潛溪緋一品石樓山腰古石樓杳藹石梯上低窺巖際樹對見龕中像簷中嵩雲飛檻逼伊湍響同遊已零落歳月成俯仰大字寺庭中兩大樹池上千竿竹竹有紅淚斑樹無衆鳥宿昔日白傅歸愛吟裴令續閒流水西園翻然入他族蘄竹顋肥節腦瘦蘄水長笛材洛陽袁氏塢此竹舊移來雪霰飽已久竅星誰為開與君作龍吟吹發江南梅次韻任屯田感予飛内翰舊詩二十四年君日哦翰林風韻郢中歌歳華荏苒都如昨世事升沈亦苦多燕國駿蹄猶待樂荆山美寶已逢和賸求海内多何用爛醉人閒理莫過歴覽昔賢皆泯泯尋思魯叟自波波我今不敢希髙躅蹇歩年來任跌􅋸次韻荅徳化尉郭功甫遂以送之江南有嘉禽乗春弄清吭流音入我耳慰惬若獲貺朝聴已孤髙暮聴轉幽曠何多燕雀羣聲跡不相􅅖始聞汾陽生文行衆所諒獨哦青山間悼古或悲愴弃官不屈人頗學陶元亮是時予愛之顔采莫得望倏然能見過逺渉丹湖浪袖攜一卷詩行橐更無長固與俗人殊於焉識敦尚嗟嗟二千石不知子所向駭子發論髙萬仞聳孤嶂又如決河湍捧土安可障吾方歎瓌材恨未逢良匠信哉騏驥駒誰用伯樂相自從昔還朝汩汩走俗狀未甞寄子書子言今行行亦似昧相知曽非事髙閌把筆誠不勤強意乃為妄兹晨去湓城聊以和子唱子辭猶瀑布敢挹不知量送李師錫太博通判懷州洛陽古道登北邙河内碧山横太行朝騎快馬暮可到風物人心皆故郷竹林無蹤懷阮籍路􅅖有家嗟宣王别乗差同二千石教民唯在親耕桑送潘士方建昌軍壘近仙山麻源第三合靈運詩亦存魯公記可讀幸時無宼攘閑日望雲木儻見西王母白麟如白鹿來尋鳥爪人神光生石屋無念癢背搔還恐罹怒扑學道我未成鍊氣不飽腹安得羽翼生下上同黄鵠送君想君遊星斗壇邊竹次韻和吳仲庶舍人送徳化郭尉蒲葉髙帆十二幅秋風逆水滿檣開是時不畏浪頭起到日定將船尾堆用捨東方言虎鼠賤疎梅福比蒿萊少年才辨無如廬岳峰前莫滯廻和劉原父舍人樂郊詩太守東平來固殊阮歩兵歩兵醉乗驢太守整佩纓事物既已遺駕車出東城園荒久不治道路生棘荆地僻人馬入草閒狐兔驚舊池堙猶窊遺址巋不平窊者使之濬巋者使之營博野髙榭起陳漁危臺成榭前東山秀臺下盧泉清􅅖塢梧竹宻翳水芹藻并渠渠有深堂燕賔飛玉觥芍藥廣陵美謔贈鄭女情公子莫言歸古人未以輕欲知學山簡倒載去攲傾送張聖民學士知登州慕君才行美風義亦倜儻在逺恨未逢既近不屢往非以近為輕恃易遂成曩倏為東牟守别我駐征鞅又作千里遥依然復懷想昔聞之罘山秦碑元有兩一存東頂中一在西頂上篆實丞相斯缺剥不可仿願言試歴覽聞見欲以廣海晴望石橋神仙事􅐞怳始皇安得長陰怪役罔象橋斷水無涯焉知有方丈邇者地出金發掘壞沃壤良民皆逐末兹事誰用長凡為二千石唯在勸耕紡幸君經術髙教化人所仰送王言秀才歸建昌來時槐開花去日木隕葉作賦未得薦著書已盈箧舊居近仙壇獨往遇農饁莫問鳥爪人欲取月桂捷依韻和劉原甫遊樂郊贈同遊積歳阻顔色何以慰我思聞初遊樂郊頗慕登望詩下車未幾日倏見白露滋月弦不常滿星畢屢已離幸無風雨晦時從寮寀嬉大喜酒客難莫顧尚書期獨守詩書愚未悟朝夕疲引領君子風東首自忘移但當觀魚鳥辟去旄與麾優悠民亦康何必苦吏為次韻和王尚書荅贈宣城花木𤓰十韻百果各甘酸或由人所植木𤓰聞衞詩贈好非玉色投此瓊玖報蓋重車馬飾貴賤今既殊凌紙字翕赩一一如明珠自得見安格復何備國風庶亦見王澤捧之為重賜誦已乃忘食幸資藥品用少助宣調力南土加文章中州異肥瘠公將和鼎餗微意願尋繹九月晦日謁韓子華遂㽞邀江鄰幾同飲是夕值其内宿不終席明日有詩予次其韻乗興驅車偶一來旋呼江老舊遊陪驚風送雨寒初動舉酒浮蛆撥不開騏驥鞴時聞内宿琵琶彈急怨虗催接䍦帶去令傳樣自此逢歡未便廻送王省副寶臣北使紫服黄金帶銀鞍翠錦韉犯寒辭漢省持禮入雄邊重譯通諸部名王接右賢舊山廻可記碣石與燕然送李學士公達北使萬里使窮域山川入馬蹄駞鳴沙水凍鵰擊雪雲低食飲羊兼酪言辭象與鞮禮成廻近日喜聽早朝雞送祖擇之學士北使燕山常苦寒漢使渉窮臘路長人馬愁風急沙霰雜宿造氊廬開行逢獵騎合獻鮮秃髮馳問譯華言荅每食冰生盤欲飲酒凍榼見其酋長時國禮何勤納中朝厚仁恩四海望閶闔乃知日月光照必蠻夷匝歸來易輕裘賜對延英閤送許璋監簿歸泰州木枯鳥不巢泉涸魚不游我非魚鳥情貧縛路阻脩髙陽有令子嗣世學已優前日來京城問恤忍涕流今失王府薦命奇言非讎家聲喜未墜辭我還海陬為酌一壺酒敘懷心如抽子之伯父殁遣奠固莫由豈欲寡恩義力薄難置郵因寄縁睫淚灑向君衣裘送棣州唐虞部人持左符去馬逆北風行古路草初白大河冰未成暖科桑柘美寒織杼梭鳴風俗已如此憩棠無訟爭金陵有美堂李白愛山如洛陽三盃為歌愁日長廢基臺殿不可識玉燕舊棲王謝堂公來碧瓦起棟宇羅列圖畫牙作牀池頭古月城下江照見萬里冰雪光江流不盡月不死寒浪素影東西翔願公樂此殊未央慎勿區區思故鄉送張中樂屯田知永州畏向瀟湘行不入洞庭去鞍馬踏闗山衣裘冒霜露零陵三千里楚俗未改故王澤久已覃國刑亦當措昔聞栁宗元山水尋不飫其記若丹青因來問潭歩石燕飛有無香草生觸處仙姑異麻姑歳月樓中度不食顔渥赭言語神靈預莫將車騎喧獨往探幽趣有信報我知惡欲驅塵慮宛陵集巻五十八
