body:
  text: 宛陵集巻二十一宋梅堯臣撰次韻景彞春宴法座初瞻戸牖間衮衣垂處見雲山滿斟玉酒傳宣盡齊插宮花拜賜閑紅線織成庭下毯明珠結出耳中環鬭雞旗底逢逢鼓逐勝爭名利害關次韻景彞三月十六日范景仁家同飲還省宿種桃依竹似仙家邀對春風共泛霞席上未觀雙舞鳳城頭已覺聚啼鴉悤悤跨馬人歸省冪冪生煙樹歛花稺子候門知我醉東方明月照扉斜次韻永叔試諸葛髙筆戲書公負天下才用心如用筆端勁隨意行曽無一畫失因看落紙字大小得疎密筆工諸葛髙海内稱第一頻年值我來我媿不堪七安能事墨研欲效前人述嬾性真嵇康閑坐喜捫蝨是以持獻公不使物受屈果然公愛之竒蹤寫名實豈惟播今時當亦傳異日嗟哉試筆詩藏不容人乞唐書局後叢莽中得芸香一本有芸如苜蓿生在蓬藋中草盛芸不長馥烈隨微風我來偶見之乃稺彼蘙䝉上當百雉城南接文昌宮借問此何地刪脩多鉅公天喜書將成不欲有蠹蟲是産兹弱本蒨爾發荒叢黄花三四穗結實植無窮豈料鳳閣人偏憐葵葉紅嘲景彞獨愛葵花美嘲江翁還接䍦江簡云嘗憶張籍詩有恐傍人偷剪様尋常嬾戴出書堂何言恐偷樣自是君婦嬾五日縫一巾猶道苦未晚次韻景彞閣後紫薇花盛開禁中五月紫薇樹閣後近聞都著花薄薄嫩膚搔鳥爪離離碎葉翦晨霞鳳皇浴去池波響鳷鵲陰來日影斜六十無名空執筆顛毛應笑映簪華送李太伯歸建昌推天以知命自古豈不然桓魋及臧倉嘗毁聖與賢後人何蹈之其事實好還君居麻源谷學禮如鄭𤣥聲名久已大籍籍四海傳昨因丞相舉便謂升雲煙朅來太學舘食貧向三年忽懷枌榆下歸思獨緜緜得告許暫往落莫求楚船捋髯滄江上仰看飢飛鳶誰識鵷雛志閑誦莊叟篇喜問里中兒重到舊林泉洗蕩俗塵垢焚裂跨馬韉不向世路去徒取愁腸煎雞豚粗可養禾黍亦足田不慙莎衣蟲以葉自包纒及其飽滿時曷異冠貂蟬君意我彊冩雖慕何由縁送林大年殿丞登第倅和州和靖先生負美才族孫今似漢庭枚敗亡項籍江邉廟應媿文場戰勝來王知章尉河内古縣太行下老槐三四株以言新作吏不似舊爲儒黄綬心猶壯靑雲志豈無漢朝吾逺祖不道此官麤送祖擇之赴陜府古來分陜重猶有召公棠此樹且能久後人宜不忘君從金馬去郡在鐵牛旁山色臨關險河聲出地長樽無空美酒魚必薦嘉魴天子憂民切行當務勸桑中伏日永叔遺冰日色若炎火正當三伏時盤冰賜近臣絡繹中使馳瑩澈肖水玉凜氣侵人肌近日多故友分貺能者誰信都顧貧賤物物義不遺念我老且病赤疿生枯皮巨塊置我前凝結造化移畏冷不敢食有類夏蟲疑雖然已快意何必咀嚼爲天子厚於公不使熾毒欺公亦厚於我將恐煎熬隨我有䑛犢愛自憐小子龜次韻和永叔贈别擇之赴陜郊古人相送贈以言今人相送舉以酒酒行殷勤意豈疎酒罷躊躇悲更有行當何之來者誰陜府兵吏爭迎走壺漿往往過圅關翰林惜别方攜手自言老大遇知難願得公詩爲不朽公因索筆作長謡落落寓言誠十九我慙竹管厠宮懸縱合律度應非偶太守西行已不貧忽獲明珠盈大斗歸立螭頭未是遲暫向棠陰問遺叟送施縡秀才下第君嘗老於敵輕彼羣兒嬉堅銳不可恃屢北還自疲胷中多竒祕旣衂何所爲東走滄海上夏果采茘枝奉親樂無涯豈媿禄仕遲送張山甫武功簿洛陽舊交有七人五人已爲泉下塵各家生兒爲門戸唯子弟兄先立身我與信都侯獨在喜見及禄知天仁昨日聞補武功吏氣調欲與南山親少年勉力向職事莫學老貪文字新送微上人歸省天台釋子懷慈母吾儒未易輕不尋琪樹去肯向石橋行海近雲多潤山髙日少晴天恩新賜服書字欲傳名寄天台梵才上人常觀月從東方出想照石橋旁畔人試問當年與今日清光不改只如新送李信臣尉節縣先歸湖州梁王吹臺側五月多荷花荷開對翹鷺吳客還思家家在水中城四面如鋪霞焉能長相守千里獨起嗟補官東海上物景莫言賖送王廵檢之定海休淬鸊鵜劔休調鵲血弓平時自壯大何所立戰功得兵不滿百防寇滄海東駕船如飛鶻出入巨浪中苟能勇於此遇敵無廢忠同梅二十五飲永叔家觀所鈔集近事劉敞陶令一畞宅尤愛北窗風心逺地誠僻客來樽不空觀書太史氏全性市門翁予亦何爲者於此清賞同來上人歸宣城兼簡太守孫學士李白不猒敬亭山看盡飛鳥雲獨閑我今相送一懷想想在謝公牕戸間始作燕子巾裹髻不裹額自名燕子巾翼覆尾涏涏誰問巢由人謹賦避暑就髙臺不如就賢人賢人若冰雪論道通鬼神自言信手書字字事有因往往得遺逸烜赫見名臣是日劉夫子拍手氣益振重覩太史公吾徒幸來親大笑舉玉杯陶然任天真内樂不復熱豈以身爲身送侯孝傑殿丞僉判潞州同在洛陽時交游盡豪傑倏忽三十年浮沉漸磨滅唯餘一二人或位冠夔契我今存若亡似竹空有節人皆欲吹置老硬不可截君自緱山來别我不畏熱言作潞從事家貧禄仕切六月上太行辛勤非計拙天當氣候凉淸風自騷屑雖云數日勞斗與炎蒸絶君本公王孫才行實脩潔鏘鏘發英聲瑩瑩如佩玦是爲君子器終見不渝湼相逢未易期夢寐歸鼓枻送張子野知虢州先歸湖州來赴虢太守暫歸吳興家吳興近洞庭橘林正吹花君當橘柚時摘包帶霜華清甘不楚齒若酒傾殘霞谿山小女兒姹姹兩髮丫褭褭上氍毹嘈嘈弄琵琶是時與之醉何似走塵沙送尹瞻駕部監靈仙觀天地如轉磨屑屑今古人一落大化手團品惟其新不幸積不用衮衮同埃塵日月行何窮過盡千萬春人生占幾許百歳猶比晨君求灊山潛捨去兩朱輪願效陶淵明翦紗爲破巾山前溪多鱗山下酒甚醇看雲舉大杓杓造舒州民李白嘗愛之死生曽與均此志我亦有更將猨鳥親送朱玠戸曹之廣德軍南方小兒纔讀書往往得官訶路衢君今五十始作掾手板靑袍非壯圖况來桐汭水上城折腰彊顔休歎吁城西古祠能致雨歳不有旱民無逋民樂未央君可娛舊俗不與吾鄉殊次韻和永叔原甫致齋集禧廟嚮靈祠屬二公齊心相望切朱宮緑渠繚繞壖垣水廣沼清泠漲殿風已詠應麟來五畤仍歌翔鴈雜殊翁遥知畢事期尋勝尚問衰羸未猒竆送王司徒定海監酒稅悠悠信風帆杳杳向滄島商通逺國多釀過東夷少懷鄉寄書遲見日知晨早應聞有海花何必樹萱草端明李侍郎挽歌三首少年為侍從名譽竟軒騰每吐胷中鳳寧容筆上蠅受釐延漢室被謗過周陵今日泉宮啓師臣禮秩増官豈不爲達其如望未充敏辭傾一代發問詘三公猒向承明直思行邵伯風嗟嗟玉樹折埋沒彼蒿宮秋樹無黄鳥蟬聲亦自哀素車新隴去白馬舊賔來薤上朝陽露池中歳劫灰短長何足較嗣子有髙才次韻和永叔夜聞風聲有感月落夜正黑風起庭槐端窗間星動摇枕上人寤歎所歎吹陰雲苦熱彌不歡當其氣莫出曷若無衣寒虛堂臥竹簟汗體如露漙驅蚊爇蒿艾寧復襲芝蘭煎灼一如此衰枯誰可完消磨任寒暑安有不死丹三伏已過二炎赫應漸殘試看蜣蜋蟲辛勤方轉丸焉得從釣舟逆上嚴子灘此事人所易謝榮爲獨難誰顧萬古名黑石持鐫刋風聲不用撼牀頭閑素紈次韻和永叔石枕與笛竹簟溪上枕剖龍卵石蘄匠簟製蛇皮紋客從東方一持贈竹色蒸靑石抱雲磨沙斲骨自含潤飽霜弔節無留塵京師貴豪空有力六月耐此炎蒸劇旱風赤日吹熱來大厦髙檐任雕飾頭顱汗匝無富貧雖有頒冰論官職官髙職重冰則多日永冰消難更得唯公埽室施枕簟迎凉自感東方客東方客應非俗昬能使賢人心體適賢人何以偏伏人天下才名方赫赫我吟困竆不可聽晝夜蚊蚋蒼蠅聲蠅如逺雞耳初感蚊若隱雷空際鳴葛㕑頂綻屋蝎墮菅席中裂麻經横平生賦分只煎炒安有禄玉琉璃淸猶勝昔年杜子美老走耒陽牛䏑死因思楊惲廢時言但願人生行樂爾公今事業在朝廷去就尤當慎終始待公睡足秋風來去奉髙談揮麈尾寄題朱表臣職方真州新園靑蔥江上樹杳藹宮前道道側有新園園中無惡草松隴方在望茅屋聞已考朝廷正急才何得言歸老次韻和原甫閣下午寢晚歸見示殿閣風來夏日長靑林抽嫩見餘芳筆供五吏詞休敏簟展雙紋睡正凉故事早歸何獨晚舊交新詠尚無忘不言偃仰中園樂還愛睂間喜色黄三十二弟寺丞歸宣城因寄太守孫學士謝公下車日郡内一登望昭亭山蒼蒼寒溪水瀁瀁句淸宛微渾三洲分細浪小艇下灘來羣鷗舞潭上借問鷗何若水深魚莫向鷗餒猶識機魚樂不忘餉子去見太守於我必有訪但寄此薄言樽前爲之唱送刁景純學士赴越州㑹稽迎太守舟屋畫粉雘前舟載圖書後舟載女樂月出鏡湖心長笛使孤作還見漁者來曽令李謩愕吹裂比竹管士果不可度二分學宮裝豔色鬭京洛甞聞有西子䓿萏不相若得郡考故跡精絶古所怍慎莫爲俗牽乘閑數斟酌送宋郎中知商州孝孫商於六百里太守二千石地廣任亦重車建旗仍赤嘗聞四老人采芝留舊跡古廟藏空山曽無漢羽翼其事有圖畫家傳多典籍願君爲政閑案覽知疇昔六月晦日定力院同原父賦送伯鎮景純樞言三學士淸秋三黄鵠舉翼東來飛鳴聲既相呼煙水亦相依蓬池不暫止太液未言歸酌酒望滄海飄颻思菊衣次韻和景彞省闈宿齋二首晝日南宮雨後凉齋嚴官重靜於常庭前鬭雀墮還起欄下秋花落自香看盡雲容天漏碧讀殘書帙巻披黄九衢塵土莫能到蕭瑟微風葉響廊新月斜光依約見夜蟬髙樹有時鳴曲睂不想西家樣餒腹還思二子淸迭代物華何足較古今榮謝豈須驚靜來應覺能閑少人事區區逐日生送刁景純知㑹稽前有朱翁子後經王右軍至今風俗美自昔誦歌聞秦望臨丹㦸邪溪潄白雲只應絲管去驚動海鷗羣次韻荅王景彞聞余月下與内飲仰頭看月見新鴻形影雙飛玉鑑中呼我作卿方舉酒更煩佳句賞髙風次韻和景彞對月蕭蕭風雨變凉意索索晚雲開斗晴已洗浮埃天外靜忽生圓月樹頭明草根蟲穴吟來久屋角星河落更淸我媿西垣侍臣比影寒霜鬢兩三莖和景彞新秋西閣獨直池頭鳳皇寒井上梧桐老鳳寒浴已晚桐老脫亦早是時有詞臣獨直正視藳嚴嚴代王言落落奮淸藻演成五色絲世作非常寶貶如市朝撻褎若華衮好四方號令施萬耳昬聾埽此職唯其才用居寧草草宛陵集巻二十一
