body:
  text: 宛陵集巻四十三宋梅堯臣撰依韻和郭祥正祕校遇雨宿昭亭見懷君乗瘦馬來骨竦毛何長下馬與我語滿屋聲琅琅一誦廬山髙萬景不得藏出沒望林寺逺近數鳥行鬼神露怪變天地無炎凉設令古畫師極意未能詳誦說冒雨去夜宿昭亭傍明朝有使至寄多驚俗章郭來誦歐陽永叔廬山髙送劉復採石月贈郭功甫採石月下聞謫仙夜披錦袍坐釣船醉中愛月江厎懸以手弄月身翻然不應暴落飢蛟涎便當騎魚上青天青山有冢人謾傳却來人間知幾年在昔熟識汾陽王納官貰死義難忘今觀郭裔竒俊郎睂目真似攻文章死生往復猶康莊樹穴探環知姓羊依韻和郭祕校苦寒噫風鳴悲鳶鳴哀雨霰枯木為之摧昭亭山頭野火滅海水夜凍迷蓬萊燭籠以𤓰自掩耳酒琖生冰拈不起陶潛棄官屋無米兒號妻啼付鄰里依韻和郭祕校昭亭山偶作知君棄官後江上尋名山心既慣世内迹欲還人間昭亭忽來過覽古興長歎野寺拂塵壁丹陽已斕斒殿角虛寶鐸微風聲珊珊遺像與筆蹟始得觀裴顔淺井何泠泠前溪何潺潺幽幽隨猨鳥渾渾忘區寰裂裳不為媿餌芝不為難坐對寒雨中松上孤鶴還送郭功甫還青山來何遟遟去何勇羸馬寒僮肩竦竦昨日棄為梅福官扁舟早勝大夫種負經不厭關山遙訪我猶將歳月恐得言㑹意若秋鷹反翅歸飛輕飽氄明朝到家年始開椒花壽酒期親捧何當交臂須彊行莫作區區事邱壟送鄧生哀哀彼鄧子扶柩歸長沙朝暮哭失聲驚聒牆上雅飛去復飛還相與棲水涯卜葬不當緩早晩能到家送才上人還闕竇寄達觀禪師春雪滿蓑笠海邊先燕歸千林新改葉百衲舊來衣谿水從何至山雲自解飛報言巖下客齋盋筍應肥樂椽自淮南回示新詩淮南厯覽還宣城囊多佳句何冰清入門先叫十年兄袖中大巻持來評我雖暗愚眼不盲要識合如劉長卿舉頭不言笑且驚此兄議論頗稱情我亦感君知我名阮籍從呼作老兵蘇州曹琰虞部浩然堂姑蘇臺上麋鹿號夫差城中樓觀髙荒榛盡巳付明月萬古憤怒空秋濤呉亡越霸能幾日後世擾擾猶鴻毛孟軻善養浩然氣充塞天地無飢嗸慕而為堂亦有意不學屈子成離騷紅梅篇昨夜輕雷起風雨芍藥紅牙竹欄土南庭梅花如杏花東家殘朱塗頰􅷯萼為裳衣蕊為組枝為髙居幹為戸蛺蝶未生蜂未來赤身掩斂無金縷終然有子當助傳說羹落亦不學飛燕皇后廻風舞此意又笑麻姑與王母勾引何人擗麟脯是非方朔謾漢武只知此桃不知語樹不著口數而今言之已莫補放我渾丹鳯皇羽依韻和呉正仲聞重梅已開見招難開密葉不因寒誰翦鵝兒短羽攢猶是去年驚目豔不知從此幾人觀重重好蕊重重惜日日攀枝日日殘我為病衰方止酒願攜茶具作清歡寄送呉公明屯田通判秦州一聞春禽婆餠焦竹林山木生蕭條憶君將向洛門去胡馬無塵塞路遥將軍本是漢丞相玉帳坐辨牙旗梟白面書生有肝膽少年曽過咸陽橋今雖老病由廬巷為報緩制秦兵驕呉正仲求紅梅接頭君家梅溪上但見梅花白我家家樹紅求枝寄歸客翦接如交情本末不相隔明年舉酒時醉頰生微赤初聞蛙朝開南籬梅暮聞北池蛙何時科斗生草根巳吐牙只畏草葉長其下可隠蛇游子且勿行科斗成蝦蟇百舌一冬常噤黙乗春何多舌蒼毛無文章尖啄苦騰說曉升髙髙樹百鳥言漏泄只未聞鳯皇有亦學不徹傷哉古辯士往往遭車裂萬表臣報山房有重梅花葉又繁諸君往觀之前時見多葉曽何數尋常今見葉又多移賞南澗陽寄言莫苦恃更多殊未央去臘隠靜山僧寄榧樹子十二本柏樹子十四本種於新墳棐柏移皆活風霜不變青冢垣雖闃寂田客每丁寧不待為書几常流作鬼庭東邊夾路少更致儻能令補題東都善惠師禪齋香象紅蕖坐花盆白石臺上公金印去王子玉駒來心是寒缾水明無寶鏡埃世人何擾擾時為一言開送萬殿丞䖍州安逺軍新雷動江雨百鳥響溪巖逆水送行客順風催挂帆過山唯廟敬團飯與烏銜太守雖憐舊須防有嫉讒野望新晴宜野望最愛是山前逺近花兼竹髙低水拍田呼名鳥無數問姓客多年此地春耕晩呉牛樹厎眠泛溪中流清且平捨楫任船行漸近鷺猶立已遥邨覺横何妨緑樽滿不畏晩風生屈賈江潭上愁多未適情春隂雲壓花房冷風開柳絮遟幽人宿酲在靜館晝眠時欲雨天無雨將絲鬢未絲孔融過五十歳月巳堪悲新燕前時春社畢今日燕來飛將補舊巢缺不嫌貧屋歸衘泥和草梗側翅過柴扉豈比驚丸雀迎人欲拂衣梨花處處棃花發看看燕子歸園思前法部淚濕舊宫妃月白鞦韆地風吹蛺蝶衣彊傾寒食酒漸老覺歡微新筍挑筍春雷後晴坡過雨時何言江外早已比洛陽遟園客自偷賣主人那得知徒令養新竹待與作籓籬海棠要識呉同蜀須看線海棠燕脂色欲滴紫蠟蔕何長夜雨偏宜著春風一任狂當時杜子美吟徧獨相忘二月七日呉正仲遺活蟹年年収稻賣江蟹二月得從何處來滿腹紅膏肥似髓貯盤清殻大於杯定知有口能噓沫休信無心便畏雷幸與陸機還往熟每分呉味不嫌猜老馬馬御史所留呉人惜燕駿燕馬臥呉家毛骨從前䝿關山欲去賖草深閑楚澤力盡憶胡沙御史乗來久時逢避路騧自詠閉户無還往端居廢禮容花為貧冨燄燕是舊過從持屐對人蠟綻衣看婦縫非同叔夜傲切莫怪疎慵鸚鵡一入秦宮去千山隴樹秋能言依婦女學語類俳優玉鏁閑拘束金籠不自由哀哀是黃鳥死為穆公羞曉烏蟾不出海天地無明時萬國睡未覺一聲雞巳知樹頭星漸没枝上露應垂人世紛紛事勞勞只自為朝二首鵝鴨出欄去兒童臨水驅欲開花泫露聚噪鳥窺㕑秣馬刈青荳買薪嫌五銖錢刀豈今古邨叟一何愚木鏁初開水上城竹籬深閉日光生青苔井畔雀兒鬭烏臼樹頭雅舅鳴世事但知開口笑俗情休要著心行是非不道任挑撻唯憶當時阮歩兵宣州雜詩二十首昭亭萬仞山古廟半山間賽雨使君去釣潭漁父閑蕨肥巖向日竹暗壟連關北望髙樓上南飛鳥自還三洲灘口急兩水渡頭來下過桓彞宅上通嚴子臺潺湲瀉寒月滉漾照春梅白鷺驚起處魚多見厎廻一過響山畔常思路中丞開亭宴貔虎制賊象冰蠅舊刻多磨滅今人少有稱茸茸春草長時有牧牛登伍貟奔呉日蒼皇及水濵彎弓射楚使解劔與漁人抉目觀亡國鞭尸失舊臣猶為夜濤怒來往百川頻每見昭亭壁髙璩筆墨存丹青虛格裏雲霧碧紗㾗鳥屎常愁汚蟲絲幾為捫䝿來曽改觀世故有誰論信䜛多見逐伐國豈無仁屈子行江畔昭王問水濵包茅曽責貢香草自持紉莽蒼山川在漁歌屬野人項籍路猶此力豪聞拔山八千提楚卒百二破秦關陔下圍歌合江頭匹馬還却思諸父老相見亦何顔細雨春岡滑無因駐馬蹄裘單懷後侶風急過前溪近寺聞魚鼔穿林聽竹雞田家春正急炊飯待鉏犂古有琴髙者騎魚上碧天小鱗隨水至三月滿江邊少婦自撈摝逺人無弃捐憑書不道薄賣取青蚨錢諸葛久精妙已能聞國都紫毫搜老兔蒼鼠拔長鬚露筦何明淨煙丸事染濡班超投此去死作玉關夫大實木𤓰熟壓枝常畏風帖花先漏日噴露漸成紅青箬包山舍馳心奉漢宮誰將橐駞載辛苦向驕戎竿頭注腐鼠水次野蜂知每視銜飛翅因熏斸取脾絳囊千里道乾蛹百鈞馳盡入公侯第雕盤助酒卮髙林似呉鴨滿樹蹼鋪鋪結子繁黄李炮仁瑩翠珠神農本草闕夏禹貢書無遂壓葡萄䝿秋來徧上都鳥命若楊葉夜棲雞翼間情知羽毛薄自禦雪霜難相託為温燠終非學附攀猶勝居鶻握憂懼得生還栁子厚鶻說云髙齋謝公殁此地即危樓不改窗中岫無停川上舟壁隂縁薜荔城冥笑鵂鶹萬井曉煙合素霓橫樹頭北客多懷北庖羊舉玉卮吾鄉雖處逺佳味頗相宜沙水馬蹄鼈雪天牛尾貍寄言京國下能有㡬人知五月黄梅肥終朝密雨微緑苔侵竹閣潤氣裛人衣背隴霑牛去銜蟲濕燕歸髙山發瀑水夜漲入吾扉斫漆髙崖畔千筒不一盈野糧収橡子山屋㸃松明只見樹堪種曽無田可耕兒孫何所樂向此是平生傳道零陵守茲亭暫解裝分羣同鴈鶩㡬日到瀟湘班竹思虞舜赬萍憶楚王殷勤吏部句今亦誦無忘宛水過城下滔滔北去斜逺船來橘蔗深歩上魚鰕鵝美冒椒葉蜜香聞稻花歲時風俗美笑殺異鄉槎打鴨莫打鴨打鴨驚鴛鴦鴛鴦新自南池落不比孤洲老秃鶬秃鶬尚欲逺飛去何况鴛鴦羽翼長暝杳杳鐘初發昬昬戸閉時巢禽投樹盡疲馬入城遟醉唱眠茅屋燒光透槿籬荷鉏休帶月亭長豎毛眉夜日從東溟轉夜向西海沉羣物各已息衆星燦然森蝦蟇將食月魑魅爭出陰阮籍獨不寐徘徊起彈琴東溪行到東溪看水時坐臨孤嶼發船遟野鳬眠岸有閑意老樹著花無醜枝短短蒲茸齊似翦平平沙石淨於篩情雖不厭住不得薄暮歸來車馬疲呂大監餉鮆魚十尾日暖楊花四散開江邊鮆魚無數來伊魴洛鯉不堪憶丙穴漾陂何可咍賀監休思鏡湖去應知李白跨鯨廻香爐李獻甫惠鐵鑄小香爐壁環平口鋪麝焚葵葉大獸齧竹根趺淨几羣書外閑堂一物無中間任灰燼終與蕙蘭俱茶磨二首楚匠琢山骨折檀為轉臍乾坤人力内日月蟻行迷吐雪誇春茗堆雲憶舊溪北歸唯此急藥臼不須擠盆是荷花磨是蓮誰礱磨石洞中天欲將雀舌成雲末三尺蠻童一臂旋得自三天洞吳氏送白珙秀才谿上桃花發山前桂舸移水流過峽急風逆出江遟南國魚鰕厭東都夢寐思逢人若有問不似在朝時送閭邱殿丞每有西歸客誰無滿袖詩都忘將别意競媚向官資憑在屋頭月照君牆上旗不同山一定更逺更相隨獻甫過㡬樹桃花夾竹開阮家閭巷長春苔啓扉索馬送客出忽覺青紅入眼來宛陵集巻四十三
