body:
  text: 宛陵集卷八宋梅堯臣撰夏日晚晴登許昌西湖以下許州後詩新晴萬栁齊鶯度水東西城上明殘照雲間挂斷霓煙蒲勻若翦沙岸淨無泥果壓緐枝重人乘小駟低嵐光開翡翠湖色浸玻瓈只欠朱藤宻如過罨畫谿許昌晚晴陪從過西湖因詠謝希深蘋風詩愴然有懷疎雲漏斜照殘雨葉間明飛蓋城頭去澄湖水正平荷盛鮫客淚蔓濯野人纓公獨思康樂臨流誦句清故原戰落日探兵至黄塵鈔騎多邀勲輕赴敵轉戰背長河大將中流矢殘兵空負戈散亡歸不得掩抑泣山阿故原有戰卒死而復蘇來説當時事縱橫尸暴積萬殞少全生飲雨活胡地脱身歸漢城野貛穿廢竈妖鵩嘯空營侵骨劒瘡在無人爲不驚西湖閑望夏景已多趣湖邊日更佳園葵雜紅紫岸栁自敧斜雨氣収林表城陰接水涯愛閑輸白鳥盡日立汀沙寄謝師直憶同仲春月冒雨過穰亭聊酌山酒别獨吟夜燈青明朝上嶺路群岫張雲屛忽入川谷秀固非平生經緑竹間紅萼紫藤垂千扃春塘水決決野老髪星星田父相與至里言尚可聽始聞丹砂岑遂識五壟形傍瞻禹湯迹競信廟貌靈邀我陟巉巉宿霧方冥冥暗霑衣裘濕時襲草木馨棟宇敞絶頂牲酒列幽亭竹杯占禍福巫錦醉一嚀日晏别雲外月出至近坰僕夫疲不進鞭策無暫停我馬忽顚墜君心同鶺鴒再駕體無傷扣闗燭巳熒自兹期莫逆未契心所銘悤悤操行袂汎汎如水萍今來各一方安得同醉醒感二鳥雄雌雙好鳥託棲空樹中有蛇出旁穴噴毒氣如虹半夜此驚飛瞥去隨西東有喙不能逹啼雲復嘯風廻翔隔歳月老木髙童童眼生衆禽噪雖近未由通昨朝煙雨晦並翼向幽叢鷹鸇尚横集颺颺意無窮古相思劈竹兩分張情知無合理織作雙紋簟依然淚花紫淚花雖復合疑岫幾千里欲識舜娥悲無窮似湘水舟次朱家曲寄許下故人藹藹桑柘岸喧喧雞犬邨曉雲連雨黒秋水帶沙渾稍聽鄰船語初分異土言雖嗟逺朋友日喜近田園送曇穎上人往廬山潯陽幾千里無不見爐峰蒼翠入衆目巖壑少行蹤髙僧忽獨往杳杳懷逺公嘗聞虎溪上醉令或來同而今競邀致幾里聞松風塵心古難洗瀑布垂秋虹弔石曼卿前時京師來對馬嘗相揖埃塵正滿衢笑語曽未及雖然恨莫親往往聞風什星斗交垂光昭昭不可挹獨哦秋露中豈顧衣裘濕酒杯輕宇宙天馬難羈縶今朝我還都但見交朋泣借問泣者誰曼卿魂已蟄堂堂豪傑姿遂爾一棺戢君生寒月明君没寒月入月入還復升精魄寧未集孤墳細草遍翠碣嗟新立醉中留别永叔子履新霜未落汴水淺輕舸唯恐東下遟遶城假得老病馬一步一跛令人疲到君官舎欲取别君惜我去頻増嘻便步􅛂奴呼子履又令開席羅酒巵逡巡陳子果亦至共坐小室聊伸睂烹雞庖兔下箸美盤實飣餖栗與棃蕭蕭細雨作寒色厭厭盡醉安可辭門前有客莫許報我方劇飲冠幘敧文章或論到淵奥輕重曾不遺毫釐間以辨謔每絶倒豈顧明日無晨炊六街禁夜猶未去童僕竊訝吾儕癡談兵究弊又何益萬口不謂儒者知酒酣耳熱試發泄二子尚乃驚我爲露才揚已古來惡卷舌噤口南方馳江湖秋老鱖鱸熟歸奉甘㫖誠其宜但願音塵寄鳥翼愼勿却効兒女悲汴水斗減舟不能進因寄彦國舎人朝落幾寸水暮長幾寸沙深灘鼇背出淺浪龍鱗斜秋風忽又惡越舫嗟初閣坐想掖垣人猶如在寥廓陪淮南轉運魏兵部遊潁州女郎臺寺舊傳嬀氏女將適楚人時築館自臨水故臺空此基因爲楚宫媵來與使車期樓上望湖上煙林晩蔽虧望仙亭幷序夀春望仙亭廣平宋公所作也宛陵梅堯臣之官呉興道出其下公命賦之公來有餘樂所樂爲郡間訟稀聊自適静勝以紓顔清軒開曉幔歴歴見淮山山色洗新雨佳氣如可攀代異雞犬去時平草木閑試望天衢近飛駕應此還陪淮南轉運魏兵部遊濠上莊生臺周當戰國時何爲守静正干戈既日尋仁義固不競天下皆跖徒寧知聖爲聖是將萬物齊不顧千金聘所以忘形骸所以保性命安能小仲尼豈不識世病我從魏公來訪古停烏榜聊識賢者心吁嗟一長詠淮上雜詩六首宿雲未全斂微雨入船疎問伴失前後暝行隨疾徐相親沙上鴈自樂水中魚亭午日光透逺分林際居暗開淮水平逺見孤城出出舟問舟子遽對那能悉始聞莊生臺還想觀魚日果得眞隱心魚鳥情非宻輕舟晚投處聒聒渚禽嘶橡子隨薪束蔬科帶土􅂝岸幽雲滿石潮落蚌生泥客思無憀極唯將魯酒迷野鴈不知數翳然川上鳴曽無設羅意空自見船驚渺渺拍波去紛紛孤嶼盈苦寒非塞外霜落夜淮清漠漠晝煙披縱横見魚艇輕橈上急水或與飛鴻並魚大釣絲㣲牽隨碧潭迥向晚得志歸浩歌山月靜舟閣下灘遟蒼黃暮灘上偏愁逆水風更駕崩沙浪落日看巳昬漁燈逺相向夜䦨天轉寒坐待潮流漲赴霅任君有詩相送仍懷舊賞因次其韻湖山饒䆳處曽省牧之遊鴈落葑田濶船過蔆渚秋野煙昬古寺波影動危樓到日尋題墨猶應舊壁留過揚州參政宋諫議遺白鵝曾逰鳳池上曽食鳳池萍乞與江湖去將期養素翎不同王逸少辛苦冩黄庭金山寺并序昔嘗聞謝紫㣲言金山之勝峰壑攢水上秀㧞殊衆山環以臺殿髙下隨勢向使善工摹畫不能盡其美初恨未遊赴官呉興船次𤓰洲值海汐冬落孤港未通獨行江際始見故所聞金山者與謝公之説無異也因借小舟以往乃陟迴閣上上方歴絶頂以問山阿危亭曲軒窮極山水之趣一草一木雖未萼發而或青或凋皆森植可愛東小峰謂之鶻山有海鶻雄雌棲其上每歳生雛羽翮既成與之縱飛迷而後返有年矣惡禽猛鷙不敢來兹以搏魚鳥其亦不取近山之物以爲食可義也夫薄暮返舟寺僧乞詩彊爲之句以應其請偶然而來不得髣髴敢與前賢名迹邪呉客獨來後楚橈歸夕曛山形無地接寺界與波分巢鶻寧窺物馴鷗自作群老僧忘歳月石上㸔江雲𤓰洲對雪欲再遊金山寺家人以風波相止臘月海風急雪吹巖下窗輕舟不畏浪昨日過寒江渡口復夕興區中無與雙忽牽兒女戀空聽逺鐘撞金山芷芝二僧攜茗見訪一遊江山上日日吟不足雙錫忽來過衣霜帶初旭况能持茗具向此烹新緑中􅍽水若飴北焙花如粟還將塵慮滌自媿冠纓束何以報勤勤馳奴扣雲谷淮南遇梵才吉上人因悼謝南陽疇昔之遊久已厭宦旅故兹歸江南始時遽辭邑不及事春蠶殘臘猶在道險阻固所諳扁舟次淮海喜遇釋子談契闊十五年尚謂卧巖菴偶見如夙期淹留良亦甘歎逝獨泫然懷悲情豈堪班班雲中鳥共㸔投夕嵐曷不念舊隱山水唯素耽我從湖上去㣲爵輕子男送櫟陽宰朱表臣塞上備胡羌關中調兵食秦民尚苦輸漢吏勤求職君今喜懷詔馳騎寧暇息其邑嘗雨金扵時豈能得行當經㶚上故事猶可憶前代多戰争鬼火㺯隂黑蒼蒼路傍草憔悴希春色縣塗誠有政威惠爲令德依韻和長吉上人淮甸相遇淮上一相遇憶在京都時雖驚嵗月換未改松桂姿童侍兩三人缾錫相與隨自言東越來篋中多好詩文字皆妥帖業術無傾敧前輩嘗有言清氣散人脾語妙見情性説之聊解頤始推抒山學得非素所師此固有深趣吾心久已知横琴乃𤣥悟豈必弄鳴絲古樂衆少聽誰知彼吹篪師曠没世後伯牙衆身悲願同黄鵠舉逺歸滄海涯老驥雖不病長坂安可馳天台况竒勝日夕勞夢思尚忝齒纓綬終年趨路岐俯媿淵中魚游泳水之湄仰羨雲間鷙凌厲辭縶維居嘗起斯念未去情不怡今朝更道舊感愴各顰睂同遊謝公門逺想袂霑洟惜哉胡不仁碎彼東方琪又出數紙書手澤尚可披眷眷疇昔意扵今當語誰復遺三百言玩味自挽髭序事盡成故慨吟良有資其詞何亹亹宛若對風規冷然聳心目不覺整冠緌重以超俗韻顧予賤職司是猶猨鳥情並此駑櫪卑報投仍勉强實謬匠者爲應哂不量力短兵兹巳疲歲日旅泊家人相與爲夀舟中逢獻嵗風雨送餘寒推年増漸老永懷殊鮮歡江邊無車馬鑑裏對衣冠孺人相慶拜共坐列杯盤盤中多橘柚未咀齒已酸飲酒復先醉頗覺量不寛岸梅欲破萼野水㣲生瀾來者即爲新過者故爲殘何言昨日趣乃作去年觀時節未變易人世良可歎寄題梵才大士台州安隱堂巢禽託静林潛魚戀深壑豈不能自安翔泳得所樂達士逺紛華扵兹守沖漠堂前鳴松風堂後馥花萼好鳥時一呼澄明望寥廓詩興猶不忘禪心詎云著所以得自然寧必萬縁縛未能與之㳺懷慕徒有作農難稂莠非所殖嘉禾共一田老農實惡之豈共時稼捐管蔡與盜跖同氣詎能遷周公不妨聖柳惠不妨賢賢哉彼薅矣取舎得其然舟中值雨裴刁二君相與見過江上渰淒淒天形接野低岸痕生舊水馬迹踏春泥風急侵衣重山昬卷幔迷誰驚二客論不媿巨源妻題刁經臣山居時已應辟西幕向不樂郡府遂云歸田園結廬復種藝草樹日巳緐散帙理舊學了然無俗喧春雨一迴過覽耕登古原青山每自愛霽色當衡門故人苟來往名宦未嘗言趣適巳不淺道心良亦存忽聞辟書至便令驅犢轅豈期同瓠𤓰長繫蒿萊根始知古君子出處唯義敦前者裴君雨中見過因以詩謝復承來章輒依韻奉和主人門下客寂寞在江涘我昨謝銅章解組猶脱屣前日至朱方正值春雨起君時冒雨來曽不避泥滓林枝滴衣襟沙岸平履齒相歡了無間偶論通逺㫖去逢親交問爲報心如水甘露寺曽非逺城郭寂爾隔嚻氛尚有南朝樹能留北固雲川濤觀海若霜磬入江濆衛國丹青在孤堂緑桂薰依韻和刁經臣讀李衛公平泉山居詩碑有感當時植珍木豈是昧前規廢宅長春草故山存舊碑巳嗟良璧毁安識古松姿叔子每懷慕此心空自知春日舟中對雪寄刁經臣誰道江南暖新春見雪飛鷗來親客艇花亂上人衣古郡地偏寂野窗寒入㣲戴家仍不逺欲去未能歸依韻和逹觀禪師春日雪中見寄宻霰來新歳春陽氣漸㣲侵庭草芽凍紛雜鴈行飛江寺誰開逕湖山我欲歸雨花無六出休怪著人衣和刁太博新墅十題静舍野木扶疎重復重塘蒲涵水緑茸茸琴書尤古得爲樂休問前山有戴顒西齋静節歸來自結廬稚川閑去亦多書請君架上添芸草莫遣中間有蠧魚北軒冬日迎暄此未宜苦吟那對朔風時秖誇砌下留殘雪不看檐間斗柄垂叢杉植幹森然美在庭更憐相倚自青青翠姿且有干雲勢豈是孤生向逺坰松阜勾引風聲已可聽髙隂仍更接岡形知君久欲平心氣早晚根傍長茯苓小舫闕閒撐莫厭遲比扵刳艇劣相宜漕河有處通陂水深入荷花人不知移竹逺愛檀欒碧逕開荷鉏乘雨破秋苔直須探作阮家趣更向煙林缺處栽花隖雜芳春發淺深叢曲隖逶迤紫間紅色賤格㣲應不數少添蘭菊待秋風綿檜翠色凌寒豈易衰柔條堪結更葳㽔松身柏葉能相似勁拔縁何不自持新井淺淺清泉自鑑開鱗鱗寒甃未生苔山中亭午野禽渴不畏人驚欲下來登陶莊却寄刁經臣裴如晦方㸔梅柳春共别川河上移舟人已歸回首竹林望水渾不照影山逺猶相向聞道欲西遊漢家今尚壯發丹陽後寄徐元輿别君忽五年相望非一日會合如夢寐欣喜對形質是時春已仲臨水柳未宻載酒相與逰輕舠劣容膝禪扃竹下過乳井松間出烹茶覺暫醒岸幘情彌逸興䦨乘月歸及且解行繂離懷更宿酲逺想都如失胡武平遺牡丹一盤以下湖州後詩疇昔居洛陽㸔盡名園花臨水復䕃竹􅃩色照彤霞良友相與至競飲歡無涯而今猶老翁鬢髮但未華昨日到湖上碧水涵蒲芽此情頗已愜薄宦非初嗟况乃䝉見憐帶雨摘春葩雖無向時樂惠好仍有加題滕學士九華山書堂處山方畏淺曾慕結深廬要與雲峰近寧將野客疎澗苖來入俎林鳥或窺書何事輕兹樂而從出塞車公今爲涇州送劉成伯還都今昔困川塗今非羨行者離心寄南風相送過平野旣吹蓮葉舟更逐桂條馬中州多故人懷抱幸君冩送舍弟正臣赴都呉兒能刺舟其駛劇飛鳥行行固莫留望進前山小家貧吾不憂身計爾自了何當還里門拜慶期秋杪訪報本簡長老比泛苕溪來初逢卞山雨雨収精舍出喜與髙僧語門臨水若鑑萬象皆可覩清淨欲誰鄰野蓮無處所依韻和淮南祝祕校初春見寄客有袖中書初憑春燕寄春燕不時來秋鴻今始至水落蒲藻寒悠悠江浦意宛陵集巻八
