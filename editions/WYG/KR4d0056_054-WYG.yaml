body:
  text: 宛陵集巻五十四宋梅堯臣撰依韻和王景彞憶秋隴首欲看飛去雲槎頭安得巻輕輪流烏不轉西邊日乗馬猶知果下人空渴魏臺冰在井從悲楚客淚縁巾炎炎赫日偏憎老眼耳昬聾半塞塵七夕永叔内翰遺鄭州新酒言值内直不暇相邀詰朝持鄭醖向夕望星津俗意願添巧古心思變淳予窮少陵老公似謫仙人獨對金鸞月宮詞付小臣依韻和永叔久在病告近方赴直道懷見寄二章浴堂深殿近皇居秋夕詞臣直宿初宮女穿鍼爭落月官奴持燭看殘書萬家乞巧心無盡斜漢飛光望有餘枕上江山夢猶熟五更寒雨過簾疎玉轡瓏瓏出絳宮青槐馳道曉煙中塵頭尚裛洗車雨馬耳前趨吹鬣風聞說自將身許國不須仍以醉為公我今才薄都無用六十棲棲未歎窮文豹篇贈黃介夫壯哉南山豹不畏白額虎澤霧毛雖雜鼮鼠朝將具鬚暮為乳文章子雲久已許還笑大夫費五羖天子仗中儀勿舉尾與旂常願看取送韓欽聖學士京西提刑王朝慎常刑恐民陷非辟分命遣使車謬枉得舉摘兼之勸農桑欲野無曠隙韓侯夙所志功利豈止百茫茫唐鄧間荒土無牛跡邵閼廢未久柘楊仍舊白二地儻復營萬世不可易昔在漢家時近親多占籍苟或非膏腴當應徙畿赤每念輒歎嗟未能俾盡畫天將冨斯民事與願不隔其易謂何如拾芥由琥珀我今送韓侯書以贈無責送陸子履學士通判宿州雷雨初過草木新汴堤楊柳緑陰勻已看畫舸逐流水不惜長條折與人淮境秋傳蟹螯美郡齋凉愛蟻醅醇睢南莫久留才子宣室歸來問鬼神得福州蔡君謨密學書幷茶薛老大字留山峰百尺倒插非人蹤其下長樂太守書矯然變怪神淵龍薛老誰何果有意千古乃與奇筆逢太守姓出東漢邕名齊晉魏王與鍾尺題寄我憐衰翁刮青茗籠藤纒封紙中七十有一字丹砂鐵顆攢芙蓉光照陋室恐飛去鏁以漆箧緘重重茶開片銙碾葉白亭午一啜驅昬慵顔生枕肱飲瓢水韓子飯韲居辟雍雖窮且老不媿昔逺荷好事紓情悰韓子華吳長文石昌言三舍人見訪當時載酒客共過草𤣥人今日一寒士能來三侍臣竹門容大馬金絡照諸鄰雞瘦莫為具阮家依舊貧送吉老學士兩淛提刑重本恤刑天子聖舟車持詔使臣賢部中漢吏無冤獄葑上吳人益美田重過故鄉逢故老一聞鳴鶴記山川不須歌管唯詩酒况有餘杭白樂天永叔内翰見訪七月二十六日内相能來顧為郎樂有餘兒童爭拂榻門巷劣容車掩扇知秋意窺牆省舊書經年三枉駕未與故人疎送石昌言舍人還蜀拜埽紫微星宿何煌煌掖垣華閣上相當舍人亦與泰階近兩兩聮裾如鴈行其間飛星入王壘天子賜告歸故鄉錦韉金轡照棧去文園渴令難可望揚雄位卑纔執㦸豈有爵禄多文章石公官顯職且䝿還家展墓酹椒漿太守趨塵里人避岷山松柏風凄凉椎牛行酒與耆舊耆舊醉歸呼此郎公置名分共其樂敦厚世俗時陶唐郎呼只作曩日視安知鏘玉侍明光歸來却向鳳池直詔言一出稱廟堂廟堂蕭曹不草草潤色鼓動辭琅琅鼇頭蓬萊便可到蜀人更賀􅖒豬羊送劉元忠學士還南京昔見相公登瀛洲今見公子為校讎鯤鵬變化三千載我生安得不白頭君前拜恩父前慶暫向南都乗順流南都留守頗為喜將吏入賀鞾聲遒酒與銀甕羊臠炙上下和煦移凉秋歸來却上柳堤路西風健馬控花虬送潤州通判李屯田過江始與風沙隔京口山連北固牢刺史丰儀於體重邦人全伏此名髙宴盤紫蟹方多味古寺青林不厭遨定挈傳家舊圗籍漕河應莫費吳艘寄題知儀州太保蒲中書齋中條插逺近黄河瀉直斜蒲坂之城在其涯渠渠碧瓦十萬家官商工農共擾擾矦獨理齋窗照紗侯方守邊聴胡笳滿屋蓄書凡幾車他年不按青商樂亦莫學種東陵𤓰老繫戰馬向庭下㕑架整娖齊籖牙朝聞鳴雞夕聞鵶眼昬秋匣生銅花兒孫誦習且盈耳客來休論常山蛇哭孫明復殿丞三首魯國先生殁夷門吉士哀因䜛君席逺時賻帝恩該寂寞蒿宮啟悠揚茜旐廻昔賢皆不免松下作寒灰舊業居東岱中年謁紫庭要塗無往跡至死守殘經詔許求遺稾朋鄰與葬銘世人無怪我涕淚為之零自古春秋學皆知不可過生前恩禮少歿後薦章多妻子將焉託田園有幾何汶陽秋樹裏黄鳥謾聴歌程文簡公挽詞三首嘗預巖廊政終為社稷臣作籓安舊俗飲酒得賢人葬禮鐃簫咽明儀幣馬陳泉堂一經掩原上只麒麟將相榮難及唐虞世已遭名將官愈大節固位同髙哀悼王朝輟鐫埋史筆操空山伊水外松柏冷蕭騷闗塞秋雲冷伊川苦霧陰薤歌金鐸碎蒿里石宮深燃漆為長夜栽松作茂林空留舊冠劒家廟四時心送李殿丞通判蜀州嘗聞蜀國海棠盛因送李侯宜有詩日愛西湖照空錦醉看春雨洗燕脂郡無公事中園樂民喜羣邀匝樹窺望帝鳥啼空有血相如人恨不同時晨鮮深淺非由染解賦才華未得知聞說趙髙今已老試教圗畫兩三枝八月十夜廣文直聞永叔内當聞向蓬萊宿鼇峰第幾層秋聲暗葉雨殘夢空堂燈推枕感孤鴈抽琴彈壞陵誰知廣文直桃簟冷於冰和公儀龍圗新居栽竹二首八月竹根移要雨逢陰便向阮家求請公靜聴蕭蕭葉斗變江南一夜秋都城有地誰栽竹只見寒樗與老槐聞種琅玕向新第翠光秋影上屏來贈京西陳郎中忽枉乗軺車鏘然響金轡駐軫與我言琅琅有深意乃知故相家事業已不墜信哉渥洼種千里可立致顯祖實令君名聲取髙位伯叔與懿考聮榮重當世于今多昆孫朱紫紛曳地勉勉崇令徳蘇李何難至送董著作知北海縣君嘗佑王屬議平天下刑出宰得古邑農鉏多帶經素琴伴飲酒緑蘚生訟庭舉手望海鴈髙懷在青冥送王微之學士知池州秋江渺然生寒潮北風吹帆上青霄旗脚舒舒戰紅鬣旗心閃閃交皁鵰檣下健兒發金鐃屋上鸞童鳴紫簫岸傍舟人望且拜溪口直入當髙譙正聞鼔角波動搖齊山舞翠挹岧嶤郭西猛虎夜莫入太守號令如怒飇長戈樁爾㗋長刀斷爾腰牙兵將吏無敢嚻新威烈烈野火燒讀永叔集古録目古史書不足磨璞鐫美辭周宣石鼔文已缺秦政嶧山字苦隳西漢都無半畫在黄初而上猶得窺下及隋唐莫可數奇言偉迹恐所遺信都力黏大小軸集十為秩仍第之隨目證訛甲癸推青編是非皆究知有益於古今不疑碑雖滅絶事弗移後人覽録尚若披信都用意無窮期天灰地燼乃終畢信都信都名愈出依韻和永叔秋日東城郊行郊原物老莽然中寓興驅車向國東夾道名園迷屈曲壓枝秋實亂青紅寒畦覆緑將収菜野蝶雙飛尚繞叢田父欣來問行幸依稀還似鬭雞翁送王景彞學士使北持節共知過碣石銜蘆相背有飛鴻地寒狐腋著不暖沙闊馬蹄行未窮隴上牛羊衝密霰帳前徒御立酸風歸時莫問程多少却到河湟杏萼紅哭王畿道職方三首前罷邯鄲守孤髙與世違青雲舊知在白首故園歸既殁無兒女元貧只帳幃平生洛陽友從此更應稀我今過五十萬事日消磨孰識世間寡故交泉下多葉秋知易隕松耐竟如何嘗亦悲前哲荒墳野鼠窠得君音信近安穏在􅚆山不是國醫悞寧辭蜀道艱終然有脩短猶免歴間闗便作千秋别霑襟涕淚斑君當入西川官雖抱病無由免待闕於􅚆氏因衂血國醫以藥下之乗虚而卒依韻和楊直講九日有感也持黄菊蕊時望白衣人苜蓿従來厭茱茰却乍親護霜雲不散吹帽客何貧莫要悲搖落秋花更勝春王侍講原叔挽詞三首衣冠今盛族蘭玉舊嘉聲博古無遺悞遭時有重名魂輿臨水發靈馬向郊鳴歸葬商邱外森森柏已成稽古逢堯舜鏘金侍冕旒生貟尊鄭學子舍預䕫謀翰苑事猶著岱宗魂已遊無情是天地玉樹掩蒿邱丹旐秋風急清笳曉月寒明衣裛草露素士挽桐棺行哭賔徒盛觀儀里巷殫空餘舊編在千載莫能刋送公儀龍圗知杭州在昔漢中微我祖入吳門公今領名都千騎擁髙軒與古異出處素節古本原江觀白馬潮水花長鯨奔山飄月桂子天香一國緐壯奇已若此纎侈尚亦存舊聞其風俗色易而柔温太守朝駕車閭巷焚蘭蓀太守暮還府燈燭照旗旛清歌延冠蓋廣湖浮酒樽成都與餘杭天下莫比論彼為公故鄉此為公偃藩吏民宜寡事愷悌有謠言和楊直講夾竹花圗桃花夭紅竹淨緑春風相間連溪谷花留蜂蝶竹有禽三月江南看不足徐熙下筆能逼真蠻素書成纔六幅萼繁葉密有向背枝瘦節疎有直曲年深粉剥見墨縦描寫工夫始驚俗從初李氏國破亡圗書散入公侯族公侯三世多衰微竊貿擔頭由婢僕太學楊君固甚貧直縁識别爭來鬻朝質綈袍暮質琴不憂明日鐺無粥裝成如得驪頷珠誰能更問龍牙軸竹真似竹桃似桃不待生春長在目送李端明知河中府才業人終服聦明帝所聞來希段干木去識大馮君金絡鳴津口朱旗㸃鴈羣山河虞舊國簫鼓漢横汾古堞臨秋月髙樓等白雲應同羊叔子緩帶隔嚻氛依韻和永叔内翰西齋手植菊花過節始開偶書見寄晝惜日易沈夜惜月易曉重陽種菊花此意爾大好所嗟時節晩又失澆培早開榮獨是遲造化徒費巧霜前擁繁萼籬下同隕槁微根發再緑復笑王孫草莊生語鵬鷃樂不計大小能齊乃有餘但恐知者少常愛阮嗣宗遇酒醉則倒杯中得賢趣世上逐金裊依韻和丁學士陪諸公城東飲黄花秋草滿荒臺聮馬鳴珂未欲廻上苑自將馳道隔髙林空望白雲開薦肴已去紗籠羃賜醖新從蟻甕來天氣正清風景好重門雖禁不辭杯宛陵集巻五十四
