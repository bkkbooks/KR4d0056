body:
  text: 宛陵集巻三十五宋梅堯臣撰依韻和正仲賦楊兵部吳興五題雨過見虹明長橋欲映城窻間晴氣入空際晝凉生有扇徒看畫無冰自覺清人知太守姓不減漢公名清風樓在昔有佳句故人如遠來競生吳客衽不上楚王臺稍拂清樽動時吹翠帟開長安在何處水鳥望中廻明月樓霅霅前溪白蒼蒼後嶺巍人疑查上客星合蚌中暉影轉欄干迥杯行漏鼔稀只知誇粉黛不向桂邊歸碧瀾堂虚雲臨滉漾橋勢對隆穹環珮佳人去汀洲翠帯空橘船過砌下蘭棟起雲中欲問芳菲地吳王一廢宮逍遥堂江東有賢守好客似春申自構杏梁地不生珠履塵樂章思季子後俊得吳均寢卧在其下知君學至人依韻和行之都官芭蕉詩看取有心常不展亦如隨分坼佳葩無端大葉映蓮幕却笑菖蒲罕見花促織札札草間鳴促促機上聲織女夜中起明河檐外横一絲不入杼疎密工未精豈知天孫巧衣脫六銖輕人間唯䝿重暗蟲休催成吳仲庶殿院寄示與呂沖之馬仲涂唱和詩六篇邀余次韻焉次韻被命出城共汎三總忽出乗楚艘直氣突兀如吳濤大都智勇皆世豪横身破浪親戰舠廻舷受箭誰畏曺猛士心伏寒生毛風聲鶴唳傳九臯何用寶刀稱孟勞右持酒杯左持螯功成各慕前人髙不言大享烹太牢下與尺鷃翔於蒿依韻游陳留禪寺後池共逢香刹住萬景筆頭堆池水蛟龍盡汀洲鴈鵠來遠游情莫落去國意徘徊舟子休􅣠鼓王程不爾催次韻晚泊睢陽日下繡衣客江南燕尾艎迹雖同鷁退心不假犀凉舊國旌旄去包原苑囿荒臨隄一懷古柳上見微陽汴渠我實山野人不識經濟宜聞歌汴渠勞謾綴汴渠詩汴水源本清隨分黄河枝濁流方已盛清派不可推天王居大梁龍舉雲必隨設無通舟航百貨當陸馳人肩牛騾驢定應無完皮苟欲東南蘇要省聚斂為兵衞詎能削乃須雄京師今來雖太平盡罷未是時願循祖宗規勿益羣息之譬竭兩川賦豈由此水施縱有三峽下率皆麤冗資慎莫尤汴渠非渠取膏脂次韻臨淮感事楚舸髙帆未可開滿帆風暴作陰雷聖文亹亹傷漂溺世路紛紛自往來浮磬猶聞傳激越沈妖不見鎻淵回連陂鼃黽鳴無數安得周官為灑灰次韻夜過新開湖憶二御共泛出舟湖𣺌𣺌月白絶纖氛已見水如鑑莫生波上雲獨征何慕侶冷酌不知醺露下清吟久同心本愛君荅宣城張主簿遺雅山茶次其韻昔觀唐人詩喜詠雅山茶雅銜茶子生遂同山名雅重以初槍旗采之穿煙霞江南雖盛産處處無此茶纖嫩如雀舌煎􅖒比露芽競收青蒻焙不重漉酒紗顧渚亦頗近蒙頂來以遐雙井鷹掇爪建溪春剥葩日鑄弄香美天目猶稻麻吳人與越人各各相鬬夸傳買費金帛愛貪無夷華甘苦不一致精麤還有差至珍非䝿多為贈勿言些如何煩縣僚忽遺及我家雪貯雙砂罌詩琢無玉瑕文字搜怪竒難於抱長蛇明珠滿紙上剩畜不為奢玩久手生胝窺久眼生花嘗聞茗消肉應亦可破瘕飲啜氣覺清賞重嘆復嗟嘆嗟既不足吟誦又豈加我今實彊為君莫笑我邪送寧國軍宰崔寺丞移臨安六月畏嶺險乃陟川程迂遥看雲中鴈不亂江上鳬魚網離飛鴻我邑望何殊鱗方懷其剖鳥反值以刳為言等王民豈限楚與吳是維見戀慕作詩贈路隅辨疑贈獻甫一客逢吠狗無箠制狗狂一客叱狗吠一客言狗良良狗豈妄吠好言巳莫詳言乃仁之趨叱乃義所當趨仁不顧義非是助狗猖吾今不疑仁仁義嗟何妨盜儒其衣乃儒服其說乃墨夷天生物一本今爾二本為爾忍不葬親委以飽狐貍吾心則孟子不聽爾矢辭宣城宰郭仲文遺林檎右軍好佳果墨帖求林檎君今忽持贈知有逸少心密枝傳應遠朱頰映已深不愁炎暑劇幸同玉漿斟自和陶公種五柳華氏戲五禽達性與養生共得古人心佳果能御暑致之意何深河朔存故事助飲莫憚斟送王克憲奉職之彭澤折柳贈子行况聞彭澤去將過五株下可與青青助渭城人唱罷羌管愁吹處江上定多閑疎陰就箕踞寄潘歙州伯恭我貧性愛酒有酒無錢沽新安走牙兵六月至我廬手中持尺題肩上擔瓦壺髙山度青天救此愁腸枯開之聊傾樽渴肺如澆酥醉來欲學李白騎鯨魚又思阮籍跨蹇驢上溪無健鱗下嶺無壯駒憶君南望空長吁再寄歙州潘伯恭青山截天去古路蔽雲中不有行人至安知與郡通髙樓雖窈窕遠樹已溟濛今日勞君問衡門一老翁依韻和永叔澄心堂紙荅劉原甫退之昔負天下才埽掩衆說猶除埃張籍盧仝鬬新怪最稱東野為竒瑰當時辭人固不少漫費紙札磨松煤歐陽今與韓相似海水浩浩山嵬嵬石君蘇君比盧籍以我擬郊嗟困摧公之此心實扶助更復有力誰論哉禁林晩入接俊彦一出古紙還相哀曼卿子美人不識昔嘗吟唱同樽罍因之作詩荅原甫文字駛穩如刀裁怪其有紙不寄我如此出語亦善詼往年公贈兩大軸于今愛惜不輒開是時有詩述本末值公再入居蘭臺崇文庫書作總目未暇綴韻酬草萊前者京師競分買罄竭舊府歸鄒枚自慙把筆粗成字安可遠與鍾王陪文髙墨妙公第一宜用此紙傳將來依韻酬永叔示余銀杏去年我何有鴨脚贈遠人人將比鵝毛䝿多不䝿珍雖少未為䝿亦以知我貧至交不變舊佳果幸及新窮坑我易滿分餉猶奉親計料失廣大瑣屑且沈淪何用報珠玉千里來慇懃依韻酬永叔再示前嵗守廩京城西有如勾踐巢㑹稽引杯嘗膽未雪恥怒蛙起揖當涔蹄海天白日蔽光影霹靂一過收雲霓九臯澄明鶴翅濕欲暮刷羽聲嘶嘶客來東方美鬚鬛夜光出䄂行無迷授予照眼已希世自顧臭辢猶萍齏文章製作比善塑物象變怪一以泥泥雖各用有巧拙巧之髙絶非由梯又聞東夷蹈水底騎頸直踞通天犀曼卿子美摟入室似使二嫂治朕棲舜歸在牀不可得此實素分非能齊而今我獨向田里秋稼巳熟􅖒黄雞自傾白酒坐溪上誰念往日無粱稊鄰邦或有寄嘉釀瓦嬰土缶盛玻瓈昨喜得書書滿紙官尊職大憐我暌怪我書亂苦簡略疲駑豈敢攀駿驪䝿賤交情古來有胷中不欲置畛畦世間百事厭著意但願無病年夀躋田園未多亦粗給兒女况足資提攜終當去問綿上叟自與野老月下犂池州蕭相樓復所建樓中九華峰天削水蒼玉公圭何參差來雲自聨續我思唐蕭家八人居宰録瑀嵩華復俛傲真遘朱欄幾廢興下視寒江曲吳侯來為邦百事無窘束新之以登臨風月詠玩足安得黄鵠翼一舉遺世俗雜興苦楝樹青鵓鴣啄鹽土鳴嗚嗚老雅銜巢子爭噪落嶺隅不覺茶滿山漁利入江湖鹽由鵓鴣起茶由老雅趨誘以觸禁網二鳥誰與誅東家月吐明西家犬爭吠玉在中天曽何競窺穢姮娥雖夜行莫比淫奔廢呶呶籬下音胡不鈐其喙夢後寄歐陽永叔不趂常參久安眠向舊溪五更千里夢殘月一城雞適往言猶是浮生理可齊山王今巳䝿肯聽竹禽啼送王著作赴西京壽安翔向去作西畿令當趨大尹庭閑尋前代迹淨埽古槐㕔未慣餐周粟還應憶楚萍但逢花木處知我昔常經荅了素上人用其韻予心每澹泊世路多變詐梟鳴與鵩怪何用思彈射空山雖夜行猛虎終不怕功名未逢時壯士且出胯七尺無競軀市人應亦訝有香知害身投臍見窮麝一朝珠出淵百金未酬價爾尋遠公去挈盋廬峰下我趨仁義急不解如陶謝送通判黄國博入浙西風半空鳴且號吳天㸃破吳鴻髙東溪車馬走送客白露衰蘭輕若毛客當西歸乃東去為何欲及八月十五夜觀洪濤洗蕩生前邑邑不平氣付與滄海之水隨滔滔却來廣陵願相見拍手大笑傾新醪一飲一石無一錢莫管寒近脫弊袍脫袍準酒不惜醉天意未必凍我曹烏啄棗樹頭陽烏飢啄棗破紅遶地青蠅老青蠅雨濕驚不飛殘棗入泥人不埽西風落盡鳥亦歸晉客齒黄終懊惱真上人因送毛令傷足復傷冷二首陶令歸時遠公送石苔秋雨歩遲遲凌霄花在古松上也笑向人人不知聞道山中出入稀偶來溪上坐談微野雲不管田袍薄寒逼瘦膚相伴歸潘歙州怪予遂行與黄君同路黄先游浙矣依韻酬寄未識潘岳貌巳知潘岳名去年改藩屏暫此解佩纓一見意已合談笑僕屢更豈唯文學富况亦論事精溪邊昔欲罷屑屑秋雨零于今又聞蟬重起悲凉情作詩遠見招值我將西行譬彼矯翼鳥革然顧侶鳴蒼山不可陟空入江上舲黄君雖云約同泛明日自訪柳惲汀寒儒所向多不成或西或東車馬驚髙樓登望酸目睛欲觀弄濤仍膾鯨新安太守空相迎舉手謝君江水清潘歙州寄紙三百畨石硯一枚永叔新詩笑原父不將澄心紙寄予澄心紙出新安郡臘月敲冰滑有餘潘侯不獨能致紙羅紋細硯鐫龍尾墨花磨碧涵䑕鬚玉方舞盤蛇與虺其紙如彼硯如此窮儒有之應瞰鬼八月七日始見白髭一莖昔見白髭驚今見白髭喜人將拔去之我獨不然耳拔之既更生留之何所恥白日儻日拔日拔詎能已黑壯不為䝿白衰不為鄙道德保於中任從髭髪齒送僧了素游廬山平生愛廬山夢寢不可去江上饒賈船偶來看巳飫釋子言南游徘徊瞻瀑布月飛金熨斗光展千尺素嫦娥呼織女機杼勿復措必虞山鬼笑皎潔無纖汙爾若見遠公贈之為坐具宛陵集巻三十五
