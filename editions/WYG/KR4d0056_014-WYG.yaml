  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_WYG_014-1a, image: WYG1099/WYG1099-0107a.png}
body:
  text: 宛陵集卷十四宋梅堯臣撰和李廷老家㑹飲四序豈長停寒革春寖和始愛衣裘輕相與車馬過車馬不畏逺風埃不畏多到門門有槐槐上時鳥歌時鳥歌猶澀主人當謂何南開石榴軒中置飲酒蠃食桉施黄金饌炙厭白鵝漢糟槎頭美吳羮成咄呵旣醉或放言抉莊引駘它縱論或好辯排墨同孟軻日將薄虞淵執䇿相交摩欲去舉大白酌我苦大苛正月二十七日江鄰㡬杜挺之劉原甫貢甫韓持國邀飲於定力院昨日㑹飲我後至誰欲比我爲王戎笑知卿輩意易敗起誚便與俗物同似過黄公酒壚下嵇阮不見脩竹中杳爾山河隔千里此心正有古人風送宋中道朝陵仍於西都省親西出虎牢關南瞻園廟㦸漢殿拜衣冠魏臺嚴帳帟春風石闕冷曉氣田塗白早晚下諸陵先過洛陽陌寄西京通判宋次道學士當時交友都無㡬欲問懽娛亦異今花接上林新木變水分清洛舊池深嵯峩嵩色雲常在窈窕宫牆草又侵脩竹千竿白家寺昔年題處可能尋送晁殿丞鄭州僉判朝離泌水上夕去野亭賒走馬日銜樹度河風巻沙關雲來雨脚陂岸長蒲芽共被方爲樂軍中莫摻撾重送宋中道隴草陳根發山櫻宿霧蒸將過周故宅先下漢諸陵穎道春經雨官溝暗溜冰蒓羮休定價羊酪易爲勝送涇州良原何鬲主簿春風入邉磧二月沙草生胡馬自偷牧漢農寧廢耕薄田刈晚穀又餉防秋兵縣版固當重調輕無與程依韻和永叔見寄春風約柳一片西欲託鳥翼傳音稽昨朝偶向東城去草草乂逢驄馬蹄長䫇御史威正峭沙堤來坐氣吐霓我乗小駟雖甚瘦喜見驂馭猶解嘶適聞南都接大尹笑我出處今何迷恥趨㨗徑身已老欲至何用頻吹齏蛟龍失水等蚯蚓鱗角雖有辱在泥困居廢井誰引手豈得更望青雲梯筆鋒勁發若彊弩餘力曾徹七重犀倦禽雄雌不飽腹日暮徒念還巢棲大椿朝菌各有盡此物何怪莊叟齊誠知豪俠自快樂東郊南陌競鬭雞胷中有道無廣狹包括宇宙在一稊何時與公去穎尾湖水漫漫如玻瓈世間㑹合固不易况乃仕宦多相睽正似郵亭戀行者未到止息空歌驪我貧尚不給朝夕焉得負郭置稻畦筋骸幸且稍輕健山水縱好無路躋儻公他時買田宅願以藜杖從招攜吾兒詩書不足教亦以助力於耕犂東城送運判馬察院春風騁巧如剪刀先裁楊柳後杏桃圓尖作瓣得疎密顔色又染燕脂牢黄鸝未鳴鳩欲雨深園靜墅聲嗷嗷役徒開汴前日放亦將沒水歸河槽都人傾望若焦渴寒食已近溝已淘何當黄流與雨至雨深一尺水一篙都水御史亦即喜日夜順疾囬輕舠頻年吳楚歲苦旱一稔未足生脂膏吾願取之勿求羡窮鳥困獸易遯逃我今出城勤送子酤酒不惜典弊袍數塗必向睢陽去太傅大尹皆英豪試乞二公評我說萬分豈不益一毛國給民蘇自有暇東園乃可資遊遨送知和州杜駕部桐花欲開時羣噣爭哺兒但求黄口飫焉問丹穴饑常山有四鳥將飛昔已悲中間勿殞逝豈得安其枝一飲必屢顧每啄必遲遲今朝竞矯翼去向江之湄銜芹不自食欲遺孤與雌此義實已重莫爲梟所嗤世俗多嫌忌我胡爲此詩此詩美孝悌持贈杜挺之送劉郎中知廣德軍昔在少年時辛勤事諸父諸父爲桃州物宜皆可數事君勤職貢采茗先穀雨劭農井田桑科薅重鉏斧城西大靈祠措意初似禹將通吳境河身自同豕伍期婦來餉時壇上必鳴鼔一爲烏所誤愧恨去不覩至今存遺堤五丈立堅土正如開轘轅黄熊慙啓姥功利欲及民血食宜簋簠祠後有髙山山頭攢棟宇此實諸父爲禾麻可就俯歲登有樂事或亦作歌舞賦詩當清明解褉思洛浦其言在黑石往往被樂府于今三十年追想漸成古公將乗朱輪去問民疾苦治術自有具薄言無所補缺將陳迹書又且劇莽鹵送洛南周寺丞畋家在華山將去洛南宰日聞庭下松亂山歸四隱舊墅隔三峰狹谷車能入春林雨易逢地多椒與漆貨必厚於農賦石昌言括蒼石屛括蒼黄石屛樹如濃墨寫根深稱條葉生意絶蕭灑或聞造物手立意先真假指是龜溲摹能同自然者天下莫復言物亦逢知寡寄致仕張郎中代人門榮世美髙天下身退心閑住洛陽畫鶴能同薛少保愛書還比蔡中郎花陰小酌呼鄰父月下清吟埽石牀不問從來生計薄題籖盈閣是家藏送錢駕部知邛州細雨梅初熟輕寒麥已秋路危趨劔道夢穩過刀州秦栗非吳食巴稉類越疇當壚無復舊試似長卿求文惠師贈新筍劉累死龍不馴世間士不識真有真物實去人或在山亦隱鱗或多孫山水濵奮雷轟轟萬里春厚土坼裂窮蟄振牙甲戢戢不可數削掘誰怕天公嗔煮之按酒美如玉甘脆入齒饞流津荆吳易得梁宋少二年不食思無因豈意今朝忽有遺不忍獨饗呼吾鄰宛陵集巻十四
