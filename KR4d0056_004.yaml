front:
  text: 宛陵先生集卷第四
  hash: sha256:5e5709a55ab37452bae9fe7b6fb3083f58fa8907940255d25c90b506f452c51d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_004-1a}
body:
  text: 宋宛陵梅堯臣聖俞著池州進士陳生惠然見過不日且行因以詩贈别呼童具雞黍頗識故人期竹館忽枉駕此樽聊解頥醉歌返北郭春雨生東陂便與千峰隔登高空復思春隂濃淡雲無定凄微氣宇寒鳩鳴桑葉吐村暗杏花殘客子行裘薄春塘野水寬輕雷欣巳發謬作採茶官春晴對月雲掃魚鱗靜天開桂魄清梨花鑑中色杜宇晝時聲寥落將寒食羇離念故京都無惜春意樽酒為誰傾植梔子樹二窠十一本於松側舉世多植梨而我學種梔顔色固不别良苦誠異宜團團緑階側豈畏秋風吹同心誰可贈為梅葉未藏禽梅子青可摘江南小家女手弄門前劇齒軟莫勝酸棄之曾不惜寧顧馬上郎春風滿行陌挾彈篇長安細侯年尚小獨出春郊不須曉手持柘彈霸陵邊豈惜金丸射飛鳥金丸射盡飛鳥空解衣市酒向新豐醉倒銀瓶方肯去去卧紅樓歌吹中不管花開與花老明朝還去杜城東五日登北山望競渡南方傳競渡多在屈平祠簫鼓滿流水風煙生畫旗千橈速飛鳥兩舸刻靈螭盡日來江畔誰知輕薄兒寄新安通判錢學士昔人言訪舟江水賦清泚冬春常一色深淺皆見底崖日半寒潭澄明動朱鯉君懷素已高塵慮都應洗得歐陽永叔回書云見來客問豫動靜備詳昨日使人回聞君與之坐君問我何為但云思寡過寡過真未能得便北窗卧此趣今巳深世間誰與和建德新墻詩此廨不營堵筠篁為密籬初年固可蔽晏歲不能支巳被巢蜂蠧復為荒葛虆夏雨久枯脆秋風遂傾欹雞鶩恣穿逸牛羊來踐窺我議欲板築羣走皆不怡首吏先進白土踈不可為潦雨忽暴集澗流如突馳我心賾其極斯語其見欺用竹乃戶率破得緣而私冬斂葺西角春調完北陲循環日有壞煩擾無虛時介決弗爾惑遂飭闢其基榛莽一芟去畚􅓩能恱隨膏潤非朽壤峭削隱金鎚荏苒未踰月屹如長雲垂疏塹備水害既圬復蓬茨豈唯禦貛豹亦以防狐狸且有內外隔絶聞閭巷卑安然茲燕息來者勿吾隳九月五日得姑蘇謝學士寄木蘭堂官醖公田五十畝種秫秋未成杯中無濁酒案上唯丹經忽有洞庭客美傳烏與程言盛木蘭露釀作甕間清木蘭香未歇玉盎貯華英正值菊初坼便來花下傾一飮為君醉誰能解吾酲吾酲巳不解百日毛骨輕九月見梅花江南風土暖九月見梅花逺客思邊草孤根暗磧沙何曾逢寄驛空自聽吹笳今日樽前勝其如秋鬢華新安錢學士以近詩一軸見貺輒成短言用敘單悃早事太尉府謬以才見論身作邑中吏日陪丞相尊嵩山雲外寺伊水渡頭村泉味入香茗松色開清樽題詩人半醉馬上景巳昏歸來屬後乘冠蓋迎國門悠悠失貧賤苒苒歷涼溫而今處窮僻落莫思舊恩終日自鮮適終年長不言巳覺人事寡惟聞雞犬喧東風有來信滿幅蘭與蓀深知故人意遺我滌冥煩一章言罨畫溪好如目存何須到雲壑便若遊花源一一先造化可以輕瑤琨成誦今在口願將醒病魂答陳五進士遺山水枕屏妙畫能成趣溪山逈得君漁舟長映浦巖樹半藏雲征鴈無時沒橫橋有處分數峰來枕席曾不愧移文謝賓客挽歌三首位不登三事才宜列四科清名時自得華冕世空多望氣悲埋劒臨風歎逝波吳阡蒿作里楚挽薤成歌會葬千人至來觀數郡過無由親執紼東首淚滂沱自昔居門下遊觀必許偕豈將千里别遂作九泉乖巳恨霜松折行嗟玉樹埋蒼生空有望丹旐不勝懷曩日言歸里飛章願乞骸今朝赤松畔煙壠對蒼崖當年罷會稽還郡錦為衣老作龍樓貴終將鳯沼違英魂遊岱去石槨渡江歸楊子春風惡南徐過客稀衆帆看屢溺素舸獨如飛始見中郎孝松門自有輝往東流江口寄內艇子逐溪流來至碧江頭隨山知幾曲一曲一增愁巢蘆有翠鳥雄雌自相求擘波投逺空丹喙橫輕鯈呼鳴乃不巳共啄向蒼洲而我無羽翼安得與子遊代內答結髮事君子衣袂未嘗分今朝别君思歷亂如絲棼征僕尚顧侶嘶馬猶索羣相送不出壼倚楹羡飛雲日暮秋風急雀聲簷上集併作千里愁愁極翻成泣訪礦坑老僧山深無外事日夕愛潺湲趺坐樹間石力耕溪上田解言南國事能詠碧雲篇莫貰逺公酒余非陶令賢除夕與家人飮莫嫌寒漏盡春色來應早風開玉砌梅薰歇金爐草稚齒喜成人白頭嗟更老年華箇裏催清鏡寧長好立春在元日新春與新歲時候不相先未肯欺殘臘何曾占舊年綴條花翦綵插戶柳生煙獨坐空山裏唯驚節物遷遊水簾巖春山時獨往榛穢旋芟斸飛泉蔽幽巖杳藹疏朝旭光垂白龍髯鳴漱寒潭玉半壁生晝寒隂草潤秋緑穿藤出溪口流沫縈山足莫遣吏人來方歌白雲曲詠官妓從人少為輕薄誤失行落優倡去作小家婦願同貧里裝無心歌子夜有意學流黃他日東郊上誰人見採桑夏雨林梅初弄熟密雨閉重關潤裛衣巾上涼生竹樹間水聲通逺澗雲色暝前山野鳥寂無語公庭盡晝間五日與陳真卿飮五日逢南國三年别舊都招魂傳楚客撫節見靈巫蒿艾因時採蛟龍為俗驅清樽與鵝炙欣此故人俱彼鴷吟斷木喙雖長不啄柏與松松柏本堅直中心無蠧蟲廣庭木云美不與松柏比臃腫質性虛杇蝎招猛觜主人赫然怒我愛爾何毀彈射出窮山羣鳥亦相喜啁啾弄好音自謂得天理哀哉彼鴷禽吻血徒為爾鷹鸇不搏擊狐兔縱橫起况茲樹腹怠力去宜濱死感遇衆默瘖莫辨衆寐盲不知問而使之對覺而使之窺瘖盲自窮矣所感在一時苟昧哲人理寐默定妍媸雪詠雪色混青冥搴幃宿酒醒龍蛇緣古木鳯鵠舞幽庭密勢因風力輕姿任物形公堂何寂寞橫案對玄經臘日出獵因遊梅山蘭若我與二三騎爭馳孤戍旁逐麋逢野寺息馬據胡牀鷹想支公好人思灞上狂歸來何薄暮煙火照溪光依韻和楊敏叔吳門秋晚見寄方在洞庭上秋懷郍得禁西風楚波急度鴈海雲隂洛客吟初苦騷人思巳深顚毛隨日減冉冉不勝簮田家南山嘗種豆碎莢落風雨空收一束萁無物充煎釡陶者陶盡門前土屋上無片瓦十指不霑泥鱗鱗居大厦縣署叢竹裊裊幽亭竹團團自結叢寒生緑樽上影入翠屏中陶柳應慙弱潘花只競紅方持雪霜操不敢倚春風巧婦巧婦口流血辛勤非一朝莠荼時補紩風雨畏漂搖所託樹枝弱而嗟巢室翹周公誠自感聊復賦鴟梟聞歐陽永叔謫夷陵共在西都日居常慷慨言今嬰明主怒直雪諫臣冤謫向蠻荆去行當霧雨繁黃牛三峽近切莫聽愁猿聞尹師魯謫富水朝見諫臣逐暮章從謫官附炎人所易抱義爾惟難寧作沉泥玉無為媚渚蘭心知歸有日時向斗牛看寄饒州范待制山水番君國文章漢侍臣古來中酒地今見獨醒人坐嘯安浮俗談詩接上賓何由趨盛府徒爾望清塵詠王右丞所畫阮步兵醉圗胡公踈新勒石右軍筆通妙阮籍思玄虛獨畫來東平倒冠醉乘驢力頑不肯進俯首耳前趨一人牽且顧一士旁挾扶捉鞍舉雙足閉目忘窮途想像得風度纎悉古衣裾玉骨化為土丹青終不渝而今幾百歲乃有胡公踈買石遂留刻漬墨許傳模白黑就髣佛毫芒辨精粗千古畜深意終朝懸座隅誰謂盈尺𥿄不慙雲霧圗猛虎行山木暮蒼蒼風凄茆葉黃有虎始離穴熊羆安敢當掉尾為旗纛磨牙為劒鋩猛氣吞赤豹雄威躡封狼不貪犬與豕不窺藩與墻當途食人肉所獲乃堂堂食人既我分安得為不祥麋鹿豈非命其類寧不傷滿野設罝網競以充圎方而欲我無殺奈何飢餒腸白鷴喬木暗青山晴川下白鷴春雲生嶺上積雪在囂間緑草張新翳柔冠總翠鬟時哉養文素不是雜斑斑後園桃李花後園桃李花灼灼復皎皎南枝開巳繁北枝縈尚少花蕚相輝映根本自鈎繞無為驚風吹紛紛逐飛鳥道傍虎迹行朝履猛虎迹暮宿猛虎林猛虎終夜嘯隂風生逺岑我懷何所畏所畏在官針傷哉此遺體冒險輕百金修真觀李道士年老貧餓無所依忽縊死因為詩以悼之唐室王子後黃冠事隱淪餐霞不滿腹披雲不蔽身八十不能死縊以頭上巾始慕老莊術終厭道德貧營營求長生反困甑中塵野田行輕雷長陂水農事乃及辰茅旌送山鬼瓦鼓迎田神青臯暗藏雉萬木欣巳春桑間偶耕者誰復來問津水輪詠孤輪運寒水無乃農者營隨流轉自速居高還復傾利才畎澮間功欲霖雨並不學假混沌亡機抱甕罌山村行征馬去不息幽禽隨處聞深源樹蓊鬱曲塢花芬蒀淡淡平田水濛濛半嶺雲長鬟弄春女溪上自湔裙鳴雉詞雄雉鳴桑林雌雉雊麥隴結愛誠有宜别啄義亦竦哺雛深莽中摧頽錦翅擁辛勤何爾為應自念遺種寄公異弟池塘去後春一夕生緑草無由夢阿連詩句何能好去春城前日去春城今朝還故陌馬有甚煩意人多逺行色暫爾厭風埃郍堪為久客讀范桐廬述嚴先生祠堂碑二蛇志不同相得榛莽裏一蛇化為龍一蛇化為雉龍飛上高衢雉飛入深水為蜃自得宜潛遊滄海涘變化雖各殊有道固終始光武與嚴陵其義亦云爾所遇在草昧既貴不為起翻然歸富春曾不相助治至今存清芬烜赫耀圗史人傳七里灘昔日來釣此灘上水濺濺灘下石齒齒其人不可見其事清且美有客乘朱輪徘徊想前軌著辭刻之碑復使存厥祀欲以廉貪夫又以立懦士千載名不忘休哉古君子禽言四首子規不如歸去春山云暮萬木兮參雲蜀天兮何處人言有翼可歸飛安用空啼向高樹提壼提壼蘆沽美酒風為賓樹為友山花繚亂目前開勸爾今朝千萬壽山鳥婆餅焦兒不食爾父向何之爾母山頭化為石山頭化石可奈何遂作微禽啼不息竹雞泥滑滑苦竹岡雨蕭蕭馬上郎馬蹄凌兢雨又急此鳥為君應斷腸讀漢書梅子真傳子真實吾祖耿介仕炎漢權臣始擅朝忠良被塗炭輦下莫敢言上書陳治亂是時卿大夫曾不負愧汗其文信雄深爛然今可玩危言識禍機滅迹思汗漫一朝棄妻子龍性寧羇絆九江傳神仙會稽隱㕓閈舊市越溪隂家山鏡湖畔唯餘千載名撫卷一長歎宛陵先生集卷第四
