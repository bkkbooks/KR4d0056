  text: 宛陵先生集卷第九
  hash: sha256:f8b1e7cf6bb36b5683a76b0848719011640150563c7fb51c3617c262f2812daa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_009-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和胡武平懷京下遊好南國易悲愁西風起高樹枯荷復送雨度鴈寧知數欲問北來音繫書復若故冥飛杳無迹弋者徒有慕况在白蘋洲而懷石渠署石渠多故人鵷鵠方騫翥鏘鳴尚可希綷翼何由附主人賴知已未變疇昔顧乘桴豈仲尼好勇非季路幸依南郡帳不學邯鄲步自守終日愚都忘向時慮眷戀此江湖親年當喜懼既獲庭闈近又多山水趣邇來對明月千里猶會晤長橋人絶聲舉酒逢秋露逈聞孤舟笛煙水在何處俯檻意無涯跳波魚夜乳頗得真隱情奚須慕巢許思寄梅枝香逺隔蘭溪渡緘之付好風精爽亦隨去依韻和武平九月十五日夜北樓望太湖東吳臨海若看月上青冥河漢微分練星辰淡布螢細煙沈逺水重露裛空庭孤坐饒清興惟將影對形依韻武平憶玉晨觀世路多氛垢人間浪逐名是非還自喻寵辱固堪驚薄宦真何戀丹砂儻可成終尋谷口隱鄭子豈其卿凝碧堂始至荷芰生田田湖上密復當花競時艷色凌朝日今來蓮巳枯碧水墮秋實更待雪中過羣峰應互出樽有緑蟻醅爼有頳壼橘可以持蟹螯逍遙此居室送劉成伯著作赴弋陽宰我昨之官來值君為郡掾當年巳知名是日才識靣未久嗟還都始應羣公薦遂除藝省郎出治江上縣縣劇素所聞其俗到可見水精製盤盂去氷瑩産郊甸鳴箏斫桐梓雕飾雜寶絢有藥化銅鉛方士多伏鍊君今齒尚壯好學常不倦二者定非惑吾言亦狂狷絃歌將有餘幸可窮經傳歸來期著書篋楮盈百卷莫學此踈慵無能守貧賤明朝君當行勉勉自出餞豈無一壼酒豈無一鼎饌冬雷上帝設號令隱其南山下震發固有時曷常事慿怒春以動含生夏以奮風雨冬其息不用藏在黃厚土我今來江南歲曆惟建午如何小雪前向曉疑鳴釡蛟蛇龜蟲厄鱗裂口塊吐蝦蟆不食月深窟僵兩股天公豈物欺若此汨時序或言非天公實乃隂怪主嘗觀古祠畫牛首推連鼓黑雲雜狂飈相與為肺腑是不由昊穹安能順寒暑吾因考厥事復以驗莽鹵市井欺量衡定知不活汝元惡逆大倫弗加霹靂斧此豈曰無私故豫未所取必恐竊天威似將文法侮焉顧五行錯詎畏萬物覩欲扣九門陳恨身無鳥羽劉成伯遺建州小片的乳茶十枚因以為答玉斧裁雲片形如阿井膠春溪鬪新色寒籜見重包價劣黃金敵名將紫笋拋桓公不知味空問楚人茅冬日送暹上人霜風刮地如刀鎌鳥不逺飛魚巳潛何况削髮冷入骨草屨不畏氷雪霑緣山涉水去幾里晝鉢野飯誰來添毗陵舊寺苦欲到索我贈行無久淹和壽州宋待制九題熙熙閣初日照城樓流暉及菌閣上收花霧紅下見春煙薄信美是殊邦而淹佐時略自慙江外人敢慕淮南作春暉亭卉木日巳發中圃日巳嘉歡言樂和景及此鬢未華春風實無幾凌亂枝上花山隂况暮月俯仰誠可嗟白蓮堂蟋蟀在秋堂芙蕖出深水浩露同一色澄徹寒鑑裏佳人耻施朱欲與天真比沙鳥間且都誰將擬公子式宴亭從事誰獨賢而來均宴喜幽禽雜嘯呼珍木竟叢倚興將物色俱間猒簫鼓美寧同不聞問訟息時遊此秋香亭高軒盛叢菊可以泛緑樽餘甘自同薺忘憂寧用萱有木皆剝實何草不陳根獨此冒霜艷芬郁滿中園狎鷗亭羣生自知機不可欺以異此雖鷗與馴鷗亦魚所避坐熊臨碧水安得同一致然此海客心還應無有愧齊雲亭城隅結危棟髣佛凌煙霓平觀飛雨來俯窺巢禽棲浩蕩孤思發羃歷蔓草齊長安去不逺何言西北迷美蔭亭野材仍翦茅當此茂林下晴暉葉上明翠影杯中瀉鮮風時颼飀輕裾自蕭灑固殊嵇生煆曷慕巖栖者望仙亭嘗聞淮南王雞犬從此去至今山頭石馬迹尚有處使君辭從官終日絶塵慮望望雲漢間想見賓天馭依韻和僧説上人見訪客從東國來山雲猶在屨是時正窮臘鴈落溪隂暮投宿古城隅雪迷松下路衣楮足蘭荃相過寧猒屢立春前一日雪中訪烏程宰李君俞尋有詩見貺依韻和答粉絮先春拂靣翔臨風躍馬到君堂縣民將喜土膏起令尹未驚農事忙疾呼小吏具山酌便欲盡醉為詩狂我牽塵俗不得久何意更煩投夜光送劉比部青山夜來雨溪水巳潺湲侵曉桂旗動傷離蘋渚前百壼臨祖道兩槳破春煙舊業西河上歸心向日邊贈月上人彈琴人間溪上橫刳木素琴寒倚一枝玉吳王城畔鎖深房月下空彈孤鴈曲冬日陪胡武平遊西余精舍侵晨霜氣嚴溪口氷巳合烏榜將進遲寒篙旋摧拉遙看松竹深雪屋藏山衲登臨興都盡薄暮沿清霅依韻和武平苕霅二水昔愛伊與洛今逢苕與霅南郭復西城曉色明於甲塵纓庶可濯白鳥誰來狎落日潭上歸魚歌自相答依韻和武平升卞二山北峰壓城蒼南岫緣溪緑誰知昔人遊尚想叢桂馥鳥獸安可羣呼鳴自為族儻聞羡門術一躡塵外躅送崔主簿赴睦州清溪舟輕不畏險逆上子陵灘七里峽天翠千重雲木寒古祠鳴野鳥亂石激春湍正與高懷愜寧歌行路難依韻和劉比部留别春雲巳泊簾濃淡半晴天沙草微抽緑林枝逺帶煙况茲逢晚景那更送歸船苦酒聊為酌無勞辨聖賢送潘供奉承勛與君迹熟情巳親欲將行邁聊感人舉酒不能效時俗半醉苦語資立身長大實好帶刀劒曷不往助清邊塵門戟雖高豈自有當思乃祖為功臣所宜勇躍發竒策嘉名定體庶得真儻以斯言作狂説乘肥食脆任青春答新長老詩編江東釋子多能詩窗前樹下如蟬嘶朝風暮月只自老建安舊體誰攀躋唯師獨慕陶彭澤竒迹仍收王會稽嘗示余右軍書一軸此焉趣尚巳不淺更在措意摩雲霓題劉道士奉真亭降真沈水生爐煙扣齒曉漱華池泉心存崑閬未可到夜瞻北斗何聯聯顧茲虛室如有遲一草一石幽且妍芝蓋雲軿杳無至不知誰更似楊權依韻和烏程李著作四首縣署西園春入西園何苦誇我曾狂醉洛城花如今老大都無興獨坐晴軒看落霞霅上二首共愛霅溪風物美春來清可鑑鬚眉蘋生楚客將歸日花暖吳𧖟始浴時臨水竹樓通市陌跨橋雲屋接川湄畫船載酒期君醉巳是無謀助翦夷靚粧艷服遊川上簫鼓聲中俗自歡寄語春風休用惡恐教潭水起波瀾早春遊南園東國春歸早南園百卉宜萱芽開翠頴杏蕚破煙姿青壠將鳴雉喬林未囀鸝石尤風莫起芳物畏君吹送簽判張祕丞赴秀州江燕歸時君亦歸燕巢未暖君還去去去溪邊楊柳多正值清明欲飛絮競折贈行何所益時當長養傷嘉樹不如舉酒對青山酒罷移舟須薄暮嘉禾主人余久知迹冗不擬強攀附儻或無忘問姓名為言懶拙皆如故送弟赴和州幕夾河為郡不如古江北江南作冗官須記長傳一經訓雖貧莫改飮瓢歡歷陽况與吾廬近春榖休言問膳難此日停舟聊舉酌明當水驛自加餐寄題徐都官新居假山太湖萬穴古山骨共結峯嵐勢不孤苔徑三層平木末河流一道接墻隅巳知谷口多花藥秪欠林間落狖鼯誰侍巾鞲此遊樂里中遺老肯相呼送梵才吉上人歸天台頃余遊鞏洛值子入天台當時羣卿士共羡出氛埃荏苒踰一紀却向人間來問子何為爾言興般若臺雖將發愚暗般若安在哉此教久巳熾增海非一杯我言亦爝火豈使萬木灰蓋欲守中道焉能力損裁子勿疑我言遂以為嫌猜忽聞擕錫杖思向石橋回城霞與琪樹璨璨助詩才嘉辭遍人口幸足息巖隈公度以余嘗語洛中花品而此邦之人多不敢言花於余今又風雨經時花期遂過作詩以見貽故次其韻去年三月來吳中欲擬看花無與從今年二月花偏早發作無節雨與風前時晴明要尋賞謂夸洛陽多不容我心豈是限南北美好未必須深紅姚黃魏品若盡有春色定應天下空因君見贈又及此莫怪還思澗水東留題可及明心堂秭雉巳先嘷卉木蕚漸歇俯檻弄條枚因心悟生滅上人本高胄季父踐清列而能猒紛華樂彼方外説陪武平遊雅上人房卞峯亭晚愛池上清羣峰對簷隙常恐雲氣生坐令蒼翠隔復繞曲塘隂映實孤花拆誰知禪者居來伴使君適送張舍人自安吉移宰桐安逺辭湖上山徙治海邊邑機杼吳俗饒魚蝦越人給操琴在更張殊土冝順襲何以贈勤勤薄言茲所及劉彞秀才歸江南鳯鳥不在笯麒麟寧受靽君思此二物中夜忽興歎况值南風來襲蘭歸楚岸送胡武平來見江南昏使君詠汀蘋再看蘋葉老汀畔送歸人人歸多慕戀遺惠在茲民始時繞郊郭水不通蹄輪公來作新塘直抵吳松垠新塘建輿梁濟越脫輈仁言度新塘去隨迹如魚鱗從今新塘樹便與蔽芾均我雖備僚屬筆舌敢妄陳因行録所美願與國風振回陳郎中詩集嘗觀陳伯玉感遇三十篇矯矯追古道粲爾日星懸今公豈其後佳詠久巳傳憶為童子日早誦錦繡妍茲來預官屬而許玩竒編明珠三百琲一一徑寸圎他人握中有未獲毫髮焉家貧敢懷寶况近驪龍淵又畏風雨作神物不得全再拜捧明月長跪還席前依韻和武平别後見寄溪逺檣危一望遙此焉悽絶府中僚巳同鴈鶩依清淺共看鸞皇上泬寥别岸無端縈細柳回舟不忍過新橋醉來事事能生感誰道愁腸酒易銷蘄州廣濟劉主簿相識雖非久相親似舊年論文君豈後尚齒我慙先慣狎吳兒水將浮楚客船安知不離恨高柳正鳴蟬依韻和僧説夏日間居見寄城郭非清涼山僧抱微疾又况三伏時當茲一禪室炎飊正爍爍溪水徒瑟瑟唯詠氷雪辭可以銷夏日依韻和李宰秋思一葉與風舞巳知天地情將令百果實競振羣蟲聲陶令欲收秫豳人思誓觥更吟君麗句誰為寫鍾評送儲令赴韶州樂昌嘗聞韶石下虞舜古祠深至樂久巳寂况持陶令琴炎方不道逺一去值秋霖隱真亭烏程史尉署作尉慕吾祖吾祖非得時誰似芙蓉國日見芙蓉披涼雨隨風來清香入酒巵自得真隱趣不慙吳市為説上人遊廬山夙懷高世趣固足林壑情欲遊名山遍遂為廬嶽行又訪逺公迹東林氣象清瀑布秋影落香爐曉煙生洗蕩萬古慮薰蒸千載名我今滯孤宦空羡瓶錫輕和元之述夢見寄高秋枕席涼晝寢還清曠不嘲君腹便獨夢豫爾訪豈忘相規言仍記羣小謗始知端正心寐語尚不誑敞恍何讒人告子亦孟浪吾聞有尸蟲伺惡多相尚耽睡受其惑子心恐成恙勉子守庾曹勿使茲物王魂交昧聰明寤後成清唱誦玩自省循徒爾增怊悵不能檢細微遂使言屢貺雖然甚頑鄙內顧無過當仲尼稱天厭季路猶行行何當謝勤誠為子傾嘉釀秋日卧疾恭上人來過不及見因以詩答溪上秋霧多溪居曉寒入呼吸遂生痾嘔泄不下粒素知江南地大率皆卑濕久從吳土居氣候非所襲伏枕欲經旬冠帶拈巳澀女奚特扣關問疾提山笠我非金粟身寄謝何暇揖屈性茲不能他時冀來及依韻和守賢上人晚秋書事秋霧鬱不開曚曨夾溪樹深枝尚宿禽寒葉時驚露我居溪之隂早景誠所慕開溪吐初陽獨吟神與晤豈意方袍人而懷此焉趣忽枉瓊玖章無慙惠休句宛陵先生集卷第九宛陵先生集目録卷第九湖州後詩和胡武平懷京下和武平望太湖和武平憶玉晨觀凝碧堂送劉著作弋陽宰冬雷送成伯遺建荈冬日送暹上人和宋待制九題和説上人見訪雪中訪烏程李宰送劉比部贈月上人彈琴陪武平遊西余和武平苕霅二水和武平升卞二山送崔主簿赴青溪和劉比部留别送潘供奉承勛答新長老詩編題劉道士奉真亭和烏程李著作四首送簽判張祕丞送弟和州幕寄題徐都官假山送吉上人歸天台次答公度留題可及明心堂陪武平遊卞峰亭送張舍人劉彞秀才歸江南送胡武平回陳郎中詩集和武平别後見寄蘄州廣濟劉主簿和僧夏日間居和李宰秋思送儲令赴樂昌隱真亭説上人遊廬山和元之述夢答恭上人和守賢晚秋書事目録終
