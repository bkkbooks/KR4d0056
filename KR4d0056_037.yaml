  text: 宛陵先生集卷第三十七
  hash: sha256:35aac50fc05a056c0be6f241e50ce0cfe51743def32e3cabc53f2b140c390db3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_037-1a}
body:
  text: 宋宛陵梅堯臣聖俞著與二弟過溪至廣教蘭若溪水今尚淺涉馬不及韀岸口出近郭野徑通平田行行渡小橋決決響細泉萬水隂古殿一燈明象筵長廊顔頵碑字體家法傳空堂裴相真白髯垂過咽名迹兩不滅豈獨畫與鐫高僧鑿崖腹建閣將雲連祕此龍鸞迹足使臣僕虔修竹間長松森衛若𬒳竪是必神物護禹穴空歲年飯訖過山後井傍擕茗煎探幽偶轉谷忽視昭亭巔蔓草不識名步側時得牽幽禽聲各異可辨唯杜鵑似驚俗客來聒聒兩耳邊弊廬隔城堞畏暮遽言還道逢張羅歸鳥媒兼死懸遂同山梁雉令我復喟然聊追一日事書以為短篇晚坐北軒望昭亭山少客兩京間熟遊嵩與華歸來宛溪上猒往昭亭下何以厭昭亭衰遲倦驅駕况復慙詠歌嘉辭前有謝咀嚼在人口甘美如食蔗方同陶淵明苦語近田舍節行固不變出處亦多怕常防惡少年豪橫使出跨譬如故將軍尚被亭長罵不若守弊廬讀書至中夜與諸弟及李少府訪廣教文鑒師山僧邀我輩置酒比陶潛紫蕨老堪食青梅酸不嫌野蜂時入座巖鳥或窺簷薄暮未能去前溪月似鎌至廣教因尋古石盆寺古寺近田家山尋石盆差化蟲懸縊女啼鸌響繅車僧坐樹間石馬行溪畔沙野香無處辨歸路傍城斜郡人不知古石盆寺在此山之傍舊基存焉山中有井相去可二里豈圖經所傳裴休井歟近城有石盆寺其側亦云裴相井者恐非是何則杜牧有石盆山詩是寺因山名也從近城莫究其由呼盎為盆必風俗訛也觀王介夫蒙亭記因記題蒙亭吾年將五十尚未暇讀易一聞蒙亭説乃見適所適維時明進退豈不在泉石野服製升越山庖盛雞跖床頭龍唇琴案上科斗籍風物稍佳時把酒會三益况以兄為郎仕也人豈迫重之愛之深自匪逢時客亢陽和欲行舟者春秋書閔雨乃見先生制有意在黎民山川無不祭今者望雲霓青天絶纎翳為壇割舒鴈盤血陳水汭于時頗精虔奠爵必親涗向夕有微隂掃然還復霽吾聞先儒言陽驕不能閉此時繫穹旻巳力安所詣宣王雲漢詩曾不鑒上帝恨無奡蕩舟空自思躍蜧黃鶯內家初上翠微宮樹裏窺人在半空笑語漸高無約束侍臣偷望向雲中西鄰少年今出遊東家女兒未識羞門前烏臼葉巳暗日暮問誰墻上頭送懷賢上人歸隱靜兼寄逹觀禪師適從山中來復向山中去為報山中人莫厭山中住近城塵土多亂爾煙霞趣野蜂銜漆汁尚欲為蒂固息此可以安其能忘我諭送瑞竹長老歸當塗因寄徐著作謝傅青山路春來蔓草生樵蘇猶不入瓶錫莫能行朝上野船去宿逢溪雨鳴多應見康樂曾重逺公名和師承嗣逹觀觀徐君頗稱之鶯桑間小婦好聲音映葉穿枝意巳深盡日呼郎郎不應蕭蕭風雨到前林守宮嘗聞漢武帝偶問東方朔臣擬作龍呼慙無頭上角夏園夏園甘果熟日覺樹林稀休笑道傍李無人摘自肥孔子廟震宣城霹靂下虛殿破楹非夢凶昔嘗瞻畫衮今實見升龍隱隱雷聲散踈踈霧氣從豫知仲尼廟不是蓄乖慵寄酬睦州晏殿丞渚潭吐明月杳杳及吾廬流彩滿懷袖託情非鳥魚朝因南澗雨暮入北畦鋤豈不藉餘潤况茲方飰𬞞李仲求寄建溪洪井茶七品云愈少愈佳未知嘗何如耳因條而答之忽有西山使始遺七品茶末品無水暈六品無沉柤五品散雲腳四品浮粟花三品若瓊乳二品罕所加絶品不可議甘香焉等差一日嘗一甌六腑無昏邪夜枕不得寐月樹聞啼鴉憂來唯覺衰可驗唯齒牙動搖有三四妨咀連左車髮亦足驚踈踈踈點霜華乃思平生遊但恨江路賖安得一見之煮泉相與誇送闞令之潭州寧鄉秋風逆水急挂席飛鳥輕三江去雖逺一日行幾程朝辭洞庭岸暮抵巴陵城長沙古建國地狹賦薄征邑宰愛民者選薦豈非精既曰處民上固當知民情民居篁竹間山獠相雜并教道苟未至毫髮心起爭太剛易斷折太柔難搘撑貴在得中道於焉無近名聞多不祥鳥似梟何足驚逺方此為常慎勿心屏營賈誼度湘水為文弔屈平因君寄杯酒為我酹賈生乾明院碧鮮亭壞衣削髮逺塵垢蛇祖龍孫生屋後不等渭川千戶侯尺椽片瓦何嘗有方丈東頭一畝餘中軒四靣無窗牗青瓊作枝鈿為葉丹鳯未食蒼鼠走細藤織榻白晝眠寢濃鼻息如雷吼世間百事不歷心門外寒流徹溪口得餘干李尉書録示唐人于越亭詩因以寄題餘水之干越之鄙築基相對琵琶尾琵琶日日有秋聲鴈過洞庭風入葦南斗戞湖波不起長刀剡峰碧耳耳姱娥夜出在寒溪青銅瑩磨光幾里朝因吳客幅蒲輕滿𥿄如蠶書可喜南軒盆植重臺蓮移種池彤雲赤霧生緒房朝霞變蘂朱粉光白玉入泥不滿盎羽蓋裛露眀月璫濁水一石亂蛙黽鑿池五丈如斗方萍根科斗得自在荷芰明年出水央朝天行大車高蓋徐方來天子雙目延英開犀靴踏玉升東陛從臣賜對論宫市諫官御史如指排捧土未能障濁水大夫言斡天關回黃門白望顏色死始時暴奪何縱橫有貨晝日不敢行他時五方蛇當酒誰道張郎臨井口會勝院沃洲亭前溪夾洲後溪濶風吹細浪龍鱗活孤亭一入野氣深松上藤蘿籬上葛葛花葛蔓無斷時女蘿莫翦連古枝當年吾叔讀書處夜夜濕螢來復去江南雜感樹頭巧婦棲樹下秋蟲織壞衣遊子心千里嘗相憶蕩子腳出門便作浮萍根憂來慿五兆拜樹賽黃豚依韻和逹觀師山中見寄豶豕在塗龍在澤豺狼食肉麝食柏蹄毛與角不對齒啄觜兩足副以翮既能間間住深谷豈使于于佩鳴玉水邊看虹山雨霽夜與明月歸獨宿門前重嶺後羣峰石樓朱殿藏林中銅絲緊轉轆轤響絡緯秋老嗥西風榮利淡薄無易此彼飮甘醲兹飮水暫將分别向喉舌何異聲色亂眼耳孔孟久殁言可師千古布散葉與枝今來閉戶自有趣世上沄沄非我為送萬諤昌秀才志士不戀家安能坐㕮咀儒冠難徒行馬骨瘦可數後僕隔山陂前林遇風雨寒村夜宿時寂默誰對語訪石子澗外兄林亭前日秋水漲昨日秋水落偶來尋隱居曾不乖宿諾竹底除舊徑藤蔓繫新彴馬留岸傍樹風掃林下籜既能置魯酒又復餉楚飵誰知北南澗照影似淸洛平生愛幽曠斂迹誠非錯和端式上人十詠幽谷泉幽谷有飛泉入溪知幾里跳珠濺木葉激雨霏巖趾但無箕頴人曾不吝洗耳古木隂古木少直枝其下多曲影豈不愛高隂奈此性所秉千重葉薈蘙誰願憩曰永寒溪石翠聳寒溪上半隱寒松下水鳥立稜角淵魚遊穴罅尋常置庭檻瑣細不知價孤汀蘋瀟湘歸去人正值江南春始願逢拾羽今乃見採蘋寄語柳使君莫恨曰巳曛雲際鐘湮昏青櫟道風急隔溪鐘征馬未及息猛虎前有蹤尋聲欲投宿僮㒒畏所逢垂崖鞭崖竹出石壁根瘦懸青蛇磔髯露老節斫骨點寒花少年莫翦去騎殺白鼻騧天外峰天外一尺峰國中千仞嶽重雲不掩蔽萬里見頭角世人看逺碧誰識産美璞秋原菊不為潭上英不助籬邊醉獨占蘭𣏌鄰原頭自榮悴陶令與太鑿逢人豈無意漁舟火蘆洲一點明知有漁人泊江溟杳不分誰方在高閣是時孤鴈去應認光中落春溪水春水冰欲開傍岸巳微釋魚寒未動鱗獸渡時有迹篙師畏割舟𫾣拉碎圭璧十月二十一日得許昌晏相公書哀憂向二年朋戚誰與書敢意大丞相尺題傳義廬從來鳯凰鳴不猒寒竹踈茂林多翔鳥要路盛高車窮巷一如此江深無鯉魚訪施八評事施兄今七十近郭隱茅廬懶問齊民術喜看莊叟書竹間鳴澗水原際見村墟識盡窮通理超然樂有餘贈陳無逸秀才良犬不取鼠其人苦尤之近識固未辨善相義能知在鹿忘守穴挃足乃焉而士有志功名局縮秉書詩憔悴未得展磬折忽言卑舉酒一以贈願無羞爾為題陳宰戲綵亭仕宦固巳美及親此其難况慕五綵戲而奉興居安翁喜君亦喜翁餐君亦餐嗷嗷園中禽口哺心違丸邑大歲幸稔衆賴仁政寬還思彼赤子如恐君不歡永慶僧舍松風亭誰按黃金徽滿指淸風度但聽松上聲不知松間趣野僧何所樂樂此數株樹寧邀俗客來草緑澗西路寄松林長老大松五丈百歲餘小松五尺前時種俱有堅完不朽心莫以今輕古為重東溪一片寒玉光夜挂高枝何所用題松林院靜邃無塵地青熒續焰燈木魚傳飯鼓山衲見歸僧野色寒多霧溪痕夜閣冰吾非謝康樂獨往亦何能永州守王公慥寄九巖亭記云此地疑是柳子厚所説萬石亭也因為二百言以答願當留詠天地磨今古賢愚為埃塵草樹易變改山川無故新眷言零陵守白髮駕朱輪間來問遺老俯迹哀昔人昔人者誰歟元和前放臣下上窮幽荒憔悴楚水濱試觀當此記圖寫未必真最苦來黃溪坐石數遊鱗有鳥大如鵠東向立不踆始買鈷鉧潭鄠杜難計緡冉溪袁家洞亂石多磷磷深里與沸白若盡無窮津石渠連巖泓菖蒲𬒳其垠窮勝得其詭衆美誰齊均西澗石為底豈無芹與蘋澗崖如堂席澗響如龍唇折竹掃陳葉羅榻同衆賓其言粲星斗百歲猶比晨萬石乃淺近尚可資覆巾而况前所説但恐煩鐫珉潘樂二君對雪寄聲似欲豫賦適方知之走筆奉呈南方今見雪北客定思家任凍不欺酒競春先著花樓高休猒上山近未應遮誰問窮居日西窗壓竹斜過永慶院荒涼舊蘭若古屋兩三重庭下巳無柏澗邊唯有松石階生薜荔香座缺芙蓉化俗似禪衲破來縫不縫雪中瘳宣城寄酒輕舟泛泛昭亭灣春雪漫漫昭亭山寒沙曲渚沓不辨素鷗翔鷺空中還宣城太守閔窮旅雙壺貯醖兵吏頒任從六花壅船戶滿酌春色生衰顏醒時但愛雲水好醉後等與天地間世間取樂各有分何必舞娥高髻鬟翠竹亭種竹幾千箇結亭三四椽遊人多寂靜啼鳥亦留連酒有陶公愛林希阮氏賢我來歸路逺躍馬古城邉彩霓亭高出嶺頭樹俯窺城下溪半山飛急雨舉手弄晴霓曠望巳無極萬緑都與齊自嗟來獨晚征棹苦言西留别樂和之雪消潭水緑輕舸下灘時漸轉青山去還將故國辭野林看欲動江燕欲逢遲君語隨州體余慙晚始知松風亭冉冉竹連澗森森松蔭崖始聞淸吹度似欲緑琴諧莫識主人意休論高士懷春城百花發薛荔上隂階雪中懷廣教真上人蒼山去不逺日日起寒雲堂上看飛雪水邊思練裙銅瓶生薄凍桂火壓殘薰欲往有餘興林幽路不分下赤山嶺過渡至石子澗别施八評事三歲守廬次兩回來澗邊臨塘愛魚樂近竹見人賢今我西歸日逢君小隱年重將車馬去驚起野鷗眠春日拜壠經田家田家春作日日近丹杏破纇埸圃頭南嶺禽過北嶺呌高田水入低田流桑牙將綻霧露裛𧖟子未浴箱篚收今我還朝固不逺紫宸巳夢瞻珠旒將行賽昭亭祠喜雨未生潭上雲空望山中雨湛湛陳桂樽坎坎奏鼉鼓蕭蕭靈風來蹲蹲祝郎舞莫言春作遲但念寒灘阻何當發泉源緑水浸沙渚不與農者期自將舟人語定作榜歌行暮投丹湖浦瞻祠草樹失認嶺煙霞吐平吞東南吳逺帶西北楚川澤見坡陀龍蛇蹙鱗膂人經興寤歎事往成前古考碑何驗今塗馬立空廡余知骨相貧豈敢望冥許願乘溪流深滂沛隨徹爼若訥上人彈琴祥哀巳踰月遇子彈鳴琴安得不成聲子心異吾心十日成笙歌尼父非好音先王禮有節不可過於今莫作風人松懷壠情未任一聞流水曲歸思在溪隂此焉吾所樂目極送歸禽發昭亭二月十三日春泥深一尺車馬重重迹親舊各還城山川空向夕今朝水平岸不畏舟礙磧始隨湍漲發巳入青蒼壁落日未逢人孤村望來客泱泱漫田流青青被壠麥欲霽鳩亂鳴將耕杏先白我無農畝勤千里事行役寄謝昭亭神果不吝深澤乘小舟訪松山法聰上人我從溪口來正值山前雨濕衣逢梵宫有僧善吳語天寒蜜已空軒靜竹可數歸楫難久留汀鷗自飛舞鴈過洲六言船從鴈洲北去鴈背春風亦歸但見平沙緑水䕡蒿荻笋方肥别逹觀文鑒二大士雲衲山中來畫橈江上發何日到山中山花應未歇依韻和文鑒師贈别來見寒沙鳥長隨上下波乃知遊宦迹不似施松蘿子語馬喻馬吾吟柯伐柯清江挂帆去奈憶故山何宛陵先牛集卷第三十七宛陵先生集目録卷第三十七與二弟過溪晚坐北軒與諸弟訪廣教至廣教尋古石盆寺題王介夫蒙亭亢陽和欲行舟者黃鶯送懷賢上人送瑞竹長老鶯守宫夏園孔子廟震寄酬晏殿丞答李仲求寄茶送闞令之潭州乾明院碧鮮亭得餘干李尉書南軒盆植蓮朝天行會勝院沃洲亭江南雜感和逹觀山中見寄送萬諤昌秀才訪石子澗外兄林亭和瑞式上人十詠得晏相公書訪施八評事贈陳逸秀才題陳宰戲綵亭永慶松風亭寄松林長老題松林院永州王守寄亭記呈潘樂二君過永慶院廖宣城寄酒翠竹亭彩霓亭留别樂和之松風亭雪中懷真上人别施八評事春日拜壠昭亭祠喜雨若訥上人彈琴發昭亭乘舟訪聰上人過鴈洲别逹觀文鑑和文鑑贈别目録終
