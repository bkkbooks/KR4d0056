front:
  text: 宛陵先生集卷第十九
  hash: sha256:3ea9205497f99269e0f07cfeea00dfe29c7872ae7bf9642aaf4d85bba9acd622
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_019-1a}
body:
  text: 宋宛陵梅堯臣聖俞著次韻和酬裴寺丞喜子修書唐宋典册竟駢羅漢詔重令與削磨古聖規模猶可法衆賢馳騁必無蹉既除太史來為尹遂用非才往補訛代匠只憂傷手甚君宜憐我不遑他送趙虞部士宏知蜀州春風跨臘至雪作蝴蝶飛偏知蜀太守撩亂撲行衣何當海棠下歌管紅袖圍一飮一斗酒決訟如發機洛陽花自好聽從杜鵑啼月蝕有婢上堂來白我事可驚天如青玻璃月若黑水精時當十分圓只見一寸明主婦煎餅去小兒敲鏡聲此雖淺近意乃重補救情夜深桂兔出衆星隨西傾次韻和酬刁景純春雪戲意雪與春歸落歲前曉開庭樹有餘妍楊花撲撲白漫地蛺蝶紛紛飛滿天胡馬嘶風思塞草吳牛喘月困沙田我貧始覺今朝富大片如錢不解穿次韻和楊樂道待制詠雪梁苑孝王迹灞陵遊客心牧羊來海上泛棹向山隂興賞曾何淺羇棲亦以深穆歌猶在竹郢曲自傳琴旗凍霑天仗槍寒拂羽林且為豐歲慶休作苦寒吟掩帙都忘慮焚香靜擁衾晴明一登閣暮色遍高岑次韻和景彝閏臘二十五日省宿君嘗納史似吳兢又直甘泉馬踏冰重臘雪花方漫漫宿廳書架自層層桉頭美酒初溫火簾底微風欲動燈永夜未眠鍾巳發此心間寂是高僧姪宰與外甥蔡駰下第東歸事莫必有勝必勝難可持邇來罕相見世上多誇馳黃金鑄佩印白玉刻佩龜朝見恃赫赫夕見同蚩蚩方得靡不羡既處焉所施此理非一日更後當應知志士無終窮斯言非爾欺次韻和永叔省樹高槐雪壓條沉沉古屋蔽疏寮每嗟守印如枯木欲棄明珠學緯蕭漸老但知貧賤樂向來徒用歲時銷新年不管魚龍躍安得乘風入剡樵次韻和范景仁舍人對雪三尺沒腰雪京華頻歲無高低相掩覆竅隙似封糊帖缺都迷醜增妍不問枯因時混貧富遇物得圓觚眩目曾何數流風不可圗冥冥山霧合浩浩海雲鋪未覺花飛葉先看霰集珠落機裁扇素獵野割膚腴粲爾娥奔月皤然叟赴酺薄才今揣稱小巧愧非夫嘉祐巳亥歲旦永叔內翰階前去年雪鏡裏舊時人不覺應銷盡相看只似新屠酥先尚幼綵勝又宜春獨愛開封尹鍾陵請去頻次韻和吳沖卿歲暮有懷舊曆卷將盡慨然增永懷唯希步兵醉莫作大常齋孟浪從人笑踈愚共世乖定知當汩沒名不與功偕次韻和沖卿元日天心欲銷變元會罷來朝新歲起今日舊年猶昨宵凍雲低覆闕殘雪稍封條又聽驅儺鼓群邪不可饒次韻和景仁對雪北風吹雪至浩蕩地疑無奕奕將如舞漫漫欲似糊沙埸行不盡銀漢落應枯興發詩千首豪吞酒百觚山川容可改圭璧巧能圖花竟因酥點砧爭以練鋪未燖調鼎鵠全混蔽旒珠懷昔餐衣絮誰今食豢腴善歌知寡和醵飮遂成酺衆筆排堅陳多多困老夫次韻三和景仁對雪北度龍沙遠南來狗犬無玉階三尺峻粉壁萬重糊獸餒行迷穴禽寒立並枯長川平界限大屋竦稜觚稍見蓬萊闕初張雲霧圖受降鍪甲積罷獵羽毛鋪被褐思懷寶遊都學賣珠車皆陳鋈轡人盡得瓊腴縞巳贈吳札席將開漢酺鳯池批詔手特地逞工夫次韻和永叔新歲書事見寄尖風細細欲穿簾殘雪微銷凍結簷盞裏醇醪無限滿鏡中白髮不知添妍童喜舞開羅幕小吏愁澌入硯蟾幸得從公持直筆定應無復歎虀鹽送辛都官有終知鄂州衣上大梁雪門前武昌車使君行有期將逢鳥隼旟車動自轣轆旟輕自舒舒去都越千里城在江上居黃鶴有高樓樓頭挂蟾蜍下見鶯鵡洲葭茁可以菹為弔禰處士沉蹤異三閭憶昔我仲父五馬來躊躇願君訪舊迹因報八行書次韻王景彞正月十六夜省宿過景靈街宮街不閉東城月圓影才虧夜色春自躍金羇來宿省從他錦帳欲誇人燈光遠近疑爭晝歌韻髙低競起塵我老都無遊樂意似君淸枕睡侵晨送韓玉汝太傅知洋州三首函關見殘雪褒谷聞春禽禽響通朱輪馬嘶入靑林花明亂石路雲抱寒泉岑天外漢江來城下漁網沉庖供縮項鯿坐使宮娥斟農桑不須教古俗自通今渭入秦宮古褒分蜀道難泉聲春雨後月色曉程寒𧖟浴桑牙短禽啼杏蕚丹從來稱召杜民俗在君安春風東來幾萬里相送入關如有情灞陵原邊柳條暗咸陽橋畔桃花明自古恨别此兩處十千美酒琉璃傾日落未落車馬動子規滴血壯士驚行哉使君負膽氣蜀道雖險心常輕是時門前大桐樹爛漫紫蕚啼流鶯弟兄同懷不可見應亦夢覺嗟遠程太白山前一尺雨桑下問𧖟田問耕郡城夜開百姓喜喜從迢遞壺漿迎李廷老祠部寄荆柑子踏雪衝風馳小吏帶霜連葉寄黃柑劈包欲咀才全動舉盞逢衰酒易酣書尾自題知遠意筆頭親答猒多談故人莫覔新詩卷都似嵇康七不堪韻語答永叔內翰世人作肥字正如論饅頭厚皮雖然佳俗物巳可羞字法歎中絶今將五十秋近日稍稍貴追蹤慕前流曾未三數人得與古昔儔古人皆能書獨其賢者留後世不推此但務于書求不知前日工隨𥿄泯巳休顏書茍不佳世豈不寶收設如楊凝式言且直節修又若李廷中清愼實罕侔乃知愛其書兼取為人優豈書能存久賢哲人焉廋非賢必能此惟賢乃為尤其餘皆泯泯死去同馬牛大尹歐陽公昨日喜疾瘳信筆寫此語謂可忘病憂黃昏走小校寄我東郭陬綴之輒成篇聊以助吟謳次韻和韓子華內翰于李右丞家移紅薇子種學士院紅薇花樹小扶踈春種秋芳賞愛餘丞相舊園移帶土侍臣清署看臨除薄膚癢不勝輕爪嫩幹生宜近禁廬此地結根千萬歲聮華榮莫比茅茹次韻和吳長文舍人即事見寄莫問春風有後先但逢佳處去揚鞭桃花洞遠迷應久杏樹壇荒迹自傳放與曉寒能幾許即看芳意不多偏古來間氣爭強弱謾費黃金拋楚權次韻和長文社日禖祀出城曉出春風巳擺條應逢社伯馬蹄驕壇邊宿雨微霑麥水上殘冰壅過橋燕子飛來依約近鴈行歸去試教調北扉西掖多才思相與飄飄在沈寥次韻和長文禖祀郊外見寄并呈韓子華鵓鴣知雨在桑中雄逐䳄飛自不同胡粉未生輕蝶白燕脂先綻野櫻紅高高樹裏鞦韆月獵獵墻頭蓓蕾風曉下祠壇多寄詠衣冠方侍大明宮送馬行之都官昭亭山下送君時不畏西行劔棧危笮馬跨來身更健吳船乘去計非遲錢塘湖上尋雲屋巾子峰前種槿籬此趣巳高天下士不須功業似鴟夷和王景彞詠薜荔植物有薜荔足物有蜥蜴固知不同類亦各善緣壁根隨枝蔓生葉侵苔蘚碧後凋雖可嘉徑挺異松柏和江鄰幾省中賞小桃年年二月賣花天唯有小桃偏占先初見嫩紅無不喜終知俗艷幾多妍鄰翁巳折郊園裏貴客爭誇粉署邊可惜工夫吟向此會須留醉牡丹前長歌行世人何惡死死必勝于生勞勞塵土中役役歲月更大寒求以􅫥大暑求以清維餒求以饁維渴求以觥其少欲所惑其老病所嬰富貴拘法律貧賤畏笞搒生既若此苦死當一切平釋子外形骸道士完髓精二皆趨死徒足以見其情遺形得極樂升仙上玉京是乃等為死安有蛻骨輕日中不見影陽魂與鬼并莊周謂之息漏泄理甚明仲尼曰焉知不使人道傾此論吾得之曷要世間行依韻和長文紫微春雨二首年年潑火雨苦作清明寒梨花猶半綻塘水巳迷漫愁看日更永冷漏夜未闌酒沫起玉盞燭淚生銅盤春衣向來脫帶眼斗覺寬試問彼俠少何處跨金鞍春雨固多喜雖多安得愁既能勒花苞又解滋耕疇池添䀶䀶漲渠有細細流不同離婦怨一落不可收定知矜有年豈似斗粟賙西掖吳夫子吟觀意遲留正聲隮雅頌高論等陽秋我慙才甚薄難繼東山謳送滕寺丞歸蘇州驅車入蜀時有弟母不往留婦侍母傍以子囑婦養昨得閶門書婦子死泉壤此心那得安棄官提轡鞅東馳三千里鬻馬求吳槳吳槳速如飛歸來拜堂上堂前去時樹巳覺枝條長豈無懷抱感為壽酌春醠次韻和酬永叔春候倏巳和林上鳴鳥譁前日是清明驟雨霑梨花初聞結客遊愛此物景嘉歌舞未終宴夕暮各興嗟所嗟歸路暗嘶馬自知家公家八九姝鬒髮如盤鴉朱脣白玉膚參年始破瓜幾日苦霖霪當道跳魚蝦閉門飮濁醪鞦韆繫樹丫群姝莫要劇為公歌啞啞公當是日醉歡適不可涯孔氏有高第內自戰紛華我公豈其然秉直異蓬麻果效歸田去願從招轅車次韻和江鄰幾送客回同過金明池送别西亭車馬塵天池回傍欲迷津畫船龍尾何時發丹杏梢頭漏泄春風光猶未老于人獸口泉聲瀉碧津一洗塵襟無俗慮柳條開眼共看春宛陵先生集卷第十九宛陵先生集目録卷第十九和景彞喜子修書送趙虞部月蝕和刁景純春雪和楊待制詠雪和景彞宿省姪與甥下第次韻和永叔和范舍人對雪歲旦呈永叔和沖卿歲暮有懷和沖卿元日和景仁對雪三和景仁對雪和永叔新歲書事送辛都官知鄂州和景彞過景靈街送韓玉汝知洋州三首李祠部寄荆柑韻語答永叔內翰和子華移紅薇和吳舍人即事和長文社日出郊和長文禖祀郊外送馬都官和景彞詠薜荔和鄰幾賞小桃長歌行和長文春雨二首送滕寺丞歸蘇和酬永叔和鄰幾同過金明池目録終
