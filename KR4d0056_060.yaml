body:
  text: 宋宛陵梅堯臣聖俞著覽翠亭記郡城非要衝無勞送還往官局非冗委無文書迫切山商征材巨木腐積區區規規襲不為宴處久矣始是太守邵公於後園池傍作亭春日使州民遊遨豫命之曰共樂其後别乘黃君於靈濟崖上作亭會飮豫命之曰重梅今節度推官李君亦於廨舍南城頭作亭以觀山川以集嘉賓豫命之曰覽翠夫臨高逺視心意之快也晴澄雨昏峯嶺之顚也心意快而笑歌發峯嶺明而氣象歸其近則草樹之煙綿溪水之澄鮮銜鱗翩來的的有光掃黛侍側嫵嫵發秀有趣若此樂亦由人何則景雖常存人不常暇暇不計其事簡計其善決樂不計其得時計其善適能處是而覽者豈不暇不適者哉吾不信也林和靖先生詩集序天聖中聞寧海西湖之上有林君嶄嶄有聲若高峯瀑泉望之可愛即之逾清挹之甘潔而不厭也是時豫因適會稽還訪於雪中其談道孔孟也其語近世之文韓李也其順物玩情為之詩則平淡邃美讀之令人忘百事也其辭至乎靜正不主乎刺譏然後知趣尚博逺寄適於詩爾君在咸平景德間巳有大聞會天子修封禪未及詔聘故終老而不得施用於時凡貴人巨公一來相遇無不語合慕仰低回不忍去君既老朝廷不欲強起之而令長吏歲時勞問及其殁也諡曰和靖先生先生少時多病不娶無子諸孫大年能掇拾所為詩請豫為序先生諱逋字君復年六十一其詩時人貴重甚於寶玉先生未嘗自貴也就輒棄之故所存百無一二焉嗚呼惜哉紅鸚鵡賦相國彭城公尹洛之二年客有獻紅鸚鵡籠之甚固復以重環縶其足遂感而賦云蹄而毛翼而羽以形以色别類而聚或嘯或呼逺人而處在鳥能言有曰鸚鵡産乎西隴之層巒巢于喬木之危端其性惠其貌安與禽獸異為籠檻觀吾謂此鳥曾不若尺鷃之翻翻復有異於是者故得以粗論吾昔窺爾族喙丹而緑今覽爾軀體具而朱何天生爾之乖耶俾爾為爾類尚或弗取况爾殊爾衆不其甚與何者徒欲謹其守固其樞加以堅鎖置以深廬雖使飮瓊乳啄雕胡以充飢渴鑄南金飾明珠以為關閉又奚得於烏鳶之與雞雛吾是知異不如常慧不如愚巳乎巳乎述釀賦少居楚鄉楚多釀者故粗識酒之然夫酒之作也必良其器必香其泉法式具舉酸敗罕􅏧取有豐約味有醲泊則曰聖曰賢和神懌氣積日彌年自時厥後茲道寢隳昔飮其醇今飮其醨昔也熙熙終日不亂舒暢四肢今也冥冥迷魂倒魄不知其醒吾觀于世未始逹此夫以天下為壚罌兆庶為粱米君臣為麴蘖道德為酒醴酣仁漱義四海薰和莫知所以逮乎率土澆弊材不授矣君臣乖異法不施矣道德遂薄酒弗飴矣餔詐啜偽昏然而無歸矣安得滌其具更其術時其物清其室然後漬以椒桂侑以棖橘吾將霑醉乎窮日靈烏賦烏之謂靈者何噫豈獨是烏也夫人之靈大者賢小者智獸之靈大者麟小者駒蟲之靈大者龍小者龜鳥之靈大者鳯小者烏賢不時而用智給給兮為世所趍麟不時而出駒流汗兮擾擾於修途龍不時而見龜七十二鑽兮寧自保其堅軀鳯不時而鳴烏鴉鴉兮招唾罵於邑閭烏兮事將兆而獻忠人反謂爾多凶凶不本於爾爾又安能凶凶人自凶爾告之凶是以為凶爾之不告兮凶豈能吉告而先知兮謂凶從爾出胡不若鳯之時鳴人不怪兮不驚龜自神而刳殼駒負駿而死行智騖能而日役體劬劬兮喪精烏兮爾靈吾今語汝庶或汝聽結爾舌兮鈐爾喙爾飮喙兮爾自遂同翺翔兮八九子勿噪啼兮勿睥睨往來城頭無爾纍南有嘉茗賦南有山原兮不鑿不營乃産嘉茗兮囂此衆氓土膏脈動兮雷始發聲萬木之氣未通兮此巳吐乎纎萌一之日雀舌露掇而製之以奉乎王庭二之日烏喙長擷而焙之以備乎公卿三之日槍旗聳搴而炕之將求乎利嬴四之日嫩莖茂團而範之來充乎賦征當此時也女廢蠶織男廢農耕夜不得息晝不得停取之由一葉而至一掬輸之若百谷之赴巨溟華夷蠻貊固日飮而無厭富貴貧賤不時啜而不寧所以小民冒險而競鬻孰謂峻法之與嚴刑嗚呼古者聖人為之絲枲絺綌而民始衣播之禾牟菽粟而民不飢畜之牛羊犬豕而井脆不遺調之辛酸醎苦而五味適宜造之酒醴而宴饗之樹之果𬞞而薦羞之於兹可謂備矣何彼茗無一勝焉而競進於今之時抑非近世之人體惰不勤飽食粱肉坐以生疾藉以靈荈而消腑胃之宿陳若然則斯茗也不得不謂之無益於爾身無功於爾民也哉鳲鳩賦時人謂鶀鶨癡拙禽也茲禽然癡且拙猶能以喙寫心布于辨音者焉曰我智不如燕鴈識氣候之蚤晚隨陽而來知社而返勇不如雕鶻鷹鸇恣搏擊於秋天下無全物落不空拳惠不如鸚鵡鸜鵒入崇堂兮蔭夏屋事言語以如人餌果粱而飫腹巧不如女匠挂巢室於枝上畏風雨之漂搖紩茅莠而密壯年不如鸛鶴潔羽毛於寥廓希霖雨而鳴垤和氣類而靡爵兹五者實無有於羣鳥分馴馴於林表癡亦誠多拙亦不少雖不能趍暄􅫥之時亦毛翮而自持雖不能決爪吻之利亦飮啄而自遂雖不能弄喉舌之辨亦呼鳴而自善雖不能理窠之完亦棲處而自安雖不能適變赴情亦隨宜而自寧噫唯癡與拙天之所生若此而巳矣又烏足為之重輕麈尾賦野有壯麈兮罹虞人於廣原其身巳殺其肉巳燔其骨巳棄獨其尾之猶存飾雕玉以為柄入君握而承言聊指麾之可任雖脫落而蒙恩噫譬諸犬豕其死則均其肉與骨亦莫逡巡自古及今若此泯沒者日有億計曾不一毫以利人是以生若蚍蜉死若埃塵生無以異於其類死不為時之所珍故仲尼疾沒世而名滅子長亦著論而有因乃感茲獸而用告乎朋親擊甌賦余觀今樂愛乎清越出金石之間所謂擊甌者本埏埴異琳球入伶倫兮間齊優其可尚者鳴非瓦釡律度合鼓非土缶音韻周和非塤箎上下應作非鐘罄節奏侔而又氷質瑩然水聲修然度曲冷然入耳瀏然猶有非之者曰善則善矣未若艷女之歌喉何則是謂絲不如竹竹不如肉以其近自然之氣况此曾何參於樂録之目乎余辨之曰融結合於造化堅白播於陶鈞發和於器導和於人可以樂嘉賓可以暢百神安得絲竹謳吟之匪倫也哉哀鷓鴣賦并序余得二鷓鴣飼之甚勤既久開籠肆其意其一翩然而去其存者特愛焉鷓鴣於禽最有名頃未識也思持歸中州與朋友共玩之凡養二年呼鳴日善罷官至蕪湖一夕為鼠傷死遂作賦以哀云物有小而名著亦有大而無聞吾於禽類得鷓鴣兮不群其音格磔其羽斕斑其生遐僻其趣幽間飮啄乎水裔棲翔乎竹間往咨羅者求之於野生致二雛形聲都雅愛之蓄之籠之服之為日巳久言馴熟兮縱晞朝旭一逸而不復兮謂之背德非我族兮戀而不去尤可榖兮晨啼暮宿何嗟獨兮固當擕之中國為士大夫之目兮不意孽鼠事濳伏兮破笯囓嗉何其酷兮嗚呼翻飛逺逝不為失兮安然飽食不為福兮焉知不為名之纍兮焉知不為鬼所瞰而禍所速兮哀哉誠不如秃鶬梟鵩兮凡毛大軀妖鳴飫腹何文彩之佳何名譽之淑前所謂大而無聞其自保而自足者與問牛喘賦和人鄧州六首客有感前史問牛喘廣而賦義有由余得托遺辭掇遺韻索遺意而用以酬夫寒為冬燠為夏和為春肅為秋和以發生則物萌而抽燠以長養則物盈而周肅以登就則物實而收寒以閉結則物藏而休是則隂陽之道順而燮和之職修若乃當春而燠是為行夏令而火侵於木時則有雨水不降草樹早落火訛相驚疾疫多作故丞相當是月而見牛喘恐天令之愆錯問從來之逺邇兮或力或暵而可度匪賤人而憂畜實原微而意博所以元化日調萬彚時若及其後世我自我物自物天自天人自人胡為乎冬胡為乎春孰謂差忒孰謂平均曰吾委佩而端冕服美而食珍上奉天子下役蒸民夫何預於我哉我亦無愧於茲辰凌霄花賦厥草惟夭厥木惟喬草有柔蔓木有繁條緣根兮附質布葉兮敷苗朱華粲兮下覆本幹蔽兮不昭嗟乎此木幾歲幾年而至於合抱夫何此草一旦一夕而遂曰凌霄是使藜藿蒿艾慕髙豔而仰翹翹也安知蘋藻自潔蘭蕙自芳芙容出汙而自麗芝菌不根而自長或紉珮帶或采頃筐或製裳於騷客或登歌於樂章故得為馨為薦為嘉為祥皆無附著亦以名揚奚必託危柯而後昌吾謂木老多枯風高必折當是時將恐摧為朽荄不復萌蘖豈得與百卉並列也耶矮石榴樹子賦并序襄城縣庭下生矮石榴往來者異之豫作賦寫其狀因以自勵云有矮石榴高倍尺中訟庭麗戒石訪諸走胥云非封植忽此生榮三傳歲曆密葉如蓋繁條如織萎蕤下垂疲軟無力緗苞貯露纍纍仄仄下人俯視顚本可識雀愧卑棲而不肯集兮故啾唧以矯翼偃偃盤盤若屈若鬱紉紉結結非曲非直幹不足攀隂不足息夫何挺質之可惑耶意為異與為妖與人以為異我不知其異曰殊衆人之類類人以為妖我不知其妖曰乖衆木之翹翹然而不生樊圃臺榭遊觀之所産茲堂下其有以警而有以覩因形戕義庶將有補當革蔓衍之多枝無若軟柔之不舉勿俾苞苴之流行勿使吏氓之輕侮勿淟涊以自抑勿猶豫而失處勿闒茸以接卑勿上下之不撫夫如是則異也妖也固弗取維戒懼斯主風異賦庚辰歲三月丙子天大風壬午詔出郡縣繫獄死罪巳下夫風者天地之氣也猶人之呼噓喘吸豈常哉若應人事之變則余不知故賦其大略云吾因迓勞適于郊憩亭舍日􅉴時羣輩外囂曰火來音罹火來喔呼噫嚱出屋逺望西北之陲亘天接地混混赫赫不見端涯逡巡則赤埃赭霧突蕩奔馳陽精失色白晝如晦號空吼穴揚砂走塊衆心驚惶廣衢翳昧莫辨誰何執手相對其少頃也稍明故歸人未寧兮相與而為隊順前者措足之不暇逆進者舉武而愈退睇山川兮安陳趍城郭兮安在所可視者五六步之內越翌日四方恬霽乾坤黯慘物色憔悴牛復馬還絶銜鼻草靡木折莢實墜禽鳥墮死泥滿喙几案傾欹塵覆器民廬毀壞商車顚躓既而衆曰此何景也伺彼往來兮問逺邇之所自或曰起浚都播許鄭歷洛汭以及唐鄧漢隋之地稽厥時厥狀無與此土異未逮旬浹德音遐暨是知本聞之不偽聊綴辭也若此言變咎則非愚者之能議乞巧賦孟秋七日夕戶未扃余歸自外見家人之在庭列時花與美果祈織女而丁寧乞天巧之付與惡心手之鈍冥余既寢而弗顧又烏辨乎列星兒女前曰故事所傳餘千百齡何獨守拙迷猶未醒遂起坐而嘆曰吾試語汝汝其各聽夫芒忽之間變而有氣氣而有形形而有生生而有靈愚愚慧慧自然之經賦巳定矣今返妄營則何異高山之木兮不能守枝葉之亭亭欲戕而為犧象兮利塗飾乎丹青且復天巧與人巧將不同也天孫又安得此而輒私天之巧者總隂陽運四時懸日月星辰而不忒其璇璣鼓雷風雨雪而不失其施生萬物死萬物而物得其冝此天之所以任大巧而不虧人之巧者非它直心口手足也心巧於慮口巧於詞手巧於技足巧於馳亦各有極不可強為故慮之巧不過多智謀使爾多謀多智則精騖而魄離詞之巧不過多辨言使爾多言多辨則鮮仁而行遺技之巧不過多能藝使爾多能多藝則藝成而迹卑馳之巧不過多履歷使爾多履多歷則速老而筋疲如是則吾焉用而乞之吾學聖人之仁義尚恐沒而無知肯乞世間之輕巧以汨吾道而奪吾之所持吾決守此而巳矣爾勿吾疑思歸賦祿有可慕祿有可去何則移孝為忠曾無內顧則祿可慕而可據上有慈顏以喜以懼故祿可去而不可寓噫吾父八十母髮亦素尚爾為吏敻焉遐路嗷嗷晨烏其子反哺我豈不如鬱其誰訴惟秋之氣至憀栗而感人日興愁思側睇江濱憶為童子當此凛辰百果始就迭進其珍時則有紫菱長腰紅芡圎實牛心緑蒂之柿獨苞黃膚之栗青芋連區烏椑五出鴨腳受彩乎微核木瓜鏤丹而成質素乳之梨頳壺之橘蜂􆁭淹醝榠樝漬蜜膳羞則有鵁鶄野鴈澤鳬鳴鶉清江之膏蟹寒水之鮮鱗冒以紫薑雜以菱首觴浮茰菊爼薦菁韭坐溪上之松篁掃門前之桐柳僕侍不譁圖書在右或靜默以終日或歡言以對友信吾親之所樂安閭里其茲久切切余懷欲辭印綬固非效淵明之𥚹衷耻折腰於五斗蓋自成人以及今未嘗一日侍傍而稱壽豈得不決去於此時將恐貽恨于厥後鬼火賦放舟於頴水之上夜憩於項城之野隂氣四垂而雨微下左右望之若無覩者有光熒然明於水邊人皆謂之鬼火吾獨未為然焉噫謂鬼為無吾不敢謂之無謂鬼為有吾不敢謂之有但觀韓氏之言舊矣曰鬼無形鬼無聲既無聲與形又安得此而明嘗聞巨浸之涯百物皆能發光而吐輝又草木之腐亦能生耀而化飛爾知彼是而此非曰若電者因形乎因勢乎苟因形因勢則此何疑而弗及嗚呼昔人有論電者隂陽之氣相薄而成何須形勢將就此妄名謂為物光可也謂為鬼火則吾不敢聽鬼火後吾既為鬼火賦客有謂余曰嘗覩舊説鬼火曰憐前人有述子何不信言未畢余遽辨曰爾不熟究吾旨耶吾豈忽而不知且聞兵死之血久而化之既云血化安有鬼為比夫草木之腐固合其宜宜曰物光又豈為過此論確如牢不可破尚恐未然更聽吾言彼燁燁者胡可以烹煎彼熒熒者胡可以燠暄彼焰焰者胡可以炎上彼熠熠者胡可以燎原蓋無此並蔓説徒繁客慚忸無辭而起余方掩乎衡門魚琴賦并序丁從事獲古寺破木魚斫為琴可愛玩潘叔冶從而為賦余又和之將以道其事而寄其懷為琴之美者莫若梧桐之孫枝夫其生也附崖石逺水涯隂凝其腋陽削其皮曾亡漫戾而沉實之韻資噫始其遇匠氏也有幸不幸焉故未得盡厥宜其於不偶若陷於夷刳中刻鱗加尾及鬐宛然而魚日擊而椎主彼齊衆之律令則聲聞囂爾而四馳粵有好事者朅來睨之取為雅器製擬庖犧徽以黃金絃以檿絲音和律調乃升堂室嗚呼琴兮遇與不遇誠由於通窒始時效材雖甚辱兮於道無所失今而決可以參金石之奏焉無忘在昔為魚之日針口魚賦有魚針喙形甚小常乘春波來不少人競取之一掬不重乎銖抄其為針也頴不能刺肌膚目不能穿絲縷上不足以附醫而愈疾下不足以因工而進補以口得名終親技女大非膾材唯便鮓滷烹之則易爛貯之則易腐嗟玉色之可愛聊用實乎雕爼過此巳往未知其所處靈烏後賦靈烏我昔閔爾之忠告人之凶遭人唾罵於時不容覆巢彈類驅逐西東余是時作賦以弔汝非乘爾困而責爾聰今也主人悟彈者去豐爾食於大倉置爾巢於高樹晨雞不鳴百鳥爭慕傍睨鳯皇下窺鵷鷺爾於此時徒能縱蒼鷹逐狡兔不能啄叛臣之目伺賊壘之去而復憎鴻鵠之不親愛燕雀之來附既不我德又反我怒是猶秦漢之豪俠逺巳不稱昵巳則譽夫然吾分足而巳矣又焉能顧重刋板序余𬒳命來守宛陵視事之翌日有客謂豫曰郡學請鏤版印書公留意否乎乃問其目曰梅聖俞詩集自遭兵火殘編斷簡靡有全者幸郡教官有善本余樂聞而應之曰昔龎參為漢陽太守郡人任棠有竒節參到先候之棠不與言但以薤一本水一盂置戶屏前抱兒伏於戶下參思其微旨曰水欲吾清拔薤欲吾擊強宗抱兒當戶欲吾開門恤孤率而行之漢陽大治余殿此邦之初學官諸生以學校為言今客又以聖俞梅公詩集為言客其吾之任棠也與聖俞公以詩聞於當世實此邦之前哲客其欲豫先庠序之教而借梅文以為諭余固淺陋雖不足以發揚幽光敢不率行或庶幾乎如漢陽之治也乃命學官董其事鏤板既成請序於余余豈敢辭聖俞公之詩簡古純粹華而不綺清而不癯涵泳於仁義之流出入於詩書之府而其工歐陽文忠公巳序於集首此不復道姑敘鏤板之由云爾紹興十年上元日檢校少傅保信軍節度使知宣州軍州事兼管內勸農營田使新安郡開國公食邑五千二百戶食實封二千一百戶汪伯彥後序宛陵先生集卷第六十終宛陵先生集目録卷第六十覽翠亭記林和靖詩集序紅鸚鵡賦述釀賦靈烏賦南有嘉茗賦鳲鳩賦麈尾賦擊甌賦哀鷓鵠賦問牛喘賦和人凌霄花賦矮石榴樹子賦風異賦乞巧賦思歸賦鬼火賦鬼火後賦魚琴賦針口魚賦靈烏後賦目録終
