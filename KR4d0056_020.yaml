front:
  text: 宛陵先生集卷第二十
  hash: sha256:89edaecb6579bf4bd4dd50f41c9f9a0974577956a9e46bec672db36e616684ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_020-1a}
body:
  text: 宋宛陵梅堯臣聖俞著次韻和劉原甫紫微過豫飮酒所居汴水近未有鼓吹蛙昨日春雨晴車騎臨我家我家苦僻遠庭下無泥沙為撇甕面醅為煎鷹爪茶乳羮芼紫蓴蜜果飣乾瓜與我相對飮但恨諸友遐笑語雖同昔放浪不少加忽觀壁間字坐歎目昏花公壯尚若此我老死豈賒門前賣桃李呼買婀娜華東簷大槐樹上有鳥雀譁恃舊無猜嫌醉辨巳傾斜將去還見規禮數何檢差後從江韓來禠帶歡莫涯送湯延賞秀才下苐歸參差緑柳上撩亂黃鶯飛失意暫時屈獨嗟千里歸淮船行欲駛江􅚝去應肥謝眺吾鄉守欣欣見綵衣送門人歐陽秀才遊江西客心如萌芽忽與春風動又隨落花飛去作西江夢我家無梧桐安可久留鳯鳯巢在桂林烏哺不得共無忘桂枝榮舉酒一以送答來上人春日即事南國三衣客王城一見春花明馳道遠雨漲御溝新茗憶山中物雲懷嶺上鄰如何異鄉感却出解空人送楊申職方通判信州從來饒信吏愛寶襲侈越莫買冰玉盤蒼山斫明月明月有時生窮巖有時竭君常抱清節歷職老無闕與我年齒同獨未變華髮又為江外行畫舸羡明發送勾諶太丞通判頴州頴川倒灣流欄船曲轉鈎吏迎如太守民望亞諸侯芳圃深通野寒湖半抱州前賢多舊迹佳詠聽君留和永叔六篇嘉祐四年春御試進士翰林學士歐陽永叔韓子華集賢校理江鄰幾同為詳定官有詩六篇出而使豫和焉詳定幕次呈同舍苑樹天邊雨露勻群公偷看錦叢新眼穿欲折無由折賞到人間不是春代鳩婦言不如作繭依𧖟蔟以絲自裹還自足與爾為婦過一生怒即分飛同轉目辛勤哺雛寄鵲巢子母生離因爾逐羽毛曾未顔色衰飮啄不計豐儉時天隂輒遣呼輒歸恩情𥿄薄誰信之朝為夫婦夕行路世間反覆那能知伋妻白母非美事後代放此誠堪悲看花呈子華內翰時不選數老獨嗟鬢毛未變目未花愛公深殿見桃李長才高詠無能加紅英灼灼弄日色穠艷皎皎生鉛華長廊垂幕風不動映柳黃鶯吟未涯燕㗸新泥輔巢缺蝸壓峻陛臨角斜是時唯聞鳥雀閙盡日不聽車輪譁雖傳此景無分到但訝習慣猶豪誇他年造物儻有意不使齪齪居貧家禁中鞓紅牡丹洛中花之竒者與公同是洛陽客今日論年皆作翁一見此花知有感衰顏不似舊時紅和鄰幾學士桃花深殿有春人到稀武陵雖説昧當時躊躇莫憶人間世恐至塵中悔却遲啼鳥提胡蘆提胡蘆爾莫勸翁沽美酒公多金錢賜醇酎名聲壓時為不朽百舌子百舌子春泥方滑滑泥雖滑滑輦道平莫學竹雞言易發深宮許爾來報春便是好鳥同其群清聲囀入君王耳安用穿叢苦避人桃李無言何所益畢竟有謝須紛紛莫以榮華長不歇人間巳見翟公門安不忘危誰可貴貴時能憶困時聞縉叔以詩遺酒次其韻雜言君嘗謂我性嗜酒又復謂我耽于詩一日不飮情頗惡一日不吟無所為酒能銷憂忘富貴詩欲主盟張鼓旗百觚孔聖不可擬白眼步兵吾久師君多賜壼能以遺向口滿碗傾玻璃醇釀甘滑泛緑蟻從此便醉醒無期既以樂吾真亦以泰吾身莫問今人與古人和范景仁王景彞殿中雜題三十八首並次韻殿幕間興宫殿深沉處鶯花爛漫時關關哢清吭蒨蒨發朱𬎼天上春應早人間日轉遲得賢如漢盛五字變周詩遊延羲閣後藥欄授經聞漢帝嘗此講秦餘一日承丹詔同時見子虛來遊瓊閣外間傍藥欄初柳絮輕粘履薇條澀惹𥚑解歸巢上燕思寄袖中書此鳥如矜愼飛飛與客踈龍柏花非龍香葉非柏獨竊二美誇芳𬎼苦練不分顏色近紫荆未甘開謝遲群公莫以得地貴竟費佳句何足思延羲閣牡丹花中第一品天上見應難近署多紅藥層城有射于生雖由地勢開不許人看天子何時賞宫娥捧玉盤奉呈諸君參天朱閣峻拂地柳條垂太液緑波漲建章春漏遲長人執兵立小豎插花嬉但只逢人説無由預此時細竹森森漢宫竹託本異孤生玉砌緣根迸朱欄與筍平朝煙生密翠晚影漏斜明應待女媧采參差鳯琯清夜賦月從東殿生叢竹照修竦葉間清露滴枝上寒禽動間覺萬慮空靜聞嚴鼓重官燭翦更明相看應似夢三月九日迎駕前殿臨朝百辟回後宮廷閣九重開鳴梢巳自金階出黃屋初迎玉輦來不問偷桃方朔飽誰知載戟子雲才群官望幸無名姓只有窮吟許外陪浹日光隂天上早氣候日邊溫懸蟢時過眼飛蟲稍入軒看花成子大聞燕養雛喧每覺瑤池宴風飄管吹繁宫槐漢家宫殿蔭長槐嫩色蔥蔥不染埃天仗龍旗穿影去鈎陳豹尾拂枝來靑蟲挂後蜂㗸子素月生時桂並栽我意方同杜工部冷淘唯喜葉新開有折景福殿後酴醾花至者有鳥㗸花出清香不畏風初從上林發來過未央中蔟蔟霜包密層層玉葉同誰將作美酒醉看月生東詩癖人間詩癖勝錢癖搜索肝脾過幾春囊槖無嫌貧似舊風騷有喜句多新但將苦意摩層宙莫計終窮涉暮津試看一生銅臭者羡他登第亦何頻石詠君王愛石醜百孔皆相通怪狀一如此補天有何功匪言不可轉安得來宮中女豈比桂礎瑩然受磨礱逾旬重説巳經旬應懷獨寢人通宵彈玉枕白晝拂牀塵幾想迎雕輦何當快倦身門前車馬立疑是角生輪晨起月向西樓下天光候日開􅋊星明寶鑑百舌響宮槐玉井傳新汲金爐換宿灰黃門馳有詔唱第許卿來金沙花金有披沙得花應不可多栽培由地力艷色與天和玉座君王賞朱欄將相羅稱觴千萬壽繁葉奈香何賜食誰言出相是山東今日求賢欲致功玉饌滿盤來禁裏鵠羮分鼎下天中但知愷弟酬君賜舊訝權輿向國風曾笑侏儒飽欲死宜思薇蕨不忘忠賜酒時頒光祿酒花出漢宮墻湛露承天渥流霞落羽觴近親龍尾道遠襲雀頭香溺殿人誰見終知曼倩狂賜書善經二字選來金殿盡英豪帝筆親承始是遭就裏少年唯賈誼其間蜀客乃王褒善經有意尊儒甚推澤方知待士高歸付子孫傳百世深堂間挂亦蕭騷賜燭天子賜燭昏夜時嫦娥閉月栽桂枝稱量高下唯妍辭相與盡心無附離求安去病如上池照耀不容毫髮私品藻一定何可移光熖奪畫資爾為宣王徒美庭燎詩魏帝自徹月殿披我朝好士萬古垂搜索賢俊登蒿藜孰不力吐肚膽脾枉用晏飲生脛脂雲龍將見升騤騤燃此必欲無所遺收殘喜氣如蒸炊蜜蜂慙愧空多知賜果前日宫醪賜玉尊今朝待果小黃門乾桃熏李非時物置案盈盤不次恩投以赤心思武帝握同玄璧詠劉琨嘗聞食奠陳王業知是豳公幾世孫檜詠文章老重欲追古便作帝宫蒼檜詩青蔥玉樹傳楊子盤屈洪桃見左思龍鱗已愛松身直珠實還看柏葉垂秀木艷叢郍可擬但將霜雪定堅姿柳絮陶令生涯漉酒巾門前種柳萬條新花今吹作蓬萊雪曲舊得於關塞人應與殘紅間是伴不隨舞蝶去爭春可憐輕質都無定一落銀河莫問津殿後書事天子尋常幸直廬裹頭宮女捧雕輿紅泥已賜春醅酒黃帕曾經御覽書林果鳥應㗸去後燕窠蟲有落來餘禁中事事能傳詠播在人間不是虛雨夜電光初照樹峩峩葉上微風與雨和玉腕愁聞無處奈庭花暗落不應多長楊靜響千重瓦太液寒生幾寸波洗濯青春如有意平明濕羽未離柯景福殿水宮井蛟龍夭矯垂曉瓶初汲渴禽窺清泠巳向金盆貯井滑還從玉碗知九醞酒醇由此得小團茶味為留遲閣門地脈應相似翰苑曾邀詠昔詩歐陽永叔曾邀余賦閣門水雨後新晴殿閣曉初日霧煙中柳重宫腰弱花肥粉頰豐渥恩君自厚藜藿我才充草木欣欣發誰知造化功象戲象戲本從棊局爭後宫龜背等人情今聞儒者飽無事亦學婦人間鬪明堂上有竒誰可勝樽中賭酒令方行直驅猛獸如尋邑何似升平不用兵再觀牡丹聞説偷觀近玉欄腸如車轂轉千盤無人憶著洛陽日走馬魏王堤上看白牡丹白雲堆裏紫霞心不與姚黃色鬪深間伴春風有時歇豈能長在玉階隂紫牡丹葉底風吹紫錦囊宫爐應近更添香試看沉色濃如潑不愧逢君翰墨場七寶茶七物甘香雜蘂茶浮花泛緑亂于霞啜之始覺君恩重休作尋常一等誇庖煙羃歷庖煙出綵油欲通雲霧未能周濕薪燒盡日停午試問霏霏何處浮省中漢相家人尚苦疑不言溫室樹何枝君今坦坦無猜忌夸説皇居盡入詩天上紫微垣裏月光飛玉佩腰間正陸離天上去來知幾日蟠桃結子是歸時明月明月已生城上頭小星光滅大星流來朝放榜出宮去何處殘花轉入溝再賦誰人重詠大刀頭只願長明不願流縱使西傾必東出寧同寒水瀉宮溝殿中柳絮玉几當中寶作牀無端絮惹御𫀆香群公唱第魚龍化列侍金階若堵墻宛陵先生集卷第二十宛陵先生集目録卷第二十和劉原甫過豫飮送湯秀才下第歸送門人遊江西答來上人春日即事送楊職方信州倅送勾太丞頴州倅和永叔六篇詳定幕次呈同舍代鳩婦言看花呈子華禁中鞓紅牡丹和鄰幾桃花啼鳥次酬縉叔遺酒和景仁殿幕間興遊延羲閣後藥欄龍柏延羲閣牡丹奉呈諸君細竹夜賦三月九日迎駕浹日宫槐景福殿酴醾花詩癖石詠逾旬晨起金沙花賜食賜酒賜書賜燭賜果檜詠柳絮殿後書事雨夜景福殿水雨後象戲再觀牡丹白牡丹紫牡丹七寶茶庖煙省中天上明月再賦殿中柳絮目録終
