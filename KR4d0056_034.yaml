front:
  text: 宛陵先生集卷第三十四
  hash: sha256:27a299010ca6f4cf1756fde0b10af036455817ad4ac7dbe02bc032e2b202f9a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_034-1a}
body:
  text: 宋宛陵梅堯臣聖俞著使風跨下橋南逆水風十幅蒲帆彎若弓淮波帶日魚鱗紅岌岌飛上北斗中龜山始撞人定鐘岸草澁澁鳴秋蟲田家屋上壺脩蔓屋頭綴大壺簷外垂霜乾葉猶苦風斷根未移收挂煙突近開充酒具遲賤生無所用㑹有千金時九月二日夢後寄裴如晦裴生安徤否試問鴈經過處士賦鸚鵡將軍養駱駝食魚今飽未索米柰貧何昨夜分明夢持書認篆窠昭信淮上清淮渺然去白浪勢如奔同發巳先逺獨行將向昬洲長寧辨路夜泊偶依村燈火稍覺亂應聞人語喧小村淮濶州多忽有村棘籬踈敗謾爲門寒雞得食自呼伴老叟無衣猶抱孫野艇鳥翹唯斷纜枯桑水齧只危根嗟哉生計一如此謬入王民版籍論難知自古難知不遇人朝爲蛇䑕暮龍麟魏齊客溺簀中死亭長妻輕跨下貧白石夜歌誰與進黃金懷印自能伸丈夫只患無才業何恨區區逐路塵九山我經九山問野叟崔嵬一無安曰九且恐斷岸積瓊玖復意陂原多產韭又疑堆壠若柱灸四者未悟叟不言使我臨流獨搔首淮岸秋水刷土骨峭瘦如老石虚沙歸島嶼寒浪漱竅隙下過白魚尾上有蒼獺跡平崗自相連野籜鳴風櫟原有禽倐鳴升遽黙下小禽不盈握羽翮自輕捷裊裊上雲鳴聲窮如隕葉雀懷啄粟娛鷃有棲蒿愜嗟嗟力甚微枉與鷹鸇接浮來山舊說此山產雲母秦鬼驅卯沙聚結無蒼翠誰云海上移能與潮浮至洞嘘蛟鼉腥廟畵風雷異雲母今有無庶爲僊藥餌泊下黃溪黃溪晚來泊得見田家微刺艇斜陽下耕洲載耒歸牛鳴向空犢犬喜入人衣復有返樵者檐枯翹雉肥濠梁感懷天子昔封禪吾叔從金輿廻首㤗山下出建雙隼旟來㝷觀魚臺遂逺承明廬當時十五詠螢照墨石書渦口秋水見灘底淺沙交浪痕白魚跳處急宿鴈下時昬帶月入渦尾落帆防石根淸淮行未盡明日又前村夢同諸公餞仲文夢中坐上作巳許郊間陳祖席少停車馬莫催行劉郎休恨三千里樽酒十分聽我傾過塗荆二山遇暗石淮流兩山間勢束秋漲急聚石如伏兵歛歛波下立輕舟不可防而况昧所習暗值柂巳毁後者戒前及同發去漸遙更愁寒灘澁舟上采菊泯泯平慢流行當季秋月演漾過汀洲汀洲芳杜歇白露夜正霏黃菊寒更發采以泛酒巵不獨映華髪朝暮氣候輙未定寒暄朝暮間挾纊水風生衣綌川陽還緑草藏邃岸枯櫟植高山且非天時異順理心自閑荆山和楚人玆楚地泣玉山無所記但見楚人誇產玉古廟幽幽無鬼哭儻有鬼定無足塗山古傳神禹迹今向舊山阿莫問辛壬娶從來甲子多夜淮低激射朝江上嵯峨荒廟立泥骨巖頭風雨過曉日岀舟曉日升曈曨波上爛爛黃金鎔羃歷紫煙生鏡中釣船似畵分横縱風莫從虎雲從龍變作霏霞重復重雞聲雞聲踏曉呼呼起扶桑烏含光如車輪碾雲蹤跡無誰教夸父逐逺向鄧林趨復從海底轉循環似轆轤采𣏌誰謂岸無𣏌條其長矣誰謂杞無實爛其皇矣掇彼征矣檐旣盈矣捨棘與蠧造此冝酒維此宜酒我挹我注我飮我助以養我籲泊橛澗觀渡隔岸呼舟檝臨河立馬牛解鞍沙上憩沉網渚間收殘日銜沙尾孤帆落戍頭莫愁暄作雨晚水白煙浮看山寄宋中道前山不礙逺斷處吐尖碧研青點無光淡墨近有跡前林横白雲復與後嶺隔孤舟川上人引望不知夕安得老畵師寫寄幽懷客暮雨水上魚吹白露山頭雲與龍附潭中水作潭中雨朱鼈飛過吳洲去鯉魚相隨不知數老蛤銜泥在深處細雨樵行蛟人困卧寒潭底怗波濛濛垂白絹波上女兒飛輕橈逆流自與郎去樵風吹鬢髪不及撩鴉翅卷起蠆尾翹濃纈羅帶長繞腰日暮下來吹短簫晨鴉雲昬月黒鴉不知皷聲鼕鼕雞報啼睥睨未辨夫東西癡雛噪舞羣翅低野桑葉卷風凄凄濃霧不起寒雨迷晨鴉却歸巢上棲㑹稽婦食藕莫問濁水泥嫁婿莫問寒家兒寒兒黧黒靣無脂驥子縱瘦骨骼竒買臣貧賤妻生離行歌負薪何媿之高車來駕建朱旗銅牙文弩擐犀皮官迎吏走馬萬蹄江潮晝起橫白霓舊妻呼載後乗歸悔淚夜落無聲啼吳酒雖美吳魚肥儂今豢養慙猪雞園中高樹多曲枝一日挂與桑蟲齊九日次壽州昔人把菊望青榼今我持酒無黃花自催屋裏紅鱗膾不彈墻頭白項鴉壽春城高枕淮水緑蒲踈踈暮帆起登臨不學孟叅軍帽墜山風費嘲𥿄泊壽春龍潭上夜半黑風破一舟盲風吼空來不識前山遮廻激入灣口暗浪騰水涯喧聞破我船沉沒驚一家晦昧若塗漆心緒如亂麻燈光不出戸鬼火空照沙百物任漂蕩薄命誰怨嗟但存此空舟坐類鳥寄槎妻孥皆失色一夕鬢欲華詹惶俟天明頃刻抵歲遐雨寒雞唱遲况乃城上鴉頴上得鯉魚爲膾懷餘姚謝師厚青蓑潭上老赬尾網中魚買作秋盤膾還思逺客書越虀橙熟乆楚飯稻舂初雖去故鄕逺不嫌爲饌踈丘家渡早發曲頴若秋蛇屈盤鱗甲活問戍得耕人拾魚逢祭獺草窠殘野燒樹挂經流沫百里相對看頻行媿迂闊水次蘚花秋雨日霏霏碧花生疊疊水邊有神女粧去遺翠靨岸側小家婦不知所宜愜未得未還人自將渾靣帖夜行憶山中青熒鬼火動不悟前山雨昬徑梟鳥鳴獨行毛髪聚桷葉枯綴林風動疑有虎低迷薄雲開心喜淡月吐村醪雨濕破荆籬風搖樹亞旗小槽聲不急挈榼問沽遲摘果野棠熟望人船大隨燈前相對飮還似昔過時川上田家斜光隔河明入照桑柘下臯壠生麥苗青青尚堪把逺見牛羊歸相親童稚野醉歌秋草間頗與世家寡發匀陵秋雨宻無迹濛濛在一川孤村望漸逺去鳥飛巳先向晚雲漏日微光人倚船安知偶自適落岸逢沙泉聞鴈濕雲夜不散薄處微有星孤鴈去何急一聲愁更聽心應失舊侣翅巳高青冥幾日江海上鳬鷗共滿汀牽船人沙洲折脚鴈疑人鋪翅行柰何暮雨來復值寒風生濕毛染泥滓縮頸無鳴聲爾軰正若此猶勝𬒳堅兵田人夜歸田收野更逈墟里隔煙陂荒徑巳風急獨行唯大隨荆扉候不掩稚子望先知自是一生樂何湏閭井爲行次頴州聞張甥宗亮不捷鄕薦以詩唁而迎之風前汝隂道雨冷江南書始歎與意異何慙定鑑踈但能存楚玉切莫道黔驢不負當時約馳迎一乗車聞櫓靜夜有舟下中流聞櫓聲隔牎燈巳暗卷幔月微明漸向寒灣逺遙應宿枕驚客心何苦急曾是不縁名晚鷗晴川帶微陽鷗鳥雙飛去雙飛如有歸並宿向何處汀寒霧羃歷永落沙沮洳不避近行舟應知心寡慮新晴隂雲忽掃盡朝日吐清光萬里不礙日衆鳥欣哢吭草樹巳搖落山川尚鬱蒼百事擇佳日佳日唯晴陽將次項城阻風舟不能進逆水寒風急輕舟晚不前因來泊古渡聊且上平田草軟行方穩鶉驚去瞥然却㝷孤岸逺吹幘亂華顛斫膾懷永叔高河古穴深下有蒼鱗鯽岀水獰將飛落刀細可織香粳炊正滑白酒美少力但欠平生歡共此中路食夜漁夜漁歸自速短艇若飛雲水動月猶白挐音人不聞廻身明燭底撫卷至宵分我以此爲足勞勞非爾羣驚鳬驚鳬雖避人終戀舊所泊盡背船頭去却從船尾落湏知取勢高不是初飛錯十月三日相公花小飮賦四題拒霜木杪芙蓉花開非紅艶早常畏晚霜寒朱華競衰草九月二十八日牡丹香包巳向青春發又見秋深特地開應笑菊殘無意思不能邀賦洛陽才殘菊零落黃金蘂雖枯不改香深叢隱孤秀猶得奉淸觴三日讌集蕭然寒圃有殘芳吟徧朱欄向夕陽旣許坐陪公衮貴却慙蒿羽接鸞凰依韻許主客北樓夜㑹一月能逢幾笑歡高樓紅蠟滴金盤吟餘隴首雲初散唱盡陽關露巳寒不管星河漸西落自將煙水去程寛當時坐客各南北誰憶重遊泛木蘭謹和相國屋上菊叢屋上有叢菊結根深瓦縫旣無地勢美又乏土力擁乃因塗明生不由人所種亦能應節開焉取入公用公來歩廣庭聞鴈目始縱忽見粲然英降植合常從賓僚席其傍詠玩意已重物莫猒僻逺㑹遇良可頌寒菜畦𬞞收莫晚圃吏巳能供根脆上將凍葉萎霜漸濃不應虚巳筯還得間庖饔㫖蓄詩人詠從來用禦冬送裴節推歸京逺水未生凍輕舟歸大梁岸廻初向月篙滑始霑霜淸世豈淹俊上公存薦章行應重對策莫愧漢賢良十月菊上蜂黃蜂得晴日不道菊開稀向蘂晚寒起落叢無力飛輕輕難自舉怗怗一何微莫問巢房處斜陽柰欲歸送江學士睦州通判渉淮淮水淺泝溪溪水遲君到桐廬日正值采茶時試問嚴陵跡今復有誰知和民樂歲晚埸功畢野老相經過有酒自斟酌適意同笑歌大兒緝牛衣小兒護雞窠囷廩見餘積息戍靡負戈林間落熟果屋裏鳴寒梭㑹待朔雪時狐兎生罝羅飫鮮持作腊贈乏不言他是非了莫問此理當何如和晚花春花莫猒早秋草莫猒遲各不相羡慕榮枯乃繋時芙蓉東籬英雖晚亦自宜霜前給給開霜後差差萎深處有孤蕚寒月尚見披野蜂徒愛香凍翼不能支抱枝無力去憫然見恩私聞進士販茶自此宣州至和二年五月後山園茶盛四五月江南竊販如犲狼頑凶少壯冒嶺險夜行作隊如刀槍浮浪書生亦貪利史笥經箱爲盗囊津頭吏卒雖捕獲官司直惜儒衣裳却來城中談孔孟言語便欲非堯湯三日夏雨刺昬墊五日炎熱譏旱傷百端得錢事酒䏑屋裏餓婦無糇糧一身溝壑乃自取將相賢科何爾當梅雨三日雨不止蚯蚓上我堂濕菌生枯籬澗氣醭素裳東池蝦蟇兒無限相跳梁野草侵花圃忽與欄干長門前無車馬苔色何蒼蒼屋後昭亭山又被雲蔽藏四向不可徃靜坐唯一牀寂然忘外慮微誦黃庭章妻子笑我閑曷不自舉觴巳勝伯倫婦一醉猶在傍鳥毁燕巢堂間兩胡燕哺雛㘅百蟲老鴉亦養子偷雛燕巢中燕巢忽墮地六七皆命窮赤身無羽翼腸斷彼雌雄來徃􅑫鳴聲安得置室宫我閔樓簍籔俄已彊雨風從今更生卯不若受女娀五月十三日大水誰知山中水忽向舍外流誰知門前路已通溪中舟窮蛇上竹枝聚蚓登階陬我家地勢高四顧如湖滮浮萍穿籬眼斷葑過屋頭官吏救市橋停車當市樓應念此中居望不辯馬牛危湍瀉天河漫漫無汀洲羣蛙正得時日夜鳴不休戢戢後池魚隨波去難留揚鬐雖自在江上多網鉤紛紜閭里兒踊躍競學泅吾慕孔宣父有意乗桴浮宛陵先生集卷第三十四宛陵先生集目録卷第三十四使風田家屋上壺夢後寄裴如晦昭信淮上小村難知九山淮岸原有禽浮來山泊下黃溪濠梁感懷渦口夢諸公餞仲文過塗荆山舟上采菊朝暮荆山塗山曉日雞聲采𣏌泊橛澗觀渡看山寄中道暮雨細雨樵行晨鴉㑹稽婦九日次壽州泊壽春龍潭頴上得鯉爲膾丘家渡早發水次蘚花夜行憶山中村醪川上田家發匀陵聞鴈牽船人田人夜歸唁張甥不捷鄕薦聞櫓晚鷗新晴項城阻風斫膾懷永叔夜漁驚鳬相公後園四題和許主客夜㑹和相國屋上菊叢寒菜送裴節推歸京十月菊上蜂送江學士睦倅和民樂和晚花聞進士販茶自此宣州至和二年五月後梅雨烏毁燕巢五月十三日大水目録終
