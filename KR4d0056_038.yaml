body:
  text: 宋宛陵梅堯臣聖俞著贈袁大監人以祿為榮當知身所重祿榮身且勞豈要權衡用逹人唯止足曷顧百鐘俸今朝西山歸芝木不須種莊生逸老言此必久巳誦矩法况自持推年心可縱依韻和逹觀禪師贈别平生少壯日百事牽於情今年輒五十所向唯直誠既不慕富貴亦不防巧傾寧為目前利寧愛身後名文史玩朝夕操行蹈賢英下不以傲接上不以意迎衆人欣立異此心常自平譬如先後花結實秋共成趙一雖空囊鄭子豈其卿二人貧且隱高譽動天京我迹固尚賤我道未嘗輕力遵仁義塗曷畏萬里程安能苟榮祿擾擾復營營近因喪巳除偶得存餘生強欲活妻子勉焉事徂征徂征江浦上鷗鳥莫相驚蕪湖阻風春風任惡花自笑白浪不愁頭已白戢戢大船江浦邉崑崙五兩誰非客依韻和逹觀文鑒雨中見懷出浦候波平石尤風未止密雨長蒲牙輕泥隨燕子寒侵逺客衣岸起新痕水各各欲還山還山能幾里讀月石屏詩自此起皇祐三年五月至京後余觀二人作詩論月石月在天上石在山下安得石上有月迹至矣歐陽公知不可詰不竟述欲使來者默自釋蘇子苦豪邁何用強引犀角蚌蛤巧劈析犀蛤動活有情想石無情想巳非的吾謂此石之迹雖似月不能行天成紀曆曾無纎毫光不若燈照夕徒為頑璞一片圎溫潤又不似圭璧乃有桂樹獨扶迹常娥玉兔了莫覔無此等物豈可靈秪以為屏安足惜吾嗟才薄不復詠略評二詩庶有益暴雨雲薄風回雨點粗日腥土氣隨吸呼蒸然襲汗猶揮珠屋瓦裂響波生渠森森斗覺涼侵膚毛根癝瘮粟匝軀巳知燠寒變須臾雷電不止投笑壺槐端漏影日向晡馬蹄莫惜行泥塗和宋中道喜至次用其韻豫從江南來見子東涌榛問子何不治子兄遊洛瀕子素樂文字而復養慈親去年始升朝差差陪縉紳今也與吾肩行立笑語頻未經鬢髮改喜預班綴新思如曩時會浩飮不計巡往謁持約史文辭愧彬彬謂將一乘粟欲敵千箱囷然而澤中蛇時得龍一鱗况復周孔教幸逢舜禹辰又究志所之兹學豈不臻誰其起子者視子為席珍趨韓亦巳工比孟猶欠淳慎勿驚怪竒怪竒世多擯吾慙遼東豕未見西狩麟汩汩塵泥間曷辨玉與珉昨來忽有知所索非所循使焉轉磨衡安得目不眴誠聞苑囿美難遣麋鹿馴自惟體衰薾寧堪事艱辛宜收蹭蹬迹却返江湖濵浸脛水活活漫灘石磷磷垂釣紅鬐登舉袂白羽振以此全吾性胡能往問津非同子少年柯葉正蓁蓁齊國大長公主挽詞二首賢行聞當世尊隆異故常每令夫結友不為子求郎夜月初沉海姑星忽隕潢臨門親祖祭悲吹起修岡魯館當年盛秦臺此日遙龍歸終合劒鳯去不聞簫挽曲方傳薩行輀競奠椒空餘漢官屬泣送馬如潮招隱堂寄題樂郎中日哦招隱詩日誦歸田賦未嘗見藝人勇拋冠冕去今聞緱山隂身退效速傅一旦從犢車歡言友田父復來釣澗邊誰問袁公路貸米於如晦舉家鳴鵝鴈突冷無晨炊大貧丐小貧安能不相嗤幸存顏氏帖况有陶公詩乞米與乞食皆是前人為送渭州劉太保月黑見旄頭芒角漸西向八月邊草黃胡人馬𥘉壯無奈我兵雄方為漢偏將嘗聞登壇人亦未免得喪得為凱歌還鐃鼓喧亭障千蹄使椎牛百甕令設醠喪乃軍之羞節制由處上進退從其呼何能求必當二事非巳專願思古挾纊送張推官洞赴宴相公辟送子居大梁關中乃關外往者邊事繁秦民被災害今聞獨豐穰逮堠無動旝相公欲動勞請以臨都會多選天下才佐佑如何賴決疑有全䇿何必用蓍蔡雖病君強行寶刀仍喜帶豈是為俗儒空言事夸大送張著作器宰蘄水豫聞楚山竹肉好髮亦勻隴上風雪飽石根莓苔皴搜林翦橫吹龍子愁水濵作邑尚簡易豈必蹈昔人願為季長賦安用瑤與珉和癭杯物以美好稱或以醜惡用美惡固無然逢時乃亦共棄則為所輕用則為所重道聞癭木器愛賞互歌頌定應初得之買不論官俸靧靣生光輝貯飲發狂縱坐欲置於傍行欲挈以從其形何險怪曾不因蓻種凹凸本自然出縮非鬪縫薄才難究窮詆訶茲實恐太廟致齋答韓舍人簡齋舍隔墻東蕭蕭槐樹風聲顏雖不接翰墨遽能通未説涼堪飮唯愁賦少工此焉知素拙試與問楊雄送張著作孟侯宰上元天衢車馬迹急若機上梭義雖平生篤不越一再過夫子纍顧我言歸泛長河得邑美建業風流猶可歌依俙江令宅秋草應更多五題誰復詠鍾蔣與嵳峩劉原甫觀相國寺淨土楊惠之塑像吳道子畫又越僧鼓琴閩僧寫真豫解其詫吾儕來都下將踰三十春不聞此畫塑想子得亦新茲寺臨大道常多車馬塵設如前日手晦昧巳惑人曷分今與古曷辨偽與真閩緇圖鳯姿越釋彈龍唇但知五綵爛徒謂五音淳孰識商聲高孰驚眸子神不能評譜品索玉翻得珉二君才調高言若羽翮振將令尋常工千歲傳不泯依韻和裴如晦秋懷老葉巳足蠧風振猶在柯高高低低聲切切感我多不念四散飛尖圎競相磨當茲思再春宛然同俟河莫驚衡山鴈莫問洞庭波徒聞漢武帝獨有橫汾歌送張諷寺丞赴青州幕朝廷久清明賢相出賢牧賢牧又選賢森森備官屬是以邦政修良農播嘉榖上無租賦逋下有囷廩蓄往者河朔飢奔送劇鳬鶩富公鎮青社有來咸鞠育病者調藥劑起者飼饘粥老稚四十萬瘦骨生壯肉鄉縣將遣歸田園皆可復為之置長犂為之置黃犢既完身上衣又付槖中粟庭下再拜辭望城皆感哭他人守一方境內猶不足至今趙魏間食飮常酹祝富公離山東寇盜頗任觸堂堂高平公德業人所伏幕府得才謀螻蟻不勞撲上體憂勤心掃滅得神速張侯三十餘瑩若無玷玉八字分濃眉純漆點雙目昨日奉辟書氣貌寧近俗言從必磊落事果無出縮他時為書功誰惜千毫秃送徐祕校廬州監酒淮南秋物盛稻熟蟹正肥况身為酒官醇酎飮不非儻觀衆人醉徒自使世譏與君伯氏好試以此言歸韓子華江南安撫韓侯出持節志在撫黔黎縣官負弩迎刺史躍馬隨千里宣德澤煦如春風馳寒潮不起浪怗怗威馮夷借問何致耳試聽將所為立車呼父老勞以哀矜詞我從大明宫天子親諭之憂汝歲屢凶吏不恤汝疲巳輸又索糴囷槖無子遺此非陛下意恐使汝輩疑疾苦汝告我不憚為汝治父老必喜拜如餒得飼麋我稱此大是一一無不宜南方二十州歡聲無幼耆壺漿擁大道婦女闖短籬行聞江漢間復有宣王詩周仲章通判潤州昔過京口山齗崖如鞏洛抱谷黃芹泥百文聳垠堮山嶺與江靣地脈水可度欲鑿無淺泉孰云南土薄君為别乘去便比北州樂巳免卑濕憂仍離梟􅨱惡况逢休明時秋堞罷嚴柝夜愛寒江潮月臨甘露閣置酒發浩歌萬里波欲郤霜蟹肥可釣水鱗活堪斫縱飮不須休未應滄海涸終當笑揚雄窮壁常寂寞更知首陽人薇蕨事亦錯不若阮步兵醉鞍伸兩腳太守必吾徒儻能時就酌弟著作宰南陵新買紫騮馬欲歸清弋江去彈琴鴈獨來認舄鳬雙槖實收盈篚濃醅熟滿缸弟兄相憶否風燭舊西窗和江鄰幾有菊無酒種菊將飮酒菊開酒無有雖不負爾目且巳負爾口昨日三四人淡坐飢腹吼徒與哦其傍誰能置升斗當時陶淵明籬下望亦久幸賴白衣人不愧采盈手悠然事頗同必竟醉則否五知堂代人與任少傅履道坊中白家宅五橋莊北晉公堂昔年二老曾相樂今日五知名獨光舉事是非都不問接花時節暫能忙清尊雅曲易為厭自有圖書列在傍贈陳孝子庸康州水邊龍母墳草樹蒙蒙起風雨五色五蛇時往來野鼠不穴墳上土嗟哉異類猶厚親豈彼人兮忘恃怙果生陳子孝且仁終日劬劬在民伍天清天順感其和嘉禾駢枝立如股遐鄉歎慕為爾鄰太守欣言出吾部中州士人傳以夸照頑爍孽良有補唯時火德君道明粵南祝融孝所生若然寧獨一陳生築堠表廬從此數和原甫同鄰幾過相國寺淨土院因觀楊惠之塑吳道子畫聽越僧琴閩僧寫宋賈二公真青槐夾馳道方轡下麒麟朅來遊紺宇歷玩同逡巡吳畫與楊塑在昔稱絶倫深殿留舊迹鮮逢真賞人一見如宿遇舉袂自拂塵金碧發光彩物象生精神歲月雖巳深奇妙不愧新驚嗟豈無意振播還有因乃知至精手安得久晦堙二僧感識别請以巳藝陳或彈中散曲或出丞相真覽古仍獲今未枉停車輪李端明宅花燭席上賦百兩禮將陳王家集上賓花光濃照席燭艷暖回春巳接氷壺潤寧辭翠斚醇自慙持短調重對玉堂人送李祠部知滑州自古重名器未嘗輕授人煌煌東郡守燦燦兩朱輪父祖繼居此恩榮誰與鄰秋風度河水馬足不生塵送王正仲長官汴渠泝復沿自可見遲速來時遲有糧去恨速無榖有糧安計程無榖不遑宿霜高萬物枯源水縮溪谷黃流半泥沙勢淺見蹙澳千里東歸船何日下淸瀆淡淡風雨寒長沙嗥鴈鶩將投孤戍遙四顧危檣獨強語慰妻奴多虞賴僮僕到家秫巳收綴樹橘始熟折腰無慙陶懷遺焉愧陸我方羡子行送望不移目廨後木芙蓉託根地雖卑凌霜花亦茂物稟固不遷人情自為陋幸與時菊開誰嗟發孤秀楚人搴木末巳見離騷就傷驥駑驥同一輈遲速能幾里當其被問時舉策數耳耳馳騁心獨存壓抑頭不起空傳八駿名未遇穆天子陳丞相燕息園少仕既勤勞暮節念君息小車辭漢庭緇衣賦衛國廣園樹嘉木鳴鳥來野色京水魚可緡東陂鴈可弋豈不有秦聲酒酣歌在側寧同扶風人自去北山北依韻和普上人古琴見贈獨繭絲為絃九竅珥為軫彈風松颼颼聽水流泯泯欣者舉袖舞悲者欲涕隕若此輒動人干時固能凖虞舜今在上南薰思無盡依韻和胡舍人見唁西垣閣老號文雄辭體能兼兩漢風絳帳舊生雖授學灞陵歸將已無功校文豈論居三上賦分由來本下中不恨早朝秋雨急猶陪鴛鷺大明宫題三教圎通堂處中最靈智人與天地參其間有物老曷又推為三共以圎通出誠明自包含排楹壓文礎煥采塗朱藍而將罝吾儒復欲籠彼􅡭二徒不自曉恬若均笑談越鳥不巢北代馬不嘶南固亦辨殊土麟鷟唯時堪設膾示坐客汴河西引黃河枝黃流未凍鯉魚肥隨鉤出水賣都市不惜百金持與歸我家少婦磨寶刀破鱗奮鬐如欲飛蕭蕭雲葉落盤靣粟粟霜蔔為縷衣楚橙作虀香出屋賓朋競至排入扉呼兒便索沃腥酒倒腸飫腹無相譏逡巡瓶竭上馬去意氣不説西山薇杜挺之新得和州將出京遺豫薪芻豆魯公馬病不可出陶令言拙徒扣門舉家食粥焉用怪但願漉酒巾常存長安侏儒勝方朔水邊漂母王哀孫王孫功名立四極方朔詼談干至尊我才不及三二子摧藏自愧趨權閽前時永叔寄秉粟一秋巳免憂朝昏今君益之薪與菽老馬病骨生精魂昨聞新拜歷陽守王國久客虱處禈都水借船輕復淺急趂寒汴流渾渾耳清眼明見野色一聽江鶴醒若墳餘糧滯鈍不暇惜均於朋契惟義惇設如河涸膠在步縣邑亦足供雞豚却嗟我甑有時匱莫與太倉黃鼠論江鄰幾邀食餛飩學書謾成老肌瘦腹喜食熱况乃十月霜侵膚與君共貧君餉我吹虀不學屈大夫前時我膾斫頳鯉滿坐驚睨卒笑呼誠知舉筯意淺狹一餐豈計有與無幽廟老狐依叢祠妖橫起百怪巢梟助鳴聲穴兔資狡獪巫紿神靈言俗奏飮食拜三年空禱祈萬疾無愈差膻臊日巳熾疑畏誰敢懈近者勇丈夫發揭窟乃壞始時驚其狂今盡喜其快尨茸毛尚存獨使尾徒大廟貌更一新願以邪為戒十月十八日霜梧葉盡枝影踈井上青絲轉轆轤西廂舞娥艷如玉東楯貴郎才且都纒頭誰惜萬錢錦映耳自有明月珠一為轆轤情不巳一為梧桐心不枯此心此情日相近卷起飛泉注玉壺送鄞宰王殿丞君行問崎鮚殊物可講解一寸明月腹中有小碧蟹生意各臑臑黔角容夬夬願言寬賦刑越俗久疲憊金陵與張十二傳師賞心亭飮但嗟識君遲不恨春風惡風惡舟未前置酒共談謔漁歌還浦頭斜日下洲角明朝渡江去相望便成昨阻風寄刁安國江風裂瓦鳴浦口驚浪作君駕何不來客心空寂寞阻風秦淮令狐度支寄酒春風不獨開春木能蹙浪花高似屋江船百尾泊深灣鐡纜千環繫長軸逺客今朝愁未平主人贈榼飮還足前時共論酒可禁急世救弊且勿速我今正得杯中趣效陶種秫置心曲江上遇雷雨雷從燕尾來雨到江心急挂帆中路時望浦前舟入聲喧釜豆裂點疾益繭立蕩搖魚鱉腥恐懼兒女泣稍聞人好語出顧岸巳及蘆洲有同行言唁氣吸吸登瓜步山二首瓜步山頭廟堂因魏武興亡歸從赤壁事去憶西陵軍井藏雲杪林根擁石稜微風認江水細甲幾千層山上濃雲合江南暴雨來將歸林下嶺中路遇風雷心速灣猶逺行遲伴屢催舟師添繫纜兒女望人迥宛陵先生集卷第三十八宛陵先生集卷録卷第三十八贈袁大監和逹觀贈别蕪湖阻風和逹觀文鑒見懷讀月石屏詩自此皇祐五年五月至京後暴雨和宋中道喜至齊國公主挽詞招隱堂寄樂郎中貸米於如晦送渭州劉太保送張洞晏相辟送張著作宰蘄水和癭盆太廟致齋答韓舍人送張著作宰上元劉原甫觀相國寺和裴如晦秋懷送張寺氶青幕送徐祕校廬州監酒子華江南安撫周仲章潤州倅弟著作宰南陵和鄰幾有菊無酒五知堂贈陳孝子庸和原甫過相國寺淨土院李端明席上花燭送李祠部滑州送王正仲長官廨後木芙蓉傷驥陳丞相燕息園和普上人古琴和胡舍人見唁題三教圎通堂設膾示坐客杜挺之新得和州鄰幾邀食餛飩幽廟十月十八日送鄞宰王殿丞金陵與張傳師飮阻風寄刁安國阻風秦淮江上遇雷雨登瓜步山目録終
