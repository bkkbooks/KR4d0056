  text: 宛陵先生集卷第三十二
  hash: sha256:4d07eedbd22ce4c48e061fa3b96a24675dbb14b7ea064986e9dd30ee71b2b365
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_032-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送范景仁學士歸蜀焚黃蒼山過秦梁山盡見川陸下馬古城都訪壟得喬木掃籜開奠席隕淚濕俎肉當時相如歸徒自盛車轂不聞有是為事乃今古獨還因問耆舊亦莫遺隱卜荒祠古柏下殘月杜鵑哭憑君約史筆書作西來目送宋中道鄭州拜掃酣酣道傍杏戢戢壠上柏不知煙火禁但感風露易開關掃墓隧向樹繫車軛灑淚有餘悲麒麟高幾尺送韓子華歸許昌不值風雨暴杏過梨巳開社後清明前燕與人歸來湖中水方漫誰共泛其隈儻有問憔悴憔悴未忘杯燕涏涏隻來燕飛飛自舞空輕如漢家后斜避楚臺風斗折撩沙觜相高接草蟲向人全不畏切莫入吳宮送周衍長官知遼州二月遼陽去遼陽草未生春風吹胡沙卷起黃雲平土人耕耨晚種黍何時成塞地寒且薄百役子宜輕寒食墳塜遍青山高低占原谷向來路巳荒今迷問樵牧涉水到雲林隔岡聞近哭沃酒白楊下悲風何飋飋雨止梨園殘鳩聲在茅屋依韻和太祝同諸君遊園湖見寄陽春何處來客自商丘至一唱新辭工始見故人意園林誰與遊卉木欣巳媚花上有微隂水邉無近思遙憐數觴豆何必親歌吹牧馬憶當時招延遺舊地不逢浮沼鴈但見銜魚翠日豫謬詞律答句嗟蕪纍安能接賢彥樂事聮輕騎獨不負春風塵纓此懷愧門學士院試含桃薦寢廟詩擬作交交鳴谷鳥粲粲熟荆桃寢廟此先薦離宮將以遨既同羞俎實且異獻溪毛露顆明朝日朱光逼赭袍戴經傳自久漢令著方高天子從茲食羣臣賜亦叨韓子華約遊園上馬後雨作遂歸誰約玩春物狂風雲驟開擺叢多落蘂蔽路足昏埃逆水燕迎雨將生鵝怕雷嵇康今轉懶騎馬半途回大風夜風晝不止天理何可常正當春木榮擺磨枝葉傷東皇務長養乃值此物狂曷不訴於帝斥之出逺方風伯有罪五孰肯進皂囊往時歲苦旱救熱雨欲滂吹之不使下雲雷遂深藏復搖江海波白日沉舟航又卷關塞沙千里填河隍拔木與退鷁書傳言巳詳今者天柔和煦煦皆敷芳獨爾何不仁嗥怒事雄強既其背天時誅殛固所當鳶鳴兼虎嘯助惡黨亦昌春風常愁春雲低誰料春風惡搖扇無定響折幹時聞落吹花擁細草送雨來高閣江燕倚身輕逆飛前復却送侯寺丞知鞏縣侯洛人伊洛合河流正臨歸鞏路崖壁人畏崩芹泥岸長固山回邑郭見馬入雲煙暮宰兹雖所淹况與鄉黨附宋次道家摘寶相花歸清平里往歲見此花開遲手擷羣芳因醉嗅今來須約爛熳看及過風雨又巳後主人為我特殷勤架底深深掇孤秀密枝隂蔓不爭開薄紅細葉尖相鬪先時已落已掃除最晚堪憐子所厚呼童歸遺不可緩金盤付與急奔驟暮還巳見映雪髻初拈尚覺香在袖官橋夜市正沽酒沽酒共賞莫待晝送南京簽判寇中舍東風莫迎船船下黃流急送車猶未動顧棹巳不及離宮佳氣盤賔幕平時入因君報親舊將去江南邑送韓奉禮隨侍之許昌岸之側多菖蒲蒲之下多乳魚乳魚可以饌菖蒲可以葅羡君調膳去且樂因使無忘寄我書金明池遊三月天池上都人祇服多水明搖碧玉岸響集靈鼉畫舸龍延尾長橋霓飲波苑花光粲粲女齒笑瑳瑳行袂相朋接遊肩與賤摩津樓金間采幄殿錦文窠挈榼車傍綴歸郎馬上歌川魚應望幸幾日翠華過霓入聲和應之還邑道中見寄向老思舊交欲見恨無翅前時君來都欣喜乃一至亦既勤我懷酌酒去拘忌自從離洛陽此會無三四謝尹最賢豪巳嗟存沒異因酬馬上篇遂寫相逢意送韓仲文知許州孰不為太守所榮歸故鄉僚官詫舊識邸吏窺新章前去别馬上今仰立道傍野老拜車塵里人持壺漿至家塤箎美謁壠雲日光盛事難盡書且舉國門觴送薛殿丞知逹州逺郡古通川雲煙秀重疊江從巴蜀來山與岷峨接啼鳥異方音青林四時葉使君當問俗市賈皆紅頰依韻朱學士廉叔憶頴川西湖春色寄獻尚書晏公且將有宛丘之命物景有先後春工無舊新追歡成杳藹寄詠苦逡巡湖水與濠接岸亭將寺鄰艷花篸舞髻弱藻罥垂緡客奏桓伊笛人歌柳惲蘋何嘗煩几案自得去埃塵縱語曾忘倦從遊未覺頻賦詩高壓古下筆敏如神每想魂俱往終知夢是因廣騷常慕屈感遇亦希陳借問摛詞者當時别乘人喜公移幕府連賞二州春集英殿賜百官宴以雨放春來無點雨三月始聞雷曉殿鳴簷急羣公罷食回燕迎風翅健馬踏霧泥開晚覺微陽透飛光上緑槐送陳太祝歸河陽羸馬度關去夜向河橋歸水風來何急吹裂遊子衣到家莫久留速書赴禮闈大對必有藴時哉無闊稀送祖擇之祕丞知海州驥有千里足不使千里馳人有抱長才亦復不得施去去作守長政化尚可為勿云海濱陋豈無彼黔黎事舉訟必簡安能忘酒巵水物錯在爼醎腥應自宜朐山日相對亦莫厭其卑蒼翠入畫戟濃淡若秀眉但向此中樂用捨乃繫時戊子三月二十一日殤小女稱稱三首生汝父母喜死汝父母傷我行豈有虧汝命何不長鴉雛春滿窠蜂子夏滿房毒螫與惡噪所生遂飛揚理固不可詰泣淚向蒼蒼䔒蕾樹上花瑩潔昔嬰女春風不長久吹落便歸土嬌愛命亦然蒼天不知苦慈母眼中血未乾同兩乳高廣五寸棺埋此千歲恨至愛割難斷剛性銼以鈍淚傷染衣班花惜落蒂嫩天地既許生生之何遽困與用文師師名學佛者何乃愛吾詩吾方嗟世人各各事奔馳蒼鷹絶海至不異攫鼠鴟所趨有逺近所向皆餒飢潄水對無語風動庭樹枝小女稱稱磚銘吾小女稱稱慶曆七年十月七日生至八年三月二十一日死嗚呼鳥獸螻蟻猶有歲時之命汝不然也汝稟氣血為人豐然晢然其目瞭然耳鼻眉口手足備好其喜也笑不知其樂其怒也啼不知其悲動舌而未能言無口過動股而未能行無蹈危飲乳無犯食之禁愛惡無有情之系若是則得天真與保和何病夭之遽乎得不推之於偶然而生偶然而化偶然而壽偶然而夭何可必也吾將衣汝衣斂汝棺葬汝于野亦人道之常分汝之魂其散而為大空其復託為人不可知也其質朽而為土不疑矣富貴百年者尚不免此汝又何冤瘞之日父母之情未能忘故書之磚非欲傳之久且以志其悲云銘曰母孕而夢夢維虺蛇古占女祥夫其豈然耶復占我夢我遺我稱我名命汝平御妾媵既厲而乖胡然乎靡應送吳沖卿學士歸蔡州孟夏日南歸馬耳竪迎風急雨不及避斷霓明向東古城汝水傍化俗寄我公君今去拜慶酥酪美將同下土橋送刁景純忽大風韓子華先歸遺其小方巾明日持還副以此詩昨日汴水頭共餞東去人暴風吹黃沙對靣不相親歸來乘大馬誤擲小方巾平明馳奴還偷樣古逼真刁景純期水門再别以風雨不往餞客客未至明朝當更來風雨尋船懶車馬向城回烏帽吹覺重淸樽想誰開終期江上見俗禮聊損裁韓子華訪石昌言不遇石有詩韓邀和答嘗聞載酒者去訪子雲居乃值徒御出遂令談笑虛為黍寧乏具題鳯豈有諸一聽負剕語還想藺相如舟中夜聽汴河水聲夏雨漲黃流夜鳴鄰船柁乘危冒險人不識西山餓逢王公慥太博駑馬不惜蹄出門莫畏泥泥中逢故友十載相乖睽但怪蒼鬢色斑斑俯鐵驪少立不及語交策或東西向晚我還舟君來訪長堤對論出處迹存沒生悲啼勿言少壯日志意吐虹霓而今七不堪懶又甚於嵇寄題洪州慈濟師西軒西軒無落暉所賴西庭竹竹間有古葉竹上有繁緑夜雨一洗梢朝陽似晞沐焚香愛此心自不同諸俗送謝著作歸陳州騏驥泥中行偶蹶未千里終當至高衢尚苦泥行耻今歸雨濛濛嘶鳴欲何止乃念彼名駒近在清川涘他日見騰驤駑櫪此垂耳和石昌言學士官舍十題病竹水邊移得巳傷根枝葉如枯生意少主人不使荒穢侵遂長琅玕勝凡草石榴花春花開盡見深紅夏葉始繁明淺緑秪知結子熟秋霖不識來時有笻竹薏苡葉如華黍實如珠移種官庭特蔥蒨伹蠲病渴付相如勿恤謗言歸馬援石蘭言石曾非石上生名蘭乃是蘭之類療痾炎帝與書功紉佩楚臣空有意萱草人心與草不相同安有樹萱憂自釋若言憂及此能忘乃是人心為物易葵花此心生不背朝日肯信衆草能蘙之真似節旄思屬國向來零落誰能持𬞞畦手自除荒手自鋤蔥針巳插壅薤本朝藝夕灌豈不勤比食翦苗間且穩水紅江天淡淡江水平江岸有花紅作穗今日特向都城開晝時只合銜魚翠甘菊世言此解制頽齡便當園𬞞春競種到秋猶得泛其英爛醉莫辭官有俸蘭楚澤多蘭人未辨盡以淸香為比擬蕭茅杜若亦莫分唯取芳聲襲衣美勉致仕李祕監淵明歸柴桑家貧食不足當其勇去時不待秫稻熟借問何以然實耻暫屈辱公常為近臣曾不輒媚曲一緣府舍災遂使還秩祿祿仕四十年內乏釡鍾粟歸來託四鄰恓恓無片屋去就異前人其義巳介獨譬之食嗟來應自甘退縮當營負郭田漸可事水竹送施景仁太博提點江南坑冶楚山豈無銅楚匠豈不工大爐常乏鑄碧丱那得充積弊在鄉縣孰肯以利籠君今承詔行諭民當得中苟能使之發亦莫取之窮此乃事可久山深山自通夜泊虹縣同施景仁太博河上納涼書事與君愛清風移榻就明月月落見星繁星繁如晝熱霑衣輕露墜響岸崩湍齧坐思都城時誰許腳不襪施景仁邀詠泗州普照王寺古檜來尋淮上寺老檜莫知年劫火巳鎔像樛枝寧改煙根拏怪石入節駮蒼苔堅欲問浮波箭空嗟此獨傳送王判官同提點坑冶地雖不愛寶利在與民共務國不務民儻有安得用孟氏美王囿其説久巳誦聊此陳薄言忉怛不能重淮雨雨腳射淮鳴萬鏃跳點起漚魚亂目濕帆逺逺來未收雲漏斜陽生半幅舟次山陽呈王宗説寺丞逺客雖有樂莫如逢故人夜懷夷門時月照楚水濱自居扁舟上隨處與船鄰冝將到此日因使報朋親送崔黃臣寺丞宰臨海補官桐廬時巳飽嚴陵釣進吏六百石又得臨海嶠因之論出處足以見風調洪潮可登觀萬里漲川竅收縮向何歸由來人莫料慿君能賦才庶或窮其妙楚童楚童能捕魚乃在水邊居手取眼不顧情知獺未如鬢上浮萍草點點緑有餘既挈不暇理歸來莫取渠雜詩絶句十七首自此寶應道中起慶曆七年夏蛙行動萍葉誤觀作遊魚稍稍引兩股巳變科斗書青草生水中日日隨水長水落何所依撩亂為宿莽有蟲託斷葑斷葑日夕流不知止息處隨夫非自由荒水浸籬根籬上蜻蜓立魚網挂繞籬野船籬外入茸茸翦熟絲雨染燕脂暈滿樹斂黃昏槿花無此分青青老鏡葉下有繁實尖浪頭撥船女刺手終不嫌岸傍草樹密往往不知名其間有啼鳥似與船相迎青蠅何處來聚集滿盤間誰知腹中物變化如循環水上賣瓜女摘瓜陂上田長麻巳不識滿把青銅錢買魚問水客始得鯽與魴操刀欲割鱗跳怒鬐鬛張沙頭風雨來帖水野雲黑如觀曹公營萬弩射船側前時雙鴛鴦失雌鳴不巳今更作雙來還悲舊流水度水紅蜻蜓傍人飛欵欵但知隨船輕不知船去逺塘上挽船人塘泥深及脛落日望前村心將道途競燕立茅屋脊燕銜芹岸泥巢成同養子薄暮亦同棲鵲銜高樹蟬危脅繅車響露腹不曾肥殺之嗟巳往河畔有釣翁團泥為甕缶坐想秦人聲思傾杜陵酒宛陵先生集卷第三十二宛陵先生集目録卷第三十二送景仁歸蜀焚黃送中道鄭州拜掃送子華歸許昌燕送周長官知遼寒食和諸君遊湖見寄擬試含桃薦寢廟子華約遊園大風春風送侯寺丞知鞏縣次道家摘寶相花送南京寇中舍送韓奉禮隨侍許昌金明池遊和應之還邑送韓仲文知許州送薛殿丞知達州和朱學士憶頴川集英殿宴以雨放送陳太祝歸河陽送祖擇之知海州殤小女與用文師小女磚銘送吳學士歸蔡州送刁景純刁景純期水門再别和答韓子華舟中聽汴水逢王公慥太博寄題洪州慈濟西軒送謝著作歸陳州和石學士官舍十題勉致仕李祕監送江南施提點夜泊虹縣施景仁邀詠古檜送提點王判官淮雨舟次山陽呈王寺丞送崔寺丞宰臨海楚童寶應道中起慶曆七年夏雜詩絶句十七首目録終
