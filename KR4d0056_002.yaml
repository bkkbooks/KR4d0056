front:
  text: 宛陵先生集卷第二
  hash: sha256:3225485258bab4cb6ab5c30dd0b39ab5b4738af0311be93defa6cecb95c4cd7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_002-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和載陽登廣福寺閣過聞聯騎出登覽思踰清曉漲林煙重春歸野水平始看仙杏發巳愛夾衣輕誰見吟餘處殘陽上古城依韻和歐陽永叔同遊近郊洛水橋邊春巳回柳條蔥蒨眼初開無人拾翠過幽渚有客尋芳上古臺林邃珍禽時一囀酒酣紅日未西頽知君最是憐風物更約偷間取次來依韻和永叔同遊上林院後亭見櫻桃花悉巳披謝去年君到見春遲今日尋芳是夙期秪道朱櫻才弄蘂及來幽圃巳殘枝飄英尚有遊蜂戀著子唯應谷鳥知把酒聊能慰餘景乘歡不猒夕陽時依韻和王幾道塗次杏花有感馬上逢丹杏芳條拂眼過可憐荒徑少不道故園多艷蕚粘紅蠟仙葩皺薄羅客心知易感路逺奈愁何遊園晚歸馬上希深命賦興盡夕陽天言歸躍杏韀新隂六街樹逺目萬家煙歌咽樓千尺吟餘月一弦花間有遊妓醉去墮金鈿留題希深美檜亭幽深有佳趣曾不減林泉衆緑經新雨殘紅墮夕煙栽萱北堂近夢草故池連乘月時來往清歌思浩然留守相公新創雙桂樓藻棟起霄間芳條俯可攀晚雲談次改高鳥坐中還日映城邊樹虹明雨外山唯應謝池月來照衮衣間和希深避暑香山寺有客乘新霽雲林共扣扃輕舟過下渡逺水漲前汀原隰含幽藹岑嵐入杳冥誰知得深趣履齒石苔青和希深晚泛伊川放溜下平波舟移不知逺稍回溪口風恣愛雲中巘水鳥靜相依蘆洲藹將晚歸路莫言賒何妨乘月返路中月夕登霽景臺與唐英話别風枝不動月光午况是高臺過新雨吳客方思千里歸不負洛陽塵與土到時水落鱖鱸肥香稻初炊鱠紅縷休言羊酪敵蓴羮我亦長吟念東楚平胡馬嘶誰可留去去相望富春渚張侍郎中隱堂疇昔人歸老於茲望白雲門高知後慶賓至誦先芬草樹中園秀衣冠舊里聞寧同江令宅寂寞向淮濆太尉相公中伏日池亭宴會得山字何言避徂暑清宴水軒間竹氣隂池鳯雲峰照衮山玳簮方映座綵服亦承顏樂奏寒波上杯香緑芰間瓜浮五色爛簾捲半鈎彎今日賓裾盛袁劉豈足攀送臧尉藹藹神仙尉西風躍馬歸離羣賦黃鵠拜慶著斑衣雨氣連關黑槐花上路飛同為洛陽客今日故人稀新秋普明院竹林小飮詩序余將北歸河陽友人歐陽永叔與二三君具觴豆選勝絶欲極一日之歡以為别於是得普明精廬釃酒竹林間少長環席去獻酬之禮而上不失容下不及亂和然嘯歌趣逸天外酒既酣永叔曰今日之樂無愧於古昔乘美景逺塵俗開口道心胸間逹則逹矣於文則未也命取𥿄寫普賢佳句置坐上各探一句字字為韻以志茲會之美咸曰永叔言是不爾後人將以我輩為酒肉狂人乎頃刻衆詩皆就乃索大白盡醉而去明日第其篇請余為敘云得高樹早涼歸翻然思何苦昨夜秋風高良友念將别幅巾邀此遨清梵隔寒流亂蟬鳴古樹誰知林下遊復得杯中趣池上暑風收竹間秋氣早回塘莫苦留巳變王孫草未墜高梧葉初生玉井涼愁心異潘嶽獨自向河陽不減阮家會所嗟當北歸猒猒敢辭醉明發此歡非新秋雨夜西齋文會夜色際隂霾燈青謝客齋梧桐生靜思絡緯動秋懷小酌寧辭醉清言不猒諧誰憐何水部吟苦怨空階秋隂巳過蕭蕭雨猶成黯黯隂登臨潘嶽思憀栗楚臣心逺吹鳴高樹低雲冒晚岑久為關外客不忍聽踈砧雨中移竹荷􅓩冒秋霖匆匆移翠竹欲分溪上隂聊助池邊緑中散林未開子猷心巳足青青謝栽培豈愧凡草木希深所居官舍新得相府𬞞圃以廣西園楚相拔葵後蕭條三畝餘煙畦偶連畛蕙圃得增墟便欲開春沼何妨剃野𬞞始添臺榭美况近子雲居和永叔柘枝歌留守相公南莊按舞漁陽三疊音隆隆紅蕖亂坼當秋風披香擁霧出妖嫮嫵眉壯髮翩驚鴻鏘鏘雜珮離芳渚珠帽紅靴振金縷相迎垂手勢如傾障袂倚歌詞欲吐最憐應節乍低昻便轉疾徐皆可覩飄揚初認雪回風躑躅還看繭縈緒小小寧聞怨曲長盈盈自解依儔侣藝竒體妙按者誰金貂大尹宴清池綺茵繡幄粲輝映玳簮珠履何委蛇是時郊原新退暑天清氣爽過林墅淮王載酒昔嘗聞謝公擕妓那能數始知事簡樂民和不猒來觀柘枝舞依韻和載陽郊外近隰蔥蘢曙驚烏睥睨啼日光林杪動吹騎管中嘶路繞寒原古煙橫逺戍迷今來異賓孟誰復嘆雄雞奉和永叔得辛判官伊陽所寄山桂數本封殖之後遂成雅韻以見貺團團緑桂叢本自幽巖得惠好知不忘青蔥寧改色香生蓮幕間花白萱堂側月露夜偏滋瓊枝相翕赫河陽秋夕夢與永叔遊嵩避雨於峻極院賦詩及覺猶能憶記俄而僕夫自洛來云永叔諸君陪希深祠嶽因足成短韻夕寢北窗下青山夢與尋相歡不異昔勝事却疑今風雨幽林靜雲煙古寺深此二句夢中得攬衣方有感還喜問來音希深惠書言與師魯永叔子聰幾道遊嵩因誦而韻之聞君奉宸詔瑞祝疑靈岫山水聊得遊志願庶可就豈無朋從俱况此一二秀方蘄建春陌十刻殘晝漏初經緱氏嶺古柏尚鬱茂却過轘轅關巨石相撑鬪夕齋禮神祠法衮被藻繡畢事登山椒常服更短後從者十數人輕齎不為陋是時天清隂力氣勇奔驟雲巖杳虧蔽花草藏澗竇傍林有珍禽驚聒若避彀盤石暫憩休泓泉助吞漱上窺玉女窗嶄絶非可構下玩搗衣砧焜耀金紋透尹子體雄恔攀緣愈習狃歐陽稱壯齡疲軟屢顚踣競歡相扶持芒屩資踐蹂八仙存故壇三醉孰云謬鄙哉封禪碑數子昔鐫鏤偶志一時事曷虞來者詬絶頂瞰諸峰隘然輕宇宙遙思謝塵煩欲知羣鳥獸韓公傳石室聞之固巳舊當時興稍衰不暇苦尋究東崖暗壑中釋子持經呪于今二十年飮食同猿狖君子聆法音充爾溢膚腠嘗期躡屐過吾儕色先愀叶韻遂乖真諦言茲亦甘自咎中頂會幾望涼蟾皓如晝紛紛坐談謔草草具觴豆清露濕巾裳誰人苦羸瘦便即忘形骸胡為戀纓綬或疑桂宫近斯語豈狂瞀歸來遊少室崷崒殊引脰石室迢遞過探訪仍邂逅捫蘿上岑邃仙屋何廣袤乳水出其間涓涓自成溜凡骨此熏蒸靈真安可覯霞壁幾千尋四字侔篆籕咸意苔蘚文誠為造化授標之神清洞民俗未嘗遘忽覺風雨冥無能久瞻扣匆匆遂宵征勝事皆可復俚歌縱喧譁怪説多駮糅凌晨關塞陽追賞顏匪厚窮極四百里寧憚疲左右昨朝書報豫聞甚醉醇酎所嗟遊逺方心焉倍如疚送河清賈主簿歸任不逺水雲間悠悠泝鷁還分亭接雞犬舉酒對河山殘雪依荒磧寒煙入暝灣昔人鸞枳歎一併在離顔依韻和永叔雪後見寄兼云自尹家兄弟及幾道散後子聰下縣久不得歸頗有離索之歎常欲登芒嶺無由見洛橋雪飛關戍逈人憶剡溪遙廣隰嘶征鴈長河起怒飈遽言歡友散能使去魂銷晚日窮幽藹愁雲暝泬寥縱令佳約在載酒定何邀依韻和歐陽永叔黃河八韻少本江南客今為河曲遊歲時憂漾溢日夕見奔流齧岸侵民壤飄槎閣鴈洲峻門波作箭古郡鐵為牛目極高飛鳥身輕不及舟寒冰狐自聽源水使嘗求密樹隨灣轉長􅊻刮浪收如何貴沈玉川興是諸侯季父知并州捧詔出明光飛軒陟太行玉墀分近侍虎綬給新章笳吹喧行陌旌旗卷夜霜鴈歸汾水緑城壓代雲黃土屋春風峭氊裘牧騎狂關山寧久駐剩宴柳溪傍河隂中寨寒食擊柝聲初絶為魚夢巳殘幽禽哢清曉宿雨度餘寒爨火明千竈風旗展一竿歸心慙社燕自歎此微官再至洛中寒食西洛逢寒食依依似昔年千門方禁火九野自生煙飄泊梨花雨追隨杏葉韀遊人莫惜醉風景滿伊川同永叔子聰遊嵩山賦十二題公路澗我來袁公溪斷岸猶殘壘僵柳逺臨灣新蒲初出水行行古臺近兩兩驚禽起雞犬何處聞人家深塢裏拜馬澗王子昔凌霓國人茲拜馬依俙日夜笙聲入寒泉瀉空傳七日期飛鶴何時下二室道度嶺失羣山千峰出天際方欣左右看屢改縈回勢勝事誰與同芬然有蘭蕙自峻極中院步登太室中峯稅駕緑巖前攀蘿不知倦人從樹杪來路向雲端轉忽覺在煙霓回看峰嶺變玉女窗玉洞倚霞壁天窗露微明驂鸞去不返啼鳥空相驚萬木自虧蔽捫蘿復誰情玉女搗衣石幽石稱搗衣搗衣人不見雲纓白飄颻巖樹長蔥蒨猶應寒夜中山月來鋪練天門古壁何蒼蒼穿雲玉梯出歘然起青冥却立觀少室前巖復後峯隂晴狀非一天門泉泠泠雲外泉的的巖光入靜若仙鑑開寒疑玉龍蟄時應下鹿羣迹印青苔濕天池安知最高頂清淺水池開有時片雲出倐忽生風雷誰羡雙黃鵠刷羽來徘徊三醉石相期物外遊共醉仙壇石舉手薄高穹清風生兩腋都忘塵世煩笑傲聊為適登太室中峰日夕望蒼崖嶄嶄在天外及來步其巔下見河如帶半壁雲樹昏山根巳雱霈峻極寺山高路巳窮倐爾逢蘭若落日老僧間支頥古松下緩步入禪庭苔蒼伹蕭灑擬玉臺體七首欲眠鴛鴦羅薦開翡翠香幃寂解帶竟羞明移燈向東壁擕手曲擕手出中閨殷勤尅密期密期雖不逺回顧步遲遲雨中歸來時雲冉冉去值雨霏霏莫怪羅衣濕荆王夢罷歸别後昨日日暮别今日日暮愁猶認縱裙色依依在石榴夜夜曲情來不自理明月生南樓坐感昔時樂翻成此夜愁落日窗中坐含情獨不語落日窗中時妾意與君意相思只自知領邊繡出門重新製纎手行自整願作花工兒長年承素頸無題斗覺瓊枝瘦慵開寶鑑粧臨風恐仙去倚扇怯
