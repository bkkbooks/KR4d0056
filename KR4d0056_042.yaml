front:
  text: 宛陵先生集卷第四十二
  hash: sha256:872775972e5022f2e43099b0f2403510581c1b467c1b9d6ac0e00325cb13ac32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_042-1a}
body:
  text: 宋宛陵梅堯臣聖俞著八月十五日夜東軒隔竹巳見月清光度谿來移影上素壁與我相徘徊是夜正中秋天地霧露開人疑玉兎出藥杵不生埃嫦娥倚氷輪艶色若自媒它夕豈不好物意爲之摧送楊辯青州司理儒者服褒衣氣志輕王公一落該網中折節長俯躬山東多豪士片言不可窮靑土饒嘉棗無以人鈍蒙彼知南楚輕强始必弱終矯志合其情乃是吾徒通行當問友生爲我舉杯空隱靜山訪懷賢上人不遇松上垂靑蔓蒲根瀉碧泉高僧來不見却返五峰前游隱靜山心在名山乆積歳未及逰將過值風雨路不通馬牛丁壯四五人籃轝時更休轉谷逢烟火下隰多田疇偃穟黄壓畝刈麻東盈丘姑覺山門深長松如騰虬直上百餘尺蒼髯葉脩脩五峰迎人來冷逼臺殿秋石泉岀雲中引入舍下流緣源至嵓口嵓底魚可鉤天昏碧溪去果熟青猿偷草樹不盡識自起詩人羞濺濺澗水淺苒苒菖蒲稠菖蒲花巳晩菖蒲茸尚柔靈根采九節試共野僧求逡廵能致之衰疾無甚憂昔聞有釋子渡江用杯浮棲心向茲地埋骨在林陬駁陰漏斜光徒欲窮巓幽夜還南陵郭幾落猛虎喉路詠五里十里銷磨盡千蹄萬蹄來徃蹤古今不是不經歷踏破青山重復重書席語送馬御史天意漫漫物自供聞香能至是喧蜂野人割蜜不須盡留與寒脾作御冬送李南玉小人貧扵資君子貧扵時小人富扵貨君子富扵辭貧雖同寒饑富不同路𡵨彼富殁則巳此富名不移丈夫事百變未死安可期明明趨財利莫䘏前人嗤舉家如春𧖟仰食不可遲况念宿債窘何愧賤士爲買臣嘗負薪相如猶滌巵君思此二人信吾所不欺邇者有趙壹窮憤自興詩乗驥抱美玉樂與和未知友來鮮逢遇後世無苦悲代書寄鴨脚子扵都下親友予指老無力不能苦多書書苟過百字便覺筋攣拘京都多豪英徃徃處石渠作書未可周寄聲亦巳踈後園有嘉果遠贈當鯉魚中雖聞尺素加餐意何如秋日家居移榻愛晴暉翛然世慮微懸蟲低復上闘雀墮還飛相趂入寒竹自收當晩闈無人知靜景苔色照人衣昭亭別施度支昭亭送客地來徃四十年常視松端日毎稽潭上烟風移虎旗脚寒入牛童肩待訪名山去相期廬阜前潘歙州話廬山潘侯話廬山落落尤可伏初云江上來遠見雲中瀑捨舟到雲外觀瀑已嵓麓徃徃逢平田攢攢愛深木竹門懸徑微源水陰藤覆坐石浸兩骹炎膚起芒粟夕陽穿萬峰高下相出縮㝷常杳不分但被烟嵐畜絶頂水底花開謝向淵腹風力豈能加日氣豈能􅫥攬之不可得滴瀝空在掬夜昏投僧寺孤燈望溪曲忽聞清磬音漸近幽林屋止侯休多談巳滿我心目懷㳺二十年夢寐今固熟何當借輕舠一徃如飛鶩秋日村行谿霧晝又收山村夜初晦饑禽來徃飛遠樹靑紅碎原上楚牛童屋頭吳婦碓雞肥酒巳熟野老邀同輩吳正仲遺蛤蜊紫綠常爲海錯珍吳鄕傳入楚鄕新罇前已奪蟹螯味當日蒓羮枉對人送潘歙州潘過宣城而送之一見新安守便若新安江洞澈物不隔演漾心所降遠指治所山已入鄰齋窓捧輿登南嶺䇿馬懷舊邦飬親將爲壽傾甘抱玉缸觀軍將勞士臠肥堆羊腔下車談詩書上世擁旄幢勿窺淵㳺鱗無吠夜驚狵他日聞課第天下誰能雙馬都官行之惠黄柑荔枝醋壺梁霜胡甘熟烘日荔枝美橘柚未爲精葡萄安可擬郭生始能贊魏文何謬比二果皆世珍乃遺及賤士而復副醇醯或乞自諸巳豈唯享遠味終得爲直矣郭璞贊云厥包橘柚精者唯甘魏文帝記云南方龍眼荔枝寧比西國葡萄石蜜前以柑子詩酬行之旣食乃緑橘也頃年襄陽人遺柑予辨是録橘今反自笑之昔辯荆州悞今爲越叟迷黄柑與緑橘正似珷玞圭新安潘侯將行約游山門寺予以濘淖遂止因爲詩以見懷蒼山自爲門呀豁生鐫鑱路通石壁盡潦起田穟䧟傍嶺有結廬濳潭淨扵鑑聞之固欲徃乆雨濕泥濫莫陪太守車然諾豈誑賺遥遥橋上去望望馬猶站畏滑不肯行非關惜韀䪌依韻自和送詩寄潘歙州潘侯擅詩筆五色神授江世家有大勲佐舜同厖降子孫逢太平少小事書窓源流本慷慨吐論皆經邦量猶函牛鼎吾徒媿罌缸開口必典實省腹唯空腔作者過我門應笑無戰幢窮老在弊廬何異守戸狵有心希買交白璧無一雙避爲師依韻荅李獻甫蛟龍養鬐鬛當在浩浩潯虎豹飬文采當在巍巍岑我無太山高我無滄海深斗水與堆阜恐未慰此心送李逢原襧衡負其才沉沒鸚鵡洲李白負其才飄落滄江頭後亦多效此才薄空羇囚文章本濟時反不能自周吾嘗戒吾曹愼勿異爾流臧倉毁孟軻桓魋迫聖丘雖云推之天未免皇皇求吾今重子學無力薦公侯行當思吾言非教子佞柔重送李逢原歸蘇州吳客歸從楚霜華着馬蹄倦童持弊槖呼艇過寒溪寂寞區中飯依稀日午雞張儀猶舌在不必愧扵妻黄國愽遺銀魚乾二百枚乾若㑹稽笋色比荆州銀熟宜煨栗火飮助擁爐人低陰欲飛雪酒微生頰熱海上使方來多饟不爲餮三和寄潘歙州昔固聞陸海今復有潘江文章吞時英光芒瞻星降爾雅曰降婁奎婁也如㳺太室陽仰見玉女窓高才生大國試政來遠邦道傍一相顧氷壺臨瓦缸逸驥美豐肉老䍽慙瘦腔藻詠荅下俚玉鈐鏘寳幢㝷言不悟言自笑趂塊狵終知將門豪射鵰常貫雙送天台李令庭芝吾聞天台乆未見天台狀去海知幾里去天知幾丈峰嶺隱與岀喦壑背與向雲雷反在下泉瀑反在上幽深無窮窺杳眇無窮望至險可悸慄至恎可駭䘮石橋彎長弓跨絶絃未放當時白道猷平歩入靑嶂去爲六百石亦見志所尙子欲廣異聞可以一㝷訪十一月十二日賽昭亭神冷雨凝雪未成雪潭空魚寒歸石穴長篙扣穴倩鯉魚寄信山頭來奠設魚傳水鳥飛上山山大槎槎乾吹咽旋灰起角巫鼓鳴漾爼銅盤顫牲血瑟琶嘈嘈神降言福汝祐汝無災蘖西向啐飮東向廻溪心却望山崔嵬依韻和吳正仲冬至流光冉冉卽衰遲物趣廻還似轉規長景巳知今日至孤懷不比少年時阻陪上閣鴛鸞後且與南州父老期况有舂禾新酒熟百分休放手中巵施君挽歌哀鐸悽悽裏銘旌杳杳中澗雲銷繐帳山雨入蒿宮世路行來乆泉途去莫窮素吟應共葬飮韻在松風杜和州寄新醅吳正仲云家有海鮮約予携徃就酌逡廵又云幙中有㑹且罷此飮淮南寄我王醅酒白蚶海月君家有欲持就味明日期窮羹易覆巳反手從事開筵不可辭燕脂秀臉羅前後長頸善謳須賸謳只恐老來歡意休依韻荅吳正仲罷飮君辭予家傾蟻醅自有嘉味須持來青篾絡缾方岀戸紅妝侑席巳邀杯窮愁一飮猶關分側望群賢不可陪靜坐𥿄窓無所得只將文字眼前推送王景憲奉職淸羸將家子苦節自寒儒四壁我何有一錢君亦無下灘船亦急聞鴈日將晡行愛靑山口人烟事網罛讀毛祕校新詩毛公明扵詩其系宜善續前示五長篇大須傾幾曲豈特元和間欬唾成珠玉送允從上人還廬山山高雲在下諸壑藏半空千重萬重翠正望落日中不知野僧歸石徑寒易通松間無人掃隕葉如斷􅐢獨行逢莫寒衣裂溪上風依韻諸公㝷靈濟重臺梅梅要山傍水次栽非同弱柳近章臺重重葉葉花依舊歳歳年年客又來雖愛千枝競繁宻還嗟短髪已衰頽郞官愽士畱車騎擁蔽修篁爲斫開和正仲再和罷飮吳味期君強飮開楚醅因我破愁來何言合美將虛館却憶爭妍就捧杯夜霰巳先庭雪集單衣難與毳裘陪踐盟幾欲驅車去塵事無端日日堆和韻三和戲示笒箐畵蛤瓦缸醅海若淮壖各寄來將學時人闘牛飮還從上客舞娥杯蓬蒿自有蔣生樂珠翠寧容鄭氏陪莫計寒暄與風雪古來黄土北邙堆鄭康成與盧子幹同事馬融融後堂有珠翠之會康成不得預焉喜雪應祈呈權郡通判臘近冬殘雲未合江南青壠麥休肥誰將太守隨車雨一夜從風作雪飛依韻四和正仲四和還如九酘醅更醇更美未嫌來相逢莫作兩般眼一飮不辭三百杯嵇阮當時無俗慮山王雖貴亦能陪如今世態尤堪薄只把官資滿眼堆袁招飮鄭云自旦至暮三百餘杯雪朔雲生晩雨臘霰集狂風不數花多岀安知天更工漫階夜已積萬物曉初蒙誰憶新豐酒乗驢㶚水東宛陵先生集卷第四十二宛陵先生集目錄卷第四十二八月十五日夜東軒送楊辯靑州司理訪懷賢不遇㳺隱靜山路詠書席語送馬御史送李南玉代寄鴨脚子秋日家居昭亭別施度支潘歙州話廬山秋日村行吳正仲遺蛤蜊送潘歙州馬都官遺黄柑酬惠柑子懷新安潘侯自和寄潘歙州避爲師和荅獻甫送李逢原重送李逢原歸蘇州黄國愽遺銀魚乾三和寄潘歙州送天台李令賽昭亭神和吳正仲冬至施君挽歌杜和州寄新醅和荅正仲罷飮送王景憲奉職讀毛祕校新詩送允從還廬山和諸公㝷重臺梅再和正仲三和戲示嘉雪應祈四和正仲雪宛陵先生集目錄卷第四十二
