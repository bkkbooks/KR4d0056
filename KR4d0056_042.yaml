front:
  text: 宛陵先生集卷第四十二
  hash: sha256:872775972e5022f2e43099b0f2403510581c1b467c1b9d6ac0e00325cb13ac32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_042-1a}
body:
  text: 宋宛陵梅堯臣聖俞著八月十五日夜東軒隔竹巳見月清光度溪來移影上素壁與我相徘徊是夜正中秋天地霧露開人疑玉兔出藥杵不生埃嫦娥倚氷輪艷色若自媒它夕豈不好物意為之摧送楊辨青州司理儒者服褒衣氣志輕王公一落該網中折節長俯躬山東多豪士片言不可窮靑土饒嘉棗無以人鈍蒙彼知南楚輕強始必弱終矯志合其情乃是吾徒通行當問友生為我舉杯空隱靜山訪懷賢上人不遇松上垂靑蔓蒲根瀉碧泉高僧來不見却返五峰前遊隱靜山心在名山久積歲未及逰將過值風雨路不通馬牛丁壯四五人籃輿時更休轉谷逢煙火下隰多田疇偃穟黃壓畝刈麻東盈丘姑覺山門深長松如騰虬直上百餘尺蒼髯葉修修五峰迎人來冷逼臺殿秋石泉出雲中引入舍下流緣源至嵓口嵓底魚可鉤天昏碧溪去果熟青猿偷草樹不盡識自起詩人羞濺濺澗水淺苒苒菖蒲稠菖蒲花巳晚菖蒲茸尚柔靈根采九節試共野僧求逡巡能致之衰疾無甚憂昔聞有釋子渡江用杯浮棲心向茲地埋骨在林陬駁陰漏斜光徒欲窮巔幽夜還南陵郭幾落猛虎喉路詠五里十里銷磨盡千蹄萬蹄來往蹤古今不是不經歷踏破青山重復重書席語送馬御史天意漫漫物自供聞香能至是喧蜂野人割蜜不須盡留與寒脾作御冬送李南玉小人貧于資君子貧于時小人富于貨君子富于辭貧雖同寒飢富不同路𡵨彼富殁則巳此富名不移丈夫事百變未死安可期明明趨財利莫恤前人嗤舉家如春𧖟仰食不可遲况念宿債窘何愧賤士為買臣嘗負薪相如猶滌巵君思此二人信吾所不欺邇者有趙一窮憤自興詩乘驥抱美玉樂與和未知友來鮮逢遇後世無苦悲代書寄鴨腳子于都下親友豫指老無力不能苦多書書苟過百字便覺筋攣拘京都多豪英往往處石渠作書未可周寄聲亦巳踈後園有嘉果遠贈當鯉魚中雖聞尺素加餐意何如秋日家居移榻愛晴暉翛然世慮微懸蟲低復上鬪雀墮還飛相趂入寒竹自收當晚闈無人知靜景苔色照人衣昭亭別施度支昭亭送客地來往四十年常視松端日每稽潭上煙風移虎旗腳寒入牛童肩待訪名山去相期廬阜前潘歙州話廬山潘侯話廬山落落尤可伏初云江上來遠見雲中瀑捨舟到雲外觀瀑已嵓麓往往逢平田攢攢愛深木竹門懸徑微源水陰藤覆坐石浸兩骹炎膚起芒粟夕陽穿萬峰高下相出縮尋常杳不分但被煙嵐畜絶頂水底花開謝向淵腹風力豈能加日氣豈能􅫥攬之不可得滴瀝空在掬夜昏投僧寺孤燈望溪曲忽聞清磬音漸近幽林屋止侯休多談巳滿我心目懷遊二十年夢寐今固熟何當借輕舠一往如飛鶩秋日村行溪霧晝又收山村夜初晦飢禽來往飛遠樹靑紅碎原上楚牛童屋頭吳婦碓雞肥酒巳熟野老邀同輩吳正仲遺蛤蜊紫緑常為海錯珍吳鄉傳入楚鄉新樽前已奪蟹螯味當日蓴羮枉對人送潘歙州潘過宣城而送之一見新安守便若新安江洞徹物不隔演漾心所降遠指治所山已入鄰齋窗捧輿登南嶺䇿馬懷舊邦飬親將為壽傾甘抱玉缸觀軍將勞士臠肥堆羊腔下車談詩書上世擁旄幢勿窺淵遊鱗無吠夜驚尨他日聞課第天下誰能雙馬都官行之惠黃柑荔枝醋壺梁霜胡甘熟烘日荔枝美橘柚未為精葡萄安可擬郭生始能贊魏文何謬比二果皆世珍乃遺及賤士而復副醇醯或乞自諸巳豈唯享遠味終得為直矣郭璞贊云厥包橘柚精者唯甘魏文帝記云南方龍眼荔枝寧比西國葡萄石蜜前以柑子詩酬行之既食乃緑橘也頃年襄陽人遺柑豫辨是録橘今反自笑之昔辨荆州誤今為越叟迷黃柑與緑橘正似碔玞圭新安潘侯將行約遊山門寺豫以濘淖遂止因為詩以見懷蒼山自為門呀豁生鐫鑱路通石壁盡潦起田穟陷傍嶺有結廬濳潭淨于鑑聞之固欲往久雨濕泥濫莫陪太守車然諾豈誑賺遙遙橋上去望望馬猶站畏滑不肯行非關惜韀䪌依韻自和送詩寄潘歙州潘侯擅詩筆五色神授江世家有大勳佐舜同厖降子孫逢太平少小事書窗源流本慷慨吐論皆經邦量猶函牛鼎吾徒愧罌缸開口必典實省腹唯空腔作者過我門應笑無戰幢窮老在弊廬何異守戶尨有心希買交白璧無一雙避為師依韻答李獻甫蛟龍養鬐鬛當在浩浩潯虎豹飬文采當在巍巍岑我無太山高我無滄海深斗水與堆阜恐未慰此心送李逢原襧衡負其才沉沒鸚鵡洲李白負其才飄落滄江頭後亦多效此才薄空羇囚文章本濟時反不能自周吾嘗戒吾曹愼勿異爾流臧倉毁孟軻桓魋迫聖丘雖云推之天未免皇皇求吾今重子學無力薦公侯行當思吾言非教子佞柔重送李逢原歸蘇州吳客歸從楚霜華著馬蹄倦童持弊槖呼艇過寒溪寂寞區中飯依稀日午雞張儀猶舌在不必愧于妻黃國博遺銀魚乾二百枚乾若會稽笋色比荆州銀熟宜煨栗火飮助擁爐人低陰欲飛雪酒微生頰熱海上使方來多餉不為餮三和寄潘歙州昔固聞陸海今復有潘江文章吞時英光芒瞻星降爾雅曰降婁奎婁也如遊太室陽仰見玉女窗高才生大國試政來遠邦道傍一相顧氷壺臨瓦缸逸驥美豐肉老䍽慙瘦腔藻詠答下俚玉鈐鏘寶幢尋言不悟言自笑趂塊尨終知將門豪射雕常貫雙送天台李令庭芝吾聞天台久未見天台狀去海知幾里去天知幾丈峰嶺隱與出巖壑背與向雲雷反在下泉瀑反在上幽深無窮窺杳眇無窮望至險可悸栗至恎可駭喪石橋彎長弓跨絶絃未放當時白道猷平步入靑嶂去為六百石亦見志所尚子欲廣異聞可以一尋訪十一月十二日賽昭亭神冷雨凝雪未成雪潭空魚寒歸石穴長篙扣穴倩鯉魚寄信山頭來奠設魚傳水鳥飛上山山大槎槎乾吹咽旋灰起角巫鼓鳴漾爼銅盤顫牲血瑟琶嘈嘈神降言福汝祐汝無災蘖西向啐飮東向回溪心却望山崔嵬依韻和吳正仲冬至流光冉冉即衰遲物趣回還似轉規長景巳知今日至孤懷不比少年時阻陪上閣鴛鸞後且與南州父老期况有舂禾新酒熟百分休放手中巵施君挽歌哀鐸悽悽裏銘旌杳杳中澗雲銷繐帳山雨入蒿宮世路行來久泉途去莫窮素吟應共葬飮韻在松風杜和州寄新醅吳正仲云家有海鮮約豫携往就酌逡巡又云幕中有會且罷此飮淮南寄我王醅酒白蚶海月君家有欲持就味明日期窮羹易覆巳反手從事開筵不可辭燕脂秀臉羅前後長頸善謳須賸謳只恐老來歡意休依韻答吳正仲罷飮君辭豫家傾蟻醅自有嘉味須持來青篾絡瓶方出戶紅妝侑席巳邀杯窮愁一飮猶關分側望群賢不可陪靜坐𥿄窗無所得只將文字眼前推送王景憲奉職淸羸將家子苦節自寒儒四壁我何有一錢君亦無下灘船亦急聞鴈日將晡行愛靑山口人煙事網罛讀毛祕校新詩毛公明于詩其系宜善續前示五長篇大須傾幾曲豈特元和間咳唾成珠玉送允從上人還廬山山高雲在下諸壑藏半空千重萬重翠正望落日中不知野僧歸石徑寒易通松間無人掃隕葉如斷􅐢獨行逢莫寒衣裂溪上風依韻諸公尋靈濟重臺梅梅要山傍水次栽非同弱柳近章臺重重葉葉花依舊歲歲年年客又來雖愛千枝競繁密還嗟短髮已衰頽郎官博士留車騎擁蔽修篁為斫開和正仲再和罷飮吳味期君強飮開楚醅因我破愁來何言合美將虛館却憶爭妍就捧杯夜霰巳先庭雪集單衣難與毳裘陪踐盟幾欲驅車去塵事無端日日堆和韻三和戲示笒箐畫蛤瓦缸醅海若淮壖各寄來將學時人鬪牛飮還從上客舞娥杯蓬蒿自有蔣生樂珠翠寧容鄭氏陪莫計寒暄與風雪古來黃土北邙堆鄭康成與盧子幹同事馬融融後堂有珠翠之會康成不得預焉喜雪應祈呈權郡通判臘近冬殘雲未合江南青壠麥休肥誰將太守隨車雨一夜從風作雪飛依韻四和正仲四和還如九酘醅更醇更美未嫌來相逢莫作兩般眼一飮不辭三百杯嵇阮當時無俗慮山王雖貴亦能陪如今世態尤堪薄只把官資滿眼堆袁招飮鄭云自旦至暮三百餘杯雪朔雲生晚雨臘霰集狂風不數花多出安知天更工漫階夜已積萬物曉初蒙誰憶新豐酒乘驢灞水東宛陵先生集卷第四十二宛陵先生集目録卷第四十二八月十五日夜東軒送楊辨靑州司理訪懷賢不遇遊隱靜山路詠書席語送馬御史送李南玉代寄鴨腳子秋日家居昭亭別施度支潘歙州話廬山秋日村行吳正仲遺蛤蜊送潘歙州馬都官遺黃柑酬惠柑子懷新安潘侯自和寄潘歙州避為師和答獻甫送李逢原重送李逢原歸蘇州黃國博遺銀魚乾三和寄潘歙州送天台李令賽昭亭神和吳正仲冬至施君挽歌杜和州寄新醅和答正仲罷飮送王景憲奉職讀毛祕校新詩送允從還廬山和諸公尋重臺梅再和正仲三和戲示嘉雪應祈四和正仲雪宛陵先生集目録卷第四十二
