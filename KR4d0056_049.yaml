front:
  text: 宛陵先生集卷第四十九
  hash: sha256:6ee71cdaecd4afbeed5307a933c044c64a0efd7c6e2a6546f3d060bff4e04282
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_049-1a}
body:
  text: 宋宛陵梅堯臣聖俞著寄題絳守園池老柏麝不食古色侵靑冥淺沼龍不入秋水生浮萍屋屢圬堊幾太守壁上彪蔚遺丹靑黑石鐫辭澀如棘今昔往來人不識酸睛欲抉無聲形既不可問不可聽懸泉瀉竇晝未停飛玉貯藍光入屏苞潭梁島甲癸丁蔓刺交綴垂組綎蒼官屭槐朋在庭風蟲日鳥聲嚶嚀卉葩木果粘枝條集臺脫熱昏痾醒文韓詩怪若是徑取一二傳優伶仍寄河東薛太守更與斟酌無間扃陸子履見過劉郎謫去十年歸長樂鐘聲下太微屈指故人無曩日平明騎馬扣吾扉論情論舊彈冠少多病多愁飮酒稀猶喜醉翁時一見攀炎附熱莫相譏重送周都官水上朱樓畫角鳴濛濛雨裏榜舟輕未逢甫里先生謁多見吳興太守迎荷葉半黃蓮子老霜苞微緑橘林明十年不到風煙改君去將詩與畫評送李載之殿丞赴海州榷務瓜蔓水生風雨多吳船發棹唱吳歌槎從秋漢下應快人憶故園歸奈何世事靜思同轉轂物華催老劇飛梭茶官到有淸間味海月團團入酒螺和吳沖卿學士石屏吳夫子佩銀龜乘天馬素怪竒忽得虢略一片石其中白色圎如規又有樹與烏畫手雖妙何能為吳乃持問歐陽公比公曩獲尤可疑疑不為辨賦以詩詩辭粲粲明星垂復遣賫來使我和坐上巨公傍睨之范侯實有楊雄學咸云此理難究推我歸滌慮反覆思義雖不經聊解頥月與太陽合朔時陽烏飛上桂樹枝枝上作窠生羣兒人不知天公天公欲俾世間見影著石靣如粘黐烏既不得去月亦不可移留為千古作好玩愼勿傾朴同玉碑時在唐書局與歐陽永叔王原叔范景仁會食得所示詩永叔贈絹二十匹鳯凰拔羽覆鶉鷃鶉鷃幸脫僵蒿蓬昔公處貧我同困我無金玉可助公今公既貴我尚窘公有縑帛周我窮古來朋儕義亦少子貢不顧顔淵空復聞韓孟最相善身仆道路哀妻僮生前曾未獲一飽徒説吟響如秋蟲自驚此贈已過足外可畢嫁內禦冬况無杜甫海圖坼天吳且免在褐躬瘦兒兩脛不赤凍病婦十指休補縫厨中餒婢喜有望服鮮棄垢必所蒙梁上君子切莫下吾非陳實何爾容依韻奉和永叔感興五首泉上有君子齋祠逹主誠向來霖雨暴觸處蛟鼉鳴既祈致日出杲杲紓民情天子遣以報固匪媚取名因成感興章庶用語平生蹈道久巳熟情田不須耕既負天下望必憂天下責每聞諌諍辭苦意多矯激心存義勇赤氣與虹霓白所論言必從豈若水投石隂邪日巳銷事理頗巳得莫將經濟術抑鬱向胸臆勿驚年齒遲勿歎時節晚寒松翳林麓射干生隴坂野蓬隨飄飄秋實綴纂纂萬物更盛衰有益必有損損益皆自然曷增鳬脛短人為智慮役白髮安得免利澤欲及時唯恐不行逺後世豈皆愚計校徒勉勉日出各馳趨皆為利所迫秋蟲至微物役役網自織古來高世人林下遺憂責扛鼎絶臏者乃自恃以力積金苟如山何異魚貪食唧唧復唧唧長沙何太息秋風入破衣瘦婦思補刺手中把長線無帛縫不得夜夜憂向寒斗柄漸垂北嫁夫欲夫富歡樂要終極歡樂既未能鬢髮霜花易依韻奉和永叔社日玉卵不吞龍嗜肉燕子成兒去華屋老櫪半黃田鼓鳴樹下宰平誰似玉茂陵常説泣秋風王母惜傳雙鬢緑東方伏日思早歸長飢不及侏儒腹獖豕新烹白醪熟奮衣地坐無拘束驪山夜寒坑底哭漫把􅃮書留冡竹社日飲永叔家雨未雨濛濛野田擊鼓賽社翁折條跨馬社翁去醉叟卧倒梨葉紅鼇頭主人邀客飮玉酒新賜蓬萊宫彭宣不預後堂會康成一舉三百鍾更邀明月出海底爛醉等是歸蒿蓬弔仲源世家吳季子皇籍漢諸孫嘒管行車失虛堂隱几存枝摧從玉樹星隕自天垣寧復下貧賤停驂來里門送梁學士知襄州騎吹荆州去喬林漢水前鄉亭逢故老牛酒問高年翠巘臨關路黃柑逐賈船習家池館在賔從與留連送薛氏婦歸絳州在家朂爾勤女功無不喜既嫁訓爾恭恭已乃逺耻我家本素風百事無有侈隨宜具奩箱不陋復不鄙當須記母言夜寐仍夙起愼勿窺窗戶愼勿輒笑毀妄非勿較競醜語勿辨理每順舅姑心况逆舅姑耳為婦若此能乃是儒家子看爾十九年門閫未嘗履一朝陟太行悲傷黃河水車徒望何處哭泣動鄰里生女不如男天親反由彼送劉繼鄴秀才歸當塗鵷雛始出巢欲矜五色羽乃見郡鴟盤壤中將有取梧桐與竹實安得在平土所趣固巳殊而何不逺舉幸失網羅目冝還蘭蕙圃故鄉有嘉林其下可以處會侍朝陽鳴賀夔成律吕送裴如晦宰吳江吳江田有粳粳香春作雪吳江下有鱸鱸肥膾堪切炊粳調橙虀飽食不為餮月從洞庭來光映寒湖凸長橋坐虹背衣濕霜未結四顧無纎雲魚跳明鏡裂誰能與子同去若秋鷹掣送撫州通判袁世弼寺丞帆疏疏纎緑蒲二十四幅輕江湖高秋逆水上天去朝過瓜步暮濡須長風沙頭問鯉魚大孤山側鳴寒烏魚腹無書報家信慿烏為到西山區西山松柏應更好及取之官來拜掃送石昌言舍人使胸奴燕然山北大單于漢家皇帝與璽書持書大夫腰金魚飛龍借馬出國都胡沙九月草已枯草上霜花如五銖白裘貂帽著不暖莽莽黃塵車欵欵野廬邊月出隴來風靜天遙鴈聲短聞到罽庭尤苦寒譯言揉耳不譏彈公於是時已觀禮踏雪再拜辭可汗依韻和宋中道觀八月二十八日車駕朝謁景靈宫都人夾望禁槐傍閶闔初來旭日光雕玉翠鞍牽騕裊盤龍朱輦爛文章焚香閟殿開嚴帳汲水寒溝灑廣莊一見天顏萬人喜却回宫禁樂聲長度支蘇才翁挽詞三首子美同葬二十識君貌交遊非一朝魄光沉碧海志業隕靑霄洛客舊為社楚人今作招素車京峴路應不似嶣嶤盛世雖多士唯公與衆殊高才飛健鶻逸句吐明珠未入周官采爭持楚璞模莫悲泉骨朽靑史見賢愚自昔愛春物鐏深眼底紅日斜花在落身醉客西東殁歎千年隔生悲百事空君嘗知此理不誤學陶公重送袁世弼臨川內史謝康樂貝葉翻經有故臺春草生塘猶夢句秋蕖出水似君才驐雞肥脆聊供膳篘酒甘濃可薦杯亦説右軍遺迹在墨池科斗喜風雷留題景德寺吉祥講僧我講異爾講我書非爾書彼將希白馬此亦猶大車皆行國都內轍不入委閭世人日擾擾來慕淸涼居閣門水朝堂嘉祐元年九月九日宿齋歐陽永叔張叔之孫之翰命賦宫井固非一獨傳甘與淸釀成光祿酒調作太官羮上舍鋹瓶貯齋廬玉茗烹相如方病渴空聽轆轤聲朝堂宿齋玉屬陪祠日宮廬寓宿時鐘來建章逺月過羽林遲寒入淸綾被風牽翠鳯旗賈生誰復召安問鬼神為送杜挺之郎中知虔州大庾嶺邉無臘雪惟有梅花與明月月光如水來向人太守得間杯耳熱吹香入酒望梁宋正是苦寒綿可折亦當念君君行南南方無冰地不裂此身不到五侯門肥羔釀酒槐槽咽玉色少年生頰春解笑吟腸冷如鐵衝風冒霰入廣文老與諸生開反切重嗟君逺隔江湖雖得豐甘牙巳缺官娥執樂一千指修頸慢肌衣錯纈定逢賓客強排娖舞徹六么紅袖掣人競羡君君愈疲夜歸坐閣思豫説送吳辨叔知鞏縣言為西邑宰本是洛陽人送驛往歸魏迎車來入秦山川成鞏固陵廟壯威神好學河陽政栽花作縣春當世家觀畫氷𧖟吐絲織纎紈妙娥貌入聲玉輕邯鄲曲眉淺臉鴉髮盤白角瑩薄垂肩冠銅青羅衫日月團紅裙撮暈朝霞乾手中把筆書小字字以通情形以觀形隨畫去能長好歲歲年年應不老相逢熟識眼生春重伴忘憂作萱草送韓簽判玉汝還南京時賀太禮表天子甘泉祀歡聲浹九圍緑童馳騎入朱服佩魚歸賦雪上賓席買鬟更舞衣清池無限鴈莫道信音稀宛陵先生集卷第四十九宛陵先生集目録卷第四十九寄題絳守園池陸子履見過重送周都官送李殿丞榷務和吳學士石屏永叔贈絹奉和永叔感興奉和永叔社日社日飮永叔家觀長星送李學士知卭州弔仲源送梁學士知襄州送薛氏婦歸絳州送劉秀才歸當塗送裴如晦宰吳江送袁寺丞撫倅送石舍人使胸奴和中道觀駕蘇度支挽詞重送袁世弼留題景德寺講僧閣門水朝堂宿齋送杜郎中知虔州送吳辨叔知鞏縣當世家觀畫送玉汝還南京目録終
