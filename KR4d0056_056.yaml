front:
  text: 宛陵先生集卷第五十六
  hash: sha256:bb2d2146c8db5bb93318626611159306731cc8e4955a44e26c5a0e5f84beac72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_056-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送謝師厚太博通判汾州嚬官吳越飽稉稲况住南陽多水田北登太行入汾曲正獲𥝧稏秋風前晉人朴厚自寡訟軟炊玉粒河鱗鮮君方少壯齒頰徤甘美不負經腹便有意南飛寄我信滿川鳴鴈下連連依韻和永叔都亭館伴戲寄去年鏁宿得聮華二月墻頭始見花今日都亭公感物明朝太學我辭家送李君錫學士使契丹弔慰昨日匈奴來告哀殿門不識桃花開今聞君去作弔使正值鴈嘷從北廻風捲黃雲無逺近山留白雪猶枯荄歸㸔車馬汗流沫逃暑爲傳河朔杯送邵裔長洲主簿姑蘇城頭烏哺時長洲草緑春袍歸魯桑葉小蠶出遲吳田水暖牛耕肥里胥爭迎縣寮喜入門先自易綵衣拜親然後及王事簿書豈得長相鞿送薛公期比部歸絳州展墓風雨梨花殘松栢墓門晚嗣子千里駒羊腸九折坂春裘不畏寒行路未爲逺舊來河内守父老將衣挽送次道學士知太平州因寄曾子固春浦楊花撩亂飛春江魮魚來正肥采石新林兒女去茭白蒲牙艇子歸歸令煮魚不得熟巳望使君船上磯上磯亦不待潮應爭牽篾纜泥汚衣姑熟溪頭搥大皷紅抺靴刀趨俯僂牙兵可擬岸傍蘆森森甲立雄南土更得西州謝法曹新詠定多傳樂府依韻和劉原甫舍人楊州五題時㑹堂二首歲貢蜀岡茶似蒙頂茶能除疾延年今年太守采茶來驟雨千門禁火開一意愛君思去疾不縁時㑹此中杯雨發雷塘不起塵蜀崑岡上暖先春煙牙才吐朱輪出向此親封御餅新竹西亭結雨竹西若若川楊州歌吹思當年劉郞若向風前唱夢入青樓事罔然春貢亭夢谷浮船穩且平泊登岡頂看茶生始從官屬二三軰時聽春禽一兩聲蒙谷茗園葱倩與山籠一夜春雷發舊叢五馬留連未能去土囊深處路微通崑丘寺卽煬帝離宫隋家宮殿昔初成不道荒凉獸迹行今日知來高處望山川興廢使人驚送江隂簽判眺太祝去無珠履爲上賓進船申浦憶春申江田挿秧鵓姑雨絲網得魚雲毋鱗青天折桂香未滅紫豉煑蒓甘更新平時况可樂風月吳物信美聊前陳送眺質夫太丞知深州蕪蔞問古亭春入饒陽城豆粥君王逺壺漿刺史迎地凉宜牧馬塞近慣調兵爲寄井泉石老來思目明送少卿知宣州先歸霅上汴水清明下宣城太守行鴨頭吳蕩緑燕尾楚船輕族本三陽重詩從小謝清州民還最喜門下舊通名送朱表臣職方提舉運鹽蜃竈煑溟㴾航醎播楚越官榷利言盈盗販弊相汨連艘以轉致攪灰或沉沒雖使日鞭黥未易窮姦窟朝廷用朱侯提職欲無闕侯因許專畫拜跪陳其說曰臣有更張敢以肝膽竭荆湘嶺下城恃逺不畏罰堂堂事私賈遮吏遭驅突願使商自通輸金無暴猝淮江且循常約束備本末國用必餘資亭民無滯物事下丞相府論議不可㧞從之東南蘇拒之財賦遏聽侯侯徃施所便黔黎活五味旣和調萬里銷狂悖汴水桃花時犀舟順流發過淮逢絮魮泊岸採蘆蕨挂帆趨浪頭應不勞歲月依韻和李君錫學士北使見寄行色見車馬爲之具壺觴暫辭丼泉宮逺奉左賢王蒙茸春裘薄匼匝金絡光唯知君命重不數沙路長魯酒雖入脣胡笳易廻腸歸來立螭頭言動書不忘送張山甫秘校歸緱氏去年來折桂今年來娶婦得意春風前還家寒食後蓬巷閙雞犬藤花䕃井臼緱山白醪醇重酌高堂壽送江東轉運楊少卿世言楚使者乃是漢名卿曾是察黃綬但能勤列城江山無改故草樹幾更榮有意息民甚不同求羡盈宜春宴射篇李駙馬請賦雜言風雨未過桐華時宜春苑中棃蕚披天子賜宴羣臣嬉少年都尉方追隨暮歸遲喜聮留後兄弟䨇弓射熊皮侯宗戚族坐上少伯仲相顧驚恩私鳯皇樓高玉簫吹金絡駮馬不肯騎自戒危溢作後規何郎莫媿書與詩送王樂道太丞相如旣擊劒仲宣亦從軍二人當其時皆以能賦聞韓公守武垣犀兵若屯雲幄中欲寄畫才智莫有君請之天子所朝奏夕離羣爲沽斗酒飮爲買赤鯉焚魚盡酒亦盡醉起衣袂分送楚屯田知扶溝客亭多少路花信幾畨風折柳贈新翠種桃思舊紅淵明節巳異潘岳趣還同政治有餘力歸來辭賦工吕山人同荆供奉見過街上春泥踏始開山人忽同供奉來老奴行遲報我晚怒氣欲㧞庭中槐聞說道心調伏乆等閑休要起嫌猜觀劉元忠小鬟舞桃小未開春意濃稍頭緑葉映微紅君家歌管相催急枝弱不勝花信風次韻奉和永叔謝王尚書惠牡丹大梁有公子洛陽有游俠昔時意氣相慿陵不問興亡事栽挿栽紅挿緑闘青春春風與開春雨䬃兩都富貴不相殊走馬㝷芳何合雜只聞年少競爭先摘葉嗅花身更捷安知遺愛舊留守馳獻百葩心浥浥尚書最重歐陽公盈盤分去蜂偷獵但能爲樂飮醇酒何必署名黃𥿄牒翰林職清文字稀不比外官煩應接曩公爲花曾作譜端相用意隨蝴蝶擬王擬妃姚與魏歲歲年年千萬葉還將顔色定高低緑珠雖美猶爲妾從來鑒裁主端正不藉娉婷削肩脾舊品旣著新品增偏惡妬芽湏打拉嘗憶同朋有七人毎失一人淚縁睫唯我與公今且存無復名園共携榼公因尚書戴紅紫白髪欺公生匼匝磨墨揮毫興不衰作詩坐使劉曹怯副本能傳幸一觀口誦舌搖徒囁囁送王郎中知江隂持歸漢省青綾被去看吳都白馬潮疊皷渡江寒浪伏鳴鐃入境野雲飄魚穿楊柳誇鮮膾人采芙蓉學細腰家有二槐爲太守弟兄誰似李文饒送閻仲孚郞中南游山水蜀山難於上青天聞之李白爲舊傳蜀客徃返曾又然奇峰又與三峽連巫陽神女暮爲雨飛入楚臺王夢􅏧相如楊雄不道此宋玉景差其賦偏西州才子邯鄲守懷章徃代尚踰年家住岷峨多此宦乗閑因借下江船未浮洞庭沅湘去還探禹穴希馬遷春申樓觀巳不見子胥怒濤猶滿川錢塘太守同鄕里一見君來顔巳喜甘饌香脆與君游詩貯篋囊携不起浣沙溪頭西子家自㝷錦石菖蒲花掃歸成都與士誇君平曾巳悟星槎次韻和永叔嘗新茶雜言自從陸羽生人間人間相學事春茶當時採摘未甚盛或有高士燒竹煑泉爲世誇入山乗露掇嫰觜林下不畏虎與虵近年建安所出勝天下貴賤求呀呀東溪北苑供御餘王家葉家長白芽造成小餅若帶銙闘浮闘色頂夷華味丼廻甘竟日在不比苦硬令舌窊此等莫與北俗道只解白土和脂麻歐陽翰林最别識品第高下無欹斜晴明開軒碾雪末衆客共賞皆稱嘉建安太守置書角青翦包封來海涯清明纔過巳到此正是洛陽人寄花兎毛紫盞自相稱清泉不必求蝦蟇石缾煎湯銀梗打粟粒鋪靣人驚嗟詩腸乆饑不禁力一啜入腹鳴咿哇次韻和再拜建溪茗株成大樹頗殊楚越所種茶先春喊山搯白蕚亦異鳥觜蜀客誇烹新闘硬要咬盞不同飮酒爭畫虵從揉至碾用盡力只取勝負相笑呀誰傳䨇井與日注終是品格稱草芽歐陽翰林百事得精妙官職况巳登清華昔得隴西大銅碾碾多歲乆深且窊昨日寄來新臠片包以蒻纒以麻唯能䞉啜任腹冷幸免酩酊冠弁斜人言飮多頭顫挑自欲清醒氣味嘉此病雖得優醉者醉來顛踣禍莫涯不願清風生兩腋但願對竹兼對花還思退之在南方嘗說稍稍能㗖蟇古之賢人尚若此我今貧陋休相嗟公不遺舊許頻徃何必絲管喧咬哇送許當職方通判泉州乳烏不逺飛乳獸不逺游異類尚有戀人獨安所求許侯恰爲郡乃甘貳一州得以奉䨇親時物供膳羞竹箭水順疾紅旗挿歸舟歸舟莫苦急睢陽多舊儔丞相正喜士樽酒應爲留清源六千里到日魚蟹秋宛陵先生集卷第五十六宛陵先生集目録卷第五十六送分倅謝太博和永叔都亭舘伴送李學士契丹奠慰送長洲邵簿送薛比部送次道學士知太平和原甫楊州五題送江隂眺太祝送提舉朱職方送眺太丞知深州送少卿知宣州和李學士北使見寄送張秘校歸緱氏送江東楊轉運宜春宴射篇送王太丞􅌡州辟送楚屯田知扶溝吕山人同荆供奉觀元忠小鬟舞次韻奉和永叔送王郎中知江隂送閻郎中游山水次韻和永叔嘗新茶次韻再和送泉倅許職方目録終
