front:
  text: 宛陵先生集卷第五十五
  hash: sha256:474d3ddd8ed88f9ee55a72cc5df8eebc98be3eb7483bda2610691d729f7a632a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_055-1a}
body:
  text: 宋宛陵梅堯臣聖俞著依韻和池守王微之訪别君榮初出守我老未東歸病眼生花早蒼毛似葉稀徃還從更少談笑暫相依不及秋鴻翼能隨向楚飛寄題資州錢固秀才道勝堂醮壇舊山下高卧一儒生有室羅經籍無心取組纓芋肥收歲計柑熟􅎥霜晴暫向京都見添書入蜀城送黃國博知撫州緘逆水乗風上蒲帆滿挂檣日行知幾里江渺不分疆宿浦隨潮入逢人問路長臨川十萬戸勸勞執壺漿觀韓玉汝胡人貢奉圖時世重古不重新破圖誰畵舊胡人臂鷹捧盤犀利水鐵鎻獅子同麒麟翹翹雉尾挿頭上深目鉅鼻青搭巾塗朱點緑筆畫大筋骨怒露蠻祠神茜袍白馬韓公子從何得此來秘珍定應海客逺爲贈中國未覩難擬倫公子自言吳生筆吳筆精勁痩且勻我恐非是不敢贊退歸書此任從嗔送韓文饒贊善宰河南退之曾作河南宰韓氏于今又見君縣政從來人有望家聲不墜世多文後池分洛貯藍水高檻看嵩迷嶺雲主簿堂前七葉樹手栽應莫巳刳焚送刁秘校授漣水主簿歸四明省親桂得嫦娥枝婦得黃姑女直歸東海頭翁嫗笑相語何當却之官古縣入平楚莫嫌簿書繁百事由區處依韻和永叔戲作琵琶轉撥聲繁促學作饑禽啄寒木木蠧生蟲細穴深長啄歊鑑未充腹攏弦疊響入衆耳發自深林答空谷上弦急逼下弦清正如螳螂捕蟬聲坐中賔歡呼酒飲門外客疑將欲行主人語客客莫去彈到古樹裂丁丁内賔外客曾未聽乍聞此曲無不驚還憶昭君入胡虜烏孫帳下邊馬鳴安知如今有樂事能使女奚飛玉觥女奚年小殊流俗十月單衣體生粟言事關西楊廣文廣文空腹貪教曲曲竒譜新偷法部妙在取音時轉軸翰林先生多所知又笑畫圗收滿屋不肯那錢買珠翠任從堆挿堦前菊功曹時借乃許出他日求觀龜殻縮我嗟老鈍不如渠幸得交朋時借娯但樂休計有與無送吳仲庶殿院使北漢朝重結單于好歲遣名臣禮數增紫䑕皮裘從去着飛龍廐馬借來乗天寒將遇磧中雪鼻息暗添髭上冰定見南鴻起歸思家書欲寄不堪慿送吕沖之司諫使北虜人多竊朝廷禮譯者交傳應對辭羊酪調羮尊漢使氊堂舉酒見閼氏曚曚白日穿雲出漭漭黃沙作霧吹知去燕京幾千里胡笳亂動月明時送孫隱之都官通判秀州柳條初落盡不拆意徘徊泛汴趨殘水到吳看早梅無耽聽鶴淚有信寄鴻來聞說閭亭改靈光化劫灰依韻和王平甫見寄兄爲太守兩輪朱仲泛吳人燕尾艫且看洞庭多橘柚莫懷江國有枌榆少遊山水殊非俗老愛詩書又似愚百事輸君休問我風沙不比在雲湖得王介甫常州書斜封一幅竹膜𥿄上有文字十七行字如痩棘攅黑刺文如温玉爛虹光别時春風吹榆筴及此巳變蒹葭霜道途與弟奉親樂後各失子懷悲傷到郡紛然因事物舊守數易承蔽藏捜姦證􅓎若治絮蚤虱盡去煩㸑湯事成條舉作書尺不肯勞人魚腹將魚沉魚浮任所適偶能及我爲非常勤勤問我詩小傳國風纔畢葛屨章昔時許我到聖處且避俗子多形相未卽寄去慎勿怪他時不惜傾箱囊知君亦欲此從事君智自可施廟堂何故區區守黃卷蠧魚尚耻親芸香我今正值鴈南翔報書與君倒肺腸直湏趂此筋力强炊粳烹鱸加桂薑洞庭緑橘包甘漿舊楚黃橙線作瓤東山故游携舞娘不飮學舉黃金觴谿如罨畵水泱泱刺船靜入白鷺傍菱葉巳枯鏡靣凉月色飛上白石牀坐看魚躍散星芒左右寂寂夜何長烏棲古曲傳吳王千年萬年歌未央莫作腐儒針膏盲莫作徤吏繩餓狼儻如龔遂勸農桑儻如黃覇致鳯皇來不來亦莫愛嘉祥司馬君實遺甘草杖美草將爲杖孤生馬嶺危難從荷蓧叟寧入化龍陂去與秦人采來扶楚客衰藥中稱國老我懶豈能醫逢雷太簡殿丞長安初見君君頷微有鬚後於河内逢秀峻美髯胡又㑹在桐鄕談詩多孟盧學書得天然鐘王不能奴荏苒三十載邂逅遇京都朝接北扉飯暮應西垣呼坐中如夢寐相語故人無昔由處士召胸懷開廟謨今看髭巳白議論耻非夫拜章陳時事皆與相意符其識固不淺其用當亦殊人多惜老大我復歎覉孤終朝重相笑爲君傾酒壺雷太簡遺蜀鞭蜀道山之峭壁兮如快刀一削平無痕其間春雷驚龍走竹根迸石垂虺尾骨節痩宻風霜吞野夫采之縋懸蔓分寸脫死持還奔他人不可得此物乃重太守公侯孫獻來一錢不肯要只吃斗酒抱歸村太守立性豈謟貴將贈故人唯義存我騎痩馬固莫稱破韀爛轡沙塵昬明日試執趨君門孰不怪視竊笑言得雷大簡自製蒙頂茶陸羽舊茶經一意重蒙頂比來唯建溪團片敵湯餅顧渚及陽羡又復下越茗近來江國人鷹爪夸䨇井凡今天下品非此不覽省獨荈乆無味聲名謾馳騁因雷與改造帶露摘牙頴自煮至揉焙入碾只俄頃湯嫰乳花浮香新舌丼永初分翰林公豈數博士冷醉來不知惜悔許巳向醒重思朋友義果决在勇猛倐然乃以贈蠟囊收細梗吁嗟茗與鞭二物誠不幸我貧事事無得之似贅癭送吕寺丞希彥邠州僉判自有仲宣樂從軍仍近親關河歷周鄭風雪過咸秦原上方驅馬鞍傍忽起鶉世家傳釣玉重問渭川濵送施司封福建提刑命使得才臣欽刑聖主仁銅苗休問發田種去教親白茗出溪上紅焦連海濵輕車莫道逺詔意重生民江鄰幾暫來相見去後戲寄低頭拜我蒼髯翁來如飛鳥去如風一夕共飮斗柄北平明巳向函關東衆中舊騎跛鼈馬塞下新買連錢騘疾驅似逐鄧林日不肯暫住行何窮送徐無黨歸婺州吳蠶吐柔絲越女織美紈機杼固巳勤刀尺誠獨難裁縫失分寸長短爲損殘嘗聞仲山甫能補帝衮完衮完民衣足天下無苦寒徐從信都學染翦宜弃冠彼實山甫徒爾亦非綷剜東歸道自勝人誰故時看依韻和永叔内翰酬寄楊州劉原甫舍人東望淮海間恨無鴻鵠羽鴻鵠日巳飛風雪歲將暮憶聽談老莊逹生無恐懼我今齒髪踈何異樹有蠧辭别不必道俛仰巳成故書問雖惟爲夢寐則徃屢乗桴思仲尼好勇慙季路願希隆中卧不是邀三顧二公廊廟才酬寄封尺素臯䕫乆相稱舜禹時巳遇舉杯向明月此意聊可寓和韓欽聖學士襄陽聞喜亭亭欄下望漢江水淨緑無風寫鏡明日脚穿雲射洲影槎頭擺子出潭聲檣帆落處逺鄕思砧杵動時歸客情使者徘徊有佳興高吟不減謝宣城許仲途屯田以新詩見訪許氏世工詩渾棠格力微獨能兼古律無不是珠璣捧卷光蓬室停車照竹扉陽春復高調自昔和人稀答祖擇之惠黃雀鮓李白勸爾莫逐炎洲翠亦莫近吳宮燕爾不聽此言禍患今乃見吳火時雖無越羅日生變空知稻粱肥豈悟盃盤薦我不聞爾聲謬成先生饌咀嚼勿言非雉鴈猶充饍覽顯忠上人詩昔讀逺公傳頗聞高行僧廬山將欲雪瀑布結成冰㝷跡數百載歷危千萬層師來笑賈島只解詠嘉陵依韻和吳長文舍人􅍟雪懷永叔内翰紫禁低雲拂綺櫳西垣人憶玉堂翁撚髭覔句方傳詠着樹成花尚舞空不管因風吹塞外任教飛片落杯中曉來城郭遮無路阮藉驅車莫歎窮送王巖夫秘校通判滑州昔聞信都侯嘗作畵舫齋空戸兩向闢罇席長對排左顧樹若岸右盼堵成崖旣無風波虞但與物景諧一從信都去來者趣意乖屋室改庫廐花木爲薪柴君當訪其蹟更葺安舊牌記石儻尚在塵土加洗楷然後釀井泉吟醉前人偕寄言靈河守高此别乗懷和宋次道答弟中道寄懷陸家兄弟苦西東黃耳傳書近巳通共歎流年同轉轂各驚華髮似飛蓬河冰夜合知霜勁塞霧朝開見日紅臘盡春來又相逺江南江北望歸鴻元日閤門拜表遇雪呈永叔六花隨表拜東廂庭下遙呼萬歲長王㑹圗中陳璧馬漢官儀裏濕旂常因風亂絮霑螭首似鵠輕毛落井床素髮垂冠少顔色衆人休笑老爲郎王樂道太丞立春早朝近臣頭上黃金勝殿前拜賜東風應􅖋牙䟽甲蔟春盤肉抹長絲何亘亘寛衣武卒轝至庭人歸下筯殊難稱我家無火甑生塵㡜柳綵花空着興空着興將底爲但願得米資晨炊不管飛霙與麥宜千官隊中身最卑五日一謁前旒垂上元夕有懷韓子華閣老一歲老一歲新年思舊年東樓嘗共望九陌聽爭先白髪更中笑舞姝應轉妍追隨都巳倦强對月明前錢君倚學士日本刀日本大刀色青熒魚皮帖欛沙點星東胡腰鞘過滄海舶帆落越棲灣汀賣珠入市盡明月解絛換酒瑠璃缾當壚重貨不重寶滿貫穿銅去求好㑹稽上吏新得名始將傳玩恨不早歸來天䘵示明游光芒曾射扶桑島坐中燭明魑撇遯吕䖍不見王祥老古者文事必武備今人襃衣何足道干將太阿世上無拂拭共觀休懊惱依韻和杭州梅龍圗入淮見寄東都車馬苦飛霾南國桅帆喜過淮船背挿旗風自展沙頭迎浪雪相排白魚巳薦糟增味紅稻新炊粟厭懷定似謝公吟逺岫錢塘應合有高齋送周直孺秘校和州都曹箭頭破賊棄不爲筆端射策取桂枝殿前脫袍改舊色庭下折腰丼去時歷陽郡小太守好督郵官閑衆吏嬉江邊竹園啼竹雞竹裏種花春過遲東望望夫雲脚垂煙雨隔岸風檣欹濕鴈不起沙上斯君思歷亂如盎絲宛陵先生集卷第五十五宛陵先生集目録卷第五十五和池守王微之訪别寄題資州道勝堂送黃國博知撫州觀玉汝貢奉圖送韓善宰河南送刁主簿和永叔戲作送吳殿院使北送吕司諫使北送秀倅孫都官和王平甫見寄得王介甫常州書司馬君實遺甘草逢雷太簡殿丞雷太簡遺蜀鞭得太簡蒙頂茶送邠州呂簽判送福建施提刑戲寄江隣幾送徐無黨歸婺和永叔寄劉舍人和襄州聞喜亭許屯田新詩見訪答祖擇之恵鮓覽忠顯上人詩和吳舍人對雪送滑倅王秘丞和次道答第寄懷元日閤門拜表遇雪王太丞立春早朝上元夕懷子華錢君倚日本刀和梅龍圗入淮見寄送和州周都曹目録終
