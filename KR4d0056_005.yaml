front:
  text: 宛陵先生集卷第五
  hash: sha256:91547aacba7faa58057c57ec8a24ba070ddbf12652498903c745707c01d12e35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_005-1a}
body:
  text: 宋宛陵梅堯臣聖俞著贈黃庭筠舉進士橘柚生南國幽林日蔥蒨上有嘉禽鳴五色被餘絢彼美發華英厥包待秋薦根本當自持無為風土變和滕公遊穿山洞洞口水石淺潺潺瀉緑蒲緣源進巖竇隂黑人境殊中言有物怪蟠蟄春未蘇霖雨雖有意風雷莫有扶風雷自鼓蕩不久當何如幸欣禪林近鍾梵來有無回策履幽徑衣香草露濡老僧長松下麋鹿與之俱溪雲時見起山鳥自相呼羡爾得茲樂何用勞形軀陳真卿將有秋試倐見訪不日告行送於北門歌鵠庭為五言以贈送君北岡上舉酒歌黃鵠黃鵠去何高天池待棲宿寧復戀江湖聊茲混雞鶩暉暉振羽裳不羡淵明菊秋日詠蟬羣蟲喜炎熱此獨愛高隂薄蛻聊依葉清聲巳出林人間感衰節風急雜遙砧虛腹曾何竟常憂螳斧侵范饒州夫人挽詞二首聽飮大夫日止言京兆辰常憂伯宗直曾識仲卿貧蒿里歸魂逺芝山旅殯新江邉有孤鶴嘹唳獨傷神君子喪良偶拊棺哀有餘莊生慙擊缶潘嶽感遊魚夕苑凋朱槿秋江落晚蕖猶應思所歷入室淚漣如弔礦坑惠燈上人生棲雲際巘沒葬寺傍村破案殘經卷新墳出樹根松悲隔溪路月照舊山門自昔多詩句而今幾許存寄題石埭權縣樂尉碧瀾亭遙知溪上亭秋水漾泠泠雲影無時翠嵐光到底清危樓喧晚鼓驚鷺起寒汀聊作淵明飮臨流酒易醒斑竹管筆翠管江潭竹斑斑紅淚滋束毫何徑直在橐許操持欲寫湘靈怨堪傳虞舜辭蔚然君子器安用俗人知古意月缺不改光劔折不改剛月缺魄易滿劔折鑄復良勢利壓山嶽難屈志士腸男兒自有守可殺不可苟觀博陽山火十月原野枯連山起狂燒高熖過危峰飛火入遐嶠玉石被焚灼誰能見輝耀猿猱失輕捷亦不暇相弔長風又助惡怒號生萬竅炎炎赤龍奔劃劃隂電笑願傾寒江潮勢逆難沃澆願傾天河水雖順雲衢遙青松心巳爛蔓草根未焦小農候春鋤寒客失冬樵誰知兼並子平陸間肥饒不易天地意長養非一朝聞鴈寄歐陽夷陵間坐獨無寐鴈來更未闌聲長河漢逈影落戶庭寒荆楚橘包熟瀟湘楓葉丹南飛過三峽試問故人看送謝舍人奉使北朝漢使下西清胡人擁道迎寒笳隨宿堡衛甲出孤城犯雪貂裘重衝風錦綬輕山川辭國逺車騎踏沙行授館氊為幄供庖酪和羹戎王拜天賜虜帥伏名卿紫塞千烽靜黃雲萬里平甘泉歸奏日重見鳯池榮觀放鷂子白晳少年子秋郊臂蒼隼日暖飢目開風微雙翅緊草際鳴鶉驚蒿間黃雀窘下鞲誠必獲得俊還復哂碎腦此非辜食肉爾何忍取樂在須臾我心良惻憫食橙寄謝舍人洞庭朱橘未弄色襄水錦橙已變黃玉臼搗虀憐鱠美金盤按酒助杯香雖生南土名猶重未信中州客厭嘗欲寄白苞慿驛去只應佳味怯風霜夜聞居人喊虎猛虎豈云猛潛藏伺天昏行行出叢薄稍稍入孤村孤村何所利所利犬與豚誰知仁者勇去惡義自敦採白术吳山霧露清羣草多秀發白术結靈根持鋤採秋月歸來濯寒澗香氣流不歇夜火煮石泉朝煙遍巖窟千歲扶玉顏終年固玄髮曾非首陽人敢慕食薇蕨寓言寒燈不照逺光止一室明小人不慮逺義止目前榮燈既無久熖人亦無久情誰言結明月明月豈長盈送李尉子京之邵武光澤母老不擇祿一官勤夙興長河未結凍去客已懷氷露蟬不飽腹志士甘曲肱逺方人所畏所畏非所兢銅坑碧礦不出土青山鑿不休青山鑿不休坐令鬼神愁朝日日色才出海曉月無光彩曉月在青空不與日色同誠知大君德照耀無不通失鷓鴣愛玩日巳久開籠為馴故點臆雪花圎連祛浪紋素鉤輈格磔鳴鵓㲞翻􅡇去誰知煙渚深緑水修篁處過小石潭樹老石連潭潭深煙翠入羣魚石下遊獨鳥潭上立泉暖草長緑山高風自急徘徊興不窮苔屐雲霑濕縣齋對雪密雪夜來積起見萬物春山川忽改色草木一以新古邑失荒穢王路覆平均從茲慶豐年蹈詠慙小臣對花有感新花朝竟妍故花色憔悴明日花更開新花何以異山中夜行孤客心多恐寒風夜度溪山長羸馬困月黑怪禽啼逺火生樵舍荒榛亂野蹊喜言林館近聞犬入猶迷啄木中園啄盡蠧未有出林飛不識黃金彈雙翎墜落暉夢與公度同賦藕華追録之吳王舊宫闕水殿芙蓉披濁泥留玉骨疑是葬西施西施魂不滅嬌艷照清池和綺翁遊齊山寺次其韻蒼山南望截雲煙中有紺宇通諸天長橋直度清溪水寒湖收潦曠平田古木隂森大堤上千峰濃淡高樓前龍筍未迸角出縮虎石亂踞筋拳攣隂崖乳泉濕苔蘚陽谷暖氣留蘭荃澗戶曉闢煙的的松軒夜啓月姢姢聞有謫仙乘興入飄然欲拍洪崖肩玩遊逐勝不覺逺露竒發怪工無全捫蘿但識康樂徑飮酒安問逺公禪清猿不到俗士耳香草已入騷人篇水鳥念佛次淨界野鹿銜花來象筵在昔探賞猶可數深景秀句今得傳辭韻險絶茲所駭何特杜牧專當年重以平淡若古樂聽之疏越如朱絃祕藏禇中為不朽咨諏坐上皆曰然誰意粗官獲此貺洗去鄙吝空池邊聊欲報言罕驛使春郊唯見鴈連連池州後詩下范待制約遊廬山以故不往因寄平昔愛山水茲聞廬嶽遊逺期無逸興獨往畏湍流舉手謝雲壑棲心暫鳥鷗香爐碧峰下應為一遲留范饒州坐中客語食河豚魚春洲生荻芽春岸飛楊花河豚當是時貴不數魚蝦其狀巳可怪其毒亦莫加忿腹若封豕怒目猶吳蛙庖煎苟失所入喉為鏌鎁若此喪軀體何須資齒牙持問南方人黨護復矜誇皆言美無度誰謂死如麻我語不能屈自思空咄嗟退之來潮陽始憚餐籠蛇子厚居柳州而甘食蝦蟇二物雖可憎性命無舛差斯味曾不比中藏禍無涯甚美惡亦稱此言誠可嘉徐元輿見邀與諸君同遊至峯山溪上作春霽重行行行行在墟里攄懷厭樓觀寓興欣山水斷壁翠連雲寒流清見底主人開緑樽下馬臨芳芷澄溜瀉灣漘跳波生石齒園林始弄蕚臯壠時鳴雉談謔忘機心笑言驚俗耳曠哉茲日遊何羡稽山美和元輿遊春次用其韻乘間多逺興信馬與君行碧樹斜通市清流曲抱城山花高下色春鳥短長聲日暮吾廬近還歌空復情留别李君君頗有歸意而未遂酌我樽中酒知君羡北歸如何沙上鳥逺逐片帆飛離蕪湖至觀頭橋江口泊來久菰蒲長舊苗爭雛洲鵲鬪遺子浦魚跳宿岸欣逢戍歸船競趂潮時時望鄉樹巳恨白雲遙馬祕書始約同行久而未至因以寄渡江落我前入汴居我後日日是南風時時為回首逢船一借問逺棹見來否明朝儻相及間步河堤柳寄建德徐元輿才子方為邑千峰對縣門靜寒琴意古間厭鳥聲喧山茗烹仍緑池蓮摘更繁訟稀應物詠庭下長蘭蓀詠苜蓿苜蓿來西域莆萄亦既隨胡人初未惜漢使始能持宛馬當求日離宫舊種時黃花今自發撩亂牧牛陂汴河雨後呈同行馬祕書雨霽晚虹收河堤淨如掃清隂拂人樹翠色垂流草漢漕走王都華言雜夷獠時方同馬生野泊聊論道夏日汴中作倚棹望平野低雲密未收黃鸝度高柳歸燕拂行舟濁水不堪照清江空憶遊晚晴蒸潤劇喘月見吳牛夢故府錢公故相方來夢分明接座隅只知冠劒是不道死生殊西府看如舊東山詠久徂遽然興寤歎不覺淚霑鬚謝紫微以畫鷺二軸為寄白鷺畫雙素粉毫幽趣多翹沙依折葦刷羽對衰荷浦思懸秋壁江情憶釣簔因君逺相寄時詠對滄波宿州河亭書事逺泛千里舟暫向郊亭泊觀物趣無窮適情吟有託林中鴉舅獰席上蠅虎攫雨久草苗盛田蕪瓜蔓弱香粳稚子慣脫粟家人薄少年都下來聊問時所作新衣尚穿束舊服變褒博我今貧且賤短褐隨宜著晚泊觀鬪雞舟子抱雞來雄雄跱高岸側行初取勢俯啄示無憚先鳴氣益振奮擊心非愞勇頸毛逆張怒目眥裂盰血流何所爭死鬪欲充玩應當激猛毅豈獨專晨旦勝酒人自私粒食誰爾喚􅒺懷彼興魏傍睨當衰漢徒然驅國衆曾靡救時難羣雄自苦戰九錫邀平亂寶玉歸大姦干戈託竒算從來小資大聊用一長歎聞表兄施先輩上第昔人事功名五十未為老而今君巳及得桂誠非早所慰白頭親且將黃綬好吾始日夜心望盡京關道拜慶早歸來莫變秋庭草雍丘逢錢寺丞載陽殷勤魏公子落莫吳王孫下客獨垂淚傷心魚舊恩廟子灣辭廟子灣風俗云有白黿慿險日為波潮以驚異上下余過而作辭云我之東來兮過彼雍丘舟師奏功兮濁水湍流歷長灣兮勢曲鉤傾高斗折兮若奔虬潛伏怪物兮深幽幽發作暴漲兮為潮頭土人立祠兮在彼沙洲老木蒼蒼兮蟬噪啾啾輸卒引繂兮蓬首裸體劇縲囚赤日上煎兮膠津蹙氣塞咽喉胸蕩肩挨同軛牛足進復退不得休竟持𥿄幣挂廟陬微風飄揚如喜收我今語神神聽不何不歸海事陽侯穹魚大龜非爾儔奚必區區此汴溝驚愚駭俗得肴羞去就當決何遲留送蔡侍禁赴長沙寒葉下瀟湘之官逐鴈行水經菱浦晚船過橘洲香二女竹林外三閭楓葉傍平時息戎律物景助才章送馬廷評之餘姚越鄉知勝楚君去莫辭遙曉日魚蝦市新霜橘柚橋河流通海道山井應江潮近邑逢鷗鳥先應避畫橈送秀州海鹽知縣李寺丞吳帆千里去邑屋冨魚鹽霜鶴亭臯唳風烏海客占滄涼朝日近紫翠晚山尖若過陸機宅寒蕪應不嫌送馬廷評知康州南去晉康郡風帆幾千里辭家上洞庭落葉過湘水瀧吏迎使君壼漿出蠻壘問俗言未通觀風想先喜曾非異方趣頗與華人擬期子寄梅花無由問行李過鳴鴈城九月過鳴鴈斜陽上廢臺兵車千載會桑柘萬疇開代謝隨秋草英靈化死灰我來空詠古寒鳥有餘哀送余駕部江州內史九江行潦收波巳清何時鷁舟上逺見爐峰迎野色連葭菼秋香薦橘橙寒潮如特送不肯過湓城依韻和陳祕校見寄鬱鬱東堂桂常期接袂攀羽翰殊不及蓬蓽却空還江水幾經歲鑑中無壯顏音塵能見問誰道隔雲山送張子野祕丞知鹿邑忽作五年别相逢雙鬢踈不知從此去當見復何如公秫時為酒晨庖日有魚沛譙風物美聊以樂琴書送王紫微北使天子命儒臣遐方重專對持書下西閣擁節來窮塞貂服紫蒙茸虎旗光綵綷將迎走氊騎衛從羅金鎧當宣漢恩德更使胡欣戴幾日過隂山南飛鴈相背九月都下對雪寄永叔師魯隂風中夜鳴密雪逗曉積誰言有蓬巷但見鋪瑤席忽憶在山中開戶羣峰白當時吟不厭盡日坐巖石倣徨懷故人憔悴為遷客欲泛剡溪船路長安可適劉弟示詩一軸走筆答之昔與伯氏吟青銅照人髮今又讀君詩寒水徹人骨時時探古趣往往到月窟清濟流不休終期至溟渤劉十秀才見過尋以為寄次韻和酬放言破崖岸塵事盡磨刮况此氣澄明幽襟亦軒豁竟日坐衡茅同心異胡越吾道今不孤長吟為君發依韻和劉敞秀才安得采虛名師道欲吾廣雖然存術業曾不計少長孔孟久巳亡冨貴得亦儻後生不聞義前輩懼為黨退之昔獨傳力振功不賞舌吻張洪鍾小大扣必響近世復泯滅務覺多忽恍今子誠有志方駕巳屢枉自慙懷道淺所得可下上正如種青松而欲託朽壤典册皆可尋聖言皆可仰幸與增我過此語固不爽依韻和劉十秋霖秋草更緑秋林衰長安遊客未成衣凄凄斗欲變寒色一夜獨語看燈輝送劉十往荆渚臨水一太息解舟當落暉上樓人巳逺極目鳥空飛荆楚時方晏江湖客未歸定知吟憶處林外月光微宛陵先生集卷第五宛陵先生集目録卷第五池州後詩上贈黃庭筠舉進士和滕公遊穿山洞贈陳真卿秋試秋日詠蟬范夫人挽詞弔礦坑惠燈上人寄題石埭碧瀾亭斑竹管筆古意觀博陽山火聞鴈寄歐陽送謝舍人奉使觀放鷂子食橙寄謝舍人夜聞居人喊虎採白术寓言送李尉之邵武銅坑朝日失鷓鴣過小石潭縣齋對雪對花有感山中夜行啄木夢與公度同賦和綺翁遊齊山寺池州後下范待制約遊廬山范饒州語食河豚徐元輿邀遊山和元輿遊春留别李君離蕪湖寄馬祕書寄建德徐元輿詠苜蓿汴河雨後呈同行夏日汴中作夢故府錢公謝紫微寄畫鷺宿州河亭書事晚泊觀鬪雞聞表兄施先輩上第雍丘逢錢寺丞廟子灣辭送蔡侍禁赴長沙送馬廷評之餘姚送李寺丞送馬廷評知康州過鳴鴈城送余駕部知江州和陳祕校見寄送張子野知鹿邑送王紫微北使九月都下對雪答劉弟示詩劉秀才見過和劉敞秀才和劉十秋霖送劉十往荆渚目録終
