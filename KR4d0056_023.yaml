  text: 宛陵先生集卷第二十三
  hash: sha256:7aa52fa84913e1536f08f9be708081c7936fc84ab2d5964fa25c1a825e2824fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_023-1a}
body:
  text: 宋宛陵梅堯臣聖俞著送刁經臣歸潤州兼寄曇師古來山林士一往不復返區區世上名豈畢車自挽前有高山危後有落日晚未知所止息巳慕田家飯愛君京口歸萬事不著眼乘馬飾鞍轡乘舟畫屋版長途與白浪健駛固莫限力殫風定時各各繫岸棧寄語老空人青崕勿鋤剗贈狄梁公十二代孫國賔雄雉飛上天牝雞白日鳴驅逐鳯皇雛百鳥不出聲豈無雕與鶚至死莫得爭孤鶴獨不懼使風羽翼成鶴性本君子嘹唳通太淸至今有其孫踉蹌田中行明時與稻粱重節亦貴名爾無沖天力且與鶖鶬并愼勿啄泥穢坐使白鷺輕寄金山曇頴師呈永叔內翰江中峩峩山上有道人住風濤響殿閣雲霧生席屨道人如不聞道人如不顧誰能識此心來往只鷗鷺京洛三十年塵埃一相遇我與信都公已落衣冠故平生守仁義齒髮忽衰暮世事不我拘自有浩然趣未由逢故人坐石語平素寄題刁經臣潤州園亭新作城邊圃陂原上下斜竹多劉𥙿宅松接戴顒家山色不須買江流何處涯但邀東海月莫聽五更鴉次韻和永叔夜坐鼓琴有感二首夜坐彈玉琴琴韻與指隨不辭再三彈但恨世少知知公愛陶濳全身衰弊時有琴不安絃與俗異所為寂然得真趣乃至無言期舜琴曰朕有語舜鬱陶乎孝悌怨則否傲狠愧豈無我嘗撫卷歎歎此孟氏書此書有深意仁義世久虛公今乃有感其不在茲歟魚躍與鶴舞物情曾未殊無情則無應何必問鳥魚李尚書挽詞二首相門三世貴家法百年同天子賜恩禮史臣書祖風笳聲穿苦霧隴穴啓寒蓬自古焉能免于茲是始終伊水西頭月靑山北腳雲夜臺無復曉陰嶺有時熏龍劒雙埋沒庭蘭竟鬱芬不知門下客誰刻道傍文送朱司封知登州駕言發夷門東方守牟城城臨滄海上不猒風濤聲海市有時望閭屋空虛生車馬或隱見人物亦縱橫變怪其若此安知無蓬瀛昨日聞公説今日聞公行行將勸農耕用之卜陰晴送代州錢防禦堂堂鴈門行赫赫符節分紫塞千里障紅旗十萬軍世家王爵貴祖廟將臣勳鍾鼓陳牛酒衣裘論典墳呼鷹下靑漢牧馬出黃雲竇憲何為者燕然解勒文寄題廬陵董氏桂林書齋山東桑柘多江南松桂茂種桑事春𧖟栽桂事華構嘗聞雲蓋下聚書為大富往往見子孫緣天掇星宿掇星星若珠光彩出屋漏秋收萬種田作酒日為壽亦有千里歸錦衣行白晝次韻永叔乞藥有感子厚論鍾乳要若鵝翎筒安取啖棗栗謂相出山東所産有所美愼勿憑村僮公問我餌藥石臼將使礱我餌乃藤根得方非倉公曾聞李習之其品今頗同此物俗為賤不入貴品中吾妻希孟光自舂供梁鴻荏苒歲月久顏丹聽益聰雖能氣血盛不療貧病攻何如靣黧黑腰金明光宮亦莫如學釣緡鉤懸香藭但知煙水樂寧計身瘠豐我生無快意豈異抱篤癃公乎忽我求略辨雌與雄雄赤而雌白由來不同功沙合固切似朋好殊未窮長年苟不遇笑殺渭上翁和王景彝正月十四夜有感燈光暖熱夜催春天半樓開飮近臣馳道橫頭起山嶽露臺周匝簇朱輪隔簾艷色多相照下馬輕豪各競新我巳暮年殊趣嚮濃油一盞桉邊身送雷太簡知虢州牛車讀古書少作遊秦客一朝起為郎華省何赫赫若有南山雲時時生枕席雲潤不益老呼吸乘間隙抱痾初駭聞既愈賴藥石遂請虢太守虢事簡且適况有三堂存韓詩猶可覿永歌復飮酒東平希阮籍次韻和景彝元夕雨晴春雲收暮城九陌灑然淸星出紫霄下月從滄海明車音還似晝鼓響已知晴靜閉衡門卧無心學後生早春書局即事薔薇結舊蔓夭桃種新紅傷根桃不死著架蔓依叢要以玩芳物亦寧負春風誰念太行下移谷學愚公古意林中即鹿人常為虎所即虎豈援鹿者亦各求其食趨利不顧害禍患安可息古來遁世士輕彼用智力送李閣使知冀州騕􅒁黃金絡春風北渡河將軍守漢法壯士發燕歌緑水塘蒲短晴天塞鴈多家聲復年少矍鑠笑廉頗郭園梅花二月一日未逢柳條靑獨見梅蘂好猶怯春風寒不比江南早淸香拂酒杯素色欺蓬葆佳人金縷衣唱徹嗟身老送襄陵李令彥輔李宋丞相妹壻永叔少居隨州尚往其家公相為近親翰林為故人親舊各貴顯靑袍未離身六十去作令豈慕要路津又思漢東歸便置漉酒巾深希陶淵明淡然意巳真食棗齒易黃晉俗誠自淳尚不顧隋珠安肯與此鄰送君識君心掃迹向世塵且歸漢東便欲致仕詠劉仲更澤州園中醜石君家太湖石何從太湖得太湖天東南太行天西北相去三千里雖有何致力古人煩舟車頑質無羽翼竅引木蓮根木蓮依以植秋蛇出其中舌吐虹霓色君嘗夸于我怪怪亦特特以醜世為惡茲以醜為德事固無醜好醜好貴不惑送趙子淵知頴州舊榖不棲畝新春原鹿飢野荒多冦􅶂詔發撫疲羸驛騎東風急災田小雨遲應同漢太守膏澤亦能隨寄題楊敏叔虢州吏隱亭賢哉虢略君守虢事頗簡有亭後園中登覽早至晚了了松柏關氣象入醉眼花草發瑣細禽鳥啼睍睆竟日人不來亦莫去杯盞次韻王舍人憶省中小桃寄江學士淺綻燕脂紫蠟芳深斟吳酎白瓊觴鳯池人憶去年艷雉省客無今日狂髣佛物華先上苑依俙歌吹下昭陽平明社雨莫催促應玩移牀欲近傍去歲正聞禁中賞花次韻劉原甫社後對雪社日遇群飮北風歸馬驕陽烏雲斗晦來燕翅難調朝霰侵花冷春陰到地消宿酲無酒解薄被覺寒饒爐炭重然獸衣裘更御貂蟄宮蟲復閉時鳥腹將􅑎點綴何多思輕狂不奈飄唯知妍可玩寧恤氣為妖剡客偶然興海神非次朝唱高仍和寡公又作長謠次韻永叔二月雪春雪損萌芽未必摧𣏌菊我心無愛憎隨分樂自足桃李紅間白豈不恱我目𣏌菊嫩且甘豈不飽我腹看花食𬞞仍舉杯趂取衰遲鬢猶緑聞王景彝雪中禖祀還二月漫漫雪齋宮夜寂寥壇場祠乙鳥桑柘響陰梟履帶春泥重駒回廣野驕還批五色詔池上踏瓊瑤來帖云絃歌之外時復林梟哀鳴次韻景彝祀高禖書事聞説郊祺喜氣翔曾由乙卯命封商今朝鍾鼓登歌祀何日熊羆作夢祥掃雪野廬風凛凛升壇公衮佩鏘鏘君門賜胙豫何有不似矜誇鳯沼傍次韻和永叔雨中寄原甫舍人賴得春巢燕未歸高簷終日雨衰衰細籠芳草踏靑後欲打梨花寒食時美景巳嗟空過盡名園猶許誤相隨錦鞍切莫九衢去拍拍一如鵝鴨池社日曾愼赴北園毛君寶祕校將出京示豫詩因以答之古城踏成谷不見人馬蹤古人豈不行舊迹豈不重從何求故步往返自憧憧觀君百篇詩善畫人形容毫髮無不似落筆任橫縱曷如握明鏡物物目所逢贈以東南歸擲去手中笻劉仲更于唐書局中種郁李冷局少風景買花栽作春前時櫻桃過今日雀李新搦條紅蓓蕾婀娜含雨勻舊來薔薇叢饒借與近鄰始移棣蕚密不慙車下榛日暮綴書罷暫賞舉杯踆和劉原甫復雨寄永叔階下青苔欲染衣晴光才漏又霏微衝風燕子㗸泥去隔樹鵓鴣嗔婦歸乍冷乍陰將禁火自開自掩不關扉渾身酸削懶能出莫怪與公還往稀送正仲都官知睦州每嗟相逢少常苦離别多行行復壯壯往往起悲歌古來易水上義士有荆軻捐軀思報恩飮恨歌奈何况彼兒女懷牽纒如蔓蘿是以世間人鬢髮易畨畨喜君得郡章東歸隨春波灘上嚴子祠繫船聊經過其人當漢興富貴不可羅足加天子腹傲去釣于河冬披破羊裘夏披破草蓑心中小宇宙尤哂獻玉和我慙賤丈夫豈異帶靣儺未免為鬼笑誰知懼揮訶安得如君行收迹巳嗟跎空將間歲月塵埃浪銷磨正同三峽賈盡力向盤渦續永叔歸田樂秋冬二首秋風忽來鳴蟪蛄豆葉半黃陂水枯織婦夜作露欲冷社酒已熟人相呼坎坎擊鼓坐林下醉去自有兒童扶壯男獨獵南山虎中子已扱荒徑狐田家此樂樂有餘食肉緝皮裘豈無我雖愛之乏寸土待買短艇歸江湖北風如刀割寒骨榖已成囷不倉猝任從密雪落交加旋採乾薪燒榾柮鋤犁滿屋牛在牢鵝鴨亂鳴雞亂發割烹炊黍待鄰叟飽向茅簷間兀兀田家此樂樂無涯誰道一生空汨沒公希平子定何如我效梁鴻終適越和介甫明妃曲明妃命薄漢計拙憑仗丹青死誤人一别漢宮空掩淚便隨胡馬向胡塵馬上山川難記憶明明夜月如相識月下琵琶旋製聲手彈心苦誰知得辭家只欲奉君王豈意蛾眉入虎狼男兒返覆尚不保女子輕微何可望青冡猶存塞路遠長安不見舊陵荒酬楊愈太丞之壽州見别疇昔西州謝法曹聲名籍甚我徒勞升沉一府巳荒冡憔悴兩人猶二毛眼見榮華能幾日心知富貴只秋毫淮南魚美香粳滑飽去清吟豈不高贈太子太傅王尚書挽詞二首周原開隴隧鹵部葬名臣北極履聲絶東朝車迹湮藏舟移夜壑棲鵩去承塵共看劉寬墓碑陰幾許人平生性忠厚所守必尊君靣實賢愚混心惟白黑分事光中執法書集右將軍天意若埋沒北邙松柏墳送陜西都運彭待制塞下兵難去關中粟未多君心同漢帝糧道得蕭何函谷馬蹄入渭橋車轍過地形終險固山色舊嵯峨不愧先賢傳重聽得寶歌歸來奏天子安穩看鳴珂送羅職方知秀州陸雲嘗誇千里蓴便輕羊酪同埃塵君今得郡正千里巳患無羊猒此珍乃知南北各所樂乘舟不如乘馬惡水邊不見秦羅敷縱有西施肌肉薄使君事事未稱意緑水芙蓉定何若寄懷劉使君敔昔我從仲父三年在河內春遊丹水上花木弄粉黛人誇走馬來盡眼看沒背薄暮半醉歸插花紅簇隊使君今少年時往勸耕耒安行過樹下野杏正破纇何不學山公酩酊還倒載令人知使君心膽不瑣碎切莫懲婦翁慷慨臨并代一朝由謗謫雖去民苦愛實計幸不幸豈較進與退因書寄此懷繩墨老且悔贈僕射侍中劉相公挽詞三首處外諸侯重居朝聖主知祅逢庚子日夢異武丁時歸槨關山遠凝笳道路悲欲傳千古迹佐世本無為古今皆可見富貴不常存歌者未離席弔賔俄在門朱輪空返轍緑酒尚盈樽人事固如此令名貽後昆歎此微末迹見公三十年貴為天子相能擇大夫賢東第門闌在南州隴隧延立碑思叔子墮淚峴山前送胥平叔太博通判湖州依依堤邊柳泛泛水中舟舟行無遠近柳影不隨流東風欲粉絮相逐江上頭正見魮魚來貫條尾修修使斫橫刀膾便銷千里愁檣端燕暫語即飛入高樓樓中饒客飮共候風色柔明朝同挂帆直過南徐州吳地多平湖纜柂明鏡秋芙蕖拂雨舷女艇花底謳不羡乘五馬却逢羅敷羞此官當此時莫憶塵中遊寄題張令陽翟希隱堂每讀陶濳詩令人忘世慮濳本太尉孫心遠迹亦去不希五斗粟自種五株樹矌然箕山情復起濠上趣今時有若此我豈不懷慕李士元學士守臨卭日有榖一莖九穟者數本芝數本蓮花連葉並蒂者各一本因賦之臨卭傳瑞物太守在郡時既多九穟榖復有三秀芝芝以保萬壽榖以豐東災更看芙容葉並蒂照清池宛陵先生集卷第二十三宛陵先生集目録卷第二十三送刁經臣歸潤贈狄梁公孫寄曇頴呈永叔寄題刁氏園亭次酬永叔李尚書挽詞送朱司封知登州送代州錢防禦寄題董氏書齋次酬永叔和景彝上元夜送雷太簡知􅉑州和景彝元夕雨晴早春書局即事古意送李閣使知冀州郭園梅花送襄陵李令詠仲更園中醜石送趙子淵知頴州寄題􅉑州吏隱亭和王舍人憶省中小桃和原甫社後對雪和永叔二月雪聞景彝禖祠回和景彝祀高禖書事和永叔雨中答毛祕校仲更種郁李和原甫復雨寄永叔送正仲都官知睦州續永叔歸田樂和介甫明妃曲酬楊太丞見别贈王尚書挽詞送陜西都運彭待制送羅職方知秀州寄懷州劉使君劉相公挽詞送胥太博湖州倅寄題陽翟希隱堂賦李學士榖芝蓮目録終
