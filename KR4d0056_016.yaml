front:
  text: 宛陵先生集卷第十六
  hash: sha256:25b600b0f96f8b083a34443ebc88a6754e5bc5dcbffff0746128b4bf868954d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0056_SBCK_016-1a}
body:
  text: 宋宛陵梅堯臣聖俞著和曹光道風拔三檜飄風西北至樹苦萬繂牽君家三古檜繁根龍地纒其固謂不拔朱欄擁青塼今同秀林木摧倒誰復憐安得百力士扶持尚可全愼勿伐作薪豈無庭燎然飮劉原甫家原甫懷二古錢勸酒其一齊之大刀長五寸半其一王莽時金錯刀長二寸半主人勸客飮勸客無夭妍欲出古時物先請射以年我料孔子履乆化武庫煙固知陶氏梭飛朱風雨天世無軒轅鏡百怪爭後先復聞豐城劒巳入平津淵聊讎二百載儻有書畵傳嗢呼纔十一便可傾􅘑船探懷發二寶太公新室錢獨行齊大刀鐮形末環連文存半辨齊背有模法圎次觀金錯刀一刀平五千其文如此精銅不蠧蝕肉好鉤婉全爲君舉酒盡跨馬月姢姢送嘉州監押曹供奉測舊友尹師魯嘗作送子文文存人巳殁行復我何云平時爲郡尉遐方宜撫軍定過楊雄宅野鶴自成羣答仲源太傅八日遺酒陶濳九月九無酒望白衣何言先一日雙榼忽我歸借問遺酒誰天宗分日暉明當酌大斗黃菊羔醅肥李賀諸王孫作詩字欲飛聞多錦囊句將報慙才微送張生還和州山頭孤石望來乆天外行人今獨歸藥囊自有留生術不管淮南木葉飛李康靖少傅夫人挽詞二首九月秋風急三川苦霧迷卜邙新隧啓度鞏短簫齊寶劒知終合靈蟾巳殞西松門來會葬車馬幾千蹄板輿曾至鄭靈輤此歸周行哭人增慕凝笳月正秋九原開祔穴故土覆新丘歲晏寒松下茅苫孝子留送韓文饒寺丞宰蕭山吳會未探冗廣陵先看潮橫江百馬怒卷海萬鼙囂舟楫凌湍發魚龍接浪跳薄言增勇氣少當舉山瓢蔡君謨示古大弩牙黃銅弩牙金錯花銀䦨線齒如排沙上立凖度可省括箭溝三道前直窊其度四寸寸五刻鋈光歷歷無纎差蔡侯出此問誰得往年客遺來琅瑘琅瑘築城穿厚壤旣獲磨洗爭傳誇莫知歲月孰製作精妙近世應難加發機高下在分刻今人妄射功仍賒願侯擬之起新法勿使邊兵死似麻和劉原甫省中新菊華省切星斗沉沉嚴燕房秋風茂陵孫種菊爛生光天晴蝴蝶飛上下舞雙黃劉郞才筆豪移榻吟在傍日晩吏巳散殘景上粉墻有酒無飲伴掇英襟裾香還思陶淵明弃官歸柴桑東籬獨此物盈把恨無觴賴有白衣來好事遺壼漿適意各一時豈乏同舍郞依韻和仲源獨夜吟秋鴻聲澀秋絃苦塗金博山煙夜吐寂歷虚堂燈暈生誰人共聽西窻雨寄題周敦美琨瑤洞僊人采玉驅雄龍列山剖璞青腔空因䆳爲堂曲爲室石乳溜壁光玲瓏僊歸龍去草樹長蔽翳不復人蹤通指壃買墅下峯下洗斸務欲險怪窮地鱗鹿跡尚莫到安問樵老諸牛童古人未得今巳得萬景付與由天公何當歸來歛頭角任從寶我生白虹隂溪淺水菖蒲緑下有蝦蟇雙眼紅及時佐酒斫兩股勿使更入明月中許生南歸大盤小盤堆明珠海估眩目迷精麤斗量入貢由掇拾未必一一疵纇無不貢亦自有光價此等固知魚目殊許生懷文頗所似暫抑安用頻增吁倚門老母應日望霜前稻熟舂紅稃歸來爛炊多釀酒洗蕩幽憤傾盆盂九卿有命不愁晩朱邑當年是嗇夫得沙苑榅桲戲酬蒺藜巳枯天馬歸嫰蠟籠黃霜冐榦不比江南楂柚酸槖馳載與吳人看寄題杭州廣公法喜堂淘青研朱畵屋梁黃漆栢障連曲房日暉月色不湏照了了自可窺毫芒夕隂花歛似欲病飛鳥不驚烏帽郞深山窮谷謾幽僻喜得吳儂是藥囊題滿公僧録西明軒赤萍纔落鄧林外青銅半磨傍露明飛光斜入了不隔坐卧一榻琉璃平西方古胡黃金質貝葉傳寫烏行橫謂曉此教居此軒滿壁圖畵遙峯生寄題撫州戴秀才息心亭蒼蒼開幽林峯嶺日相對雲歸垂衣纓泉落嚮環珮仕宦雖有負耳目得以貸俯仰宇宙中晏然維進退送臨江軍監酒李太博三江卑濕地北客宦游稀霧氣多成雨雲蒸易損衣白醪燒甕美黃雀下田肥未辨殊方語山歌半是非道損司門前日過訪别且云計程二月到郡正看暗惡海棠頗見太守風味因爲詩以送行蜀州海棠勝兩川使君欲賞意巳猛春露洗開千萬株燕脂點素攢細梗朝看不足暮秉燭何暇更尋桃與杏青泥劒棧將度時跨馬莫辭霜氣冷送雪竇長老曇頴朝從雪竇請暮卷雲衲輕莫問居士病自從他方行吳霜點髭根海鳥隨衆迎安隱彼道埸萬事都忘情送襄邑知縣杜君懿太博霜落水未落令君將度河農耕休叱耒女織罷鳴梭赤幘驅亭長丹砂挈印窠無慙浚儀政才比陸雲多送晉原喬主簿太守登車時我病不能出遙期玩海棠度險馬屢叱唯畏行邁遲惡欲及春日何爲愛此花曾非桃杏匹生紅濃復淺痩蔕脩且宻湖傍幾十樹雕盤擁新漆酒傾瑠璃盆月上歡未畢縣官同逺宦簿領無督詰刻意詠芳菲追補李杜失十一月十三日病後始入倉曾非雀與䑕何彼大倉爲狐裘破不温黃狗補其皮霜花逐落月綴在枯槁枝予年過五十痩寢冰生肌閔尚衣盗袴昔聞廉叔度能使民多袴多袴非或貪持新不忘故嗟嗟亦王官奚自門閥汙中府中紋綾袖之呼馬去左右卽其私邀索乃就捕三公出死狗訓導能有素今同竊鈇者見爾皆此趣胡夫人挽歌子哲巳哉胡夫人其壽七十餘其子哀母死一夕髭皓如髭白髪亦白長號守茅廬扶棺埋吳雲來㑹傾市墟誰復向寒月卧冰求鯉魚裴直講得潤州通判周仲章鹹豉遺一小缾金山寺僧作鹹豉南徐别乗馬不肥大梁貴人與年少紅泥罌盎鳥歸飛我今老病寡肉食廣文先生分遺微贈裴直講水梨二顆言太尠答吳甘三顆以爲多走筆呈之緑橘似甘來太學大梨如水出咸陽莫將多少爲輕重試擘霜包幾瓣香送樂職方知泗州長堤凍柳不堪折窮臘使君單騎行蘇合輕裘霜莫犯銅牙大弩吏先迎山旁楚賈連檣泊水上禹書寒磬清試向郡樓東北望煙波千里月臨城和劉原甫十二月十日試墨海神不朝雪不作大梁塵土蔽天高道傍牛喘復誰問佛寺吹螺空唱嚎相公跪香恬且佚陛下減膳心焦勞因君試墨偶有激勇辭壯筆揮長刀予無柰何亦思飮飮渴甖甕從餔糟十二月十三日喜雪三日朔風吹暗沙蛟龍卷起噴成花花飛萬里奪曉月白石爛堆愁女媧大明廣庭踏朝駕雉尾不掃粘宫靴宫中才人承聖顏捧觴稱夀呼南山三公免責百姓喜斗酒十千誰復慳送劉職方知汾州齊西河風俗厚尚翅古所聞子夏有遺廟千木有遺墳太守下車日當先此二君不必汾水上秋風看鴈羣十三日雷後晩過天漢橋堤上行堤上殘風雪橋邊盛酒樓據鞍衰意盡倚檻艶歌留海月開金鑑河冰卧玉虬當年洛陽醉偏憶董糟丘送崔黃臣殿丞之任廬山驊駒西行四千里直度經橋百尋水石上菖蒲未見花蒙頂茶牙初似觜采時應憶故園春故園開焙亦思人其間杜䳌不中聽掩耳聊看錦雉馴青崖鞭垂痩虵尾僊人搯節隨鱗起斫取他年跨馬歸劔棧秦山多折箠十九日出曹門見水牛拽車只見吳牛事水田只見黃犂負車軛今牽大車同一羣又與騾驢走長陌卬頭闊歩塵蒙蒙不似綏耕泥洦洦一一夜眠頭向南越鳥心腸誰辨白吳太博遺柑子太學先生欺緑橘裴如晦近有贈吳興才士與黃柑黃柑似日勝崖蜜帶葉初擎翠竹籃還料楚王曾未識徒將萍實詫江南和普公賦東園十題擷芳亭結宇東園中種花待春風口歌金縷衣手折枝上紅今日映緑髪他年羞青銅清心堂寂寞外物亂境清心亦清彼皆居深谷此獨處重城夷齊食薇蕨千古首陽名石筍削出青山根峭立碧玉圭不作湘竹老不染帝子啼不爲盤中𬞞豈與煙茁齊待月亭明月過三五飛出滄海遲佳人望淸夜隔樹光離離不湏磔蝦蟇寒魄自有虧虚白堂空堂絕纎塵虚靜自生白長風吹月東牎戸如不隔漆園玆趣深赤水珠難索假山太山不可歷石齒齧人足聊集怪與竒蒼蒼都在目何湏引寒流平地作溪谷書齋聖賢有事業皆在經籍中巳愛牙作籖可輕山賜銅還來讀詩禮不用辨魚蟲小池小池依小山山晴光翠入無容羣蛙鳴間有孤鶴立曾不起波瀾石郵風自急紫竹西南產脩竹色異東筠緑裁簫映檀脣引枝宜鳯宿移從幾千里不改生幽谷山茶紅蘤勝朱槿越丹看更大臘月冐寒開楚梅猶不柰曾非中土有流落思江外宛陵先生集卷第十六宛陵先生集目録卷第十六和曹光道風拔檜飮劉原甫家送監押曹供奉答仲源遺酒送張生還和州李少傅夫人挽詞送韓寺丞宰蕭山蔡君謨示弩牙和原甫省中新菊和仲源獨夜吟寄題琨瑤洞許生南歸得榅桲戲酬寄題杭州法喜堂題滿僧録西明軒寄題撫州息心亭送李太博送道損司門送雪竇頴長老送襄邑杜太博送晉原喬主簿病後宿倉閔尚衣盗袴胡夫人挽歌裴直講遺鹹豉贈答如晦水梨送樂職方知泗州和劉原甫試墨喜雪送劉職方知汾州雪後晩過天漢橋送崔殿丞知廬州見水牛拽車吳太博遺柑子和普公東園十題目録終
